<div class="login-page">

    <div class="login-hero animate-in">
        <div class="login-logo">
            <i class="fas fa-hand-holding-heart"></i>
        </div>
        <h1>Volunteer Hub</h1>
        <p class="login-subtitle">Sign in to view your schedule, log hours, and manage your profile.</p>
    </div>

    <div class="login-card hub-card animate-in animate-delay-2">

        <!-- Step 1: Enter email or phone -->
        <div *ngIf="step === 'identifier'">
            <h2>Welcome Back</h2>
            <p class="login-desc">Enter your email or phone number to receive a one-time code.</p>

            <div class="login-field">
                <label for="identifier">Email or Phone</label>
                <input id="identifier" type="text" class="hub-input" placeholder="you@example.com"
                    [(ngModel)]="identifier" (keyup.enter)="onRequestCode()" [disabled]="isLoading" autocomplete="email"
                    autofocus>
            </div>

            <button class="hub-btn-primary login-submit" (click)="onRequestCode()"
                [disabled]="isLoading || !identifier.trim()">
                <i class="fas fa-paper-plane" *ngIf="!isLoading"></i>
                <i class="fas fa-spinner fa-spin" *ngIf="isLoading"></i>
                {{ isLoading ? 'Sending...' : 'Send Code' }}
            </button>
        </div>

        <!-- Step 2: Enter OTP code -->
        <div *ngIf="step === 'code'">
            <button class="login-back" (click)="onBack()">
                <i class="fas fa-arrow-left"></i> Back
            </button>

            <h2>Enter Your Code</h2>
            <p class="login-desc">
                We sent a 6-digit code to <strong>{{ identifier }}</strong>
            </p>

            <div class="login-field">
                <label for="code">Verification Code</label>
                <input id="code" type="text" class="hub-input code-input" placeholder="000000" [(ngModel)]="code"
                    (keyup.enter)="onVerifyCode()" [disabled]="isLoading" maxlength="6" inputmode="numeric"
                    autocomplete="one-time-code" autofocus>
            </div>

            <button class="hub-btn-primary login-submit" (click)="onVerifyCode()"
                [disabled]="isLoading || code.trim().length < 6">
                <i class="fas fa-shield-halved" *ngIf="!isLoading"></i>
                <i class="fas fa-spinner fa-spin" *ngIf="isLoading"></i>
                {{ isLoading ? 'Verifying...' : 'Verify' }}
            </button>
        </div>

        <!-- Messages -->
        <div class="login-message error" *ngIf="errorMessage">
            <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
        </div>

        <div class="login-message success" *ngIf="successMessage && step === 'code'">
            <i class="fas fa-check-circle"></i> {{ successMessage }}
        </div>

    </div>

</div>
