<div class="container-fluid p-1 m-0 post-category-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="post-category-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Post Category</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Post Category' : 'Add Post Category'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsCommunityPostCategoryReader()">
                <div class="col m-2 post-category-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="postCategoryForm" (ngSubmit)="submitForm()" class="post-category-details-form">
                            <div class="post-category-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="postCategoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Post Category">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !postCategoryForm.valid || !postCategoryForm.dirty || postCategoryForm.pristine  || userIsCommunityPostCategoryWriter() == false " ngbTooltip="Save the Post Category changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Post Category' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsCommunityPostCategoryReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 post-category-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="postService.userIsCommunityPostReader()">
                            <button ngbNavLink>Posts
                                <span class="badge bg-primary ms-2">
                                    {{ (postCategoryData?.PostsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-post-table [queryParams]="{ postCategoryId: postCategoryData?.id }" [showAddButton]="true" [preSeededData]="{ postCategoryId: postCategoryData?.id }" [hiddenFields]="['postCategoryId']"></app-post-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
