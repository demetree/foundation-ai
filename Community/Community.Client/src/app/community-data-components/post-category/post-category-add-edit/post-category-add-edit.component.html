<div class="add-post-category" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-post-category me-2"
        (click)="openModal()"
        ngbTooltip="Add Post Category" 
        *ngIf="userIsCommunityPostCategoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #postCategoryModal let-modal>
   <div class="modal-header post-category-modal-header">
      <h5 class="modal-title mb-0" id="postCategoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Post Category' : 'Add Post Category' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body post-category-modal-body">
      <form [formGroup]="postCategoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="PostCategory-name" id="label-PostCategory-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="PostCategory-name" formControlName="name" placeholder="Enter Name" class="form-control post-category-input" [disabled]="!userIsCommunityPostCategoryWriter()" aria-labelledby="label-name" />
                <div *ngIf="postCategoryForm.get('name')?.invalid && postCategoryForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="PostCategory-description" id="label-PostCategory-description">Description</label>
                <textarea id="PostCategory-description" formControlName="description" placeholder="Enter Description" class="form-control post-category-input" [disabled]="!userIsCommunityPostCategoryWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('slug')">
                <label for="PostCategory-slug" id="label-PostCategory-slug"><span class="text-danger">*</span>Slug</label>
                <input type="text" id="PostCategory-slug" formControlName="slug" placeholder="Enter Slug" class="form-control post-category-input" [disabled]="!userIsCommunityPostCategoryWriter()" aria-labelledby="label-slug" />
                <div *ngIf="postCategoryForm.get('slug')?.invalid && postCategoryForm.get('slug')?.touched" class="text-danger">
                    Slug is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="PostCategory-sequence" id="label-PostCategory-sequence">Sequence</label>
                <input type="number" id="PostCategory-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control post-category-input" [disabled]="!userIsCommunityPostCategoryWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="PostCategory-active" formControlName="active" class="form-check-input" [disabled]="!userIsCommunityPostCategoryWriter()" />
                <label for="PostCategory-active" class="form-check-label" id="label-PostCategory-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="PostCategory-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsCommunityPostCategoryWriter()" />
                <label for="PostCategory-deleted" class="form-check-label" id="label-PostCategory-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer post-category-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Post Category changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !postCategoryForm.valid || postCategoryForm.pristine  || userIsCommunityPostCategoryWriter() == false " ngbTooltip="Save the Post Category changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Post Category' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
