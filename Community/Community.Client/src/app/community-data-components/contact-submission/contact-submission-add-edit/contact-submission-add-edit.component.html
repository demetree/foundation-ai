<div class="add-contact-submission" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-contact-submission me-2"
        (click)="openModal()"
        ngbTooltip="Add Contact Submission" 
        *ngIf="userIsCommunityContactSubmissionWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #contactSubmissionModal let-modal>
   <div class="modal-header contact-submission-modal-header">
      <h5 class="modal-title mb-0" id="contactSubmissionModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Contact Submission' : 'Add Contact Submission' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body contact-submission-modal-body">
      <form [formGroup]="contactSubmissionForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="ContactSubmission-name" id="label-ContactSubmission-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="ContactSubmission-name" formControlName="name" placeholder="Enter Name" class="form-control contact-submission-input" [disabled]="!userIsCommunityContactSubmissionWriter()" aria-labelledby="label-name" />
                <div *ngIf="contactSubmissionForm.get('name')?.invalid && contactSubmissionForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('email')">
                <label for="ContactSubmission-email" id="label-ContactSubmission-email" *ngIf="isEditMode"><a href="mailto:{{contactSubmissionSubmitData?.email}}" ngbTooltip="Send Email to {{contactSubmissionSubmitData?.email}}"><span class="text-danger">*</span>Email</a></label>
                <label for="ContactSubmission-email" id="label-ContactSubmission-email" *ngIf="!isEditMode"><span class="text-danger">*</span>Email</label>
                <input type="text" id="ContactSubmission-email" formControlName="email" placeholder="Enter Email" class="form-control contact-submission-input" [disabled]="!userIsCommunityContactSubmissionWriter()" aria-labelledby="label-email" />
                <div *ngIf="contactSubmissionForm.get('email')?.invalid && contactSubmissionForm.get('email')?.touched" class="text-danger">
                    Email is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('subject')">
                <label for="ContactSubmission-subject" id="label-ContactSubmission-subject">Subject</label>
                <input type="text" id="ContactSubmission-subject" formControlName="subject" placeholder="Enter Subject" class="form-control contact-submission-input" [disabled]="!userIsCommunityContactSubmissionWriter()" aria-labelledby="label-subject" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('message')">
                <label for="ContactSubmission-message" id="label-ContactSubmission-message"><span class="text-danger">*</span>Message</label>
                <textarea id="ContactSubmission-message" formControlName="message" placeholder="Enter Message" class="form-control contact-submission-input" [disabled]="!userIsCommunityContactSubmissionWriter()"></textarea>
                <div *ngIf="contactSubmissionForm.get('message')?.invalid && contactSubmissionForm.get('message')?.touched" class="text-danger">
                    Message is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('submittedDate')">
                <label for="ContactSubmission-submittedDate" id="label-ContactSubmission-submittedDate"><span class="text-danger">*</span>Submitted Date</label>
                <input type="datetime-local" id="ContactSubmission-submittedDate" formControlName="submittedDate" placeholder="Enter Submitted Date" class="form-control contact-submission-input" [disabled]="!userIsCommunityContactSubmissionWriter()" aria-labelledby="label-submittedDate" />
                <div *ngIf="contactSubmissionForm.get('submittedDate')?.invalid && contactSubmissionForm.get('submittedDate')?.touched" class="text-danger">
                    Submitted Date is required
                </div>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('isRead')">
                <input type="checkbox" id="ContactSubmission-isRead" formControlName="isRead" class="form-check-input" [disabled]="!userIsCommunityContactSubmissionWriter()" />
                <label for="ContactSubmission-isRead" class="form-check-label" id="label-ContactSubmission-isRead"><span class="text-danger">*</span>Is Read</label>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('isArchived')">
                <input type="checkbox" id="ContactSubmission-isArchived" formControlName="isArchived" class="form-check-input" [disabled]="!userIsCommunityContactSubmissionWriter()" />
                <label for="ContactSubmission-isArchived" class="form-check-label" id="label-ContactSubmission-isArchived"><span class="text-danger">*</span>Is Archived</label>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('adminNotes')">
                <label for="ContactSubmission-adminNotes" id="label-ContactSubmission-adminNotes">Admin Notes</label>
                <textarea id="ContactSubmission-adminNotes" formControlName="adminNotes" placeholder="Enter Admin Notes" class="form-control contact-submission-input" [disabled]="!userIsCommunityContactSubmissionWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ContactSubmission-active" formControlName="active" class="form-check-input" [disabled]="!userIsCommunityContactSubmissionWriter()" />
                <label for="ContactSubmission-active" class="form-check-label" id="label-ContactSubmission-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ContactSubmission-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsCommunityContactSubmissionWriter()" />
                <label for="ContactSubmission-deleted" class="form-check-label" id="label-ContactSubmission-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer contact-submission-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Contact Submission changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !contactSubmissionForm.valid || contactSubmissionForm.pristine  || userIsCommunityContactSubmissionWriter() == false " ngbTooltip="Save the Contact Submission changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Contact Submission' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
