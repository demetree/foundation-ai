<div class="add-contact-submission" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-contact-submission me-2"
        (click)="openModal()"
        ngbTooltip="Add Contact Submission" 
        *ngIf="userIsCommunityContactSubmissionWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #contactSubmissionModal let-modal>
   <div class="modal-header contact-submission-modal-header">
      <h5 class="modal-title mb-0" id="contactSubmissionModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Contact Submission' : 'Add Contact Submission' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body contact-submission-modal-body">
      <form [formGroup]="contactSubmissionForm" (ngSubmit)="submitForm()">
         <div class="modal-footer contact-submission-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Contact Submission changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !contactSubmissionForm.valid || contactSubmissionForm.pristine  || userIsCommunityContactSubmissionWriter() == false " ngbTooltip="Save the Contact Submission changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Contact Submission' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
