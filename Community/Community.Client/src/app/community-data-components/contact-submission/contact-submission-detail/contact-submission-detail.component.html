<div class="container-fluid p-1 m-0 contact-submission-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="contact-submission-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Contact Submission</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Contact Submission' : 'Add Contact Submission'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsCommunityContactSubmissionReader()">
                <div class="col m-2 contact-submission-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="contactSubmissionForm" (ngSubmit)="submitForm()" class="contact-submission-details-form">
                            <div class="contact-submission-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="contactSubmissionForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Contact Submission">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !contactSubmissionForm.valid || !contactSubmissionForm.dirty || contactSubmissionForm.pristine  || userIsCommunityContactSubmissionWriter() == false " ngbTooltip="Save the Contact Submission changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Contact Submission' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
