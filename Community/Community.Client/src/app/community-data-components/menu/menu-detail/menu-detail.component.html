<div class="container-fluid p-1 m-0 menu-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="menu-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Menu</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Menu' : 'Add Menu'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsCommunityMenuReader()">
                <div class="col m-2 menu-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="menuForm" (ngSubmit)="submitForm()" class="menu-details-form">
                            <div class="menu-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="menuForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Menu">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !menuForm.valid || !menuForm.dirty || menuForm.pristine  || userIsCommunityMenuWriter() == false " ngbTooltip="Save the Menu changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Menu' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsCommunityMenuReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 menu-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="menuItemService.userIsCommunityMenuItemReader()">
                            <button ngbNavLink>Menu Items
                                <span class="badge bg-primary ms-2">
                                    {{ (menuData?.MenuItemsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-menu-item-table [queryParams]="{ menuId: menuData?.id }" [showAddButton]="true" [preSeededData]="{ menuId: menuData?.id }" [hiddenFields]="['menuId']"></app-menu-item-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
