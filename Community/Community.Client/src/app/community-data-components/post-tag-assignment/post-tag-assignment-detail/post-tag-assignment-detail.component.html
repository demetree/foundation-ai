<div class="container-fluid p-1 m-0 post-tag-assignment-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="post-tag-assignment-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Post Tag Assignment</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Post Tag Assignment' : 'Add Post Tag Assignment'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsCommunityPostTagAssignmentReader()">
                <div class="col m-2 post-tag-assignment-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="postTagAssignmentForm" (ngSubmit)="submitForm()" class="post-tag-assignment-details-form">
                            <div class="post-tag-assignment-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="postTagAssignmentForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Post Tag Assignment">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !postTagAssignmentForm.valid || !postTagAssignmentForm.dirty || postTagAssignmentForm.pristine  || userIsCommunityPostTagAssignmentWriter() == false " ngbTooltip="Save the Post Tag Assignment changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Post Tag Assignment' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
