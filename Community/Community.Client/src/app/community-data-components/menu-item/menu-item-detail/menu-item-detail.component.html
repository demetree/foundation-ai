<div class="container-fluid p-1 m-0 menu-item-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="menu-item-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Menu Item</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Menu Item' : 'Add Menu Item'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsCommunityMenuItemReader()">
                <div class="col m-2 menu-item-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="menuItemForm" (ngSubmit)="submitForm()" class="menu-item-details-form">
                            <div class="menu-item-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="menuItemForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Menu Item">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !menuItemForm.valid || !menuItemForm.dirty || menuItemForm.pristine  || userIsCommunityMenuItemWriter() == false " ngbTooltip="Save the Menu Item changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Menu Item' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
