<div class="add-gallery-image" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-gallery-image me-2"
        (click)="openModal()"
        ngbTooltip="Add Gallery Image" 
        *ngIf="userIsCommunityGalleryImageWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #galleryImageModal let-modal>
   <div class="modal-header gallery-image-modal-header">
      <h5 class="modal-title mb-0" id="galleryImageModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Gallery Image' : 'Add Gallery Image' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body gallery-image-modal-body">
      <form [formGroup]="galleryImageForm" (ngSubmit)="submitForm()">
         <div class="modal-footer gallery-image-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Gallery Image changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !galleryImageForm.valid || galleryImageForm.pristine  || userIsCommunityGalleryImageWriter() == false " ngbTooltip="Save the Gallery Image changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Gallery Image' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
