<div class="add-gallery-album" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-gallery-album me-2"
        (click)="openModal()"
        ngbTooltip="Add Gallery Album" 
        *ngIf="userIsCommunityGalleryAlbumWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #galleryAlbumModal let-modal>
   <div class="modal-header gallery-album-modal-header">
      <h5 class="modal-title mb-0" id="galleryAlbumModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Gallery Album' : 'Add Gallery Album' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body gallery-album-modal-body">
      <form [formGroup]="galleryAlbumForm" (ngSubmit)="submitForm()">
         <div class="modal-footer gallery-album-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Gallery Album changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !galleryAlbumForm.valid || galleryAlbumForm.pristine  || userIsCommunityGalleryAlbumWriter() == false " ngbTooltip="Save the Gallery Album changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Gallery Album' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
