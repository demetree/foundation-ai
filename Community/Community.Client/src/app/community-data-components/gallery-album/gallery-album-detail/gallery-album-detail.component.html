<div class="container-fluid p-1 m-0 gallery-album-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="gallery-album-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Gallery Album</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Gallery Album' : 'Add Gallery Album'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsCommunityGalleryAlbumReader()">
                <div class="col m-2 gallery-album-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="galleryAlbumForm" (ngSubmit)="submitForm()" class="gallery-album-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('title')">
                                <label for="GalleryAlbum-title" id="label-GalleryAlbum-title"><span class="text-danger">*</span>Title</label>
                                <input type="text" id="GalleryAlbum-title" formControlName="title" placeholder="Enter Title" class="form-control gallery-album-input" [disabled]="!userIsCommunityGalleryAlbumWriter()" aria-labelledby="label-title" />
                                <div *ngIf="galleryAlbumForm.get('title')?.invalid && galleryAlbumForm.get('title')?.touched" class="text-danger">
                                    Title is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('slug')">
                                <label for="GalleryAlbum-slug" id="label-GalleryAlbum-slug"><span class="text-danger">*</span>Slug</label>
                                <input type="text" id="GalleryAlbum-slug" formControlName="slug" placeholder="Enter Slug" class="form-control gallery-album-input" [disabled]="!userIsCommunityGalleryAlbumWriter()" aria-labelledby="label-slug" />
                                <div *ngIf="galleryAlbumForm.get('slug')?.invalid && galleryAlbumForm.get('slug')?.touched" class="text-danger">
                                    Slug is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="GalleryAlbum-description" id="label-GalleryAlbum-description">Description</label>
                                <textarea id="GalleryAlbum-description" formControlName="description" placeholder="Enter Description" class="form-control gallery-album-input" [disabled]="!userIsCommunityGalleryAlbumWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('coverImageUrl')">
                                <label for="GalleryAlbum-coverImageUrl" id="label-GalleryAlbum-coverImageUrl">Cover Image Url</label>
                                <textarea id="GalleryAlbum-coverImageUrl" formControlName="coverImageUrl" placeholder="Enter Cover Image Url" class="form-control gallery-album-input" [disabled]="!userIsCommunityGalleryAlbumWriter()"></textarea>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isPublished')">
                                <input type="checkbox" id="GalleryAlbum-isPublished" formControlName="isPublished" class="form-check-input" [disabled]="!userIsCommunityGalleryAlbumWriter()" />
                                <label for="GalleryAlbum-isPublished" class="form-check-label" id="label-GalleryAlbum-isPublished"><span class="text-danger">*</span>Is Published</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="GalleryAlbum-sequence" id="label-GalleryAlbum-sequence">Sequence</label>
                                <input type="number" id="GalleryAlbum-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control gallery-album-input" [disabled]="!userIsCommunityGalleryAlbumWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="GalleryAlbum-active" formControlName="active" class="form-check-input" [disabled]="!userIsCommunityGalleryAlbumWriter()" />
                                <label for="GalleryAlbum-active" class="form-check-label" id="label-GalleryAlbum-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="GalleryAlbum-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsCommunityGalleryAlbumWriter()" />
                                <label for="GalleryAlbum-deleted" class="form-check-label" id="label-GalleryAlbum-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="gallery-album-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="galleryAlbumForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Gallery Album">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !galleryAlbumForm.valid || !galleryAlbumForm.dirty || galleryAlbumForm.pristine  || userIsCommunityGalleryAlbumWriter() == false " ngbTooltip="Save the Gallery Album changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Gallery Album' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsCommunityGalleryAlbumReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 gallery-album-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="galleryImageService.userIsCommunityGalleryImageReader()">
                            <button ngbNavLink>Gallery Images
                                <span class="badge bg-primary ms-2">
                                    {{ (galleryAlbumData?.GalleryImagesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-gallery-image-table [queryParams]="{ galleryAlbumId: galleryAlbumData?.id }" [showAddButton]="true" [preSeededData]="{ galleryAlbumId: galleryAlbumData?.id }" [hiddenFields]="['galleryAlbumId']"></app-gallery-image-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
