<div class="add-page-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-page-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Page Change History" 
        *ngIf="userIsCommunityPageChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #pageChangeHistoryModal let-modal>
   <div class="modal-header page-change-history-modal-header">
      <h5 class="modal-title mb-0" id="pageChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Page Change History' : 'Add Page Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body page-change-history-modal-body">
      <form [formGroup]="pageChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('pageId')">
                <label for="PageChangeHistory-pageId" id="label-PageChangeHistory-pageId"><span class="text-danger">*</span>Page</label>
                <select id="PageChangeHistory-pageId" formControlName="pageId" class="form-select page-change-history-select" [disabled]="!userIsCommunityPageChangeHistoryWriter()">
                    <option [ngValue]="null">Select Page</option>
                    <option *ngFor="let page of pages$ | async" [ngValue]="page.id">{{page.title}}</option>
                </select>
                <div *ngIf="pageChangeHistoryForm.get('pageId')?.invalid && pageChangeHistoryForm.get('pageId')?.touched" class="text-danger">
                    Page is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="PageChangeHistory-versionNumber" id="label-PageChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="PageChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control page-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="PageChangeHistory-timeStamp" id="label-PageChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="PageChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control page-change-history-input" [disabled]="!userIsCommunityPageChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="pageChangeHistoryForm.get('timeStamp')?.invalid && pageChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="PageChangeHistory-userId" id="label-PageChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="PageChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control page-change-history-input" [disabled]="!userIsCommunityPageChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="pageChangeHistoryForm.get('userId')?.invalid && pageChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="PageChangeHistory-data" id="label-PageChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="PageChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control page-change-history-input" [disabled]="!userIsCommunityPageChangeHistoryWriter()"></textarea>
                <div *ngIf="pageChangeHistoryForm.get('data')?.invalid && pageChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer page-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Page Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !pageChangeHistoryForm.valid || pageChangeHistoryForm.pristine  || userIsCommunityPageChangeHistoryWriter() == false " ngbTooltip="Save the Page Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Page Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
