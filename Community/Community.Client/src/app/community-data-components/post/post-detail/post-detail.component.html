<div class="container-fluid p-1 m-0 post-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="post-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Post</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Post' : 'Add Post'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsCommunityPostReader()">
                <div class="col m-2 post-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="postForm" (ngSubmit)="submitForm()" class="post-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('title')">
                                <label for="Post-title" id="label-Post-title"><span class="text-danger">*</span>Title</label>
                                <input type="text" id="Post-title" formControlName="title" placeholder="Enter Title" class="form-control post-input" [disabled]="!userIsCommunityPostWriter()" aria-labelledby="label-title" />
                                <div *ngIf="postForm.get('title')?.invalid && postForm.get('title')?.touched" class="text-danger">
                                    Title is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('slug')">
                                <label for="Post-slug" id="label-Post-slug"><span class="text-danger">*</span>Slug</label>
                                <input type="text" id="Post-slug" formControlName="slug" placeholder="Enter Slug" class="form-control post-input" [disabled]="!userIsCommunityPostWriter()" aria-labelledby="label-slug" />
                                <div *ngIf="postForm.get('slug')?.invalid && postForm.get('slug')?.touched" class="text-danger">
                                    Slug is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('body')">
                                <label for="Post-body" id="label-Post-body">Body</label>
                                <textarea id="Post-body" formControlName="body" placeholder="Enter Body" class="form-control post-input" [disabled]="!userIsCommunityPostWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('excerpt')">
                                <label for="Post-excerpt" id="label-Post-excerpt">Excerpt</label>
                                <textarea id="Post-excerpt" formControlName="excerpt" placeholder="Enter Excerpt" class="form-control post-input" [disabled]="!userIsCommunityPostWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('authorName')">
                                <label for="Post-authorName" id="label-Post-authorName">Author Name</label>
                                <input type="text" id="Post-authorName" formControlName="authorName" placeholder="Enter Author Name" class="form-control post-input" [disabled]="!userIsCommunityPostWriter()" aria-labelledby="label-authorName" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('postCategoryId')">
                                <label for="Post-postCategoryId" id="label-Post-postCategoryId">Post Category</label>
                                <select id="Post-postCategoryId" formControlName="postCategoryId" class="form-select post-select" [disabled]="!userIsCommunityPostWriter()">
                                    <option [ngValue]="null">Select Post Category</option>
                                    <option *ngFor="let postCategory of postCategories$ | async" [ngValue]="postCategory.id">{{postCategory.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('featuredImageUrl')">
                                <label for="Post-featuredImageUrl" id="label-Post-featuredImageUrl">Featured Image Url</label>
                                <textarea id="Post-featuredImageUrl" formControlName="featuredImageUrl" placeholder="Enter Featured Image Url" class="form-control post-input" [disabled]="!userIsCommunityPostWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('metaDescription')">
                                <label for="Post-metaDescription" id="label-Post-metaDescription">Meta Description</label>
                                <textarea id="Post-metaDescription" formControlName="metaDescription" placeholder="Enter Meta Description" class="form-control post-input" [disabled]="!userIsCommunityPostWriter()"></textarea>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isPublished')">
                                <input type="checkbox" id="Post-isPublished" formControlName="isPublished" class="form-check-input" [disabled]="!userIsCommunityPostWriter()" />
                                <label for="Post-isPublished" class="form-check-label" id="label-Post-isPublished"><span class="text-danger">*</span>Is Published</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('publishedDate')">
                                <label for="Post-publishedDate" id="label-Post-publishedDate">Published Date</label>
                                <input type="datetime-local" id="Post-publishedDate" formControlName="publishedDate" placeholder="Enter Published Date" class="form-control post-input" [disabled]="!userIsCommunityPostWriter()" aria-labelledby="label-publishedDate" />
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isFeatured')">
                                <input type="checkbox" id="Post-isFeatured" formControlName="isFeatured" class="form-check-input" [disabled]="!userIsCommunityPostWriter()" />
                                <label for="Post-isFeatured" class="form-check-label" id="label-Post-isFeatured"><span class="text-danger">*</span>Is Featured</label>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="Post-versionNumber" id="label-Post-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="Post-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control post-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Post-active" formControlName="active" class="form-check-input" [disabled]="!userIsCommunityPostWriter()" />
                                <label for="Post-active" class="form-check-label" id="label-Post-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Post-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsCommunityPostWriter()" />
                                <label for="Post-deleted" class="form-check-label" id="label-Post-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="post-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="postForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Post">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !postForm.valid || !postForm.dirty || postForm.pristine  || userIsCommunityPostWriter() == false " ngbTooltip="Save the Post changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Post' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsCommunityPostReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 post-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="postChangeHistoryService.userIsCommunityPostChangeHistoryReader()">
                            <button ngbNavLink>Post Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (postData?.PostChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-post-change-history-table [queryParams]="{ postId: postData?.id }" [showAddButton]="true" [preSeededData]="{ postId: postData?.id }" [hiddenFields]="['postId']"></app-post-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="postTagAssignmentService.userIsCommunityPostTagAssignmentReader()">
                            <button ngbNavLink>Post Tag Assignments
                                <span class="badge bg-primary ms-2">
                                    {{ (postData?.PostTagAssignmentsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-post-tag-assignment-table [queryParams]="{ postId: postData?.id }" [showAddButton]="true" [preSeededData]="{ postId: postData?.id }" [hiddenFields]="['postId']"></app-post-tag-assignment-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
