<div class="add-post" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-post me-2"
        (click)="openModal()"
        ngbTooltip="Add Post" 
        *ngIf="userIsCommunityPostWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #postModal let-modal>
   <div class="modal-header post-modal-header">
      <h5 class="modal-title mb-0" id="postModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Post' : 'Add Post' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body post-modal-body">
      <form [formGroup]="postForm" (ngSubmit)="submitForm()">
         <div class="modal-footer post-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Post changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !postForm.valid || postForm.pristine  || userIsCommunityPostWriter() == false " ngbTooltip="Save the Post changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Post' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
