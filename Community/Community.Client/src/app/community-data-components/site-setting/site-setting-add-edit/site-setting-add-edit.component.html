<div class="add-site-setting" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-site-setting me-2"
        (click)="openModal()"
        ngbTooltip="Add Site Setting" 
        *ngIf="userIsCommunitySiteSettingWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #siteSettingModal let-modal>
   <div class="modal-header site-setting-modal-header">
      <h5 class="modal-title mb-0" id="siteSettingModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Site Setting' : 'Add Site Setting' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body site-setting-modal-body">
      <form [formGroup]="siteSettingForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('settingKey')">
                <label for="SiteSetting-settingKey" id="label-SiteSetting-settingKey"><span class="text-danger">*</span>Setting Key</label>
                <input type="text" id="SiteSetting-settingKey" formControlName="settingKey" placeholder="Enter Setting Key" class="form-control site-setting-input" [disabled]="!userIsCommunitySiteSettingWriter()" aria-labelledby="label-settingKey" />
                <div *ngIf="siteSettingForm.get('settingKey')?.invalid && siteSettingForm.get('settingKey')?.touched" class="text-danger">
                    Setting Key is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('settingValue')">
                <label for="SiteSetting-settingValue" id="label-SiteSetting-settingValue">Setting Value</label>
                <textarea id="SiteSetting-settingValue" formControlName="settingValue" placeholder="Enter Setting Value" class="form-control site-setting-input" [disabled]="!userIsCommunitySiteSettingWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="SiteSetting-description" id="label-SiteSetting-description">Description</label>
                <input type="text" id="SiteSetting-description" formControlName="description" placeholder="Enter Description" class="form-control site-setting-input" [disabled]="!userIsCommunitySiteSettingWriter()" aria-labelledby="label-description" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('settingGroup')">
                <label for="SiteSetting-settingGroup" id="label-SiteSetting-settingGroup">Setting Group</label>
                <input type="text" id="SiteSetting-settingGroup" formControlName="settingGroup" placeholder="Enter Setting Group" class="form-control site-setting-input" [disabled]="!userIsCommunitySiteSettingWriter()" aria-labelledby="label-settingGroup" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="SiteSetting-active" formControlName="active" class="form-check-input" [disabled]="!userIsCommunitySiteSettingWriter()" />
                <label for="SiteSetting-active" class="form-check-label" id="label-SiteSetting-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="SiteSetting-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsCommunitySiteSettingWriter()" />
                <label for="SiteSetting-deleted" class="form-check-label" id="label-SiteSetting-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer site-setting-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Site Setting changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !siteSettingForm.valid || siteSettingForm.pristine  || userIsCommunitySiteSettingWriter() == false " ngbTooltip="Save the Site Setting changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Site Setting' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
