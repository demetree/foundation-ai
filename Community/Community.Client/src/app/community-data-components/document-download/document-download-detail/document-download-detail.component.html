<div class="container-fluid p-1 m-0 document-download-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="document-download-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Document Download</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Document Download' : 'Add Document Download'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsCommunityDocumentDownloadReader()">
                <div class="col m-2 document-download-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="documentDownloadForm" (ngSubmit)="submitForm()" class="document-download-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('title')">
                                <label for="DocumentDownload-title" id="label-DocumentDownload-title"><span class="text-danger">*</span>Title</label>
                                <input type="text" id="DocumentDownload-title" formControlName="title" placeholder="Enter Title" class="form-control document-download-input" [disabled]="!userIsCommunityDocumentDownloadWriter()" aria-labelledby="label-title" />
                                <div *ngIf="documentDownloadForm.get('title')?.invalid && documentDownloadForm.get('title')?.touched" class="text-danger">
                                    Title is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="DocumentDownload-description" id="label-DocumentDownload-description">Description</label>
                                <textarea id="DocumentDownload-description" formControlName="description" placeholder="Enter Description" class="form-control document-download-input" [disabled]="!userIsCommunityDocumentDownloadWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('filePath')">
                                <label for="DocumentDownload-filePath" id="label-DocumentDownload-filePath"><span class="text-danger">*</span>File Path</label>
                                <textarea id="DocumentDownload-filePath" formControlName="filePath" placeholder="Enter File Path" class="form-control document-download-input" [disabled]="!userIsCommunityDocumentDownloadWriter()"></textarea>
                                <div *ngIf="documentDownloadForm.get('filePath')?.invalid && documentDownloadForm.get('filePath')?.touched" class="text-danger">
                                    File Path is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('fileName')">
                                <label for="DocumentDownload-fileName" id="label-DocumentDownload-fileName"><span class="text-danger">*</span>File Name</label>
                                <input type="text" id="DocumentDownload-fileName" formControlName="fileName" placeholder="Enter File Name" class="form-control document-download-input" [disabled]="!userIsCommunityDocumentDownloadWriter()" aria-labelledby="label-fileName" />
                                <div *ngIf="documentDownloadForm.get('fileName')?.invalid && documentDownloadForm.get('fileName')?.touched" class="text-danger">
                                    File Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('mimeType')">
                                <label for="DocumentDownload-mimeType" id="label-DocumentDownload-mimeType">Mime Type</label>
                                <input type="text" id="DocumentDownload-mimeType" formControlName="mimeType" placeholder="Enter Mime Type" class="form-control document-download-input" [disabled]="!userIsCommunityDocumentDownloadWriter()" aria-labelledby="label-mimeType" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('fileSizeBytes')">
                                <label for="DocumentDownload-fileSizeBytes" id="label-DocumentDownload-fileSizeBytes">File Size Bytes</label>
                                <input type="number" id="DocumentDownload-fileSizeBytes" formControlName="fileSizeBytes" placeholder="Enter File Size Bytes" class="form-control document-download-input" [disabled]="!userIsCommunityDocumentDownloadWriter()" aria-labelledby="label-fileSizeBytes" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('categoryName')">
                                <label for="DocumentDownload-categoryName" id="label-DocumentDownload-categoryName">Category Name</label>
                                <input type="text" id="DocumentDownload-categoryName" formControlName="categoryName" placeholder="Enter Category Name" class="form-control document-download-input" [disabled]="!userIsCommunityDocumentDownloadWriter()" aria-labelledby="label-categoryName" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('documentDate')">
                                <label for="DocumentDownload-documentDate" id="label-DocumentDownload-documentDate">Document Date</label>
                                <input type="datetime-local" id="DocumentDownload-documentDate" formControlName="documentDate" placeholder="Enter Document Date" class="form-control document-download-input" [disabled]="!userIsCommunityDocumentDownloadWriter()" aria-labelledby="label-documentDate" />
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isPublished')">
                                <input type="checkbox" id="DocumentDownload-isPublished" formControlName="isPublished" class="form-check-input" [disabled]="!userIsCommunityDocumentDownloadWriter()" />
                                <label for="DocumentDownload-isPublished" class="form-check-label" id="label-DocumentDownload-isPublished"><span class="text-danger">*</span>Is Published</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="DocumentDownload-sequence" id="label-DocumentDownload-sequence">Sequence</label>
                                <input type="number" id="DocumentDownload-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control document-download-input" [disabled]="!userIsCommunityDocumentDownloadWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="DocumentDownload-active" formControlName="active" class="form-check-input" [disabled]="!userIsCommunityDocumentDownloadWriter()" />
                                <label for="DocumentDownload-active" class="form-check-label" id="label-DocumentDownload-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="DocumentDownload-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsCommunityDocumentDownloadWriter()" />
                                <label for="DocumentDownload-deleted" class="form-check-label" id="label-DocumentDownload-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="document-download-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="documentDownloadForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Document Download">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !documentDownloadForm.valid || !documentDownloadForm.dirty || documentDownloadForm.pristine  || userIsCommunityDocumentDownloadWriter() == false " ngbTooltip="Save the Document Download changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Document Download' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
