<div class="add-document-download" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-document-download me-2"
        (click)="openModal()"
        ngbTooltip="Add Document Download" 
        *ngIf="userIsCommunityDocumentDownloadWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #documentDownloadModal let-modal>
   <div class="modal-header document-download-modal-header">
      <h5 class="modal-title mb-0" id="documentDownloadModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Document Download' : 'Add Document Download' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body document-download-modal-body">
      <form [formGroup]="documentDownloadForm" (ngSubmit)="submitForm()">
         <div class="modal-footer document-download-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Document Download changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !documentDownloadForm.valid || documentDownloadForm.pristine  || userIsCommunityDocumentDownloadWriter() == false " ngbTooltip="Save the Document Download changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Document Download' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
