<div class="container-fluid p-1 m-0 announcement-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="announcement-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Announcement Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Announcement Change History' : 'Add Announcement Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsCommunityAnnouncementChangeHistoryReader()">
                <div class="col m-2 announcement-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="announcementChangeHistoryForm" (ngSubmit)="submitForm()" class="announcement-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('announcementId')">
                                <label for="AnnouncementChangeHistory-announcementId" id="label-AnnouncementChangeHistory-announcementId"><span class="text-danger">*</span>Announcement</label>
                                <select id="AnnouncementChangeHistory-announcementId" formControlName="announcementId" class="form-select announcement-change-history-select" [disabled]="!userIsCommunityAnnouncementChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Announcement</option>
                                    <option *ngFor="let announcement of announcements$ | async" [ngValue]="announcement.id">{{announcement.title}}</option>
                                </select>
                                <div *ngIf="announcementChangeHistoryForm.get('announcementId')?.invalid && announcementChangeHistoryForm.get('announcementId')?.touched" class="text-danger">
                                    Announcement is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="AnnouncementChangeHistory-versionNumber" id="label-AnnouncementChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="AnnouncementChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control announcement-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="AnnouncementChangeHistory-timeStamp" id="label-AnnouncementChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="AnnouncementChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control announcement-change-history-input" [disabled]="!userIsCommunityAnnouncementChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="announcementChangeHistoryForm.get('timeStamp')?.invalid && announcementChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="AnnouncementChangeHistory-userId" id="label-AnnouncementChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="AnnouncementChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control announcement-change-history-input" [disabled]="!userIsCommunityAnnouncementChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="announcementChangeHistoryForm.get('userId')?.invalid && announcementChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="AnnouncementChangeHistory-data" id="label-AnnouncementChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="AnnouncementChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control announcement-change-history-input" [disabled]="!userIsCommunityAnnouncementChangeHistoryWriter()"></textarea>
                                <div *ngIf="announcementChangeHistoryForm.get('data')?.invalid && announcementChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="announcement-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="announcementChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Announcement Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !announcementChangeHistoryForm.valid || !announcementChangeHistoryForm.dirty || announcementChangeHistoryForm.pristine  || userIsCommunityAnnouncementChangeHistoryWriter() == false " ngbTooltip="Save the Announcement Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Announcement Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
