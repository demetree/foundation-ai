<footer class="site-footer">
  <div class="footer-inner">

    <!-- Brand -->
    <div class="footer-brand">
      <a routerLink="/" class="footer-logo">
        <i class="bi bi-water"></i>
        <span>{{ siteName }}</span>
      </a>
      <p class="footer-tagline">A community built on heritage, shaped by nature.</p>
    </div>

    <!-- Quick Links -->
    <div class="footer-links" *ngIf="footerMenuItems.length > 0">
      <h4>Quick Links</h4>
      <a *ngFor="let item of footerMenuItems" [routerLink]="getItemUrl(item)">
        {{ item.label }}
      </a>
    </div>

    <!-- Contact -->
    <div class="footer-contact">
      <h4>Get in Touch</h4>
      <a routerLink="/contact">
        <i class="bi bi-envelope me-2"></i>Contact Us
      </a>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="footer-bottom">
    <span>{{ footerText }}</span>
  </div>
</footer>
