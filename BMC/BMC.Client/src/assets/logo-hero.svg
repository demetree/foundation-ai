<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <defs>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Single isometric 1x1 brick — shorter with ring stud -->
  <g transform="translate(60, 32)" filter="url(#softShadow)">
    <path d="M0,-20 L34,0 L0,20 L-34,0 Z" fill="#2B3A42" stroke="#1A1A1A" stroke-width="0.5"/>
    <path d="M-34,0 L0,20 L0,36 L-34,16 Z" fill="#1F2A30"/>
    <path d="M34,0 L0,20 L0,36 L34,16 Z" fill="#36454F"/>
    <ellipse cx="0" cy="-6" rx="10" ry="6" fill="none" stroke="#FF5722" stroke-width="1.5"/>
  </g>
</svg>
