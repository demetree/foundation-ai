<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="120" height="120">
  <defs>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="studGloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFAB91;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FF5722;stop-opacity:0" />
    </linearGradient>
  </defs>

  <g transform="translate(100, 100)" filter="url(#softShadow)">
    <!-- Base (2x4) -->
    <path d="M-16,8 L0,16 L16,8 L0,0 Z" fill="#2B3A42" stroke="#1A1A1A" stroke-width="0.5"/>
    <path d="M-16,8 L0,16 L0,28.8 L-16,20.8 Z" fill="#1F2A30"/>
    <path d="M16,8 L0,16 L0,28.8 L16,20.8 Z" fill="#36454F"/>

    <!-- Middle (2x2 on left) -->
    <g transform="translate(-8, -9.6)">
      <path d="M-8,4 L0,8 L8,4 L0,0 Z" fill="#2B3A42" stroke="#1A1A1A" stroke-width="0.5"/>
      <path d="M-8,4 L0,8 L0,19.2 L-8,15.2 Z" fill="#1F2A30"/>
      <path d="M8,4 L0,8 L0,19.2 L8,15.2 Z" fill="#36454F"/>
    </g>

    <!-- Top (2x2 on top of middle) -->
    <g transform="translate(-8, -19.2)">
      <path d="M-8,4 L0,8 L8,4 L0,0 Z" fill="#2B3A42" stroke="#1A1A1A" stroke-width="0.5"/>
      <path d="M-8,4 L0,8 L0,19.2 L-8,15.2 Z" fill="#1F2A30"/>
      <path d="M8,4 L0,8 L0,19.2 L8,15.2 Z" fill="#36454F"/>

      <!-- Stud with gloss -->
      <ellipse cx="0" cy="4" rx="2.4" ry="1.6" fill="#FF5722"/>
      <ellipse cx="0" cy="3.2" rx="1.6" ry="0.8" fill="url(#studGloss)" opacity="0.6"/>
    </g>
  </g>
</svg>
