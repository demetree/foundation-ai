<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 36" height="32">
  <defs>
    <style>
      .brick-top { fill: #2B3A42; }
      .brick-left { fill: #1F2A30; }
      .brick-right { fill: #36454F; }
      .stud { fill: none; stroke: #FF5722; stroke-width: 1; }
      .bmc-text {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 18px;
        fill: #2B3A42;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <!-- Single isometric 1x1 brick — shorter with ring stud -->
  <g transform="translate(18, 8)">
    <path class="brick-top" d="M0,-8 L12,0 L0,8 L-12,0 Z"/>
    <path class="brick-left" d="M-12,0 L0,8 L0,14 L-12,6 Z"/>
    <path class="brick-right" d="M12,0 L0,8 L0,14 L12,6 Z"/>
    <ellipse class="stud" cx="0" cy="-3" rx="4" ry="2.5"/>
  </g>

  <!-- Text: BMC -->
  <text x="38" y="23" class="bmc-text">BMC</text>
</svg>
