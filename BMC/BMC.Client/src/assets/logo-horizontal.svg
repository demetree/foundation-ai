<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 40" height="32">
  <defs>
    <style>
      .brick { fill: #2B3A42; stroke: #1A1A1A; stroke-width: 0.5; stroke-linejoin: round; }
      .stud { fill: #FF5722; }
      .bmc-text {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 18px;
        fill: #2B3A42;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <!-- Isometric Brick Stack (Left side) -->
  <g transform="translate(20, 20)">
    <!-- BASE: 2x4 Brick (Bottom) -->
    <path class="brick" d="M-8,4 L0,8 L8,4 L0,0 Z" fill="#2B3A42"/>
    <path class="brick" d="M-8,4 L0,8 L0,14.4 L-8,10.4 Z" fill="#1F2A30"/>
    <path class="brick" d="M8,4 L0,8 L0,14.4 L8,10.4 Z" fill="#36454F"/>

    <!-- Studs on Base -->
    <ellipse class="stud" cx="-4" cy="4" rx="1.2" ry="0.8"/>
    <ellipse class="stud" cx="4" cy="4" rx="1.2" ry="0.8"/>

    <!-- MIDDLE: 2x2 Brick (Left side, stacked) -->
    <g transform="translate(-4, -4.8)">
      <path class="brick" d="M-4,2 L0,4 L4,2 L0,0 Z" fill="#2B3A42"/>
      <path class="brick" d="M-4,2 L0,4 L0,9.6 L-4,7.6 Z" fill="#1F2A30"/>
      <path class="brick" d="M4,2 L0,4 L0,9.6 L4,7.6 Z" fill="#36454F"/>
      <ellipse class="stud" cx="0" cy="2" rx="1.2" ry="0.8"/>
    </g>

    <!-- TOP: 2x2 Brick (Stepped up on top of middle) -->
    <g transform="translate(-4, -9.6)">
      <path class="brick" d="M-4,2 L0,4 L4,2 L0,0 Z" fill="#2B3A42"/>
      <path class="brick" d="M-4,2 L0,4 L0,9.6 L-4,7.6 Z" fill="#1F2A30"/>
      <path class="brick" d="M4,2 L0,4 L0,9.6 L4,7.6 Z" fill="#36454F"/>
      <ellipse class="stud" cx="0" cy="2" rx="1.2" ry="0.8"/>
    </g>
  </g>

  <!-- Text: BMC -->
  <text x="45" y="26" class="bmc-text">BMC</text>
</svg>
