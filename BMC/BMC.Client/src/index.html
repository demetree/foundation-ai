<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>BMC — Brick Machine Construction</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Open Graph -->
    <meta property="og:type" content="website">

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap"
        rel="stylesheet">

    <style>
        /* ================================================================
       Pre-Bootstrap Loading Screen — Isometric Auto-Build Loader
       Theme-aware via --pbl-* CSS custom properties.
       ================================================================ */

        :root {
            --pbl-bg-start: #f5f5f0;
            --pbl-bg-mid: #eeeee8;
            --pbl-border: rgba(0, 0, 0, 0.08);
            --pbl-brand-1: #E3000B;
            --pbl-brand-2: #006CB7;
            --pbl-brand-3: #FFCD03;
            --pbl-glass-bg: rgba(255, 255, 255, 0.8);
            --pbl-glass-border: rgba(0, 0, 0, 0.08);
            --pbl-glow: rgba(227, 0, 11, 0.08);
            --pbl-spinner: #E3000B;
            --pbl-spinner-faint: rgba(227, 0, 11, 0.3);
            --pbl-brick-face: #E3000B;
            --pbl-brick-shadow: #b80009;
            --pbl-brick-light: #ff4d55;
            --pbl-brick-stroke: rgba(0, 0, 0, 0.15);
            --pbl-stud: #FFCD03;
        }

        #pre-bootstrap {
            background: linear-gradient(135deg, var(--pbl-bg-start) 0%, var(--pbl-bg-mid) 35%, var(--pbl-bg-start) 100%);
            bottom: 0;
            left: 0;
            position: fixed;
            right: 0;
            top: 0;
            z-index: 999999;
        }

        #pre-bootstrap div.pre-load-navbar-simulator {
            background: linear-gradient(135deg, var(--pbl-bg-start) 0%, var(--pbl-bg-mid) 100%);
            border-bottom: 1px solid var(--pbl-border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            font-family: 'Montserrat', 'Inter', system-ui, -apple-system, sans-serif;
            font-size: 20px;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            height: 56px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pre-bootstrap .navbar-brand {
            background: linear-gradient(135deg, var(--pbl-brand-1) 0%, var(--pbl-brand-2) 50%, var(--pbl-brand-3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.08em;
        }

        #pre-bootstrap div.messaging {
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            position: absolute;
            top: 56px;
            left: 0;
            width: 100%;
            height: calc(100% - 56px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .cs-loader-container {
            background: var(--pbl-glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--pbl-glass-border);
            border-radius: 24px;
            padding: 48px 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 40px var(--pbl-glow);
        }

        /* ─── Animated SVG Brick Loader ─────────────────────────────── */
        .bmc-loader {
            width: 100px;
            height: 100px;
            position: relative;
        }

        .bmc-loader svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* SVG face fills — driven by the theme palette */
        .svg-brick-top    { fill: var(--pbl-brick-face); }
        .svg-brick-left   { fill: var(--pbl-brick-shadow); }
        .svg-brick-right  { fill: var(--pbl-brick-light); }

        .svg-brick-stroke { fill: var(--pbl-brick-stroke); }

        /* Spinning ring around the loader */
        .bmc-loader-ring {
            position: absolute;
            inset: -10px;
            border: 2px solid transparent;
            border-top-color: var(--pbl-spinner);
            border-right-color: var(--pbl-spinner-faint);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .cs-loading-text {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .cs-loading-text::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        /* ─── Keyframes ──────────────────────────────────────────────── */
        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes dots {
            0%, 20%  { content: ''; }
            40%      { content: '.'; }
            60%      { content: '..'; }
            80%, 100% { content: '...'; }
        }

        /* ─── Accessibility ──────────────────────────────────────────── */
        @media (prefers-reduced-motion: reduce) {

            .bmc-loader svg *,
            .bmc-loader-ring {
                animation: none !important;
            }

            .cs-loading-text::after {
                animation: none;
                content: '...';
            }
        }
    </style>

    <!-- Theme-aware pre-bootstrap: set CSS custom props before Angular loads -->

            var palettes = {

                },
                'matrix': {
                    '--pbl-bg-start': '#0a0a0a', '--pbl-bg-mid': '#0d1a0d',
                    '--pbl-border': 'rgba(0, 255, 65, 0.12)',
                    '--pbl-brand-1': '#00cc33', '--pbl-brand-2': '#009926', '--pbl-brand-3': '#33ff77',

                    '--pbl-glass-border': 'rgba(0, 255, 65, 0.2)',

                    '--pbl-spinner': '#00ff41', '--pbl-spinner-faint': 'rgba(0, 255, 65, 0.3)',

                    '--pbl-brand-1': '#fcee09', '--pbl-brand-2': '#e0d500', '--pbl-brand-3': '#fff9a0',
                    '--pbl-glass-bg': 'rgba(12, 12, 12, 0.55)',
                    '--pbl-glass-border': 'rgba(252, 238, 9, 0.2)',
                    '--pbl-glow': 'rgba(252, 238, 9, 0.08)',
                    '--pbl-spinner': '#fcee09', '--pbl-spinner-faint': 'rgba(252, 238, 9, 0.3)',
                    '--pbl-brick-face': '#5A5040', '--pbl-brick-shadow': '#403828',
                    '--pbl-brick-light': '#6A6050', '--pbl-brick-stroke': 'rgba(0, 0, 0, 0.3)',

                },
                'retro-arcade': {

                    '--pbl-brand-1': '#ff00ff', '--pbl-brand-2': '#cc00cc', '--pbl-brand-3': '#00e5ff',
                    '--pbl-glass-bg': 'rgba(5, 5, 5, 0.55)',

                    '--pbl-stud': '#ec407a'

            };
            var palette = palettes[theme];
            if (palette) {
                var root = document.documentElement;
                for (var key in palette) {
                    if (palette.hasOwnProperty(key)) {
                        root.style.setProperty(key, palette[key]);
                    }
                }
            }
        })();
    </script>
</head>

<body class="pre-login-background no-select">
    <app-root>
        <div id="pre-bootstrap">
            <div class="pre-load-navbar-simulator">
                <span class="navbar-brand">BMC</span>
            </div>
            <div class="messaging">
                <div class="cs-loader-container">
                    <!-- Animated Isometric Brick Loader (SVG + SMIL) -->
                    <div class="bmc-loader" role="status" aria-label="Loading BMC">

                        <!--
                            Isometric 2×4 LEGO brick built from three faces + two studs.
                            Coordinate system: viewBox centres the brick; each face
                            slides in from its natural direction and the whole group
                            fades out at the end of the 3 s cycle then repeats.

                            dur=3s  |  0-0.5 s  left face slides in
                                    |  0.2-0.7  right face slides in
                                    |  0.3-0.8  top face drops down
                                    |  0.8-1.2  studs pop
                                    |  1.2-2.2  hold assembled
                                    |  2.2-3.0  fade out + slight shrink
                        -->
                        <svg viewBox="-10 -10 120 120" xmlns="http://www.w3.org/2000/svg">
                            <!-- ── Whole-brick group (used for the end-of-cycle fade) ── -->
                            <g>
                                <animate attributeName="opacity"
                                         values="1;1;1;0;0;1"
                                         keyTimes="0;0.40;0.73;0.87;0.93;1"
                                         dur="3s" repeatCount="indefinite" />

                                <!-- Left face — slides in from left -->
                                <polygon class="svg-brick-left"
                                         points="0,40 50,70 50,100 0,70">
                                    <animate attributeName="opacity"
                                             values="0;1;1" keyTimes="0;0.17;1"
                                             dur="3s" repeatCount="indefinite" />
                                    <animateTransform attributeName="transform" type="translate"
                                                      values="-30,0;0,0;0,0" keyTimes="0;0.17;1"
                                                      dur="3s" repeatCount="indefinite"
                                                      calcMode="spline"
                                                      keySplines="0.25 0.46 0.45 0.94;0 0 1 1" />
                                </polygon>

                                <!-- Right face — slides in from right -->
                                <polygon class="svg-brick-right"
                                         points="50,70 100,40 100,70 50,100">
                                    <animate attributeName="opacity"
                                             values="0;0;1;1" keyTimes="0;0.07;0.23;1"
                                             dur="3s" repeatCount="indefinite" />
                                    <animateTransform attributeName="transform" type="translate"
                                                      values="30,0;30,0;0,0;0,0" keyTimes="0;0.07;0.23;1"
                                                      dur="3s" repeatCount="indefinite"
                                                      calcMode="spline"
                                                      keySplines="0 0 1 1;0.25 0.46 0.45 0.94;0 0 1 1" />
                                </polygon>

                                <!-- Top face (diamond) — drops down from above -->
                                <polygon class="svg-brick-top"
                                         points="50,10 100,40 50,70 0,40">
                                    <animate attributeName="opacity"
                                             values="0;0;1;1" keyTimes="0;0.10;0.27;1"
                                             dur="3s" repeatCount="indefinite" />
                                    <animateTransform attributeName="transform" type="translate"
                                                      values="0,-35;0,-35;0,0;0,0" keyTimes="0;0.10;0.27;1"
                                                      dur="3s" repeatCount="indefinite"
                                                      calcMode="spline"
                                                      keySplines="0 0 1 1;0.25 0.46 0.45 0.94;0 0 1 1" />
                                </polygon>

                                <!-- Edge highlights (thin strokes for depth) -->
                                <line x1="50" y1="70" x2="50" y2="100"
                                      stroke="var(--pbl-brick-stroke)" stroke-width="1" opacity="0">
                                    <animate attributeName="opacity"
                                             values="0;0;0.6;0.6" keyTimes="0;0.23;0.30;1"
                                             dur="3s" repeatCount="indefinite" />
                                </line>

                            </g>
                        </svg>

                        <div class="bmc-loader-ring"></div>
                    </div>
                    <span class="cs-loading-text">Constructing</span>
                </div>
            </div>
        </div>
    </app-root>
    <noscript>
        <div style="font-family:Inter,system-ui,sans-serif;max-width:800px;margin:0 auto;padding:2rem;color:#333;">
            <h1 style="color:#E3000B;font-size:2.5rem;margin-bottom:0.5rem;">BMC — Brick Machine Construction</h1>
            <p style="font-size:1.15rem;color:#555;margin-bottom:2rem;">Design, simulate, and build with virtual bricks.
                Explore 79,000+ parts, browse thousands of LEGO sets, generate step-by-step build manuals,
                and manage your entire collection — all in your browser.</p>

            <h2 style="color:#E3000B;">Features</h2>
            <ul style="line-height:2;">
                <li><strong>Parts Catalog</strong> — Browse and search 79,000+ LEGO parts with high-resolution renders
                    in multiple colours</li>
                <li><strong>Part Renderer</strong> — Real-time 3D rendering with software rasterization and ray tracing
                </li>
                <li><strong>Manual Generator</strong> — Produce step-by-step build instructions as PDF or HTML from any
                    project</li>
                <li><strong>Set Explorer</strong> — Search, filter, and compare every LEGO set ever made, spanning
                    decades of history</li>
                <li><strong>Theme Browser</strong> — Explore sets organized by theme and decade, from the 1940s to today
                </li>
                <li><strong>Minifig Gallery</strong> — Browse the complete catalogue of LEGO minifigures</li>
                <li><strong>Collection Manager</strong> — Track the sets you own, build a wishlist, and manage your
                    parts inventory</li>
                <li><strong>AI Assistant</strong> — Intelligent natural-language search for parts and sets</li>
                <li><strong>10 Visual Themes</strong> — Brick Builder, Miami Vice, Matrix, Cyberpunk, Retro Arcade,
                    Blueprint, Pastel Dreams, and more</li>
            </ul>

            <h2 style="color:#E3000B;">Explore by Decade</h2>
            <p>From 1949 to today — the complete evolution of LEGO. Browse sets and themes organized by decade
                and discover how LEGO has grown from a small Danish workshop to a global phenomenon.</p>

            <h2 style="color:#E3000B;">Public API</h2>
            <p>BMC exposes anonymous read-only endpoints for aggregate statistics, featured sets, recent additions,
                decade analysis, and random set discovery at <code>/api/public/</code>.</p>

            <p style="margin-top:2rem;"><a href="/login" style="color:#E3000B;font-weight:600;">Sign in to BMC →</a></p>
            <p style="color:#999;font-size:0.85rem;">BMC requires JavaScript for the full interactive experience.
                Please enable JavaScript in your browser to use the application.</p>
        </div>
    </noscript>
</body>

</html>
