<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>BMC — Brick Machine Construction</title>
    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="BMC — Brick Machine Construction: Design, simulate, and build with virtual bricks.">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap"
        rel="stylesheet">

    <style>
        /* ================================================================
       Pre-Bootstrap Loading Screen — Isometric Auto-Build Loader
       Theme-aware via --pbl-* CSS custom properties.
       ================================================================ */

        :root {
            --pbl-bg-start: #1a1005;
            --pbl-bg-mid: #2d1a08;
            --pbl-border: rgba(255, 167, 38, 0.12);
            --pbl-brand-1: #ffa726;
            --pbl-brand-2: #ff8f00;
            --pbl-brand-3: #ffb74d;
            --pbl-glass-bg: rgba(255, 167, 38, 0.04);
            --pbl-glass-border: rgba(255, 167, 38, 0.1);
            --pbl-glow: rgba(255, 167, 38, 0.06);
            --pbl-spinner: #ffa726;
            --pbl-spinner-faint: rgba(255, 167, 38, 0.3);
            --pbl-brick-face: #4A5D6A;
            --pbl-brick-shadow: #354550;
            --pbl-brick-light: #5A7080;
            --pbl-brick-stroke: rgba(0, 0, 0, 0.3);
            --pbl-stud: #FF5722;
        }

        #pre-bootstrap {
            background: linear-gradient(135deg, var(--pbl-bg-start) 0%, var(--pbl-bg-mid) 35%, var(--pbl-bg-start) 100%);
            bottom: 0;
            left: 0;
            position: fixed;
            right: 0;
            top: 0;
            z-index: 999999;
        }

        #pre-bootstrap div.pre-load-navbar-simulator {
            background: linear-gradient(135deg, var(--pbl-bg-start) 0%, var(--pbl-bg-mid) 100%);
            border-bottom: 1px solid var(--pbl-border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            font-family: 'Montserrat', 'Inter', system-ui, -apple-system, sans-serif;
            font-size: 20px;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            height: 56px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pre-bootstrap .navbar-brand {
            background: linear-gradient(135deg, var(--pbl-brand-1) 0%, var(--pbl-brand-2) 50%, var(--pbl-brand-3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.08em;
        }

        #pre-bootstrap div.messaging {
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            position: absolute;
            top: 56px;
            left: 0;
            width: 100%;
            height: calc(100% - 56px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .cs-loader-container {
            background: var(--pbl-glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--pbl-glass-border);
            border-radius: 24px;
            padding: 48px 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 40px var(--pbl-glow);
        }

        /* ─── Single Isometric Brick Loader ──────────────────────────── */
        .bmc-loader {
            width: 80px;
            height: 80px;
            position: relative;
            animation: cycle 2.5s infinite;
        }

        /* Single brick body — isometric diamond top + side faces */
        .brick-body {
            position: absolute;
            width: 60px;
            height: 50px;
            left: 50%;
            margin-left: -30px;
            top: 14px;
            opacity: 0;
            animation: brickDrop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        /* Top diamond face */
        .brick-body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 50%;
            top: 0;
            background: var(--pbl-brick-face);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        /* Left side face */
        .brick-body::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 56%;
            top: 50%;
            left: 0;
            background: var(--pbl-brick-shadow);
            clip-path: polygon(0% 0%, 100% -7%, 100% 100%, 0% 64%);
            transform: translateY(-3px);
        }

        /* Right side face via the stud-host element */
        .brick-right-face {
            position: absolute;
            width: 50%;
            height: 56%;
            top: 50%;
            right: 0;
            background: var(--pbl-brick-light);
            clip-path: polygon(0% -7%, 100% 0%, 100% 64%, 0% 100%);
            transform: translateY(-3px);
            opacity: 0;
            animation: brickDrop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        /* Accent stud — pops on after brick lands */
        .brick-stud {
            position: absolute;
            width: 16px;
            height: 10px;
            background: var(--pbl-stud);
            border-radius: 50%;
            left: 50%;
            margin-left: -8px;
            top: 16px;
            opacity: 0;
            animation: studPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards;
        }

        /* Spinning ring around the loader */
        .bmc-loader-ring {
            position: absolute;
            inset: -10px;
            border: 2px solid transparent;
            border-top-color: var(--pbl-spinner);
            border-right-color: var(--pbl-spinner-faint);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .cs-loading-text {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .cs-loading-text::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        /* ─── Keyframes ──────────────────────────────────────────────── */
        @keyframes brickDrop {
            0% {
                transform: translateY(-40px) scale(0.8);
                opacity: 0;
            }

            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes studPop {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes dots {

            0%,
            20% {
                content: '';
            }

            40% {
                content: '.';
            }

            60% {
                content: '..';
            }

            80%,
            100% {
                content: '...';
            }
        }

        @keyframes cycle {

            0%,
            60% {
                opacity: 1;
                transform: scale(1);
            }

            70%,
            85% {
                opacity: 0;
                transform: scale(0.9);
            }

            90%,
            100% {
                opacity: 0;
                transform: scale(1);
            }
        }

        /* ─── Accessibility ──────────────────────────────────────────── */
        @media (prefers-reduced-motion: reduce) {

            .bmc-loader,
            .bmc-loader-ring,
            .brick-body,
            .brick-right-face,
            .brick-stud {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
            }

            .cs-loading-text::after {
                animation: none;
                content: '...';
            }
        }
    </style>

    <!-- Theme-aware pre-bootstrap: set CSS custom props before Angular loads -->
    <script>
        (function () {
            var theme = localStorage.getItem('bmc-theme') || 'default';
            var palettes = {
                'miami-vice': {
                    '--pbl-bg-start': '#1a0a2e', '--pbl-bg-mid': '#2d1b4e',
                    '--pbl-border': 'rgba(255, 110, 199, 0.15)',
                    '--pbl-brand-1': '#ff6ec7', '--pbl-brand-2': '#e040fb', '--pbl-brand-3': '#ffab40',
                    '--pbl-glass-bg': 'rgba(26, 10, 46, 0.65)',
                    '--pbl-glass-border': 'rgba(255, 110, 199, 0.25)',
                    '--pbl-glow': 'rgba(255, 110, 199, 0.12)',
                    '--pbl-spinner': '#ff6ec7', '--pbl-spinner-faint': 'rgba(255, 110, 199, 0.3)',
                    '--pbl-brick-face': '#5A4A6A', '--pbl-brick-shadow': '#453558',
                    '--pbl-brick-light': '#6A5A7A', '--pbl-brick-stroke': 'rgba(0, 0, 0, 0.3)',
                    '--pbl-stud': '#ff6ec7'
                },
                'matrix': {
                    '--pbl-bg-start': '#0a0a0a', '--pbl-bg-mid': '#0d1a0d',
                    '--pbl-border': 'rgba(0, 255, 65, 0.12)',
                    '--pbl-brand-1': '#00cc33', '--pbl-brand-2': '#009926', '--pbl-brand-3': '#33ff77',
                    '--pbl-glass-bg': 'rgba(10, 10, 10, 0.7)',
                    '--pbl-glass-border': 'rgba(0, 255, 65, 0.2)',
                    '--pbl-glow': 'rgba(0, 255, 65, 0.06)',
                    '--pbl-spinner': '#00ff41', '--pbl-spinner-faint': 'rgba(0, 255, 65, 0.3)',
                    '--pbl-brick-face': '#3A5A3A', '--pbl-brick-shadow': '#2A4A2A',
                    '--pbl-brick-light': '#4A6A4A', '--pbl-brick-stroke': 'rgba(0, 0, 0, 0.3)',
                    '--pbl-stud': '#00ff41'
                }
            };
            var palette = palettes[theme];
            if (palette) {
                var root = document.documentElement;
                for (var key in palette) {
                    if (palette.hasOwnProperty(key)) {
                        root.style.setProperty(key, palette[key]);
                    }
                }
            }
        })();
    </script>
</head>

<body class="pre-login-background no-select">
    <app-root>
        <div id="pre-bootstrap">
            <div class="pre-load-navbar-simulator">
                <span class="navbar-brand">BMC</span>
            </div>
            <div class="messaging">
                <div class="cs-loader-container">
                    <div class="bmc-loader" role="status" aria-label="Loading BMC">
                        <div class="brick-body"></div>
                        <div class="brick-right-face"></div>
                        <div class="brick-stud"></div>
                        <div class="bmc-loader-ring"></div>
                    </div>
                    <span class="cs-loading-text">Constructing</span>
                </div>
            </div>
        </div>
    </app-root>
</body>

</html>
