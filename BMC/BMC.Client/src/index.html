<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>BMC — Brick Machine Construction</title>
    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="BMC — Brick Machine Construction: Design, simulate, and build with virtual bricks.">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        /* ================================================================
       Pre-Bootstrap Loading Screen — Theme-Aware
       Reads bmc-theme from localStorage to match the active theme.
       ================================================================ */

        :root {
            --pbl-bg-start: #1a1005;
            --pbl-bg-mid: #2d1a08;
            --pbl-border: rgba(255, 167, 38, 0.12);
            --pbl-brand-1: #ffa726;
            --pbl-brand-2: #ff8f00;
            --pbl-brand-3: #ffb74d;
            --pbl-brick-1a: #e65100;
            --pbl-brick-1b: #ff6d00;
            --pbl-brick-2a: #ff8f00;
            --pbl-brick-2b: #ffa726;
            --pbl-brick-3a: #ffb74d;
            --pbl-brick-3b: #ffcc02;
            --pbl-glass-bg: rgba(255, 167, 38, 0.04);
            --pbl-glass-border: rgba(255, 167, 38, 0.1);
            --pbl-glow: rgba(255, 167, 38, 0.06);
            --pbl-spinner: #ffa726;
            --pbl-spinner-faint: rgba(255, 167, 38, 0.3);
        }

        #pre-bootstrap {
            background: linear-gradient(135deg, var(--pbl-bg-start) 0%, var(--pbl-bg-mid) 35%, var(--pbl-bg-start) 100%);
            bottom: 0;
            left: 0;
            position: fixed;
            right: 0;
            top: 0;
            z-index: 999999;
        }

        #pre-bootstrap div.pre-load-navbar-simulator {
            background: linear-gradient(135deg, var(--pbl-bg-start) 0%, var(--pbl-bg-mid) 100%);
            border-bottom: 1px solid var(--pbl-border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-size: 20px;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            height: 56px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pre-bootstrap .navbar-brand {
            background: linear-gradient(135deg, var(--pbl-brand-1) 0%, var(--pbl-brand-2) 50%, var(--pbl-brand-3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.08em;
        }

        #pre-bootstrap div.messaging {
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            position: absolute;
            top: 56px;
            left: 0;
            width: 100%;
            height: calc(100% - 56px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .cs-loader-container {
            background: var(--pbl-glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--pbl-glass-border);
            border-radius: 24px;
            padding: 48px 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 40px var(--pbl-glow);
        }

        /* Brick icon assembly animation */
        .cs-loader {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .cs-brick-stack {
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: pulse-brick 2s ease-in-out infinite;
        }

        .cs-brick {
            width: 56px;
            height: 18px;
            border-radius: 4px;
            position: relative;
        }

        .cs-brick-1 {
            background: linear-gradient(135deg, var(--pbl-brick-1a), var(--pbl-brick-1b));
            animation: slide-in 0.6s ease-out both;
            animation-delay: 0.3s;
        }

        .cs-brick-2 {
            background: linear-gradient(135deg, var(--pbl-brick-2a), var(--pbl-brick-2b));
            width: 48px;
            margin-left: 8px;
            animation: slide-in 0.6s ease-out both;
            animation-delay: 0.6s;
        }

        .cs-brick-3 {
            background: linear-gradient(135deg, var(--pbl-brick-3a), var(--pbl-brick-3b));
            animation: slide-in 0.6s ease-out both;
            animation-delay: 0.9s;
        }

        /* Studs on top brick */
        .cs-brick-3::before,
        .cs-brick-3::after {
            content: '';
            position: absolute;
            top: -5px;
            width: 8px;
            height: 5px;
            border-radius: 3px 3px 0 0;
            background: inherit;
            filter: brightness(1.1);
        }

        .cs-brick-3::before {
            left: 12px;
        }

        .cs-brick-3::after {
            right: 12px;
        }

        /* Spinning ring */
        .cs-loader::before {
            content: '';
            position: absolute;
            width: 96px;
            height: 96px;
            border: 2px solid transparent;
            border-top-color: var(--pbl-spinner);
            border-right-color: var(--pbl-spinner-faint);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .cs-loading-text {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .cs-loading-text::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes dots {

            0%,
            20% {
                content: '';
            }

            40% {
                content: '.';
            }

            60% {
                content: '..';
            }

            80%,
            100% {
                content: '...';
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse-brick {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.04);
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .cs-brick-stack,
            .cs-brick-1,
            .cs-brick-2,
            .cs-brick-3 {
                animation: none;
                opacity: 1;
                transform: none;
            }

            .cs-loader::before {
                animation: none;
                border-color: var(--pbl-spinner-faint);
            }

            .cs-loading-text::after {
                animation: none;
                content: '...';
            }
        }
    </style>

    <!-- Theme-aware pre-bootstrap: set CSS custom props before Angular loads -->
    <script>
        (function () {
            var theme = localStorage.getItem('bmc-theme') || 'default';
            var palettes = {
                'miami-vice': {
                    '--pbl-bg-start': '#1a0a2e', '--pbl-bg-mid': '#2d1b4e',
                    '--pbl-border': 'rgba(255, 110, 199, 0.15)',
                    '--pbl-brand-1': '#ff6ec7', '--pbl-brand-2': '#e040fb', '--pbl-brand-3': '#ffab40',
                    '--pbl-brick-1a': '#ff6ec7', '--pbl-brick-1b': '#e040fb',
                    '--pbl-brick-2a': '#ff8a00', '--pbl-brick-2b': '#ffab40',
                    '--pbl-brick-3a': '#00e5ff', '--pbl-brick-3b': '#00bcd4',
                    '--pbl-glass-bg': 'rgba(26, 10, 46, 0.65)',
                    '--pbl-glass-border': 'rgba(255, 110, 199, 0.25)',
                    '--pbl-glow': 'rgba(255, 110, 199, 0.12)',
                    '--pbl-spinner': '#ff6ec7', '--pbl-spinner-faint': 'rgba(255, 110, 199, 0.3)'
                },
                'matrix': {
                    '--pbl-bg-start': '#0a0a0a', '--pbl-bg-mid': '#0d1a0d',
                    '--pbl-border': 'rgba(0, 255, 65, 0.12)',
                    '--pbl-brand-1': '#00cc33', '--pbl-brand-2': '#009926', '--pbl-brand-3': '#33ff77',
                    '--pbl-brick-1a': '#009926', '--pbl-brick-1b': '#00cc33',
                    '--pbl-brick-2a': '#00cc33', '--pbl-brick-2b': '#00ff41',
                    '--pbl-brick-3a': '#33ff77', '--pbl-brick-3b': '#b5ffcc',
                    '--pbl-glass-bg': 'rgba(10, 10, 10, 0.7)',
                    '--pbl-glass-border': 'rgba(0, 255, 65, 0.2)',
                    '--pbl-glow': 'rgba(0, 255, 65, 0.06)',
                    '--pbl-spinner': '#00ff41', '--pbl-spinner-faint': 'rgba(0, 255, 65, 0.3)'
                }
            };
            var palette = palettes[theme];
            if (palette) {
                var root = document.documentElement;
                for (var key in palette) {
                    if (palette.hasOwnProperty(key)) {
                        root.style.setProperty(key, palette[key]);
                    }
                }
            }
        })();
    </script>
</head>

<body class="pre-login-background no-select">
    <app-root>
        <div id="pre-bootstrap">
            <div class="pre-load-navbar-simulator">
                <span class="navbar-brand">BMC</span>
            </div>
            <div class="messaging">
                <div class="cs-loader-container">
                    <div class="cs-loader">
                        <div class="cs-brick-stack">
                            <div class="cs-brick cs-brick-1"></div>
                            <div class="cs-brick cs-brick-2"></div>
                            <div class="cs-brick cs-brick-3"></div>
                        </div>
                    </div>
                    <span class="cs-loading-text">Constructing</span>
                </div>
            </div>
        </div>
    </app-root>
</body>

</html>
