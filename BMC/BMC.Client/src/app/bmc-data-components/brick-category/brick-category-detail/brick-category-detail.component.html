<div class="container-fluid p-1 m-0 brick-category-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="brick-category-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Brick Category</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Brick Category' : 'Add Brick Category'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCBrickCategoryReader()">
                <div class="col m-2 brick-category-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="brickCategoryForm" (ngSubmit)="submitForm()" class="brick-category-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="BrickCategory-name" id="label-BrickCategory-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="BrickCategory-name" formControlName="name" placeholder="Enter Name" class="form-control brick-category-input" [disabled]="!userIsBMCBrickCategoryWriter()" aria-labelledby="label-name" />
                                <div *ngIf="brickCategoryForm.get('name')?.invalid && brickCategoryForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="BrickCategory-description" id="label-BrickCategory-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="BrickCategory-description" formControlName="description" placeholder="Enter Description" class="form-control brick-category-input" [disabled]="!userIsBMCBrickCategoryWriter()"></textarea>
                                <div *ngIf="brickCategoryForm.get('description')?.invalid && brickCategoryForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="BrickCategory-sequence" id="label-BrickCategory-sequence">Sequence</label>
                                <input type="number" id="BrickCategory-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control brick-category-input" [disabled]="!userIsBMCBrickCategoryWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BrickCategory-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCBrickCategoryWriter()" />
                                <label for="BrickCategory-active" class="form-check-label" id="label-BrickCategory-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BrickCategory-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCBrickCategoryWriter()" />
                                <label for="BrickCategory-deleted" class="form-check-label" id="label-BrickCategory-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="brick-category-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="brickCategoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Brick Category">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !brickCategoryForm.valid || !brickCategoryForm.dirty || brickCategoryForm.pristine  || userIsBMCBrickCategoryWriter() == false " ngbTooltip="Save the Brick Category changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Brick Category' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCBrickCategoryReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 brick-category-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="brickPartService.userIsBMCBrickPartReader()">
                            <button ngbNavLink>Brick Parts
                                <span class="badge bg-primary ms-2">
                                    {{ (brickCategoryData?.BrickPartsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-brick-part-table [queryParams]="{ brickCategoryId: brickCategoryData?.id }"></app-brick-part-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-brick-part-add-edit [preSeededData]="{ brickCategoryId: brickCategoryData?.id }" [hiddenFields]="['brickCategoryId']"></app-brick-part-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
