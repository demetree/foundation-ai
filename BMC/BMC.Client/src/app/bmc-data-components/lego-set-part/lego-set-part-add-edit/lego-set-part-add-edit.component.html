<div class="add-lego-set-part" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-lego-set-part me-2"
        (click)="openModal()"
        ngbTooltip="Add Lego Set Part" 
        *ngIf="userIsBMCLegoSetPartWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #legoSetPartModal let-modal>
   <div class="modal-header lego-set-part-modal-header">
      <h5 class="modal-title mb-0" id="legoSetPartModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Lego Set Part' : 'Add Lego Set Part' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body lego-set-part-modal-body">
      <form [formGroup]="legoSetPartForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('legoSetId')">
                <label for="LegoSetPart-legoSetId" id="label-LegoSetPart-legoSetId"><span class="text-danger">*</span>Lego Set</label>
                <select id="LegoSetPart-legoSetId" formControlName="legoSetId" class="form-select lego-set-part-select" [disabled]="!userIsBMCLegoSetPartWriter()">
                    <option [ngValue]="null">Select Lego Set</option>
                    <option *ngFor="let legoSet of legoSets$ | async" [ngValue]="legoSet.id">{{legoSet.name}}</option>
                </select>
                <div *ngIf="legoSetPartForm.get('legoSetId')?.invalid && legoSetPartForm.get('legoSetId')?.touched" class="text-danger">
                    Lego Set is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('brickPartId')">
                <label for="LegoSetPart-brickPartId" id="label-LegoSetPart-brickPartId"><span class="text-danger">*</span>Brick Part</label>
                <select id="LegoSetPart-brickPartId" formControlName="brickPartId" class="form-select lego-set-part-select" [disabled]="!userIsBMCLegoSetPartWriter()">
                    <option [ngValue]="null">Select Brick Part</option>
                    <option *ngFor="let brickPart of brickParts$ | async" [ngValue]="brickPart.id">{{brickPart.name}}</option>
                </select>
                <div *ngIf="legoSetPartForm.get('brickPartId')?.invalid && legoSetPartForm.get('brickPartId')?.touched" class="text-danger">
                    Brick Part is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('brickColourId')">
                <label for="LegoSetPart-brickColourId" id="label-LegoSetPart-brickColourId"><span class="text-danger">*</span>Brick Colour</label>
                <select id="LegoSetPart-brickColourId" formControlName="brickColourId" class="form-select lego-set-part-select" [disabled]="!userIsBMCLegoSetPartWriter()">
                    <option [ngValue]="null">Select Brick Colour</option>
                    <option *ngFor="let brickColour of brickColours$ | async" [ngValue]="brickColour.id">{{brickColour.name}}</option>
                </select>
                <div *ngIf="legoSetPartForm.get('brickColourId')?.invalid && legoSetPartForm.get('brickColourId')?.touched" class="text-danger">
                    Brick Colour is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('quantity')">
                <label for="LegoSetPart-quantity" id="label-LegoSetPart-quantity">Quantity</label>
                <input type="number" id="LegoSetPart-quantity" formControlName="quantity" placeholder="Enter Quantity" class="form-control lego-set-part-input" [disabled]="!userIsBMCLegoSetPartWriter()" aria-labelledby="label-quantity" />
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('isSpare')">
                <input type="checkbox" id="LegoSetPart-isSpare" formControlName="isSpare" class="form-check-input" [disabled]="!userIsBMCLegoSetPartWriter()" />
                <label for="LegoSetPart-isSpare" class="form-check-label" id="label-LegoSetPart-isSpare"><span class="text-danger">*</span>Is Spare</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="LegoSetPart-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCLegoSetPartWriter()" />
                <label for="LegoSetPart-active" class="form-check-label" id="label-LegoSetPart-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="LegoSetPart-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCLegoSetPartWriter()" />
                <label for="LegoSetPart-deleted" class="form-check-label" id="label-LegoSetPart-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer lego-set-part-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Lego Set Part changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !legoSetPartForm.valid || legoSetPartForm.pristine  || userIsBMCLegoSetPartWriter() == false " ngbTooltip="Save the Lego Set Part changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Lego Set Part' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
