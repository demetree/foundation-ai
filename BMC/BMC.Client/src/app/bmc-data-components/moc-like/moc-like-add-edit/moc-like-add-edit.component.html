<div class="add-moc-like" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-moc-like me-2"
        (click)="openModal()"
        ngbTooltip="Add Moc Like" 
        *ngIf="userIsBMCMocLikeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #mocLikeModal let-modal>
   <div class="modal-header bg-dark text-light moc-like-modal-header">
      <h5 class="modal-title mb-0" id="mocLikeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Moc Like' : 'Add Moc Like' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body moc-like-modal-body">
      <form [formGroup]="mocLikeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('publishedMocId')">
                <label for="MocLike-publishedMocId" id="label-MocLike-publishedMocId"><span class="text-danger">*</span>Published Moc</label>
                <select id="MocLike-publishedMocId" formControlName="publishedMocId" class="form-select moc-like-select" [disabled]="!userIsBMCMocLikeWriter()">
                    <option [ngValue]="null">Select Published Moc</option>
                    <option *ngFor="let publishedMoc of publishedMocs$ | async" [ngValue]="publishedMoc.id">{{publishedMoc.name}}</option>
                </select>
                <div *ngIf="mocLikeForm.get('publishedMocId')?.invalid && mocLikeForm.get('publishedMocId')?.touched" class="text-danger">
                    Published Moc is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('likerTenantGuid')">
                <label for="MocLike-likerTenantGuid" id="label-MocLike-likerTenantGuid"><span class="text-danger">*</span>Liker Tenant Guid</label>
                <input type="text" id="MocLike-likerTenantGuid" formControlName="likerTenantGuid" placeholder="Enter Liker Tenant Guid" class="form-control moc-like-input" [disabled]="!userIsBMCMocLikeWriter()" aria-labelledby="label-likerTenantGuid" />
                <div *ngIf="mocLikeForm.get('likerTenantGuid')?.invalid && mocLikeForm.get('likerTenantGuid')?.touched" class="text-danger">
                    Liker Tenant Guid is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('likedDate')">
                <label for="MocLike-likedDate" id="label-MocLike-likedDate"><span class="text-danger">*</span>Liked Date</label>
                <input type="datetime-local" id="MocLike-likedDate" formControlName="likedDate" placeholder="Enter Liked Date" class="form-control moc-like-input" [disabled]="!userIsBMCMocLikeWriter()" aria-labelledby="label-likedDate" />
                <div *ngIf="mocLikeForm.get('likedDate')?.invalid && mocLikeForm.get('likedDate')?.touched" class="text-danger">
                    Liked Date is required
                </div>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="MocLike-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCMocLikeWriter()" />
                <label for="MocLike-active" class="form-check-label" id="label-MocLike-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="MocLike-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCMocLikeWriter()" />
                <label for="MocLike-deleted" class="form-check-label" id="label-MocLike-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer moc-like-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Moc Like changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !mocLikeForm.valid || mocLikeForm.pristine  || userIsBMCMocLikeWriter() == false " ngbTooltip="Save the Moc Like changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Moc Like' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
