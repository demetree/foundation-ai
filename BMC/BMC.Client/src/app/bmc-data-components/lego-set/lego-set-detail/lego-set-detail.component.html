<div class="container-fluid p-1 m-0 lego-set-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="lego-set-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Lego Set</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Lego Set' : 'Add Lego Set'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCLegoSetReader()">
                <div class="col m-2 lego-set-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="legoSetForm" (ngSubmit)="submitForm()" class="lego-set-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="LegoSet-name" id="label-LegoSet-name"><span class="text-danger">*</span>Name</label>
                                <textarea id="LegoSet-name" formControlName="name" placeholder="Enter Name" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()"></textarea>
                                <div *ngIf="legoSetForm.get('name')?.invalid && legoSetForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('setNumber')">
                                <label for="LegoSet-setNumber" id="label-LegoSet-setNumber"><span class="text-danger">*</span>Set Number</label>
                                <input type="text" id="LegoSet-setNumber" formControlName="setNumber" placeholder="Enter Set Number" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-setNumber" />
                                <div *ngIf="legoSetForm.get('setNumber')?.invalid && legoSetForm.get('setNumber')?.touched" class="text-danger">
                                    Set Number is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('year')">
                                <label for="LegoSet-year" id="label-LegoSet-year"><span class="text-danger">*</span>Year</label>
                                <input type="number" id="LegoSet-year" formControlName="year" placeholder="Enter Year" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-year" />
                                <div *ngIf="legoSetForm.get('year')?.invalid && legoSetForm.get('year')?.touched" class="text-danger">
                                    Year is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('partCount')">
                                <label for="LegoSet-partCount" id="label-LegoSet-partCount"><span class="text-danger">*</span>Part Count</label>
                                <input type="number" id="LegoSet-partCount" formControlName="partCount" placeholder="Enter Part Count" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-partCount" />
                                <div *ngIf="legoSetForm.get('partCount')?.invalid && legoSetForm.get('partCount')?.touched" class="text-danger">
                                    Part Count is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('legoThemeId')">
                                <label for="LegoSet-legoThemeId" id="label-LegoSet-legoThemeId">Lego Theme</label>
                                <select id="LegoSet-legoThemeId" formControlName="legoThemeId" class="form-select lego-set-select" [disabled]="!userIsBMCLegoSetWriter()">
                                    <option [ngValue]="null">Select Lego Theme</option>
                                    <option *ngFor="let legoTheme of legoThemes$ | async" [ngValue]="legoTheme.id">{{legoTheme.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('imageUrl')">
                                <label for="LegoSet-imageUrl" id="label-LegoSet-imageUrl">Image Url</label>
                                <input type="text" id="LegoSet-imageUrl" formControlName="imageUrl" placeholder="Enter Image Url" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-imageUrl" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('brickLinkUrl')">
                                <label for="LegoSet-brickLinkUrl" id="label-LegoSet-brickLinkUrl">Brick Link Url</label>
                                <input type="text" id="LegoSet-brickLinkUrl" formControlName="brickLinkUrl" placeholder="Enter Brick Link Url" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-brickLinkUrl" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('rebrickableUrl')">
                                <label for="LegoSet-rebrickableUrl" id="label-LegoSet-rebrickableUrl">Rebrickable Url</label>
                                <input type="text" id="LegoSet-rebrickableUrl" formControlName="rebrickableUrl" placeholder="Enter Rebrickable Url" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-rebrickableUrl" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('rebrickableSetNum')">
                                <label for="LegoSet-rebrickableSetNum" id="label-LegoSet-rebrickableSetNum">Rebrickable Set Num</label>
                                <input type="text" id="LegoSet-rebrickableSetNum" formControlName="rebrickableSetNum" placeholder="Enter Rebrickable Set Num" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-rebrickableSetNum" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('lastModifiedDate')">
                                <label for="LegoSet-lastModifiedDate" id="label-LegoSet-lastModifiedDate">Last Modified Date</label>
                                <input type="datetime-local" id="LegoSet-lastModifiedDate" formControlName="lastModifiedDate" placeholder="Enter Last Modified Date" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-lastModifiedDate" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('brickSetId')">
                                <label for="LegoSet-brickSetId" id="label-LegoSet-brickSetId">Brick Set Id</label>
                                <input type="number" id="LegoSet-brickSetId" formControlName="brickSetId" placeholder="Enter Brick Set Id" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-brickSetId" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('brickSetUrl')">
                                <label for="LegoSet-brickSetUrl" id="label-LegoSet-brickSetUrl">Brick Set Url</label>
                                <input type="text" id="LegoSet-brickSetUrl" formControlName="brickSetUrl" placeholder="Enter Brick Set Url" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-brickSetUrl" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('retailPriceUS')">
                                <label for="LegoSet-retailPriceUS" id="label-LegoSet-retailPriceUS">Retail Price U S</label>
                                <input type="number" id="LegoSet-retailPriceUS" formControlName="retailPriceUS" placeholder="Enter Retail Price U S" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-retailPriceUS" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('retailPriceUK')">
                                <label for="LegoSet-retailPriceUK" id="label-LegoSet-retailPriceUK">Retail Price U K</label>
                                <input type="number" id="LegoSet-retailPriceUK" formControlName="retailPriceUK" placeholder="Enter Retail Price U K" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-retailPriceUK" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('retailPriceCA')">
                                <label for="LegoSet-retailPriceCA" id="label-LegoSet-retailPriceCA">Retail Price C A</label>
                                <input type="number" id="LegoSet-retailPriceCA" formControlName="retailPriceCA" placeholder="Enter Retail Price C A" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-retailPriceCA" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('retailPriceEU')">
                                <label for="LegoSet-retailPriceEU" id="label-LegoSet-retailPriceEU">Retail Price E U</label>
                                <input type="number" id="LegoSet-retailPriceEU" formControlName="retailPriceEU" placeholder="Enter Retail Price E U" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-retailPriceEU" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('instructionsUrl')">
                                <label for="LegoSet-instructionsUrl" id="label-LegoSet-instructionsUrl">Instructions Url</label>
                                <textarea id="LegoSet-instructionsUrl" formControlName="instructionsUrl" placeholder="Enter Instructions Url" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('subtheme')">
                                <label for="LegoSet-subtheme" id="label-LegoSet-subtheme">Subtheme</label>
                                <input type="text" id="LegoSet-subtheme" formControlName="subtheme" placeholder="Enter Subtheme" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-subtheme" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('availability')">
                                <label for="LegoSet-availability" id="label-LegoSet-availability">Availability</label>
                                <input type="text" id="LegoSet-availability" formControlName="availability" placeholder="Enter Availability" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-availability" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('minifigCount')">
                                <label for="LegoSet-minifigCount" id="label-LegoSet-minifigCount">Minifig Count</label>
                                <input type="number" id="LegoSet-minifigCount" formControlName="minifigCount" placeholder="Enter Minifig Count" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-minifigCount" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('brickSetRating')">
                                <label for="LegoSet-brickSetRating" id="label-LegoSet-brickSetRating">Brick Set Rating</label>
                                <input type="number" id="LegoSet-brickSetRating" formControlName="brickSetRating" placeholder="Enter Brick Set Rating" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-brickSetRating" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('brickSetReviewCount')">
                                <label for="LegoSet-brickSetReviewCount" id="label-LegoSet-brickSetReviewCount">Brick Set Review Count</label>
                                <input type="number" id="LegoSet-brickSetReviewCount" formControlName="brickSetReviewCount" placeholder="Enter Brick Set Review Count" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-brickSetReviewCount" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('brickSetLastEnrichedDate')">
                                <label for="LegoSet-brickSetLastEnrichedDate" id="label-LegoSet-brickSetLastEnrichedDate">Brick Set Last Enriched Date</label>
                                <input type="datetime-local" id="LegoSet-brickSetLastEnrichedDate" formControlName="brickSetLastEnrichedDate" placeholder="Enter Brick Set Last Enriched Date" class="form-control lego-set-input" [disabled]="!userIsBMCLegoSetWriter()" aria-labelledby="label-brickSetLastEnrichedDate" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="LegoSet-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCLegoSetWriter()" />
                                <label for="LegoSet-active" class="form-check-label" id="label-LegoSet-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="LegoSet-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCLegoSetWriter()" />
                                <label for="LegoSet-deleted" class="form-check-label" id="label-LegoSet-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="lego-set-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="legoSetForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Lego Set">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !legoSetForm.valid || !legoSetForm.dirty || legoSetForm.pristine  || userIsBMCLegoSetWriter() == false " ngbTooltip="Save the Lego Set changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Lego Set' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCLegoSetReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 lego-set-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="legoSetPartService.userIsBMCLegoSetPartReader()">
                            <button ngbNavLink>Lego Set Parts
                                <span class="badge bg-primary ms-2">
                                    {{ (legoSetData?.LegoSetPartsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-lego-set-part-table [queryParams]="{ legoSetId: legoSetData?.id }" [showAddButton]="true" [preSeededData]="{ legoSetId: legoSetData?.id }" [hiddenFields]="['legoSetId']"></app-lego-set-part-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="legoSetMinifigService.userIsBMCLegoSetMinifigReader()">
                            <button ngbNavLink>Lego Set Minifigs
                                <span class="badge bg-primary ms-2">
                                    {{ (legoSetData?.LegoSetMinifigsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-lego-set-minifig-table [queryParams]="{ legoSetId: legoSetData?.id }" [showAddButton]="true" [preSeededData]="{ legoSetId: legoSetData?.id }" [hiddenFields]="['legoSetId']"></app-lego-set-minifig-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="legoSetSubsetService.userIsBMCLegoSetSubsetReader()">
                            <button ngbNavLink>Lego Set Subsets Parent Lego Sets
                                <span class="badge bg-primary ms-2">
                                    {{ (legoSetData?.LegoSetSubsetParentLegoSetsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-lego-set-subset-table [queryParams]="{ parentLegoSetId: legoSetData?.id }" [showAddButton]="true" [preSeededData]="{ parentLegoSetId: legoSetData?.id }" [hiddenFields]="['parentLegoSetId']"></app-lego-set-subset-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="legoSetSubsetService.userIsBMCLegoSetSubsetReader()">
                            <button ngbNavLink>Lego Set Subsets Child Lego Sets
                                <span class="badge bg-primary ms-2">
                                    {{ (legoSetData?.LegoSetSubsetChildLegoSetsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-lego-set-subset-table [queryParams]="{ childLegoSetId: legoSetData?.id }" [showAddButton]="true" [preSeededData]="{ childLegoSetId: legoSetData?.id }" [hiddenFields]="['childLegoSetId']"></app-lego-set-subset-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userCollectionSetImportService.userIsBMCUserCollectionSetImportReader()">
                            <button ngbNavLink>User Collection Set Imports
                                <span class="badge bg-primary ms-2">
                                    {{ (legoSetData?.UserCollectionSetImportsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-collection-set-import-table [queryParams]="{ legoSetId: legoSetData?.id }" [showAddButton]="true" [preSeededData]="{ legoSetId: legoSetData?.id }" [hiddenFields]="['legoSetId']"></app-user-collection-set-import-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="brickSetSetReviewService.userIsBMCBrickSetSetReviewReader()">
                            <button ngbNavLink>Brick Set Set Reviews
                                <span class="badge bg-primary ms-2">
                                    {{ (legoSetData?.BrickSetSetReviewsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-brick-set-set-review-table [queryParams]="{ legoSetId: legoSetData?.id }" [showAddButton]="true" [preSeededData]="{ legoSetId: legoSetData?.id }" [hiddenFields]="['legoSetId']"></app-brick-set-set-review-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userSetListItemService.userIsBMCUserSetListItemReader()">
                            <button ngbNavLink>User Set List Items
                                <span class="badge bg-primary ms-2">
                                    {{ (legoSetData?.UserSetListItemsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-set-list-item-table [queryParams]="{ legoSetId: legoSetData?.id }" [showAddButton]="true" [preSeededData]="{ legoSetId: legoSetData?.id }" [hiddenFields]="['legoSetId']"></app-user-set-list-item-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userLostPartService.userIsBMCUserLostPartReader()">
                            <button ngbNavLink>User Lost Parts
                                <span class="badge bg-primary ms-2">
                                    {{ (legoSetData?.UserLostPartsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-lost-part-table [queryParams]="{ legoSetId: legoSetData?.id }" [showAddButton]="true" [preSeededData]="{ legoSetId: legoSetData?.id }" [hiddenFields]="['legoSetId']"></app-user-lost-part-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userSetOwnershipService.userIsBMCUserSetOwnershipReader()">
                            <button ngbNavLink>User Set Ownerships
                                <span class="badge bg-primary ms-2">
                                    {{ (legoSetData?.UserSetOwnershipsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-set-ownership-table [queryParams]="{ legoSetId: legoSetData?.id }" [showAddButton]="true" [preSeededData]="{ legoSetId: legoSetData?.id }" [hiddenFields]="['legoSetId']"></app-user-set-ownership-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
