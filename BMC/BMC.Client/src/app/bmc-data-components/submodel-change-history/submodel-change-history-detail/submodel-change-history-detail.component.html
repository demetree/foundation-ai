<div class="container-fluid p-1 m-0 submodel-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="submodel-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Submodel Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Submodel Change History' : 'Add Submodel Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCSubmodelChangeHistoryReader()">
                <div class="col m-2 submodel-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="submodelChangeHistoryForm" (ngSubmit)="submitForm()" class="submodel-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('submodelId')">
                                <label for="SubmodelChangeHistory-submodelId" id="label-SubmodelChangeHistory-submodelId"><span class="text-danger">*</span>Submodel</label>
                                <select id="SubmodelChangeHistory-submodelId" formControlName="submodelId" class="form-select submodel-change-history-select" [disabled]="!userIsBMCSubmodelChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Submodel</option>
                                    <option *ngFor="let submodel of submodels$ | async" [ngValue]="submodel.id">{{submodel.name}}</option>
                                </select>
                                <div *ngIf="submodelChangeHistoryForm.get('submodelId')?.invalid && submodelChangeHistoryForm.get('submodelId')?.touched" class="text-danger">
                                    Submodel is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="SubmodelChangeHistory-versionNumber" id="label-SubmodelChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="SubmodelChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control submodel-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="SubmodelChangeHistory-timeStamp" id="label-SubmodelChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="SubmodelChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control submodel-change-history-input" [disabled]="!userIsBMCSubmodelChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="submodelChangeHistoryForm.get('timeStamp')?.invalid && submodelChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="SubmodelChangeHistory-userId" id="label-SubmodelChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="SubmodelChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control submodel-change-history-input" [disabled]="!userIsBMCSubmodelChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="submodelChangeHistoryForm.get('userId')?.invalid && submodelChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="SubmodelChangeHistory-data" id="label-SubmodelChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="SubmodelChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control submodel-change-history-input" [disabled]="!userIsBMCSubmodelChangeHistoryWriter()"></textarea>
                                <div *ngIf="submodelChangeHistoryForm.get('data')?.invalid && submodelChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="submodel-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="submodelChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Submodel Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !submodelChangeHistoryForm.valid || !submodelChangeHistoryForm.dirty || submodelChangeHistoryForm.pristine  || userIsBMCSubmodelChangeHistoryWriter() == false " ngbTooltip="Save the Submodel Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Submodel Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
