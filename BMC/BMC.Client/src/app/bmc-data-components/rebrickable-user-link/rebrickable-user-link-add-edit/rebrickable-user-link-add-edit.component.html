<div class="add-rebrickable-user-link" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-rebrickable-user-link me-2"
        (click)="openModal()"
        ngbTooltip="Add Rebrickable User Link" 
        *ngIf="userIsBMCRebrickableUserLinkWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #rebrickableUserLinkModal let-modal>
   <div class="modal-header rebrickable-user-link-modal-header">
      <h5 class="modal-title mb-0" id="rebrickableUserLinkModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Rebrickable User Link' : 'Add Rebrickable User Link' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body rebrickable-user-link-modal-body">
      <form [formGroup]="rebrickableUserLinkForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('rebrickableUsername')">
                <label for="RebrickableUserLink-rebrickableUsername" id="label-RebrickableUserLink-rebrickableUsername"><span class="text-danger">*</span>Rebrickable Username</label>
                <input type="text" id="RebrickableUserLink-rebrickableUsername" formControlName="rebrickableUsername" placeholder="Enter Rebrickable Username" class="form-control rebrickable-user-link-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()" aria-labelledby="label-rebrickableUsername" />
                <div *ngIf="rebrickableUserLinkForm.get('rebrickableUsername')?.invalid && rebrickableUserLinkForm.get('rebrickableUsername')?.touched" class="text-danger">
                    Rebrickable Username is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('encryptedApiToken')">
                <label for="RebrickableUserLink-encryptedApiToken" id="label-RebrickableUserLink-encryptedApiToken"><span class="text-danger">*</span>Encrypted Api Token</label>
                <textarea id="RebrickableUserLink-encryptedApiToken" formControlName="encryptedApiToken" placeholder="Enter Encrypted Api Token" class="form-control rebrickable-user-link-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()"></textarea>
                <div *ngIf="rebrickableUserLinkForm.get('encryptedApiToken')?.invalid && rebrickableUserLinkForm.get('encryptedApiToken')?.touched" class="text-danger">
                    Encrypted Api Token is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('authMode')">
                <label for="RebrickableUserLink-authMode" id="label-RebrickableUserLink-authMode"><span class="text-danger">*</span>Auth Mode</label>
                <input type="text" id="RebrickableUserLink-authMode" formControlName="authMode" placeholder="Enter Auth Mode" class="form-control rebrickable-user-link-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()" aria-labelledby="label-authMode" />
                <div *ngIf="rebrickableUserLinkForm.get('authMode')?.invalid && rebrickableUserLinkForm.get('authMode')?.touched" class="text-danger">
                    Auth Mode is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('encryptedPassword')">
                <label for="RebrickableUserLink-encryptedPassword" id="label-RebrickableUserLink-encryptedPassword">Encrypted Password</label>
                <textarea id="RebrickableUserLink-encryptedPassword" formControlName="encryptedPassword" placeholder="Enter Encrypted Password" class="form-control rebrickable-user-link-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('syncEnabled')">
                <input type="checkbox" id="RebrickableUserLink-syncEnabled" formControlName="syncEnabled" class="form-check-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()" />
                <label for="RebrickableUserLink-syncEnabled" class="form-check-label" id="label-RebrickableUserLink-syncEnabled"><span class="text-danger">*</span>Sync Enabled</label>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('syncDirectionFlags')">
                <label for="RebrickableUserLink-syncDirectionFlags" id="label-RebrickableUserLink-syncDirectionFlags"><span class="text-danger">*</span>Sync Direction Flags</label>
                <input type="text" id="RebrickableUserLink-syncDirectionFlags" formControlName="syncDirectionFlags" placeholder="Enter Sync Direction Flags" class="form-control rebrickable-user-link-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()" aria-labelledby="label-syncDirectionFlags" />
                <div *ngIf="rebrickableUserLinkForm.get('syncDirectionFlags')?.invalid && rebrickableUserLinkForm.get('syncDirectionFlags')?.touched" class="text-danger">
                    Sync Direction Flags is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('pullIntervalMinutes')">
                <label for="RebrickableUserLink-pullIntervalMinutes" id="label-RebrickableUserLink-pullIntervalMinutes">Pull Interval Minutes</label>
                <input type="number" id="RebrickableUserLink-pullIntervalMinutes" formControlName="pullIntervalMinutes" placeholder="Enter Pull Interval Minutes" class="form-control rebrickable-user-link-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()" aria-labelledby="label-pullIntervalMinutes" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('lastSyncDate')">
                <label for="RebrickableUserLink-lastSyncDate" id="label-RebrickableUserLink-lastSyncDate">Last Sync Date</label>
                <input type="datetime-local" id="RebrickableUserLink-lastSyncDate" formControlName="lastSyncDate" placeholder="Enter Last Sync Date" class="form-control rebrickable-user-link-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()" aria-labelledby="label-lastSyncDate" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('lastPullDate')">
                <label for="RebrickableUserLink-lastPullDate" id="label-RebrickableUserLink-lastPullDate">Last Pull Date</label>
                <input type="datetime-local" id="RebrickableUserLink-lastPullDate" formControlName="lastPullDate" placeholder="Enter Last Pull Date" class="form-control rebrickable-user-link-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()" aria-labelledby="label-lastPullDate" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('lastPushDate')">
                <label for="RebrickableUserLink-lastPushDate" id="label-RebrickableUserLink-lastPushDate">Last Push Date</label>
                <input type="datetime-local" id="RebrickableUserLink-lastPushDate" formControlName="lastPushDate" placeholder="Enter Last Push Date" class="form-control rebrickable-user-link-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()" aria-labelledby="label-lastPushDate" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('lastSyncError')">
                <label for="RebrickableUserLink-lastSyncError" id="label-RebrickableUserLink-lastSyncError">Last Sync Error</label>
                <textarea id="RebrickableUserLink-lastSyncError" formControlName="lastSyncError" placeholder="Enter Last Sync Error" class="form-control rebrickable-user-link-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('tokenExpiryDays')">
                <label for="RebrickableUserLink-tokenExpiryDays" id="label-RebrickableUserLink-tokenExpiryDays">Token Expiry Days</label>
                <input type="number" id="RebrickableUserLink-tokenExpiryDays" formControlName="tokenExpiryDays" placeholder="Enter Token Expiry Days" class="form-control rebrickable-user-link-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()" aria-labelledby="label-tokenExpiryDays" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('tokenStoredDate')">
                <label for="RebrickableUserLink-tokenStoredDate" id="label-RebrickableUserLink-tokenStoredDate">Token Stored Date</label>
                <input type="datetime-local" id="RebrickableUserLink-tokenStoredDate" formControlName="tokenStoredDate" placeholder="Enter Token Stored Date" class="form-control rebrickable-user-link-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()" aria-labelledby="label-tokenStoredDate" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="RebrickableUserLink-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()" />
                <label for="RebrickableUserLink-active" class="form-check-label" id="label-RebrickableUserLink-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="RebrickableUserLink-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCRebrickableUserLinkWriter()" />
                <label for="RebrickableUserLink-deleted" class="form-check-label" id="label-RebrickableUserLink-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer rebrickable-user-link-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Rebrickable User Link changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !rebrickableUserLinkForm.valid || rebrickableUserLinkForm.pristine  || userIsBMCRebrickableUserLinkWriter() == false " ngbTooltip="Save the Rebrickable User Link changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Rebrickable User Link' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
