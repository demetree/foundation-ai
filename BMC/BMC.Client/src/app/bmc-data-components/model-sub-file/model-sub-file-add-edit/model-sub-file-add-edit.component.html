<div class="add-model-sub-file" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-model-sub-file me-2"
        (click)="openModal()"
        ngbTooltip="Add Model Sub File" 
        *ngIf="userIsBMCModelSubFileWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #modelSubFileModal let-modal>
   <div class="modal-header model-sub-file-modal-header">
      <h5 class="modal-title mb-0" id="modelSubFileModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Model Sub File' : 'Add Model Sub File' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body model-sub-file-modal-body">
      <form [formGroup]="modelSubFileForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('modelDocumentId')">
                <label for="ModelSubFile-modelDocumentId" id="label-ModelSubFile-modelDocumentId"><span class="text-danger">*</span>Model Document</label>
                <select id="ModelSubFile-modelDocumentId" formControlName="modelDocumentId" class="form-select model-sub-file-select" [disabled]="!userIsBMCModelSubFileWriter()">
                    <option [ngValue]="null">Select Model Document</option>
                    <option *ngFor="let modelDocument of modelDocuments$ | async" [ngValue]="modelDocument.id">{{modelDocument.name}}</option>
                </select>
                <div *ngIf="modelSubFileForm.get('modelDocumentId')?.invalid && modelSubFileForm.get('modelDocumentId')?.touched" class="text-danger">
                    Model Document is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('fileName')">
                <label for="ModelSubFile-fileName" id="label-ModelSubFile-fileName"><span class="text-danger">*</span>File Name</label>
                <input type="text" id="ModelSubFile-fileName" formControlName="fileName" placeholder="Enter File Name" class="form-control model-sub-file-input" [disabled]="!userIsBMCModelSubFileWriter()" aria-labelledby="label-fileName" />
                <div *ngIf="modelSubFileForm.get('fileName')?.invalid && modelSubFileForm.get('fileName')?.touched" class="text-danger">
                    File Name is required
                </div>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('isMainModel')">
                <input type="checkbox" id="ModelSubFile-isMainModel" formControlName="isMainModel" class="form-check-input" [disabled]="!userIsBMCModelSubFileWriter()" />
                <label for="ModelSubFile-isMainModel" class="form-check-label" id="label-ModelSubFile-isMainModel"><span class="text-danger">*</span>Is Main Model</label>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('parentModelSubFileId')">
                <label for="ModelSubFile-parentModelSubFileId" id="label-ModelSubFile-parentModelSubFileId">Parent Model Sub File</label>
                <select id="ModelSubFile-parentModelSubFileId" formControlName="parentModelSubFileId" class="form-select model-sub-file-select" [disabled]="!userIsBMCModelSubFileWriter()">
                    <option [ngValue]="null">Select Model Sub File</option>
                    <option *ngFor="let modelSubFile of modelSubFiles$ | async" [ngValue]="modelSubFile.id">{{modelSubFile.fileName}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="ModelSubFile-sequence" id="label-ModelSubFile-sequence">Sequence</label>
                <input type="number" id="ModelSubFile-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control model-sub-file-input" [disabled]="!userIsBMCModelSubFileWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ModelSubFile-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCModelSubFileWriter()" />
                <label for="ModelSubFile-active" class="form-check-label" id="label-ModelSubFile-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ModelSubFile-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCModelSubFileWriter()" />
                <label for="ModelSubFile-deleted" class="form-check-label" id="label-ModelSubFile-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer model-sub-file-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Model Sub File changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !modelSubFileForm.valid || modelSubFileForm.pristine  || userIsBMCModelSubFileWriter() == false " ngbTooltip="Save the Model Sub File changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Model Sub File' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
