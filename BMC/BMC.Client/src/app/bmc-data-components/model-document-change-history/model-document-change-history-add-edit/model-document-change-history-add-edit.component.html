<div class="add-model-document-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-model-document-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Model Document Change History" 
        *ngIf="userIsBMCModelDocumentChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #modelDocumentChangeHistoryModal let-modal>
   <div class="modal-header model-document-change-history-modal-header">
      <h5 class="modal-title mb-0" id="modelDocumentChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Model Document Change History' : 'Add Model Document Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body model-document-change-history-modal-body">
      <form [formGroup]="modelDocumentChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('modelDocumentId')">
                <label for="ModelDocumentChangeHistory-modelDocumentId" id="label-ModelDocumentChangeHistory-modelDocumentId"><span class="text-danger">*</span>Model Document</label>
                <select id="ModelDocumentChangeHistory-modelDocumentId" formControlName="modelDocumentId" class="form-select model-document-change-history-select" [disabled]="!userIsBMCModelDocumentChangeHistoryWriter()">
                    <option [ngValue]="null">Select Model Document</option>
                    <option *ngFor="let modelDocument of modelDocuments$ | async" [ngValue]="modelDocument.id">{{modelDocument.name}}</option>
                </select>
                <div *ngIf="modelDocumentChangeHistoryForm.get('modelDocumentId')?.invalid && modelDocumentChangeHistoryForm.get('modelDocumentId')?.touched" class="text-danger">
                    Model Document is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ModelDocumentChangeHistory-versionNumber" id="label-ModelDocumentChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ModelDocumentChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control model-document-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="ModelDocumentChangeHistory-timeStamp" id="label-ModelDocumentChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="ModelDocumentChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control model-document-change-history-input" [disabled]="!userIsBMCModelDocumentChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="modelDocumentChangeHistoryForm.get('timeStamp')?.invalid && modelDocumentChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="ModelDocumentChangeHistory-userId" id="label-ModelDocumentChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="ModelDocumentChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control model-document-change-history-input" [disabled]="!userIsBMCModelDocumentChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="modelDocumentChangeHistoryForm.get('userId')?.invalid && modelDocumentChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="ModelDocumentChangeHistory-data" id="label-ModelDocumentChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="ModelDocumentChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control model-document-change-history-input" [disabled]="!userIsBMCModelDocumentChangeHistoryWriter()"></textarea>
                <div *ngIf="modelDocumentChangeHistoryForm.get('data')?.invalid && modelDocumentChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer model-document-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Model Document Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !modelDocumentChangeHistoryForm.valid || modelDocumentChangeHistoryForm.pristine  || userIsBMCModelDocumentChangeHistoryWriter() == false " ngbTooltip="Save the Model Document Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Model Document Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
