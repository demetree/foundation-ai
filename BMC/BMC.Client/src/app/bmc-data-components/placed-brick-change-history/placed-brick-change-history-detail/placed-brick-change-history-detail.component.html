<div class="container-fluid p-1 m-0 placed-brick-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="placed-brick-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Placed Brick Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Placed Brick Change History' : 'Add Placed Brick Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCPlacedBrickChangeHistoryReader()">
                <div class="col m-2 placed-brick-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="placedBrickChangeHistoryForm" (ngSubmit)="submitForm()" class="placed-brick-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('placedBrickId')">
                                <label for="PlacedBrickChangeHistory-placedBrickId" id="label-PlacedBrickChangeHistory-placedBrickId"><span class="text-danger">*</span>Placed Brick</label>
                                <select id="PlacedBrickChangeHistory-placedBrickId" formControlName="placedBrickId" class="form-select placed-brick-change-history-select" [disabled]="!userIsBMCPlacedBrickChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Placed Brick</option>
                                    <option *ngFor="let placedBrick of placedBricks$ | async" [ngValue]="placedBrick.id">{{placedBrick.id}}</option>
                                </select>
                                <div *ngIf="placedBrickChangeHistoryForm.get('placedBrickId')?.invalid && placedBrickChangeHistoryForm.get('placedBrickId')?.touched" class="text-danger">
                                    Placed Brick is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="PlacedBrickChangeHistory-versionNumber" id="label-PlacedBrickChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="PlacedBrickChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control placed-brick-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="PlacedBrickChangeHistory-timeStamp" id="label-PlacedBrickChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="PlacedBrickChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control placed-brick-change-history-input" [disabled]="!userIsBMCPlacedBrickChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="placedBrickChangeHistoryForm.get('timeStamp')?.invalid && placedBrickChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="PlacedBrickChangeHistory-userId" id="label-PlacedBrickChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="PlacedBrickChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control placed-brick-change-history-input" [disabled]="!userIsBMCPlacedBrickChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="placedBrickChangeHistoryForm.get('userId')?.invalid && placedBrickChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="PlacedBrickChangeHistory-data" id="label-PlacedBrickChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="PlacedBrickChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control placed-brick-change-history-input" [disabled]="!userIsBMCPlacedBrickChangeHistoryWriter()"></textarea>
                                <div *ngIf="placedBrickChangeHistoryForm.get('data')?.invalid && placedBrickChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="placed-brick-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="placedBrickChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Placed Brick Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !placedBrickChangeHistoryForm.valid || !placedBrickChangeHistoryForm.dirty || placedBrickChangeHistoryForm.pristine  || userIsBMCPlacedBrickChangeHistoryWriter() == false " ngbTooltip="Save the Placed Brick Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Placed Brick Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
