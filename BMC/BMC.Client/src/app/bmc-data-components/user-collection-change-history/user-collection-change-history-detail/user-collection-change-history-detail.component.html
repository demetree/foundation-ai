<div class="container-fluid p-1 m-0 user-collection-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="user-collection-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">User Collection Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit User Collection Change History' : 'Add User Collection Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCUserCollectionChangeHistoryReader()">
                <div class="col m-2 user-collection-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="userCollectionChangeHistoryForm" (ngSubmit)="submitForm()" class="user-collection-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('userCollectionId')">
                                <label for="UserCollectionChangeHistory-userCollectionId" id="label-UserCollectionChangeHistory-userCollectionId"><span class="text-danger">*</span>User Collection</label>
                                <select id="UserCollectionChangeHistory-userCollectionId" formControlName="userCollectionId" class="form-select user-collection-change-history-select" [disabled]="!userIsBMCUserCollectionChangeHistoryWriter()">
                                    <option [ngValue]="null">Select User Collection</option>
                                    <option *ngFor="let userCollection of userCollections$ | async" [ngValue]="userCollection.id">{{userCollection.name}}</option>
                                </select>
                                <div *ngIf="userCollectionChangeHistoryForm.get('userCollectionId')?.invalid && userCollectionChangeHistoryForm.get('userCollectionId')?.touched" class="text-danger">
                                    User Collection is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="UserCollectionChangeHistory-versionNumber" id="label-UserCollectionChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="UserCollectionChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control user-collection-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="UserCollectionChangeHistory-timeStamp" id="label-UserCollectionChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="UserCollectionChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control user-collection-change-history-input" [disabled]="!userIsBMCUserCollectionChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="userCollectionChangeHistoryForm.get('timeStamp')?.invalid && userCollectionChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="UserCollectionChangeHistory-userId" id="label-UserCollectionChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="UserCollectionChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control user-collection-change-history-input" [disabled]="!userIsBMCUserCollectionChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="userCollectionChangeHistoryForm.get('userId')?.invalid && userCollectionChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="UserCollectionChangeHistory-data" id="label-UserCollectionChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="UserCollectionChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control user-collection-change-history-input" [disabled]="!userIsBMCUserCollectionChangeHistoryWriter()"></textarea>
                                <div *ngIf="userCollectionChangeHistoryForm.get('data')?.invalid && userCollectionChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="user-collection-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="userCollectionChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload User Collection Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !userCollectionChangeHistoryForm.valid || !userCollectionChangeHistoryForm.dirty || userCollectionChangeHistoryForm.pristine  || userIsBMCUserCollectionChangeHistoryWriter() == false " ngbTooltip="Save the User Collection Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add User Collection Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
