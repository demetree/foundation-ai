<div class="add-rebrickable-sync-queue" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-rebrickable-sync-queue me-2"
        (click)="openModal()"
        ngbTooltip="Add Rebrickable Sync Queue" 
        *ngIf="userIsBMCRebrickableSyncQueueWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #rebrickableSyncQueueModal let-modal>
   <div class="modal-header rebrickable-sync-queue-modal-header">
      <h5 class="modal-title mb-0" id="rebrickableSyncQueueModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Rebrickable Sync Queue' : 'Add Rebrickable Sync Queue' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body rebrickable-sync-queue-modal-body">
      <form [formGroup]="rebrickableSyncQueueForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('operationType')">
                <label for="RebrickableSyncQueue-operationType" id="label-RebrickableSyncQueue-operationType"><span class="text-danger">*</span>Operation Type</label>
                <input type="text" id="RebrickableSyncQueue-operationType" formControlName="operationType" placeholder="Enter Operation Type" class="form-control rebrickable-sync-queue-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()" aria-labelledby="label-operationType" />
                <div *ngIf="rebrickableSyncQueueForm.get('operationType')?.invalid && rebrickableSyncQueueForm.get('operationType')?.touched" class="text-danger">
                    Operation Type is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('entityType')">
                <label for="RebrickableSyncQueue-entityType" id="label-RebrickableSyncQueue-entityType"><span class="text-danger">*</span>Entity Type</label>
                <input type="text" id="RebrickableSyncQueue-entityType" formControlName="entityType" placeholder="Enter Entity Type" class="form-control rebrickable-sync-queue-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()" aria-labelledby="label-entityType" />
                <div *ngIf="rebrickableSyncQueueForm.get('entityType')?.invalid && rebrickableSyncQueueForm.get('entityType')?.touched" class="text-danger">
                    Entity Type is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('entityId')">
                <label for="RebrickableSyncQueue-entityId" id="label-RebrickableSyncQueue-entityId"><span class="text-danger">*</span>Entity Id</label>
                <input type="number" id="RebrickableSyncQueue-entityId" formControlName="entityId" placeholder="Enter Entity Id" class="form-control rebrickable-sync-queue-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()" aria-labelledby="label-entityId" />
                <div *ngIf="rebrickableSyncQueueForm.get('entityId')?.invalid && rebrickableSyncQueueForm.get('entityId')?.touched" class="text-danger">
                    Entity Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('payload')">
                <label for="RebrickableSyncQueue-payload" id="label-RebrickableSyncQueue-payload">Payload</label>
                <textarea id="RebrickableSyncQueue-payload" formControlName="payload" placeholder="Enter Payload" class="form-control rebrickable-sync-queue-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('status')">
                <label for="RebrickableSyncQueue-status" id="label-RebrickableSyncQueue-status"><span class="text-danger">*</span>Status</label>
                <input type="text" id="RebrickableSyncQueue-status" formControlName="status" placeholder="Enter Status" class="form-control rebrickable-sync-queue-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()" aria-labelledby="label-status" />
                <div *ngIf="rebrickableSyncQueueForm.get('status')?.invalid && rebrickableSyncQueueForm.get('status')?.touched" class="text-danger">
                    Status is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('createdDate')">
                <label for="RebrickableSyncQueue-createdDate" id="label-RebrickableSyncQueue-createdDate">Created Date</label>
                <input type="datetime-local" id="RebrickableSyncQueue-createdDate" formControlName="createdDate" placeholder="Enter Created Date" class="form-control rebrickable-sync-queue-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()" aria-labelledby="label-createdDate" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('lastAttemptDate')">
                <label for="RebrickableSyncQueue-lastAttemptDate" id="label-RebrickableSyncQueue-lastAttemptDate">Last Attempt Date</label>
                <input type="datetime-local" id="RebrickableSyncQueue-lastAttemptDate" formControlName="lastAttemptDate" placeholder="Enter Last Attempt Date" class="form-control rebrickable-sync-queue-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()" aria-labelledby="label-lastAttemptDate" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('completedDate')">
                <label for="RebrickableSyncQueue-completedDate" id="label-RebrickableSyncQueue-completedDate">Completed Date</label>
                <input type="datetime-local" id="RebrickableSyncQueue-completedDate" formControlName="completedDate" placeholder="Enter Completed Date" class="form-control rebrickable-sync-queue-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()" aria-labelledby="label-completedDate" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('attemptCount')">
                <label for="RebrickableSyncQueue-attemptCount" id="label-RebrickableSyncQueue-attemptCount"><span class="text-danger">*</span>Attempt Count</label>
                <input type="number" id="RebrickableSyncQueue-attemptCount" formControlName="attemptCount" placeholder="Enter Attempt Count" class="form-control rebrickable-sync-queue-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()" aria-labelledby="label-attemptCount" />
                <div *ngIf="rebrickableSyncQueueForm.get('attemptCount')?.invalid && rebrickableSyncQueueForm.get('attemptCount')?.touched" class="text-danger">
                    Attempt Count is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('maxAttempts')">
                <label for="RebrickableSyncQueue-maxAttempts" id="label-RebrickableSyncQueue-maxAttempts"><span class="text-danger">*</span>Max Attempts</label>
                <input type="number" id="RebrickableSyncQueue-maxAttempts" formControlName="maxAttempts" placeholder="Enter Max Attempts" class="form-control rebrickable-sync-queue-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()" aria-labelledby="label-maxAttempts" />
                <div *ngIf="rebrickableSyncQueueForm.get('maxAttempts')?.invalid && rebrickableSyncQueueForm.get('maxAttempts')?.touched" class="text-danger">
                    Max Attempts is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('errorMessage')">
                <label for="RebrickableSyncQueue-errorMessage" id="label-RebrickableSyncQueue-errorMessage">Error Message</label>
                <textarea id="RebrickableSyncQueue-errorMessage" formControlName="errorMessage" placeholder="Enter Error Message" class="form-control rebrickable-sync-queue-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('responseBody')">
                <label for="RebrickableSyncQueue-responseBody" id="label-RebrickableSyncQueue-responseBody">Response Body</label>
                <textarea id="RebrickableSyncQueue-responseBody" formControlName="responseBody" placeholder="Enter Response Body" class="form-control rebrickable-sync-queue-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="RebrickableSyncQueue-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()" />
                <label for="RebrickableSyncQueue-active" class="form-check-label" id="label-RebrickableSyncQueue-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="RebrickableSyncQueue-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCRebrickableSyncQueueWriter()" />
                <label for="RebrickableSyncQueue-deleted" class="form-check-label" id="label-RebrickableSyncQueue-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer rebrickable-sync-queue-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Rebrickable Sync Queue changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !rebrickableSyncQueueForm.valid || rebrickableSyncQueueForm.pristine  || userIsBMCRebrickableSyncQueueWriter() == false " ngbTooltip="Save the Rebrickable Sync Queue changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Rebrickable Sync Queue' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
