<div class="container-fluid p-1 m-0 user-profile-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="user-profile-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">User Profile</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit User Profile' : 'Add User Profile'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCUserProfileReader()">
                <div class="col m-2 user-profile-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="userProfileForm" (ngSubmit)="submitForm()" class="user-profile-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('displayName')">
                                <label for="UserProfile-displayName" id="label-UserProfile-displayName"><span class="text-danger">*</span>Display Name</label>
                                <input type="text" id="UserProfile-displayName" formControlName="displayName" placeholder="Enter Display Name" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()" aria-labelledby="label-displayName" />
                                <div *ngIf="userProfileForm.get('displayName')?.invalid && userProfileForm.get('displayName')?.touched" class="text-danger">
                                    Display Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('bio')">
                                <label for="UserProfile-bio" id="label-UserProfile-bio">Bio</label>
                                <textarea id="UserProfile-bio" formControlName="bio" placeholder="Enter Bio" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('location')">
                                <label for="UserProfile-location" id="label-UserProfile-location">Location</label>
                                <input type="text" id="UserProfile-location" formControlName="location" placeholder="Enter Location" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()" aria-labelledby="label-location" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('avatarFileName')">
                                <label for="UserProfile-avatarFileName" id="label-UserProfile-avatarFileName">Avatar File Name</label>
                                <input type="text" id="UserProfile-avatarFileName" formControlName="avatarFileName" placeholder="Enter Avatar File Name" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()" aria-labelledby="label-avatarFileName" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('avatarSize')">
                                <label for="UserProfile-avatarSize" id="label-UserProfile-avatarSize">Avatar Size</label>
                                <input type="number" id="UserProfile-avatarSize" formControlName="avatarSize" placeholder="Enter Avatar Size" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()" aria-labelledby="label-avatarSize" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('avatarData')">
                                <label for="UserProfile-avatarData" id="label-UserProfile-avatarData">Avatar Data</label>
                                <input type="text" id="UserProfile-avatarData" formControlName="avatarData" placeholder="Enter Avatar Data" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()" aria-labelledby="label-avatarData" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('avatarMimeType')">
                                <label for="UserProfile-avatarMimeType" id="label-UserProfile-avatarMimeType">Avatar Mime Type</label>
                                <input type="text" id="UserProfile-avatarMimeType" formControlName="avatarMimeType" placeholder="Enter Avatar Mime Type" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()" aria-labelledby="label-avatarMimeType" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('bannerFileName')">
                                <label for="UserProfile-bannerFileName" id="label-UserProfile-bannerFileName">Banner File Name</label>
                                <input type="text" id="UserProfile-bannerFileName" formControlName="bannerFileName" placeholder="Enter Banner File Name" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()" aria-labelledby="label-bannerFileName" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('bannerSize')">
                                <label for="UserProfile-bannerSize" id="label-UserProfile-bannerSize">Banner Size</label>
                                <input type="number" id="UserProfile-bannerSize" formControlName="bannerSize" placeholder="Enter Banner Size" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()" aria-labelledby="label-bannerSize" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('bannerData')">
                                <label for="UserProfile-bannerData" id="label-UserProfile-bannerData">Banner Data</label>
                                <input type="text" id="UserProfile-bannerData" formControlName="bannerData" placeholder="Enter Banner Data" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()" aria-labelledby="label-bannerData" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('bannerMimeType')">
                                <label for="UserProfile-bannerMimeType" id="label-UserProfile-bannerMimeType">Banner Mime Type</label>
                                <input type="text" id="UserProfile-bannerMimeType" formControlName="bannerMimeType" placeholder="Enter Banner Mime Type" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()" aria-labelledby="label-bannerMimeType" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('websiteUrl')">
                                <label for="UserProfile-websiteUrl" id="label-UserProfile-websiteUrl">Website Url</label>
                                <input type="text" id="UserProfile-websiteUrl" formControlName="websiteUrl" placeholder="Enter Website Url" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()" aria-labelledby="label-websiteUrl" />
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isPublic')">
                                <input type="checkbox" id="UserProfile-isPublic" formControlName="isPublic" class="form-check-input" [disabled]="!userIsBMCUserProfileWriter()" />
                                <label for="UserProfile-isPublic" class="form-check-label" id="label-UserProfile-isPublic"><span class="text-danger">*</span>Is Public</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('memberSinceDate')">
                                <label for="UserProfile-memberSinceDate" id="label-UserProfile-memberSinceDate">Member Since Date</label>
                                <input type="datetime-local" id="UserProfile-memberSinceDate" formControlName="memberSinceDate" placeholder="Enter Member Since Date" class="form-control user-profile-input" [disabled]="!userIsBMCUserProfileWriter()" aria-labelledby="label-memberSinceDate" />
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="UserProfile-versionNumber" id="label-UserProfile-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="UserProfile-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control user-profile-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="UserProfile-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCUserProfileWriter()" />
                                <label for="UserProfile-active" class="form-check-label" id="label-UserProfile-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="UserProfile-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCUserProfileWriter()" />
                                <label for="UserProfile-deleted" class="form-check-label" id="label-UserProfile-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="user-profile-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="userProfileForm.pristine" (click)="loadData(true)" ngbTooltip="Reload User Profile">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !userProfileForm.valid || !userProfileForm.dirty || userProfileForm.pristine  || userIsBMCUserProfileWriter() == false " ngbTooltip="Save the User Profile changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add User Profile' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCUserProfileReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 user-profile-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="userProfileChangeHistoryService.userIsBMCUserProfileChangeHistoryReader()">
                            <button ngbNavLink>User Profile Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (userProfileData?.UserProfileChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-profile-change-history-table [queryParams]="{ userProfileId: userProfileData?.id }" [showAddButton]="true" [preSeededData]="{ userProfileId: userProfileData?.id }" [hiddenFields]="['userProfileId']"></app-user-profile-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userProfileLinkService.userIsBMCUserProfileLinkReader()">
                            <button ngbNavLink>User Profile Links
                                <span class="badge bg-primary ms-2">
                                    {{ (userProfileData?.UserProfileLinksCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-profile-link-table [queryParams]="{ userProfileId: userProfileData?.id }" [showAddButton]="true" [preSeededData]="{ userProfileId: userProfileData?.id }" [hiddenFields]="['userProfileId']"></app-user-profile-link-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userProfilePreferredThemeService.userIsBMCUserProfilePreferredThemeReader()">
                            <button ngbNavLink>User Profile Preferred Themes
                                <span class="badge bg-primary ms-2">
                                    {{ (userProfileData?.UserProfilePreferredThemesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-profile-preferred-theme-table [queryParams]="{ userProfileId: userProfileData?.id }" [showAddButton]="true" [preSeededData]="{ userProfileId: userProfileData?.id }" [hiddenFields]="['userProfileId']"></app-user-profile-preferred-theme-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userProfileStatService.userIsBMCUserProfileStatReader()">
                            <button ngbNavLink>User Profile Stats
                                <span class="badge bg-primary ms-2">
                                    {{ (userProfileData?.UserProfileStatsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-profile-stat-table [queryParams]="{ userProfileId: userProfileData?.id }" [showAddButton]="true" [preSeededData]="{ userProfileId: userProfileData?.id }" [hiddenFields]="['userProfileId']"></app-user-profile-stat-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
