<div class="add-achievement-category" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-achievement-category me-2"
        (click)="openModal()"
        ngbTooltip="Add Achievement Category" 
        *ngIf="userIsBMCAchievementCategoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #achievementCategoryModal let-modal>
   <div class="modal-header bg-dark text-light achievement-category-modal-header">
      <h5 class="modal-title mb-0" id="achievementCategoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Achievement Category' : 'Add Achievement Category' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body achievement-category-modal-body">
      <form [formGroup]="achievementCategoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="AchievementCategory-name" id="label-AchievementCategory-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="AchievementCategory-name" formControlName="name" placeholder="Enter Name" class="form-control achievement-category-input" [disabled]="!userIsBMCAchievementCategoryWriter()" aria-labelledby="label-name" />
                <div *ngIf="achievementCategoryForm.get('name')?.invalid && achievementCategoryForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="AchievementCategory-description" id="label-AchievementCategory-description"><span class="text-danger">*</span>Description</label>
                <textarea id="AchievementCategory-description" formControlName="description" placeholder="Enter Description" class="form-control achievement-category-input" [disabled]="!userIsBMCAchievementCategoryWriter()"></textarea>
                <div *ngIf="achievementCategoryForm.get('description')?.invalid && achievementCategoryForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('iconCssClass')">
                <label for="AchievementCategory-iconCssClass" id="label-AchievementCategory-iconCssClass">Icon Css Class</label>
                <input type="text" id="AchievementCategory-iconCssClass" formControlName="iconCssClass" placeholder="Enter Icon Css Class" class="form-control achievement-category-input" [disabled]="!userIsBMCAchievementCategoryWriter()" aria-labelledby="label-iconCssClass" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="AchievementCategory-sequence" id="label-AchievementCategory-sequence">Sequence</label>
                <input type="number" id="AchievementCategory-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control achievement-category-input" [disabled]="!userIsBMCAchievementCategoryWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="AchievementCategory-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCAchievementCategoryWriter()" />
                <label for="AchievementCategory-active" class="form-check-label" id="label-AchievementCategory-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="AchievementCategory-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCAchievementCategoryWriter()" />
                <label for="AchievementCategory-deleted" class="form-check-label" id="label-AchievementCategory-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer achievement-category-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Achievement Category changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !achievementCategoryForm.valid || achievementCategoryForm.pristine  || userIsBMCAchievementCategoryWriter() == false " ngbTooltip="Save the Achievement Category changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Achievement Category' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
