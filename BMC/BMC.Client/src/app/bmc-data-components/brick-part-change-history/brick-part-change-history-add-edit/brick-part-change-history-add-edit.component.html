<div class="add-brick-part-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-brick-part-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Brick Part Change History" 
        *ngIf="userIsBMCBrickPartChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #brickPartChangeHistoryModal let-modal>
   <div class="modal-header brick-part-change-history-modal-header">
      <h5 class="modal-title mb-0" id="brickPartChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Brick Part Change History' : 'Add Brick Part Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body brick-part-change-history-modal-body">
      <form [formGroup]="brickPartChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('brickPartId')">
                <label for="BrickPartChangeHistory-brickPartId" id="label-BrickPartChangeHistory-brickPartId"><span class="text-danger">*</span>Brick Part</label>
                <select id="BrickPartChangeHistory-brickPartId" formControlName="brickPartId" class="form-select brick-part-change-history-select" [disabled]="!userIsBMCBrickPartChangeHistoryWriter()">
                    <option [ngValue]="null">Select Brick Part</option>
                    <option *ngFor="let brickPart of brickParts$ | async" [ngValue]="brickPart.id">{{brickPart.name}}</option>
                </select>
                <div *ngIf="brickPartChangeHistoryForm.get('brickPartId')?.invalid && brickPartChangeHistoryForm.get('brickPartId')?.touched" class="text-danger">
                    Brick Part is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="BrickPartChangeHistory-versionNumber" id="label-BrickPartChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="BrickPartChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control brick-part-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="BrickPartChangeHistory-timeStamp" id="label-BrickPartChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="BrickPartChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control brick-part-change-history-input" [disabled]="!userIsBMCBrickPartChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="brickPartChangeHistoryForm.get('timeStamp')?.invalid && brickPartChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="BrickPartChangeHistory-userId" id="label-BrickPartChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="BrickPartChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control brick-part-change-history-input" [disabled]="!userIsBMCBrickPartChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="brickPartChangeHistoryForm.get('userId')?.invalid && brickPartChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="BrickPartChangeHistory-data" id="label-BrickPartChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="BrickPartChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control brick-part-change-history-input" [disabled]="!userIsBMCBrickPartChangeHistoryWriter()"></textarea>
                <div *ngIf="brickPartChangeHistoryForm.get('data')?.invalid && brickPartChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer brick-part-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Brick Part Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !brickPartChangeHistoryForm.valid || brickPartChangeHistoryForm.pristine  || userIsBMCBrickPartChangeHistoryWriter() == false " ngbTooltip="Save the Brick Part Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Brick Part Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
