<div class="add-brick-owl-transaction" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-brick-owl-transaction me-2"
        (click)="openModal()"
        ngbTooltip="Add Brick Owl Transaction" 
        *ngIf="userIsBMCBrickOwlTransactionWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #brickOwlTransactionModal let-modal>
   <div class="modal-header brick-owl-transaction-modal-header">
      <h5 class="modal-title mb-0" id="brickOwlTransactionModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Brick Owl Transaction' : 'Add Brick Owl Transaction' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body brick-owl-transaction-modal-body">
      <form [formGroup]="brickOwlTransactionForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('transactionDate')">
                <label for="BrickOwlTransaction-transactionDate" id="label-BrickOwlTransaction-transactionDate">Transaction Date</label>
                <input type="datetime-local" id="BrickOwlTransaction-transactionDate" formControlName="transactionDate" placeholder="Enter Transaction Date" class="form-control brick-owl-transaction-input" [disabled]="!userIsBMCBrickOwlTransactionWriter()" aria-labelledby="label-transactionDate" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('direction')">
                <label for="BrickOwlTransaction-direction" id="label-BrickOwlTransaction-direction"><span class="text-danger">*</span>Direction</label>
                <input type="text" id="BrickOwlTransaction-direction" formControlName="direction" placeholder="Enter Direction" class="form-control brick-owl-transaction-input" [disabled]="!userIsBMCBrickOwlTransactionWriter()" aria-labelledby="label-direction" />
                <div *ngIf="brickOwlTransactionForm.get('direction')?.invalid && brickOwlTransactionForm.get('direction')?.touched" class="text-danger">
                    Direction is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('methodName')">
                <label for="BrickOwlTransaction-methodName" id="label-BrickOwlTransaction-methodName"><span class="text-danger">*</span>Method Name</label>
                <input type="text" id="BrickOwlTransaction-methodName" formControlName="methodName" placeholder="Enter Method Name" class="form-control brick-owl-transaction-input" [disabled]="!userIsBMCBrickOwlTransactionWriter()" aria-labelledby="label-methodName" />
                <div *ngIf="brickOwlTransactionForm.get('methodName')?.invalid && brickOwlTransactionForm.get('methodName')?.touched" class="text-danger">
                    Method Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('requestSummary')">
                <label for="BrickOwlTransaction-requestSummary" id="label-BrickOwlTransaction-requestSummary">Request Summary</label>
                <textarea id="BrickOwlTransaction-requestSummary" formControlName="requestSummary" placeholder="Enter Request Summary" class="form-control brick-owl-transaction-input" [disabled]="!userIsBMCBrickOwlTransactionWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('success')">
                <input type="checkbox" id="BrickOwlTransaction-success" formControlName="success" class="form-check-input" [disabled]="!userIsBMCBrickOwlTransactionWriter()" />
                <label for="BrickOwlTransaction-success" class="form-check-label" id="label-BrickOwlTransaction-success"><span class="text-danger">*</span>Success</label>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('errorMessage')">
                <label for="BrickOwlTransaction-errorMessage" id="label-BrickOwlTransaction-errorMessage">Error Message</label>
                <textarea id="BrickOwlTransaction-errorMessage" formControlName="errorMessage" placeholder="Enter Error Message" class="form-control brick-owl-transaction-input" [disabled]="!userIsBMCBrickOwlTransactionWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('triggeredBy')">
                <label for="BrickOwlTransaction-triggeredBy" id="label-BrickOwlTransaction-triggeredBy"><span class="text-danger">*</span>Triggered By</label>
                <input type="text" id="BrickOwlTransaction-triggeredBy" formControlName="triggeredBy" placeholder="Enter Triggered By" class="form-control brick-owl-transaction-input" [disabled]="!userIsBMCBrickOwlTransactionWriter()" aria-labelledby="label-triggeredBy" />
                <div *ngIf="brickOwlTransactionForm.get('triggeredBy')?.invalid && brickOwlTransactionForm.get('triggeredBy')?.touched" class="text-danger">
                    Triggered By is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('recordCount')">
                <label for="BrickOwlTransaction-recordCount" id="label-BrickOwlTransaction-recordCount">Record Count</label>
                <input type="number" id="BrickOwlTransaction-recordCount" formControlName="recordCount" placeholder="Enter Record Count" class="form-control brick-owl-transaction-input" [disabled]="!userIsBMCBrickOwlTransactionWriter()" aria-labelledby="label-recordCount" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="BrickOwlTransaction-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCBrickOwlTransactionWriter()" />
                <label for="BrickOwlTransaction-active" class="form-check-label" id="label-BrickOwlTransaction-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="BrickOwlTransaction-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCBrickOwlTransactionWriter()" />
                <label for="BrickOwlTransaction-deleted" class="form-check-label" id="label-BrickOwlTransaction-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer brick-owl-transaction-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Brick Owl Transaction changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !brickOwlTransactionForm.valid || brickOwlTransactionForm.pristine  || userIsBMCBrickOwlTransactionWriter() == false " ngbTooltip="Save the Brick Owl Transaction changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Brick Owl Transaction' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
