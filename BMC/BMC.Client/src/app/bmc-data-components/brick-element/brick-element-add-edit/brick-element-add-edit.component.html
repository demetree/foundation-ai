<div class="add-brick-element" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-brick-element me-2"
        (click)="openModal()"
        ngbTooltip="Add Brick Element" 
        *ngIf="userIsBMCBrickElementWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #brickElementModal let-modal>
   <div class="modal-header brick-element-modal-header">
      <h5 class="modal-title mb-0" id="brickElementModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Brick Element' : 'Add Brick Element' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body brick-element-modal-body">
      <form [formGroup]="brickElementForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('elementId')">
                <label for="BrickElement-elementId" id="label-BrickElement-elementId"><span class="text-danger">*</span>Element Id</label>
                <input type="text" id="BrickElement-elementId" formControlName="elementId" placeholder="Enter Element Id" class="form-control brick-element-input" [disabled]="!userIsBMCBrickElementWriter()" aria-labelledby="label-elementId" />
                <div *ngIf="brickElementForm.get('elementId')?.invalid && brickElementForm.get('elementId')?.touched" class="text-danger">
                    Element Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('brickPartId')">
                <label for="BrickElement-brickPartId" id="label-BrickElement-brickPartId"><span class="text-danger">*</span>Brick Part</label>
                <select id="BrickElement-brickPartId" formControlName="brickPartId" class="form-select brick-element-select" [disabled]="!userIsBMCBrickElementWriter()">
                    <option [ngValue]="null">Select Brick Part</option>
                    <option *ngFor="let brickPart of brickParts$ | async" [ngValue]="brickPart.id">{{brickPart.name}}</option>
                </select>
                <div *ngIf="brickElementForm.get('brickPartId')?.invalid && brickElementForm.get('brickPartId')?.touched" class="text-danger">
                    Brick Part is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('brickColourId')">
                <label for="BrickElement-brickColourId" id="label-BrickElement-brickColourId"><span class="text-danger">*</span>Brick Colour</label>
                <select id="BrickElement-brickColourId" formControlName="brickColourId" class="form-select brick-element-select" [disabled]="!userIsBMCBrickElementWriter()">
                    <option [ngValue]="null">Select Brick Colour</option>
                    <option *ngFor="let brickColour of brickColours$ | async" [ngValue]="brickColour.id">{{brickColour.name}}</option>
                </select>
                <div *ngIf="brickElementForm.get('brickColourId')?.invalid && brickElementForm.get('brickColourId')?.touched" class="text-danger">
                    Brick Colour is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('designId')">
                <label for="BrickElement-designId" id="label-BrickElement-designId">Design Id</label>
                <input type="text" id="BrickElement-designId" formControlName="designId" placeholder="Enter Design Id" class="form-control brick-element-input" [disabled]="!userIsBMCBrickElementWriter()" aria-labelledby="label-designId" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="BrickElement-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCBrickElementWriter()" />
                <label for="BrickElement-active" class="form-check-label" id="label-BrickElement-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="BrickElement-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCBrickElementWriter()" />
                <label for="BrickElement-deleted" class="form-check-label" id="label-BrickElement-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer brick-element-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Brick Element changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !brickElementForm.valid || brickElementForm.pristine  || userIsBMCBrickElementWriter() == false " ngbTooltip="Save the Brick Element changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Brick Element' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
