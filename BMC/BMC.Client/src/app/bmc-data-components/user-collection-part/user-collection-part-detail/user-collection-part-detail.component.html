<div class="container-fluid p-1 m-0 user-collection-part-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="user-collection-part-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">User Collection Part</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit User Collection Part' : 'Add User Collection Part'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCUserCollectionPartReader()">
                <div class="col m-2 user-collection-part-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="userCollectionPartForm" (ngSubmit)="submitForm()" class="user-collection-part-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('userCollectionId')">
                                <label for="UserCollectionPart-userCollectionId" id="label-UserCollectionPart-userCollectionId"><span class="text-danger">*</span>User Collection</label>
                                <select id="UserCollectionPart-userCollectionId" formControlName="userCollectionId" class="form-select user-collection-part-select" [disabled]="!userIsBMCUserCollectionPartWriter()">
                                    <option [ngValue]="null">Select User Collection</option>
                                    <option *ngFor="let userCollection of userCollections$ | async" [ngValue]="userCollection.id">{{userCollection.name}}</option>
                                </select>
                                <div *ngIf="userCollectionPartForm.get('userCollectionId')?.invalid && userCollectionPartForm.get('userCollectionId')?.touched" class="text-danger">
                                    User Collection is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('brickPartId')">
                                <label for="UserCollectionPart-brickPartId" id="label-UserCollectionPart-brickPartId"><span class="text-danger">*</span>Brick Part</label>
                                <select id="UserCollectionPart-brickPartId" formControlName="brickPartId" class="form-select user-collection-part-select" [disabled]="!userIsBMCUserCollectionPartWriter()">
                                    <option [ngValue]="null">Select Brick Part</option>
                                    <option *ngFor="let brickPart of brickParts$ | async" [ngValue]="brickPart.id">{{brickPart.name}}</option>
                                </select>
                                <div *ngIf="userCollectionPartForm.get('brickPartId')?.invalid && userCollectionPartForm.get('brickPartId')?.touched" class="text-danger">
                                    Brick Part is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('brickColourId')">
                                <label for="UserCollectionPart-brickColourId" id="label-UserCollectionPart-brickColourId"><span class="text-danger">*</span>Brick Colour</label>
                                <select id="UserCollectionPart-brickColourId" formControlName="brickColourId" class="form-select user-collection-part-select" [disabled]="!userIsBMCUserCollectionPartWriter()">
                                    <option [ngValue]="null">Select Brick Colour</option>
                                    <option *ngFor="let brickColour of brickColours$ | async" [ngValue]="brickColour.id">{{brickColour.name}}</option>
                                </select>
                                <div *ngIf="userCollectionPartForm.get('brickColourId')?.invalid && userCollectionPartForm.get('brickColourId')?.touched" class="text-danger">
                                    Brick Colour is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('quantityOwned')">
                                <label for="UserCollectionPart-quantityOwned" id="label-UserCollectionPart-quantityOwned">Quantity Owned</label>
                                <input type="number" id="UserCollectionPart-quantityOwned" formControlName="quantityOwned" placeholder="Enter Quantity Owned" class="form-control user-collection-part-input" [disabled]="!userIsBMCUserCollectionPartWriter()" aria-labelledby="label-quantityOwned" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('quantityUsed')">
                                <label for="UserCollectionPart-quantityUsed" id="label-UserCollectionPart-quantityUsed">Quantity Used</label>
                                <input type="number" id="UserCollectionPart-quantityUsed" formControlName="quantityUsed" placeholder="Enter Quantity Used" class="form-control user-collection-part-input" [disabled]="!userIsBMCUserCollectionPartWriter()" aria-labelledby="label-quantityUsed" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="UserCollectionPart-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCUserCollectionPartWriter()" />
                                <label for="UserCollectionPart-active" class="form-check-label" id="label-UserCollectionPart-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="UserCollectionPart-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCUserCollectionPartWriter()" />
                                <label for="UserCollectionPart-deleted" class="form-check-label" id="label-UserCollectionPart-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="user-collection-part-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="userCollectionPartForm.pristine" (click)="loadData(true)" ngbTooltip="Reload User Collection Part">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !userCollectionPartForm.valid || !userCollectionPartForm.dirty || userCollectionPartForm.pristine  || userIsBMCUserCollectionPartWriter() == false " ngbTooltip="Save the User Collection Part changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add User Collection Part' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
