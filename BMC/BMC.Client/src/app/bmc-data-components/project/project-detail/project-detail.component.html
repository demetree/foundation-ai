<div class="container-fluid p-1 m-0 project-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="project-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Project</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Project' : 'Add Project'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCProjectReader()">
                <div class="col m-2 project-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="projectForm" (ngSubmit)="submitForm()" class="project-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="Project-name" id="label-Project-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="Project-name" formControlName="name" placeholder="Enter Name" class="form-control project-input" [disabled]="!userIsBMCProjectWriter()" aria-labelledby="label-name" />
                                <div *ngIf="projectForm.get('name')?.invalid && projectForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="Project-description" id="label-Project-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="Project-description" formControlName="description" placeholder="Enter Description" class="form-control project-input" [disabled]="!userIsBMCProjectWriter()"></textarea>
                                <div *ngIf="projectForm.get('description')?.invalid && projectForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('notes')">
                                <label for="Project-notes" id="label-Project-notes">Notes</label>
                                <textarea id="Project-notes" formControlName="notes" placeholder="Enter Notes" class="form-control project-input" [disabled]="!userIsBMCProjectWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('thumbnailImagePath')">
                                <label for="Project-thumbnailImagePath" id="label-Project-thumbnailImagePath">Thumbnail Image Path</label>
                                <input type="text" id="Project-thumbnailImagePath" formControlName="thumbnailImagePath" placeholder="Enter Thumbnail Image Path" class="form-control project-input" [disabled]="!userIsBMCProjectWriter()" aria-labelledby="label-thumbnailImagePath" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('partCount')">
                                <label for="Project-partCount" id="label-Project-partCount">Part Count</label>
                                <input type="number" id="Project-partCount" formControlName="partCount" placeholder="Enter Part Count" class="form-control project-input" [disabled]="!userIsBMCProjectWriter()" aria-labelledby="label-partCount" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('lastBuildDate')">
                                <label for="Project-lastBuildDate" id="label-Project-lastBuildDate">Last Build Date</label>
                                <input type="datetime-local" id="Project-lastBuildDate" formControlName="lastBuildDate" placeholder="Enter Last Build Date" class="form-control project-input" [disabled]="!userIsBMCProjectWriter()" aria-labelledby="label-lastBuildDate" />
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="Project-versionNumber" id="label-Project-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="Project-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control project-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Project-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCProjectWriter()" />
                                <label for="Project-active" class="form-check-label" id="label-Project-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Project-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCProjectWriter()" />
                                <label for="Project-deleted" class="form-check-label" id="label-Project-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="project-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="projectForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Project">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !projectForm.valid || !projectForm.dirty || projectForm.pristine  || userIsBMCProjectWriter() == false " ngbTooltip="Save the Project changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Project' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCProjectReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 project-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="projectChangeHistoryService.userIsBMCProjectChangeHistoryReader()">
                            <button ngbNavLink>Project Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (projectData?.ProjectChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-project-change-history-table [queryParams]="{ projectId: projectData?.id }" [showAddButton]="true" [preSeededData]="{ projectId: projectData?.id }" [hiddenFields]="['projectId']"></app-project-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="placedBrickService.userIsBMCPlacedBrickReader()">
                            <button ngbNavLink>Placed Bricks
                                <span class="badge bg-primary ms-2">
                                    {{ (projectData?.PlacedBricksCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-placed-brick-table [queryParams]="{ projectId: projectData?.id }" [showAddButton]="true" [preSeededData]="{ projectId: projectData?.id }" [hiddenFields]="['projectId']"></app-placed-brick-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="brickConnectionService.userIsBMCBrickConnectionReader()">
                            <button ngbNavLink>Brick Connections
                                <span class="badge bg-primary ms-2">
                                    {{ (projectData?.BrickConnectionsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-brick-connection-table [queryParams]="{ projectId: projectData?.id }" [showAddButton]="true" [preSeededData]="{ projectId: projectData?.id }" [hiddenFields]="['projectId']"></app-brick-connection-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="submodelService.userIsBMCSubmodelReader()">
                            <button ngbNavLink>Submodels
                                <span class="badge bg-primary ms-2">
                                    {{ (projectData?.SubmodelsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-submodel-table [queryParams]="{ projectId: projectData?.id }" [showAddButton]="true" [preSeededData]="{ projectId: projectData?.id }" [hiddenFields]="['projectId']"></app-submodel-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="projectTagAssignmentService.userIsBMCProjectTagAssignmentReader()">
                            <button ngbNavLink>Project Tag Assignments
                                <span class="badge bg-primary ms-2">
                                    {{ (projectData?.ProjectTagAssignmentsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-project-tag-assignment-table [queryParams]="{ projectId: projectData?.id }" [showAddButton]="true" [preSeededData]="{ projectId: projectData?.id }" [hiddenFields]="['projectId']"></app-project-tag-assignment-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="projectCameraPresetService.userIsBMCProjectCameraPresetReader()">
                            <button ngbNavLink>Project Camera Presets
                                <span class="badge bg-primary ms-2">
                                    {{ (projectData?.ProjectCameraPresetsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-project-camera-preset-table [queryParams]="{ projectId: projectData?.id }" [showAddButton]="true" [preSeededData]="{ projectId: projectData?.id }" [hiddenFields]="['projectId']"></app-project-camera-preset-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="projectReferenceImageService.userIsBMCProjectReferenceImageReader()">
                            <button ngbNavLink>Project Reference Images
                                <span class="badge bg-primary ms-2">
                                    {{ (projectData?.ProjectReferenceImagesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-project-reference-image-table [queryParams]="{ projectId: projectData?.id }" [showAddButton]="true" [preSeededData]="{ projectId: projectData?.id }" [hiddenFields]="['projectId']"></app-project-reference-image-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="modelDocumentService.userIsBMCModelDocumentReader()">
                            <button ngbNavLink>Model Documents
                                <span class="badge bg-primary ms-2">
                                    {{ (projectData?.ModelDocumentsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-model-document-table [queryParams]="{ projectId: projectData?.id }" [showAddButton]="true" [preSeededData]="{ projectId: projectData?.id }" [hiddenFields]="['projectId']"></app-model-document-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="buildManualService.userIsBMCBuildManualReader()">
                            <button ngbNavLink>Build Manuals
                                <span class="badge bg-primary ms-2">
                                    {{ (projectData?.BuildManualsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-build-manual-table [queryParams]="{ projectId: projectData?.id }" [showAddButton]="true" [preSeededData]="{ projectId: projectData?.id }" [hiddenFields]="['projectId']"></app-build-manual-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="projectRenderService.userIsBMCProjectRenderReader()">
                            <button ngbNavLink>Project Renders
                                <span class="badge bg-primary ms-2">
                                    {{ (projectData?.ProjectRendersCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-project-render-table [queryParams]="{ projectId: projectData?.id }" [showAddButton]="true" [preSeededData]="{ projectId: projectData?.id }" [hiddenFields]="['projectId']"></app-project-render-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="projectExportService.userIsBMCProjectExportReader()">
                            <button ngbNavLink>Project Exports
                                <span class="badge bg-primary ms-2">
                                    {{ (projectData?.ProjectExportsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-project-export-table [queryParams]="{ projectId: projectData?.id }" [showAddButton]="true" [preSeededData]="{ projectId: projectData?.id }" [hiddenFields]="['projectId']"></app-project-export-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="publishedMocService.userIsBMCPublishedMocReader()">
                            <button ngbNavLink>Published Mocs
                                <span class="badge bg-primary ms-2">
                                    {{ (projectData?.PublishedMocsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-published-moc-table [queryParams]="{ projectId: projectData?.id }" [showAddButton]="true" [preSeededData]="{ projectId: projectData?.id }" [hiddenFields]="['projectId']"></app-published-moc-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
