<div class="add-project" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-project me-2"
        (click)="openModal()"
        ngbTooltip="Add Project" 
        *ngIf="userIsBMCProjectWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #projectModal let-modal>
   <div class="modal-header bg-dark text-light project-modal-header">
      <h5 class="modal-title mb-0" id="projectModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Project' : 'Add Project' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body project-modal-body">
      <form [formGroup]="projectForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="Project-name" id="label-Project-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="Project-name" formControlName="name" placeholder="Enter Name" class="form-control project-input" [disabled]="!userIsBMCProjectWriter()" aria-labelledby="label-name" />
                <div *ngIf="projectForm.get('name')?.invalid && projectForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="Project-description" id="label-Project-description"><span class="text-danger">*</span>Description</label>
                <textarea id="Project-description" formControlName="description" placeholder="Enter Description" class="form-control project-input" [disabled]="!userIsBMCProjectWriter()"></textarea>
                <div *ngIf="projectForm.get('description')?.invalid && projectForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('notes')">
                <label for="Project-notes" id="label-Project-notes">Notes</label>
                <textarea id="Project-notes" formControlName="notes" placeholder="Enter Notes" class="form-control project-input" [disabled]="!userIsBMCProjectWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="Project-versionNumber" id="label-Project-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="Project-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control project-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="Project-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCProjectWriter()" />
                <label for="Project-active" class="form-check-label" id="label-Project-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="Project-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCProjectWriter()" />
                <label for="Project-deleted" class="form-check-label" id="label-Project-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer project-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Project changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !projectForm.valid || projectForm.pristine  || userIsBMCProjectWriter() == false " ngbTooltip="Save the Project changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Project' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
