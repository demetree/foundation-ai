<div class="container-fluid p-1 m-0 user-set-ownership-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="user-set-ownership-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">User Set Ownership</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit User Set Ownership' : 'Add User Set Ownership'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCUserSetOwnershipReader()">
                <div class="col m-2 user-set-ownership-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="userSetOwnershipForm" (ngSubmit)="submitForm()" class="user-set-ownership-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('legoSetId')">
                                <label for="UserSetOwnership-legoSetId" id="label-UserSetOwnership-legoSetId"><span class="text-danger">*</span>Lego Set</label>
                                <select id="UserSetOwnership-legoSetId" formControlName="legoSetId" class="form-select user-set-ownership-select" [disabled]="!userIsBMCUserSetOwnershipWriter()">
                                    <option [ngValue]="null">Select Lego Set</option>
                                    <option *ngFor="let legoSet of legoSets$ | async" [ngValue]="legoSet.id">{{legoSet.name}}</option>
                                </select>
                                <div *ngIf="userSetOwnershipForm.get('legoSetId')?.invalid && userSetOwnershipForm.get('legoSetId')?.touched" class="text-danger">
                                    Lego Set is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('status')">
                                <label for="UserSetOwnership-status" id="label-UserSetOwnership-status"><span class="text-danger">*</span>Status</label>
                                <input type="text" id="UserSetOwnership-status" formControlName="status" placeholder="Enter Status" class="form-control user-set-ownership-input" [disabled]="!userIsBMCUserSetOwnershipWriter()" aria-labelledby="label-status" />
                                <div *ngIf="userSetOwnershipForm.get('status')?.invalid && userSetOwnershipForm.get('status')?.touched" class="text-danger">
                                    Status is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('acquiredDate')">
                                <label for="UserSetOwnership-acquiredDate" id="label-UserSetOwnership-acquiredDate">Acquired Date</label>
                                <input type="datetime-local" id="UserSetOwnership-acquiredDate" formControlName="acquiredDate" placeholder="Enter Acquired Date" class="form-control user-set-ownership-input" [disabled]="!userIsBMCUserSetOwnershipWriter()" aria-labelledby="label-acquiredDate" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('personalRating')">
                                <label for="UserSetOwnership-personalRating" id="label-UserSetOwnership-personalRating">Personal Rating</label>
                                <input type="number" id="UserSetOwnership-personalRating" formControlName="personalRating" placeholder="Enter Personal Rating" class="form-control user-set-ownership-input" [disabled]="!userIsBMCUserSetOwnershipWriter()" aria-labelledby="label-personalRating" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('notes')">
                                <label for="UserSetOwnership-notes" id="label-UserSetOwnership-notes">Notes</label>
                                <textarea id="UserSetOwnership-notes" formControlName="notes" placeholder="Enter Notes" class="form-control user-set-ownership-input" [disabled]="!userIsBMCUserSetOwnershipWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('quantity')">
                                <label for="UserSetOwnership-quantity" id="label-UserSetOwnership-quantity"><span class="text-danger">*</span>Quantity</label>
                                <input type="number" id="UserSetOwnership-quantity" formControlName="quantity" placeholder="Enter Quantity" class="form-control user-set-ownership-input" [disabled]="!userIsBMCUserSetOwnershipWriter()" aria-labelledby="label-quantity" />
                                <div *ngIf="userSetOwnershipForm.get('quantity')?.invalid && userSetOwnershipForm.get('quantity')?.touched" class="text-danger">
                                    Quantity is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isPublic')">
                                <input type="checkbox" id="UserSetOwnership-isPublic" formControlName="isPublic" class="form-check-input" [disabled]="!userIsBMCUserSetOwnershipWriter()" />
                                <label for="UserSetOwnership-isPublic" class="form-check-label" id="label-UserSetOwnership-isPublic"><span class="text-danger">*</span>Is Public</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="UserSetOwnership-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCUserSetOwnershipWriter()" />
                                <label for="UserSetOwnership-active" class="form-check-label" id="label-UserSetOwnership-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="UserSetOwnership-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCUserSetOwnershipWriter()" />
                                <label for="UserSetOwnership-deleted" class="form-check-label" id="label-UserSetOwnership-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="user-set-ownership-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="userSetOwnershipForm.pristine" (click)="loadData(true)" ngbTooltip="Reload User Set Ownership">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !userSetOwnershipForm.valid || !userSetOwnershipForm.dirty || userSetOwnershipForm.pristine  || userIsBMCUserSetOwnershipWriter() == false " ngbTooltip="Save the User Set Ownership changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add User Set Ownership' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
