<div class="container-fluid p-1 m-0 brick-link-transaction-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="brick-link-transaction-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Brick Link Transaction</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Brick Link Transaction' : 'Add Brick Link Transaction'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCBrickLinkTransactionReader()">
                <div class="col m-2 brick-link-transaction-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="brickLinkTransactionForm" (ngSubmit)="submitForm()" class="brick-link-transaction-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('transactionDate')">
                                <label for="BrickLinkTransaction-transactionDate" id="label-BrickLinkTransaction-transactionDate">Transaction Date</label>
                                <input type="datetime-local" id="BrickLinkTransaction-transactionDate" formControlName="transactionDate" placeholder="Enter Transaction Date" class="form-control brick-link-transaction-input" [disabled]="!userIsBMCBrickLinkTransactionWriter()" aria-labelledby="label-transactionDate" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('direction')">
                                <label for="BrickLinkTransaction-direction" id="label-BrickLinkTransaction-direction"><span class="text-danger">*</span>Direction</label>
                                <input type="text" id="BrickLinkTransaction-direction" formControlName="direction" placeholder="Enter Direction" class="form-control brick-link-transaction-input" [disabled]="!userIsBMCBrickLinkTransactionWriter()" aria-labelledby="label-direction" />
                                <div *ngIf="brickLinkTransactionForm.get('direction')?.invalid && brickLinkTransactionForm.get('direction')?.touched" class="text-danger">
                                    Direction is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('methodName')">
                                <label for="BrickLinkTransaction-methodName" id="label-BrickLinkTransaction-methodName"><span class="text-danger">*</span>Method Name</label>
                                <input type="text" id="BrickLinkTransaction-methodName" formControlName="methodName" placeholder="Enter Method Name" class="form-control brick-link-transaction-input" [disabled]="!userIsBMCBrickLinkTransactionWriter()" aria-labelledby="label-methodName" />
                                <div *ngIf="brickLinkTransactionForm.get('methodName')?.invalid && brickLinkTransactionForm.get('methodName')?.touched" class="text-danger">
                                    Method Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('requestSummary')">
                                <label for="BrickLinkTransaction-requestSummary" id="label-BrickLinkTransaction-requestSummary">Request Summary</label>
                                <textarea id="BrickLinkTransaction-requestSummary" formControlName="requestSummary" placeholder="Enter Request Summary" class="form-control brick-link-transaction-input" [disabled]="!userIsBMCBrickLinkTransactionWriter()"></textarea>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('success')">
                                <input type="checkbox" id="BrickLinkTransaction-success" formControlName="success" class="form-check-input" [disabled]="!userIsBMCBrickLinkTransactionWriter()" />
                                <label for="BrickLinkTransaction-success" class="form-check-label" id="label-BrickLinkTransaction-success"><span class="text-danger">*</span>Success</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('errorMessage')">
                                <label for="BrickLinkTransaction-errorMessage" id="label-BrickLinkTransaction-errorMessage">Error Message</label>
                                <textarea id="BrickLinkTransaction-errorMessage" formControlName="errorMessage" placeholder="Enter Error Message" class="form-control brick-link-transaction-input" [disabled]="!userIsBMCBrickLinkTransactionWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('triggeredBy')">
                                <label for="BrickLinkTransaction-triggeredBy" id="label-BrickLinkTransaction-triggeredBy"><span class="text-danger">*</span>Triggered By</label>
                                <input type="text" id="BrickLinkTransaction-triggeredBy" formControlName="triggeredBy" placeholder="Enter Triggered By" class="form-control brick-link-transaction-input" [disabled]="!userIsBMCBrickLinkTransactionWriter()" aria-labelledby="label-triggeredBy" />
                                <div *ngIf="brickLinkTransactionForm.get('triggeredBy')?.invalid && brickLinkTransactionForm.get('triggeredBy')?.touched" class="text-danger">
                                    Triggered By is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('recordCount')">
                                <label for="BrickLinkTransaction-recordCount" id="label-BrickLinkTransaction-recordCount">Record Count</label>
                                <input type="number" id="BrickLinkTransaction-recordCount" formControlName="recordCount" placeholder="Enter Record Count" class="form-control brick-link-transaction-input" [disabled]="!userIsBMCBrickLinkTransactionWriter()" aria-labelledby="label-recordCount" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BrickLinkTransaction-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCBrickLinkTransactionWriter()" />
                                <label for="BrickLinkTransaction-active" class="form-check-label" id="label-BrickLinkTransaction-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BrickLinkTransaction-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCBrickLinkTransactionWriter()" />
                                <label for="BrickLinkTransaction-deleted" class="form-check-label" id="label-BrickLinkTransaction-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="brick-link-transaction-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="brickLinkTransactionForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Brick Link Transaction">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !brickLinkTransactionForm.valid || !brickLinkTransactionForm.dirty || brickLinkTransactionForm.pristine  || userIsBMCBrickLinkTransactionWriter() == false " ngbTooltip="Save the Brick Link Transaction changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Brick Link Transaction' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
