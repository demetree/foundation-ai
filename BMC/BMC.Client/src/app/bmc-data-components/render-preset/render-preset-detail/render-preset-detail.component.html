<div class="container-fluid p-1 m-0 render-preset-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="render-preset-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Render Preset</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Render Preset' : 'Add Render Preset'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCRenderPresetReader()">
                <div class="col m-2 render-preset-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="renderPresetForm" (ngSubmit)="submitForm()" class="render-preset-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="RenderPreset-name" id="label-RenderPreset-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="RenderPreset-name" formControlName="name" placeholder="Enter Name" class="form-control render-preset-input" [disabled]="!userIsBMCRenderPresetWriter()" aria-labelledby="label-name" />
                                <div *ngIf="renderPresetForm.get('name')?.invalid && renderPresetForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="RenderPreset-description" id="label-RenderPreset-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="RenderPreset-description" formControlName="description" placeholder="Enter Description" class="form-control render-preset-input" [disabled]="!userIsBMCRenderPresetWriter()"></textarea>
                                <div *ngIf="renderPresetForm.get('description')?.invalid && renderPresetForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('resolutionWidth')">
                                <label for="RenderPreset-resolutionWidth" id="label-RenderPreset-resolutionWidth">Resolution Width</label>
                                <input type="number" id="RenderPreset-resolutionWidth" formControlName="resolutionWidth" placeholder="Enter Resolution Width" class="form-control render-preset-input" [disabled]="!userIsBMCRenderPresetWriter()" aria-labelledby="label-resolutionWidth" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('resolutionHeight')">
                                <label for="RenderPreset-resolutionHeight" id="label-RenderPreset-resolutionHeight">Resolution Height</label>
                                <input type="number" id="RenderPreset-resolutionHeight" formControlName="resolutionHeight" placeholder="Enter Resolution Height" class="form-control render-preset-input" [disabled]="!userIsBMCRenderPresetWriter()" aria-labelledby="label-resolutionHeight" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('backgroundColorHex')">
                                <label for="RenderPreset-backgroundColorHex" id="label-RenderPreset-backgroundColorHex">Background Color Hex</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="RenderPreset-backgroundColorHex" 
                        formControlName="backgroundColorHex" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsBMCRenderPresetWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="renderPresetForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('enableShadows')">
                                <input type="checkbox" id="RenderPreset-enableShadows" formControlName="enableShadows" class="form-check-input" [disabled]="!userIsBMCRenderPresetWriter()" />
                                <label for="RenderPreset-enableShadows" class="form-check-label" id="label-RenderPreset-enableShadows"><span class="text-danger">*</span>Enable Shadows</label>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('enableReflections')">
                                <input type="checkbox" id="RenderPreset-enableReflections" formControlName="enableReflections" class="form-check-input" [disabled]="!userIsBMCRenderPresetWriter()" />
                                <label for="RenderPreset-enableReflections" class="form-check-label" id="label-RenderPreset-enableReflections"><span class="text-danger">*</span>Enable Reflections</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('lightingMode')">
                                <label for="RenderPreset-lightingMode" id="label-RenderPreset-lightingMode">Lighting Mode</label>
                                <input type="text" id="RenderPreset-lightingMode" formControlName="lightingMode" placeholder="Enter Lighting Mode" class="form-control render-preset-input" [disabled]="!userIsBMCRenderPresetWriter()" aria-labelledby="label-lightingMode" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('antiAliasLevel')">
                                <label for="RenderPreset-antiAliasLevel" id="label-RenderPreset-antiAliasLevel">Anti Alias Level</label>
                                <input type="number" id="RenderPreset-antiAliasLevel" formControlName="antiAliasLevel" placeholder="Enter Anti Alias Level" class="form-control render-preset-input" [disabled]="!userIsBMCRenderPresetWriter()" aria-labelledby="label-antiAliasLevel" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="RenderPreset-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCRenderPresetWriter()" />
                                <label for="RenderPreset-active" class="form-check-label" id="label-RenderPreset-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="RenderPreset-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCRenderPresetWriter()" />
                                <label for="RenderPreset-deleted" class="form-check-label" id="label-RenderPreset-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="render-preset-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="renderPresetForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Render Preset">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !renderPresetForm.valid || !renderPresetForm.dirty || renderPresetForm.pristine  || userIsBMCRenderPresetWriter() == false " ngbTooltip="Save the Render Preset changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Render Preset' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCRenderPresetReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 render-preset-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="projectRenderService.userIsBMCProjectRenderReader()">
                            <button ngbNavLink>Project Renders
                                <span class="badge bg-primary ms-2">
                                    {{ (renderPresetData?.ProjectRendersCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-project-render-table [queryParams]="{ renderPresetId: renderPresetData?.id }"></app-project-render-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-project-render-add-edit [preSeededData]="{ renderPresetId: renderPresetData?.id }" [hiddenFields]="['renderPresetId']"></app-project-render-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
