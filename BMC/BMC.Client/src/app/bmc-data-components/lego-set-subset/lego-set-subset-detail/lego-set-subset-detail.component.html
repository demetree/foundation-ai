<div class="container-fluid p-1 m-0 lego-set-subset-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="lego-set-subset-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Lego Set Subset</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Lego Set Subset' : 'Add Lego Set Subset'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCLegoSetSubsetReader()">
                <div class="col m-2 lego-set-subset-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="legoSetSubsetForm" (ngSubmit)="submitForm()" class="lego-set-subset-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('parentLegoSetId')">
                                <label for="LegoSetSubset-parentLegoSetId" id="label-LegoSetSubset-parentLegoSetId"><span class="text-danger">*</span>Parent Lego Set</label>
                                <select id="LegoSetSubset-parentLegoSetId" formControlName="parentLegoSetId" class="form-select lego-set-subset-select" [disabled]="!userIsBMCLegoSetSubsetWriter()">
                                    <option [ngValue]="null">Select Lego Set</option>
                                    <option *ngFor="let legoSet of legoSets$ | async" [ngValue]="legoSet.id">{{legoSet.name}}</option>
                                </select>
                                <div *ngIf="legoSetSubsetForm.get('parentLegoSetId')?.invalid && legoSetSubsetForm.get('parentLegoSetId')?.touched" class="text-danger">
                                    Parent Lego Set is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('childLegoSetId')">
                                <label for="LegoSetSubset-childLegoSetId" id="label-LegoSetSubset-childLegoSetId"><span class="text-danger">*</span>Child Lego Set</label>
                                <select id="LegoSetSubset-childLegoSetId" formControlName="childLegoSetId" class="form-select lego-set-subset-select" [disabled]="!userIsBMCLegoSetSubsetWriter()">
                                    <option [ngValue]="null">Select Lego Set</option>
                                    <option *ngFor="let legoSet of legoSets$ | async" [ngValue]="legoSet.id">{{legoSet.name}}</option>
                                </select>
                                <div *ngIf="legoSetSubsetForm.get('childLegoSetId')?.invalid && legoSetSubsetForm.get('childLegoSetId')?.touched" class="text-danger">
                                    Child Lego Set is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('quantity')">
                                <label for="LegoSetSubset-quantity" id="label-LegoSetSubset-quantity">Quantity</label>
                                <input type="number" id="LegoSetSubset-quantity" formControlName="quantity" placeholder="Enter Quantity" class="form-control lego-set-subset-input" [disabled]="!userIsBMCLegoSetSubsetWriter()" aria-labelledby="label-quantity" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="LegoSetSubset-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCLegoSetSubsetWriter()" />
                                <label for="LegoSetSubset-active" class="form-check-label" id="label-LegoSetSubset-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="LegoSetSubset-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCLegoSetSubsetWriter()" />
                                <label for="LegoSetSubset-deleted" class="form-check-label" id="label-LegoSetSubset-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="lego-set-subset-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="legoSetSubsetForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Lego Set Subset">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !legoSetSubsetForm.valid || !legoSetSubsetForm.dirty || legoSetSubsetForm.pristine  || userIsBMCLegoSetSubsetWriter() == false " ngbTooltip="Save the Lego Set Subset changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Lego Set Subset' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
