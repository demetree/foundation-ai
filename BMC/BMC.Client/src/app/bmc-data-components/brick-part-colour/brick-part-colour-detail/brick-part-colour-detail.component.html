<div class="container-fluid p-1 m-0 brick-part-colour-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="brick-part-colour-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Brick Part Colour</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Brick Part Colour' : 'Add Brick Part Colour'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCBrickPartColourReader()">
                <div class="col m-2 brick-part-colour-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="brickPartColourForm" (ngSubmit)="submitForm()" class="brick-part-colour-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('brickPartId')">
                                <label for="BrickPartColour-brickPartId" id="label-BrickPartColour-brickPartId"><span class="text-danger">*</span>Brick Part</label>
                                <select id="BrickPartColour-brickPartId" formControlName="brickPartId" class="form-select brick-part-colour-select" [disabled]="!userIsBMCBrickPartColourWriter()">
                                    <option [ngValue]="null">Select Brick Part</option>
                                    <option *ngFor="let brickPart of brickParts$ | async" [ngValue]="brickPart.id">{{brickPart.name}}</option>
                                </select>
                                <div *ngIf="brickPartColourForm.get('brickPartId')?.invalid && brickPartColourForm.get('brickPartId')?.touched" class="text-danger">
                                    Brick Part is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('brickColourId')">
                                <label for="BrickPartColour-brickColourId" id="label-BrickPartColour-brickColourId"><span class="text-danger">*</span>Brick Colour</label>
                                <select id="BrickPartColour-brickColourId" formControlName="brickColourId" class="form-select brick-part-colour-select" [disabled]="!userIsBMCBrickPartColourWriter()">
                                    <option [ngValue]="null">Select Brick Colour</option>
                                    <option *ngFor="let brickColour of brickColours$ | async" [ngValue]="brickColour.id">{{brickColour.name}}</option>
                                </select>
                                <div *ngIf="brickPartColourForm.get('brickColourId')?.invalid && brickPartColourForm.get('brickColourId')?.touched" class="text-danger">
                                    Brick Colour is required
                                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BrickPartColour-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCBrickPartColourWriter()" />
                                <label for="BrickPartColour-active" class="form-check-label" id="label-BrickPartColour-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BrickPartColour-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCBrickPartColourWriter()" />
                                <label for="BrickPartColour-deleted" class="form-check-label" id="label-BrickPartColour-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="brick-part-colour-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="brickPartColourForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Brick Part Colour">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !brickPartColourForm.valid || !brickPartColourForm.dirty || brickPartColourForm.pristine  || userIsBMCBrickPartColourWriter() == false " ngbTooltip="Save the Brick Part Colour changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Brick Part Colour' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
