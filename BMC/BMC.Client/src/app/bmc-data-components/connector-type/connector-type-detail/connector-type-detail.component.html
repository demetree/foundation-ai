<div class="container-fluid p-1 m-0 connector-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="connector-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Connector Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Connector Type' : 'Add Connector Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCConnectorTypeReader()">
                <div class="col m-2 connector-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="connectorTypeForm" (ngSubmit)="submitForm()" class="connector-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="ConnectorType-name" id="label-ConnectorType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="ConnectorType-name" formControlName="name" placeholder="Enter Name" class="form-control connector-type-input" [disabled]="!userIsBMCConnectorTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="connectorTypeForm.get('name')?.invalid && connectorTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="ConnectorType-description" id="label-ConnectorType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="ConnectorType-description" formControlName="description" placeholder="Enter Description" class="form-control connector-type-input" [disabled]="!userIsBMCConnectorTypeWriter()"></textarea>
                                <div *ngIf="connectorTypeForm.get('description')?.invalid && connectorTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('degreesOfFreedom')">
                                <label for="ConnectorType-degreesOfFreedom" id="label-ConnectorType-degreesOfFreedom">Degrees Of Freedom</label>
                                <input type="number" id="ConnectorType-degreesOfFreedom" formControlName="degreesOfFreedom" placeholder="Enter Degrees Of Freedom" class="form-control connector-type-input" [disabled]="!userIsBMCConnectorTypeWriter()" aria-labelledby="label-degreesOfFreedom" />
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('allowsRotation')">
                                <input type="checkbox" id="ConnectorType-allowsRotation" formControlName="allowsRotation" class="form-check-input" [disabled]="!userIsBMCConnectorTypeWriter()" />
                                <label for="ConnectorType-allowsRotation" class="form-check-label" id="label-ConnectorType-allowsRotation"><span class="text-danger">*</span>Allows Rotation</label>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('allowsSlide')">
                                <input type="checkbox" id="ConnectorType-allowsSlide" formControlName="allowsSlide" class="form-check-input" [disabled]="!userIsBMCConnectorTypeWriter()" />
                                <label for="ConnectorType-allowsSlide" class="form-check-label" id="label-ConnectorType-allowsSlide"><span class="text-danger">*</span>Allows Slide</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('minAngleDegrees')">
                                <label for="ConnectorType-minAngleDegrees" id="label-ConnectorType-minAngleDegrees">Min Angle Degrees</label>
                                <input type="number" id="ConnectorType-minAngleDegrees" formControlName="minAngleDegrees" placeholder="Enter Min Angle Degrees" class="form-control connector-type-input" [disabled]="!userIsBMCConnectorTypeWriter()" aria-labelledby="label-minAngleDegrees" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('maxAngleDegrees')">
                                <label for="ConnectorType-maxAngleDegrees" id="label-ConnectorType-maxAngleDegrees">Max Angle Degrees</label>
                                <input type="number" id="ConnectorType-maxAngleDegrees" formControlName="maxAngleDegrees" placeholder="Enter Max Angle Degrees" class="form-control connector-type-input" [disabled]="!userIsBMCConnectorTypeWriter()" aria-labelledby="label-maxAngleDegrees" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('snapIncrementDegrees')">
                                <label for="ConnectorType-snapIncrementDegrees" id="label-ConnectorType-snapIncrementDegrees">Snap Increment Degrees</label>
                                <input type="number" id="ConnectorType-snapIncrementDegrees" formControlName="snapIncrementDegrees" placeholder="Enter Snap Increment Degrees" class="form-control connector-type-input" [disabled]="!userIsBMCConnectorTypeWriter()" aria-labelledby="label-snapIncrementDegrees" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('clutchForceNewtons')">
                                <label for="ConnectorType-clutchForceNewtons" id="label-ConnectorType-clutchForceNewtons">Clutch Force Newtons</label>
                                <input type="number" id="ConnectorType-clutchForceNewtons" formControlName="clutchForceNewtons" placeholder="Enter Clutch Force Newtons" class="form-control connector-type-input" [disabled]="!userIsBMCConnectorTypeWriter()" aria-labelledby="label-clutchForceNewtons" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('maleOrFemale')">
                                <label for="ConnectorType-maleOrFemale" id="label-ConnectorType-maleOrFemale">Male Or Female</label>
                                <input type="text" id="ConnectorType-maleOrFemale" formControlName="maleOrFemale" placeholder="Enter Male Or Female" class="form-control connector-type-input" [disabled]="!userIsBMCConnectorTypeWriter()" aria-labelledby="label-maleOrFemale" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="ConnectorType-sequence" id="label-ConnectorType-sequence">Sequence</label>
                                <input type="number" id="ConnectorType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control connector-type-input" [disabled]="!userIsBMCConnectorTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ConnectorType-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCConnectorTypeWriter()" />
                                <label for="ConnectorType-active" class="form-check-label" id="label-ConnectorType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ConnectorType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCConnectorTypeWriter()" />
                                <label for="ConnectorType-deleted" class="form-check-label" id="label-ConnectorType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="connector-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="connectorTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Connector Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !connectorTypeForm.valid || !connectorTypeForm.dirty || connectorTypeForm.pristine  || userIsBMCConnectorTypeWriter() == false " ngbTooltip="Save the Connector Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Connector Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCConnectorTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 connector-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="connectorTypeCompatibilityService.userIsBMCConnectorTypeCompatibilityReader()">
                            <button ngbNavLink>Connector Type Compatibilities Male Connector Types
                                <span class="badge bg-primary ms-2">
                                    {{ (connectorTypeData?.ConnectorTypeCompatibilityMaleConnectorTypesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-connector-type-compatibility-table [queryParams]="{ maleConnectorTypeId: connectorTypeData?.id }" [showAddButton]="true" [preSeededData]="{ maleConnectorTypeId: connectorTypeData?.id }" [hiddenFields]="['maleConnectorTypeId']"></app-connector-type-compatibility-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="connectorTypeCompatibilityService.userIsBMCConnectorTypeCompatibilityReader()">
                            <button ngbNavLink>Connector Type Compatibilities Female Connector Types
                                <span class="badge bg-primary ms-2">
                                    {{ (connectorTypeData?.ConnectorTypeCompatibilityFemaleConnectorTypesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-connector-type-compatibility-table [queryParams]="{ femaleConnectorTypeId: connectorTypeData?.id }" [showAddButton]="true" [preSeededData]="{ femaleConnectorTypeId: connectorTypeData?.id }" [hiddenFields]="['femaleConnectorTypeId']"></app-connector-type-compatibility-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="brickPartConnectorService.userIsBMCBrickPartConnectorReader()">
                            <button ngbNavLink>Brick Part Connectors
                                <span class="badge bg-primary ms-2">
                                    {{ (connectorTypeData?.BrickPartConnectorsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-brick-part-connector-table [queryParams]="{ connectorTypeId: connectorTypeData?.id }" [showAddButton]="true" [preSeededData]="{ connectorTypeId: connectorTypeData?.id }" [hiddenFields]="['connectorTypeId']"></app-brick-part-connector-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
