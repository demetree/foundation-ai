<div class="add-build-step-annotation-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-build-step-annotation-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Build Step Annotation Change History" 
        *ngIf="userIsBMCBuildStepAnnotationChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #buildStepAnnotationChangeHistoryModal let-modal>
   <div class="modal-header build-step-annotation-change-history-modal-header">
      <h5 class="modal-title mb-0" id="buildStepAnnotationChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Build Step Annotation Change History' : 'Add Build Step Annotation Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body build-step-annotation-change-history-modal-body">
      <form [formGroup]="buildStepAnnotationChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('buildStepAnnotationId')">
                <label for="BuildStepAnnotationChangeHistory-buildStepAnnotationId" id="label-BuildStepAnnotationChangeHistory-buildStepAnnotationId"><span class="text-danger">*</span>Build Step Annotation</label>
                <select id="BuildStepAnnotationChangeHistory-buildStepAnnotationId" formControlName="buildStepAnnotationId" class="form-select build-step-annotation-change-history-select" [disabled]="!userIsBMCBuildStepAnnotationChangeHistoryWriter()">
                    <option [ngValue]="null">Select Build Step Annotation</option>
                    <option *ngFor="let buildStepAnnotation of buildStepAnnotations$ | async" [ngValue]="buildStepAnnotation.id">{{buildStepAnnotation.text}}</option>
                </select>
                <div *ngIf="buildStepAnnotationChangeHistoryForm.get('buildStepAnnotationId')?.invalid && buildStepAnnotationChangeHistoryForm.get('buildStepAnnotationId')?.touched" class="text-danger">
                    Build Step Annotation is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="BuildStepAnnotationChangeHistory-versionNumber" id="label-BuildStepAnnotationChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="BuildStepAnnotationChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control build-step-annotation-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="BuildStepAnnotationChangeHistory-timeStamp" id="label-BuildStepAnnotationChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="BuildStepAnnotationChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control build-step-annotation-change-history-input" [disabled]="!userIsBMCBuildStepAnnotationChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="buildStepAnnotationChangeHistoryForm.get('timeStamp')?.invalid && buildStepAnnotationChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="BuildStepAnnotationChangeHistory-userId" id="label-BuildStepAnnotationChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="BuildStepAnnotationChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control build-step-annotation-change-history-input" [disabled]="!userIsBMCBuildStepAnnotationChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="buildStepAnnotationChangeHistoryForm.get('userId')?.invalid && buildStepAnnotationChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="BuildStepAnnotationChangeHistory-data" id="label-BuildStepAnnotationChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="BuildStepAnnotationChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control build-step-annotation-change-history-input" [disabled]="!userIsBMCBuildStepAnnotationChangeHistoryWriter()"></textarea>
                <div *ngIf="buildStepAnnotationChangeHistoryForm.get('data')?.invalid && buildStepAnnotationChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer build-step-annotation-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Build Step Annotation Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !buildStepAnnotationChangeHistoryForm.valid || buildStepAnnotationChangeHistoryForm.pristine  || userIsBMCBuildStepAnnotationChangeHistoryWriter() == false " ngbTooltip="Save the Build Step Annotation Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Build Step Annotation Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
