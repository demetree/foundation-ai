<div class="container-fluid p-1 m-0 published-moc-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="published-moc-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Published Moc Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Published Moc Change History' : 'Add Published Moc Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCPublishedMocChangeHistoryReader()">
                <div class="col m-2 published-moc-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="publishedMocChangeHistoryForm" (ngSubmit)="submitForm()" class="published-moc-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('publishedMocId')">
                                <label for="PublishedMocChangeHistory-publishedMocId" id="label-PublishedMocChangeHistory-publishedMocId"><span class="text-danger">*</span>Published Moc</label>
                                <select id="PublishedMocChangeHistory-publishedMocId" formControlName="publishedMocId" class="form-select published-moc-change-history-select" [disabled]="!userIsBMCPublishedMocChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Published Moc</option>
                                    <option *ngFor="let publishedMoc of publishedMocs$ | async" [ngValue]="publishedMoc.id">{{publishedMoc.name}}</option>
                                </select>
                                <div *ngIf="publishedMocChangeHistoryForm.get('publishedMocId')?.invalid && publishedMocChangeHistoryForm.get('publishedMocId')?.touched" class="text-danger">
                                    Published Moc is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="PublishedMocChangeHistory-versionNumber" id="label-PublishedMocChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="PublishedMocChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control published-moc-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="PublishedMocChangeHistory-timeStamp" id="label-PublishedMocChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="PublishedMocChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control published-moc-change-history-input" [disabled]="!userIsBMCPublishedMocChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="publishedMocChangeHistoryForm.get('timeStamp')?.invalid && publishedMocChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="PublishedMocChangeHistory-userId" id="label-PublishedMocChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="PublishedMocChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control published-moc-change-history-input" [disabled]="!userIsBMCPublishedMocChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="publishedMocChangeHistoryForm.get('userId')?.invalid && publishedMocChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="PublishedMocChangeHistory-data" id="label-PublishedMocChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="PublishedMocChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control published-moc-change-history-input" [disabled]="!userIsBMCPublishedMocChangeHistoryWriter()"></textarea>
                                <div *ngIf="publishedMocChangeHistoryForm.get('data')?.invalid && publishedMocChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="published-moc-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="publishedMocChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Published Moc Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !publishedMocChangeHistoryForm.valid || !publishedMocChangeHistoryForm.dirty || publishedMocChangeHistoryForm.pristine  || userIsBMCPublishedMocChangeHistoryWriter() == false " ngbTooltip="Save the Published Moc Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Published Moc Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
