<div class="container-fluid p-1 m-0 build-step-part-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="build-step-part-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Build Step Part Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Build Step Part Change History' : 'Add Build Step Part Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCBuildStepPartChangeHistoryReader()">
                <div class="col m-2 build-step-part-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="buildStepPartChangeHistoryForm" (ngSubmit)="submitForm()" class="build-step-part-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('buildStepPartId')">
                                <label for="BuildStepPartChangeHistory-buildStepPartId" id="label-BuildStepPartChangeHistory-buildStepPartId"><span class="text-danger">*</span>Build Step Part</label>
                                <select id="BuildStepPartChangeHistory-buildStepPartId" formControlName="buildStepPartId" class="form-select build-step-part-change-history-select" [disabled]="!userIsBMCBuildStepPartChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Build Step Part</option>
                                    <option *ngFor="let buildStepPart of buildStepParts$ | async" [ngValue]="buildStepPart.id">{{buildStepPart.id}}</option>
                                </select>
                                <div *ngIf="buildStepPartChangeHistoryForm.get('buildStepPartId')?.invalid && buildStepPartChangeHistoryForm.get('buildStepPartId')?.touched" class="text-danger">
                                    Build Step Part is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="BuildStepPartChangeHistory-versionNumber" id="label-BuildStepPartChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="BuildStepPartChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control build-step-part-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="BuildStepPartChangeHistory-timeStamp" id="label-BuildStepPartChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="BuildStepPartChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control build-step-part-change-history-input" [disabled]="!userIsBMCBuildStepPartChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="buildStepPartChangeHistoryForm.get('timeStamp')?.invalid && buildStepPartChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="BuildStepPartChangeHistory-userId" id="label-BuildStepPartChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="BuildStepPartChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control build-step-part-change-history-input" [disabled]="!userIsBMCBuildStepPartChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="buildStepPartChangeHistoryForm.get('userId')?.invalid && buildStepPartChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="BuildStepPartChangeHistory-data" id="label-BuildStepPartChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="BuildStepPartChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control build-step-part-change-history-input" [disabled]="!userIsBMCBuildStepPartChangeHistoryWriter()"></textarea>
                                <div *ngIf="buildStepPartChangeHistoryForm.get('data')?.invalid && buildStepPartChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="build-step-part-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="buildStepPartChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Build Step Part Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !buildStepPartChangeHistoryForm.valid || !buildStepPartChangeHistoryForm.dirty || buildStepPartChangeHistoryForm.pristine  || userIsBMCBuildStepPartChangeHistoryWriter() == false " ngbTooltip="Save the Build Step Part Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Build Step Part Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
