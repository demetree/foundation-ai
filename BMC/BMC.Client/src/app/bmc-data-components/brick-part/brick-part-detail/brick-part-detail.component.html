<div class="container-fluid p-1 m-0 brick-part-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="brick-part-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Brick Part</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Brick Part' : 'Add Brick Part'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCBrickPartReader()">
                <div class="col m-2 brick-part-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="brickPartForm" (ngSubmit)="submitForm()" class="brick-part-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="BrickPart-name" id="label-BrickPart-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="BrickPart-name" formControlName="name" placeholder="Enter Name" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-name" />
                                <div *ngIf="brickPartForm.get('name')?.invalid && brickPartForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('ldrawPartId')">
                                <label for="BrickPart-ldrawPartId" id="label-BrickPart-ldrawPartId"><span class="text-danger">*</span>Ldraw Part Id</label>
                                <input type="text" id="BrickPart-ldrawPartId" formControlName="ldrawPartId" placeholder="Enter Ldraw Part Id" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-ldrawPartId" />
                                <div *ngIf="brickPartForm.get('ldrawPartId')?.invalid && brickPartForm.get('ldrawPartId')?.touched" class="text-danger">
                                    Ldraw Part Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('ldrawTitle')">
                                <label for="BrickPart-ldrawTitle" id="label-BrickPart-ldrawTitle">Ldraw Title</label>
                                <input type="text" id="BrickPart-ldrawTitle" formControlName="ldrawTitle" placeholder="Enter Ldraw Title" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-ldrawTitle" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('ldrawCategory')">
                                <label for="BrickPart-ldrawCategory" id="label-BrickPart-ldrawCategory">Ldraw Category</label>
                                <input type="text" id="BrickPart-ldrawCategory" formControlName="ldrawCategory" placeholder="Enter Ldraw Category" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-ldrawCategory" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('partTypeId')">
                                <label for="BrickPart-partTypeId" id="label-BrickPart-partTypeId"><span class="text-danger">*</span>Part Type</label>
                                <select id="BrickPart-partTypeId" formControlName="partTypeId" class="form-select brick-part-select" [disabled]="!userIsBMCBrickPartWriter()">
                                    <option [ngValue]="null">Select Part Type</option>
                                    <option *ngFor="let partType of partTypes$ | async" [ngValue]="partType.id">{{partType.name}}</option>
                                </select>
                                <div *ngIf="brickPartForm.get('partTypeId')?.invalid && brickPartForm.get('partTypeId')?.touched" class="text-danger">
                                    Part Type is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('keywords')">
                                <label for="BrickPart-keywords" id="label-BrickPart-keywords">Keywords</label>
                                <textarea id="BrickPart-keywords" formControlName="keywords" placeholder="Enter Keywords" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('author')">
                                <label for="BrickPart-author" id="label-BrickPart-author">Author</label>
                                <input type="text" id="BrickPart-author" formControlName="author" placeholder="Enter Author" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-author" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('brickCategoryId')">
                                <label for="BrickPart-brickCategoryId" id="label-BrickPart-brickCategoryId"><span class="text-danger">*</span>Brick Category</label>
                                <select id="BrickPart-brickCategoryId" formControlName="brickCategoryId" class="form-select brick-part-select" [disabled]="!userIsBMCBrickPartWriter()">
                                    <option [ngValue]="null">Select Brick Category</option>
                                    <option *ngFor="let brickCategory of brickCategories$ | async" [ngValue]="brickCategory.id">{{brickCategory.name}}</option>
                                </select>
                                <div *ngIf="brickPartForm.get('brickCategoryId')?.invalid && brickPartForm.get('brickCategoryId')?.touched" class="text-danger">
                                    Brick Category is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('rebrickablePartNum')">
                                <label for="BrickPart-rebrickablePartNum" id="label-BrickPart-rebrickablePartNum">Rebrickable Part Num</label>
                                <input type="text" id="BrickPart-rebrickablePartNum" formControlName="rebrickablePartNum" placeholder="Enter Rebrickable Part Num" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-rebrickablePartNum" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('widthLdu')">
                                <label for="BrickPart-widthLdu" id="label-BrickPart-widthLdu">Width Ldu</label>
                                <input type="number" id="BrickPart-widthLdu" formControlName="widthLdu" placeholder="Enter Width Ldu" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-widthLdu" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('heightLdu')">
                                <label for="BrickPart-heightLdu" id="label-BrickPart-heightLdu">Height Ldu</label>
                                <input type="number" id="BrickPart-heightLdu" formControlName="heightLdu" placeholder="Enter Height Ldu" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-heightLdu" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('depthLdu')">
                                <label for="BrickPart-depthLdu" id="label-BrickPart-depthLdu">Depth Ldu</label>
                                <input type="number" id="BrickPart-depthLdu" formControlName="depthLdu" placeholder="Enter Depth Ldu" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-depthLdu" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('massGrams')">
                                <label for="BrickPart-massGrams" id="label-BrickPart-massGrams">Mass Grams</label>
                                <input type="number" id="BrickPart-massGrams" formControlName="massGrams" placeholder="Enter Mass Grams" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-massGrams" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('geometryFilePath')">
                                <label for="BrickPart-geometryFilePath" id="label-BrickPart-geometryFilePath">Geometry File Path</label>
                                <input type="text" id="BrickPart-geometryFilePath" formControlName="geometryFilePath" placeholder="Enter Geometry File Path" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-geometryFilePath" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('toothCount')">
                                <label for="BrickPart-toothCount" id="label-BrickPart-toothCount">Tooth Count</label>
                                <input type="number" id="BrickPart-toothCount" formControlName="toothCount" placeholder="Enter Tooth Count" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-toothCount" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('gearRatio')">
                                <label for="BrickPart-gearRatio" id="label-BrickPart-gearRatio">Gear Ratio</label>
                                <input type="number" id="BrickPart-gearRatio" formControlName="gearRatio" placeholder="Enter Gear Ratio" class="form-control brick-part-input" [disabled]="!userIsBMCBrickPartWriter()" aria-labelledby="label-gearRatio" />
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="BrickPart-versionNumber" id="label-BrickPart-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="BrickPart-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control brick-part-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BrickPart-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCBrickPartWriter()" />
                                <label for="BrickPart-active" class="form-check-label" id="label-BrickPart-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BrickPart-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCBrickPartWriter()" />
                                <label for="BrickPart-deleted" class="form-check-label" id="label-BrickPart-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="brick-part-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="brickPartForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Brick Part">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !brickPartForm.valid || !brickPartForm.dirty || brickPartForm.pristine  || userIsBMCBrickPartWriter() == false " ngbTooltip="Save the Brick Part changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Brick Part' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCBrickPartReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 brick-part-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="brickPartChangeHistoryService.userIsBMCBrickPartChangeHistoryReader()">
                            <button ngbNavLink>Brick Part Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (brickPartData?.BrickPartChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-brick-part-change-history-table [queryParams]="{ brickPartId: brickPartData?.id }"></app-brick-part-change-history-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-brick-part-change-history-add-edit [preSeededData]="{ brickPartId: brickPartData?.id }" [hiddenFields]="['brickPartId']"></app-brick-part-change-history-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="brickPartConnectorService.userIsBMCBrickPartConnectorReader()">
                            <button ngbNavLink>Brick Part Connectors
                                <span class="badge bg-primary ms-2">
                                    {{ (brickPartData?.BrickPartConnectorsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-brick-part-connector-table [queryParams]="{ brickPartId: brickPartData?.id }"></app-brick-part-connector-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-brick-part-connector-add-edit [preSeededData]="{ brickPartId: brickPartData?.id }" [hiddenFields]="['brickPartId']"></app-brick-part-connector-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="brickPartColourService.userIsBMCBrickPartColourReader()">
                            <button ngbNavLink>Brick Part Colours
                                <span class="badge bg-primary ms-2">
                                    {{ (brickPartData?.BrickPartColoursCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-brick-part-colour-table [queryParams]="{ brickPartId: brickPartData?.id }"></app-brick-part-colour-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-brick-part-colour-add-edit [preSeededData]="{ brickPartId: brickPartData?.id }" [hiddenFields]="['brickPartId']"></app-brick-part-colour-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="placedBrickService.userIsBMCPlacedBrickReader()">
                            <button ngbNavLink>Placed Bricks
                                <span class="badge bg-primary ms-2">
                                    {{ (brickPartData?.PlacedBricksCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-placed-brick-table [queryParams]="{ brickPartId: brickPartData?.id }"></app-placed-brick-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-placed-brick-add-edit [preSeededData]="{ brickPartId: brickPartData?.id }" [hiddenFields]="['brickPartId']"></app-placed-brick-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="legoSetPartService.userIsBMCLegoSetPartReader()">
                            <button ngbNavLink>Lego Set Parts
                                <span class="badge bg-primary ms-2">
                                    {{ (brickPartData?.LegoSetPartsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-lego-set-part-table [queryParams]="{ brickPartId: brickPartData?.id }"></app-lego-set-part-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-lego-set-part-add-edit [preSeededData]="{ brickPartId: brickPartData?.id }" [hiddenFields]="['brickPartId']"></app-lego-set-part-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="brickPartRelationshipService.userIsBMCBrickPartRelationshipReader()">
                            <button ngbNavLink>Brick Part Relationships Child Brick Parts
                                <span class="badge bg-primary ms-2">
                                    {{ (brickPartData?.BrickPartRelationshipChildBrickPartsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-brick-part-relationship-table [queryParams]="{ childBrickPartId: brickPartData?.id }"></app-brick-part-relationship-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-brick-part-relationship-add-edit [preSeededData]="{ childBrickPartId: brickPartData?.id }" [hiddenFields]="['childBrickPartId']"></app-brick-part-relationship-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="brickPartRelationshipService.userIsBMCBrickPartRelationshipReader()">
                            <button ngbNavLink>Brick Part Relationships Parent Brick Parts
                                <span class="badge bg-primary ms-2">
                                    {{ (brickPartData?.BrickPartRelationshipParentBrickPartsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-brick-part-relationship-table [queryParams]="{ parentBrickPartId: brickPartData?.id }"></app-brick-part-relationship-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-brick-part-relationship-add-edit [preSeededData]="{ parentBrickPartId: brickPartData?.id }" [hiddenFields]="['parentBrickPartId']"></app-brick-part-relationship-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="brickElementService.userIsBMCBrickElementReader()">
                            <button ngbNavLink>Brick Elements
                                <span class="badge bg-primary ms-2">
                                    {{ (brickPartData?.BrickElementsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-brick-element-table [queryParams]="{ brickPartId: brickPartData?.id }"></app-brick-element-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-brick-element-add-edit [preSeededData]="{ brickPartId: brickPartData?.id }" [hiddenFields]="['brickPartId']"></app-brick-element-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userCollectionPartService.userIsBMCUserCollectionPartReader()">
                            <button ngbNavLink>User Collection Parts
                                <span class="badge bg-primary ms-2">
                                    {{ (brickPartData?.UserCollectionPartsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-collection-part-table [queryParams]="{ brickPartId: brickPartData?.id }"></app-user-collection-part-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-user-collection-part-add-edit [preSeededData]="{ brickPartId: brickPartData?.id }" [hiddenFields]="['brickPartId']"></app-user-collection-part-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userWishlistItemService.userIsBMCUserWishlistItemReader()">
                            <button ngbNavLink>User Wishlist Items
                                <span class="badge bg-primary ms-2">
                                    {{ (brickPartData?.UserWishlistItemsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-wishlist-item-table [queryParams]="{ brickPartId: brickPartData?.id }"></app-user-wishlist-item-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-user-wishlist-item-add-edit [preSeededData]="{ brickPartId: brickPartData?.id }" [hiddenFields]="['brickPartId']"></app-user-wishlist-item-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
