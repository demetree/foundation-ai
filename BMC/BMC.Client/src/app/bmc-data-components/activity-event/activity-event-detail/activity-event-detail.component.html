<div class="container-fluid p-1 m-0 activity-event-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="activity-event-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Activity Event</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Activity Event' : 'Add Activity Event'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCActivityEventReader()">
                <div class="col m-2 activity-event-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="activityEventForm" (ngSubmit)="submitForm()" class="activity-event-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('activityEventTypeId')">
                                <label for="ActivityEvent-activityEventTypeId" id="label-ActivityEvent-activityEventTypeId"><span class="text-danger">*</span>Activity Event Type</label>
                                <select id="ActivityEvent-activityEventTypeId" formControlName="activityEventTypeId" class="form-select activity-event-select" [disabled]="!userIsBMCActivityEventWriter()">
                                    <option [ngValue]="null">Select Activity Event Type</option>
                                    <option *ngFor="let activityEventType of activityEventTypes$ | async" [ngValue]="activityEventType.id">{{activityEventType.name}}</option>
                                </select>
                                <div *ngIf="activityEventForm.get('activityEventTypeId')?.invalid && activityEventForm.get('activityEventTypeId')?.touched" class="text-danger">
                                    Activity Event Type is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('title')">
                                <label for="ActivityEvent-title" id="label-ActivityEvent-title"><span class="text-danger">*</span>Title</label>
                                <input type="text" id="ActivityEvent-title" formControlName="title" placeholder="Enter Title" class="form-control activity-event-input" [disabled]="!userIsBMCActivityEventWriter()" aria-labelledby="label-title" />
                                <div *ngIf="activityEventForm.get('title')?.invalid && activityEventForm.get('title')?.touched" class="text-danger">
                                    Title is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="ActivityEvent-description" id="label-ActivityEvent-description">Description</label>
                                <textarea id="ActivityEvent-description" formControlName="description" placeholder="Enter Description" class="form-control activity-event-input" [disabled]="!userIsBMCActivityEventWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('relatedEntityType')">
                                <label for="ActivityEvent-relatedEntityType" id="label-ActivityEvent-relatedEntityType">Related Entity Type</label>
                                <input type="text" id="ActivityEvent-relatedEntityType" formControlName="relatedEntityType" placeholder="Enter Related Entity Type" class="form-control activity-event-input" [disabled]="!userIsBMCActivityEventWriter()" aria-labelledby="label-relatedEntityType" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('relatedEntityId')">
                                <label for="ActivityEvent-relatedEntityId" id="label-ActivityEvent-relatedEntityId">Related Entity Id</label>
                                <input type="number" id="ActivityEvent-relatedEntityId" formControlName="relatedEntityId" placeholder="Enter Related Entity Id" class="form-control activity-event-input" [disabled]="!userIsBMCActivityEventWriter()" aria-labelledby="label-relatedEntityId" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('eventDate')">
                                <label for="ActivityEvent-eventDate" id="label-ActivityEvent-eventDate"><span class="text-danger">*</span>Event Date</label>
                                <input type="datetime-local" id="ActivityEvent-eventDate" formControlName="eventDate" placeholder="Enter Event Date" class="form-control activity-event-input" [disabled]="!userIsBMCActivityEventWriter()" aria-labelledby="label-eventDate" />
                                <div *ngIf="activityEventForm.get('eventDate')?.invalid && activityEventForm.get('eventDate')?.touched" class="text-danger">
                                    Event Date is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isPublic')">
                                <input type="checkbox" id="ActivityEvent-isPublic" formControlName="isPublic" class="form-check-input" [disabled]="!userIsBMCActivityEventWriter()" />
                                <label for="ActivityEvent-isPublic" class="form-check-label" id="label-ActivityEvent-isPublic"><span class="text-danger">*</span>Is Public</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ActivityEvent-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCActivityEventWriter()" />
                                <label for="ActivityEvent-active" class="form-check-label" id="label-ActivityEvent-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ActivityEvent-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCActivityEventWriter()" />
                                <label for="ActivityEvent-deleted" class="form-check-label" id="label-ActivityEvent-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="activity-event-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="activityEventForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Activity Event">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !activityEventForm.valid || !activityEventForm.dirty || activityEventForm.pristine  || userIsBMCActivityEventWriter() == false " ngbTooltip="Save the Activity Event changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Activity Event' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
