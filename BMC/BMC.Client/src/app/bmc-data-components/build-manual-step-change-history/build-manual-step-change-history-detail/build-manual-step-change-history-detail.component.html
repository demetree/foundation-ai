<div class="container-fluid p-1 m-0 build-manual-step-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="build-manual-step-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Build Manual Step Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Build Manual Step Change History' : 'Add Build Manual Step Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCBuildManualStepChangeHistoryReader()">
                <div class="col m-2 build-manual-step-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="buildManualStepChangeHistoryForm" (ngSubmit)="submitForm()" class="build-manual-step-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('buildManualStepId')">
                                <label for="BuildManualStepChangeHistory-buildManualStepId" id="label-BuildManualStepChangeHistory-buildManualStepId"><span class="text-danger">*</span>Build Manual Step</label>
                                <select id="BuildManualStepChangeHistory-buildManualStepId" formControlName="buildManualStepId" class="form-select build-manual-step-change-history-select" [disabled]="!userIsBMCBuildManualStepChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Build Manual Step</option>
                                    <option *ngFor="let buildManualStep of buildManualSteps$ | async" [ngValue]="buildManualStep.id">{{buildManualStep.renderImagePath}}</option>
                                </select>
                                <div *ngIf="buildManualStepChangeHistoryForm.get('buildManualStepId')?.invalid && buildManualStepChangeHistoryForm.get('buildManualStepId')?.touched" class="text-danger">
                                    Build Manual Step is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="BuildManualStepChangeHistory-versionNumber" id="label-BuildManualStepChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="BuildManualStepChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control build-manual-step-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="BuildManualStepChangeHistory-timeStamp" id="label-BuildManualStepChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="BuildManualStepChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control build-manual-step-change-history-input" [disabled]="!userIsBMCBuildManualStepChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="buildManualStepChangeHistoryForm.get('timeStamp')?.invalid && buildManualStepChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="BuildManualStepChangeHistory-userId" id="label-BuildManualStepChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="BuildManualStepChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control build-manual-step-change-history-input" [disabled]="!userIsBMCBuildManualStepChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="buildManualStepChangeHistoryForm.get('userId')?.invalid && buildManualStepChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="BuildManualStepChangeHistory-data" id="label-BuildManualStepChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="BuildManualStepChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control build-manual-step-change-history-input" [disabled]="!userIsBMCBuildManualStepChangeHistoryWriter()"></textarea>
                                <div *ngIf="buildManualStepChangeHistoryForm.get('data')?.invalid && buildManualStepChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="build-manual-step-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="buildManualStepChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Build Manual Step Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !buildManualStepChangeHistoryForm.valid || !buildManualStepChangeHistoryForm.dirty || buildManualStepChangeHistoryForm.pristine  || userIsBMCBuildManualStepChangeHistoryWriter() == false " ngbTooltip="Save the Build Manual Step Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Build Manual Step Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
