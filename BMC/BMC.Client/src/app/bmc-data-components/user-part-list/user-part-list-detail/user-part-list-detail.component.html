<div class="container-fluid p-1 m-0 user-part-list-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="user-part-list-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">User Part List</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit User Part List' : 'Add User Part List'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCUserPartListReader()">
                <div class="col m-2 user-part-list-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="userPartListForm" (ngSubmit)="submitForm()" class="user-part-list-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="UserPartList-name" id="label-UserPartList-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="UserPartList-name" formControlName="name" placeholder="Enter Name" class="form-control user-part-list-input" [disabled]="!userIsBMCUserPartListWriter()" aria-labelledby="label-name" />
                                <div *ngIf="userPartListForm.get('name')?.invalid && userPartListForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isBuildable')">
                                <input type="checkbox" id="UserPartList-isBuildable" formControlName="isBuildable" class="form-check-input" [disabled]="!userIsBMCUserPartListWriter()" />
                                <label for="UserPartList-isBuildable" class="form-check-label" id="label-UserPartList-isBuildable"><span class="text-danger">*</span>Is Buildable</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('rebrickableListId')">
                                <label for="UserPartList-rebrickableListId" id="label-UserPartList-rebrickableListId">Rebrickable List Id</label>
                                <input type="number" id="UserPartList-rebrickableListId" formControlName="rebrickableListId" placeholder="Enter Rebrickable List Id" class="form-control user-part-list-input" [disabled]="!userIsBMCUserPartListWriter()" aria-labelledby="label-rebrickableListId" />
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="UserPartList-versionNumber" id="label-UserPartList-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="UserPartList-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control user-part-list-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="UserPartList-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCUserPartListWriter()" />
                                <label for="UserPartList-active" class="form-check-label" id="label-UserPartList-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="UserPartList-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCUserPartListWriter()" />
                                <label for="UserPartList-deleted" class="form-check-label" id="label-UserPartList-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="user-part-list-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="userPartListForm.pristine" (click)="loadData(true)" ngbTooltip="Reload User Part List">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !userPartListForm.valid || !userPartListForm.dirty || userPartListForm.pristine  || userIsBMCUserPartListWriter() == false " ngbTooltip="Save the User Part List changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add User Part List' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCUserPartListReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 user-part-list-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="userPartListChangeHistoryService.userIsBMCUserPartListChangeHistoryReader()">
                            <button ngbNavLink>User Part List Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (userPartListData?.UserPartListChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-part-list-change-history-table [queryParams]="{ userPartListId: userPartListData?.id }" [showAddButton]="true" [preSeededData]="{ userPartListId: userPartListData?.id }" [hiddenFields]="['userPartListId']"></app-user-part-list-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userPartListItemService.userIsBMCUserPartListItemReader()">
                            <button ngbNavLink>User Part List Items
                                <span class="badge bg-primary ms-2">
                                    {{ (userPartListData?.UserPartListItemsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-part-list-item-table [queryParams]="{ userPartListId: userPartListData?.id }" [showAddButton]="true" [preSeededData]="{ userPartListId: userPartListData?.id }" [hiddenFields]="['userPartListId']"></app-user-part-list-item-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
