<div class="container-fluid p-1 m-0 moc-favourite-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="moc-favourite-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Moc Favourite</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Moc Favourite' : 'Add Moc Favourite'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCMocFavouriteReader()">
                <div class="col m-2 moc-favourite-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="mocFavouriteForm" (ngSubmit)="submitForm()" class="moc-favourite-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('publishedMocId')">
                                <label for="MocFavourite-publishedMocId" id="label-MocFavourite-publishedMocId"><span class="text-danger">*</span>Published Moc</label>
                                <select id="MocFavourite-publishedMocId" formControlName="publishedMocId" class="form-select moc-favourite-select" [disabled]="!userIsBMCMocFavouriteWriter()">
                                    <option [ngValue]="null">Select Published Moc</option>
                                    <option *ngFor="let publishedMoc of publishedMocs$ | async" [ngValue]="publishedMoc.id">{{publishedMoc.name}}</option>
                                </select>
                                <div *ngIf="mocFavouriteForm.get('publishedMocId')?.invalid && mocFavouriteForm.get('publishedMocId')?.touched" class="text-danger">
                                    Published Moc is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userTenantGuid')">
                                <label for="MocFavourite-userTenantGuid" id="label-MocFavourite-userTenantGuid"><span class="text-danger">*</span>User Tenant Guid</label>
                                <input type="text" id="MocFavourite-userTenantGuid" formControlName="userTenantGuid" placeholder="Enter User Tenant Guid" class="form-control moc-favourite-input" [disabled]="!userIsBMCMocFavouriteWriter()" aria-labelledby="label-userTenantGuid" />
                                <div *ngIf="mocFavouriteForm.get('userTenantGuid')?.invalid && mocFavouriteForm.get('userTenantGuid')?.touched" class="text-danger">
                                    User Tenant Guid is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('favouritedDate')">
                                <label for="MocFavourite-favouritedDate" id="label-MocFavourite-favouritedDate"><span class="text-danger">*</span>Favourited Date</label>
                                <input type="datetime-local" id="MocFavourite-favouritedDate" formControlName="favouritedDate" placeholder="Enter Favourited Date" class="form-control moc-favourite-input" [disabled]="!userIsBMCMocFavouriteWriter()" aria-labelledby="label-favouritedDate" />
                                <div *ngIf="mocFavouriteForm.get('favouritedDate')?.invalid && mocFavouriteForm.get('favouritedDate')?.touched" class="text-danger">
                                    Favourited Date is required
                                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="MocFavourite-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCMocFavouriteWriter()" />
                                <label for="MocFavourite-active" class="form-check-label" id="label-MocFavourite-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="MocFavourite-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCMocFavouriteWriter()" />
                                <label for="MocFavourite-deleted" class="form-check-label" id="label-MocFavourite-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="moc-favourite-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="mocFavouriteForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Moc Favourite">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !mocFavouriteForm.valid || !mocFavouriteForm.dirty || mocFavouriteForm.pristine  || userIsBMCMocFavouriteWriter() == false " ngbTooltip="Save the Moc Favourite changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Moc Favourite' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
