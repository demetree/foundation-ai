<div class="add-shared-instruction-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-shared-instruction-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Shared Instruction Change History" 
        *ngIf="userIsBMCSharedInstructionChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #sharedInstructionChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light shared-instruction-change-history-modal-header">
      <h5 class="modal-title mb-0" id="sharedInstructionChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Shared Instruction Change History' : 'Add Shared Instruction Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body shared-instruction-change-history-modal-body">
      <form [formGroup]="sharedInstructionChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('sharedInstructionId')">
                <label for="SharedInstructionChangeHistory-sharedInstructionId" id="label-SharedInstructionChangeHistory-sharedInstructionId"><span class="text-danger">*</span>Shared Instruction</label>
                <select id="SharedInstructionChangeHistory-sharedInstructionId" formControlName="sharedInstructionId" class="form-select shared-instruction-change-history-select" [disabled]="!userIsBMCSharedInstructionChangeHistoryWriter()">
                    <option [ngValue]="null">Select Shared Instruction</option>
                    <option *ngFor="let sharedInstruction of sharedInstructions$ | async" [ngValue]="sharedInstruction.id">{{sharedInstruction.name}}</option>
                </select>
                <div *ngIf="sharedInstructionChangeHistoryForm.get('sharedInstructionId')?.invalid && sharedInstructionChangeHistoryForm.get('sharedInstructionId')?.touched" class="text-danger">
                    Shared Instruction is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="SharedInstructionChangeHistory-versionNumber" id="label-SharedInstructionChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="SharedInstructionChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control shared-instruction-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="SharedInstructionChangeHistory-timeStamp" id="label-SharedInstructionChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="SharedInstructionChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control shared-instruction-change-history-input" [disabled]="!userIsBMCSharedInstructionChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="sharedInstructionChangeHistoryForm.get('timeStamp')?.invalid && sharedInstructionChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="SharedInstructionChangeHistory-userId" id="label-SharedInstructionChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="SharedInstructionChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control shared-instruction-change-history-input" [disabled]="!userIsBMCSharedInstructionChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="sharedInstructionChangeHistoryForm.get('userId')?.invalid && sharedInstructionChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="SharedInstructionChangeHistory-data" id="label-SharedInstructionChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="SharedInstructionChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control shared-instruction-change-history-input" [disabled]="!userIsBMCSharedInstructionChangeHistoryWriter()"></textarea>
                <div *ngIf="sharedInstructionChangeHistoryForm.get('data')?.invalid && sharedInstructionChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer shared-instruction-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Shared Instruction Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !sharedInstructionChangeHistoryForm.valid || sharedInstructionChangeHistoryForm.pristine  || userIsBMCSharedInstructionChangeHistoryWriter() == false " ngbTooltip="Save the Shared Instruction Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Shared Instruction Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
