<div class="container-fluid p-1 m-0 lego-theme-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="lego-theme-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Lego Theme</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Lego Theme' : 'Add Lego Theme'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCLegoThemeReader()">
                <div class="col m-2 lego-theme-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="legoThemeForm" (ngSubmit)="submitForm()" class="lego-theme-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="LegoTheme-name" id="label-LegoTheme-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="LegoTheme-name" formControlName="name" placeholder="Enter Name" class="form-control lego-theme-input" [disabled]="!userIsBMCLegoThemeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="legoThemeForm.get('name')?.invalid && legoThemeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="LegoTheme-description" id="label-LegoTheme-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="LegoTheme-description" formControlName="description" placeholder="Enter Description" class="form-control lego-theme-input" [disabled]="!userIsBMCLegoThemeWriter()"></textarea>
                                <div *ngIf="legoThemeForm.get('description')?.invalid && legoThemeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('legoThemeId')">
                                <label for="LegoTheme-legoThemeId" id="label-LegoTheme-legoThemeId">Lego Theme</label>
                                <select id="LegoTheme-legoThemeId" formControlName="legoThemeId" class="form-select lego-theme-select" [disabled]="!userIsBMCLegoThemeWriter()">
                                    <option [ngValue]="null">Select Lego Theme</option>
                                    <option *ngFor="let legoTheme of legoThemes$ | async" [ngValue]="legoTheme.id">{{legoTheme.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('rebrickableThemeId')">
                                <label for="LegoTheme-rebrickableThemeId" id="label-LegoTheme-rebrickableThemeId">Rebrickable Theme Id</label>
                                <input type="number" id="LegoTheme-rebrickableThemeId" formControlName="rebrickableThemeId" placeholder="Enter Rebrickable Theme Id" class="form-control lego-theme-input" [disabled]="!userIsBMCLegoThemeWriter()" aria-labelledby="label-rebrickableThemeId" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="LegoTheme-sequence" id="label-LegoTheme-sequence">Sequence</label>
                                <input type="number" id="LegoTheme-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control lego-theme-input" [disabled]="!userIsBMCLegoThemeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="LegoTheme-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCLegoThemeWriter()" />
                                <label for="LegoTheme-active" class="form-check-label" id="label-LegoTheme-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="LegoTheme-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCLegoThemeWriter()" />
                                <label for="LegoTheme-deleted" class="form-check-label" id="label-LegoTheme-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="lego-theme-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="legoThemeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Lego Theme">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !legoThemeForm.valid || !legoThemeForm.dirty || legoThemeForm.pristine  || userIsBMCLegoThemeWriter() == false " ngbTooltip="Save the Lego Theme changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Lego Theme' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCLegoThemeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 lego-theme-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="legoSetService.userIsBMCLegoSetReader()">
                            <button ngbNavLink>Lego Sets
                                <span class="badge bg-primary ms-2">
                                    {{ (legoThemeData?.LegoSetsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-lego-set-table [queryParams]="{ legoThemeId: legoThemeData?.id }" [showAddButton]="true" [preSeededData]="{ legoThemeId: legoThemeData?.id }" [hiddenFields]="['legoThemeId']"></app-lego-set-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
