<div class="container-fluid p-1 m-0 build-challenge-entry-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="build-challenge-entry-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Build Challenge Entry</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Build Challenge Entry' : 'Add Build Challenge Entry'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCBuildChallengeEntryReader()">
                <div class="col m-2 build-challenge-entry-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="buildChallengeEntryForm" (ngSubmit)="submitForm()" class="build-challenge-entry-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('buildChallengeId')">
                                <label for="BuildChallengeEntry-buildChallengeId" id="label-BuildChallengeEntry-buildChallengeId"><span class="text-danger">*</span>Build Challenge</label>
                                <select id="BuildChallengeEntry-buildChallengeId" formControlName="buildChallengeId" class="form-select build-challenge-entry-select" [disabled]="!userIsBMCBuildChallengeEntryWriter()">
                                    <option [ngValue]="null">Select Build Challenge</option>
                                    <option *ngFor="let buildChallenge of buildChallenges$ | async" [ngValue]="buildChallenge.id">{{buildChallenge.name}}</option>
                                </select>
                                <div *ngIf="buildChallengeEntryForm.get('buildChallengeId')?.invalid && buildChallengeEntryForm.get('buildChallengeId')?.touched" class="text-danger">
                                    Build Challenge is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('publishedMocId')">
                                <label for="BuildChallengeEntry-publishedMocId" id="label-BuildChallengeEntry-publishedMocId"><span class="text-danger">*</span>Published Moc</label>
                                <select id="BuildChallengeEntry-publishedMocId" formControlName="publishedMocId" class="form-select build-challenge-entry-select" [disabled]="!userIsBMCBuildChallengeEntryWriter()">
                                    <option [ngValue]="null">Select Published Moc</option>
                                    <option *ngFor="let publishedMoc of publishedMocs$ | async" [ngValue]="publishedMoc.id">{{publishedMoc.name}}</option>
                                </select>
                                <div *ngIf="buildChallengeEntryForm.get('publishedMocId')?.invalid && buildChallengeEntryForm.get('publishedMocId')?.touched" class="text-danger">
                                    Published Moc is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('submittedDate')">
                                <label for="BuildChallengeEntry-submittedDate" id="label-BuildChallengeEntry-submittedDate"><span class="text-danger">*</span>Submitted Date</label>
                                <input type="datetime-local" id="BuildChallengeEntry-submittedDate" formControlName="submittedDate" placeholder="Enter Submitted Date" class="form-control build-challenge-entry-input" [disabled]="!userIsBMCBuildChallengeEntryWriter()" aria-labelledby="label-submittedDate" />
                                <div *ngIf="buildChallengeEntryForm.get('submittedDate')?.invalid && buildChallengeEntryForm.get('submittedDate')?.touched" class="text-danger">
                                    Submitted Date is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('entryNotes')">
                                <label for="BuildChallengeEntry-entryNotes" id="label-BuildChallengeEntry-entryNotes">Entry Notes</label>
                                <textarea id="BuildChallengeEntry-entryNotes" formControlName="entryNotes" placeholder="Enter Entry Notes" class="form-control build-challenge-entry-input" [disabled]="!userIsBMCBuildChallengeEntryWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('voteCount')">
                                <label for="BuildChallengeEntry-voteCount" id="label-BuildChallengeEntry-voteCount"><span class="text-danger">*</span>Vote Count</label>
                                <input type="number" id="BuildChallengeEntry-voteCount" formControlName="voteCount" placeholder="Enter Vote Count" class="form-control build-challenge-entry-input" [disabled]="!userIsBMCBuildChallengeEntryWriter()" aria-labelledby="label-voteCount" />
                                <div *ngIf="buildChallengeEntryForm.get('voteCount')?.invalid && buildChallengeEntryForm.get('voteCount')?.touched" class="text-danger">
                                    Vote Count is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isWinner')">
                                <input type="checkbox" id="BuildChallengeEntry-isWinner" formControlName="isWinner" class="form-check-input" [disabled]="!userIsBMCBuildChallengeEntryWriter()" />
                                <label for="BuildChallengeEntry-isWinner" class="form-check-label" id="label-BuildChallengeEntry-isWinner"><span class="text-danger">*</span>Is Winner</label>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isDisqualified')">
                                <input type="checkbox" id="BuildChallengeEntry-isDisqualified" formControlName="isDisqualified" class="form-check-input" [disabled]="!userIsBMCBuildChallengeEntryWriter()" />
                                <label for="BuildChallengeEntry-isDisqualified" class="form-check-label" id="label-BuildChallengeEntry-isDisqualified"><span class="text-danger">*</span>Is Disqualified</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BuildChallengeEntry-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCBuildChallengeEntryWriter()" />
                                <label for="BuildChallengeEntry-active" class="form-check-label" id="label-BuildChallengeEntry-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BuildChallengeEntry-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCBuildChallengeEntryWriter()" />
                                <label for="BuildChallengeEntry-deleted" class="form-check-label" id="label-BuildChallengeEntry-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="build-challenge-entry-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="buildChallengeEntryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Build Challenge Entry">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !buildChallengeEntryForm.valid || !buildChallengeEntryForm.dirty || buildChallengeEntryForm.pristine  || userIsBMCBuildChallengeEntryWriter() == false " ngbTooltip="Save the Build Challenge Entry changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Build Challenge Entry' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
