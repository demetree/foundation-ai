<div class="container-fluid p-1 m-0 submodel-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="submodel-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Submodel</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Submodel' : 'Add Submodel'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCSubmodelReader()">
                <div class="col m-2 submodel-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="submodelForm" (ngSubmit)="submitForm()" class="submodel-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('projectId')">
                                <label for="Submodel-projectId" id="label-Submodel-projectId"><span class="text-danger">*</span>Project</label>
                                <select id="Submodel-projectId" formControlName="projectId" class="form-select submodel-select" [disabled]="!userIsBMCSubmodelWriter()">
                                    <option [ngValue]="null">Select Project</option>
                                    <option *ngFor="let project of projects$ | async" [ngValue]="project.id">{{project.name}}</option>
                                </select>
                                <div *ngIf="submodelForm.get('projectId')?.invalid && submodelForm.get('projectId')?.touched" class="text-danger">
                                    Project is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="Submodel-name" id="label-Submodel-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="Submodel-name" formControlName="name" placeholder="Enter Name" class="form-control submodel-input" [disabled]="!userIsBMCSubmodelWriter()" aria-labelledby="label-name" />
                                <div *ngIf="submodelForm.get('name')?.invalid && submodelForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="Submodel-description" id="label-Submodel-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="Submodel-description" formControlName="description" placeholder="Enter Description" class="form-control submodel-input" [disabled]="!userIsBMCSubmodelWriter()"></textarea>
                                <div *ngIf="submodelForm.get('description')?.invalid && submodelForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('submodelId')">
                                <label for="Submodel-submodelId" id="label-Submodel-submodelId">Submodel</label>
                                <select id="Submodel-submodelId" formControlName="submodelId" class="form-select submodel-select" [disabled]="!userIsBMCSubmodelWriter()">
                                    <option [ngValue]="null">Select Submodel</option>
                                    <option *ngFor="let submodel of submodels$ | async" [ngValue]="submodel.id">{{submodel.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="Submodel-sequence" id="label-Submodel-sequence">Sequence</label>
                                <input type="number" id="Submodel-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control submodel-input" [disabled]="!userIsBMCSubmodelWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="Submodel-versionNumber" id="label-Submodel-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="Submodel-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control submodel-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Submodel-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCSubmodelWriter()" />
                                <label for="Submodel-active" class="form-check-label" id="label-Submodel-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Submodel-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCSubmodelWriter()" />
                                <label for="Submodel-deleted" class="form-check-label" id="label-Submodel-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="submodel-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="submodelForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Submodel">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !submodelForm.valid || !submodelForm.dirty || submodelForm.pristine  || userIsBMCSubmodelWriter() == false " ngbTooltip="Save the Submodel changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Submodel' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCSubmodelReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 submodel-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="submodelChangeHistoryService.userIsBMCSubmodelChangeHistoryReader()">
                            <button ngbNavLink>Submodel Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (submodelData?.SubmodelChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-submodel-change-history-table [queryParams]="{ submodelId: submodelData?.id }" [showAddButton]="true" [preSeededData]="{ submodelId: submodelData?.id }" [hiddenFields]="['submodelId']"></app-submodel-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="submodelPlacedBrickService.userIsBMCSubmodelPlacedBrickReader()">
                            <button ngbNavLink>Submodel Placed Bricks
                                <span class="badge bg-primary ms-2">
                                    {{ (submodelData?.SubmodelPlacedBricksCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-submodel-placed-brick-table [queryParams]="{ submodelId: submodelData?.id }" [showAddButton]="true" [preSeededData]="{ submodelId: submodelData?.id }" [hiddenFields]="['submodelId']"></app-submodel-placed-brick-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
