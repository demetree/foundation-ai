<div class="container-fluid p-1 m-0 platform-announcement-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="platform-announcement-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Platform Announcement</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Platform Announcement' : 'Add Platform Announcement'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCPlatformAnnouncementReader()">
                <div class="col m-2 platform-announcement-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="platformAnnouncementForm" (ngSubmit)="submitForm()" class="platform-announcement-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="PlatformAnnouncement-name" id="label-PlatformAnnouncement-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="PlatformAnnouncement-name" formControlName="name" placeholder="Enter Name" class="form-control platform-announcement-input" [disabled]="!userIsBMCPlatformAnnouncementWriter()" aria-labelledby="label-name" />
                                <div *ngIf="platformAnnouncementForm.get('name')?.invalid && platformAnnouncementForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('body')">
                                <label for="PlatformAnnouncement-body" id="label-PlatformAnnouncement-body">Body</label>
                                <textarea id="PlatformAnnouncement-body" formControlName="body" placeholder="Enter Body" class="form-control platform-announcement-input" [disabled]="!userIsBMCPlatformAnnouncementWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('announcementType')">
                                <label for="PlatformAnnouncement-announcementType" id="label-PlatformAnnouncement-announcementType">Announcement Type</label>
                                <input type="text" id="PlatformAnnouncement-announcementType" formControlName="announcementType" placeholder="Enter Announcement Type" class="form-control platform-announcement-input" [disabled]="!userIsBMCPlatformAnnouncementWriter()" aria-labelledby="label-announcementType" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('startDate')">
                                <label for="PlatformAnnouncement-startDate" id="label-PlatformAnnouncement-startDate"><span class="text-danger">*</span>Start Date</label>
                                <input type="datetime-local" id="PlatformAnnouncement-startDate" formControlName="startDate" placeholder="Enter Start Date" class="form-control platform-announcement-input" [disabled]="!userIsBMCPlatformAnnouncementWriter()" aria-labelledby="label-startDate" />
                                <div *ngIf="platformAnnouncementForm.get('startDate')?.invalid && platformAnnouncementForm.get('startDate')?.touched" class="text-danger">
                                    Start Date is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('endDate')">
                                <label for="PlatformAnnouncement-endDate" id="label-PlatformAnnouncement-endDate">End Date</label>
                                <input type="datetime-local" id="PlatformAnnouncement-endDate" formControlName="endDate" placeholder="Enter End Date" class="form-control platform-announcement-input" [disabled]="!userIsBMCPlatformAnnouncementWriter()" aria-labelledby="label-endDate" />
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isActive')">
                                <input type="checkbox" id="PlatformAnnouncement-isActive" formControlName="isActive" class="form-check-input" [disabled]="!userIsBMCPlatformAnnouncementWriter()" />
                                <label for="PlatformAnnouncement-isActive" class="form-check-label" id="label-PlatformAnnouncement-isActive"><span class="text-danger">*</span>Is Active</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('priority')">
                                <label for="PlatformAnnouncement-priority" id="label-PlatformAnnouncement-priority"><span class="text-danger">*</span>Priority</label>
                                <input type="number" id="PlatformAnnouncement-priority" formControlName="priority" placeholder="Enter Priority" class="form-control platform-announcement-input" [disabled]="!userIsBMCPlatformAnnouncementWriter()" aria-labelledby="label-priority" />
                                <div *ngIf="platformAnnouncementForm.get('priority')?.invalid && platformAnnouncementForm.get('priority')?.touched" class="text-danger">
                                    Priority is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('showOnLandingPage')">
                                <input type="checkbox" id="PlatformAnnouncement-showOnLandingPage" formControlName="showOnLandingPage" class="form-check-input" [disabled]="!userIsBMCPlatformAnnouncementWriter()" />
                                <label for="PlatformAnnouncement-showOnLandingPage" class="form-check-label" id="label-PlatformAnnouncement-showOnLandingPage"><span class="text-danger">*</span>Show On Landing Page</label>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('showOnDashboard')">
                                <input type="checkbox" id="PlatformAnnouncement-showOnDashboard" formControlName="showOnDashboard" class="form-check-input" [disabled]="!userIsBMCPlatformAnnouncementWriter()" />
                                <label for="PlatformAnnouncement-showOnDashboard" class="form-check-label" id="label-PlatformAnnouncement-showOnDashboard"><span class="text-danger">*</span>Show On Dashboard</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="PlatformAnnouncement-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCPlatformAnnouncementWriter()" />
                                <label for="PlatformAnnouncement-active" class="form-check-label" id="label-PlatformAnnouncement-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="PlatformAnnouncement-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCPlatformAnnouncementWriter()" />
                                <label for="PlatformAnnouncement-deleted" class="form-check-label" id="label-PlatformAnnouncement-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="platform-announcement-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="platformAnnouncementForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Platform Announcement">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !platformAnnouncementForm.valid || !platformAnnouncementForm.dirty || platformAnnouncementForm.pristine  || userIsBMCPlatformAnnouncementWriter() == false " ngbTooltip="Save the Platform Announcement changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Platform Announcement' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
