<div class="container-fluid p-1 m-0 user-collection-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="user-collection-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">User Collection</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit User Collection' : 'Add User Collection'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCUserCollectionReader()">
                <div class="col m-2 user-collection-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="userCollectionForm" (ngSubmit)="submitForm()" class="user-collection-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="UserCollection-name" id="label-UserCollection-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="UserCollection-name" formControlName="name" placeholder="Enter Name" class="form-control user-collection-input" [disabled]="!userIsBMCUserCollectionWriter()" aria-labelledby="label-name" />
                                <div *ngIf="userCollectionForm.get('name')?.invalid && userCollectionForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="UserCollection-description" id="label-UserCollection-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="UserCollection-description" formControlName="description" placeholder="Enter Description" class="form-control user-collection-input" [disabled]="!userIsBMCUserCollectionWriter()"></textarea>
                                <div *ngIf="userCollectionForm.get('description')?.invalid && userCollectionForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isDefault')">
                                <input type="checkbox" id="UserCollection-isDefault" formControlName="isDefault" class="form-check-input" [disabled]="!userIsBMCUserCollectionWriter()" />
                                <label for="UserCollection-isDefault" class="form-check-label" id="label-UserCollection-isDefault"><span class="text-danger">*</span>Is Default</label>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="UserCollection-versionNumber" id="label-UserCollection-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="UserCollection-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control user-collection-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="UserCollection-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCUserCollectionWriter()" />
                                <label for="UserCollection-active" class="form-check-label" id="label-UserCollection-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="UserCollection-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCUserCollectionWriter()" />
                                <label for="UserCollection-deleted" class="form-check-label" id="label-UserCollection-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="user-collection-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="userCollectionForm.pristine" (click)="loadData(true)" ngbTooltip="Reload User Collection">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !userCollectionForm.valid || !userCollectionForm.dirty || userCollectionForm.pristine  || userIsBMCUserCollectionWriter() == false " ngbTooltip="Save the User Collection changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add User Collection' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCUserCollectionReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 user-collection-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="userCollectionChangeHistoryService.userIsBMCUserCollectionChangeHistoryReader()">
                            <button ngbNavLink>User Collection Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (userCollectionData?.UserCollectionChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-collection-change-history-table [queryParams]="{ userCollectionId: userCollectionData?.id }"></app-user-collection-change-history-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-user-collection-change-history-add-edit [preSeededData]="{ userCollectionId: userCollectionData?.id }" [hiddenFields]="['userCollectionId']"></app-user-collection-change-history-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userCollectionPartService.userIsBMCUserCollectionPartReader()">
                            <button ngbNavLink>User Collection Parts
                                <span class="badge bg-primary ms-2">
                                    {{ (userCollectionData?.UserCollectionPartsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-collection-part-table [queryParams]="{ userCollectionId: userCollectionData?.id }"></app-user-collection-part-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-user-collection-part-add-edit [preSeededData]="{ userCollectionId: userCollectionData?.id }" [hiddenFields]="['userCollectionId']"></app-user-collection-part-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userWishlistItemService.userIsBMCUserWishlistItemReader()">
                            <button ngbNavLink>User Wishlist Items
                                <span class="badge bg-primary ms-2">
                                    {{ (userCollectionData?.UserWishlistItemsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-wishlist-item-table [queryParams]="{ userCollectionId: userCollectionData?.id }"></app-user-wishlist-item-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-user-wishlist-item-add-edit [preSeededData]="{ userCollectionId: userCollectionData?.id }" [hiddenFields]="['userCollectionId']"></app-user-wishlist-item-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="userCollectionSetImportService.userIsBMCUserCollectionSetImportReader()">
                            <button ngbNavLink>User Collection Set Imports
                                <span class="badge bg-primary ms-2">
                                    {{ (userCollectionData?.UserCollectionSetImportsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-collection-set-import-table [queryParams]="{ userCollectionId: userCollectionData?.id }"></app-user-collection-set-import-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-user-collection-set-import-add-edit [preSeededData]="{ userCollectionId: userCollectionData?.id }" [hiddenFields]="['userCollectionId']"></app-user-collection-set-import-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
