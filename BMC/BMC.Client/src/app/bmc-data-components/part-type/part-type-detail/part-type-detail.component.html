<div class="container-fluid p-1 m-0 part-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="part-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Part Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Part Type' : 'Add Part Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCPartTypeReader()">
                <div class="col m-2 part-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="partTypeForm" (ngSubmit)="submitForm()" class="part-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="PartType-name" id="label-PartType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="PartType-name" formControlName="name" placeholder="Enter Name" class="form-control part-type-input" [disabled]="!userIsBMCPartTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="partTypeForm.get('name')?.invalid && partTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="PartType-description" id="label-PartType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="PartType-description" formControlName="description" placeholder="Enter Description" class="form-control part-type-input" [disabled]="!userIsBMCPartTypeWriter()"></textarea>
                                <div *ngIf="partTypeForm.get('description')?.invalid && partTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isUserVisible')">
                                <input type="checkbox" id="PartType-isUserVisible" formControlName="isUserVisible" class="form-check-input" [disabled]="!userIsBMCPartTypeWriter()" />
                                <label for="PartType-isUserVisible" class="form-check-label" id="label-PartType-isUserVisible"><span class="text-danger">*</span>Is User Visible</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="PartType-sequence" id="label-PartType-sequence">Sequence</label>
                                <input type="number" id="PartType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control part-type-input" [disabled]="!userIsBMCPartTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="PartType-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCPartTypeWriter()" />
                                <label for="PartType-active" class="form-check-label" id="label-PartType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="PartType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCPartTypeWriter()" />
                                <label for="PartType-deleted" class="form-check-label" id="label-PartType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="part-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="partTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Part Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !partTypeForm.valid || !partTypeForm.dirty || partTypeForm.pristine  || userIsBMCPartTypeWriter() == false " ngbTooltip="Save the Part Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Part Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCPartTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 part-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="brickPartService.userIsBMCBrickPartReader()">
                            <button ngbNavLink>Brick Parts
                                <span class="badge bg-primary ms-2">
                                    {{ (partTypeData?.BrickPartsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-brick-part-table [queryParams]="{ partTypeId: partTypeData?.id }"></app-brick-part-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-brick-part-add-edit [preSeededData]="{ partTypeId: partTypeData?.id }" [hiddenFields]="['partTypeId']"></app-brick-part-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
