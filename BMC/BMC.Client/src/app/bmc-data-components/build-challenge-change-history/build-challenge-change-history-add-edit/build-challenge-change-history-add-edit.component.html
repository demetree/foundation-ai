<div class="add-build-challenge-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-build-challenge-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Build Challenge Change History" 
        *ngIf="userIsBMCBuildChallengeChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #buildChallengeChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light build-challenge-change-history-modal-header">
      <h5 class="modal-title mb-0" id="buildChallengeChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Build Challenge Change History' : 'Add Build Challenge Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body build-challenge-change-history-modal-body">
      <form [formGroup]="buildChallengeChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('buildChallengeId')">
                <label for="BuildChallengeChangeHistory-buildChallengeId" id="label-BuildChallengeChangeHistory-buildChallengeId"><span class="text-danger">*</span>Build Challenge</label>
                <select id="BuildChallengeChangeHistory-buildChallengeId" formControlName="buildChallengeId" class="form-select build-challenge-change-history-select" [disabled]="!userIsBMCBuildChallengeChangeHistoryWriter()">
                    <option [ngValue]="null">Select Build Challenge</option>
                    <option *ngFor="let buildChallenge of buildChallenges$ | async" [ngValue]="buildChallenge.id">{{buildChallenge.name}}</option>
                </select>
                <div *ngIf="buildChallengeChangeHistoryForm.get('buildChallengeId')?.invalid && buildChallengeChangeHistoryForm.get('buildChallengeId')?.touched" class="text-danger">
                    Build Challenge is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="BuildChallengeChangeHistory-versionNumber" id="label-BuildChallengeChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="BuildChallengeChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control build-challenge-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="BuildChallengeChangeHistory-timeStamp" id="label-BuildChallengeChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="BuildChallengeChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control build-challenge-change-history-input" [disabled]="!userIsBMCBuildChallengeChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="buildChallengeChangeHistoryForm.get('timeStamp')?.invalid && buildChallengeChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="BuildChallengeChangeHistory-userId" id="label-BuildChallengeChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="BuildChallengeChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control build-challenge-change-history-input" [disabled]="!userIsBMCBuildChallengeChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="buildChallengeChangeHistoryForm.get('userId')?.invalid && buildChallengeChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="BuildChallengeChangeHistory-data" id="label-BuildChallengeChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="BuildChallengeChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control build-challenge-change-history-input" [disabled]="!userIsBMCBuildChallengeChangeHistoryWriter()"></textarea>
                <div *ngIf="buildChallengeChangeHistoryForm.get('data')?.invalid && buildChallengeChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer build-challenge-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Build Challenge Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !buildChallengeChangeHistoryForm.valid || buildChallengeChangeHistoryForm.pristine  || userIsBMCBuildChallengeChangeHistoryWriter() == false " ngbTooltip="Save the Build Challenge Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Build Challenge Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
