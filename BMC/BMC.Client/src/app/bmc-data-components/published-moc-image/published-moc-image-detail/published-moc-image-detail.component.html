<div class="container-fluid p-1 m-0 published-moc-image-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="published-moc-image-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Published Moc Image</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Published Moc Image' : 'Add Published Moc Image'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCPublishedMocImageReader()">
                <div class="col m-2 published-moc-image-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="publishedMocImageForm" (ngSubmit)="submitForm()" class="published-moc-image-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('publishedMocId')">
                                <label for="PublishedMocImage-publishedMocId" id="label-PublishedMocImage-publishedMocId"><span class="text-danger">*</span>Published Moc</label>
                                <select id="PublishedMocImage-publishedMocId" formControlName="publishedMocId" class="form-select published-moc-image-select" [disabled]="!userIsBMCPublishedMocImageWriter()">
                                    <option [ngValue]="null">Select Published Moc</option>
                                    <option *ngFor="let publishedMoc of publishedMocs$ | async" [ngValue]="publishedMoc.id">{{publishedMoc.name}}</option>
                                </select>
                                <div *ngIf="publishedMocImageForm.get('publishedMocId')?.invalid && publishedMocImageForm.get('publishedMocId')?.touched" class="text-danger">
                                    Published Moc is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('imagePath')">
                                <label for="PublishedMocImage-imagePath" id="label-PublishedMocImage-imagePath"><span class="text-danger">*</span>Image Path</label>
                                <input type="text" id="PublishedMocImage-imagePath" formControlName="imagePath" placeholder="Enter Image Path" class="form-control published-moc-image-input" [disabled]="!userIsBMCPublishedMocImageWriter()" aria-labelledby="label-imagePath" />
                                <div *ngIf="publishedMocImageForm.get('imagePath')?.invalid && publishedMocImageForm.get('imagePath')?.touched" class="text-danger">
                                    Image Path is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('caption')">
                                <label for="PublishedMocImage-caption" id="label-PublishedMocImage-caption">Caption</label>
                                <input type="text" id="PublishedMocImage-caption" formControlName="caption" placeholder="Enter Caption" class="form-control published-moc-image-input" [disabled]="!userIsBMCPublishedMocImageWriter()" aria-labelledby="label-caption" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="PublishedMocImage-sequence" id="label-PublishedMocImage-sequence">Sequence</label>
                                <input type="number" id="PublishedMocImage-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control published-moc-image-input" [disabled]="!userIsBMCPublishedMocImageWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="PublishedMocImage-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCPublishedMocImageWriter()" />
                                <label for="PublishedMocImage-active" class="form-check-label" id="label-PublishedMocImage-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="PublishedMocImage-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCPublishedMocImageWriter()" />
                                <label for="PublishedMocImage-deleted" class="form-check-label" id="label-PublishedMocImage-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="published-moc-image-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="publishedMocImageForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Published Moc Image">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !publishedMocImageForm.valid || !publishedMocImageForm.dirty || publishedMocImageForm.pristine  || userIsBMCPublishedMocImageWriter() == false " ngbTooltip="Save the Published Moc Image changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Published Moc Image' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
