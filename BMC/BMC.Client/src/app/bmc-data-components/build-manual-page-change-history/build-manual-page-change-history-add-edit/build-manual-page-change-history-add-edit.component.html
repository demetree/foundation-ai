<div class="add-build-manual-page-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-build-manual-page-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Build Manual Page Change History" 
        *ngIf="userIsBMCBuildManualPageChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #buildManualPageChangeHistoryModal let-modal>
   <div class="modal-header build-manual-page-change-history-modal-header">
      <h5 class="modal-title mb-0" id="buildManualPageChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Build Manual Page Change History' : 'Add Build Manual Page Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body build-manual-page-change-history-modal-body">
      <form [formGroup]="buildManualPageChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('buildManualPageId')">
                <label for="BuildManualPageChangeHistory-buildManualPageId" id="label-BuildManualPageChangeHistory-buildManualPageId"><span class="text-danger">*</span>Build Manual Page</label>
                <select id="BuildManualPageChangeHistory-buildManualPageId" formControlName="buildManualPageId" class="form-select build-manual-page-change-history-select" [disabled]="!userIsBMCBuildManualPageChangeHistoryWriter()">
                    <option [ngValue]="null">Select Build Manual Page</option>
                    <option *ngFor="let buildManualPage of buildManualPages$ | async" [ngValue]="buildManualPage.id">{{buildManualPage.title}}</option>
                </select>
                <div *ngIf="buildManualPageChangeHistoryForm.get('buildManualPageId')?.invalid && buildManualPageChangeHistoryForm.get('buildManualPageId')?.touched" class="text-danger">
                    Build Manual Page is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="BuildManualPageChangeHistory-versionNumber" id="label-BuildManualPageChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="BuildManualPageChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control build-manual-page-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="BuildManualPageChangeHistory-timeStamp" id="label-BuildManualPageChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="BuildManualPageChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control build-manual-page-change-history-input" [disabled]="!userIsBMCBuildManualPageChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="buildManualPageChangeHistoryForm.get('timeStamp')?.invalid && buildManualPageChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="BuildManualPageChangeHistory-userId" id="label-BuildManualPageChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="BuildManualPageChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control build-manual-page-change-history-input" [disabled]="!userIsBMCBuildManualPageChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="buildManualPageChangeHistoryForm.get('userId')?.invalid && buildManualPageChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="BuildManualPageChangeHistory-data" id="label-BuildManualPageChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="BuildManualPageChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control build-manual-page-change-history-input" [disabled]="!userIsBMCBuildManualPageChangeHistoryWriter()"></textarea>
                <div *ngIf="buildManualPageChangeHistoryForm.get('data')?.invalid && buildManualPageChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer build-manual-page-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Build Manual Page Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !buildManualPageChangeHistoryForm.valid || buildManualPageChangeHistoryForm.pristine  || userIsBMCBuildManualPageChangeHistoryWriter() == false " ngbTooltip="Save the Build Manual Page Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Build Manual Page Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
