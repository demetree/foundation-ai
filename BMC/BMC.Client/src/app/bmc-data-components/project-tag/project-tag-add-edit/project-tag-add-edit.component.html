<div class="add-project-tag" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-project-tag me-2"
        (click)="openModal()"
        ngbTooltip="Add Project Tag" 
        *ngIf="userIsBMCProjectTagWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #projectTagModal let-modal>
   <div class="modal-header project-tag-modal-header">
      <h5 class="modal-title mb-0" id="projectTagModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Project Tag' : 'Add Project Tag' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body project-tag-modal-body">
      <form [formGroup]="projectTagForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="ProjectTag-name" id="label-ProjectTag-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="ProjectTag-name" formControlName="name" placeholder="Enter Name" class="form-control project-tag-input" [disabled]="!userIsBMCProjectTagWriter()" aria-labelledby="label-name" />
                <div *ngIf="projectTagForm.get('name')?.invalid && projectTagForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="ProjectTag-description" id="label-ProjectTag-description"><span class="text-danger">*</span>Description</label>
                <textarea id="ProjectTag-description" formControlName="description" placeholder="Enter Description" class="form-control project-tag-input" [disabled]="!userIsBMCProjectTagWriter()"></textarea>
                <div *ngIf="projectTagForm.get('description')?.invalid && projectTagForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ProjectTag-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCProjectTagWriter()" />
                <label for="ProjectTag-active" class="form-check-label" id="label-ProjectTag-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ProjectTag-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCProjectTagWriter()" />
                <label for="ProjectTag-deleted" class="form-check-label" id="label-ProjectTag-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer project-tag-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Project Tag changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !projectTagForm.valid || projectTagForm.pristine  || userIsBMCProjectTagWriter() == false " ngbTooltip="Save the Project Tag changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Project Tag' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
