<div class="container-fluid p-1 m-0 project-tag-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="project-tag-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Project Tag</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Project Tag' : 'Add Project Tag'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCProjectTagReader()">
                <div class="col m-2 project-tag-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="projectTagForm" (ngSubmit)="submitForm()" class="project-tag-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="ProjectTag-name" id="label-ProjectTag-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="ProjectTag-name" formControlName="name" placeholder="Enter Name" class="form-control project-tag-input" [disabled]="!userIsBMCProjectTagWriter()" aria-labelledby="label-name" />
                                <div *ngIf="projectTagForm.get('name')?.invalid && projectTagForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="ProjectTag-description" id="label-ProjectTag-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="ProjectTag-description" formControlName="description" placeholder="Enter Description" class="form-control project-tag-input" [disabled]="!userIsBMCProjectTagWriter()"></textarea>
                                <div *ngIf="projectTagForm.get('description')?.invalid && projectTagForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ProjectTag-active" formControlName="active" class="form-check-input" [disabled]="!userIsBMCProjectTagWriter()" />
                                <label for="ProjectTag-active" class="form-check-label" id="label-ProjectTag-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ProjectTag-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsBMCProjectTagWriter()" />
                                <label for="ProjectTag-deleted" class="form-check-label" id="label-ProjectTag-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="project-tag-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="projectTagForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Project Tag">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !projectTagForm.valid || !projectTagForm.dirty || projectTagForm.pristine  || userIsBMCProjectTagWriter() == false " ngbTooltip="Save the Project Tag changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Project Tag' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsBMCProjectTagReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 project-tag-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="projectTagAssignmentService.userIsBMCProjectTagAssignmentReader()">
                            <button ngbNavLink>Project Tag Assignments
                                <span class="badge bg-primary ms-2">
                                    {{ (projectTagData?.ProjectTagAssignmentsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-project-tag-assignment-table [queryParams]="{ projectTagId: projectTagData?.id }"></app-project-tag-assignment-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-project-tag-assignment-add-edit [preSeededData]="{ projectTagId: projectTagData?.id }" [hiddenFields]="['projectTagId']"></app-project-tag-assignment-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
