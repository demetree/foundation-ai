<div class="container-fluid p-1 m-0 user-part-list-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="user-part-list-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">User Part List Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit User Part List Change History' : 'Add User Part List Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsBMCUserPartListChangeHistoryReader()">
                <div class="col m-2 user-part-list-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="userPartListChangeHistoryForm" (ngSubmit)="submitForm()" class="user-part-list-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('userPartListId')">
                                <label for="UserPartListChangeHistory-userPartListId" id="label-UserPartListChangeHistory-userPartListId"><span class="text-danger">*</span>User Part List</label>
                                <select id="UserPartListChangeHistory-userPartListId" formControlName="userPartListId" class="form-select user-part-list-change-history-select" [disabled]="!userIsBMCUserPartListChangeHistoryWriter()">
                                    <option [ngValue]="null">Select User Part List</option>
                                    <option *ngFor="let userPartList of userPartLists$ | async" [ngValue]="userPartList.id">{{userPartList.name}}</option>
                                </select>
                                <div *ngIf="userPartListChangeHistoryForm.get('userPartListId')?.invalid && userPartListChangeHistoryForm.get('userPartListId')?.touched" class="text-danger">
                                    User Part List is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="UserPartListChangeHistory-versionNumber" id="label-UserPartListChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="UserPartListChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control user-part-list-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="UserPartListChangeHistory-timeStamp" id="label-UserPartListChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="UserPartListChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control user-part-list-change-history-input" [disabled]="!userIsBMCUserPartListChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="userPartListChangeHistoryForm.get('timeStamp')?.invalid && userPartListChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="UserPartListChangeHistory-userId" id="label-UserPartListChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="UserPartListChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control user-part-list-change-history-input" [disabled]="!userIsBMCUserPartListChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="userPartListChangeHistoryForm.get('userId')?.invalid && userPartListChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="UserPartListChangeHistory-data" id="label-UserPartListChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="UserPartListChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control user-part-list-change-history-input" [disabled]="!userIsBMCUserPartListChangeHistoryWriter()"></textarea>
                                <div *ngIf="userPartListChangeHistoryForm.get('data')?.invalid && userPartListChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="user-part-list-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="userPartListChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload User Part List Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !userPartListChangeHistoryForm.valid || !userPartListChangeHistoryForm.dirty || userPartListChangeHistoryForm.pristine  || userIsBMCUserPartListChangeHistoryWriter() == false " ngbTooltip="Save the User Part List Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add User Part List Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
