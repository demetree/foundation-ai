<div class="add-build-manual-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-build-manual-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Build Manual Change History" 
        *ngIf="userIsBMCBuildManualChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #buildManualChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light build-manual-change-history-modal-header">
      <h5 class="modal-title mb-0" id="buildManualChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Build Manual Change History' : 'Add Build Manual Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body build-manual-change-history-modal-body">
      <form [formGroup]="buildManualChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('buildManualId')">
                <label for="BuildManualChangeHistory-buildManualId" id="label-BuildManualChangeHistory-buildManualId"><span class="text-danger">*</span>Build Manual</label>
                <select id="BuildManualChangeHistory-buildManualId" formControlName="buildManualId" class="form-select build-manual-change-history-select" [disabled]="!userIsBMCBuildManualChangeHistoryWriter()">
                    <option [ngValue]="null">Select Build Manual</option>
                    <option *ngFor="let buildManual of buildManuals$ | async" [ngValue]="buildManual.id">{{buildManual.name}}</option>
                </select>
                <div *ngIf="buildManualChangeHistoryForm.get('buildManualId')?.invalid && buildManualChangeHistoryForm.get('buildManualId')?.touched" class="text-danger">
                    Build Manual is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="BuildManualChangeHistory-versionNumber" id="label-BuildManualChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="BuildManualChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control build-manual-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="BuildManualChangeHistory-timeStamp" id="label-BuildManualChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="BuildManualChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control build-manual-change-history-input" [disabled]="!userIsBMCBuildManualChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="buildManualChangeHistoryForm.get('timeStamp')?.invalid && buildManualChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="BuildManualChangeHistory-userId" id="label-BuildManualChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="BuildManualChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control build-manual-change-history-input" [disabled]="!userIsBMCBuildManualChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="buildManualChangeHistoryForm.get('userId')?.invalid && buildManualChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="BuildManualChangeHistory-data" id="label-BuildManualChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="BuildManualChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control build-manual-change-history-input" [disabled]="!userIsBMCBuildManualChangeHistoryWriter()"></textarea>
                <div *ngIf="buildManualChangeHistoryForm.get('data')?.invalid && buildManualChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer build-manual-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Build Manual Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !buildManualChangeHistoryForm.valid || buildManualChangeHistoryForm.pristine  || userIsBMCBuildManualChangeHistoryWriter() == false " ngbTooltip="Save the Build Manual Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Build Manual Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
