<!-- Step Camera Editor — Three.js interactive orbit camera -->
<div class="camera-editor-container">
    <div class="camera-editor-header">
        <span><i class="fas fa-cube"></i> 3D Camera Preview</span>
        <button class="btn-reset" (click)="resetCamera()" title="Reset Camera">
            <i class="fas fa-undo"></i>
        </button>
    </div>
    <canvas #rendererCanvas class="camera-canvas"></canvas>
    <div class="camera-hint">
        Drag to orbit • Scroll to zoom • Right-drag to pan
    </div>
</div>
