<nav class="bmc-navbar">
    <div class="navbar-left">
        <a class="navbar-brand" routerLink="/dashboard">
            <!-- Single isometric 1x1 brick logo — theme-aware via CSS custom properties -->
            <svg class="brand-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 24" aria-hidden="true">
                <g transform="translate(14, 8)">
                    <!-- Top face (diamond) -->
                    <path d="M0,-6 L10,0 L0,6 L-10,0 Z" class="brick-top-face" />
                    <!-- Left face — shorter -->
                    <path d="M-10,0 L0,6 L0,12 L-10,6 Z" class="brick-left-face" />
                    <!-- Right face — shorter -->
                    <path d="M10,0 L0,6 L0,12 L10,6 Z" class="brick-right-face" />
                    <!-- Solid cylinder stud — centered on face, proportional -->
                    <path
                        d="M-4,0 C-4,1.3 -2.2,2.3 0,2.3 C2.2,2.3 4,1.3 4,0 L4,-2 C4,-0.7 2.2,0.3 0,0.3 C-2.2,0.3 -4,-0.7 -4,-2 Z"
                        class="brick-stud-wall" />
                    <ellipse cx="0" cy="-2" rx="4" ry="2.3" class="brick-stud" />
                </g>
            </svg>
            <span class="brand-text">BMC</span>
            <span class="brand-sub">Brick Machine Construction</span>
        </a>
    </div>

    <div class="navbar-right">

        <!-- Theme Picker Dropdown -->
        <div class="theme-dropdown" [class.open]="themeDropdownOpen">
            <button class="theme-dropdown-trigger" (click)="toggleThemeDropdown($event)" title="Change theme">
                <span class="trigger-swatch" [ngClass]="'swatch-' + themeService.currentTheme"></span>
                <i class="fas fa-chevron-down trigger-chevron"></i>
            </button>
            <div class="theme-dropdown-panel" *ngIf="themeDropdownOpen">
                <button *ngFor="let theme of themeService.availableThemes" class="theme-dropdown-item"
                    [class.active]="themeService.currentTheme === theme.id" (click)="setTheme(theme.id)">
                    <span class="item-swatch" [ngClass]="'swatch-' + theme.id"></span>
                    <span class="item-label">{{ theme.label }}</span>
                    <i class="fas fa-check item-check" *ngIf="themeService.currentTheme === theme.id"></i>
                </button>
            </div>
        </div>

        <ng-container *ngIf="isUserLoggedIn">
            <div class="nav-divider"></div>
            <button class="btn-bmc-ghost nav-btn" title="System Health" routerLink="/system-health">
                <i class="fas fa-heartbeat"></i>
            </button>
            <div class="nav-divider"></div>
            <button class="btn-bmc-ghost nav-btn logout-btn" (click)="logout()" title="Sign Out">
                <i class="fas fa-sign-out-alt"></i>
                <span class="logout-label">Sign Out</span>
            </button>
        </ng-container>

        <ng-container *ngIf="!isUserLoggedIn">
            <a class="btn-bmc nav-login-btn" routerLink="/login">Sign In</a>
        </ng-container>
    </div>
</nav>
