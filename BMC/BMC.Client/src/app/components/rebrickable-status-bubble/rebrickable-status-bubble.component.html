<!-- Floating Rebrickable Status Bubble -->
<div class="rb-bubble-wrapper" *ngIf="visible">

    <!-- Status Pill -->
    <div class="rb-bubble" [ngClass]="bubbleClass" (click)="togglePanel()" (mouseenter)="showTooltip = true"
        (mouseleave)="showTooltip = false">
        <i [class]="bubbleIcon"></i>
        <span class="rb-bubble-text">{{ bubbleText }}</span>
        <span class="rb-bubble-dot" *ngIf="isActive"></span>
    </div>

    <!-- Re-auth Button (shown on warning) -->
    <button class="rb-reauth-trigger" *ngIf="hasWarning && !showPanel" (click)="openReauth()">
        <i class="fas fa-redo"></i> Re-authenticate
    </button>

    <!-- Recent Activity Tooltip -->
    <div class="rb-tooltip"
        *ngIf="showTooltip && !showPanel && (isConnected || recentEvents.length > 0 || rateLimitLimit > 0)">

        <!-- Sync Mode Status -->
        <div class="rb-sync-mode-status" *ngIf="isConnected">
            <div class="rb-sync-mode-label">
                <span>Sync Mode</span>
                <span class="rb-sync-mode-value" [class.rb-sync-mode-none]="!syncEnabled"
                    [class.rb-sync-mode-active]="syncEnabled">
                    {{ syncModeLabel }}
                </span>
            </div>
        </div>

        <!-- Rate Limit Bar -->
        <div class="rb-rate-limit" *ngIf="rateLimitLimit > 0">
            <div class="rb-rate-limit-label">
                <span>API Quota</span>
                <span class="rb-rate-limit-count">{{ rateLimitRemaining }} / {{ rateLimitLimit }}</span>
            </div>
            <div class="rb-rate-limit-track">
                <div class="rb-rate-limit-fill" [ngClass]="rateLimitClass" [style.width.%]="rateLimitPercent"></div>
            </div>
        </div>

        <div class="rb-tooltip-header" *ngIf="recentEvents.length > 0">Recent Activity</div>
        <div class="rb-tooltip-item" *ngFor="let event of recentEvents">
            <i class="fas fa-check-circle rb-tooltip-ok" *ngIf="event.success"></i>
            <i class="fas fa-times-circle rb-tooltip-err" *ngIf="!event.success"></i>
            <span class="rb-tooltip-text">{{ event.summary || event.endpoint }}</span>
            <span class="rb-tooltip-count" *ngIf="event.recordCount">{{ event.recordCount }}</span>
        </div>
    </div>

    <!-- Activity Panel Overlay -->
    <app-rebrickable-activity-panel *ngIf="showPanel" (close)="closePanel()">
    </app-rebrickable-activity-panel>

    <!-- Re-auth Modal -->
    <app-rebrickable-reauth-modal *ngIf="showReauth" [warningMessage]="warningMessage" (close)="closeReauth()"
        (reauthSuccess)="onReauthSuccess()">
    </app-rebrickable-reauth-modal>
</div>
