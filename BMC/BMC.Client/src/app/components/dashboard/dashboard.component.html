<div class="dashboard animate-fade-in">

    <!-- Page Header -->
    <div class="page-header">
        <h1 class="page-title">
            <i class="fas fa-th-large me-2"></i>Dashboard
        </h1>
        <p class="page-subtitle" *ngIf="displayName">{{ greeting }}, {{ displayName }}</p>
        <p class="page-subtitle" *ngIf="!displayName">Brick Machine Construction — Overview</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
        <div *ngFor="let stat of stats; let i = index" class="stat-card bmc-card" [class.skeleton]="!stat.loaded"
            [class.clickable]="stat.route" [routerLink]="stat.route || null" [style.animation-delay]="(i * 60) + 'ms'">

            <div class="stat-icon">
                <i [class]="stat.icon"></i>
            </div>
            <div class="stat-info">
                <span class="stat-value" *ngIf="stat.loaded">{{ stat.value | number }}</span>
                <span class="stat-value skeleton-bar" *ngIf="!stat.loaded"></span>
                <span class="stat-label">{{ stat.label }}</span>
            </div>
        </div>
    </div>


    <!-- Quick Access -->
    <div class="section">
        <div class="bmc-card-header">
            <h3><i class="fas fa-bolt me-2"></i>Quick Access</h3>
        </div>

        <div class="quick-grid">
            <a class="quick-card" *ngFor="let card of quickAccess; let i = index" [routerLink]="card.route"
                [style.animation-delay]="(i * 40) + 'ms'">
                <div class="quick-icon" [ngClass]="card.gradient">
                    <i [class]="card.icon"></i>
                </div>
                <div class="quick-info">
                    <span class="quick-title">{{ card.title }}</span>
                    <span class="quick-desc">{{ card.description }}</span>
                </div>
                <i class="fas fa-chevron-right quick-arrow"></i>
            </a>
        </div>
    </div>

</div>
