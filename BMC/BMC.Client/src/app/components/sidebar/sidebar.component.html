<aside class="bmc-sidebar" [class.collapsed]="isCollapsed">

    <!-- Navigation -->
    <nav class="sidebar-nav">
        <div *ngFor="let group of navGroups; let gi = index" class="nav-group">

            <!-- Group label (hidden when collapsed) -->
            <span class="nav-group-label" *ngIf="group.label && !isCollapsed">{{ group.label }}</span>

            <!-- Divider between groups (skip the first group) -->
            <div class="nav-group-divider" *ngIf="gi > 0"></div>

            <a *ngFor="let item of group.items; let i = index" class="nav-item" [routerLink]="item.route"
                [class.active]="isActive(item.route)" [title]="item.label"
                [style.animation-delay]="(gi * 50 + i * 30) + 'ms'">

                <span class="nav-icon">
                    <i [class]="item.icon"></i>
                </span>

                <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>

                <span class="nav-badge" *ngIf="item.badge && !isCollapsed">{{ item.badge }}</span>
            </a>
        </div>
    </nav>

    <!-- Toggle Button -->
    <button class="sidebar-toggle" (click)="toggle()" [title]="isCollapsed ? 'Expand' : 'Collapse'">
        <i class="fas" [class.fa-chevron-left]="!isCollapsed" [class.fa-chevron-right]="isCollapsed"></i>
    </button>

</aside>
