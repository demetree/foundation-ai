<div class="login-page">
    <div class="login-container animate-fade-in">

        <!-- Brand Header — Isometric hero mark -->
        <div class="login-brand">
            <svg class="brand-logo-hero" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" aria-hidden="true">
                <defs>
                    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
                        <feOffset dx="0" dy="4" result="offsetblur" />
                        <feComponentTransfer>
                            <feFuncA type="linear" slope="0.2" />
                        </feComponentTransfer>
                        <feMerge>
                            <feMergeNode />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                    <linearGradient id="studGloss" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" class="gloss-start" />
                        <stop offset="100%" class="gloss-end" />
                    </linearGradient>
                </defs>

                <g transform="translate(60, 38)" filter="url(#softShadow)">
                    <!-- Top face (diamond) -->
                    <path d="M0,-20 L34,0 L0,20 L-34,0 Z" class="brick-top-face" />
                    <!-- Left face — shorter -->
                    <path d="M-34,0 L0,20 L0,36 L-34,16 Z" class="brick-left-face" />
                    <!-- Right face — shorter -->
                    <path d="M34,0 L0,20 L0,36 L34,16 Z" class="brick-right-face" />
                    <!-- Solid cylinder stud — centered on face, proportional -->
                    <path d="M-12,0 C-12,4 -6.6,7 0,7 C6.6,7 12,4 12,0 L12,-6 C12,-2 6.6,1 0,1 C-6.6,1 -12,-2 -12,-6 Z"
                        class="brick-stud-wall" />
                    <ellipse cx="0" cy="-6" rx="12" ry="7" class="brick-stud" />
                </g>
            </svg>
            <h1 class="brand-title">BMC</h1>
            <p class="brand-subtitle">Brick Machine Construction</p>
        </div>

        <!-- Login Form -->
        <form class="login-form" (ngSubmit)="login()" #loginForm="ngForm">
            <div class="form-group">
                <label class="form-label" for="login-username">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="login-username" class="form-control" placeholder="Enter your username"
                        [(ngModel)]="userName" name="userName" autocomplete="username" [disabled]="isLoading">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="login-password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="login-password" class="form-control" placeholder="Enter your password"
                        [(ngModel)]="password" name="password" autocomplete="current-password" [disabled]="isLoading">
                </div>
            </div>

            <button type="submit" class="btn-bmc login-btn" [disabled]="isLoading">
                <span *ngIf="!isLoading">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </span>
                <span *ngIf="isLoading">
                    <i class="fas fa-spinner fa-spin me-2"></i>{{ loginStatusMessage }}
                </span>
            </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <span>Powered by Foundation Platform</span>
        </div>
    </div>
</div>
