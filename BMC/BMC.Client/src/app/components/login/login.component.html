<div class="login-page">
    <div class="login-container animate-fade-in">

        <!-- Brand Header — Isometric hero mark -->
        <div class="login-brand">
            <svg class="brand-logo-hero" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-hidden="true">
                <defs>
                    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
                        <feOffset dx="0" dy="4" result="offsetblur" />
                        <feComponentTransfer>
                            <feFuncA type="linear" slope="0.2" />
                        </feComponentTransfer>
                        <feMerge>
                            <feMergeNode />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                    <linearGradient id="studGloss" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" class="gloss-start" />
                        <stop offset="100%" class="gloss-end" />
                    </linearGradient>
                </defs>

                <g transform="translate(100, 100)" filter="url(#softShadow)">
                    <!-- Base (2x4) -->
                    <path d="M-16,8 L0,16 L16,8 L0,0 Z" class="brick-top-face" />
                    <path d="M-16,8 L0,16 L0,28.8 L-16,20.8 Z" class="brick-left-face" />
                    <path d="M16,8 L0,16 L0,28.8 L16,20.8 Z" class="brick-right-face" />

                    <!-- Middle (2x2 on left) -->
                    <g transform="translate(-8, -9.6)">
                        <path d="M-8,4 L0,8 L8,4 L0,0 Z" class="brick-top-face" />
                        <path d="M-8,4 L0,8 L0,19.2 L-8,15.2 Z" class="brick-left-face" />
                        <path d="M8,4 L0,8 L0,19.2 L8,15.2 Z" class="brick-right-face" />
                    </g>

                    <!-- Top (2x2 on top of middle) -->
                    <g transform="translate(-8, -19.2)">
                        <path d="M-8,4 L0,8 L8,4 L0,0 Z" class="brick-top-face" />
                        <path d="M-8,4 L0,8 L0,19.2 L-8,15.2 Z" class="brick-left-face" />
                        <path d="M8,4 L0,8 L0,19.2 L8,15.2 Z" class="brick-right-face" />

                        <!-- Stud with gloss -->
                        <ellipse cx="0" cy="4" rx="2.4" ry="1.6" class="brick-stud" />
                        <ellipse cx="0" cy="3.2" rx="1.6" ry="0.8" fill="url(#studGloss)" opacity="0.6" />
                    </g>
                </g>
            </svg>
            <h1 class="brand-title">BMC</h1>
            <p class="brand-subtitle">Brick Machine Construction</p>
        </div>

        <!-- Login Form -->
        <form class="login-form" (ngSubmit)="login()" #loginForm="ngForm">
            <div class="form-group">
                <label class="form-label" for="login-username">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="login-username" class="form-control" placeholder="Enter your username"
                        [(ngModel)]="userName" name="userName" autocomplete="username" [disabled]="isLoading">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="login-password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="login-password" class="form-control" placeholder="Enter your password"
                        [(ngModel)]="password" name="password" autocomplete="current-password" [disabled]="isLoading">
                </div>
            </div>

            <button type="submit" class="btn-bmc login-btn" [disabled]="isLoading">
                <span *ngIf="!isLoading">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </span>
                <span *ngIf="isLoading">
                    <i class="fas fa-spinner fa-spin me-2"></i>{{ loginStatusMessage }}
                </span>
            </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <span>Powered by Foundation Platform</span>
        </div>
    </div>
</div>
