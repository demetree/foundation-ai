<div id="pre-bootstrap" *ngIf="!isAppLoaded" class="prebootStep prebootShow">
    <div class="pre-load-navbar-simulator"></div>
    <div class="messaging"></div>
</div>

<ngx-toasta></ngx-toasta>
<app-auth-nudge-modal></app-auth-nudge-modal>

<!-- Desktop Layout -->
<div *ngIf="!isMobile && isAppLoaded" class="app-layout">
    <app-header *ngIf="(isUserLoggedIn || isOnPublicBrowsePage) && !isOnLoginPage" [isUserLoggedIn]="isUserLoggedIn"
        (invokeLogout)="logout()"></app-header>
    <app-matrix-rain></app-matrix-rain>

    <div class="app-body">
        <app-sidebar *ngIf="(isUserLoggedIn || isOnPublicBrowsePage) && !isOnLoginPage"
            [isCollapsed]="isSidebarCollapsed" (toggleCollapse)="onSidebarToggle($event)">
        </app-sidebar>

        <main class="app-main"
            [class.sidebar-expanded]="(isUserLoggedIn || isOnPublicBrowsePage) && !isOnLoginPage && !isSidebarCollapsed"
            [class.sidebar-collapsed]="(isUserLoggedIn || isOnPublicBrowsePage) && !isOnLoginPage && isSidebarCollapsed"
            [class.no-sidebar]="!(isUserLoggedIn || isOnPublicBrowsePage) || isOnLoginPage">
            <router-outlet></router-outlet>
        </main>
    </div>
    <app-rebrickable-status-bubble *ngIf="isUserLoggedIn && !isOnLoginPage"></app-rebrickable-status-bubble>
</div>

<!-- Mobile Layout -->
<div *ngIf="isMobile && isAppLoaded" class="app-layout">
    <app-header *ngIf="(isUserLoggedIn || isOnPublicBrowsePage) && !isOnLoginPage" [isUserLoggedIn]="isUserLoggedIn"
        (invokeLogout)="logout()"></app-header>
    <main class="app-main-mobile">
        <router-outlet></router-outlet>
    </main>
</div>
