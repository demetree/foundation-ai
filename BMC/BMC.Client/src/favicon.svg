<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <style>
      .brick-face { fill: #2B3A42; }
      .stud { fill: #FF5722; }
    </style>
  </defs>
  <!-- Isometric top face (diamond) -->
  <path class="brick-face" d="M8 2 L14 6 L8 10 L2 6 Z"/>
  <!-- Stud (ellipse, foreshortened) -->
  <ellipse class="stud" cx="8" cy="6" rx="2.5" ry="1.5"/>
  <!-- Subtle edge definition for high-DPI screens -->
  <path fill="none" stroke="#1A1A1A" stroke-width="0.5" opacity="0.3"
        d="M8 2 L14 6 L8 10 L2 6 Z"/>
</svg>
