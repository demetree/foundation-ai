<!-- committee-event-booking.component.html -->

<!-- Gradient Header -->
<div class="committee-header">
  <div class="d-flex align-items-center">
    <div class="header-icon-badge me-3">
      <i class="fa-solid fa-people-group"></i>
    </div>
    <div>
      <h5 class="modal-title mb-0">Schedule a Committee Event</h5>
      <small class="header-subtitle">Petty Harbour Recreation Centre</small>
    </div>
  </div>
  <button type="button" class="btn-close btn-close-white" aria-label="Close"
    (click)="activeModal.dismiss('cancel')"></button>
</div>

<div class="modal-body committee-body">
  <form [formGroup]="eventForm" (ngSubmit)="save()">

    <!-- ── Event Type & Name ── -->
    <div class="booking-section">
      <div class="section-header">
        <i class="fa-solid fa-tag"></i>
        <span>Event Details</span>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Event Type <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="eventTypeId" id="committeeEventTypeSelect"
            (change)="onEventTypeChange()"
            [class.is-invalid]="eventForm.get('eventTypeId')?.touched && eventForm.get('eventTypeId')?.invalid">
            <option [ngValue]="null" disabled>Select event type...</option>
            <option *ngFor="let et of eventTypes" [ngValue]="et.id">
              {{ et.name }}
            </option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Event Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" formControlName="eventName" id="committeeEventName"
            placeholder="e.g., Easter Brunch, Xmas Bingo"
            [class.is-invalid]="eventForm.get('eventName')?.touched && eventForm.get('eventName')?.invalid">
        </div>

        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea class="form-control" formControlName="description" id="committeeEventDesc"
            rows="2" placeholder="Brief description of the event"></textarea>
        </div>
      </div>
    </div>

    <!-- ── Date & Time ── -->
    <div class="booking-section">
      <div class="section-header">
        <i class="fa-solid fa-calendar-days"></i>
        <span>Date & Time</span>
      </div>

      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Date <span class="text-danger">*</span></label>
          <input type="date" class="form-control" formControlName="eventDate" id="committeeEventDate">
        </div>
        <div class="col-md-4">
          <label class="form-label">Start Time <span class="text-danger">*</span></label>
          <input type="time" class="form-control" formControlName="startTime" id="committeeStartTime">
        </div>
        <div class="col-md-4">
          <label class="form-label">End Time <span class="text-danger">*</span></label>
          <input type="time" class="form-control" formControlName="endTime" id="committeeEndTime">
        </div>
      </div>
    </div>

    <!-- ── Facility ── -->
    <!-- Warning: no facility resources configured -->
    <div class="alert alert-warning d-flex align-items-center mb-3" role="alert" *ngIf="facilityLoadWarning">
      <i class="fa-solid fa-triangle-exclamation me-2"></i>
      <small>{{ facilityLoadWarning }}</small>
    </div>

    <!-- Facility picker: only shown when there are 2+ facility resources -->
    <div class="booking-section" *ngIf="facilityResources.length > 1">
      <div class="section-header">
        <i class="fa-solid fa-building"></i>
        <span>Facility</span>
      </div>

      <select class="form-select" [(ngModel)]="selectedFacilityId" [ngModelOptions]="{standalone: true}"
        id="committeeFacilitySelect">
        <option [ngValue]="null" disabled>Select facility...</option>
        <option *ngFor="let r of facilityResources" [ngValue]="r.id">
          {{ r.name }}
        </option>
      </select>
    </div>

    <!-- Auto-selected facility badge (one facility, read-only) -->
    <div class="booking-section" *ngIf="facilityResources.length === 1">
      <div class="section-header">
        <i class="fa-solid fa-building"></i>
        <span>Facility</span>
      </div>
      <div class="d-flex align-items-center">
        <i class="fa-solid fa-check-circle text-success me-2"></i>
        <span>{{ facilityResources[0].name }}</span>
        <span class="badge bg-secondary ms-2">Auto-selected</span>
      </div>
    </div>

    <!-- ── Bar Service Toggle ── -->
    <div class="booking-section">
      <div class="section-header">
        <i class="fa-solid fa-martini-glass-citrus"></i>
        <span>Bar Service</span>
      </div>

      <div class="form-check form-switch mb-2">
        <input class="form-check-input" type="checkbox" id="committeeBarService"
          [(ngModel)]="needsBarService" [ngModelOptions]="{standalone: true}">
        <label class="form-check-label" for="committeeBarService">
          Needs bar service (alcohol + bartenders from rec committee)
        </label>
      </div>

      <div *ngIf="needsBarService" class="mt-2">
        <input type="text" class="form-control form-control-sm" formControlName="barNotes"
          placeholder="e.g., Beer, wine, and spirits for fundraiser">
      </div>
    </div>

    <!-- ── Ticket Sales (if applicable) ── -->
    <div class="booking-section" *ngIf="selectedEventType?.allowsTicketSales">
      <div class="section-header">
        <i class="fa-solid fa-ticket"></i>
        <span>Ticket Sales</span>
      </div>

      <div class="form-check form-switch mb-2">
        <input class="form-check-input" type="checkbox" id="committeeTicketSales"
          [(ngModel)]="enableTicketSales" [ngModelOptions]="{standalone: true}">
        <label class="form-check-label" for="committeeTicketSales">
          This event has ticket sales
        </label>
      </div>

      <div *ngIf="enableTicketSales" class="mt-2">
        <label class="form-label text-muted small">Ticket Price</label>
        <div class="input-group input-group-sm" style="max-width: 200px;">
          <span class="input-group-text">$</span>
          <input type="number" class="form-control" formControlName="ticketPrice"
            placeholder="0.00" min="0" step="1">
        </div>
      </div>
    </div>

    <!-- ── Notes ── -->
    <div class="booking-section">
      <div class="section-header">
        <i class="fa-solid fa-sticky-note"></i>
        <span>Notes</span>
      </div>

      <textarea class="form-control" formControlName="notes" id="committeeNotes"
        rows="2" placeholder="Any additional notes or setup requirements"></textarea>
    </div>

  </form>
</div>

<!-- Footer -->
<div class="modal-footer committee-footer">
  <button type="button" class="btn btn-outline-secondary" (click)="activeModal.dismiss('cancel')"
    [disabled]="saving">
    Cancel
  </button>
  <button type="button" class="btn btn-primary btn-schedule" (click)="save()"
    [disabled]="saving || eventForm.invalid" id="committeeSaveBtn">
    <span *ngIf="!saving">
      <i class="fa-solid fa-calendar-plus me-1"></i> Schedule Event
    </span>
    <span *ngIf="saving">
      <span class="spinner-border spinner-border-sm me-1"></span> Saving...
    </span>
  </button>
</div>
