<!-- private-rental-booking.component.html -->

<!-- Gradient Header -->
<div class="rental-header">
  <div class="d-flex align-items-center">
    <div class="header-icon-badge me-3">
      <i class="fa-solid fa-key"></i>
    </div>
    <div>
      <h5 class="modal-title mb-0">Book a Private Rental</h5>
      <small class="header-subtitle">Petty Harbour Recreation Centre</small>
    </div>
  </div>
  <button type="button" class="btn-close btn-close-white" aria-label="Close"
    (click)="activeModal.dismiss('cancel')"></button>
</div>

<div class="modal-body rental-body">
  <form [formGroup]="bookingForm" (ngSubmit)="save()">

    <!-- ── Event Type ── -->
    <div class="booking-section">
      <div class="section-header">
        <i class="fa-solid fa-tag"></i>
        <span>Event Type</span>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Type <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="eventTypeId" id="rentalEventTypeSelect"
            (change)="onEventTypeChange()"
            [class.is-invalid]="bookingForm.get('eventTypeId')?.touched && bookingForm.get('eventTypeId')?.invalid">
            <option [ngValue]="null" disabled>Select event type...</option>
            <option *ngFor="let et of eventTypes" [ngValue]="et.id">
              {{ et.name }}
              <span *ngIf="et.defaultPrice"> — ${{ et.defaultPrice }}</span>
            </option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Event Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" formControlName="eventName" id="rentalEventName"
            placeholder="e.g., Smith Birthday Party"
            [class.is-invalid]="bookingForm.get('eventName')?.touched && bookingForm.get('eventName')?.invalid">
        </div>
      </div>
    </div>

    <!-- ── Date & Time ── -->
    <div class="booking-section">
      <div class="section-header">
        <i class="fa-solid fa-calendar-days"></i>
        <span>Date & Time</span>
      </div>

      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Date <span class="text-danger">*</span></label>
          <input type="date" class="form-control" formControlName="eventDate" id="rentalEventDate">
        </div>
        <div class="col-md-4">
          <label class="form-label">Start Time <span class="text-danger">*</span></label>
          <input type="time" class="form-control" formControlName="startTime" id="rentalStartTime">
        </div>
        <div class="col-md-4">
          <label class="form-label">End Time <span class="text-danger">*</span></label>
          <input type="time" class="form-control" formControlName="endTime" id="rentalEndTime">
        </div>
      </div>
    </div>

    <!-- ── Contact ── -->
    <div class="booking-section" *ngIf="selectedEventType?.requiresExternalContact !== false">
      <div class="section-header">
        <i class="fa-solid fa-user"></i>
        <span>Contact Details</span>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Contact Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" formControlName="contactName" id="rentalContactName"
            placeholder="Full name of person booking"
            [class.is-invalid]="bookingForm.get('contactName')?.touched && bookingForm.get('contactName')?.invalid">
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="tel" class="form-control" formControlName="contactPhone" id="rentalContactPhone"
            placeholder="709-xxx-xxxx">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="contactEmail" id="rentalContactEmail"
            placeholder="email@example.com">
        </div>
        <div class="col-md-6">
          <label class="form-label">Party Size</label>
          <input type="number" class="form-control" formControlName="partySize" id="rentalPartySize"
            placeholder="# of guests" min="1">
        </div>
      </div>
    </div>

    <!-- ── Special Requests ── -->
    <div class="booking-section">
      <div class="section-header">
        <i class="fa-solid fa-comment-dots"></i>
        <span>Client Special Requests</span>
      </div>

      <textarea class="form-control" formControlName="specialRequests" id="rentalSpecialRequests"
        rows="3" placeholder="Any special requirements, setup instructions, decorations, etc."></textarea>
    </div>

    <!-- ── Bar Service Toggle ── -->
    <div class="booking-section">
      <div class="section-header">
        <i class="fa-solid fa-martini-glass-citrus"></i>
        <span>Bar Service</span>
        <span class="badge bg-info ms-2" *ngIf="selectedEventType?.requiresBarService">Default: Yes</span>
      </div>

      <div class="form-check form-switch mb-2">
        <input class="form-check-input" type="checkbox" id="rentalBarService"
          [(ngModel)]="needsBarService" [ngModelOptions]="{standalone: true}">
        <label class="form-check-label" for="rentalBarService">
          Needs bar service (alcohol + bartenders from rec committee)
        </label>
      </div>

      <div *ngIf="needsBarService" class="mt-2">
        <label class="form-label text-muted small">Bar Notes</label>
        <input type="text" class="form-control form-control-sm" formControlName="barNotes"
          placeholder="e.g., Beer and wine only, need 2 bartenders">
      </div>
    </div>

    <!-- ── Payment ── -->
    <div class="booking-section" *ngIf="selectedEventType?.requiresPayment">
      <div class="section-header">
        <i class="fa-solid fa-dollar-sign"></i>
        <span>Payment</span>
      </div>

      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label">Rental Fee</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" class="form-control" formControlName="price" id="rentalPrice"
              min="0" step="25">
          </div>
        </div>

        <div class="col-md-4">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="rentalMarkPaid"
              [(ngModel)]="markAsPaid" [ngModelOptions]="{standalone: true}">
            <label class="form-check-label" for="rentalMarkPaid">
              <i class="fa-solid fa-check-circle text-success me-1" *ngIf="markAsPaid"></i>
              Mark as Paid
            </label>
          </div>
        </div>

        <div class="col-md-4" *ngIf="selectedEventType?.requiresDeposit">
          <div class="deposit-info">
            <i class="fa-solid fa-shield-halved text-warning me-1"></i>
            <small class="text-muted">
              Deposit: ${{ bookingForm.get('price')?.value ? (bookingForm.get('price')?.value * 0.5 | number:'1.0-0') : '—' }}
              (50%)
            </small>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Rental Agreement ── -->
    <div class="booking-section" *ngIf="selectedEventType?.requiresRentalAgreement">
      <div class="section-header">
        <i class="fa-solid fa-file-signature"></i>
        <span>Rental Agreement</span>
      </div>

      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="rentalAgreementSigned"
          [(ngModel)]="rentalAgreementSigned" [ngModelOptions]="{standalone: true}">
        <label class="form-check-label" for="rentalAgreementSigned">
          <i class="fa-solid fa-check-circle text-success me-1" *ngIf="rentalAgreementSigned"></i>
          Rental agreement signed
        </label>
      </div>
    </div>

  </form>
</div>

<!-- Footer -->
<div class="modal-footer rental-footer">
  <button type="button" class="btn btn-outline-secondary" (click)="activeModal.dismiss('cancel')"
    [disabled]="saving">
    Cancel
  </button>
  <button type="button" class="btn btn-primary btn-book" (click)="save()"
    [disabled]="saving || bookingForm.invalid" id="rentalSaveBtn">
    <span *ngIf="!saving">
      <i class="fa-solid fa-calendar-check me-1"></i> Book Rental
    </span>
    <span *ngIf="saving">
      <span class="spinner-border spinner-border-sm me-1"></span> Saving...
    </span>
  </button>
</div>
