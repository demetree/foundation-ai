<div class="page-container">
    <div class="card mb-3 header-card premium-header shadow-lg border-0">
        <div
            class="card-header d-flex flex-wrap justify-content-between align-items-center gap-3 border-0 bg-transparent">
            <div class="header-left">
                <!-- Back Button -->
                <button class="btn btn-sm btn-glass back-button me-2" (click)="goBack()" ngbTooltip="Go Back"
                    *ngIf="canGoBack()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <!-- Title -->
                <div class="text-white">
                    <h3 class="page-title mb-0 fw-bold text-shadow">Shifts</h3>
                    <small class="text-white-50">Manage resource work schedules</small>
                </div>
            </div>

            <div class="header-right">

                <span class="badge badge-glass mx-2" *ngIf="loadingTotalCount || loadingFilteredCount">
                    <i class="fa fa-spinner fa-spin me-1"></i> Loading...
                </span>

                <span *ngIf="!(loadingTotalCount || loadingFilteredCount)">
                    <ng-container *ngIf="totalShiftCount$ | async as total; else loading">
                        <span class="badge badge-glass mx-2">

                            <!-- Filtered: some results -->
                            <ng-container *ngIf="filteredShiftCount$ | async as filteredCount">
                                <span *ngIf="filterText && (filteredCount ?? 0) > 0">
                                    {{ filteredCount }} of {{ total }} {{ total !== 1 ? 'Shifts' : 'Shift' }}
                                </span>
                            </ng-container>
                            <!-- Filtered: 0 results -->
                            <span *ngIf="total > 0 && filterText && (filteredShiftCount$ | async) === 0">
                                No matching Shifts
                            </span>
                            <!-- No filter: normal count -->
                            <span *ngIf="!filterText">
                                {{ total }} {{ total !== 1 ? 'Shifts' : 'Shift' }}
                            </span>
                            <!-- No Shifts at all -->
                            <span *ngIf="total === 0">
                                No Shifts
                            </span>

                        </span>
                    </ng-container>

                    <ng-template #loading>
                        <span class="badge badge-glass mx-2" *ngIf="(loadingTotalCount || loadingFilteredCount)">
                            <i class="fa fa-spinner fa-spin me-1"></i> Loading...
                        </span>
                        <span class="badge badge-glass mx-2" *ngIf="!(loadingTotalCount || loadingFilteredCount)">
                            No Shifts
                        </span>
                    </ng-template>
                </span>


                <!-- Quick Search Input -->
                <div class="search-bar me-2 position-relative">
                    <i class="fa fa-search search-icon text-white-50"></i>
                    <input type="text" class="form-control search-input glass-input" placeholder="Search Shifts..."
                        [(ngModel)]="filterText" (ngModelChange)="onFilterChange()">
                    <button *ngIf="filterText" class="clear-search btn text-white"
                        (click)="filterText=''; onFilterChange()" title="Clear Search">
                        <i class="fa fa-times"></i>
                    </button>
                </div>

                <!-- Add Button -->
                <div class="add-button-wrapper">
                    <app-shift-custom-add-edit [navigateToDetailsAfterAdd]="false"></app-shift-custom-add-edit>
                </div>
            </div>
        </div>
    </div>

    <app-shift-custom-table *ngIf="userIsSchedulerResourceShiftReader() == true" [filterText]="filterText"
        [isSmallScreen]="isSmallScreen">
    </app-shift-custom-table>
</div>
