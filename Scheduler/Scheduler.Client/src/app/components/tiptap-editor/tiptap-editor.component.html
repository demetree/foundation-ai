<!-- Formatting toolbar -->
<div class="tiptap-toolbar" *ngIf="editor">
  <button type="button" (click)="toggleBold()" [class.active]="editor.isActive('bold')" title="Bold (Ctrl+B)">
    <i class="fa-solid fa-bold"></i>
  </button>
  <button type="button" (click)="toggleItalic()" [class.active]="editor.isActive('italic')" title="Italic (Ctrl+I)">
    <i class="fa-solid fa-italic"></i>
  </button>
  <button type="button" (click)="toggleStrike()" [class.active]="editor.isActive('strike')" title="Strikethrough">
    <i class="fa-solid fa-strikethrough"></i>
  </button>

  <span class="toolbar-divider"></span>

  <button type="button" (click)="toggleCode()" [class.active]="editor.isActive('code')" title="Inline Code">
    <i class="fa-solid fa-code"></i>
  </button>
  <button type="button" (click)="toggleCodeBlock()" [class.active]="editor.isActive('codeBlock')" title="Code Block">
    <i class="fa-solid fa-file-code"></i>
  </button>

  <span class="toolbar-divider"></span>

  <button type="button" (click)="toggleBulletList()" [class.active]="editor.isActive('bulletList')" title="Bullet List">
    <i class="fa-solid fa-list-ul"></i>
  </button>
  <button type="button" (click)="toggleOrderedList()" [class.active]="editor.isActive('orderedList')" title="Numbered List">
    <i class="fa-solid fa-list-ol"></i>
  </button>
  <button type="button" (click)="toggleBlockquote()" [class.active]="editor.isActive('blockquote')" title="Blockquote">
    <i class="fa-solid fa-quote-left"></i>
  </button>

  <span class="toolbar-divider"></span>

  <button type="button" (click)="insertLink()" [class.active]="editor.isActive('link')" title="Insert Link">
    <i class="fa-solid fa-link"></i>
  </button>
  <button type="button" *ngIf="editor.isActive('link')" (click)="removeLink()" title="Remove Link" class="remove-link">
    <i class="fa-solid fa-link-slash"></i>
  </button>
</div>

<!-- Editor content area -->
<div #editorContainer class="tiptap-content" id="tiptap-editor-content"></div>
