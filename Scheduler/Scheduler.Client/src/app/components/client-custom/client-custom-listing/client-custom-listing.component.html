<div class="page-container">
  <div class="card mb-3 header-card premium-header shadow-lg border-0">
    <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-3 border-0 bg-transparent">
      <div class="header-left">
        <!-- Back Button -->
        <button class="btn btn-sm btn-glass back-button me-2" (click)="goBack()" ngbTooltip="Go Back"
          *ngIf="canGoBack()">
          <i class="fa-solid fa-arrow-left"></i>
        </button>

        <!-- Title -->
        <div class="text-white">
          <h3 class="page-title mb-0 fw-bold text-shadow">Clients</h3>
          <small class="text-white-50">View and manage client accounts</small>
        </div>
      </div>

      <div class="header-right">
        <span class="badge badge-glass mx-2" *ngIf="loadingTotalCount || loadingFilteredCount">
          <i class="fa fa-spinner fa-spin me-1"></i> Loading...
        </span>

        <span *ngIf="!(loadingTotalCount || loadingFilteredCount)">
          <ng-container *ngIf="totalClientCount$ | async as total; else falsyObservable">
            <span class="badge badge-glass mx-2">

              <!-- Filtered: some results -->
              <ng-container *ngIf="filteredClientCount$ | async as filteredCount">
                <span *ngIf="filterText && (filteredCount ?? 0) > 0">
                  {{ filteredCount }} of {{ total }} {{ total !== 1 ? 'Clients' : 'Client' }}
                </span>
              </ng-container>
              <!-- Filtered: 0 results -->
              <span *ngIf="total > 0 && filterText && (filteredClientCount$ | async) === 0">
                No matching Clients
              </span>
              <!-- No filter: normal count -->
              <span *ngIf="!filterText">
                {{ total }} {{ total !== 1 ? 'Clients' : 'Client' }}
              </span>
              <!-- No Clients at all (even unfiltered) -->
              <span *ngIf="total === 0">
                No Clients
              </span>

            </span>
          </ng-container>

          <!-- when observable is falsy, then decide whether to show a spinner or a loading spinner..-->
          <ng-template #falsyObservable>
            <span class="badge badge-glass mx-2" *ngIf="(loadingTotalCount || loadingFilteredCount)">
              <i class="fa fa-spinner fa-spin me-1"></i> Loading...
            </span>
            <span class="badge badge-glass mx-2" *ngIf="!(loadingTotalCount || loadingFilteredCount)">
              No Clients
            </span>
          </ng-template>

        </span>

        <!-- Quick Search Input -->
        <div class="search-bar me-2 position-relative">
          <i class="fa fa-search search-icon text-white-50"></i>
          <input type="text" class="form-control search-input glass-input" placeholder="Search Clients..."
            [(ngModel)]="filterText" (ngModelChange)="onFilterChange()">
          <button *ngIf="filterText" class="clear-search btn text-white" (click)="filterText=''; onFilterChange()"
            title="Clear Search">
            <i class="fa fa-times"></i>
          </button>
        </div>

        <!-- Add/Edit Button -->
        <div class="add-button-wrapper">
          <app-client-custom-add-edit [navigateToDetailsAfterAdd]="false"></app-client-custom-add-edit>
        </div>
      </div>
    </div>
  </div>

  <app-client-custom-table *ngIf="userIsSchedulerClientReader() == true" [filterText]="filterText"
    [isSmallScreen]="isSmallScreen">
  </app-client-custom-table>
</div>
