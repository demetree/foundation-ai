<div class="page-container">
    <div class="card mb-3 header-card shadow-sm">
        <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-3">
            <div class="header-left">
                <!-- Back Button -->
                <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back" *ngIf="canGoBack()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <!-- Title -->
                <div>
                    <h3 class="page-title mb-0">Resources</h3>
                    <small class="text-muted">Manage schedulable resources</small>
                </div>
            </div>

            <div class="header-right">

              <span class="badge bg-secondary mx-2" *ngIf="loadingTotalCount || loadingFilteredCount">
                <i class="fa fa-spinner fa-spin me-1"></i> Loading...
              </span>

              <span *ngIf="!(loadingTotalCount || loadingFilteredCount)">
                <ng-container *ngIf="totalResourceCount$ | async as total; else loading">
                  <span class="badge bg-secondary mx-2">

                    <!-- Filtered: some results -->
                    <ng-container *ngIf="filteredResourceCount$ | async as filteredCount">
                      <span *ngIf="filterText && (filteredCount ?? 0) > 0">
                        {{ filteredCount }} of {{ total }} {{ total !== 1 ? 'Resources' : 'Resource' }}
                      </span>
                    </ng-container>
                    <!-- Filtered: 0 results -->
                    <span *ngIf="total > 0 && filterText && (filteredResourceCount$ | async) === 0">
                      No matching Resources
                    </span>
                    <!-- No filter: normal count -->
                    <span *ngIf="!filterText">
                      {{ total }} {{ total !== 1 ? 'Resources' : 'Resource' }}
                    </span>
                    <!-- No Resources at all (even unfiltered) -->
                    <span *ngIf="total === 0">
                      No Resources
                    </span>

                  </span>
                </ng-container>

                <!-- when observable is falsy, then decide whether to show a spinner or a loading spinner.. -->
                <ng-template #loading>
                  <span class="badge bg-secondary mx-2" *ngIf="(loadingTotalCount || loadingFilteredCount)">
                    <i class="fa fa-spinner fa-spin me-1"></i> Loading...
                  </span>
                  <span class="badge bg-secondary mx-2" *ngIf="!(loadingTotalCount || loadingFilteredCount)">
                    No Resources
                  </span>
                </ng-template>

              </span>


              <!-- Quick Search Input -->
              <div class="search-bar me-2 position-relative">
                <i class="fa fa-search search-icon"></i>
                <input type="text"
                       class="form-control search-input"
                       placeholder="Search Resources..."
                       [(ngModel)]="filterText"
                       (ngModelChange)="onFilterChange()">
                <button *ngIf="filterText"
                        class="clear-search btn"
                        (click)="filterText=''; onFilterChange()"
                        title="Clear Search">
                  <i class="fa fa-times"></i>
                </button>
              </div>

              <!-- Add/Edit Button -->
              <app-resource-custom-add-edit [navigateToDetailsAfterAdd]="false"></app-resource-custom-add-edit>
            </div>
      </div>
    </div>

  <app-resource-custom-table
    *ngIf="userIsSchedulerResourceReader() == true"
    [filterText]="filterText"
    [isSmallScreen]="isSmallScreen">
  </app-resource-custom-table>
</div>
