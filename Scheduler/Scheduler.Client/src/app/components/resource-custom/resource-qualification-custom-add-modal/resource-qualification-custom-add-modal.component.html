<div class="modal-header">
  <h5 class="modal-title">
    Add Qualification
    <small class="text-muted d-block" *ngIf="resourceName">
      for {{ resourceName }}
    </small>
  </h5>
  <button type="button" class="btn-close" (click)="cancel()" aria-label="Close"></button>
</div>

<div class="modal-body">
  <form [formGroup]="qualificationForm">
    <div class="form-group mb-3">
      <label for="qualificationId" class="form-label">
        <span class="text-danger">*</span> Qualification
      </label>
      <select id="qualificationId" formControlName="qualificationId" class="form-select">
        <option [ngValue]="null">Select qualification...</option>
        <option *ngFor="let qual of qualifications$ | async" [ngValue]="qual.id">
          {{ qual.name }}
        </option>
      </select>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="form-group mb-3">
          <label for="issueDate" class="form-label">Issue Date</label>
          <input type="date" id="issueDate" formControlName="issueDate" class="form-control" />
        </div>
      </div>
      <div class="col-md-6">
        <div class="form-group mb-3">
          <label for="expiryDate" class="form-label">Expiry Date</label>
          <input type="date" id="expiryDate" formControlName="expiryDate" class="form-control" />
          <small class="form-text text-muted">Leave blank for no expiry</small>
        </div>
      </div>
    </div>

    <div class="form-group mb-3">
      <label for="issuer" class="form-label">Issuer</label>
      <input type="text" id="issuer" formControlName="issuer" class="form-control" placeholder="e.g., NCCCO, State Board" />
    </div>

    <div class="form-group mb-3">
      <label for="notes" class="form-label">Notes</label>
      <textarea id="notes" formControlName="notes" class="form-control" rows="3"></textarea>
    </div>
  </form>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="isSaving">
    Cancel
  </button>
  <button type="button" class="btn btn-primary" (click)="submit()" [disabled]="isSaving || !qualificationForm.valid">
    <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2" role="status"></span>
    Add Qualification
  </button>
</div>
