<div class="add-resource" *ngIf="showAddButton == true">
  <button type="button" class="btn btn-sm btn-add-resource me-2" (click)="openModal()" ngbTooltip="Add Resource"
    *ngIf="userIsSchedulerResourceWriter() == true" placement="top" style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #resourceModal let-modal>
  <div class="modal-header bg-dark text-light resource-modal-header">
    <h5 class="modal-title mb-0" id="resourceModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Resource' : 'Add Resource' }}
    </h5>
    <button type="button" class="btn btn-sm btn-close btn-close-white" (click)="closeModal()">
    </button>
  </div>
  <div class="modal-body resource-modal-body">
    <form [formGroup]="resourceForm" (ngSubmit)="submitForm()">
      <div class="form-group">
        <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
        <input type="text" id="name" formControlName="name" placeholder="Enter Name" class="form-control resource-input"
          [disabled]="!userIsSchedulerResourceWriter()" aria-labelledby="label-name" />
        <div *ngIf="resourceForm.get('name')?.invalid && resourceForm.get('name')?.touched" class="text-danger">
          Name is required
        </div>
      </div>

      <div class="form-group">
        <label for="description" id="label-description">Description</label>
        <textarea id="description" formControlName="description" placeholder="Enter Description"
          class="form-control resource-input" [disabled]="!userIsSchedulerResourceWriter()"></textarea>
      </div>

      <div class="form-group">
        <label for="resourceTypeId" id="label-resourceTypeId"><span class="text-danger">*</span>Resource Type</label>
        <select id="resourceTypeId" formControlName="resourceTypeId" class="form-select resource-select"
          [disabled]="!userIsSchedulerResourceWriter()">
          <option [ngValue]="null">Select Resource Type</option>
          <option *ngFor="let resourceType of resourceTypes$ | async" [ngValue]="resourceType.id">{{resourceType.name}}
          </option>
        </select>
        <div *ngIf="resourceForm.get('resourceTypeId')?.invalid && resourceForm.get('resourceTypeId')?.touched"
          class="text-danger">
          Resource Type is required
        </div>
      </div>

      <div class="form-group">
        <label for="shiftPatternId" id="label-shiftPatternId">Shift Pattern</label>
        <select id="shiftPatternId" formControlName="shiftPatternId" class="form-select resource-select"
          [disabled]="!userIsSchedulerResourceWriter()">
          <option [ngValue]="null">Select Shift Pattern</option>
          <option *ngFor="let shiftPattern of shiftPatterns$ | async" [ngValue]="shiftPattern.id">{{shiftPattern.name}}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="timeZoneId" id="label-timeZoneId"><span class="text-danger">*</span>Time Zone</label>
        <select id="timeZoneId" formControlName="timeZoneId" class="form-select resource-select"
          [disabled]="!userIsSchedulerResourceWriter()">
          <option [ngValue]="null">Select Time Zone</option>
          <option *ngFor="let timeZone of timeZones$ | async" [ngValue]="timeZone.id">{{timeZone.name}}</option>
        </select>
        <div *ngIf="resourceForm.get('timeZoneId')?.invalid && resourceForm.get('timeZoneId')?.touched"
          class="text-danger">
          Time Zone is required
        </div>
      </div>

      <div class="form-group">
        <label for="targetWeeklyWorkHours" id="label-targetWeeklyWorkHours">Target Weekly Work Hours</label>
        <input type="number" id="targetWeeklyWorkHours" formControlName="targetWeeklyWorkHours"
          placeholder="Enter Target Weekly Work Hours" class="form-control resource-input"
          [disabled]="!userIsSchedulerResourceWriter()" aria-labelledby="label-targetWeeklyWorkHours" />
      </div>

      <fieldset class="mb-4">
        <!--<legend class="fs-6 fw-semibold text-primary">Notes</legend>-->
        <label for="notes" class="form-label">Notes</label>
        <textarea id="notes" formControlName="notes" class="form-control" rows="3"
          [disabled]="!userIsSchedulerResourceWriter()"></textarea>
      </fieldset>

      <div class="form-group" *ngIf="officeId == null && officeCount$ != null && ((officeCount$ | async) ?? 0) > 0">
        <!-- hide this when the user supplies an office id -->
        <label for="officeId" id="label-officeId">Office</label>
        <select id="officeId" formControlName="officeId" class="form-select resource-select"
          [disabled]="!userIsSchedulerResourceWriter()">
          <option [ngValue]="null">Select Office</option>
          <option *ngFor="let office of offices$ | async" [ngValue]="office.id">{{office.name}}</option>
        </select>
      </div>

      <!-- Collapsible Avatar & Color Panel -->
      <div class="mt-4">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3 cursor-pointer"
          (click)="isAvatarPanelOpen = !isAvatarPanelOpen">
          <h6 class="mb-0 fw-semibold">
            <i [class]="isAvatarPanelOpen ? 'fa-solid fa-chevron-down' : 'fa-solid fa-chevron-right'" class="me-2"></i>
            Avatar & Appearance
          </h6>
          <span class="badge bg-light text-dark" *ngIf="currentAvatarUrl || resourceForm.get('color')?.value">
            Configured
          </span>
        </div>

        <div [@collapse]="isAvatarPanelOpen ? 'true' : 'false'" class="mt-3">
          <!-- Color Picker -->
          <div class="form-group mb-4">
            <label for="color" id="label-color">Color</label>
            <div class="d-flex align-items-center gap-3">
              <input type="color" id="color" formControlName="color"
                class="form-control form-control-color color-picker" [disabled]="!userIsSchedulerResourceWriter()"
                title="Choose Color">
              <!--<input type="text"
          [value]="resourceForm.get('color')?.value || '#000000'"
          readonly
          class="form-control input-color-display"
          style="width: 120px;">-->
            </div>
          </div>

          <!-- Avatar Upload -->
          <div class="form-group">
            <label class="form-label fw-semibold">Avatar</label>
            <div class="avatar-upload-container p-4 border rounded bg-light text-center position-relative"
              (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)"
              [class.drag-over]="isDragOver">
              <!-- Preview -->
              <div class="avatar-preview mx-auto mb-3" [style.background-image]="'url(' + currentAvatarUrl + ')'"
                [style.background-color]="resourceForm.get('color')?.value || '#6c757d'"
                [ngClass]="{'no-avatar': !currentAvatarUrl}">
                <i class="fa-solid fa-user fa-3x text-white opacity-75" *ngIf="!currentAvatarUrl"></i>
              </div>

              <p class="mb-2 text-muted">
                <strong *ngIf="!currentAvatarUrl">Drag & drop an image here</strong>
                <strong *ngIf="currentAvatarUrl">{{ resourceForm.get('avatarFileName')?.value }}</strong>
              </p>
              <p class="small text-muted mb-3">or</p>

              <input type="file" #fileInput accept="image/*" (change)="onAvatarSelected($event)" class="d-none">
              <div>
                <button type="button" class="btn btn-outline-primary btn-sm" (click)="fileInput.click()">
                  <i class="fa fa-upload me-1"></i>
                  {{ currentAvatarUrl ? 'Change Image' : 'Choose File' }}
                </button>
                <button type="button" class="btn btn-outline-danger btn-sm ms-2" (click)="clearAvatar()"
                  *ngIf="currentAvatarUrl">
                  <i class="fa fa-trash"></i> Remove
                </button>
              </div>

              <small class="d-block mt-3 text-muted">
                Recommended: square image • Max 2MB
              </small>
            </div>

            <!-- Hidden fields -->
            <input type="hidden" formControlName="avatarFileName">
            <input type="hidden" formControlName="avatarSize">
            <input type="hidden" formControlName="avatarData">
            <input type="hidden" formControlName="avatarMimeType">
          </div>
        </div>
      </div>

      <!-- Dynamic Attributes -->
      <app-dynamic-field-renderer [entityName]="'Resource'" [data]="attributesParsed"
        (dataChange)="onDynamicAttributeChange($event)">
      </app-dynamic-field-renderer>

      <!-- Advanced (Edit Only) -->
      <fieldset class="mb-4" *ngIf="isEditMode">
        <!--<legend class="fs-6 fw-semibold text-primary">Advanced</legend>-->
        <div class="col-md-12" *ngIf="userIsFoundationAdministrator()">
          <label for="attributes" id="label-attributes">Attributes</label>
          <textarea id="attributes" formControlName="attributes" placeholder="Enter Attributes"
            class="form-control office-input" [disabled]="!userIsSchedulerResourceWriter()"></textarea>
        </div>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="externalId" class="form-label">External ID</label>
            <input type="text" id="externalId" formControlName="externalId" class="form-control"
              [disabled]="!userIsSchedulerResourceWriter()" />
          </div>
          <div class="col-md-3">
            <label for="versionNumber" class="form-label">Version</label>
            <input type="text" id="versionNumber" [value]="resourceForm.get('versionNumber')?.value"
              class="form-control" disabled />
          </div>
          <div class="col-md-3 d-flex align-items-end gap-3">
            <div class="form-check">
              <input type="checkbox" id="active" formControlName="active" class="form-check-input"
                [disabled]="!userIsSchedulerResourceWriter()" />
              <label class="form-check-label" for="active">Active</label>
            </div>
            <div class="form-check">
              <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input"
                [disabled]="!userIsSchedulerResourceWriter()" />
              <label class="form-check-label" for="deleted">Deleted</label>
            </div>
          </div>
        </div>
      </fieldset>

      <div class="modal-footer resource-modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()"
          ngbTooltip="Cancel the Resource changes and Close">Cancel</button>
        <button type="submit" class="btn btn-sm btn-primary"
          [disabled]="isSaving || !resourceForm.valid || resourceForm.pristine || !userIsSchedulerResourceWriter()"
          ngbTooltip="Save the Resource changes and Close">
          <span *ngIf="isSaving">
            <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
            Saving...
          </span>
          <span *ngIf="!isSaving">
            <i class="fa-solid fa-check me-1"></i>
            {{ isEditMode ? 'Save' : 'Create' }}
          </span>
        </button>
      </div>
    </form>
  </div>
</ng-template>
