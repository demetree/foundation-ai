<div class="modal-header">
  <h5 class="modal-title">
    Add Rate Override
    <small class="text-muted d-block" *ngIf="resourceName">
      for {{ resourceName }}
    </small>
  </h5>
  <button type="button" class="btn-close" (click)="cancel()" aria-label="Close"></button>
</div>

<div class="modal-body">
  <form [formGroup]="rateForm">
    <div class="row">
      <div class="col-md-6">
        <div class="mb-3">
          <label for="effectiveDate" class="form-label">
            <span class="text-danger">*</span> Effective Date
          </label>
          <input type="date"
                 id="effectiveDate"
                 formControlName="effectiveDate"
                 class="form-control" />
          <small class="form-text text-muted">Rate applies from this date onward</small>
        </div>
      </div>

      <div class="col-md-6">
        <div class="mb-3">
          <label for="rateTypeId" class="form-label">
            <span class="text-danger">*</span> Rate Type
          </label>
          <select id="rateTypeId" formControlName="rateTypeId" class="form-select">
            <option [ngValue]="null">Select Rate Type...</option>
            <option *ngFor="let rt of rateTypes$| async" [ngValue]="rt.id">
              {{ rt.name}} - {{ rt.description }}
            </option>
          </select>
        </div>
      </div>
    

      <div class="col-md-6">
        <div class="mb-3">
          <label for="currencyId" class="form-label">
            <span class="text-danger">*</span> Currency
          </label>
          <select id="currencyId" formControlName="currencyId" class="form-select">
            <option [ngValue]="null">Select currency...</option>
            <option *ngFor="let curr of currencies$ | async" [ngValue]="curr.id">
              {{ curr.code }} - {{ curr.name }}
            </option>
          </select>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="mb-3">
          <label for="costRate" class="form-label">
            <span class="text-danger">*</span> Cost Rate (per hour)
          </label>
          <input type="number"
                 id="costRate"
                 formControlName="costRate"
                 class="form-control"
                 min="0"
                 step="0.01" />
        </div>
      </div>

      <div class="col-md-6">
        <div class="mb-3">
          <label for="billingRate" class="form-label">
            <span class="text-danger">*</span> Billing Rate (per hour)
          </label>
          <input type="number"
                 id="billingRate"
                 formControlName="billingRate"
                 class="form-control"
                 min="0"
                 step="0.01" />
        </div>
      </div>
    </div>

    <!--
      THIS SHOULD NOT BE HERE - CANNOT DO AN OVERRIDE FOR A RESOURCE AND A ROLE IN THE SAME RECORD!
      <div class="mb-3">
      <label for="assignmentRoleId" class="form-label">Assignment Role (optional)</label>
      <select id="assignmentRoleId" formControlName="assignmentRoleId" class="form-select">
        <option [ngValue]="null">All roles</option>
        <option *ngFor="let role of assignmentRoles$ | async" [ngValue]="role.id">
          {{ role.name }}
        </option>
      </select>
      <small class="form-text text-muted">
        Leave blank to apply to all roles
      </small>
    </div>-->

    <div class="mb-3">
      <label for="notes" class="form-label">Notes (optional)</label>
      <textarea id="notes"
                formControlName="notes"
                class="form-control"
                rows="3"
                placeholder="e.g., Certified premium, Night shift differential"></textarea>
    </div>
  </form>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="isSaving">
    Cancel
  </button>
  <button type="button" class="btn btn-primary" (click)="submit()" [disabled]="isSaving || !rateForm.valid">
    <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2" role="status"></span>
    Add Rate Override
  </button>
</div>
