<button class="btn btn-sm btn-glass" (click)="openModal()" [disabled]="!authService.isSchedulerReaderWriter">
  <i class="fa fa-bolt me-1"></i> Quick Add
</button>

<ng-template #quickAddModal let-modal>
  <div class="modal-header bg-dark text-light">
    <h5 class="modal-title mb-0">
      <i class="fa-solid fa-user-plus me-2"></i> Onboard New {{ terminology.getTerm('Resource') }}
    </h5>
    <button type="button" class="btn btn-sm btn-close btn-close-white" (click)="closeModal()"></button>
  </div>
  <div class="modal-body staff-modal-body">
    <p class="text-muted small mb-4">Quickly add a new team member to the schedule. Defaults will be automatically applied for working hours and rates.</p>

    <form [formGroup]="quickAddForm" (ngSubmit)="submitForm()">
      <div class="form-group mb-3">
        <label><span class="text-danger">*</span> Full Name</label>
        <input type="text" class="form-control" formControlName="name" placeholder="E.g. Jane Doe">
        <div *ngIf="quickAddForm.get('name')?.invalid && quickAddForm.get('name')?.touched"
             class="text-danger small mt-1">Name is required</div>
      </div>
      <div class="form-group mb-3">
        <label>Role / Description</label>
        <input type="text" class="form-control" formControlName="description" placeholder="Optional brief description">
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="submitForm()" [disabled]="isSaving || quickAddForm.invalid">
      <span *ngIf="isSaving">
        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
        Saving...
      </span>
      <span *ngIf="!isSaving">
        <i class="fa fa-check me-1"></i> Save {{ terminology.getTerm('Resource') }}
      </span>
    </button>
  </div>
</ng-template>
