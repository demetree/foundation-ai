<button class="btn btn-primary btn-glass shadow-sm" (click)="openModal()">
  <i class="fa fa-plus-circle me-1"></i> Add {{ terminology.getTerm('Resource') }}
</button>

<ng-template #quickAddModal let-modal>
  <div class="modal-header premium-header bg-primary text-white">
    <h4 class="modal-title m-0">
      <i class="fa-solid fa-user-plus me-2"></i> Onboard New {{ terminology.getTerm('Resource') }}
    </h4>
    <button type="button" class="btn-close btn-close-white" aria-label="Close" (click)="closeModal()"></button>
  </div>
  <div class="modal-body p-4 bg-light">
    <p class="text-muted small mb-4">Quickly add a new team member to the schedule. Defaults will be automatically applied for working hours and rates.</p>
    
    <form [formGroup]="quickAddForm" (ngSubmit)="submitForm()">
      <div class="mb-3">
        <label class="form-label fw-bold">Full Name <span class="text-danger">*</span></label>
        <div class="input-group drop-shadow-sm">
          <span class="input-group-text bg-white"><i class="fa-solid fa-user text-secondary"></i></span>
          <input type="text" class="form-control" formControlName="name" placeholder="E.g. Jane Doe">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold">Role / Description</label>
        <div class="input-group drop-shadow-sm">
          <span class="input-group-text bg-white"><i class="fa-solid fa-briefcase text-secondary"></i></span>
          <input type="text" class="form-control" formControlName="description" placeholder="Optional brief description">
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer bg-light border-top-0 pt-0 pb-4 justify-content-between">
    <button type="button" class="btn btn-outline-secondary btn-glass rounded-pill px-4 shadow-sm" (click)="closeModal()">Cancel</button>
    <button type="button" class="btn btn-primary btn-glass rounded-pill px-4 shadow-sm" (click)="submitForm()" [disabled]="isSaving || quickAddForm.invalid">
      <i class="fa fa-spinner fa-spin me-2" *ngIf="isSaving"></i> 
      <i class="fa fa-check me-2" *ngIf="!isSaving"></i> Save {{ terminology.getTerm('Resource') }}
    </button>
  </div>
</ng-template>
