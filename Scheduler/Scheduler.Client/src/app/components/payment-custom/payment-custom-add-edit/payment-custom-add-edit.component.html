<!-- AI-Developed — This file was significantly developed with AI assistance. -->
<ng-template #paymentModal let-modal>
    <div class="modal-header pay-modal-header">
        <h5 class="modal-title mb-0">
            <i class="fa-solid me-2" [ngClass]="isEditMode ? 'fa-pen-to-square' : 'fa-plus-circle'"></i>
            {{ isEditMode ? 'Edit Payment' : 'Record Payment' }}
        </h5>
        <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
            <i class="fa fa-xmark"></i>
        </button>
    </div>

    <div class="modal-body pay-modal-body">
        <form [formGroup]="form" (ngSubmit)="submitForm()">

            <!-- ═══ Payment Info ═══ -->
            <div class="section-card mb-3">
                <div class="section-label"><i class="fa-solid fa-credit-card me-1"></i> Payment Info</div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label"><span class="text-danger">*</span> Method</label>
                        <select formControlName="paymentMethodId" class="form-select">
                            <option [ngValue]="null">— Select —</option>
                            <option *ngFor="let m of paymentMethods$ | async" [ngValue]="m.id">{{ m.name }}</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label"><span class="text-danger">*</span> Status</label>
                        <select formControlName="status" class="form-select">
                            <option value="Completed">Completed</option>
                            <option value="Pending">Pending</option>
                            <option value="Failed">Failed</option>
                            <option value="Refunded">Refunded</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label"><span class="text-danger">*</span> Date</label>
                        <input type="datetime-local" formControlName="transactionDate" class="form-control" />
                    </div>
                </div>
            </div>

            <!-- ═══ Amounts ═══ -->
            <div class="section-card mb-3">
                <div class="section-label"><i class="fa-solid fa-dollar-sign me-1"></i> Amounts</div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label"><span class="text-danger">*</span> Amount</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" formControlName="amount" class="form-control" />
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Processing Fee</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" formControlName="processingFee" class="form-control" />
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Net Amount</label>
                        <div class="computed-value">{{ computedNetAmount | number:'1.2-2' }}</div>
                    </div>
                </div>
                <div class="row g-3 mt-1">
                    <div class="col-md-4">
                        <label class="form-label"><span class="text-danger">*</span> Currency</label>
                        <select formControlName="currencyId" class="form-select">
                            <option [ngValue]="null">— Select —</option>
                            <option *ngFor="let c of currencies$ | async" [ngValue]="c.id">{{ c.name }}</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- ═══ Payer Info ═══ -->
            <div class="section-card mb-3">
                <div class="section-label"><i class="fa-solid fa-user me-1"></i> Payer Info</div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Name</label>
                        <input type="text" formControlName="payerName" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input type="email" formControlName="payerEmail" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Phone</label>
                        <input type="text" formControlName="payerPhone" class="form-control" />
                    </div>
                </div>
            </div>

            <!-- ═══ Notes ═══ -->
            <div class="section-card mb-3">
                <div class="section-label"><i class="fa-solid fa-sticky-note me-1"></i> Notes</div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Receipt Number</label>
                        <input type="text" formControlName="receiptNumber" class="form-control" />
                    </div>
                </div>
                <div class="mt-3">
                    <label class="form-label">Notes</label>
                    <textarea formControlName="notes" class="form-control" rows="3"
                        placeholder="Optional..."></textarea>
                </div>
            </div>

            <!-- ═══ Footer ═══ -->
            <div class="modal-footer-actions">
                <button type="button" class="btn btn-outline-secondary" (click)="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-warning" [disabled]="isSaving">
                    <i class="fa-solid fa-spinner fa-spin me-1" *ngIf="isSaving"></i>
                    {{ isEditMode ? 'Save Changes' : 'Record Payment' }}
                </button>
            </div>
        </form>
    </div>
</ng-template>
