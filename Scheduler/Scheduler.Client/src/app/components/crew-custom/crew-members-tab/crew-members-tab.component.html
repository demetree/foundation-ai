<app-crew-member-add-edit [showAddButton]="false" (crewMemberChanged)="reload($event)"></app-crew-member-add-edit>
<app-resource-custom-add-edit [showAddButton]="false" (resourceChanged)="reload($event)"></app-resource-custom-add-edit>
<div class="card h-100">
  <div class="card-header bg-light d-flex justify-content-between align-items-center">
    <h6 class="mb-0 fw-semibold">
      <i class="fa-solid fa-users-gear me-2"></i>
      Crew Members
    </h6>
    <div class="d-flex gap-2">
      <!-- Add Resource to Crew Button -->
      <button class="btn btn-sm btn-primary"
              (click)="openAddToCrewModal()"
              *ngIf="userIsSchedulerCrewMemberWriter()">
        <i class="fa fa-plus me-1"></i> Add Member
      </button>
      <!-- Refresh Button -->
      <button class="btn btn-sm btn-outline-secondary" (click)="loadCrewMembers()">
        <i class="fa fa-sync" [ngClass]="{'fa-spin': isLoading}"></i>
      </button>
    </div>
  </div>

  <div class="card-body">
    <!-- Loading -->
    <div class="text-center py-4" *ngIf="isLoading">
      <div class="spinner-border spinner-border-sm text-primary" role="status">
        <span class="visually-hidden">Loading crews...</span>
      </div>
    </div>

    <!-- Error -->
    <div class="alert alert-danger small" *ngIf="error">
      <i class="fa-solid fa-exclamation-triangle me-2"></i>
      {{ error }}
    </div>

    <!-- Empty -->
    <div class="text-center py-5 text-muted" *ngIf="!isLoading && (!crewMembers || crewMembers.length === 0)">
      <i class="fa-solid fa-users-slash fa-3x mb-3 opacity-50"></i>
      <div>Crew has no members</div>
    </div>

    <!-- Crew Member List -->
    <div class="list-group list-group-flush" *ngIf="!isLoading && crewMembers && crewMembers.length > 0">
      <div class="list-group-item px-0 py-3 border-start border-4"
           *ngFor="let member of crewMembers"
           [style.border-left-color]="member.color || member.crew?.color || '#dee2e6'">
        <div class="d-flex align-items-center">

          <!-- Resource Avatar -->
          <div class="avatar-preview rounded-circle overflow-hidden flex-shrink-0 me-3 clickable mx-3"
               (click)="navigateToResource(member.resource?.id)"
               ngbTooltip="Resource Details"
               style="width: 50px; height: 50px;"
               [style.background-image]="member.resource?.avatarData ? 'url(data:' + member.resource?.avatarMimeType + ';base64,' + member.resource?.avatarData + ')' : null"
               [style.background-color]="member.resource?.color || member.crew?.color || '#6c757d'">
            <i [class]="crew?.icon?.fontAwesomeCode || 'fa-solid fa-user'"
               class="fa-2x text-white d-flex align-items-center justify-content-center w-100 h-100"
               *ngIf="!member.resource?.avatarData"></i>
          </div>

          <!-- Info -->
          <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-2">
              <a class="fw-bold fs-5 text-decoration-none clicable"
                 (click)="openResourceModal(member.resource)"
                 ngbTooltip="Edit Resource"
                 [style.color]="'#000000' || member.resource?.color || 'inherit'">
                {{ member.resource?.name || 'Unknown Resource' }}
              </a>
              <span class="badge"
                    [style.background-color]="member.color || member.resource?.color || '#0d6efd'"
                    [style.color]="(member.color ? (member.color | contrastColor) :
                                    member.resource?.color ? (member.resource?.color | contrastColor) :
                                    '#FFFFFF') || 'inherit'">
                {{ member.assignmentRole?.name || 'No Defined Role'}}
              </span>
              <span class="badge bg-light text-dark">
                Position {{ member.sequence }}
              </span>
            </div>
            <div class="small text-muted" *ngIf="member.resource?.description">
              {{ member.resource?.description }}
            </div>
          </div>
          
          <!-- Crew Member Badge -->
          <div class="ms-3 clickable" (click)="openCrewMemberModal(member)">
            <div class="badge rounded-pill px-3 py-2 text-white"
                 ngbTooltip="Edit Membership"
                 [style.background-color]="member.color || member.resource?.color || crew?.color || '#0d6efd'">
              <i [class]="crew?.icon?.fontAwesomeCode || 'fa-solid fa-users'"
                 [style.color]="(member.color | contrastColor) || (member.resource?.color | contrastColor) || (crew?.color | contrastColor) || '#FFFFFF'"
                 class="me-2"></i>
              Membership
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
