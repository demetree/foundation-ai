<!-- fm-scratchpad.component.html — Embeddable entity notes scratchpad -->

<div class="fm-scratchpad">

  <!-- Loading state -->
  <div *ngIf="isLoading" class="scratchpad-loading text-center py-4">
    <div class="spinner-border spinner-border-sm text-primary" role="status">
      <span class="visually-hidden">Loading notes...</span>
    </div>
    <div class="mt-2 text-muted small">Loading notes…</div>
  </div>

  <!-- No scratchpad yet — offer to create -->
  <div *ngIf="!isLoading && scratchpadDoc === undefined" class="scratchpad-empty text-center py-5">
    <i class="fa-solid fa-pencil empty-icon mb-3"></i>
    <h6 class="text-muted mb-2">No notes yet</h6>
    <p class="text-muted small mb-3">Create a scratchpad to start taking versioned notes for this {{ entityType | lowercase }}.</p>
    <button class="btn btn-sm btn-primary" (click)="createNote()" [disabled]="isCreating">
      <i *ngIf="!isCreating" class="fa-solid fa-plus me-1"></i>
      <i *ngIf="isCreating" class="fa-solid fa-spinner fa-spin me-1"></i>
      {{ isCreating ? 'Creating…' : 'Create Notes' }}
    </button>
  </div>

  <!-- Active scratchpad -->
  <ng-container *ngIf="!isLoading && scratchpadDoc">

    <!-- Header with actions -->
    <div class="scratchpad-header">
      <div class="d-flex align-items-center gap-2">
        <i class="fa-solid fa-pencil text-primary"></i>
        <span class="fw-semibold small">{{ scratchpadDoc.name }}</span>
      </div>
      <button class="btn btn-sm btn-glass-subtle" (click)="archiveAndStartFresh()"
              [disabled]="isArchiving" title="Archive current note and start a fresh one">
        <i *ngIf="!isArchiving" class="fa-solid fa-box-archive me-1"></i>
        <i *ngIf="isArchiving" class="fa-solid fa-spinner fa-spin me-1"></i>
        {{ isArchiving ? 'Archiving…' : 'Archive & Start New' }}
      </button>
    </div>

    <!-- Editor -->
    <div class="scratchpad-editor">
      <fm-text-editor
        [documentId]="scratchpadDoc.id"
        (saved)="onEditorSaved($event)">
      </fm-text-editor>
    </div>

  </ng-container>

</div>
