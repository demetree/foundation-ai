<div class="location-map-wrapper" [style.height]="height">

    <!-- Map container -->
    <div #mapContainer [id]="mapId" class="map-container" [class.editable]="editable">
    </div>

    <!-- Overlay prompt when no coordinates are set (editable mode only) -->
    <div *ngIf="!hasCoordinates && editable" class="no-coordinates-overlay">
        <div class="overlay-content">
            <i class="fa-solid fa-map-marker-alt fa-2x mb-2"></i>
            <div class="fw-semibold">No location set</div>
            <small class="text-muted">Click the map to place a marker</small>
        </div>
    </div>

    <!-- Overlay prompt when no coordinates (read-only mode) -->
    <div *ngIf="!hasCoordinates && !editable" class="no-coordinates-overlay read-only">
        <div class="overlay-content">
            <i class="fa-solid fa-map fa-2x mb-2 text-muted"></i>
            <div class="text-muted">No coordinates available</div>
        </div>
    </div>

</div>
