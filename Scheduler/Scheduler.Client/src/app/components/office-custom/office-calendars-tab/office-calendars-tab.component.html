<app-calendar-custom-add-edit [showAddButton]="false" (calendarChanged)="reload($event)"></app-calendar-custom-add-edit>
<div class="card h-100">
  <div class="card-header bg-light d-flex justify-content-between align-items-center">
    <h6 class="mb-0 fw-semibold">
      <i class="fa-solid fa-calendar me-2"></i>
      Calendars
    </h6>
    <div class="d-flex gap-2">
      <!-- Add Calendar Button -->
      <button class="btn btn-sm btn-primary"
              (click)="openAddCalendarModal()"
              *ngIf="userIsSchedulerCalendarWriter()">
        <i class="fa fa-plus me-1"></i> Add Calendar
      </button>
      <!-- Refresh Button -->
      <button class="btn btn-sm btn-outline-secondary" (click)="loadCalendars()">
        <i class="fa fa-sync" [ngClass]="{'fa-spin': isLoading}"></i>
      </button>
    </div>
  </div>

  <div class="card-body">
    <!-- Loading -->
    <div class="text-center py-4" *ngIf="isLoading">
      <div class="spinner-border spinner-border-sm text-primary" role="status">
        <span class="visually-hidden">Loading calendars...</span>
      </div>
    </div>

    <!-- Error -->
    <div class="alert alert-danger small" *ngIf="error">
      <i class="fa-solid fa-exclamation-triangle me-2"></i>
      {{ error }}
    </div>

    <!-- Empty -->
    <div class="text-center py-5 text-muted" *ngIf="!isLoading && (!calendars || calendars.length === 0)">
      <i class="fa-solid fa-users-slash fa-3x mb-3 opacity-50"></i>
      <div>No calendars</div>
    </div>

    <!-- Calendar List -->
    <div class="list-group list-group-flush" *ngIf="!isLoading && calendars && calendars.length > 0">
      <div class="list-group-item px-0 py-3 border-start border-4"
           *ngFor="let calendar of calendars"
           [style.border-left-color]="calendar.color || '#dee2e6'">
        <div class="d-flex align-items-center">

          <!-- Calendar Avatar -->
          <div class="avatar-preview rounded-circle overflow-hidden flex-shrink-0 me-3 clickable mx-3"
               ngbTooltip="Calendar Details"
               (click)="navigateToCalendar(calendar.id)"
               style="width: 50px; height: 50px;"
               [style.background-color]="calendar.color || calendar.color || '#6c757d'">
            <i class="fa-2x text-white d-flex align-items-center justify-content-center w-100 h-100"
               [class]="calendar.icon? calendar.icon.fontAwesomeCode : 'fa-solid fa-user'"
               *ngIf="calendar.icon != null"></i>
            <span *ngIf="calendar.icon == null"
                  [style.color]="(calendar.color | contrastColor) || '#000000'">{{ calendar?.name | slice:0:2 | uppercase }}
            </span>
          </div>


          <!-- Info -->
          <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-2">
              <a class="fw-bold fs-5 text-decoration-none"
                 ngbTooltip="Edit Calendar"
                 (click)="openCalendarModal(calendar)"
                 [style.color]="'#000000'">
                {{ calendar.name }}
              </a>
              <!--<span class="badge"
                    [style.background-color]="calendar.color || '#0d6efd'"
                    [style.color]="(calendar.color ? (calendar.color | contrastColor) :
                                   '#FFFFFF') || 'inherit'"
                    *ngIf="calendar.resourceType">
                {{ calendar.resourceType.name }}
              </span>-->
            </div>
            <div class="small text-muted" *ngIf="calendar.description">
              {{ calendar.description }}
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
