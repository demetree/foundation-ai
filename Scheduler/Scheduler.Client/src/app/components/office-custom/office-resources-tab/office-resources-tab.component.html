<app-resource-custom-add-edit [showAddButton]="false" (resourceChanged)="reload($event)"></app-resource-custom-add-edit>
<div class="card h-100">
  <div class="card-header bg-light d-flex justify-content-between align-items-center">
    <h6 class="mb-0 fw-semibold">
      <i class="fa-solid fa-users-gear me-2"></i>
      Resources
    </h6>
    <div class="d-flex gap-2">
      <!-- Add Resource Button -->
      <button class="btn btn-sm btn-primary"
              (click)="openAddResourceModal()"
              *ngIf="userIsSchedulerResourceWriter()">
        <i class="fa fa-plus me-1"></i> Add Resource
      </button>
      <!-- Refresh Button -->
      <button class="btn btn-sm btn-outline-secondary" (click)="loadResources()">
        <i class="fa fa-sync" [ngClass]="{'fa-spin': isLoading}"></i>
      </button>
    </div>
  </div>

  <div class="card-body">
    <!-- Loading -->
    <div class="text-center py-4" *ngIf="isLoading">
      <div class="spinner-border spinner-border-sm text-primary" role="status">
        <span class="visually-hidden">Loading resources...</span>
      </div>
    </div>

    <!-- Error -->
    <div class="alert alert-danger small" *ngIf="error">
      <i class="fa-solid fa-exclamation-triangle me-2"></i>
      {{ error }}
    </div>

    <!-- Empty -->
    <div class="text-center py-5 text-muted" *ngIf="!isLoading && (!resources || resources.length === 0)">
      <i class="fa-solid fa-users-slash fa-3x mb-3 opacity-50"></i>
      <div>No resources</div>
    </div>

    <!-- Resource List -->
    <div class="list-group list-group-flush" *ngIf="!isLoading && resources && resources.length > 0">
      <div class="list-group-item px-0 py-3 border-start border-4"
           *ngFor="let resource of resources"
           [style.border-left-color]="resource.color || '#dee2e6'">
        <div class="d-flex align-items-center">

          <!-- Resource Avatar -->
          <div class="avatar-preview rounded-circle overflow-hidden flex-shrink-0 me-3 clickable mx-3"
               ngbTooltip="Resource Details"
               (click)="navigateToResource(resource.id)"
               style="width: 50px; height: 50px;"
               [style.background-image]="resource.avatarData ? 'url(data:' + resource.avatarMimeType + ';base64,' + resource.avatarData + ')' : null"
               [style.background-color]="resource.color || resource.color || '#6c757d'">
            <i [class]="'fa-solid fa-user'"
               class="fa-2x text-white d-flex align-items-center justify-content-center w-100 h-100"
               *ngIf="!resource.avatarData"></i>
          </div>


          <!-- Info -->
          <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-2">
              <a class="fw-bold fs-5 text-decoration-none"
                 ngbTooltip="Edit Resource"
                 (click)="openResourceModal(resource)"
                 [style.color]="'#000000'">
                {{ resource.name }}
              </a>
              <span class="badge"
                    [style.background-color]="resource.color || '#0d6efd'"
                    [style.color]="(resource.color ? (resource.color | contrastColor) :
                                   '#FFFFFF') || 'inherit'"
                    *ngIf="resource.resourceType">
                {{ resource.resourceType.name }}
              </span>
            </div>
            <div class="small text-muted" *ngIf="resource.description">
              {{ resource.description }}
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
