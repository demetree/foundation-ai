<div class="calendar-container">
    <!-- Custom Header -->
    <div class="calendar-header d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center gap-2">
            <!-- Navigation -->
            <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-primary" (click)="navigateCalendar('prev')">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <button class="btn btn-outline-primary" (click)="navigateCalendar('today')">Today</button>
                <button class="btn btn-outline-primary" (click)="navigateCalendar('next')">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
            <h5 class="mb-0 fw-semibold text-primary">{{ currentTitle }}</h5>
        </div>

        <div class="d-flex align-items-center gap-2">
            <!-- View Toggle -->
            <div class="btn-group btn-group-sm">
                <button *ngFor="let view of ['dayGridMonth', 'timeGridWeek', 'timeGridDay']" class="btn"
                    [class.btn-primary]="currentView === view" [class.btn-outline-primary]="currentView !== view"
                    (click)="changeView(view)">
                    {{ getViewLabel(view) }}
                </button>
            </div>

            <!-- Loading indicator -->
            <div *ngIf="isLoading" class="spinner-border spinner-border-sm text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <!-- FullCalendar -->
    <full-calendar #calendar [options]="calendarOptions"></full-calendar>
</div>
