<div class="page-container">
    <div class="card mb-3 header-card premium-header shadow-lg border-0">
        <div
            class="card-header d-flex flex-wrap justify-content-between align-items-center gap-3 border-0 bg-transparent">
            <div class="header-left">
                <!-- Back Button -->
                <button class="btn btn-sm btn-glass back-button me-2" (click)="goBack()" ngbTooltip="Go Back"
                    *ngIf="canGoBack()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <!-- Title -->
                <div class="text-white">
                    <h3 class="page-title mb-0 fw-bold text-shadow">Volunteers</h3>
                    <small class="text-white-50">Manage Volunteer Profiles</small>
                </div>
            </div>

            <div class="header-right">
                <span class="badge badge-glass mx-2" *ngIf="loadingTotalCount || loadingFilteredCount">
                    <i class="fa fa-spinner fa-spin me-1"></i> Loading...
                </span>

                <span *ngIf="!(loadingTotalCount || loadingFilteredCount)">
                    <ng-container *ngIf="totalVolunteerCount$ | async as total; else loading">
                        <span class="badge badge-glass mx-2">

                            <!-- Filtered: some results -->
                            <ng-container *ngIf="filteredVolunteerCount$ | async as filteredCount">
                                <span *ngIf="filterText && (filteredCount ?? 0) > 0">
                                    {{ filteredCount }} of {{ total }} {{ total !== 1 ? 'Volunteers' : 'Volunteer' }}
                                </span>
                            </ng-container>
                            <!-- Filtered: 0 results -->
                            <span *ngIf="total > 0 && filterText && (filteredVolunteerCount$ | async) === 0">
                                No matching Volunteers
                            </span>
                            <!-- No filter: normal count -->
                            <span *ngIf="!filterText">
                                {{ total }} {{ total !== 1 ? 'Volunteers' : 'Volunteer' }}
                            </span>
                            <!-- No Volunteers at all (even unfiltered) -->
                            <span *ngIf="total === 0">
                                No Volunteers
                            </span>

                        </span>
                    </ng-container>

                    <!-- when observable is falsy, then decide whether to show a spinner or a loading spinner.. -->
                    <ng-template #loading>
                        <span class="badge badge-glass mx-2" *ngIf="(loadingTotalCount || loadingFilteredCount)">
                            <i class="fa fa-spinner fa-spin me-1"></i> Loading...
                        </span>
                        <span class="badge badge-glass mx-2" *ngIf="!(loadingTotalCount || loadingFilteredCount)">
                            No Volunteers
                        </span>
                    </ng-template>

                </span>


                <!-- Dashboard Toggle -->
                <button class="btn btn-sm" [class.btn-warning]="showDashboard"
                    [class.btn-outline-secondary]="!showDashboard" (click)="showDashboard = !showDashboard"
                    ngbTooltip="Toggle Dashboard">
                    <i class="fa fa-gauge-high"></i>
                </button>

                <!-- Filter Toggle -->
                <button class="btn btn-sm" [class.btn-info]="showFilters || hasActiveFilters"
                    [class.btn-outline-secondary]="!showFilters && !hasActiveFilters" (click)="toggleFilters()"
                    ngbTooltip="Toggle Filters">
                    <i class="fa fa-filter me-1"></i>
                    <span *ngIf="hasActiveFilters" class="badge bg-warning text-dark ms-1">!</span>
                </button>

                <!-- Quick Search Input -->
                <div class="search-bar me-2 position-relative">
                    <i class="fa fa-search search-icon text-white-50"></i>
                    <input type="text" class="form-control search-input glass-input" placeholder="Search Volunteers..."
                        [(ngModel)]="filterText" (ngModelChange)="onFilterChange()">
                    <button *ngIf="filterText" class="clear-search btn text-white"
                        (click)="filterText=''; onFilterChange()" title="Clear Search">
                        <i class="fa fa-times"></i>
                    </button>
                </div>

                <!-- Add/Edit Button -->
                <div class="add-button-wrapper">
                    <app-volunteer-custom-add-edit [navigateToDetailsAfterAdd]="false"></app-volunteer-custom-add-edit>
                </div>
            </div>
        </div>

        <!-- Collapsible Filter Bar -->
        <div class="filter-bar px-3 pb-3" *ngIf="showFilters">
            <div class="d-flex flex-wrap gap-3 align-items-end">
                <div>
                    <label class="form-label small text-white-50 mb-1">Status</label>
                    <select class="form-select form-select-sm glass-input" [(ngModel)]="statusFilter"
                        style="min-width: 160px;">
                        <option [ngValue]="null">All Statuses</option>
                        <option *ngFor="let s of volunteerStatuses" [ngValue]="s.id">
                            {{ s.name }}
                        </option>
                    </select>
                </div>
                <div>
                    <label class="form-label small text-white-50 mb-1">BG Check</label>
                    <select class="form-select form-select-sm glass-input" [(ngModel)]="bgCheckFilter"
                        style="min-width: 130px;">
                        <option [ngValue]="null">All</option>
                        <option [ngValue]="true">Completed</option>
                        <option [ngValue]="false">Not Completed</option>
                    </select>
                </div>
                <div>
                    <label class="form-label small text-white-50 mb-1">Active</label>
                    <select class="form-select form-select-sm glass-input" [(ngModel)]="activeFilter"
                        style="min-width: 130px;">
                        <option [ngValue]="null">All</option>
                        <option [ngValue]="true">Active</option>
                        <option [ngValue]="false">Inactive</option>
                    </select>
                </div>
                <div>
                    <button class="btn btn-sm btn-outline-light" (click)="clearFilters()"
                        [disabled]="!hasActiveFilters">
                        <i class="fa fa-times me-1"></i> Clear
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard View -->
    <app-volunteer-dashboard *ngIf="showDashboard && userIsVolunteerReader()"></app-volunteer-dashboard>

    <!-- Table View -->
    <app-volunteer-custom-table *ngIf="!showDashboard && userIsVolunteerReader() == true" [filterText]="filterText"
        [isSmallScreen]="isSmallScreen" [statusFilter]="statusFilter" [bgCheckFilter]="bgCheckFilter"
        [activeFilter]="activeFilter">
    </app-volunteer-custom-table>
</div>
