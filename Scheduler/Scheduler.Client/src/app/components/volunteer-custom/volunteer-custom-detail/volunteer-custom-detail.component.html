<div class="page-container" *ngIf="!isLoading && volunteer">
    <!-- Premium Header -->
    <div class="card mb-3 header-card premium-header shadow-lg border-0">
        <div
            class="card-header d-flex flex-wrap justify-content-between align-items-center gap-3 border-0 bg-transparent">
            <div class="header-left">
                <button class="btn btn-sm btn-glass back-button me-2" (click)="goBack()" ngbTooltip="Go Back">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="text-white">
                    <h3 class="page-title mb-0 fw-bold text-shadow">{{ volunteer.resource?.name || 'Volunteer' }}</h3>
                    <small class="text-white-50">Volunteer Profile</small>
                </div>
            </div>
            <div class="header-right">
                <!-- Status Badge -->
                <span class="badge badge-glass mx-2" *ngIf="volunteer.volunteerStatus"
                    [style.border-color]="volunteer.volunteerStatus.color || 'white'">
                    {{ volunteer.volunteerStatus.name }}
                </span>
                <!-- Edit Button -->
                <button class="btn btn-sm btn-glass" (click)="openEditModal()" *ngIf="userIsVolunteerWriter()"
                    ngbTooltip="Edit Volunteer">
                    <i class="fa-solid fa-pen me-1"></i> Edit
                </button>
                <!-- Link to Resource -->
                <button class="btn btn-sm btn-glass" (click)="navigateToResource()" *ngIf="volunteer.resourceId"
                    ngbTooltip="View Resource">
                    <i class="fa-solid fa-user-gear me-1"></i> Resource
                </button>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="card shadow-sm border-0">
        <ul ngbNav #nav="ngbNav" [(activeId)]="activeTab" class="nav nav-tabs nav-fill premium-tabs"
            (activeIdChange)="onTabChange($event)">

            <li ngbNavItem="overview">
                <a ngbNavLink>
                    <i class="fa-solid fa-user me-1"></i> Overview
                </a>
                <ng-template ngbNavContent>
                    <app-volunteer-overview-tab [volunteer]="volunteer"></app-volunteer-overview-tab>
                </ng-template>
            </li>

            <li ngbNavItem="groups">
                <a ngbNavLink>
                    <i class="fa-solid fa-people-group me-1"></i> Groups
                </a>
                <ng-template ngbNavContent>
                    <app-volunteer-groups-tab [volunteer]="volunteer"></app-volunteer-groups-tab>
                </ng-template>
            </li>

            <li ngbNavItem="history">
                <a ngbNavLink>
                    <i class="fa-solid fa-clock-rotate-left me-1"></i> History
                    <span class="badge bg-secondary ms-1">
                        {{ (volunteer.VolunteerProfileChangeHistoriesCount$ | async) ?? '-' }}
                    </span>
                </a>
                <ng-template ngbNavContent>
                    <div class="p-4">
                        <p class="text-muted">Change history will be loaded here.</p>
                    </div>
                </ng-template>
            </li>

        </ul>
        <div [ngbNavOutlet]="nav" class="tab-content"></div>
    </div>
</div>

<!-- Loading Spinner -->
<div class="d-flex justify-content-center align-items-center min-vh-50 py-5" *ngIf="isLoading">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading volunteer...</span>
    </div>
</div>

<!-- Not Found -->
<div class="text-center py-5" *ngIf="!isLoading && !volunteer">
    <i class="fa-solid fa-user-slash fa-3x text-muted mb-3"></i>
    <h5 class="text-muted">Volunteer not found</h5>
    <button class="btn btn-sm btn-outline-primary mt-2" (click)="goBack()">Go Back</button>
</div>

<!-- Hidden Add/Edit for modal -->
<app-volunteer-custom-add-edit [showAddButton]="false"
    (volunteerProfileChanged)="onVolunteerChanged()"></app-volunteer-custom-add-edit>
