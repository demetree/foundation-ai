<div class="add-entity-data-token" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-entity-data-token me-2"
        (click)="openModal()"
        ngbTooltip="Add Entity Data Token" 
        *ngIf="userIsSecurityEntityDataTokenWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #entityDataTokenModal let-modal>
   <div class="modal-header bg-dark text-light entity-data-token-modal-header">
      <h5 class="modal-title mb-0" id="entityDataTokenModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Entity Data Token' : 'Add Entity Data Token' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body entity-data-token-modal-body">
      <form [formGroup]="entityDataTokenForm" (ngSubmit)="submitForm()">
            <div class="form-group">
                <label for="securityUserId" id="label-securityUserId"><span class="text-danger">*</span>Security User</label>
                <select id="securityUserId" formControlName="securityUserId" class="form-select entity-data-token-select" [disabled]="!userIsSecurityEntityDataTokenWriter()">
                    <option [ngValue]="null">Select Security User</option>
                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                </select>
                <div *ngIf="entityDataTokenForm.get('securityUserId')?.invalid && entityDataTokenForm.get('securityUserId')?.touched" class="text-danger">
                    Security User is required
                </div>
            </div>
            <div class="form-group">
                <label for="moduleId" id="label-moduleId"><span class="text-danger">*</span>Module</label>
                <select id="moduleId" formControlName="moduleId" class="form-select entity-data-token-select" [disabled]="!userIsSecurityEntityDataTokenWriter()">
                    <option [ngValue]="null">Select Module</option>
                    <option *ngFor="let module of modules$ | async" [ngValue]="module.id">{{module.name}}</option>
                </select>
                <div *ngIf="entityDataTokenForm.get('moduleId')?.invalid && entityDataTokenForm.get('moduleId')?.touched" class="text-danger">
                    Module is required
                </div>
            </div>
            <div class="form-group">
                <label for="entity" id="label-entity"><span class="text-danger">*</span>Entity</label>
                <input type="text" id="entity" formControlName="entity" placeholder="Enter Entity" class="form-control entity-data-token-input" [disabled]="!userIsSecurityEntityDataTokenWriter()" aria-labelledby="label-entity" />
                <div *ngIf="entityDataTokenForm.get('entity')?.invalid && entityDataTokenForm.get('entity')?.touched" class="text-danger">
                    Entity is required
                </div>
            </div>
            <div class="form-group">
                <label for="sessionId" id="label-sessionId"><span class="text-danger">*</span>Session Id</label>
                <input type="text" id="sessionId" formControlName="sessionId" placeholder="Enter Session Id" class="form-control entity-data-token-input" [disabled]="!userIsSecurityEntityDataTokenWriter()" aria-labelledby="label-sessionId" />
                <div *ngIf="entityDataTokenForm.get('sessionId')?.invalid && entityDataTokenForm.get('sessionId')?.touched" class="text-danger">
                    Session Id is required
                </div>
            </div>
            <div class="form-group">
                <label for="authenticationToken" id="label-authenticationToken"><span class="text-danger">*</span>Authentication Token</label>
                <input type="text" id="authenticationToken" formControlName="authenticationToken" placeholder="Enter Authentication Token" class="form-control entity-data-token-input" [disabled]="!userIsSecurityEntityDataTokenWriter()" aria-labelledby="label-authenticationToken" />
                <div *ngIf="entityDataTokenForm.get('authenticationToken')?.invalid && entityDataTokenForm.get('authenticationToken')?.touched" class="text-danger">
                    Authentication Token is required
                </div>
            </div>
            <div class="form-group">
                <label for="token" id="label-token"><span class="text-danger">*</span>Token</label>
                <input type="text" id="token" formControlName="token" placeholder="Enter Token" class="form-control entity-data-token-input" [disabled]="!userIsSecurityEntityDataTokenWriter()" aria-labelledby="label-token" />
                <div *ngIf="entityDataTokenForm.get('token')?.invalid && entityDataTokenForm.get('token')?.touched" class="text-danger">
                    Token is required
                </div>
            </div>
            <div class="form-group">
                <label for="timeStamp" id="label-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control entity-data-token-input" [disabled]="!userIsSecurityEntityDataTokenWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="entityDataTokenForm.get('timeStamp')?.invalid && entityDataTokenForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group">
                <label for="comments" id="label-comments">Comments</label>
                <textarea id="comments" formControlName="comments" placeholder="Enter Comments" class="form-control entity-data-token-input" [disabled]="!userIsSecurityEntityDataTokenWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecurityEntityDataTokenWriter()" />
                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecurityEntityDataTokenWriter()" />
                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer entity-data-token-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Entity Data Token changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !entityDataTokenForm.valid || entityDataTokenForm.pristine || !userIsSecurityEntityDataTokenWriter()" ngbTooltip="Save the Entity Data Token changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
