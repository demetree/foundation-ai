<div class="container-fluid p-1 m-0 privilege-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="privilege-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Privilege</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Privilege' : 'Add Privilege'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecurityPrivilegeReader()">
                <div class="col m-2 privilege-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="privilegeForm" (ngSubmit)="submitForm()" class="privilege-details-form">
                            <div class="form-group">
                                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="name" formControlName="name" placeholder="Enter Name" class="form-control privilege-input" [disabled]="!userIsSecurityPrivilegeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="privilegeForm.get('name')?.invalid && privilegeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="description" id="label-description">Description</label>
                                <textarea id="description" formControlName="description" placeholder="Enter Description" class="form-control privilege-input" [disabled]="!userIsSecurityPrivilegeWriter()"></textarea>
                            </div>
                            <div class="privilege-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="privilegeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Privilege">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !privilegeForm.valid || !privilegeForm.dirty || privilegeForm.pristine || userIsSecurityPrivilegeWriter() == false " ngbTooltip="Save Privilege">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSecurityPrivilegeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 privilege-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="securityRoleService.userIsSecuritySecurityRoleReader()">
                            <button ngbNavLink>SecurityRoles
                                <span class="badge bg-primary ms-2">
                                    {{ (privilegeData?.SecurityRolesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <app-security-role-table [queryParams]="GetQueryParameters()"></app-security-role-table>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
