<div class="container-fluid p-1 m-0 security-department-user-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-department-user-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security Department User</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security Department User' : 'Add Security Department User'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityDepartmentUserReader()">
                <div class="col m-2 security-department-user-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityDepartmentUserForm" (ngSubmit)="submitForm()" class="security-department-user-details-form">
                            <div class="form-group">
                                <label for="securityDepartmentId" id="label-securityDepartmentId"><span class="text-danger">*</span>Security Department</label>
                                <select id="securityDepartmentId" formControlName="securityDepartmentId" class="form-select security-department-user-select" [disabled]="!userIsSecuritySecurityDepartmentUserWriter()">
                                    <option [ngValue]="null">Select Security Department</option>
                                    <option *ngFor="let securityDepartment of securityDepartments$ | async" [ngValue]="securityDepartment.id">{{securityDepartment.name}}</option>
                                </select>
                                <div *ngIf="securityDepartmentUserForm.get('securityDepartmentId')?.invalid && securityDepartmentUserForm.get('securityDepartmentId')?.touched" class="text-danger">
                                    Security Department is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="securityUserId" id="label-securityUserId"><span class="text-danger">*</span>Security User</label>
                                <select id="securityUserId" formControlName="securityUserId" class="form-select security-department-user-select" [disabled]="!userIsSecuritySecurityDepartmentUserWriter()">
                                    <option [ngValue]="null">Select Security User</option>
                                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="securityDepartmentUserForm.get('securityUserId')?.invalid && securityDepartmentUserForm.get('securityUserId')?.touched" class="text-danger">
                                    Security User is required
                                </div>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="canRead" formControlName="canRead" class="form-check-input" [disabled]="!userIsSecuritySecurityDepartmentUserWriter()" />
                                <label for="canRead" class="form-check-label" id="label-canRead"><span class="text-danger">*</span>Can Read</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="canWrite" formControlName="canWrite" class="form-check-input" [disabled]="!userIsSecuritySecurityDepartmentUserWriter()" />
                                <label for="canWrite" class="form-check-label" id="label-canWrite"><span class="text-danger">*</span>Can Write</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="canChangeHierarchy" formControlName="canChangeHierarchy" class="form-check-input" [disabled]="!userIsSecuritySecurityDepartmentUserWriter()" />
                                <label for="canChangeHierarchy" class="form-check-label" id="label-canChangeHierarchy"><span class="text-danger">*</span>Can Change Hierarchy</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="canChangeOwner" formControlName="canChangeOwner" class="form-check-input" [disabled]="!userIsSecuritySecurityDepartmentUserWriter()" />
                                <label for="canChangeOwner" class="form-check-label" id="label-canChangeOwner"><span class="text-danger">*</span>Can Change Owner</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityDepartmentUserWriter()" />
                                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityDepartmentUserWriter()" />
                                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-department-user-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityDepartmentUserForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security Department User">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !securityDepartmentUserForm.valid || !securityDepartmentUserForm.dirty || securityDepartmentUserForm.pristine || userIsSecuritySecurityDepartmentUserWriter() == false " ngbTooltip="Save Security Department User">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
