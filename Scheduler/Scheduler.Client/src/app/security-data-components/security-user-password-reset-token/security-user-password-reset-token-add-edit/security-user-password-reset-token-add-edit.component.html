<div class="add-security-user-password-reset-token" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-security-user-password-reset-token me-2"
        (click)="openModal()"
        ngbTooltip="Add Security User Password Reset Token" 
        *ngIf="userIsSecuritySecurityUserPasswordResetTokenWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #securityUserPasswordResetTokenModal let-modal>
   <div class="modal-header bg-dark text-light security-user-password-reset-token-modal-header">
      <h5 class="modal-title mb-0" id="securityUserPasswordResetTokenModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Security User Password Reset Token' : 'Add Security User Password Reset Token' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body security-user-password-reset-token-modal-body">
      <form [formGroup]="securityUserPasswordResetTokenForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('securityUserId')">
                <label for="SecurityUserPasswordResetToken-securityUserId" id="label-SecurityUserPasswordResetToken-securityUserId"><span class="text-danger">*</span>Security User</label>
                <select id="SecurityUserPasswordResetToken-securityUserId" formControlName="securityUserId" class="form-select security-user-password-reset-token-select" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()">
                    <option [ngValue]="null">Select Security User</option>
                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                </select>
                <div *ngIf="securityUserPasswordResetTokenForm.get('securityUserId')?.invalid && securityUserPasswordResetTokenForm.get('securityUserId')?.touched" class="text-danger">
                    Security User is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('token')">
                <label for="SecurityUserPasswordResetToken-token" id="label-SecurityUserPasswordResetToken-token"><span class="text-danger">*</span>Token</label>
                <input type="text" id="SecurityUserPasswordResetToken-token" formControlName="token" placeholder="Enter Token" class="form-control security-user-password-reset-token-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" aria-labelledby="label-token" />
                <div *ngIf="securityUserPasswordResetTokenForm.get('token')?.invalid && securityUserPasswordResetTokenForm.get('token')?.touched" class="text-danger">
                    Token is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="SecurityUserPasswordResetToken-timeStamp" id="label-SecurityUserPasswordResetToken-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="SecurityUserPasswordResetToken-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control security-user-password-reset-token-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="securityUserPasswordResetTokenForm.get('timeStamp')?.invalid && securityUserPasswordResetTokenForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('expiry')">
                <label for="SecurityUserPasswordResetToken-expiry" id="label-SecurityUserPasswordResetToken-expiry"><span class="text-danger">*</span>Expiry</label>
                <input type="datetime-local" id="SecurityUserPasswordResetToken-expiry" formControlName="expiry" placeholder="Enter Expiry" class="form-control security-user-password-reset-token-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" aria-labelledby="label-expiry" />
                <div *ngIf="securityUserPasswordResetTokenForm.get('expiry')?.invalid && securityUserPasswordResetTokenForm.get('expiry')?.touched" class="text-danger">
                    Expiry is required
                </div>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('systemInitiated')">
                <input type="checkbox" id="SecurityUserPasswordResetToken-systemInitiated" formControlName="systemInitiated" class="form-check-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" />
                <label for="SecurityUserPasswordResetToken-systemInitiated" class="form-check-label" id="label-SecurityUserPasswordResetToken-systemInitiated"><span class="text-danger">*</span>System Initiated</label>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('completed')">
                <input type="checkbox" id="SecurityUserPasswordResetToken-completed" formControlName="completed" class="form-check-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" />
                <label for="SecurityUserPasswordResetToken-completed" class="form-check-label" id="label-SecurityUserPasswordResetToken-completed"><span class="text-danger">*</span>Completed</label>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                <label for="SecurityUserPasswordResetToken-comments" id="label-SecurityUserPasswordResetToken-comments">Comments</label>
                <textarea id="SecurityUserPasswordResetToken-comments" formControlName="comments" placeholder="Enter Comments" class="form-control security-user-password-reset-token-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="SecurityUserPasswordResetToken-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" />
                <label for="SecurityUserPasswordResetToken-active" class="form-check-label" id="label-SecurityUserPasswordResetToken-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="SecurityUserPasswordResetToken-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" />
                <label for="SecurityUserPasswordResetToken-deleted" class="form-check-label" id="label-SecurityUserPasswordResetToken-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer security-user-password-reset-token-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Security User Password Reset Token changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityUserPasswordResetTokenForm.valid || securityUserPasswordResetTokenForm.pristine  || userIsSecuritySecurityUserPasswordResetTokenWriter() == false " ngbTooltip="Save the Security User Password Reset Token changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Security User Password Reset Token' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
