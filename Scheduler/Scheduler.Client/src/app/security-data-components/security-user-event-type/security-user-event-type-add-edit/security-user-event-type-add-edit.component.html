<div class="add-security-user-event-type" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-security-user-event-type me-2"
        (click)="openModal()"
        ngbTooltip="Add Security User Event Type" 
        *ngIf="userIsSecuritySecurityUserEventTypeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #securityUserEventTypeModal let-modal>
   <div class="modal-header bg-dark text-light security-user-event-type-modal-header">
      <h5 class="modal-title mb-0" id="securityUserEventTypeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Security User Event Type' : 'Add Security User Event Type' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body security-user-event-type-modal-body">
      <form [formGroup]="securityUserEventTypeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="SecurityUserEventType-name" id="label-SecurityUserEventType-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="SecurityUserEventType-name" formControlName="name" placeholder="Enter Name" class="form-control security-user-event-type-input" [disabled]="!userIsSecuritySecurityUserEventTypeWriter()" aria-labelledby="label-name" />
                <div *ngIf="securityUserEventTypeForm.get('name')?.invalid && securityUserEventTypeForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="SecurityUserEventType-description" id="label-SecurityUserEventType-description">Description</label>
                <textarea id="SecurityUserEventType-description" formControlName="description" placeholder="Enter Description" class="form-control security-user-event-type-input" [disabled]="!userIsSecuritySecurityUserEventTypeWriter()"></textarea>
            </div>
         <div class="modal-footer security-user-event-type-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Security User Event Type changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityUserEventTypeForm.valid || securityUserEventTypeForm.pristine  || userIsSecuritySecurityUserEventTypeWriter() == false " ngbTooltip="Save the Security User Event Type changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Security User Event Type' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
