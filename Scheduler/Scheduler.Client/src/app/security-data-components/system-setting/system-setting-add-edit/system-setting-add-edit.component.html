<div class="add-system-setting" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-system-setting me-2"
        (click)="openModal()"
        ngbTooltip="Add System Setting" 
        *ngIf="userIsSecuritySystemSettingWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #systemSettingModal let-modal>
   <div class="modal-header bg-dark text-light system-setting-modal-header">
      <h5 class="modal-title mb-0" id="systemSettingModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit System Setting' : 'Add System Setting' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body system-setting-modal-body">
      <form [formGroup]="systemSettingForm" (ngSubmit)="submitForm()">
            <div class="form-group">
                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="name" formControlName="name" placeholder="Enter Name" class="form-control system-setting-input" [disabled]="!userIsSecuritySystemSettingWriter()" aria-labelledby="label-name" />
                <div *ngIf="systemSettingForm.get('name')?.invalid && systemSettingForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group">
                <label for="description" id="label-description">Description</label>
                <textarea id="description" formControlName="description" placeholder="Enter Description" class="form-control system-setting-input" [disabled]="!userIsSecuritySystemSettingWriter()"></textarea>
            </div>
            <div class="form-group">
                <label for="value" id="label-value">Value</label>
                <textarea id="value" formControlName="value" placeholder="Enter Value" class="form-control system-setting-input" [disabled]="!userIsSecuritySystemSettingWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySystemSettingWriter()" />
                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySystemSettingWriter()" />
                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer system-setting-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the System Setting changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !systemSettingForm.valid || systemSettingForm.pristine || !userIsSecuritySystemSettingWriter()" ngbTooltip="Save the System Setting changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
