<div class="container-fluid p-1 m-0 security-user-event-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-user-event-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security User Event</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security User Event' : 'Add Security User Event'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityUserEventReader()">
                <div class="col m-2 security-user-event-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityUserEventForm" (ngSubmit)="submitForm()" class="security-user-event-details-form">
                            <div class="form-group">
                                <label for="securityUserId" id="label-securityUserId"><span class="text-danger">*</span>Security User</label>
                                <select id="securityUserId" formControlName="securityUserId" class="form-select security-user-event-select" [disabled]="!userIsSecuritySecurityUserEventWriter()">
                                    <option [ngValue]="null">Select Security User</option>
                                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="securityUserEventForm.get('securityUserId')?.invalid && securityUserEventForm.get('securityUserId')?.touched" class="text-danger">
                                    Security User is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="securityUserEventTypeId" id="label-securityUserEventTypeId"><span class="text-danger">*</span>Security User Event Type</label>
                                <select id="securityUserEventTypeId" formControlName="securityUserEventTypeId" class="form-select security-user-event-select" [disabled]="!userIsSecuritySecurityUserEventWriter()">
                                    <option [ngValue]="null">Select Security User Event Type</option>
                                    <option *ngFor="let securityUserEventType of securityUserEventTypes$ | async" [ngValue]="securityUserEventType.id">{{securityUserEventType.name}}</option>
                                </select>
                                <div *ngIf="securityUserEventForm.get('securityUserEventTypeId')?.invalid && securityUserEventForm.get('securityUserEventTypeId')?.touched" class="text-danger">
                                    Security User Event Type is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="timeStamp" id="label-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control security-user-event-input" [disabled]="!userIsSecuritySecurityUserEventWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="securityUserEventForm.get('timeStamp')?.invalid && securityUserEventForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="comments" id="label-comments">Comments</label>
                                <textarea id="comments" formControlName="comments" placeholder="Enter Comments" class="form-control security-user-event-input" [disabled]="!userIsSecuritySecurityUserEventWriter()"></textarea>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityUserEventWriter()" />
                                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityUserEventWriter()" />
                                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-user-event-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityUserEventForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security User Event">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !securityUserEventForm.valid || !securityUserEventForm.dirty || securityUserEventForm.pristine || userIsSecuritySecurityUserEventWriter() == false " ngbTooltip="Save Security User Event">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
