<div class="add-module" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-module me-2"
        (click)="openModal()"
        ngbTooltip="Add Module" 
        *ngIf="userIsSecurityModuleWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #moduleModal let-modal>
   <div class="modal-header bg-dark text-light module-modal-header">
      <h5 class="modal-title mb-0" id="moduleModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Module' : 'Add Module' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body module-modal-body">
      <form [formGroup]="moduleForm" (ngSubmit)="submitForm()">
            <div class="form-group">
                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="name" formControlName="name" placeholder="Enter Name" class="form-control module-input" [disabled]="!userIsSecurityModuleWriter()" aria-labelledby="label-name" />
                <div *ngIf="moduleForm.get('name')?.invalid && moduleForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group">
                <label for="description" id="label-description">Description</label>
                <textarea id="description" formControlName="description" placeholder="Enter Description" class="form-control module-input" [disabled]="!userIsSecurityModuleWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecurityModuleWriter()" />
                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecurityModuleWriter()" />
                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer module-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Module changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !moduleForm.valid || moduleForm.pristine || !userIsSecurityModuleWriter()" ngbTooltip="Save the Module changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
