<div class="container-fluid p-1 m-0 security-team-user-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-team-user-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security Team User</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security Team User' : 'Add Security Team User'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityTeamUserReader()">
                <div class="col m-2 security-team-user-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityTeamUserForm" (ngSubmit)="submitForm()" class="security-team-user-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('securityTeamId')">
                                <label for="SecurityTeamUser-securityTeamId" id="label-SecurityTeamUser-securityTeamId"><span class="text-danger">*</span>Security Team</label>
                                <select id="SecurityTeamUser-securityTeamId" formControlName="securityTeamId" class="form-select security-team-user-select" [disabled]="!userIsSecuritySecurityTeamUserWriter()">
                                    <option [ngValue]="null">Select Security Team</option>
                                    <option *ngFor="let securityTeam of securityTeams$ | async" [ngValue]="securityTeam.id">{{securityTeam.name}}</option>
                                </select>
                                <div *ngIf="securityTeamUserForm.get('securityTeamId')?.invalid && securityTeamUserForm.get('securityTeamId')?.touched" class="text-danger">
                                    Security Team is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('securityUserId')">
                                <label for="SecurityTeamUser-securityUserId" id="label-SecurityTeamUser-securityUserId"><span class="text-danger">*</span>Security User</label>
                                <select id="SecurityTeamUser-securityUserId" formControlName="securityUserId" class="form-select security-team-user-select" [disabled]="!userIsSecuritySecurityTeamUserWriter()">
                                    <option [ngValue]="null">Select Security User</option>
                                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="securityTeamUserForm.get('securityUserId')?.invalid && securityTeamUserForm.get('securityUserId')?.touched" class="text-danger">
                                    Security User is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('canRead')">
                                <input type="checkbox" id="SecurityTeamUser-canRead" formControlName="canRead" class="form-check-input" [disabled]="!userIsSecuritySecurityTeamUserWriter()" />
                                <label for="SecurityTeamUser-canRead" class="form-check-label" id="label-SecurityTeamUser-canRead"><span class="text-danger">*</span>Can Read</label>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('canWrite')">
                                <input type="checkbox" id="SecurityTeamUser-canWrite" formControlName="canWrite" class="form-check-input" [disabled]="!userIsSecuritySecurityTeamUserWriter()" />
                                <label for="SecurityTeamUser-canWrite" class="form-check-label" id="label-SecurityTeamUser-canWrite"><span class="text-danger">*</span>Can Write</label>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('canChangeHierarchy')">
                                <input type="checkbox" id="SecurityTeamUser-canChangeHierarchy" formControlName="canChangeHierarchy" class="form-check-input" [disabled]="!userIsSecuritySecurityTeamUserWriter()" />
                                <label for="SecurityTeamUser-canChangeHierarchy" class="form-check-label" id="label-SecurityTeamUser-canChangeHierarchy"><span class="text-danger">*</span>Can Change Hierarchy</label>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('canChangeOwner')">
                                <input type="checkbox" id="SecurityTeamUser-canChangeOwner" formControlName="canChangeOwner" class="form-check-input" [disabled]="!userIsSecuritySecurityTeamUserWriter()" />
                                <label for="SecurityTeamUser-canChangeOwner" class="form-check-label" id="label-SecurityTeamUser-canChangeOwner"><span class="text-danger">*</span>Can Change Owner</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityTeamUser-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityTeamUserWriter()" />
                                <label for="SecurityTeamUser-active" class="form-check-label" id="label-SecurityTeamUser-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityTeamUser-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityTeamUserWriter()" />
                                <label for="SecurityTeamUser-deleted" class="form-check-label" id="label-SecurityTeamUser-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-team-user-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityTeamUserForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security Team User">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityTeamUserForm.valid || !securityTeamUserForm.dirty || securityTeamUserForm.pristine  || userIsSecuritySecurityTeamUserWriter() == false " ngbTooltip="Save the Security Team User changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Security Team User' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
