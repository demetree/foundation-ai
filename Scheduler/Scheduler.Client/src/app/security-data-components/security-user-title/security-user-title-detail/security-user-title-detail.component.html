<div class="container-fluid p-1 m-0 security-user-title-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-user-title-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security User Title</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security User Title' : 'Add Security User Title'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityUserTitleReader()">
                <div class="col m-2 security-user-title-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityUserTitleForm" (ngSubmit)="submitForm()" class="security-user-title-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="SecurityUserTitle-name" id="label-SecurityUserTitle-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="SecurityUserTitle-name" formControlName="name" placeholder="Enter Name" class="form-control security-user-title-input" [disabled]="!userIsSecuritySecurityUserTitleWriter()" aria-labelledby="label-name" />
                                <div *ngIf="securityUserTitleForm.get('name')?.invalid && securityUserTitleForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="SecurityUserTitle-description" id="label-SecurityUserTitle-description">Description</label>
                                <textarea id="SecurityUserTitle-description" formControlName="description" placeholder="Enter Description" class="form-control security-user-title-input" [disabled]="!userIsSecuritySecurityUserTitleWriter()"></textarea>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityUserTitle-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityUserTitleWriter()" />
                                <label for="SecurityUserTitle-active" class="form-check-label" id="label-SecurityUserTitle-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityUserTitle-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityUserTitleWriter()" />
                                <label for="SecurityUserTitle-deleted" class="form-check-label" id="label-SecurityUserTitle-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-user-title-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityUserTitleForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security User Title">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityUserTitleForm.valid || !securityUserTitleForm.dirty || securityUserTitleForm.pristine  || userIsSecuritySecurityUserTitleWriter() == false " ngbTooltip="Save the Security User Title changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Security User Title' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSecuritySecurityUserTitleReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 security-user-title-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="securityUserService.userIsSecuritySecurityUserReader()">
                            <button ngbNavLink>Security Users
                                <span class="badge bg-primary ms-2">
                                    {{ (securityUserTitleData?.SecurityUsersCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-user-table [queryParams]="{ securityUserTitleId: securityUserTitleData?.id }"></app-security-user-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-security-user-add-edit [preSeededData]="{ securityUserTitleId: securityUserTitleData?.id }" [hiddenFields]="['securityUserTitleId']"></app-security-user-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
