<div class="add-security-user-title" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-security-user-title me-2"
        (click)="openModal()"
        ngbTooltip="Add Security User Title" 
        *ngIf="userIsSecuritySecurityUserTitleWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #securityUserTitleModal let-modal>
   <div class="modal-header bg-dark text-light security-user-title-modal-header">
      <h5 class="modal-title mb-0" id="securityUserTitleModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Security User Title' : 'Add Security User Title' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body security-user-title-modal-body">
      <form [formGroup]="securityUserTitleForm" (ngSubmit)="submitForm()">
            <div class="form-group">
                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="name" formControlName="name" placeholder="Enter Name" class="form-control security-user-title-input" [disabled]="!userIsSecuritySecurityUserTitleWriter()" aria-labelledby="label-name" />
                <div *ngIf="securityUserTitleForm.get('name')?.invalid && securityUserTitleForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group">
                <label for="description" id="label-description">Description</label>
                <textarea id="description" formControlName="description" placeholder="Enter Description" class="form-control security-user-title-input" [disabled]="!userIsSecuritySecurityUserTitleWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityUserTitleWriter()" />
                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityUserTitleWriter()" />
                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer security-user-title-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Security User Title changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityUserTitleForm.valid || securityUserTitleForm.pristine || !userIsSecuritySecurityUserTitleWriter()" ngbTooltip="Save the Security User Title changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
