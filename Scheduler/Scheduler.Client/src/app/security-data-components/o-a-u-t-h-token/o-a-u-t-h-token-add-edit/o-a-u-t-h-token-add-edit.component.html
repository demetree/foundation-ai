<div class="add-o-a-u-t-h-token" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-o-a-u-t-h-token me-2"
        (click)="openModal()"
        ngbTooltip="Add O A U T H Token" 
        *ngIf="userIsSecurityOAUTHTokenWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #oAUTHTokenModal let-modal>
   <div class="modal-header bg-dark text-light o-a-u-t-h-token-modal-header">
      <h5 class="modal-title mb-0" id="oAUTHTokenModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit O A U T H Token' : 'Add O A U T H Token' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body o-a-u-t-h-token-modal-body">
      <form [formGroup]="oAUTHTokenForm" (ngSubmit)="submitForm()">
            <div class="form-group">
                <label for="token" id="label-token"><span class="text-danger">*</span>Token</label>
                <input type="text" id="token" formControlName="token" placeholder="Enter Token" class="form-control o-a-u-t-h-token-input" [disabled]="!userIsSecurityOAUTHTokenWriter()" aria-labelledby="label-token" />
                <div *ngIf="oAUTHTokenForm.get('token')?.invalid && oAUTHTokenForm.get('token')?.touched" class="text-danger">
                    Token is required
                </div>
            </div>
            <div class="form-group">
                <label for="expiryDateTime" id="label-expiryDateTime"><span class="text-danger">*</span>Expiry Date Time</label>
                <input type="datetime-local" id="expiryDateTime" formControlName="expiryDateTime" placeholder="Enter Expiry Date Time" class="form-control o-a-u-t-h-token-input" [disabled]="!userIsSecurityOAUTHTokenWriter()" aria-labelledby="label-expiryDateTime" />
                <div *ngIf="oAUTHTokenForm.get('expiryDateTime')?.invalid && oAUTHTokenForm.get('expiryDateTime')?.touched" class="text-danger">
                    Expiry Date Time is required
                </div>
            </div>
            <div class="form-group">
                <label for="userData" id="label-userData">User Data</label>
                <textarea id="userData" formControlName="userData" placeholder="Enter User Data" class="form-control o-a-u-t-h-token-input" [disabled]="!userIsSecurityOAUTHTokenWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecurityOAUTHTokenWriter()" />
                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecurityOAUTHTokenWriter()" />
                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer o-a-u-t-h-token-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the O A U T H Token changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !oAUTHTokenForm.valid || oAUTHTokenForm.pristine || !userIsSecurityOAUTHTokenWriter()" ngbTooltip="Save the O A U T H Token changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
