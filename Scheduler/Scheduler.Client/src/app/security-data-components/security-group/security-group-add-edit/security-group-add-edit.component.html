<div class="add-security-group" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-security-group me-2"
        (click)="openModal()"
        ngbTooltip="Add Security Group" 
        *ngIf="userIsSecuritySecurityGroupWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #securityGroupModal let-modal>
   <div class="modal-header bg-dark text-light security-group-modal-header">
      <h5 class="modal-title mb-0" id="securityGroupModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Security Group' : 'Add Security Group' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body security-group-modal-body">
      <form [formGroup]="securityGroupForm" (ngSubmit)="submitForm()">
            <div class="form-group">
                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="name" formControlName="name" placeholder="Enter Name" class="form-control security-group-input" [disabled]="!userIsSecuritySecurityGroupWriter()" aria-labelledby="label-name" />
                <div *ngIf="securityGroupForm.get('name')?.invalid && securityGroupForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group">
                <label for="description" id="label-description">Description</label>
                <textarea id="description" formControlName="description" placeholder="Enter Description" class="form-control security-group-input" [disabled]="!userIsSecuritySecurityGroupWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityGroupWriter()" />
                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityGroupWriter()" />
                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer security-group-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Security Group changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityGroupForm.valid || securityGroupForm.pristine || !userIsSecuritySecurityGroupWriter()" ngbTooltip="Save the Security Group changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
