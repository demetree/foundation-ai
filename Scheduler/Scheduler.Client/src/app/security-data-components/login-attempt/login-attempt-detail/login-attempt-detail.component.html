<div class="container-fluid p-1 m-0 login-attempt-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="login-attempt-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Login Attempt</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Login Attempt' : 'Add Login Attempt'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecurityLoginAttemptReader()">
                <div class="col m-2 login-attempt-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="loginAttemptForm" (ngSubmit)="submitForm()" class="login-attempt-details-form">
                            <div class="form-group">
                                <label for="timeStamp" id="label-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="loginAttemptForm.get('timeStamp')?.invalid && loginAttemptForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="userName" id="label-userName">User Name</label>
                                <input type="text" id="userName" formControlName="userName" placeholder="Enter User Name" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()" aria-labelledby="label-userName" />
                            </div>
                            <div class="form-group">
                                <label for="passwordHash" id="label-passwordHash">Password Hash</label>
                                <input type="number" id="passwordHash" formControlName="passwordHash" placeholder="Enter Password Hash" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()" aria-labelledby="label-passwordHash" />
                            </div>
                            <div class="form-group">
                                <label for="resource" id="label-resource">Resource</label>
                                <textarea id="resource" formControlName="resource" placeholder="Enter Resource" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()"></textarea>
                            </div>
                            <div class="form-group">
                                <label for="sessionId" id="label-sessionId">Session Id</label>
                                <input type="text" id="sessionId" formControlName="sessionId" placeholder="Enter Session Id" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()" aria-labelledby="label-sessionId" />
                            </div>
                            <div class="form-group">
                                <label for="ipAddress" id="label-ipAddress">Ip Address</label>
                                <input type="text" id="ipAddress" formControlName="ipAddress" placeholder="Enter Ip Address" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()" aria-labelledby="label-ipAddress" />
                            </div>
                            <div class="form-group">
                                <label for="userAgent" id="label-userAgent">User Agent</label>
                                <input type="text" id="userAgent" formControlName="userAgent" placeholder="Enter User Agent" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()" aria-labelledby="label-userAgent" />
                            </div>
                            <div class="form-group">
                                <label for="value" id="label-value">Value</label>
                                <textarea id="value" formControlName="value" placeholder="Enter Value" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()"></textarea>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecurityLoginAttemptWriter()" />
                                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecurityLoginAttemptWriter()" />
                                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="login-attempt-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="loginAttemptForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Login Attempt">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !loginAttemptForm.valid || !loginAttemptForm.dirty || loginAttemptForm.pristine || userIsSecurityLoginAttemptWriter() == false " ngbTooltip="Save Login Attempt">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
