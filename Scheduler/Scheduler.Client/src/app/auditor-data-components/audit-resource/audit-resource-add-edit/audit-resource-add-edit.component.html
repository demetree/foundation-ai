<div class="add-audit-resource" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-resource me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Resource" 
        *ngIf="userIsAuditorAuditResourceWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditResourceModal let-modal>
   <div class="modal-header bg-dark text-light audit-resource-modal-header">
      <h5 class="modal-title mb-0" id="auditResourceModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Resource' : 'Add Audit Resource' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body audit-resource-modal-body">
      <form [formGroup]="auditResourceForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="AuditResource-name" id="label-AuditResource-name"><span class="text-danger">*</span>Name</label>
                <textarea id="AuditResource-name" formControlName="name" placeholder="Enter Name" class="form-control audit-resource-input" [disabled]="!userIsAuditorAuditResourceWriter()"></textarea>
                <div *ngIf="auditResourceForm.get('name')?.invalid && auditResourceForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                <label for="AuditResource-comments" id="label-AuditResource-comments">Comments</label>
                <textarea id="AuditResource-comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-resource-input" [disabled]="!userIsAuditorAuditResourceWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('firstAccess')">
                <label for="AuditResource-firstAccess" id="label-AuditResource-firstAccess">First Access</label>
                <input type="datetime-local" id="AuditResource-firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-resource-input" [disabled]="!userIsAuditorAuditResourceWriter()" aria-labelledby="label-firstAccess" />
            </div>
         <div class="modal-footer audit-resource-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Resource changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditResourceForm.valid || auditResourceForm.pristine  || userIsAuditorAuditResourceWriter() == false " ngbTooltip="Save the Audit Resource changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Audit Resource' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
