<div class="add-audit-session" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-session me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Session" 
        *ngIf="userIsAuditorAuditSessionWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditSessionModal let-modal>
   <div class="modal-header bg-dark text-light audit-session-modal-header">
      <h5 class="modal-title mb-0" id="auditSessionModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Session' : 'Add Audit Session' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body audit-session-modal-body">
      <form [formGroup]="auditSessionForm" (ngSubmit)="submitForm()">
            <div class="form-group">
                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                <textarea id="name" formControlName="name" placeholder="Enter Name" class="form-control audit-session-input" [disabled]="!userIsAuditorAuditSessionWriter()"></textarea>
                <div *ngIf="auditSessionForm.get('name')?.invalid && auditSessionForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group">
                <label for="comments" id="label-comments">Comments</label>
                <textarea id="comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-session-input" [disabled]="!userIsAuditorAuditSessionWriter()"></textarea>
            </div>
            <div class="form-group">
                <label for="firstAccess" id="label-firstAccess">First Access</label>
                <input type="datetime-local" id="firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-session-input" [disabled]="!userIsAuditorAuditSessionWriter()" aria-labelledby="label-firstAccess" />
            </div>
         <div class="modal-footer audit-session-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Session changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditSessionForm.valid || auditSessionForm.pristine || !userIsAuditorAuditSessionWriter()" ngbTooltip="Save the Audit Session changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
