<div class="container-fluid p-1 m-0 audit-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="audit-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Audit Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Audit Type' : 'Add Audit Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAuditorAuditTypeReader()">
                <div class="col m-2 audit-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="auditTypeForm" (ngSubmit)="submitForm()" class="audit-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="AuditType-name" id="label-AuditType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="AuditType-name" formControlName="name" placeholder="Enter Name" class="form-control audit-type-input" [disabled]="!userIsAuditorAuditTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="auditTypeForm.get('name')?.invalid && auditTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="AuditType-description" id="label-AuditType-description">Description</label>
                                <textarea id="AuditType-description" formControlName="description" placeholder="Enter Description" class="form-control audit-type-input" [disabled]="!userIsAuditorAuditTypeWriter()"></textarea>
                            </div>
                            <div class="audit-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="auditTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Audit Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditTypeForm.valid || !auditTypeForm.dirty || auditTypeForm.pristine  || userIsAuditorAuditTypeWriter() == false " ngbTooltip="Save the Audit Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Audit Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAuditorAuditTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 audit-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="auditEventService.userIsAuditorAuditEventReader()">
                            <button ngbNavLink>Audit Events
                                <span class="badge bg-primary ms-2">
                                    {{ (auditTypeData?.AuditEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-audit-event-table [queryParams]="{ auditTypeId: auditTypeData?.id }"></app-audit-event-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-audit-event-add-edit [preSeededData]="{ auditTypeId: auditTypeData?.id }" [hiddenFields]="['auditTypeId']"></app-audit-event-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
