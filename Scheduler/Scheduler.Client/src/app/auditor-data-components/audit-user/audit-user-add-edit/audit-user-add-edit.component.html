<div class="add-audit-user" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-user me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit User" 
        *ngIf="userIsAuditorAuditUserWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditUserModal let-modal>
   <div class="modal-header bg-dark text-light audit-user-modal-header">
      <h5 class="modal-title mb-0" id="auditUserModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit User' : 'Add Audit User' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body audit-user-modal-body">
      <form [formGroup]="auditUserForm" (ngSubmit)="submitForm()">
            <div class="form-group">
                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                <textarea id="name" formControlName="name" placeholder="Enter Name" class="form-control audit-user-input" [disabled]="!userIsAuditorAuditUserWriter()"></textarea>
                <div *ngIf="auditUserForm.get('name')?.invalid && auditUserForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group">
                <label for="comments" id="label-comments">Comments</label>
                <textarea id="comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-user-input" [disabled]="!userIsAuditorAuditUserWriter()"></textarea>
            </div>
            <div class="form-group">
                <label for="firstAccess" id="label-firstAccess">First Access</label>
                <input type="datetime-local" id="firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-user-input" [disabled]="!userIsAuditorAuditUserWriter()" aria-labelledby="label-firstAccess" />
            </div>
         <div class="modal-footer audit-user-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit User changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditUserForm.valid || auditUserForm.pristine || !userIsAuditorAuditUserWriter()" ngbTooltip="Save the Audit User changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
