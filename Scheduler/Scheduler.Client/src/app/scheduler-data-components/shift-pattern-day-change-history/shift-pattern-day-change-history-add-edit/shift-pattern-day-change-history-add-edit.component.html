<div class="add-shift-pattern-day-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-shift-pattern-day-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Shift Pattern Day Change History" 
        *ngIf="userIsSchedulerShiftPatternDayChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #shiftPatternDayChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light shift-pattern-day-change-history-modal-header">
      <h5 class="modal-title mb-0" id="shiftPatternDayChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Shift Pattern Day Change History' : 'Add Shift Pattern Day Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body shift-pattern-day-change-history-modal-body">
      <form [formGroup]="shiftPatternDayChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('shiftPatternDayId')">
                <label for="ShiftPatternDayChangeHistory-shiftPatternDayId" id="label-ShiftPatternDayChangeHistory-shiftPatternDayId"><span class="text-danger">*</span>Shift Pattern Day</label>
                <select id="ShiftPatternDayChangeHistory-shiftPatternDayId" formControlName="shiftPatternDayId" class="form-select shift-pattern-day-change-history-select" [disabled]="!userIsSchedulerShiftPatternDayChangeHistoryWriter()">
                    <option [ngValue]="null">Select Shift Pattern Day</option>
                    <option *ngFor="let shiftPatternDay of shiftPatternDays$ | async" [ngValue]="shiftPatternDay.id">{{shiftPatternDay.label}}</option>
                </select>
                <div *ngIf="shiftPatternDayChangeHistoryForm.get('shiftPatternDayId')?.invalid && shiftPatternDayChangeHistoryForm.get('shiftPatternDayId')?.touched" class="text-danger">
                    Shift Pattern Day is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ShiftPatternDayChangeHistory-versionNumber" id="label-ShiftPatternDayChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ShiftPatternDayChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control shift-pattern-day-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="ShiftPatternDayChangeHistory-timeStamp" id="label-ShiftPatternDayChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="ShiftPatternDayChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control shift-pattern-day-change-history-input" [disabled]="!userIsSchedulerShiftPatternDayChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="shiftPatternDayChangeHistoryForm.get('timeStamp')?.invalid && shiftPatternDayChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="ShiftPatternDayChangeHistory-userId" id="label-ShiftPatternDayChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="ShiftPatternDayChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control shift-pattern-day-change-history-input" [disabled]="!userIsSchedulerShiftPatternDayChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="shiftPatternDayChangeHistoryForm.get('userId')?.invalid && shiftPatternDayChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="ShiftPatternDayChangeHistory-data" id="label-ShiftPatternDayChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="ShiftPatternDayChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control shift-pattern-day-change-history-input" [disabled]="!userIsSchedulerShiftPatternDayChangeHistoryWriter()"></textarea>
                <div *ngIf="shiftPatternDayChangeHistoryForm.get('data')?.invalid && shiftPatternDayChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer shift-pattern-day-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Shift Pattern Day Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !shiftPatternDayChangeHistoryForm.valid || shiftPatternDayChangeHistoryForm.pristine || !userIsSchedulerShiftPatternDayChangeHistoryWriter()" ngbTooltip="Save the Shift Pattern Day Change History changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
