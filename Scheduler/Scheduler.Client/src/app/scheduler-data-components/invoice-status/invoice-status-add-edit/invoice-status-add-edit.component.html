<div class="add-invoice-status" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-invoice-status me-2"
        (click)="openModal()"
        ngbTooltip="Add Invoice Status" 
        *ngIf="userIsSchedulerInvoiceStatusWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #invoiceStatusModal let-modal>
   <div class="modal-header invoice-status-modal-header">
      <h5 class="modal-title mb-0" id="invoiceStatusModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Invoice Status' : 'Add Invoice Status' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body invoice-status-modal-body">
      <form [formGroup]="invoiceStatusForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="InvoiceStatus-name" id="label-InvoiceStatus-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="InvoiceStatus-name" formControlName="name" placeholder="Enter Name" class="form-control invoice-status-input" [disabled]="!userIsSchedulerInvoiceStatusWriter()" aria-labelledby="label-name" />
                <div *ngIf="invoiceStatusForm.get('name')?.invalid && invoiceStatusForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="InvoiceStatus-description" id="label-InvoiceStatus-description"><span class="text-danger">*</span>Description</label>
                <textarea id="InvoiceStatus-description" formControlName="description" placeholder="Enter Description" class="form-control invoice-status-input" [disabled]="!userIsSchedulerInvoiceStatusWriter()"></textarea>
                <div *ngIf="invoiceStatusForm.get('description')?.invalid && invoiceStatusForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('color')">
                <label for="InvoiceStatus-color" id="label-InvoiceStatus-color">Color</label>
                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="InvoiceStatus-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerInvoiceStatusWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="invoiceStatusForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="InvoiceStatus-sequence" id="label-InvoiceStatus-sequence">Sequence</label>
                <input type="number" id="InvoiceStatus-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control invoice-status-input" [disabled]="!userIsSchedulerInvoiceStatusWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="InvoiceStatus-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerInvoiceStatusWriter()" />
                <label for="InvoiceStatus-active" class="form-check-label" id="label-InvoiceStatus-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="InvoiceStatus-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerInvoiceStatusWriter()" />
                <label for="InvoiceStatus-deleted" class="form-check-label" id="label-InvoiceStatus-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer invoice-status-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Invoice Status changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !invoiceStatusForm.valid || invoiceStatusForm.pristine  || userIsSchedulerInvoiceStatusWriter() == false " ngbTooltip="Save the Invoice Status changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Invoice Status' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
