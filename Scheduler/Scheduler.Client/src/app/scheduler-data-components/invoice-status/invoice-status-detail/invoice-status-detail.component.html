<div class="container-fluid p-1 m-0 invoice-status-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="invoice-status-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Invoice Status</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Invoice Status' : 'Add Invoice Status'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerInvoiceStatusReader()">
                <div class="col m-2 invoice-status-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="invoiceStatusForm" (ngSubmit)="submitForm()" class="invoice-status-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="InvoiceStatus-name" id="label-InvoiceStatus-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="InvoiceStatus-name" formControlName="name" placeholder="Enter Name" class="form-control invoice-status-input" [disabled]="!userIsSchedulerInvoiceStatusWriter()" aria-labelledby="label-name" />
                                <div *ngIf="invoiceStatusForm.get('name')?.invalid && invoiceStatusForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="InvoiceStatus-description" id="label-InvoiceStatus-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="InvoiceStatus-description" formControlName="description" placeholder="Enter Description" class="form-control invoice-status-input" [disabled]="!userIsSchedulerInvoiceStatusWriter()"></textarea>
                                <div *ngIf="invoiceStatusForm.get('description')?.invalid && invoiceStatusForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="InvoiceStatus-color" id="label-InvoiceStatus-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="InvoiceStatus-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerInvoiceStatusWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="invoiceStatusForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="InvoiceStatus-sequence" id="label-InvoiceStatus-sequence">Sequence</label>
                                <input type="number" id="InvoiceStatus-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control invoice-status-input" [disabled]="!userIsSchedulerInvoiceStatusWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="InvoiceStatus-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerInvoiceStatusWriter()" />
                                <label for="InvoiceStatus-active" class="form-check-label" id="label-InvoiceStatus-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="InvoiceStatus-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerInvoiceStatusWriter()" />
                                <label for="InvoiceStatus-deleted" class="form-check-label" id="label-InvoiceStatus-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="invoice-status-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="invoiceStatusForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Invoice Status">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !invoiceStatusForm.valid || !invoiceStatusForm.dirty || invoiceStatusForm.pristine  || userIsSchedulerInvoiceStatusWriter() == false " ngbTooltip="Save the Invoice Status changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Invoice Status' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerInvoiceStatusReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 invoice-status-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="invoiceService.userIsSchedulerInvoiceReader()">
                            <button ngbNavLink>Invoices
                                <span class="badge bg-primary ms-2">
                                    {{ (invoiceStatusData?.InvoicesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-invoice-table [queryParams]="{ invoiceStatusId: invoiceStatusData?.id }" [showAddButton]="true" [preSeededData]="{ invoiceStatusId: invoiceStatusData?.id }" [hiddenFields]="['invoiceStatusId']"></app-invoice-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
