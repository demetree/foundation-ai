<div class="container-fluid p-1 m-0 dependency-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="dependency-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Dependency Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Dependency Type' : 'Add Dependency Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerDependencyTypeReader()">
                <div class="col m-2 dependency-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="dependencyTypeForm" (ngSubmit)="submitForm()" class="dependency-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="DependencyType-name" id="label-DependencyType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="DependencyType-name" formControlName="name" placeholder="Enter Name" class="form-control dependency-type-input" [disabled]="!userIsSchedulerDependencyTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="dependencyTypeForm.get('name')?.invalid && dependencyTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="DependencyType-description" id="label-DependencyType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="DependencyType-description" formControlName="description" placeholder="Enter Description" class="form-control dependency-type-input" [disabled]="!userIsSchedulerDependencyTypeWriter()"></textarea>
                                <div *ngIf="dependencyTypeForm.get('description')?.invalid && dependencyTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="DependencyType-sequence" id="label-DependencyType-sequence">Sequence</label>
                                <input type="number" id="DependencyType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control dependency-type-input" [disabled]="!userIsSchedulerDependencyTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="DependencyType-color" id="label-DependencyType-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="DependencyType-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerDependencyTypeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="dependencyTypeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="DependencyType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerDependencyTypeWriter()" />
                                <label for="DependencyType-active" class="form-check-label" id="label-DependencyType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="DependencyType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerDependencyTypeWriter()" />
                                <label for="DependencyType-deleted" class="form-check-label" id="label-DependencyType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="dependency-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="dependencyTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Dependency Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !dependencyTypeForm.valid || !dependencyTypeForm.dirty || dependencyTypeForm.pristine  || userIsSchedulerDependencyTypeWriter() == false " ngbTooltip="Save the Dependency Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Dependency Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerDependencyTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 dependency-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="scheduledEventDependencyService.userIsSchedulerScheduledEventDependencyReader()">
                            <button ngbNavLink>Scheduled Event Dependencies
                                <span class="badge bg-primary ms-2">
                                    {{ (dependencyTypeData?.ScheduledEventDependenciesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduled-event-dependency-table [queryParams]="{ dependencyTypeId: dependencyTypeData?.id }"></app-scheduled-event-dependency-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-scheduled-event-dependency-add-edit [preSeededData]="{ dependencyTypeId: dependencyTypeData?.id }" [hiddenFields]="['dependencyTypeId']"></app-scheduled-event-dependency-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
