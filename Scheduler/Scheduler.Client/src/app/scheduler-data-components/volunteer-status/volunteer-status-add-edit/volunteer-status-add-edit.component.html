<div class="add-volunteer-status" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-volunteer-status me-2"
        (click)="openModal()"
        ngbTooltip="Add Volunteer Status" 
        *ngIf="userIsSchedulerVolunteerStatusWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #volunteerStatusModal let-modal>
   <div class="modal-header volunteer-status-modal-header">
      <h5 class="modal-title mb-0" id="volunteerStatusModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Volunteer Status' : 'Add Volunteer Status' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body volunteer-status-modal-body">
      <form [formGroup]="volunteerStatusForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="VolunteerStatus-name" id="label-VolunteerStatus-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="VolunteerStatus-name" formControlName="name" placeholder="Enter Name" class="form-control volunteer-status-input" [disabled]="!userIsSchedulerVolunteerStatusWriter()" aria-labelledby="label-name" />
                <div *ngIf="volunteerStatusForm.get('name')?.invalid && volunteerStatusForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="VolunteerStatus-description" id="label-VolunteerStatus-description"><span class="text-danger">*</span>Description</label>
                <textarea id="VolunteerStatus-description" formControlName="description" placeholder="Enter Description" class="form-control volunteer-status-input" [disabled]="!userIsSchedulerVolunteerStatusWriter()"></textarea>
                <div *ngIf="volunteerStatusForm.get('description')?.invalid && volunteerStatusForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="VolunteerStatus-sequence" id="label-VolunteerStatus-sequence">Sequence</label>
                <input type="number" id="VolunteerStatus-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control volunteer-status-input" [disabled]="!userIsSchedulerVolunteerStatusWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('color')">
                <label for="VolunteerStatus-color" id="label-VolunteerStatus-color">Color</label>
                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="VolunteerStatus-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerVolunteerStatusWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="volunteerStatusForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('iconId')">
                <label for="VolunteerStatus-iconId" id="label-VolunteerStatus-iconId">Icon</label>
                <select id="VolunteerStatus-iconId" formControlName="iconId" class="form-select volunteer-status-select" [disabled]="!userIsSchedulerVolunteerStatusWriter()">
                    <option [ngValue]="null">Select Icon</option>
                    <option *ngFor="let icon of icons$ | async" [ngValue]="icon.id">{{icon.name}}</option>
                </select>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('isActive')">
                <input type="checkbox" id="VolunteerStatus-isActive" formControlName="isActive" class="form-check-input" [disabled]="!userIsSchedulerVolunteerStatusWriter()" />
                <label for="VolunteerStatus-isActive" class="form-check-label" id="label-VolunteerStatus-isActive">Is Active</label>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('preventsScheduling')">
                <input type="checkbox" id="VolunteerStatus-preventsScheduling" formControlName="preventsScheduling" class="form-check-input" [disabled]="!userIsSchedulerVolunteerStatusWriter()" />
                <label for="VolunteerStatus-preventsScheduling" class="form-check-label" id="label-VolunteerStatus-preventsScheduling"><span class="text-danger">*</span>Prevents Scheduling</label>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('requiresApproval')">
                <input type="checkbox" id="VolunteerStatus-requiresApproval" formControlName="requiresApproval" class="form-check-input" [disabled]="!userIsSchedulerVolunteerStatusWriter()" />
                <label for="VolunteerStatus-requiresApproval" class="form-check-label" id="label-VolunteerStatus-requiresApproval"><span class="text-danger">*</span>Requires Approval</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="VolunteerStatus-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerVolunteerStatusWriter()" />
                <label for="VolunteerStatus-active" class="form-check-label" id="label-VolunteerStatus-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="VolunteerStatus-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerVolunteerStatusWriter()" />
                <label for="VolunteerStatus-deleted" class="form-check-label" id="label-VolunteerStatus-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer volunteer-status-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Volunteer Status changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !volunteerStatusForm.valid || volunteerStatusForm.pristine  || userIsSchedulerVolunteerStatusWriter() == false " ngbTooltip="Save the Volunteer Status changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Volunteer Status' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
