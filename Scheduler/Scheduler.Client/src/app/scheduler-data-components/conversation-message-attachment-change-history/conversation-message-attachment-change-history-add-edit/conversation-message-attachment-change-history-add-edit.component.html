<div class="add-conversation-message-attachment-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-conversation-message-attachment-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Conversation Message Attachment Change History" 
        *ngIf="userIsSchedulerConversationMessageAttachmentChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #conversationMessageAttachmentChangeHistoryModal let-modal>
   <div class="modal-header conversation-message-attachment-change-history-modal-header">
      <h5 class="modal-title mb-0" id="conversationMessageAttachmentChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Conversation Message Attachment Change History' : 'Add Conversation Message Attachment Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body conversation-message-attachment-change-history-modal-body">
      <form [formGroup]="conversationMessageAttachmentChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('conversationMessageAttachmentId')">
                <label for="ConversationMessageAttachmentChangeHistory-conversationMessageAttachmentId" id="label-ConversationMessageAttachmentChangeHistory-conversationMessageAttachmentId"><span class="text-danger">*</span>Conversation Message Attachment</label>
                <select id="ConversationMessageAttachmentChangeHistory-conversationMessageAttachmentId" formControlName="conversationMessageAttachmentId" class="form-select conversation-message-attachment-change-history-select" [disabled]="!userIsSchedulerConversationMessageAttachmentChangeHistoryWriter()">
                    <option [ngValue]="null">Select Conversation Message Attachment</option>
                    <option *ngFor="let conversationMessageAttachment of conversationMessageAttachments$ | async" [ngValue]="conversationMessageAttachment.id">{{conversationMessageAttachment.contentFileName}}</option>
                </select>
                <div *ngIf="conversationMessageAttachmentChangeHistoryForm.get('conversationMessageAttachmentId')?.invalid && conversationMessageAttachmentChangeHistoryForm.get('conversationMessageAttachmentId')?.touched" class="text-danger">
                    Conversation Message Attachment is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ConversationMessageAttachmentChangeHistory-versionNumber" id="label-ConversationMessageAttachmentChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ConversationMessageAttachmentChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control conversation-message-attachment-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="ConversationMessageAttachmentChangeHistory-timeStamp" id="label-ConversationMessageAttachmentChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="ConversationMessageAttachmentChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control conversation-message-attachment-change-history-input" [disabled]="!userIsSchedulerConversationMessageAttachmentChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="conversationMessageAttachmentChangeHistoryForm.get('timeStamp')?.invalid && conversationMessageAttachmentChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="ConversationMessageAttachmentChangeHistory-userId" id="label-ConversationMessageAttachmentChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="ConversationMessageAttachmentChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control conversation-message-attachment-change-history-input" [disabled]="!userIsSchedulerConversationMessageAttachmentChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="conversationMessageAttachmentChangeHistoryForm.get('userId')?.invalid && conversationMessageAttachmentChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="ConversationMessageAttachmentChangeHistory-data" id="label-ConversationMessageAttachmentChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="ConversationMessageAttachmentChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control conversation-message-attachment-change-history-input" [disabled]="!userIsSchedulerConversationMessageAttachmentChangeHistoryWriter()"></textarea>
                <div *ngIf="conversationMessageAttachmentChangeHistoryForm.get('data')?.invalid && conversationMessageAttachmentChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer conversation-message-attachment-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Conversation Message Attachment Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !conversationMessageAttachmentChangeHistoryForm.valid || conversationMessageAttachmentChangeHistoryForm.pristine  || userIsSchedulerConversationMessageAttachmentChangeHistoryWriter() == false " ngbTooltip="Save the Conversation Message Attachment Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Conversation Message Attachment Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
