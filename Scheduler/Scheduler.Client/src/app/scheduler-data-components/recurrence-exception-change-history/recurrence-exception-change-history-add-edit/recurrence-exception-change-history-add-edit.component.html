<div class="add-recurrence-exception-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-recurrence-exception-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Recurrence Exception Change History" 
        *ngIf="userIsSchedulerRecurrenceExceptionChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #recurrenceExceptionChangeHistoryModal let-modal>
   <div class="modal-header recurrence-exception-change-history-modal-header">
      <h5 class="modal-title mb-0" id="recurrenceExceptionChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Recurrence Exception Change History' : 'Add Recurrence Exception Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body recurrence-exception-change-history-modal-body">
      <form [formGroup]="recurrenceExceptionChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('recurrenceExceptionId')">
                <label for="RecurrenceExceptionChangeHistory-recurrenceExceptionId" id="label-RecurrenceExceptionChangeHistory-recurrenceExceptionId"><span class="text-danger">*</span>Recurrence Exception</label>
                <select id="RecurrenceExceptionChangeHistory-recurrenceExceptionId" formControlName="recurrenceExceptionId" class="form-select recurrence-exception-change-history-select" [disabled]="!userIsSchedulerRecurrenceExceptionChangeHistoryWriter()">
                    <option [ngValue]="null">Select Recurrence Exception</option>
                    <option *ngFor="let recurrenceException of recurrenceExceptions$ | async" [ngValue]="recurrenceException.id">{{recurrenceException.reason}}</option>
                </select>
                <div *ngIf="recurrenceExceptionChangeHistoryForm.get('recurrenceExceptionId')?.invalid && recurrenceExceptionChangeHistoryForm.get('recurrenceExceptionId')?.touched" class="text-danger">
                    Recurrence Exception is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="RecurrenceExceptionChangeHistory-versionNumber" id="label-RecurrenceExceptionChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="RecurrenceExceptionChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control recurrence-exception-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="RecurrenceExceptionChangeHistory-timeStamp" id="label-RecurrenceExceptionChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="RecurrenceExceptionChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control recurrence-exception-change-history-input" [disabled]="!userIsSchedulerRecurrenceExceptionChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="recurrenceExceptionChangeHistoryForm.get('timeStamp')?.invalid && recurrenceExceptionChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="RecurrenceExceptionChangeHistory-userId" id="label-RecurrenceExceptionChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="RecurrenceExceptionChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control recurrence-exception-change-history-input" [disabled]="!userIsSchedulerRecurrenceExceptionChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="recurrenceExceptionChangeHistoryForm.get('userId')?.invalid && recurrenceExceptionChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="RecurrenceExceptionChangeHistory-data" id="label-RecurrenceExceptionChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="RecurrenceExceptionChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control recurrence-exception-change-history-input" [disabled]="!userIsSchedulerRecurrenceExceptionChangeHistoryWriter()"></textarea>
                <div *ngIf="recurrenceExceptionChangeHistoryForm.get('data')?.invalid && recurrenceExceptionChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer recurrence-exception-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Recurrence Exception Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !recurrenceExceptionChangeHistoryForm.valid || recurrenceExceptionChangeHistoryForm.pristine  || userIsSchedulerRecurrenceExceptionChangeHistoryWriter() == false " ngbTooltip="Save the Recurrence Exception Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Recurrence Exception Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
