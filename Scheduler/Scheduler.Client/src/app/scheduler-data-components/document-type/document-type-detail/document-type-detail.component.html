<div class="container-fluid p-1 m-0 document-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="document-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Document Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Document Type' : 'Add Document Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerDocumentTypeReader()">
                <div class="col m-2 document-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="documentTypeForm" (ngSubmit)="submitForm()" class="document-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="DocumentType-name" id="label-DocumentType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="DocumentType-name" formControlName="name" placeholder="Enter Name" class="form-control document-type-input" [disabled]="!userIsSchedulerDocumentTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="documentTypeForm.get('name')?.invalid && documentTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="DocumentType-description" id="label-DocumentType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="DocumentType-description" formControlName="description" placeholder="Enter Description" class="form-control document-type-input" [disabled]="!userIsSchedulerDocumentTypeWriter()"></textarea>
                                <div *ngIf="documentTypeForm.get('description')?.invalid && documentTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="DocumentType-sequence" id="label-DocumentType-sequence">Sequence</label>
                                <input type="number" id="DocumentType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control document-type-input" [disabled]="!userIsSchedulerDocumentTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="DocumentType-color" id="label-DocumentType-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="DocumentType-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerDocumentTypeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="documentTypeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="DocumentType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerDocumentTypeWriter()" />
                                <label for="DocumentType-active" class="form-check-label" id="label-DocumentType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="DocumentType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerDocumentTypeWriter()" />
                                <label for="DocumentType-deleted" class="form-check-label" id="label-DocumentType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="document-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="documentTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Document Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !documentTypeForm.valid || !documentTypeForm.dirty || documentTypeForm.pristine  || userIsSchedulerDocumentTypeWriter() == false " ngbTooltip="Save the Document Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Document Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerDocumentTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 document-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="documentService.userIsSchedulerDocumentReader()">
                            <button ngbNavLink>Documents
                                <span class="badge bg-primary ms-2">
                                    {{ (documentTypeData?.DocumentsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-document-table [queryParams]="{ documentTypeId: documentTypeData?.id }" [showAddButton]="true" [preSeededData]="{ documentTypeId: documentTypeData?.id }" [hiddenFields]="['documentTypeId']"></app-document-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
