<div class="container-fluid p-1 m-0 recurrence-frequency-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="recurrence-frequency-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Recurrence Frequency</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Recurrence Frequency' : 'Add Recurrence Frequency'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerRecurrenceFrequencyReader()">
                <div class="col m-2 recurrence-frequency-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="recurrenceFrequencyForm" (ngSubmit)="submitForm()" class="recurrence-frequency-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="RecurrenceFrequency-name" id="label-RecurrenceFrequency-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="RecurrenceFrequency-name" formControlName="name" placeholder="Enter Name" class="form-control recurrence-frequency-input" [disabled]="!userIsSchedulerRecurrenceFrequencyWriter()" aria-labelledby="label-name" />
                                <div *ngIf="recurrenceFrequencyForm.get('name')?.invalid && recurrenceFrequencyForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="RecurrenceFrequency-description" id="label-RecurrenceFrequency-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="RecurrenceFrequency-description" formControlName="description" placeholder="Enter Description" class="form-control recurrence-frequency-input" [disabled]="!userIsSchedulerRecurrenceFrequencyWriter()"></textarea>
                                <div *ngIf="recurrenceFrequencyForm.get('description')?.invalid && recurrenceFrequencyForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="RecurrenceFrequency-sequence" id="label-RecurrenceFrequency-sequence">Sequence</label>
                                <input type="number" id="RecurrenceFrequency-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control recurrence-frequency-input" [disabled]="!userIsSchedulerRecurrenceFrequencyWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="RecurrenceFrequency-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerRecurrenceFrequencyWriter()" />
                                <label for="RecurrenceFrequency-active" class="form-check-label" id="label-RecurrenceFrequency-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="RecurrenceFrequency-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerRecurrenceFrequencyWriter()" />
                                <label for="RecurrenceFrequency-deleted" class="form-check-label" id="label-RecurrenceFrequency-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="recurrence-frequency-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="recurrenceFrequencyForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Recurrence Frequency">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !recurrenceFrequencyForm.valid || !recurrenceFrequencyForm.dirty || recurrenceFrequencyForm.pristine  || userIsSchedulerRecurrenceFrequencyWriter() == false " ngbTooltip="Save the Recurrence Frequency changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Recurrence Frequency' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerRecurrenceFrequencyReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 recurrence-frequency-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="recurrenceRuleService.userIsSchedulerRecurrenceRuleReader()">
                            <button ngbNavLink>Recurrence Rules
                                <span class="badge bg-primary ms-2">
                                    {{ (recurrenceFrequencyData?.RecurrenceRulesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-recurrence-rule-table [queryParams]="{ recurrenceFrequencyId: recurrenceFrequencyData?.id }" [showAddButton]="true" [preSeededData]="{ recurrenceFrequencyId: recurrenceFrequencyData?.id }" [hiddenFields]="['recurrenceFrequencyId']"></app-recurrence-rule-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="pledgeService.userIsSchedulerPledgeReader()">
                            <button ngbNavLink>Pledges
                                <span class="badge bg-primary ms-2">
                                    {{ (recurrenceFrequencyData?.PledgesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-pledge-table [queryParams]="{ recurrenceFrequencyId: recurrenceFrequencyData?.id }" [showAddButton]="true" [preSeededData]="{ recurrenceFrequencyId: recurrenceFrequencyData?.id }" [hiddenFields]="['recurrenceFrequencyId']"></app-pledge-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
