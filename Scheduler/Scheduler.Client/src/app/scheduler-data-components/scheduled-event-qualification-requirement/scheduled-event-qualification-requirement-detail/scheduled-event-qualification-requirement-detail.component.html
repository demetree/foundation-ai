<div class="container-fluid p-1 m-0 scheduled-event-qualification-requirement-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="scheduled-event-qualification-requirement-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Scheduled Event Qualification Requirement</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Scheduled Event Qualification Requirement' : 'Add Scheduled Event Qualification Requirement'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerScheduledEventQualificationRequirementReader()">
                <div class="col m-2 scheduled-event-qualification-requirement-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="scheduledEventQualificationRequirementForm" (ngSubmit)="submitForm()" class="scheduled-event-qualification-requirement-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('scheduledEventId')">
                                <label for="ScheduledEventQualificationRequirement-scheduledEventId" id="label-ScheduledEventQualificationRequirement-scheduledEventId"><span class="text-danger">*</span>Scheduled Event</label>
                                <select id="ScheduledEventQualificationRequirement-scheduledEventId" formControlName="scheduledEventId" class="form-select scheduled-event-qualification-requirement-select" [disabled]="!userIsSchedulerScheduledEventQualificationRequirementWriter()">
                                    <option [ngValue]="null">Select Scheduled Event</option>
                                    <option *ngFor="let scheduledEvent of scheduledEvents$ | async" [ngValue]="scheduledEvent.id">{{[scheduledEvent.name] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="scheduledEventQualificationRequirementForm.get('scheduledEventId')?.invalid && scheduledEventQualificationRequirementForm.get('scheduledEventId')?.touched" class="text-danger">
                                    Scheduled Event is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('qualificationId')">
                                <label for="ScheduledEventQualificationRequirement-qualificationId" id="label-ScheduledEventQualificationRequirement-qualificationId"><span class="text-danger">*</span>Qualification</label>
                                <select id="ScheduledEventQualificationRequirement-qualificationId" formControlName="qualificationId" class="form-select scheduled-event-qualification-requirement-select" [disabled]="!userIsSchedulerScheduledEventQualificationRequirementWriter()">
                                    <option [ngValue]="null">Select Qualification</option>
                                    <option *ngFor="let qualification of qualifications$ | async" [ngValue]="qualification.id">{{qualification.name}}</option>
                                </select>
                                <div *ngIf="scheduledEventQualificationRequirementForm.get('qualificationId')?.invalid && scheduledEventQualificationRequirementForm.get('qualificationId')?.touched" class="text-danger">
                                    Qualification is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ScheduledEventQualificationRequirement-versionNumber" id="label-ScheduledEventQualificationRequirement-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ScheduledEventQualificationRequirement-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control scheduled-event-qualification-requirement-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ScheduledEventQualificationRequirement-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerScheduledEventQualificationRequirementWriter()" />
                                <label for="ScheduledEventQualificationRequirement-active" class="form-check-label" id="label-ScheduledEventQualificationRequirement-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ScheduledEventQualificationRequirement-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerScheduledEventQualificationRequirementWriter()" />
                                <label for="ScheduledEventQualificationRequirement-deleted" class="form-check-label" id="label-ScheduledEventQualificationRequirement-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="scheduled-event-qualification-requirement-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="scheduledEventQualificationRequirementForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Scheduled Event Qualification Requirement">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !scheduledEventQualificationRequirementForm.valid || !scheduledEventQualificationRequirementForm.dirty || scheduledEventQualificationRequirementForm.pristine || userIsSchedulerScheduledEventQualificationRequirementWriter() == false " ngbTooltip="Save Scheduled Event Qualification Requirement">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerScheduledEventQualificationRequirementReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 scheduled-event-qualification-requirement-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="scheduledEventQualificationRequirementChangeHistoryService.userIsSchedulerScheduledEventQualificationRequirementChangeHistoryReader()">
                            <button ngbNavLink>Scheduled Event Qualification Requirement Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (scheduledEventQualificationRequirementData?.ScheduledEventQualificationRequirementChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduled-event-qualification-requirement-change-history-table [queryParams]="{ scheduledEventQualificationRequirementId: scheduledEventQualificationRequirementData?.id }"></app-scheduled-event-qualification-requirement-change-history-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-scheduled-event-qualification-requirement-change-history-add-edit [preSeededData]="{ scheduledEventQualificationRequirementId: scheduledEventQualificationRequirementData?.id }" [hiddenFields]="['scheduledEventQualificationRequirementId']"></app-scheduled-event-qualification-requirement-change-history-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
