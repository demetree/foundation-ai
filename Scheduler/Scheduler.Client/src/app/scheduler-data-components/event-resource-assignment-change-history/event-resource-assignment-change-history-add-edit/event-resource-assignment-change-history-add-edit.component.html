<div class="add-event-resource-assignment-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-event-resource-assignment-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Event Resource Assignment Change History" 
        *ngIf="userIsSchedulerEventResourceAssignmentChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #eventResourceAssignmentChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light event-resource-assignment-change-history-modal-header">
      <h5 class="modal-title mb-0" id="eventResourceAssignmentChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Event Resource Assignment Change History' : 'Add Event Resource Assignment Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body event-resource-assignment-change-history-modal-body">
      <form [formGroup]="eventResourceAssignmentChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('eventResourceAssignmentId')">
                <label for="EventResourceAssignmentChangeHistory-eventResourceAssignmentId" id="label-EventResourceAssignmentChangeHistory-eventResourceAssignmentId"><span class="text-danger">*</span>Event Resource Assignment</label>
                <select id="EventResourceAssignmentChangeHistory-eventResourceAssignmentId" formControlName="eventResourceAssignmentId" class="form-select event-resource-assignment-change-history-select" [disabled]="!userIsSchedulerEventResourceAssignmentChangeHistoryWriter()">
                    <option [ngValue]="null">Select Event Resource Assignment</option>
                    <option *ngFor="let eventResourceAssignment of eventResourceAssignments$ | async" [ngValue]="eventResourceAssignment.id">{{eventResourceAssignment.notes}}</option>
                </select>
                <div *ngIf="eventResourceAssignmentChangeHistoryForm.get('eventResourceAssignmentId')?.invalid && eventResourceAssignmentChangeHistoryForm.get('eventResourceAssignmentId')?.touched" class="text-danger">
                    Event Resource Assignment is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="EventResourceAssignmentChangeHistory-versionNumber" id="label-EventResourceAssignmentChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="EventResourceAssignmentChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control event-resource-assignment-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="EventResourceAssignmentChangeHistory-timeStamp" id="label-EventResourceAssignmentChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="EventResourceAssignmentChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control event-resource-assignment-change-history-input" [disabled]="!userIsSchedulerEventResourceAssignmentChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="eventResourceAssignmentChangeHistoryForm.get('timeStamp')?.invalid && eventResourceAssignmentChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="EventResourceAssignmentChangeHistory-userId" id="label-EventResourceAssignmentChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="EventResourceAssignmentChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control event-resource-assignment-change-history-input" [disabled]="!userIsSchedulerEventResourceAssignmentChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="eventResourceAssignmentChangeHistoryForm.get('userId')?.invalid && eventResourceAssignmentChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="EventResourceAssignmentChangeHistory-data" id="label-EventResourceAssignmentChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="EventResourceAssignmentChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control event-resource-assignment-change-history-input" [disabled]="!userIsSchedulerEventResourceAssignmentChangeHistoryWriter()"></textarea>
                <div *ngIf="eventResourceAssignmentChangeHistoryForm.get('data')?.invalid && eventResourceAssignmentChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer event-resource-assignment-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Event Resource Assignment Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !eventResourceAssignmentChangeHistoryForm.valid || eventResourceAssignmentChangeHistoryForm.pristine  || userIsSchedulerEventResourceAssignmentChangeHistoryWriter() == false " ngbTooltip="Save the Event Resource Assignment Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Event Resource Assignment Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
