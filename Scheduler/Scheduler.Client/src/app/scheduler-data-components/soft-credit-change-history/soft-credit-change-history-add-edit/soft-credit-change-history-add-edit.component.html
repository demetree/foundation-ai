<div class="add-soft-credit-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-soft-credit-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Soft Credit Change History" 
        *ngIf="userIsSchedulerSoftCreditChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #softCreditChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light soft-credit-change-history-modal-header">
      <h5 class="modal-title mb-0" id="softCreditChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Soft Credit Change History' : 'Add Soft Credit Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body soft-credit-change-history-modal-body">
      <form [formGroup]="softCreditChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('softCreditId')">
                <label for="SoftCreditChangeHistory-softCreditId" id="label-SoftCreditChangeHistory-softCreditId"><span class="text-danger">*</span>Soft Credit</label>
                <select id="SoftCreditChangeHistory-softCreditId" formControlName="softCreditId" class="form-select soft-credit-change-history-select" [disabled]="!userIsSchedulerSoftCreditChangeHistoryWriter()">
                    <option [ngValue]="null">Select Soft Credit</option>
                    <option *ngFor="let softCredit of softCredits$ | async" [ngValue]="softCredit.id">{{softCredit.notes}}</option>
                </select>
                <div *ngIf="softCreditChangeHistoryForm.get('softCreditId')?.invalid && softCreditChangeHistoryForm.get('softCreditId')?.touched" class="text-danger">
                    Soft Credit is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="SoftCreditChangeHistory-versionNumber" id="label-SoftCreditChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="SoftCreditChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control soft-credit-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="SoftCreditChangeHistory-timeStamp" id="label-SoftCreditChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="SoftCreditChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control soft-credit-change-history-input" [disabled]="!userIsSchedulerSoftCreditChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="softCreditChangeHistoryForm.get('timeStamp')?.invalid && softCreditChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="SoftCreditChangeHistory-userId" id="label-SoftCreditChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="SoftCreditChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control soft-credit-change-history-input" [disabled]="!userIsSchedulerSoftCreditChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="softCreditChangeHistoryForm.get('userId')?.invalid && softCreditChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="SoftCreditChangeHistory-data" id="label-SoftCreditChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="SoftCreditChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control soft-credit-change-history-input" [disabled]="!userIsSchedulerSoftCreditChangeHistoryWriter()"></textarea>
                <div *ngIf="softCreditChangeHistoryForm.get('data')?.invalid && softCreditChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer soft-credit-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Soft Credit Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !softCreditChangeHistoryForm.valid || softCreditChangeHistoryForm.pristine || !userIsSchedulerSoftCreditChangeHistoryWriter()" ngbTooltip="Save the Soft Credit Change History changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
