<div class="container-fluid p-1 m-0 fiscal-period-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="fiscal-period-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Fiscal Period Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Fiscal Period Change History' : 'Add Fiscal Period Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerFiscalPeriodChangeHistoryReader()">
                <div class="col m-2 fiscal-period-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="fiscalPeriodChangeHistoryForm" (ngSubmit)="submitForm()" class="fiscal-period-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('fiscalPeriodId')">
                                <label for="FiscalPeriodChangeHistory-fiscalPeriodId" id="label-FiscalPeriodChangeHistory-fiscalPeriodId"><span class="text-danger">*</span>Fiscal Period</label>
                                <select id="FiscalPeriodChangeHistory-fiscalPeriodId" formControlName="fiscalPeriodId" class="form-select fiscal-period-change-history-select" [disabled]="!userIsSchedulerFiscalPeriodChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Fiscal Period</option>
                                    <option *ngFor="let fiscalPeriod of fiscalPeriods$ | async" [ngValue]="fiscalPeriod.id">{{fiscalPeriod.name}}</option>
                                </select>
                                <div *ngIf="fiscalPeriodChangeHistoryForm.get('fiscalPeriodId')?.invalid && fiscalPeriodChangeHistoryForm.get('fiscalPeriodId')?.touched" class="text-danger">
                                    Fiscal Period is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="FiscalPeriodChangeHistory-versionNumber" id="label-FiscalPeriodChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="FiscalPeriodChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control fiscal-period-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="FiscalPeriodChangeHistory-timeStamp" id="label-FiscalPeriodChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="FiscalPeriodChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control fiscal-period-change-history-input" [disabled]="!userIsSchedulerFiscalPeriodChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="fiscalPeriodChangeHistoryForm.get('timeStamp')?.invalid && fiscalPeriodChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="FiscalPeriodChangeHistory-userId" id="label-FiscalPeriodChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="FiscalPeriodChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control fiscal-period-change-history-input" [disabled]="!userIsSchedulerFiscalPeriodChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="fiscalPeriodChangeHistoryForm.get('userId')?.invalid && fiscalPeriodChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="FiscalPeriodChangeHistory-data" id="label-FiscalPeriodChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="FiscalPeriodChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control fiscal-period-change-history-input" [disabled]="!userIsSchedulerFiscalPeriodChangeHistoryWriter()"></textarea>
                                <div *ngIf="fiscalPeriodChangeHistoryForm.get('data')?.invalid && fiscalPeriodChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="fiscal-period-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="fiscalPeriodChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Fiscal Period Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !fiscalPeriodChangeHistoryForm.valid || !fiscalPeriodChangeHistoryForm.dirty || fiscalPeriodChangeHistoryForm.pristine  || userIsSchedulerFiscalPeriodChangeHistoryWriter() == false " ngbTooltip="Save the Fiscal Period Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Fiscal Period Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
