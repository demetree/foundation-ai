<div class="add-financial-transaction" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-financial-transaction me-2"
        (click)="openModal()"
        ngbTooltip="Add Financial Transaction" 
        *ngIf="userIsSchedulerFinancialTransactionWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #financialTransactionModal let-modal>
   <div class="modal-header financial-transaction-modal-header">
      <h5 class="modal-title mb-0" id="financialTransactionModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Financial Transaction' : 'Add Financial Transaction' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body financial-transaction-modal-body">
      <form [formGroup]="financialTransactionForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('financialCategoryId')">
                <label for="FinancialTransaction-financialCategoryId" id="label-FinancialTransaction-financialCategoryId"><span class="text-danger">*</span>Financial Category</label>
                <select id="FinancialTransaction-financialCategoryId" formControlName="financialCategoryId" class="form-select financial-transaction-select" [disabled]="!userIsSchedulerFinancialTransactionWriter()">
                    <option [ngValue]="null">Select Financial Category</option>
                    <option *ngFor="let financialCategory of financialCategories$ | async" [ngValue]="financialCategory.id">{{financialCategory.name}}</option>
                </select>
                <div *ngIf="financialTransactionForm.get('financialCategoryId')?.invalid && financialTransactionForm.get('financialCategoryId')?.touched" class="text-danger">
                    Financial Category is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('financialOfficeId')">
                <label for="FinancialTransaction-financialOfficeId" id="label-FinancialTransaction-financialOfficeId">Financial Office</label>
                <select id="FinancialTransaction-financialOfficeId" formControlName="financialOfficeId" class="form-select financial-transaction-select" [disabled]="!userIsSchedulerFinancialTransactionWriter()">
                    <option [ngValue]="null">Select Financial Office</option>
                    <option *ngFor="let financialOffice of financialOffices$ | async" [ngValue]="financialOffice.id">{{financialOffice.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('scheduledEventId')">
                <label for="FinancialTransaction-scheduledEventId" id="label-FinancialTransaction-scheduledEventId">Scheduled Event</label>
                <select id="FinancialTransaction-scheduledEventId" formControlName="scheduledEventId" class="form-select financial-transaction-select" [disabled]="!userIsSchedulerFinancialTransactionWriter()">
                    <option [ngValue]="null">Select Scheduled Event</option>
                    <option *ngFor="let scheduledEvent of scheduledEvents$ | async" [ngValue]="scheduledEvent.id">{{[scheduledEvent.name] | filterAndJoin}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('contactId')">
                <label for="FinancialTransaction-contactId" id="label-FinancialTransaction-contactId">Contact</label>
                <select id="FinancialTransaction-contactId" formControlName="contactId" class="form-select financial-transaction-select" [disabled]="!userIsSchedulerFinancialTransactionWriter()">
                    <option [ngValue]="null">Select Contact</option>
                    <option *ngFor="let contact of contacts$ | async" [ngValue]="contact.id">{{contact.firstName}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('clientId')">
                <label for="FinancialTransaction-clientId" id="label-FinancialTransaction-clientId">Client</label>
                <select id="FinancialTransaction-clientId" formControlName="clientId" class="form-select financial-transaction-select" [disabled]="!userIsSchedulerFinancialTransactionWriter()">
                    <option [ngValue]="null">Select Client</option>
                    <option *ngFor="let client of clients$ | async" [ngValue]="client.id">{{client.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('contactRole')">
                <label for="FinancialTransaction-contactRole" id="label-FinancialTransaction-contactRole">Contact Role</label>
                <input type="text" id="FinancialTransaction-contactRole" formControlName="contactRole" placeholder="Enter Contact Role" class="form-control financial-transaction-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" aria-labelledby="label-contactRole" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('taxCodeId')">
                <label for="FinancialTransaction-taxCodeId" id="label-FinancialTransaction-taxCodeId">Tax Code</label>
                <select id="FinancialTransaction-taxCodeId" formControlName="taxCodeId" class="form-select financial-transaction-select" [disabled]="!userIsSchedulerFinancialTransactionWriter()">
                    <option [ngValue]="null">Select Tax Code</option>
                    <option *ngFor="let taxCode of taxCodes$ | async" [ngValue]="taxCode.id">{{taxCode.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('fiscalPeriodId')">
                <label for="FinancialTransaction-fiscalPeriodId" id="label-FinancialTransaction-fiscalPeriodId">Fiscal Period</label>
                <select id="FinancialTransaction-fiscalPeriodId" formControlName="fiscalPeriodId" class="form-select financial-transaction-select" [disabled]="!userIsSchedulerFinancialTransactionWriter()">
                    <option [ngValue]="null">Select Fiscal Period</option>
                    <option *ngFor="let fiscalPeriod of fiscalPeriods$ | async" [ngValue]="fiscalPeriod.id">{{fiscalPeriod.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('paymentTypeId')">
                <label for="FinancialTransaction-paymentTypeId" id="label-FinancialTransaction-paymentTypeId">Payment Type</label>
                <select id="FinancialTransaction-paymentTypeId" formControlName="paymentTypeId" class="form-select financial-transaction-select" [disabled]="!userIsSchedulerFinancialTransactionWriter()">
                    <option [ngValue]="null">Select Payment Type</option>
                    <option *ngFor="let paymentType of paymentTypes$ | async" [ngValue]="paymentType.id">{{paymentType.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('transactionDate')">
                <label for="FinancialTransaction-transactionDate" id="label-FinancialTransaction-transactionDate"><span class="text-danger">*</span>Transaction Date</label>
                <input type="datetime-local" id="FinancialTransaction-transactionDate" formControlName="transactionDate" placeholder="Enter Transaction Date" class="form-control financial-transaction-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" aria-labelledby="label-transactionDate" />
                <div *ngIf="financialTransactionForm.get('transactionDate')?.invalid && financialTransactionForm.get('transactionDate')?.touched" class="text-danger">
                    Transaction Date is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="FinancialTransaction-description" id="label-FinancialTransaction-description"><span class="text-danger">*</span>Description</label>
                <textarea id="FinancialTransaction-description" formControlName="description" placeholder="Enter Description" class="form-control financial-transaction-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()"></textarea>
                <div *ngIf="financialTransactionForm.get('description')?.invalid && financialTransactionForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('amount')">
                <label for="FinancialTransaction-amount" id="label-FinancialTransaction-amount"><span class="text-danger">*</span>Amount</label>
                <input type="number" id="FinancialTransaction-amount" formControlName="amount" placeholder="Enter Amount" class="form-control financial-transaction-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" aria-labelledby="label-amount" />
                <div *ngIf="financialTransactionForm.get('amount')?.invalid && financialTransactionForm.get('amount')?.touched" class="text-danger">
                    Amount is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('taxAmount')">
                <label for="FinancialTransaction-taxAmount" id="label-FinancialTransaction-taxAmount"><span class="text-danger">*</span>Tax Amount</label>
                <input type="number" id="FinancialTransaction-taxAmount" formControlName="taxAmount" placeholder="Enter Tax Amount" class="form-control financial-transaction-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" aria-labelledby="label-taxAmount" />
                <div *ngIf="financialTransactionForm.get('taxAmount')?.invalid && financialTransactionForm.get('taxAmount')?.touched" class="text-danger">
                    Tax Amount is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('totalAmount')">
                <label for="FinancialTransaction-totalAmount" id="label-FinancialTransaction-totalAmount"><span class="text-danger">*</span>Total Amount</label>
                <input type="number" id="FinancialTransaction-totalAmount" formControlName="totalAmount" placeholder="Enter Total Amount" class="form-control financial-transaction-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" aria-labelledby="label-totalAmount" />
                <div *ngIf="financialTransactionForm.get('totalAmount')?.invalid && financialTransactionForm.get('totalAmount')?.touched" class="text-danger">
                    Total Amount is required
                </div>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('isRevenue')">
                <input type="checkbox" id="FinancialTransaction-isRevenue" formControlName="isRevenue" class="form-check-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" />
                <label for="FinancialTransaction-isRevenue" class="form-check-label" id="label-FinancialTransaction-isRevenue"><span class="text-danger">*</span>Is Revenue</label>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('journalEntryType')">
                <label for="FinancialTransaction-journalEntryType" id="label-FinancialTransaction-journalEntryType">Journal Entry Type</label>
                <input type="text" id="FinancialTransaction-journalEntryType" formControlName="journalEntryType" placeholder="Enter Journal Entry Type" class="form-control financial-transaction-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" aria-labelledby="label-journalEntryType" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('referenceNumber')">
                <label for="FinancialTransaction-referenceNumber" id="label-FinancialTransaction-referenceNumber">Reference Number</label>
                <input type="text" id="FinancialTransaction-referenceNumber" formControlName="referenceNumber" placeholder="Enter Reference Number" class="form-control financial-transaction-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" aria-labelledby="label-referenceNumber" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('notes')">
                <label for="FinancialTransaction-notes" id="label-FinancialTransaction-notes">Notes</label>
                <textarea id="FinancialTransaction-notes" formControlName="notes" placeholder="Enter Notes" class="form-control financial-transaction-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('currencyId')">
                <label for="FinancialTransaction-currencyId" id="label-FinancialTransaction-currencyId"><span class="text-danger">*</span>Currency</label>
                <select id="FinancialTransaction-currencyId" formControlName="currencyId" class="form-select financial-transaction-select" [disabled]="!userIsSchedulerFinancialTransactionWriter()">
                    <option [ngValue]="null">Select Currency</option>
                    <option *ngFor="let currency of currencies$ | async" [ngValue]="currency.id">{{currency.name}}</option>
                </select>
                <div *ngIf="financialTransactionForm.get('currencyId')?.invalid && financialTransactionForm.get('currencyId')?.touched" class="text-danger">
                    Currency is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('exportedDate')">
                <label for="FinancialTransaction-exportedDate" id="label-FinancialTransaction-exportedDate">Exported Date</label>
                <input type="datetime-local" id="FinancialTransaction-exportedDate" formControlName="exportedDate" placeholder="Enter Exported Date" class="form-control financial-transaction-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" aria-labelledby="label-exportedDate" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('externalId')">
                <label for="FinancialTransaction-externalId" id="label-FinancialTransaction-externalId">External Id</label>
                <input type="text" id="FinancialTransaction-externalId" formControlName="externalId" placeholder="Enter External Id" class="form-control financial-transaction-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" aria-labelledby="label-externalId" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('externalSystemName')">
                <label for="FinancialTransaction-externalSystemName" id="label-FinancialTransaction-externalSystemName">External System Name</label>
                <input type="text" id="FinancialTransaction-externalSystemName" formControlName="externalSystemName" placeholder="Enter External System Name" class="form-control financial-transaction-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" aria-labelledby="label-externalSystemName" />
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="FinancialTransaction-versionNumber" id="label-FinancialTransaction-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="FinancialTransaction-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control financial-transaction-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="FinancialTransaction-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" />
                <label for="FinancialTransaction-active" class="form-check-label" id="label-FinancialTransaction-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="FinancialTransaction-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerFinancialTransactionWriter()" />
                <label for="FinancialTransaction-deleted" class="form-check-label" id="label-FinancialTransaction-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer financial-transaction-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Financial Transaction changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !financialTransactionForm.valid || financialTransactionForm.pristine  || userIsSchedulerFinancialTransactionWriter() == false " ngbTooltip="Save the Financial Transaction changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Financial Transaction' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
