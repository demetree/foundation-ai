<div class="add-appeal-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-appeal-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Appeal Change History" 
        *ngIf="userIsSchedulerAppealChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #appealChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light appeal-change-history-modal-header">
      <h5 class="modal-title mb-0" id="appealChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Appeal Change History' : 'Add Appeal Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body appeal-change-history-modal-body">
      <form [formGroup]="appealChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('appealId')">
                <label for="AppealChangeHistory-appealId" id="label-AppealChangeHistory-appealId"><span class="text-danger">*</span>Appeal</label>
                <select id="AppealChangeHistory-appealId" formControlName="appealId" class="form-select appeal-change-history-select" [disabled]="!userIsSchedulerAppealChangeHistoryWriter()">
                    <option [ngValue]="null">Select Appeal</option>
                    <option *ngFor="let appeal of appeals$ | async" [ngValue]="appeal.id">{{appeal.name}}</option>
                </select>
                <div *ngIf="appealChangeHistoryForm.get('appealId')?.invalid && appealChangeHistoryForm.get('appealId')?.touched" class="text-danger">
                    Appeal is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="AppealChangeHistory-versionNumber" id="label-AppealChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="AppealChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control appeal-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="AppealChangeHistory-timeStamp" id="label-AppealChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="AppealChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control appeal-change-history-input" [disabled]="!userIsSchedulerAppealChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="appealChangeHistoryForm.get('timeStamp')?.invalid && appealChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="AppealChangeHistory-userId" id="label-AppealChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="AppealChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control appeal-change-history-input" [disabled]="!userIsSchedulerAppealChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="appealChangeHistoryForm.get('userId')?.invalid && appealChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="AppealChangeHistory-data" id="label-AppealChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="AppealChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control appeal-change-history-input" [disabled]="!userIsSchedulerAppealChangeHistoryWriter()"></textarea>
                <div *ngIf="appealChangeHistoryForm.get('data')?.invalid && appealChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer appeal-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Appeal Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !appealChangeHistoryForm.valid || appealChangeHistoryForm.pristine  || userIsSchedulerAppealChangeHistoryWriter() == false " ngbTooltip="Save the Appeal Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Appeal Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
