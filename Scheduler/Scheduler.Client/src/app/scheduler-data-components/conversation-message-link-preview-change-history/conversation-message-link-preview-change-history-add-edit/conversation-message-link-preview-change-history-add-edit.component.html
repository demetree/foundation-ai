<div class="add-conversation-message-link-preview-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-conversation-message-link-preview-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Conversation Message Link Preview Change History" 
        *ngIf="userIsSchedulerConversationMessageLinkPreviewChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #conversationMessageLinkPreviewChangeHistoryModal let-modal>
   <div class="modal-header conversation-message-link-preview-change-history-modal-header">
      <h5 class="modal-title mb-0" id="conversationMessageLinkPreviewChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Conversation Message Link Preview Change History' : 'Add Conversation Message Link Preview Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body conversation-message-link-preview-change-history-modal-body">
      <form [formGroup]="conversationMessageLinkPreviewChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('conversationMessageLinkPreviewId')">
                <label for="ConversationMessageLinkPreviewChangeHistory-conversationMessageLinkPreviewId" id="label-ConversationMessageLinkPreviewChangeHistory-conversationMessageLinkPreviewId"><span class="text-danger">*</span>Conversation Message Link Preview</label>
                <select id="ConversationMessageLinkPreviewChangeHistory-conversationMessageLinkPreviewId" formControlName="conversationMessageLinkPreviewId" class="form-select conversation-message-link-preview-change-history-select" [disabled]="!userIsSchedulerConversationMessageLinkPreviewChangeHistoryWriter()">
                    <option [ngValue]="null">Select Conversation Message Link Preview</option>
                    <option *ngFor="let conversationMessageLinkPreview of conversationMessageLinkPreviews$ | async" [ngValue]="conversationMessageLinkPreview.id">{{conversationMessageLinkPreview.url}}</option>
                </select>
                <div *ngIf="conversationMessageLinkPreviewChangeHistoryForm.get('conversationMessageLinkPreviewId')?.invalid && conversationMessageLinkPreviewChangeHistoryForm.get('conversationMessageLinkPreviewId')?.touched" class="text-danger">
                    Conversation Message Link Preview is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ConversationMessageLinkPreviewChangeHistory-versionNumber" id="label-ConversationMessageLinkPreviewChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ConversationMessageLinkPreviewChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control conversation-message-link-preview-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="ConversationMessageLinkPreviewChangeHistory-timeStamp" id="label-ConversationMessageLinkPreviewChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="ConversationMessageLinkPreviewChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control conversation-message-link-preview-change-history-input" [disabled]="!userIsSchedulerConversationMessageLinkPreviewChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="conversationMessageLinkPreviewChangeHistoryForm.get('timeStamp')?.invalid && conversationMessageLinkPreviewChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="ConversationMessageLinkPreviewChangeHistory-userId" id="label-ConversationMessageLinkPreviewChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="ConversationMessageLinkPreviewChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control conversation-message-link-preview-change-history-input" [disabled]="!userIsSchedulerConversationMessageLinkPreviewChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="conversationMessageLinkPreviewChangeHistoryForm.get('userId')?.invalid && conversationMessageLinkPreviewChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="ConversationMessageLinkPreviewChangeHistory-data" id="label-ConversationMessageLinkPreviewChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="ConversationMessageLinkPreviewChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control conversation-message-link-preview-change-history-input" [disabled]="!userIsSchedulerConversationMessageLinkPreviewChangeHistoryWriter()"></textarea>
                <div *ngIf="conversationMessageLinkPreviewChangeHistoryForm.get('data')?.invalid && conversationMessageLinkPreviewChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer conversation-message-link-preview-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Conversation Message Link Preview Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !conversationMessageLinkPreviewChangeHistoryForm.valid || conversationMessageLinkPreviewChangeHistoryForm.pristine  || userIsSchedulerConversationMessageLinkPreviewChangeHistoryWriter() == false " ngbTooltip="Save the Conversation Message Link Preview Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Conversation Message Link Preview Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
