<div class="container-fluid p-1 m-0 event-charge-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="event-charge-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Event Charge Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Event Charge Change History' : 'Add Event Charge Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerEventChargeChangeHistoryReader()">
                <div class="col m-2 event-charge-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="eventChargeChangeHistoryForm" (ngSubmit)="submitForm()" class="event-charge-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('eventChargeId')">
                                <label for="EventChargeChangeHistory-eventChargeId" id="label-EventChargeChangeHistory-eventChargeId"><span class="text-danger">*</span>Event Charge</label>
                                <select id="EventChargeChangeHistory-eventChargeId" formControlName="eventChargeId" class="form-select event-charge-change-history-select" [disabled]="!userIsSchedulerEventChargeChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Event Charge</option>
                                    <option *ngFor="let eventCharge of eventCharges$ | async" [ngValue]="eventCharge.id">{{eventCharge.description}}</option>
                                </select>
                                <div *ngIf="eventChargeChangeHistoryForm.get('eventChargeId')?.invalid && eventChargeChangeHistoryForm.get('eventChargeId')?.touched" class="text-danger">
                                    Event Charge is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="EventChargeChangeHistory-versionNumber" id="label-EventChargeChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="EventChargeChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control event-charge-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="EventChargeChangeHistory-timeStamp" id="label-EventChargeChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="EventChargeChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control event-charge-change-history-input" [disabled]="!userIsSchedulerEventChargeChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="eventChargeChangeHistoryForm.get('timeStamp')?.invalid && eventChargeChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="EventChargeChangeHistory-userId" id="label-EventChargeChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="EventChargeChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control event-charge-change-history-input" [disabled]="!userIsSchedulerEventChargeChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="eventChargeChangeHistoryForm.get('userId')?.invalid && eventChargeChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="EventChargeChangeHistory-data" id="label-EventChargeChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="EventChargeChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control event-charge-change-history-input" [disabled]="!userIsSchedulerEventChargeChangeHistoryWriter()"></textarea>
                                <div *ngIf="eventChargeChangeHistoryForm.get('data')?.invalid && eventChargeChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="event-charge-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="eventChargeChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Event Charge Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !eventChargeChangeHistoryForm.valid || !eventChargeChangeHistoryForm.dirty || eventChargeChangeHistoryForm.pristine  || userIsSchedulerEventChargeChangeHistoryWriter() == false " ngbTooltip="Save the Event Charge Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Event Charge Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
