<div class="container-fluid p-1 m-0 attribute-definition-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="attribute-definition-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Attribute Definition</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Attribute Definition' : 'Add Attribute Definition'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerAttributeDefinitionReader()">
                <div class="col m-2 attribute-definition-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="attributeDefinitionForm" (ngSubmit)="submitForm()" class="attribute-definition-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('entityName')">
                                <label for="AttributeDefinition-entityName" id="label-AttributeDefinition-entityName">Entity Name</label>
                                <input type="text" id="AttributeDefinition-entityName" formControlName="entityName" placeholder="Enter Entity Name" class="form-control attribute-definition-input" [disabled]="!userIsSchedulerAttributeDefinitionWriter()" aria-labelledby="label-entityName" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('key')">
                                <label for="AttributeDefinition-key" id="label-AttributeDefinition-key">Key</label>
                                <input type="text" id="AttributeDefinition-key" formControlName="key" placeholder="Enter Key" class="form-control attribute-definition-input" [disabled]="!userIsSchedulerAttributeDefinitionWriter()" aria-labelledby="label-key" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('label')">
                                <label for="AttributeDefinition-label" id="label-AttributeDefinition-label">Label</label>
                                <input type="text" id="AttributeDefinition-label" formControlName="label" placeholder="Enter Label" class="form-control attribute-definition-input" [disabled]="!userIsSchedulerAttributeDefinitionWriter()" aria-labelledby="label-label" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('type')">
                                <label for="AttributeDefinition-type" id="label-AttributeDefinition-type">Type</label>
                                <input type="text" id="AttributeDefinition-type" formControlName="type" placeholder="Enter Type" class="form-control attribute-definition-input" [disabled]="!userIsSchedulerAttributeDefinitionWriter()" aria-labelledby="label-type" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('options')">
                                <label for="AttributeDefinition-options" id="label-AttributeDefinition-options">Options</label>
                                <textarea id="AttributeDefinition-options" formControlName="options" placeholder="Enter Options" class="form-control attribute-definition-input" [disabled]="!userIsSchedulerAttributeDefinitionWriter()"></textarea>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isRequired')">
                                <input type="checkbox" id="AttributeDefinition-isRequired" formControlName="isRequired" class="form-check-input" [disabled]="!userIsSchedulerAttributeDefinitionWriter()" />
                                <label for="AttributeDefinition-isRequired" class="form-check-label" id="label-AttributeDefinition-isRequired"><span class="text-danger">*</span>Is Required</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="AttributeDefinition-sequence" id="label-AttributeDefinition-sequence">Sequence</label>
                                <input type="number" id="AttributeDefinition-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control attribute-definition-input" [disabled]="!userIsSchedulerAttributeDefinitionWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="AttributeDefinition-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerAttributeDefinitionWriter()" />
                                <label for="AttributeDefinition-active" class="form-check-label" id="label-AttributeDefinition-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="AttributeDefinition-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerAttributeDefinitionWriter()" />
                                <label for="AttributeDefinition-deleted" class="form-check-label" id="label-AttributeDefinition-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="attribute-definition-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="attributeDefinitionForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Attribute Definition">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !attributeDefinitionForm.valid || !attributeDefinitionForm.dirty || attributeDefinitionForm.pristine || userIsSchedulerAttributeDefinitionWriter() == false " ngbTooltip="Save Attribute Definition">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
