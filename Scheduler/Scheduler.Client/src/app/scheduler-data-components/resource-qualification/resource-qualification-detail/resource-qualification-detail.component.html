<div class="container-fluid p-1 m-0 resource-qualification-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="resource-qualification-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Resource Qualification</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Resource Qualification' : 'Add Resource Qualification'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerResourceQualificationReader()">
                <div class="col m-2 resource-qualification-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="resourceQualificationForm" (ngSubmit)="submitForm()" class="resource-qualification-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('resourceId')">
                                <label for="ResourceQualification-resourceId" id="label-ResourceQualification-resourceId"><span class="text-danger">*</span>Resource</label>
                                <select id="ResourceQualification-resourceId" formControlName="resourceId" class="form-select resource-qualification-select" [disabled]="!userIsSchedulerResourceQualificationWriter()">
                                    <option [ngValue]="null">Select Resource</option>
                                    <option *ngFor="let resource of resources$ | async" [ngValue]="resource.id">{{[resource.name] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="resourceQualificationForm.get('resourceId')?.invalid && resourceQualificationForm.get('resourceId')?.touched" class="text-danger">
                                    Resource is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('qualificationId')">
                                <label for="ResourceQualification-qualificationId" id="label-ResourceQualification-qualificationId"><span class="text-danger">*</span>Qualification</label>
                                <select id="ResourceQualification-qualificationId" formControlName="qualificationId" class="form-select resource-qualification-select" [disabled]="!userIsSchedulerResourceQualificationWriter()">
                                    <option [ngValue]="null">Select Qualification</option>
                                    <option *ngFor="let qualification of qualifications$ | async" [ngValue]="qualification.id">{{qualification.name}}</option>
                                </select>
                                <div *ngIf="resourceQualificationForm.get('qualificationId')?.invalid && resourceQualificationForm.get('qualificationId')?.touched" class="text-danger">
                                    Qualification is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('issueDate')">
                                <label for="ResourceQualification-issueDate" id="label-ResourceQualification-issueDate">Issue Date</label>
                                <input type="datetime-local" id="ResourceQualification-issueDate" formControlName="issueDate" placeholder="Enter Issue Date" class="form-control resource-qualification-input" [disabled]="!userIsSchedulerResourceQualificationWriter()" aria-labelledby="label-issueDate" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('expiryDate')">
                                <label for="ResourceQualification-expiryDate" id="label-ResourceQualification-expiryDate">Expiry Date</label>
                                <input type="datetime-local" id="ResourceQualification-expiryDate" formControlName="expiryDate" placeholder="Enter Expiry Date" class="form-control resource-qualification-input" [disabled]="!userIsSchedulerResourceQualificationWriter()" aria-labelledby="label-expiryDate" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('issuer')">
                                <label for="ResourceQualification-issuer" id="label-ResourceQualification-issuer">Issuer</label>
                                <input type="text" id="ResourceQualification-issuer" formControlName="issuer" placeholder="Enter Issuer" class="form-control resource-qualification-input" [disabled]="!userIsSchedulerResourceQualificationWriter()" aria-labelledby="label-issuer" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('notes')">
                                <label for="ResourceQualification-notes" id="label-ResourceQualification-notes">Notes</label>
                                <textarea id="ResourceQualification-notes" formControlName="notes" placeholder="Enter Notes" class="form-control resource-qualification-input" [disabled]="!userIsSchedulerResourceQualificationWriter()"></textarea>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ResourceQualification-versionNumber" id="label-ResourceQualification-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ResourceQualification-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control resource-qualification-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ResourceQualification-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerResourceQualificationWriter()" />
                                <label for="ResourceQualification-active" class="form-check-label" id="label-ResourceQualification-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ResourceQualification-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerResourceQualificationWriter()" />
                                <label for="ResourceQualification-deleted" class="form-check-label" id="label-ResourceQualification-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="resource-qualification-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="resourceQualificationForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Resource Qualification">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !resourceQualificationForm.valid || !resourceQualificationForm.dirty || resourceQualificationForm.pristine  || userIsSchedulerResourceQualificationWriter() == false " ngbTooltip="Save the Resource Qualification changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Resource Qualification' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerResourceQualificationReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 resource-qualification-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="resourceQualificationChangeHistoryService.userIsSchedulerResourceQualificationChangeHistoryReader()">
                            <button ngbNavLink>Resource Qualification Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (resourceQualificationData?.ResourceQualificationChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-resource-qualification-change-history-table [queryParams]="{ resourceQualificationId: resourceQualificationData?.id }"></app-resource-qualification-change-history-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-resource-qualification-change-history-add-edit [preSeededData]="{ resourceQualificationId: resourceQualificationData?.id }" [hiddenFields]="['resourceQualificationId']"></app-resource-qualification-change-history-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
