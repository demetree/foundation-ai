<div class="container-fluid p-1 m-0 scheduled-event-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="scheduled-event-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Scheduled Event Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Scheduled Event Change History' : 'Add Scheduled Event Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerScheduledEventChangeHistoryReader()">
                <div class="col m-2 scheduled-event-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="scheduledEventChangeHistoryForm" (ngSubmit)="submitForm()" class="scheduled-event-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('scheduledEventId')">
                                <label for="ScheduledEventChangeHistory-scheduledEventId" id="label-ScheduledEventChangeHistory-scheduledEventId"><span class="text-danger">*</span>Scheduled Event</label>
                                <select id="ScheduledEventChangeHistory-scheduledEventId" formControlName="scheduledEventId" class="form-select scheduled-event-change-history-select" [disabled]="!userIsSchedulerScheduledEventChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Scheduled Event</option>
                                    <option *ngFor="let scheduledEvent of scheduledEvents$ | async" [ngValue]="scheduledEvent.id">{{[scheduledEvent.name] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="scheduledEventChangeHistoryForm.get('scheduledEventId')?.invalid && scheduledEventChangeHistoryForm.get('scheduledEventId')?.touched" class="text-danger">
                                    Scheduled Event is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ScheduledEventChangeHistory-versionNumber" id="label-ScheduledEventChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ScheduledEventChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control scheduled-event-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="ScheduledEventChangeHistory-timeStamp" id="label-ScheduledEventChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="ScheduledEventChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control scheduled-event-change-history-input" [disabled]="!userIsSchedulerScheduledEventChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="scheduledEventChangeHistoryForm.get('timeStamp')?.invalid && scheduledEventChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="ScheduledEventChangeHistory-userId" id="label-ScheduledEventChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="ScheduledEventChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control scheduled-event-change-history-input" [disabled]="!userIsSchedulerScheduledEventChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="scheduledEventChangeHistoryForm.get('userId')?.invalid && scheduledEventChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="ScheduledEventChangeHistory-data" id="label-ScheduledEventChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="ScheduledEventChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control scheduled-event-change-history-input" [disabled]="!userIsSchedulerScheduledEventChangeHistoryWriter()"></textarea>
                                <div *ngIf="scheduledEventChangeHistoryForm.get('data')?.invalid && scheduledEventChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="scheduled-event-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="scheduledEventChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Scheduled Event Change History">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !scheduledEventChangeHistoryForm.valid || !scheduledEventChangeHistoryForm.dirty || scheduledEventChangeHistoryForm.pristine || userIsSchedulerScheduledEventChangeHistoryWriter() == false " ngbTooltip="Save Scheduled Event Change History">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
