<div class="add-recurrence-rule" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-recurrence-rule me-2"
        (click)="openModal()"
        ngbTooltip="Add Recurrence Rule" 
        *ngIf="userIsSchedulerRecurrenceRuleWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #recurrenceRuleModal let-modal>
   <div class="modal-header bg-dark text-light recurrence-rule-modal-header">
      <h5 class="modal-title mb-0" id="recurrenceRuleModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Recurrence Rule' : 'Add Recurrence Rule' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body recurrence-rule-modal-body">
      <form [formGroup]="recurrenceRuleForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('recurrenceFrequencyId')">
                <label for="RecurrenceRule-recurrenceFrequencyId" id="label-RecurrenceRule-recurrenceFrequencyId"><span class="text-danger">*</span>Recurrence Frequency</label>
                <select id="RecurrenceRule-recurrenceFrequencyId" formControlName="recurrenceFrequencyId" class="form-select recurrence-rule-select" [disabled]="!userIsSchedulerRecurrenceRuleWriter()">
                    <option [ngValue]="null">Select Recurrence Frequency</option>
                    <option *ngFor="let recurrenceFrequency of recurrenceFrequencies$ | async" [ngValue]="recurrenceFrequency.id">{{recurrenceFrequency.name}}</option>
                </select>
                <div *ngIf="recurrenceRuleForm.get('recurrenceFrequencyId')?.invalid && recurrenceRuleForm.get('recurrenceFrequencyId')?.touched" class="text-danger">
                    Recurrence Frequency is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('interval')">
                <label for="RecurrenceRule-interval" id="label-RecurrenceRule-interval"><span class="text-danger">*</span>Interval</label>
                <input type="number" id="RecurrenceRule-interval" formControlName="interval" placeholder="Enter Interval" class="form-control recurrence-rule-input" [disabled]="!userIsSchedulerRecurrenceRuleWriter()" aria-labelledby="label-interval" />
                <div *ngIf="recurrenceRuleForm.get('interval')?.invalid && recurrenceRuleForm.get('interval')?.touched" class="text-danger">
                    Interval is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('untilDateTime')">
                <label for="RecurrenceRule-untilDateTime" id="label-RecurrenceRule-untilDateTime">Until Date Time</label>
                <input type="datetime-local" id="RecurrenceRule-untilDateTime" formControlName="untilDateTime" placeholder="Enter Until Date Time" class="form-control recurrence-rule-input" [disabled]="!userIsSchedulerRecurrenceRuleWriter()" aria-labelledby="label-untilDateTime" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('count')">
                <label for="RecurrenceRule-count" id="label-RecurrenceRule-count">Count</label>
                <input type="number" id="RecurrenceRule-count" formControlName="count" placeholder="Enter Count" class="form-control recurrence-rule-input" [disabled]="!userIsSchedulerRecurrenceRuleWriter()" aria-labelledby="label-count" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('dayOfWeekMask')">
                <label for="RecurrenceRule-dayOfWeekMask" id="label-RecurrenceRule-dayOfWeekMask">Day Of Week Mask</label>
                <input type="number" id="RecurrenceRule-dayOfWeekMask" formControlName="dayOfWeekMask" placeholder="Enter Day Of Week Mask" class="form-control recurrence-rule-input" [disabled]="!userIsSchedulerRecurrenceRuleWriter()" aria-labelledby="label-dayOfWeekMask" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('dayOfMonth')">
                <label for="RecurrenceRule-dayOfMonth" id="label-RecurrenceRule-dayOfMonth">Day Of Month</label>
                <input type="number" id="RecurrenceRule-dayOfMonth" formControlName="dayOfMonth" placeholder="Enter Day Of Month" class="form-control recurrence-rule-input" [disabled]="!userIsSchedulerRecurrenceRuleWriter()" aria-labelledby="label-dayOfMonth" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('dayOfWeekInMonth')">
                <label for="RecurrenceRule-dayOfWeekInMonth" id="label-RecurrenceRule-dayOfWeekInMonth">Day Of Week In Month</label>
                <input type="number" id="RecurrenceRule-dayOfWeekInMonth" formControlName="dayOfWeekInMonth" placeholder="Enter Day Of Week In Month" class="form-control recurrence-rule-input" [disabled]="!userIsSchedulerRecurrenceRuleWriter()" aria-labelledby="label-dayOfWeekInMonth" />
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="RecurrenceRule-versionNumber" id="label-RecurrenceRule-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="RecurrenceRule-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control recurrence-rule-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="RecurrenceRule-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerRecurrenceRuleWriter()" />
                <label for="RecurrenceRule-active" class="form-check-label" id="label-RecurrenceRule-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="RecurrenceRule-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerRecurrenceRuleWriter()" />
                <label for="RecurrenceRule-deleted" class="form-check-label" id="label-RecurrenceRule-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer recurrence-rule-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Recurrence Rule changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !recurrenceRuleForm.valid || recurrenceRuleForm.pristine  || userIsSchedulerRecurrenceRuleWriter() == false " ngbTooltip="Save the Recurrence Rule changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Recurrence Rule' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
