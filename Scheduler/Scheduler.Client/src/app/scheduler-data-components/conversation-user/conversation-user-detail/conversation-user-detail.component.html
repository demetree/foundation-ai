<div class="container-fluid p-1 m-0 conversation-user-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="conversation-user-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Conversation User</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Conversation User' : 'Add Conversation User'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerConversationUserReader()">
                <div class="col m-2 conversation-user-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="conversationUserForm" (ngSubmit)="submitForm()" class="conversation-user-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('conversationId')">
                                <label for="ConversationUser-conversationId" id="label-ConversationUser-conversationId"><span class="text-danger">*</span>Conversation</label>
                                <select id="ConversationUser-conversationId" formControlName="conversationId" class="form-select conversation-user-select" [disabled]="!userIsSchedulerConversationUserWriter()">
                                    <option [ngValue]="null">Select Conversation</option>
                                    <option *ngFor="let conversation of conversations$ | async" [ngValue]="conversation.id">{{conversation.entity}}</option>
                                </select>
                                <div *ngIf="conversationUserForm.get('conversationId')?.invalid && conversationUserForm.get('conversationId')?.touched" class="text-danger">
                                    Conversation is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="ConversationUser-userId" id="label-ConversationUser-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="ConversationUser-userId" formControlName="userId" placeholder="Enter User Id" class="form-control conversation-user-input" [disabled]="!userIsSchedulerConversationUserWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="conversationUserForm.get('userId')?.invalid && conversationUserForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('role')">
                                <label for="ConversationUser-role" id="label-ConversationUser-role"><span class="text-danger">*</span>Role</label>
                                <input type="text" id="ConversationUser-role" formControlName="role" placeholder="Enter Role" class="form-control conversation-user-input" [disabled]="!userIsSchedulerConversationUserWriter()" aria-labelledby="label-role" />
                                <div *ngIf="conversationUserForm.get('role')?.invalid && conversationUserForm.get('role')?.touched" class="text-danger">
                                    Role is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('dateTimeAdded')">
                                <label for="ConversationUser-dateTimeAdded" id="label-ConversationUser-dateTimeAdded"><span class="text-danger">*</span>Date Time Added</label>
                                <input type="datetime-local" id="ConversationUser-dateTimeAdded" formControlName="dateTimeAdded" placeholder="Enter Date Time Added" class="form-control conversation-user-input" [disabled]="!userIsSchedulerConversationUserWriter()" aria-labelledby="label-dateTimeAdded" />
                                <div *ngIf="conversationUserForm.get('dateTimeAdded')?.invalid && conversationUserForm.get('dateTimeAdded')?.touched" class="text-danger">
                                    Date Time Added is required
                                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ConversationUser-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerConversationUserWriter()" />
                                <label for="ConversationUser-active" class="form-check-label" id="label-ConversationUser-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ConversationUser-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerConversationUserWriter()" />
                                <label for="ConversationUser-deleted" class="form-check-label" id="label-ConversationUser-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="conversation-user-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="conversationUserForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Conversation User">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !conversationUserForm.valid || !conversationUserForm.dirty || conversationUserForm.pristine  || userIsSchedulerConversationUserWriter() == false " ngbTooltip="Save the Conversation User changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Conversation User' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
