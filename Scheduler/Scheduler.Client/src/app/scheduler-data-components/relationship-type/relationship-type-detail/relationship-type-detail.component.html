<div class="container-fluid p-1 m-0 relationship-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="relationship-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Relationship Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Relationship Type' : 'Add Relationship Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerRelationshipTypeReader()">
                <div class="col m-2 relationship-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="relationshipTypeForm" (ngSubmit)="submitForm()" class="relationship-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="RelationshipType-name" id="label-RelationshipType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="RelationshipType-name" formControlName="name" placeholder="Enter Name" class="form-control relationship-type-input" [disabled]="!userIsSchedulerRelationshipTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="relationshipTypeForm.get('name')?.invalid && relationshipTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="RelationshipType-description" id="label-RelationshipType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="RelationshipType-description" formControlName="description" placeholder="Enter Description" class="form-control relationship-type-input" [disabled]="!userIsSchedulerRelationshipTypeWriter()"></textarea>
                                <div *ngIf="relationshipTypeForm.get('description')?.invalid && relationshipTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isEmergencyEligible')">
                                <input type="checkbox" id="RelationshipType-isEmergencyEligible" formControlName="isEmergencyEligible" class="form-check-input" [disabled]="!userIsSchedulerRelationshipTypeWriter()" />
                                <label for="RelationshipType-isEmergencyEligible" class="form-check-label" id="label-RelationshipType-isEmergencyEligible"><span class="text-danger">*</span>Is Emergency Eligible</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="RelationshipType-sequence" id="label-RelationshipType-sequence">Sequence</label>
                                <input type="number" id="RelationshipType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control relationship-type-input" [disabled]="!userIsSchedulerRelationshipTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('iconId')">
                                <label for="RelationshipType-iconId" id="label-RelationshipType-iconId">Icon</label>
                                <select id="RelationshipType-iconId" formControlName="iconId" class="form-select relationship-type-select" [disabled]="!userIsSchedulerRelationshipTypeWriter()">
                                    <option [ngValue]="null">Select Icon</option>
                                    <option *ngFor="let icon of icons$ | async" [ngValue]="icon.id">{{icon.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="RelationshipType-color" id="label-RelationshipType-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="RelationshipType-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerRelationshipTypeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="relationshipTypeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="RelationshipType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerRelationshipTypeWriter()" />
                                <label for="RelationshipType-active" class="form-check-label" id="label-RelationshipType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="RelationshipType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerRelationshipTypeWriter()" />
                                <label for="RelationshipType-deleted" class="form-check-label" id="label-RelationshipType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="relationship-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="relationshipTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Relationship Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !relationshipTypeForm.valid || !relationshipTypeForm.dirty || relationshipTypeForm.pristine  || userIsSchedulerRelationshipTypeWriter() == false " ngbTooltip="Save the Relationship Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Relationship Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerRelationshipTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 relationship-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="contactContactService.userIsSchedulerContactContactReader()">
                            <button ngbNavLink>Contact Contacts
                                <span class="badge bg-primary ms-2">
                                    {{ (relationshipTypeData?.ContactContactsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-contact-contact-table [queryParams]="{ relationshipTypeId: relationshipTypeData?.id }" [showAddButton]="true" [preSeededData]="{ relationshipTypeId: relationshipTypeData?.id }" [hiddenFields]="['relationshipTypeId']"></app-contact-contact-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="officeContactService.userIsSchedulerOfficeContactReader()">
                            <button ngbNavLink>Office Contacts
                                <span class="badge bg-primary ms-2">
                                    {{ (relationshipTypeData?.OfficeContactsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-office-contact-table [queryParams]="{ relationshipTypeId: relationshipTypeData?.id }" [showAddButton]="true" [preSeededData]="{ relationshipTypeId: relationshipTypeData?.id }" [hiddenFields]="['relationshipTypeId']"></app-office-contact-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="clientContactService.userIsSchedulerClientContactReader()">
                            <button ngbNavLink>Client Contacts
                                <span class="badge bg-primary ms-2">
                                    {{ (relationshipTypeData?.ClientContactsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-client-contact-table [queryParams]="{ relationshipTypeId: relationshipTypeData?.id }" [showAddButton]="true" [preSeededData]="{ relationshipTypeId: relationshipTypeData?.id }" [hiddenFields]="['relationshipTypeId']"></app-client-contact-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="schedulingTargetContactService.userIsSchedulerSchedulingTargetContactReader()">
                            <button ngbNavLink>Scheduling Target Contacts
                                <span class="badge bg-primary ms-2">
                                    {{ (relationshipTypeData?.SchedulingTargetContactsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduling-target-contact-table [queryParams]="{ relationshipTypeId: relationshipTypeData?.id }" [showAddButton]="true" [preSeededData]="{ relationshipTypeId: relationshipTypeData?.id }" [hiddenFields]="['relationshipTypeId']"></app-scheduling-target-contact-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="resourceContactService.userIsSchedulerResourceContactReader()">
                            <button ngbNavLink>Resource Contacts
                                <span class="badge bg-primary ms-2">
                                    {{ (relationshipTypeData?.ResourceContactsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-resource-contact-table [queryParams]="{ relationshipTypeId: relationshipTypeData?.id }" [showAddButton]="true" [preSeededData]="{ relationshipTypeId: relationshipTypeData?.id }" [hiddenFields]="['relationshipTypeId']"></app-resource-contact-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
