<div class="add-conversation" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-conversation me-2"
        (click)="openModal()"
        ngbTooltip="Add Conversation" 
        *ngIf="userIsSchedulerConversationWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #conversationModal let-modal>
   <div class="modal-header conversation-modal-header">
      <h5 class="modal-title mb-0" id="conversationModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Conversation' : 'Add Conversation' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body conversation-modal-body">
      <form [formGroup]="conversationForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('createdByUserId')">
                <label for="Conversation-createdByUserId" id="label-Conversation-createdByUserId">Created By User Id</label>
                <input type="number" id="Conversation-createdByUserId" formControlName="createdByUserId" placeholder="Enter Created By User Id" class="form-control conversation-input" [disabled]="!userIsSchedulerConversationWriter()" aria-labelledby="label-createdByUserId" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('conversationTypeId')">
                <label for="Conversation-conversationTypeId" id="label-Conversation-conversationTypeId">Conversation Type</label>
                <select id="Conversation-conversationTypeId" formControlName="conversationTypeId" class="form-select conversation-select" [disabled]="!userIsSchedulerConversationWriter()">
                    <option [ngValue]="null">Select Conversation Type</option>
                    <option *ngFor="let conversationType of conversationTypes$ | async" [ngValue]="conversationType.id">{{conversationType.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('priority')">
                <label for="Conversation-priority" id="label-Conversation-priority"><span class="text-danger">*</span>Priority</label>
                <input type="number" id="Conversation-priority" formControlName="priority" placeholder="Enter Priority" class="form-control conversation-input" [disabled]="!userIsSchedulerConversationWriter()" aria-labelledby="label-priority" />
                <div *ngIf="conversationForm.get('priority')?.invalid && conversationForm.get('priority')?.touched" class="text-danger">
                    Priority is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('dateTimeCreated')">
                <label for="Conversation-dateTimeCreated" id="label-Conversation-dateTimeCreated"><span class="text-danger">*</span>Date Time Created</label>
                <input type="datetime-local" id="Conversation-dateTimeCreated" formControlName="dateTimeCreated" placeholder="Enter Date Time Created" class="form-control conversation-input" [disabled]="!userIsSchedulerConversationWriter()" aria-labelledby="label-dateTimeCreated" />
                <div *ngIf="conversationForm.get('dateTimeCreated')?.invalid && conversationForm.get('dateTimeCreated')?.touched" class="text-danger">
                    Date Time Created is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('entity')">
                <label for="Conversation-entity" id="label-Conversation-entity">Entity</label>
                <input type="text" id="Conversation-entity" formControlName="entity" placeholder="Enter Entity" class="form-control conversation-input" [disabled]="!userIsSchedulerConversationWriter()" aria-labelledby="label-entity" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('entityId')">
                <label for="Conversation-entityId" id="label-Conversation-entityId">Entity Id</label>
                <input type="number" id="Conversation-entityId" formControlName="entityId" placeholder="Enter Entity Id" class="form-control conversation-input" [disabled]="!userIsSchedulerConversationWriter()" aria-labelledby="label-entityId" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('externalURL')">
                <label for="Conversation-externalURL" id="label-Conversation-externalURL">External U R L</label>
                <textarea id="Conversation-externalURL" formControlName="externalURL" placeholder="Enter External U R L" class="form-control conversation-input" [disabled]="!userIsSchedulerConversationWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="Conversation-name" id="label-Conversation-name">Name</label>
                <input type="text" id="Conversation-name" formControlName="name" placeholder="Enter Name" class="form-control conversation-input" [disabled]="!userIsSchedulerConversationWriter()" aria-labelledby="label-name" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="Conversation-description" id="label-Conversation-description">Description</label>
                <textarea id="Conversation-description" formControlName="description" placeholder="Enter Description" class="form-control conversation-input" [disabled]="!userIsSchedulerConversationWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('isPublic')">
                <input type="checkbox" id="Conversation-isPublic" formControlName="isPublic" class="form-check-input" [disabled]="!userIsSchedulerConversationWriter()" />
                <label for="Conversation-isPublic" class="form-check-label" id="label-Conversation-isPublic">Is Public</label>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="Conversation-userId" id="label-Conversation-userId">User Id</label>
                <input type="number" id="Conversation-userId" formControlName="userId" placeholder="Enter User Id" class="form-control conversation-input" [disabled]="!userIsSchedulerConversationWriter()" aria-labelledby="label-userId" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="Conversation-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerConversationWriter()" />
                <label for="Conversation-active" class="form-check-label" id="label-Conversation-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="Conversation-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerConversationWriter()" />
                <label for="Conversation-deleted" class="form-check-label" id="label-Conversation-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer conversation-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Conversation changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !conversationForm.valid || conversationForm.pristine  || userIsSchedulerConversationWriter() == false " ngbTooltip="Save the Conversation changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Conversation' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
