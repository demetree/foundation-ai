<div class="container-fluid p-1 m-0 salesforce-tenant-link-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="salesforce-tenant-link-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Salesforce Tenant Link Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Salesforce Tenant Link Change History' : 'Add Salesforce Tenant Link Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerSalesforceTenantLinkChangeHistoryReader()">
                <div class="col m-2 salesforce-tenant-link-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="salesforceTenantLinkChangeHistoryForm" (ngSubmit)="submitForm()" class="salesforce-tenant-link-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('salesforceTenantLinkId')">
                                <label for="SalesforceTenantLinkChangeHistory-salesforceTenantLinkId" id="label-SalesforceTenantLinkChangeHistory-salesforceTenantLinkId"><span class="text-danger">*</span>Salesforce Tenant Link</label>
                                <select id="SalesforceTenantLinkChangeHistory-salesforceTenantLinkId" formControlName="salesforceTenantLinkId" class="form-select salesforce-tenant-link-change-history-select" [disabled]="!userIsSchedulerSalesforceTenantLinkChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Salesforce Tenant Link</option>
                                    <option *ngFor="let salesforceTenantLink of salesforceTenantLinks$ | async" [ngValue]="salesforceTenantLink.id">{{salesforceTenantLink.syncDirectionFlags}}</option>
                                </select>
                                <div *ngIf="salesforceTenantLinkChangeHistoryForm.get('salesforceTenantLinkId')?.invalid && salesforceTenantLinkChangeHistoryForm.get('salesforceTenantLinkId')?.touched" class="text-danger">
                                    Salesforce Tenant Link is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="SalesforceTenantLinkChangeHistory-versionNumber" id="label-SalesforceTenantLinkChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="SalesforceTenantLinkChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control salesforce-tenant-link-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="SalesforceTenantLinkChangeHistory-timeStamp" id="label-SalesforceTenantLinkChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="SalesforceTenantLinkChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control salesforce-tenant-link-change-history-input" [disabled]="!userIsSchedulerSalesforceTenantLinkChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="salesforceTenantLinkChangeHistoryForm.get('timeStamp')?.invalid && salesforceTenantLinkChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="SalesforceTenantLinkChangeHistory-userId" id="label-SalesforceTenantLinkChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="SalesforceTenantLinkChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control salesforce-tenant-link-change-history-input" [disabled]="!userIsSchedulerSalesforceTenantLinkChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="salesforceTenantLinkChangeHistoryForm.get('userId')?.invalid && salesforceTenantLinkChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="SalesforceTenantLinkChangeHistory-data" id="label-SalesforceTenantLinkChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="SalesforceTenantLinkChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control salesforce-tenant-link-change-history-input" [disabled]="!userIsSchedulerSalesforceTenantLinkChangeHistoryWriter()"></textarea>
                                <div *ngIf="salesforceTenantLinkChangeHistoryForm.get('data')?.invalid && salesforceTenantLinkChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="salesforce-tenant-link-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="salesforceTenantLinkChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Salesforce Tenant Link Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !salesforceTenantLinkChangeHistoryForm.valid || !salesforceTenantLinkChangeHistoryForm.dirty || salesforceTenantLinkChangeHistoryForm.pristine  || userIsSchedulerSalesforceTenantLinkChangeHistoryWriter() == false " ngbTooltip="Save the Salesforce Tenant Link Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Salesforce Tenant Link Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
