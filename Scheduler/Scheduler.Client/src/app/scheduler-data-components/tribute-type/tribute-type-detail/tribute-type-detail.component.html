<div class="container-fluid p-1 m-0 tribute-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="tribute-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Tribute Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Tribute Type' : 'Add Tribute Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerTributeTypeReader()">
                <div class="col m-2 tribute-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="tributeTypeForm" (ngSubmit)="submitForm()" class="tribute-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="TributeType-name" id="label-TributeType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="TributeType-name" formControlName="name" placeholder="Enter Name" class="form-control tribute-type-input" [disabled]="!userIsSchedulerTributeTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="tributeTypeForm.get('name')?.invalid && tributeTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="TributeType-description" id="label-TributeType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="TributeType-description" formControlName="description" placeholder="Enter Description" class="form-control tribute-type-input" [disabled]="!userIsSchedulerTributeTypeWriter()"></textarea>
                                <div *ngIf="tributeTypeForm.get('description')?.invalid && tributeTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="TributeType-sequence" id="label-TributeType-sequence">Sequence</label>
                                <input type="number" id="TributeType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control tribute-type-input" [disabled]="!userIsSchedulerTributeTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="TributeType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerTributeTypeWriter()" />
                                <label for="TributeType-active" class="form-check-label" id="label-TributeType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="TributeType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerTributeTypeWriter()" />
                                <label for="TributeType-deleted" class="form-check-label" id="label-TributeType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="tribute-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="tributeTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Tribute Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !tributeTypeForm.valid || !tributeTypeForm.dirty || tributeTypeForm.pristine  || userIsSchedulerTributeTypeWriter() == false " ngbTooltip="Save the Tribute Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Tribute Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerTributeTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 tribute-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="tributeService.userIsSchedulerTributeReader()">
                            <button ngbNavLink>Tributes
                                <span class="badge bg-primary ms-2">
                                    {{ (tributeTypeData?.TributesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-tribute-table [queryParams]="{ tributeTypeId: tributeTypeData?.id }"></app-tribute-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-tribute-add-edit [preSeededData]="{ tributeTypeId: tributeTypeData?.id }" [hiddenFields]="['tributeTypeId']"></app-tribute-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
