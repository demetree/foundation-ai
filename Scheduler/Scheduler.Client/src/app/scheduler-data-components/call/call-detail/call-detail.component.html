<div class="container-fluid p-1 m-0 call-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="call-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Call</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Call' : 'Add Call'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerCallReader()">
                <div class="col m-2 call-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="callForm" (ngSubmit)="submitForm()" class="call-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('callTypeId')">
                                <label for="Call-callTypeId" id="label-Call-callTypeId"><span class="text-danger">*</span>Call Type</label>
                                <select id="Call-callTypeId" formControlName="callTypeId" class="form-select call-select" [disabled]="!userIsSchedulerCallWriter()">
                                    <option [ngValue]="null">Select Call Type</option>
                                    <option *ngFor="let callType of callTypes$ | async" [ngValue]="callType.id">{{callType.name}}</option>
                                </select>
                                <div *ngIf="callForm.get('callTypeId')?.invalid && callForm.get('callTypeId')?.touched" class="text-danger">
                                    Call Type is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('callStatusId')">
                                <label for="Call-callStatusId" id="label-Call-callStatusId"><span class="text-danger">*</span>Call Status</label>
                                <select id="Call-callStatusId" formControlName="callStatusId" class="form-select call-select" [disabled]="!userIsSchedulerCallWriter()">
                                    <option [ngValue]="null">Select Call Status</option>
                                    <option *ngFor="let callStatus of callStatuses$ | async" [ngValue]="callStatus.id">{{callStatus.name}}</option>
                                </select>
                                <div *ngIf="callForm.get('callStatusId')?.invalid && callForm.get('callStatusId')?.touched" class="text-danger">
                                    Call Status is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('providerId')">
                                <label for="Call-providerId" id="label-Call-providerId"><span class="text-danger">*</span>Provider Id</label>
                                <input type="text" id="Call-providerId" formControlName="providerId" placeholder="Enter Provider Id" class="form-control call-input" [disabled]="!userIsSchedulerCallWriter()" aria-labelledby="label-providerId" />
                                <div *ngIf="callForm.get('providerId')?.invalid && callForm.get('providerId')?.touched" class="text-danger">
                                    Provider Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('providerCallId')">
                                <label for="Call-providerCallId" id="label-Call-providerCallId">Provider Call Id</label>
                                <input type="text" id="Call-providerCallId" formControlName="providerCallId" placeholder="Enter Provider Call Id" class="form-control call-input" [disabled]="!userIsSchedulerCallWriter()" aria-labelledby="label-providerCallId" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('conversationId')">
                                <label for="Call-conversationId" id="label-Call-conversationId"><span class="text-danger">*</span>Conversation</label>
                                <select id="Call-conversationId" formControlName="conversationId" class="form-select call-select" [disabled]="!userIsSchedulerCallWriter()">
                                    <option [ngValue]="null">Select Conversation</option>
                                    <option *ngFor="let conversation of conversations$ | async" [ngValue]="conversation.id">{{conversation.entity}}</option>
                                </select>
                                <div *ngIf="callForm.get('conversationId')?.invalid && callForm.get('conversationId')?.touched" class="text-danger">
                                    Conversation is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('initiatorUserId')">
                                <label for="Call-initiatorUserId" id="label-Call-initiatorUserId"><span class="text-danger">*</span>Initiator User Id</label>
                                <input type="number" id="Call-initiatorUserId" formControlName="initiatorUserId" placeholder="Enter Initiator User Id" class="form-control call-input" [disabled]="!userIsSchedulerCallWriter()" aria-labelledby="label-initiatorUserId" />
                                <div *ngIf="callForm.get('initiatorUserId')?.invalid && callForm.get('initiatorUserId')?.touched" class="text-danger">
                                    Initiator User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('startDateTime')">
                                <label for="Call-startDateTime" id="label-Call-startDateTime"><span class="text-danger">*</span>Start Date Time</label>
                                <input type="datetime-local" id="Call-startDateTime" formControlName="startDateTime" placeholder="Enter Start Date Time" class="form-control call-input" [disabled]="!userIsSchedulerCallWriter()" aria-labelledby="label-startDateTime" />
                                <div *ngIf="callForm.get('startDateTime')?.invalid && callForm.get('startDateTime')?.touched" class="text-danger">
                                    Start Date Time is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('answerDateTime')">
                                <label for="Call-answerDateTime" id="label-Call-answerDateTime">Answer Date Time</label>
                                <input type="datetime-local" id="Call-answerDateTime" formControlName="answerDateTime" placeholder="Enter Answer Date Time" class="form-control call-input" [disabled]="!userIsSchedulerCallWriter()" aria-labelledby="label-answerDateTime" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('endDateTime')">
                                <label for="Call-endDateTime" id="label-Call-endDateTime">End Date Time</label>
                                <input type="datetime-local" id="Call-endDateTime" formControlName="endDateTime" placeholder="Enter End Date Time" class="form-control call-input" [disabled]="!userIsSchedulerCallWriter()" aria-labelledby="label-endDateTime" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('durationSeconds')">
                                <label for="Call-durationSeconds" id="label-Call-durationSeconds">Duration Seconds</label>
                                <input type="number" id="Call-durationSeconds" formControlName="durationSeconds" placeholder="Enter Duration Seconds" class="form-control call-input" [disabled]="!userIsSchedulerCallWriter()" aria-labelledby="label-durationSeconds" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Call-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerCallWriter()" />
                                <label for="Call-active" class="form-check-label" id="label-Call-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Call-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerCallWriter()" />
                                <label for="Call-deleted" class="form-check-label" id="label-Call-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="call-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="callForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Call">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !callForm.valid || !callForm.dirty || callForm.pristine  || userIsSchedulerCallWriter() == false " ngbTooltip="Save the Call changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Call' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerCallReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 call-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="callParticipantService.userIsSchedulerCallParticipantReader()">
                            <button ngbNavLink>Call Participants
                                <span class="badge bg-primary ms-2">
                                    {{ (callData?.CallParticipantsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-call-participant-table [queryParams]="{ callId: callData?.id }" [showAddButton]="true" [preSeededData]="{ callId: callData?.id }" [hiddenFields]="['callId']"></app-call-participant-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="callEventLogService.userIsSchedulerCallEventLogReader()">
                            <button ngbNavLink>Call Event Logs
                                <span class="badge bg-primary ms-2">
                                    {{ (callData?.CallEventLogsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-call-event-log-table [queryParams]="{ callId: callData?.id }" [showAddButton]="true" [preSeededData]="{ callId: callData?.id }" [hiddenFields]="['callId']"></app-call-event-log-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
