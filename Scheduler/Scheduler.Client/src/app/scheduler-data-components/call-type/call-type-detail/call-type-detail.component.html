<div class="container-fluid p-1 m-0 call-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="call-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Call Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Call Type' : 'Add Call Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerCallTypeReader()">
                <div class="col m-2 call-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="callTypeForm" (ngSubmit)="submitForm()" class="call-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="CallType-name" id="label-CallType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="CallType-name" formControlName="name" placeholder="Enter Name" class="form-control call-type-input" [disabled]="!userIsSchedulerCallTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="callTypeForm.get('name')?.invalid && callTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="CallType-description" id="label-CallType-description">Description</label>
                                <textarea id="CallType-description" formControlName="description" placeholder="Enter Description" class="form-control call-type-input" [disabled]="!userIsSchedulerCallTypeWriter()"></textarea>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="CallType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerCallTypeWriter()" />
                                <label for="CallType-active" class="form-check-label" id="label-CallType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="CallType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerCallTypeWriter()" />
                                <label for="CallType-deleted" class="form-check-label" id="label-CallType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="call-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="callTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Call Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !callTypeForm.valid || !callTypeForm.dirty || callTypeForm.pristine  || userIsSchedulerCallTypeWriter() == false " ngbTooltip="Save the Call Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Call Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerCallTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 call-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="callService.userIsSchedulerCallReader()">
                            <button ngbNavLink>Calls
                                <span class="badge bg-primary ms-2">
                                    {{ (callTypeData?.CallsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-call-table [queryParams]="{ callTypeId: callTypeData?.id }" [showAddButton]="true" [preSeededData]="{ callTypeId: callTypeData?.id }" [hiddenFields]="['callTypeId']"></app-call-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
