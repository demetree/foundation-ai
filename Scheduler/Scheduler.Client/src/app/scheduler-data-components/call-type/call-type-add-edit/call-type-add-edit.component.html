<div class="add-call-type" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-call-type me-2"
        (click)="openModal()"
        ngbTooltip="Add Call Type" 
        *ngIf="userIsSchedulerCallTypeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #callTypeModal let-modal>
   <div class="modal-header call-type-modal-header">
      <h5 class="modal-title mb-0" id="callTypeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Call Type' : 'Add Call Type' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body call-type-modal-body">
      <form [formGroup]="callTypeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="CallType-name" id="label-CallType-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="CallType-name" formControlName="name" placeholder="Enter Name" class="form-control call-type-input" [disabled]="!userIsSchedulerCallTypeWriter()" aria-labelledby="label-name" />
                <div *ngIf="callTypeForm.get('name')?.invalid && callTypeForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="CallType-description" id="label-CallType-description">Description</label>
                <textarea id="CallType-description" formControlName="description" placeholder="Enter Description" class="form-control call-type-input" [disabled]="!userIsSchedulerCallTypeWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="CallType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerCallTypeWriter()" />
                <label for="CallType-active" class="form-check-label" id="label-CallType-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="CallType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerCallTypeWriter()" />
                <label for="CallType-deleted" class="form-check-label" id="label-CallType-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer call-type-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Call Type changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !callTypeForm.valid || callTypeForm.pristine  || userIsSchedulerCallTypeWriter() == false " ngbTooltip="Save the Call Type changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Call Type' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
