<div class="container-fluid p-1 m-0 call-event-log-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="call-event-log-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Call Event Log</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Call Event Log' : 'Add Call Event Log'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerCallEventLogReader()">
                <div class="col m-2 call-event-log-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="callEventLogForm" (ngSubmit)="submitForm()" class="call-event-log-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('callId')">
                                <label for="CallEventLog-callId" id="label-CallEventLog-callId"><span class="text-danger">*</span>Call</label>
                                <select id="CallEventLog-callId" formControlName="callId" class="form-select call-event-log-select" [disabled]="!userIsSchedulerCallEventLogWriter()">
                                    <option [ngValue]="null">Select Call</option>
                                    <option *ngFor="let call of calls$ | async" [ngValue]="call.id">{{call.providerId}}</option>
                                </select>
                                <div *ngIf="callEventLogForm.get('callId')?.invalid && callEventLogForm.get('callId')?.touched" class="text-danger">
                                    Call is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('eventType')">
                                <label for="CallEventLog-eventType" id="label-CallEventLog-eventType"><span class="text-danger">*</span>Event Type</label>
                                <input type="text" id="CallEventLog-eventType" formControlName="eventType" placeholder="Enter Event Type" class="form-control call-event-log-input" [disabled]="!userIsSchedulerCallEventLogWriter()" aria-labelledby="label-eventType" />
                                <div *ngIf="callEventLogForm.get('eventType')?.invalid && callEventLogForm.get('eventType')?.touched" class="text-danger">
                                    Event Type is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="CallEventLog-userId" id="label-CallEventLog-userId">User Id</label>
                                <input type="number" id="CallEventLog-userId" formControlName="userId" placeholder="Enter User Id" class="form-control call-event-log-input" [disabled]="!userIsSchedulerCallEventLogWriter()" aria-labelledby="label-userId" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('providerId')">
                                <label for="CallEventLog-providerId" id="label-CallEventLog-providerId">Provider Id</label>
                                <input type="text" id="CallEventLog-providerId" formControlName="providerId" placeholder="Enter Provider Id" class="form-control call-event-log-input" [disabled]="!userIsSchedulerCallEventLogWriter()" aria-labelledby="label-providerId" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('metadata')">
                                <label for="CallEventLog-metadata" id="label-CallEventLog-metadata">Metadata</label>
                                <textarea id="CallEventLog-metadata" formControlName="metadata" placeholder="Enter Metadata" class="form-control call-event-log-input" [disabled]="!userIsSchedulerCallEventLogWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('dateTimeCreated')">
                                <label for="CallEventLog-dateTimeCreated" id="label-CallEventLog-dateTimeCreated"><span class="text-danger">*</span>Date Time Created</label>
                                <input type="datetime-local" id="CallEventLog-dateTimeCreated" formControlName="dateTimeCreated" placeholder="Enter Date Time Created" class="form-control call-event-log-input" [disabled]="!userIsSchedulerCallEventLogWriter()" aria-labelledby="label-dateTimeCreated" />
                                <div *ngIf="callEventLogForm.get('dateTimeCreated')?.invalid && callEventLogForm.get('dateTimeCreated')?.touched" class="text-danger">
                                    Date Time Created is required
                                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="CallEventLog-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerCallEventLogWriter()" />
                                <label for="CallEventLog-active" class="form-check-label" id="label-CallEventLog-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="CallEventLog-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerCallEventLogWriter()" />
                                <label for="CallEventLog-deleted" class="form-check-label" id="label-CallEventLog-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="call-event-log-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="callEventLogForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Call Event Log">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !callEventLogForm.valid || !callEventLogForm.dirty || callEventLogForm.pristine  || userIsSchedulerCallEventLogWriter() == false " ngbTooltip="Save the Call Event Log changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Call Event Log' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
