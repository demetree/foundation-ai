<div class="add-document-share-link-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-document-share-link-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Document Share Link Change History" 
        *ngIf="userIsSchedulerDocumentShareLinkChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #documentShareLinkChangeHistoryModal let-modal>
   <div class="modal-header document-share-link-change-history-modal-header">
      <h5 class="modal-title mb-0" id="documentShareLinkChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Document Share Link Change History' : 'Add Document Share Link Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body document-share-link-change-history-modal-body">
      <form [formGroup]="documentShareLinkChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('documentShareLinkId')">
                <label for="DocumentShareLinkChangeHistory-documentShareLinkId" id="label-DocumentShareLinkChangeHistory-documentShareLinkId"><span class="text-danger">*</span>Document Share Link</label>
                <select id="DocumentShareLinkChangeHistory-documentShareLinkId" formControlName="documentShareLinkId" class="form-select document-share-link-change-history-select" [disabled]="!userIsSchedulerDocumentShareLinkChangeHistoryWriter()">
                    <option [ngValue]="null">Select Document Share Link</option>
                    <option *ngFor="let documentShareLink of documentShareLinks$ | async" [ngValue]="documentShareLink.id">{{documentShareLink.passwordHash}}</option>
                </select>
                <div *ngIf="documentShareLinkChangeHistoryForm.get('documentShareLinkId')?.invalid && documentShareLinkChangeHistoryForm.get('documentShareLinkId')?.touched" class="text-danger">
                    Document Share Link is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="DocumentShareLinkChangeHistory-versionNumber" id="label-DocumentShareLinkChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="DocumentShareLinkChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control document-share-link-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="DocumentShareLinkChangeHistory-timeStamp" id="label-DocumentShareLinkChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="DocumentShareLinkChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control document-share-link-change-history-input" [disabled]="!userIsSchedulerDocumentShareLinkChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="documentShareLinkChangeHistoryForm.get('timeStamp')?.invalid && documentShareLinkChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="DocumentShareLinkChangeHistory-userId" id="label-DocumentShareLinkChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="DocumentShareLinkChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control document-share-link-change-history-input" [disabled]="!userIsSchedulerDocumentShareLinkChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="documentShareLinkChangeHistoryForm.get('userId')?.invalid && documentShareLinkChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="DocumentShareLinkChangeHistory-data" id="label-DocumentShareLinkChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="DocumentShareLinkChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control document-share-link-change-history-input" [disabled]="!userIsSchedulerDocumentShareLinkChangeHistoryWriter()"></textarea>
                <div *ngIf="documentShareLinkChangeHistoryForm.get('data')?.invalid && documentShareLinkChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer document-share-link-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Document Share Link Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !documentShareLinkChangeHistoryForm.valid || documentShareLinkChangeHistoryForm.pristine  || userIsSchedulerDocumentShareLinkChangeHistoryWriter() == false " ngbTooltip="Save the Document Share Link Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Document Share Link Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
