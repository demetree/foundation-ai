<div class="add-resource" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-resource me-2"
        (click)="openModal()"
        ngbTooltip="Add Resource" 
        *ngIf="userIsSchedulerResourceWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #resourceModal let-modal>
   <div class="modal-header bg-dark text-light resource-modal-header">
      <h5 class="modal-title mb-0" id="resourceModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Resource' : 'Add Resource' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body resource-modal-body">
      <form [formGroup]="resourceForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="Resource-name" id="label-Resource-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="Resource-name" formControlName="name" placeholder="Enter Name" class="form-control resource-input" [disabled]="!userIsSchedulerResourceWriter()" aria-labelledby="label-name" />
                <div *ngIf="resourceForm.get('name')?.invalid && resourceForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="Resource-description" id="label-Resource-description">Description</label>
                <textarea id="Resource-description" formControlName="description" placeholder="Enter Description" class="form-control resource-input" [disabled]="!userIsSchedulerResourceWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('officeId')">
                <label for="Resource-officeId" id="label-Resource-officeId">Office</label>
                <select id="Resource-officeId" formControlName="officeId" class="form-select resource-select" [disabled]="!userIsSchedulerResourceWriter()">
                    <option [ngValue]="null">Select Office</option>
                    <option *ngFor="let office of offices$ | async" [ngValue]="office.id">{{office.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('resourceTypeId')">
                <label for="Resource-resourceTypeId" id="label-Resource-resourceTypeId"><span class="text-danger">*</span>Resource Type</label>
                <select id="Resource-resourceTypeId" formControlName="resourceTypeId" class="form-select resource-select" [disabled]="!userIsSchedulerResourceWriter()">
                    <option [ngValue]="null">Select Resource Type</option>
                    <option *ngFor="let resourceType of resourceTypes$ | async" [ngValue]="resourceType.id">{{resourceType.name}}</option>
                </select>
                <div *ngIf="resourceForm.get('resourceTypeId')?.invalid && resourceForm.get('resourceTypeId')?.touched" class="text-danger">
                    Resource Type is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('shiftPatternId')">
                <label for="Resource-shiftPatternId" id="label-Resource-shiftPatternId">Shift Pattern</label>
                <select id="Resource-shiftPatternId" formControlName="shiftPatternId" class="form-select resource-select" [disabled]="!userIsSchedulerResourceWriter()">
                    <option [ngValue]="null">Select Shift Pattern</option>
                    <option *ngFor="let shiftPattern of shiftPatterns$ | async" [ngValue]="shiftPattern.id">{{shiftPattern.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeZoneId')">
                <label for="Resource-timeZoneId" id="label-Resource-timeZoneId"><span class="text-danger">*</span>Time Zone</label>
                <select id="Resource-timeZoneId" formControlName="timeZoneId" class="form-select resource-select" [disabled]="!userIsSchedulerResourceWriter()">
                    <option [ngValue]="null">Select Time Zone</option>
                    <option *ngFor="let timeZone of timeZones$ | async" [ngValue]="timeZone.id">{{timeZone.name}}</option>
                </select>
                <div *ngIf="resourceForm.get('timeZoneId')?.invalid && resourceForm.get('timeZoneId')?.touched" class="text-danger">
                    Time Zone is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('targetWeeklyWorkHours')">
                <label for="Resource-targetWeeklyWorkHours" id="label-Resource-targetWeeklyWorkHours">Target Weekly Work Hours</label>
                <input type="number" id="Resource-targetWeeklyWorkHours" formControlName="targetWeeklyWorkHours" placeholder="Enter Target Weekly Work Hours" class="form-control resource-input" [disabled]="!userIsSchedulerResourceWriter()" aria-labelledby="label-targetWeeklyWorkHours" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('notes')">
                <label for="Resource-notes" id="label-Resource-notes">Notes</label>
                <textarea id="Resource-notes" formControlName="notes" placeholder="Enter Notes" class="form-control resource-input" [disabled]="!userIsSchedulerResourceWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('externalId')">
                <label for="Resource-externalId" id="label-Resource-externalId">External Id</label>
                <input type="text" id="Resource-externalId" formControlName="externalId" placeholder="Enter External Id" class="form-control resource-input" [disabled]="!userIsSchedulerResourceWriter()" aria-labelledby="label-externalId" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('color')">
                <label for="Resource-color" id="label-Resource-color">Color</label>
                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="Resource-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerResourceWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="resourceForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('attributes')">
                <label for="Resource-attributes" id="label-Resource-attributes">Attributes</label>
                <textarea id="Resource-attributes" formControlName="attributes" placeholder="Enter Attributes" class="form-control resource-input" [disabled]="!userIsSchedulerResourceWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('avatarFileName')">
                <label for="Resource-avatarFileName" id="label-Resource-avatarFileName">Avatar File Name</label>
                <input type="text" id="Resource-avatarFileName" formControlName="avatarFileName" placeholder="Enter Avatar File Name" class="form-control resource-input" [disabled]="!userIsSchedulerResourceWriter()" aria-labelledby="label-avatarFileName" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('avatarSize')">
                <label for="Resource-avatarSize" id="label-Resource-avatarSize">Avatar Size</label>
                <input type="number" id="Resource-avatarSize" formControlName="avatarSize" placeholder="Enter Avatar Size" class="form-control resource-input" [disabled]="!userIsSchedulerResourceWriter()" aria-labelledby="label-avatarSize" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('avatarData')">
                <label for="Resource-avatarData" id="label-Resource-avatarData">Avatar Data</label>
                <input type="text" id="Resource-avatarData" formControlName="avatarData" placeholder="Enter Avatar Data" class="form-control resource-input" [disabled]="!userIsSchedulerResourceWriter()" aria-labelledby="label-avatarData" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('avatarMimeType')">
                <label for="Resource-avatarMimeType" id="label-Resource-avatarMimeType">Avatar Mime Type</label>
                <input type="text" id="Resource-avatarMimeType" formControlName="avatarMimeType" placeholder="Enter Avatar Mime Type" class="form-control resource-input" [disabled]="!userIsSchedulerResourceWriter()" aria-labelledby="label-avatarMimeType" />
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="Resource-versionNumber" id="label-Resource-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="Resource-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control resource-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="Resource-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerResourceWriter()" />
                <label for="Resource-active" class="form-check-label" id="label-Resource-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="Resource-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerResourceWriter()" />
                <label for="Resource-deleted" class="form-check-label" id="label-Resource-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer resource-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Resource changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !resourceForm.valid || resourceForm.pristine  || userIsSchedulerResourceWriter() == false " ngbTooltip="Save the Resource changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Resource' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
