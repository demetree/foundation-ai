<div class="add-office-contact-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-office-contact-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Office Contact Change History" 
        *ngIf="userIsSchedulerOfficeContactChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #officeContactChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light office-contact-change-history-modal-header">
      <h5 class="modal-title mb-0" id="officeContactChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Office Contact Change History' : 'Add Office Contact Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body office-contact-change-history-modal-body">
      <form [formGroup]="officeContactChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('officeContactId')">
                <label for="OfficeContactChangeHistory-officeContactId" id="label-OfficeContactChangeHistory-officeContactId"><span class="text-danger">*</span>Office Contact</label>
                <select id="OfficeContactChangeHistory-officeContactId" formControlName="officeContactId" class="form-select office-contact-change-history-select" [disabled]="!userIsSchedulerOfficeContactChangeHistoryWriter()">
                    <option [ngValue]="null">Select Office Contact</option>
                    <option *ngFor="let officeContact of officeContacts$ | async" [ngValue]="officeContact.id">{{officeContact.id}}</option>
                </select>
                <div *ngIf="officeContactChangeHistoryForm.get('officeContactId')?.invalid && officeContactChangeHistoryForm.get('officeContactId')?.touched" class="text-danger">
                    Office Contact is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="OfficeContactChangeHistory-versionNumber" id="label-OfficeContactChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="OfficeContactChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control office-contact-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="OfficeContactChangeHistory-timeStamp" id="label-OfficeContactChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="OfficeContactChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control office-contact-change-history-input" [disabled]="!userIsSchedulerOfficeContactChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="officeContactChangeHistoryForm.get('timeStamp')?.invalid && officeContactChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="OfficeContactChangeHistory-userId" id="label-OfficeContactChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="OfficeContactChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control office-contact-change-history-input" [disabled]="!userIsSchedulerOfficeContactChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="officeContactChangeHistoryForm.get('userId')?.invalid && officeContactChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="OfficeContactChangeHistory-data" id="label-OfficeContactChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="OfficeContactChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control office-contact-change-history-input" [disabled]="!userIsSchedulerOfficeContactChangeHistoryWriter()"></textarea>
                <div *ngIf="officeContactChangeHistoryForm.get('data')?.invalid && officeContactChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer office-contact-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Office Contact Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !officeContactChangeHistoryForm.valid || officeContactChangeHistoryForm.pristine  || userIsSchedulerOfficeContactChangeHistoryWriter() == false " ngbTooltip="Save the Office Contact Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Office Contact Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
