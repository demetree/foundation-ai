<div class="container-fluid p-1 m-0 notification-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="notification-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Notification Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Notification Change History' : 'Add Notification Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerNotificationChangeHistoryReader()">
                <div class="col m-2 notification-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="notificationChangeHistoryForm" (ngSubmit)="submitForm()" class="notification-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('notificationId')">
                                <label for="NotificationChangeHistory-notificationId" id="label-NotificationChangeHistory-notificationId"><span class="text-danger">*</span>Notification</label>
                                <select id="NotificationChangeHistory-notificationId" formControlName="notificationId" class="form-select notification-change-history-select" [disabled]="!userIsSchedulerNotificationChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Notification</option>
                                    <option *ngFor="let notification of notifications$ | async" [ngValue]="notification.id">{{notification.message}}</option>
                                </select>
                                <div *ngIf="notificationChangeHistoryForm.get('notificationId')?.invalid && notificationChangeHistoryForm.get('notificationId')?.touched" class="text-danger">
                                    Notification is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="NotificationChangeHistory-versionNumber" id="label-NotificationChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="NotificationChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control notification-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="NotificationChangeHistory-timeStamp" id="label-NotificationChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="NotificationChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control notification-change-history-input" [disabled]="!userIsSchedulerNotificationChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="notificationChangeHistoryForm.get('timeStamp')?.invalid && notificationChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="NotificationChangeHistory-userId" id="label-NotificationChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="NotificationChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control notification-change-history-input" [disabled]="!userIsSchedulerNotificationChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="notificationChangeHistoryForm.get('userId')?.invalid && notificationChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="NotificationChangeHistory-data" id="label-NotificationChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="NotificationChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control notification-change-history-input" [disabled]="!userIsSchedulerNotificationChangeHistoryWriter()"></textarea>
                                <div *ngIf="notificationChangeHistoryForm.get('data')?.invalid && notificationChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="notification-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="notificationChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Notification Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !notificationChangeHistoryForm.valid || !notificationChangeHistoryForm.dirty || notificationChangeHistoryForm.pristine  || userIsSchedulerNotificationChangeHistoryWriter() == false " ngbTooltip="Save the Notification Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Notification Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
