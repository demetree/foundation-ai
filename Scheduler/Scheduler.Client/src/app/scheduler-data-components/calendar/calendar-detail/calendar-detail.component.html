<div class="container-fluid p-1 m-0 calendar-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="calendar-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Calendar</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Calendar' : 'Add Calendar'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerCalendarReader()">
                <div class="col m-2 calendar-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="calendarForm" (ngSubmit)="submitForm()" class="calendar-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="Calendar-name" id="label-Calendar-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="Calendar-name" formControlName="name" placeholder="Enter Name" class="form-control calendar-input" [disabled]="!userIsSchedulerCalendarWriter()" aria-labelledby="label-name" />
                                <div *ngIf="calendarForm.get('name')?.invalid && calendarForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="Calendar-description" id="label-Calendar-description">Description</label>
                                <textarea id="Calendar-description" formControlName="description" placeholder="Enter Description" class="form-control calendar-input" [disabled]="!userIsSchedulerCalendarWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('officeId')">
                                <label for="Calendar-officeId" id="label-Calendar-officeId">Office</label>
                                <select id="Calendar-officeId" formControlName="officeId" class="form-select calendar-select" [disabled]="!userIsSchedulerCalendarWriter()">
                                    <option [ngValue]="null">Select Office</option>
                                    <option *ngFor="let office of offices$ | async" [ngValue]="office.id">{{office.name}}</option>
                                </select>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isDefault')">
                                <input type="checkbox" id="Calendar-isDefault" formControlName="isDefault" class="form-check-input" [disabled]="!userIsSchedulerCalendarWriter()" />
                                <label for="Calendar-isDefault" class="form-check-label" id="label-Calendar-isDefault">Is Default</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('iconId')">
                                <label for="Calendar-iconId" id="label-Calendar-iconId">Icon</label>
                                <select id="Calendar-iconId" formControlName="iconId" class="form-select calendar-select" [disabled]="!userIsSchedulerCalendarWriter()">
                                    <option [ngValue]="null">Select Icon</option>
                                    <option *ngFor="let icon of icons$ | async" [ngValue]="icon.id">{{icon.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="Calendar-color" id="label-Calendar-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="Calendar-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerCalendarWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="calendarForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Calendar-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerCalendarWriter()" />
                                <label for="Calendar-active" class="form-check-label" id="label-Calendar-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Calendar-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerCalendarWriter()" />
                                <label for="Calendar-deleted" class="form-check-label" id="label-Calendar-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="Calendar-versionNumber" id="label-Calendar-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="Calendar-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control calendar-input" />
                            </div>
                            <div class="calendar-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="calendarForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Calendar">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !calendarForm.valid || !calendarForm.dirty || calendarForm.pristine  || userIsSchedulerCalendarWriter() == false " ngbTooltip="Save the Calendar changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Calendar' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerCalendarReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 calendar-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="calendarChangeHistoryService.userIsSchedulerCalendarChangeHistoryReader()">
                            <button ngbNavLink>Calendar Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (calendarData?.CalendarChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-calendar-change-history-table [queryParams]="{ calendarId: calendarData?.id }" [showAddButton]="true" [preSeededData]="{ calendarId: calendarData?.id }" [hiddenFields]="['calendarId']"></app-calendar-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="clientService.userIsSchedulerClientReader()">
                            <button ngbNavLink>Clients
                                <span class="badge bg-primary ms-2">
                                    {{ (calendarData?.ClientsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-client-table [queryParams]="{ calendarId: calendarData?.id }" [showAddButton]="true" [preSeededData]="{ calendarId: calendarData?.id }" [hiddenFields]="['calendarId']"></app-client-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="schedulingTargetService.userIsSchedulerSchedulingTargetReader()">
                            <button ngbNavLink>Scheduling Targets
                                <span class="badge bg-primary ms-2">
                                    {{ (calendarData?.SchedulingTargetsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduling-target-table [queryParams]="{ calendarId: calendarData?.id }" [showAddButton]="true" [preSeededData]="{ calendarId: calendarData?.id }" [hiddenFields]="['calendarId']"></app-scheduling-target-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="eventCalendarService.userIsSchedulerEventCalendarReader()">
                            <button ngbNavLink>Event Calendars
                                <span class="badge bg-primary ms-2">
                                    {{ (calendarData?.EventCalendarsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-event-calendar-table [queryParams]="{ calendarId: calendarData?.id }" [showAddButton]="true" [preSeededData]="{ calendarId: calendarData?.id }" [hiddenFields]="['calendarId']"></app-event-calendar-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
