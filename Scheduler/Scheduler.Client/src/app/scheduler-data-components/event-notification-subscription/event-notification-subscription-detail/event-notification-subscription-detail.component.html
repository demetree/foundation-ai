<div class="container-fluid p-1 m-0 event-notification-subscription-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="event-notification-subscription-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Event Notification Subscription</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Event Notification Subscription' : 'Add Event Notification Subscription'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerEventNotificationSubscriptionReader()">
                <div class="col m-2 event-notification-subscription-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="eventNotificationSubscriptionForm" (ngSubmit)="submitForm()" class="event-notification-subscription-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('resourceId')">
                                <label for="EventNotificationSubscription-resourceId" id="label-EventNotificationSubscription-resourceId">Resource</label>
                                <select id="EventNotificationSubscription-resourceId" formControlName="resourceId" class="form-select event-notification-subscription-select" [disabled]="!userIsSchedulerEventNotificationSubscriptionWriter()">
                                    <option [ngValue]="null">Select Resource</option>
                                    <option *ngFor="let resource of resources$ | async" [ngValue]="resource.id">{{[resource.name] | filterAndJoin}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('contactId')">
                                <label for="EventNotificationSubscription-contactId" id="label-EventNotificationSubscription-contactId">Contact</label>
                                <select id="EventNotificationSubscription-contactId" formControlName="contactId" class="form-select event-notification-subscription-select" [disabled]="!userIsSchedulerEventNotificationSubscriptionWriter()">
                                    <option [ngValue]="null">Select Contact</option>
                                    <option *ngFor="let contact of contacts$ | async" [ngValue]="contact.id">{{contact.firstName}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('eventNotificationTypeId')">
                                <label for="EventNotificationSubscription-eventNotificationTypeId" id="label-EventNotificationSubscription-eventNotificationTypeId"><span class="text-danger">*</span>Event Notification Type</label>
                                <select id="EventNotificationSubscription-eventNotificationTypeId" formControlName="eventNotificationTypeId" class="form-select event-notification-subscription-select" [disabled]="!userIsSchedulerEventNotificationSubscriptionWriter()">
                                    <option [ngValue]="null">Select Event Notification Type</option>
                                    <option *ngFor="let eventNotificationType of eventNotificationTypes$ | async" [ngValue]="eventNotificationType.id">{{eventNotificationType.name}}</option>
                                </select>
                                <div *ngIf="eventNotificationSubscriptionForm.get('eventNotificationTypeId')?.invalid && eventNotificationSubscriptionForm.get('eventNotificationTypeId')?.touched" class="text-danger">
                                    Event Notification Type is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('triggerEvents')">
                                <label for="EventNotificationSubscription-triggerEvents" id="label-EventNotificationSubscription-triggerEvents"><span class="text-danger">*</span>Trigger Events</label>
                                <input type="number" id="EventNotificationSubscription-triggerEvents" formControlName="triggerEvents" placeholder="Enter Trigger Events" class="form-control event-notification-subscription-input" [disabled]="!userIsSchedulerEventNotificationSubscriptionWriter()" aria-labelledby="label-triggerEvents" />
                                <div *ngIf="eventNotificationSubscriptionForm.get('triggerEvents')?.invalid && eventNotificationSubscriptionForm.get('triggerEvents')?.touched" class="text-danger">
                                    Trigger Events is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('recipientAddress')">
                                <label for="EventNotificationSubscription-recipientAddress" id="label-EventNotificationSubscription-recipientAddress"><span class="text-danger">*</span>Recipient Address</label>
                                <input type="text" id="EventNotificationSubscription-recipientAddress" formControlName="recipientAddress" placeholder="Enter Recipient Address" class="form-control event-notification-subscription-input" [disabled]="!userIsSchedulerEventNotificationSubscriptionWriter()" aria-labelledby="label-recipientAddress" />
                                <div *ngIf="eventNotificationSubscriptionForm.get('recipientAddress')?.invalid && eventNotificationSubscriptionForm.get('recipientAddress')?.touched" class="text-danger">
                                    Recipient Address is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="EventNotificationSubscription-versionNumber" id="label-EventNotificationSubscription-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="EventNotificationSubscription-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control event-notification-subscription-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="EventNotificationSubscription-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerEventNotificationSubscriptionWriter()" />
                                <label for="EventNotificationSubscription-active" class="form-check-label" id="label-EventNotificationSubscription-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="EventNotificationSubscription-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerEventNotificationSubscriptionWriter()" />
                                <label for="EventNotificationSubscription-deleted" class="form-check-label" id="label-EventNotificationSubscription-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="event-notification-subscription-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="eventNotificationSubscriptionForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Event Notification Subscription">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !eventNotificationSubscriptionForm.valid || !eventNotificationSubscriptionForm.dirty || eventNotificationSubscriptionForm.pristine  || userIsSchedulerEventNotificationSubscriptionWriter() == false " ngbTooltip="Save the Event Notification Subscription changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Event Notification Subscription' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerEventNotificationSubscriptionReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 event-notification-subscription-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="eventNotificationSubscriptionChangeHistoryService.userIsSchedulerEventNotificationSubscriptionChangeHistoryReader()">
                            <button ngbNavLink>Event Notification Subscription Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (eventNotificationSubscriptionData?.EventNotificationSubscriptionChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-event-notification-subscription-change-history-table [queryParams]="{ eventNotificationSubscriptionId: eventNotificationSubscriptionData?.id }" [showAddButton]="true" [preSeededData]="{ eventNotificationSubscriptionId: eventNotificationSubscriptionData?.id }" [hiddenFields]="['eventNotificationSubscriptionId']"></app-event-notification-subscription-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
