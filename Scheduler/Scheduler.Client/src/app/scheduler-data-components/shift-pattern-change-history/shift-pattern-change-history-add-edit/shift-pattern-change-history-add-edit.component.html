<div class="add-shift-pattern-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-shift-pattern-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Shift Pattern Change History" 
        *ngIf="userIsSchedulerShiftPatternChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #shiftPatternChangeHistoryModal let-modal>
   <div class="modal-header shift-pattern-change-history-modal-header">
      <h5 class="modal-title mb-0" id="shiftPatternChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Shift Pattern Change History' : 'Add Shift Pattern Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body shift-pattern-change-history-modal-body">
      <form [formGroup]="shiftPatternChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('shiftPatternId')">
                <label for="ShiftPatternChangeHistory-shiftPatternId" id="label-ShiftPatternChangeHistory-shiftPatternId"><span class="text-danger">*</span>Shift Pattern</label>
                <select id="ShiftPatternChangeHistory-shiftPatternId" formControlName="shiftPatternId" class="form-select shift-pattern-change-history-select" [disabled]="!userIsSchedulerShiftPatternChangeHistoryWriter()">
                    <option [ngValue]="null">Select Shift Pattern</option>
                    <option *ngFor="let shiftPattern of shiftPatterns$ | async" [ngValue]="shiftPattern.id">{{shiftPattern.name}}</option>
                </select>
                <div *ngIf="shiftPatternChangeHistoryForm.get('shiftPatternId')?.invalid && shiftPatternChangeHistoryForm.get('shiftPatternId')?.touched" class="text-danger">
                    Shift Pattern is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ShiftPatternChangeHistory-versionNumber" id="label-ShiftPatternChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ShiftPatternChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control shift-pattern-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="ShiftPatternChangeHistory-timeStamp" id="label-ShiftPatternChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="ShiftPatternChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control shift-pattern-change-history-input" [disabled]="!userIsSchedulerShiftPatternChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="shiftPatternChangeHistoryForm.get('timeStamp')?.invalid && shiftPatternChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="ShiftPatternChangeHistory-userId" id="label-ShiftPatternChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="ShiftPatternChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control shift-pattern-change-history-input" [disabled]="!userIsSchedulerShiftPatternChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="shiftPatternChangeHistoryForm.get('userId')?.invalid && shiftPatternChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="ShiftPatternChangeHistory-data" id="label-ShiftPatternChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="ShiftPatternChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control shift-pattern-change-history-input" [disabled]="!userIsSchedulerShiftPatternChangeHistoryWriter()"></textarea>
                <div *ngIf="shiftPatternChangeHistoryForm.get('data')?.invalid && shiftPatternChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer shift-pattern-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Shift Pattern Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !shiftPatternChangeHistoryForm.valid || shiftPatternChangeHistoryForm.pristine  || userIsSchedulerShiftPatternChangeHistoryWriter() == false " ngbTooltip="Save the Shift Pattern Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Shift Pattern Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
