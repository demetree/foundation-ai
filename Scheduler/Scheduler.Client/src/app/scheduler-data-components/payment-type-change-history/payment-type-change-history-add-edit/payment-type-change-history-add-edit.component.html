<div class="add-payment-type-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-payment-type-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Payment Type Change History" 
        *ngIf="userIsSchedulerPaymentTypeChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #paymentTypeChangeHistoryModal let-modal>
   <div class="modal-header payment-type-change-history-modal-header">
      <h5 class="modal-title mb-0" id="paymentTypeChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Payment Type Change History' : 'Add Payment Type Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body payment-type-change-history-modal-body">
      <form [formGroup]="paymentTypeChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('paymentTypeId')">
                <label for="PaymentTypeChangeHistory-paymentTypeId" id="label-PaymentTypeChangeHistory-paymentTypeId"><span class="text-danger">*</span>Payment Type</label>
                <select id="PaymentTypeChangeHistory-paymentTypeId" formControlName="paymentTypeId" class="form-select payment-type-change-history-select" [disabled]="!userIsSchedulerPaymentTypeChangeHistoryWriter()">
                    <option [ngValue]="null">Select Payment Type</option>
                    <option *ngFor="let paymentType of paymentTypes$ | async" [ngValue]="paymentType.id">{{paymentType.name}}</option>
                </select>
                <div *ngIf="paymentTypeChangeHistoryForm.get('paymentTypeId')?.invalid && paymentTypeChangeHistoryForm.get('paymentTypeId')?.touched" class="text-danger">
                    Payment Type is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="PaymentTypeChangeHistory-versionNumber" id="label-PaymentTypeChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="PaymentTypeChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control payment-type-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="PaymentTypeChangeHistory-timeStamp" id="label-PaymentTypeChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="PaymentTypeChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control payment-type-change-history-input" [disabled]="!userIsSchedulerPaymentTypeChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="paymentTypeChangeHistoryForm.get('timeStamp')?.invalid && paymentTypeChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="PaymentTypeChangeHistory-userId" id="label-PaymentTypeChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="PaymentTypeChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control payment-type-change-history-input" [disabled]="!userIsSchedulerPaymentTypeChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="paymentTypeChangeHistoryForm.get('userId')?.invalid && paymentTypeChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="PaymentTypeChangeHistory-data" id="label-PaymentTypeChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="PaymentTypeChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control payment-type-change-history-input" [disabled]="!userIsSchedulerPaymentTypeChangeHistoryWriter()"></textarea>
                <div *ngIf="paymentTypeChangeHistoryForm.get('data')?.invalid && paymentTypeChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer payment-type-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Payment Type Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !paymentTypeChangeHistoryForm.valid || paymentTypeChangeHistoryForm.pristine  || userIsSchedulerPaymentTypeChangeHistoryWriter() == false " ngbTooltip="Save the Payment Type Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Payment Type Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
