<div class="container-fluid p-1 m-0 fund-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="fund-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Fund</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Fund' : 'Add Fund'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerFundReader()">
                <div class="col m-2 fund-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="fundForm" (ngSubmit)="submitForm()" class="fund-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="Fund-name" id="label-Fund-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="Fund-name" formControlName="name" placeholder="Enter Name" class="form-control fund-input" [disabled]="!userIsSchedulerFundWriter()" aria-labelledby="label-name" />
                                <div *ngIf="fundForm.get('name')?.invalid && fundForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="Fund-description" id="label-Fund-description">Description</label>
                                <textarea id="Fund-description" formControlName="description" placeholder="Enter Description" class="form-control fund-input" [disabled]="!userIsSchedulerFundWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('glCode')">
                                <label for="Fund-glCode" id="label-Fund-glCode">Gl Code</label>
                                <input type="text" id="Fund-glCode" formControlName="glCode" placeholder="Enter Gl Code" class="form-control fund-input" [disabled]="!userIsSchedulerFundWriter()" aria-labelledby="label-glCode" />
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isRestricted')">
                                <input type="checkbox" id="Fund-isRestricted" formControlName="isRestricted" class="form-check-input" [disabled]="!userIsSchedulerFundWriter()" />
                                <label for="Fund-isRestricted" class="form-check-label" id="label-Fund-isRestricted"><span class="text-danger">*</span>Is Restricted</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('goalAmount')">
                                <label for="Fund-goalAmount" id="label-Fund-goalAmount">Goal Amount</label>
                                <input type="number" id="Fund-goalAmount" formControlName="goalAmount" placeholder="Enter Goal Amount" class="form-control fund-input" [disabled]="!userIsSchedulerFundWriter()" aria-labelledby="label-goalAmount" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('notes')">
                                <label for="Fund-notes" id="label-Fund-notes">Notes</label>
                                <textarea id="Fund-notes" formControlName="notes" placeholder="Enter Notes" class="form-control fund-input" [disabled]="!userIsSchedulerFundWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="Fund-sequence" id="label-Fund-sequence">Sequence</label>
                                <input type="number" id="Fund-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control fund-input" [disabled]="!userIsSchedulerFundWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('iconId')">
                                <label for="Fund-iconId" id="label-Fund-iconId">Icon</label>
                                <select id="Fund-iconId" formControlName="iconId" class="form-select fund-select" [disabled]="!userIsSchedulerFundWriter()">
                                    <option [ngValue]="null">Select Icon</option>
                                    <option *ngFor="let icon of icons$ | async" [ngValue]="icon.id">{{icon.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="Fund-color" id="label-Fund-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="Fund-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerFundWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="fundForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="Fund-versionNumber" id="label-Fund-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="Fund-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control fund-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Fund-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerFundWriter()" />
                                <label for="Fund-active" class="form-check-label" id="label-Fund-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Fund-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerFundWriter()" />
                                <label for="Fund-deleted" class="form-check-label" id="label-Fund-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="fund-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="fundForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Fund">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !fundForm.valid || !fundForm.dirty || fundForm.pristine || userIsSchedulerFundWriter() == false " ngbTooltip="Save Fund">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerFundReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 fund-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="fundChangeHistoryService.userIsSchedulerFundChangeHistoryReader()">
                            <button ngbNavLink>Fund Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (fundData?.FundChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-fund-change-history-table [queryParams]="{ fundId: fundData?.id }"></app-fund-change-history-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-fund-change-history-add-edit [preSeededData]="{ fundId: fundData?.id }" [hiddenFields]="['fundId']"></app-fund-change-history-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="pledgeService.userIsSchedulerPledgeReader()">
                            <button ngbNavLink>Pledges
                                <span class="badge bg-primary ms-2">
                                    {{ (fundData?.PledgesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-pledge-table [queryParams]="{ fundId: fundData?.id }"></app-pledge-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-pledge-add-edit [preSeededData]="{ fundId: fundData?.id }" [hiddenFields]="['fundId']"></app-pledge-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="batchService.userIsSchedulerBatchReader()">
                            <button ngbNavLink>Batches Default Funds
                                <span class="badge bg-primary ms-2">
                                    {{ (fundData?.BatchDefaultFundsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-batch-table [queryParams]="{ defaultFundId: fundData?.id }"></app-batch-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-batch-add-edit [preSeededData]="{ defaultFundId: fundData?.id }" [hiddenFields]="['defaultFundId']"></app-batch-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="giftService.userIsSchedulerGiftReader()">
                            <button ngbNavLink>Gifts
                                <span class="badge bg-primary ms-2">
                                    {{ (fundData?.GiftsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-gift-table [queryParams]="{ fundId: fundData?.id }"></app-gift-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-gift-add-edit [preSeededData]="{ fundId: fundData?.id }" [hiddenFields]="['fundId']"></app-gift-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
