<div class="add-volunteer-group-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-volunteer-group-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Volunteer Group Change History" 
        *ngIf="userIsSchedulerVolunteerGroupChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #volunteerGroupChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light volunteer-group-change-history-modal-header">
      <h5 class="modal-title mb-0" id="volunteerGroupChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Volunteer Group Change History' : 'Add Volunteer Group Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body volunteer-group-change-history-modal-body">
      <form [formGroup]="volunteerGroupChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('volunteerGroupId')">
                <label for="VolunteerGroupChangeHistory-volunteerGroupId" id="label-VolunteerGroupChangeHistory-volunteerGroupId"><span class="text-danger">*</span>Volunteer Group</label>
                <select id="VolunteerGroupChangeHistory-volunteerGroupId" formControlName="volunteerGroupId" class="form-select volunteer-group-change-history-select" [disabled]="!userIsSchedulerVolunteerGroupChangeHistoryWriter()">
                    <option [ngValue]="null">Select Volunteer Group</option>
                    <option *ngFor="let volunteerGroup of volunteerGroups$ | async" [ngValue]="volunteerGroup.id">{{[volunteerGroup.name] | filterAndJoin}}</option>
                </select>
                <div *ngIf="volunteerGroupChangeHistoryForm.get('volunteerGroupId')?.invalid && volunteerGroupChangeHistoryForm.get('volunteerGroupId')?.touched" class="text-danger">
                    Volunteer Group is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="VolunteerGroupChangeHistory-versionNumber" id="label-VolunteerGroupChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="VolunteerGroupChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control volunteer-group-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="VolunteerGroupChangeHistory-timeStamp" id="label-VolunteerGroupChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="VolunteerGroupChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control volunteer-group-change-history-input" [disabled]="!userIsSchedulerVolunteerGroupChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="volunteerGroupChangeHistoryForm.get('timeStamp')?.invalid && volunteerGroupChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="VolunteerGroupChangeHistory-userId" id="label-VolunteerGroupChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="VolunteerGroupChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control volunteer-group-change-history-input" [disabled]="!userIsSchedulerVolunteerGroupChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="volunteerGroupChangeHistoryForm.get('userId')?.invalid && volunteerGroupChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="VolunteerGroupChangeHistory-data" id="label-VolunteerGroupChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="VolunteerGroupChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control volunteer-group-change-history-input" [disabled]="!userIsSchedulerVolunteerGroupChangeHistoryWriter()"></textarea>
                <div *ngIf="volunteerGroupChangeHistoryForm.get('data')?.invalid && volunteerGroupChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer volunteer-group-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Volunteer Group Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !volunteerGroupChangeHistoryForm.valid || volunteerGroupChangeHistoryForm.pristine  || userIsSchedulerVolunteerGroupChangeHistoryWriter() == false " ngbTooltip="Save the Volunteer Group Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Volunteer Group Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
