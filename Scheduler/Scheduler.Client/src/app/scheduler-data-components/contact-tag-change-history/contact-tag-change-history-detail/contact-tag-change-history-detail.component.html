<div class="container-fluid p-1 m-0 contact-tag-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="contact-tag-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Contact Tag Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Contact Tag Change History' : 'Add Contact Tag Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerContactTagChangeHistoryReader()">
                <div class="col m-2 contact-tag-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="contactTagChangeHistoryForm" (ngSubmit)="submitForm()" class="contact-tag-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('contactTagId')">
                                <label for="ContactTagChangeHistory-contactTagId" id="label-ContactTagChangeHistory-contactTagId"><span class="text-danger">*</span>Contact Tag</label>
                                <select id="ContactTagChangeHistory-contactTagId" formControlName="contactTagId" class="form-select contact-tag-change-history-select" [disabled]="!userIsSchedulerContactTagChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Contact Tag</option>
                                    <option *ngFor="let contactTag of contactTags$ | async" [ngValue]="contactTag.id">{{contactTag.id}}</option>
                                </select>
                                <div *ngIf="contactTagChangeHistoryForm.get('contactTagId')?.invalid && contactTagChangeHistoryForm.get('contactTagId')?.touched" class="text-danger">
                                    Contact Tag is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ContactTagChangeHistory-versionNumber" id="label-ContactTagChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ContactTagChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control contact-tag-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="ContactTagChangeHistory-timeStamp" id="label-ContactTagChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="ContactTagChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control contact-tag-change-history-input" [disabled]="!userIsSchedulerContactTagChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="contactTagChangeHistoryForm.get('timeStamp')?.invalid && contactTagChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="ContactTagChangeHistory-userId" id="label-ContactTagChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="ContactTagChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control contact-tag-change-history-input" [disabled]="!userIsSchedulerContactTagChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="contactTagChangeHistoryForm.get('userId')?.invalid && contactTagChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="ContactTagChangeHistory-data" id="label-ContactTagChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="ContactTagChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control contact-tag-change-history-input" [disabled]="!userIsSchedulerContactTagChangeHistoryWriter()"></textarea>
                                <div *ngIf="contactTagChangeHistoryForm.get('data')?.invalid && contactTagChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="contact-tag-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="contactTagChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Contact Tag Change History">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !contactTagChangeHistoryForm.valid || !contactTagChangeHistoryForm.dirty || contactTagChangeHistoryForm.pristine || userIsSchedulerContactTagChangeHistoryWriter() == false " ngbTooltip="Save Contact Tag Change History">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
