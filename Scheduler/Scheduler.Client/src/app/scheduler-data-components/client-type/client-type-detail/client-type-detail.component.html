<div class="container-fluid p-1 m-0 client-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="client-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Client Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Client Type' : 'Add Client Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerClientTypeReader()">
                <div class="col m-2 client-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="clientTypeForm" (ngSubmit)="submitForm()" class="client-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="ClientType-name" id="label-ClientType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="ClientType-name" formControlName="name" placeholder="Enter Name" class="form-control client-type-input" [disabled]="!userIsSchedulerClientTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="clientTypeForm.get('name')?.invalid && clientTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="ClientType-description" id="label-ClientType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="ClientType-description" formControlName="description" placeholder="Enter Description" class="form-control client-type-input" [disabled]="!userIsSchedulerClientTypeWriter()"></textarea>
                                <div *ngIf="clientTypeForm.get('description')?.invalid && clientTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="ClientType-sequence" id="label-ClientType-sequence">Sequence</label>
                                <input type="number" id="ClientType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control client-type-input" [disabled]="!userIsSchedulerClientTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('iconId')">
                                <label for="ClientType-iconId" id="label-ClientType-iconId">Icon</label>
                                <select id="ClientType-iconId" formControlName="iconId" class="form-select client-type-select" [disabled]="!userIsSchedulerClientTypeWriter()">
                                    <option [ngValue]="null">Select Icon</option>
                                    <option *ngFor="let icon of icons$ | async" [ngValue]="icon.id">{{icon.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="ClientType-color" id="label-ClientType-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="ClientType-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerClientTypeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="clientTypeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ClientType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerClientTypeWriter()" />
                                <label for="ClientType-active" class="form-check-label" id="label-ClientType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ClientType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerClientTypeWriter()" />
                                <label for="ClientType-deleted" class="form-check-label" id="label-ClientType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="client-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="clientTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Client Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !clientTypeForm.valid || !clientTypeForm.dirty || clientTypeForm.pristine  || userIsSchedulerClientTypeWriter() == false " ngbTooltip="Save the Client Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Client Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerClientTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 client-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="clientService.userIsSchedulerClientReader()">
                            <button ngbNavLink>Clients
                                <span class="badge bg-primary ms-2">
                                    {{ (clientTypeData?.ClientsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-client-table [queryParams]="{ clientTypeId: clientTypeData?.id }" [showAddButton]="true" [preSeededData]="{ clientTypeId: clientTypeData?.id }" [hiddenFields]="['clientTypeId']"></app-client-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
