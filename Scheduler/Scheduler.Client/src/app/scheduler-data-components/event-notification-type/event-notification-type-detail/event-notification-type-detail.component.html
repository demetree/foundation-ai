<div class="container-fluid p-1 m-0 event-notification-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="event-notification-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Event Notification Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Event Notification Type' : 'Add Event Notification Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerEventNotificationTypeReader()">
                <div class="col m-2 event-notification-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="eventNotificationTypeForm" (ngSubmit)="submitForm()" class="event-notification-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="EventNotificationType-name" id="label-EventNotificationType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="EventNotificationType-name" formControlName="name" placeholder="Enter Name" class="form-control event-notification-type-input" [disabled]="!userIsSchedulerEventNotificationTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="eventNotificationTypeForm.get('name')?.invalid && eventNotificationTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="EventNotificationType-description" id="label-EventNotificationType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="EventNotificationType-description" formControlName="description" placeholder="Enter Description" class="form-control event-notification-type-input" [disabled]="!userIsSchedulerEventNotificationTypeWriter()"></textarea>
                                <div *ngIf="eventNotificationTypeForm.get('description')?.invalid && eventNotificationTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="EventNotificationType-sequence" id="label-EventNotificationType-sequence">Sequence</label>
                                <input type="number" id="EventNotificationType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control event-notification-type-input" [disabled]="!userIsSchedulerEventNotificationTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="EventNotificationType-color" id="label-EventNotificationType-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="EventNotificationType-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerEventNotificationTypeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="eventNotificationTypeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="EventNotificationType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerEventNotificationTypeWriter()" />
                                <label for="EventNotificationType-active" class="form-check-label" id="label-EventNotificationType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="EventNotificationType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerEventNotificationTypeWriter()" />
                                <label for="EventNotificationType-deleted" class="form-check-label" id="label-EventNotificationType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="event-notification-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="eventNotificationTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Event Notification Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !eventNotificationTypeForm.valid || !eventNotificationTypeForm.dirty || eventNotificationTypeForm.pristine  || userIsSchedulerEventNotificationTypeWriter() == false " ngbTooltip="Save the Event Notification Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Event Notification Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerEventNotificationTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 event-notification-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="eventNotificationSubscriptionService.userIsSchedulerEventNotificationSubscriptionReader()">
                            <button ngbNavLink>Event Notification Subscriptions
                                <span class="badge bg-primary ms-2">
                                    {{ (eventNotificationTypeData?.EventNotificationSubscriptionsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-event-notification-subscription-table [queryParams]="{ eventNotificationTypeId: eventNotificationTypeData?.id }" [showAddButton]="true" [preSeededData]="{ eventNotificationTypeId: eventNotificationTypeData?.id }" [hiddenFields]="['eventNotificationTypeId']"></app-event-notification-subscription-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
