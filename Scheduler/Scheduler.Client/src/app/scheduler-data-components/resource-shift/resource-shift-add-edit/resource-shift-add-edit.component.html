<div class="add-resource-shift" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-resource-shift me-2"
        (click)="openModal()"
        ngbTooltip="Add Resource Shift" 
        *ngIf="userIsSchedulerResourceShiftWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #resourceShiftModal let-modal>
   <div class="modal-header bg-dark text-light resource-shift-modal-header">
      <h5 class="modal-title mb-0" id="resourceShiftModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Resource Shift' : 'Add Resource Shift' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body resource-shift-modal-body">
      <form [formGroup]="resourceShiftForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('resourceId')">
                <label for="ResourceShift-resourceId" id="label-ResourceShift-resourceId"><span class="text-danger">*</span>Resource</label>
                <select id="ResourceShift-resourceId" formControlName="resourceId" class="form-select resource-shift-select" [disabled]="!userIsSchedulerResourceShiftWriter()">
                    <option [ngValue]="null">Select Resource</option>
                    <option *ngFor="let resource of resources$ | async" [ngValue]="resource.id">{{[resource.name] | filterAndJoin}}</option>
                </select>
                <div *ngIf="resourceShiftForm.get('resourceId')?.invalid && resourceShiftForm.get('resourceId')?.touched" class="text-danger">
                    Resource is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('dayOfWeek')">
                <label for="ResourceShift-dayOfWeek" id="label-ResourceShift-dayOfWeek"><span class="text-danger">*</span>Day Of Week</label>
                <input type="number" id="ResourceShift-dayOfWeek" formControlName="dayOfWeek" placeholder="Enter Day Of Week" class="form-control resource-shift-input" [disabled]="!userIsSchedulerResourceShiftWriter()" aria-labelledby="label-dayOfWeek" />
                <div *ngIf="resourceShiftForm.get('dayOfWeek')?.invalid && resourceShiftForm.get('dayOfWeek')?.touched" class="text-danger">
                    Day Of Week is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeZoneId')">
                <label for="ResourceShift-timeZoneId" id="label-ResourceShift-timeZoneId">Time Zone</label>
                <select id="ResourceShift-timeZoneId" formControlName="timeZoneId" class="form-select resource-shift-select" [disabled]="!userIsSchedulerResourceShiftWriter()">
                    <option [ngValue]="null">Select Time Zone</option>
                    <option *ngFor="let timeZone of timeZones$ | async" [ngValue]="timeZone.id">{{timeZone.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('startTime')">
                <label for="ResourceShift-startTime" id="label-ResourceShift-startTime"><span class="text-danger">*</span>Start Time</label>
                <input type="text" id="ResourceShift-startTime" formControlName="startTime" placeholder="Enter Start Time" class="form-control resource-shift-input" [disabled]="!userIsSchedulerResourceShiftWriter()" aria-labelledby="label-startTime" />
                <div *ngIf="resourceShiftForm.get('startTime')?.invalid && resourceShiftForm.get('startTime')?.touched" class="text-danger">
                    Start Time is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('hours')">
                <label for="ResourceShift-hours" id="label-ResourceShift-hours"><span class="text-danger">*</span>Hours</label>
                <input type="number" id="ResourceShift-hours" formControlName="hours" placeholder="Enter Hours" class="form-control resource-shift-input" [disabled]="!userIsSchedulerResourceShiftWriter()" aria-labelledby="label-hours" />
                <div *ngIf="resourceShiftForm.get('hours')?.invalid && resourceShiftForm.get('hours')?.touched" class="text-danger">
                    Hours is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('label')">
                <label for="ResourceShift-label" id="label-ResourceShift-label">Label</label>
                <input type="text" id="ResourceShift-label" formControlName="label" placeholder="Enter Label" class="form-control resource-shift-input" [disabled]="!userIsSchedulerResourceShiftWriter()" aria-labelledby="label-label" />
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ResourceShift-versionNumber" id="label-ResourceShift-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ResourceShift-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control resource-shift-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ResourceShift-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerResourceShiftWriter()" />
                <label for="ResourceShift-active" class="form-check-label" id="label-ResourceShift-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ResourceShift-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerResourceShiftWriter()" />
                <label for="ResourceShift-deleted" class="form-check-label" id="label-ResourceShift-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer resource-shift-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Resource Shift changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !resourceShiftForm.valid || resourceShiftForm.pristine || !userIsSchedulerResourceShiftWriter()" ngbTooltip="Save the Resource Shift changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
