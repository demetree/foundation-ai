<div class="container-fluid p-1 m-0 contact-tag-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="contact-tag-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Contact Tag</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Contact Tag' : 'Add Contact Tag'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerContactTagReader()">
                <div class="col m-2 contact-tag-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="contactTagForm" (ngSubmit)="submitForm()" class="contact-tag-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('contactId')">
                                <label for="ContactTag-contactId" id="label-ContactTag-contactId"><span class="text-danger">*</span>Contact</label>
                                <select id="ContactTag-contactId" formControlName="contactId" class="form-select contact-tag-select" [disabled]="!userIsSchedulerContactTagWriter()">
                                    <option [ngValue]="null">Select Contact</option>
                                    <option *ngFor="let contact of contacts$ | async" [ngValue]="contact.id">{{contact.firstName}}</option>
                                </select>
                                <div *ngIf="contactTagForm.get('contactId')?.invalid && contactTagForm.get('contactId')?.touched" class="text-danger">
                                    Contact is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('tagId')">
                                <label for="ContactTag-tagId" id="label-ContactTag-tagId"><span class="text-danger">*</span>Tag</label>
                                <select id="ContactTag-tagId" formControlName="tagId" class="form-select contact-tag-select" [disabled]="!userIsSchedulerContactTagWriter()">
                                    <option [ngValue]="null">Select Tag</option>
                                    <option *ngFor="let tag of tags$ | async" [ngValue]="tag.id">{{tag.name}}</option>
                                </select>
                                <div *ngIf="contactTagForm.get('tagId')?.invalid && contactTagForm.get('tagId')?.touched" class="text-danger">
                                    Tag is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ContactTag-versionNumber" id="label-ContactTag-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ContactTag-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control contact-tag-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ContactTag-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerContactTagWriter()" />
                                <label for="ContactTag-active" class="form-check-label" id="label-ContactTag-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ContactTag-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerContactTagWriter()" />
                                <label for="ContactTag-deleted" class="form-check-label" id="label-ContactTag-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="contact-tag-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="contactTagForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Contact Tag">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !contactTagForm.valid || !contactTagForm.dirty || contactTagForm.pristine || userIsSchedulerContactTagWriter() == false " ngbTooltip="Save Contact Tag">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerContactTagReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 contact-tag-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="contactTagChangeHistoryService.userIsSchedulerContactTagChangeHistoryReader()">
                            <button ngbNavLink>Contact Tag Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (contactTagData?.ContactTagChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-contact-tag-change-history-table [queryParams]="{ contactTagId: contactTagData?.id }"></app-contact-tag-change-history-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-contact-tag-change-history-add-edit [preSeededData]="{ contactTagId: contactTagData?.id }" [hiddenFields]="['contactTagId']"></app-contact-tag-change-history-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
