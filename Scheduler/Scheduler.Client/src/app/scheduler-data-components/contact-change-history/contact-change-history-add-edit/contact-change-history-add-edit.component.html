<div class="add-contact-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-contact-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Contact Change History" 
        *ngIf="userIsSchedulerContactChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #contactChangeHistoryModal let-modal>
   <div class="modal-header contact-change-history-modal-header">
      <h5 class="modal-title mb-0" id="contactChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Contact Change History' : 'Add Contact Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body contact-change-history-modal-body">
      <form [formGroup]="contactChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('contactId')">
                <label for="ContactChangeHistory-contactId" id="label-ContactChangeHistory-contactId"><span class="text-danger">*</span>Contact</label>
                <select id="ContactChangeHistory-contactId" formControlName="contactId" class="form-select contact-change-history-select" [disabled]="!userIsSchedulerContactChangeHistoryWriter()">
                    <option [ngValue]="null">Select Contact</option>
                    <option *ngFor="let contact of contacts$ | async" [ngValue]="contact.id">{{contact.firstName}}</option>
                </select>
                <div *ngIf="contactChangeHistoryForm.get('contactId')?.invalid && contactChangeHistoryForm.get('contactId')?.touched" class="text-danger">
                    Contact is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ContactChangeHistory-versionNumber" id="label-ContactChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ContactChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control contact-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="ContactChangeHistory-timeStamp" id="label-ContactChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="ContactChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control contact-change-history-input" [disabled]="!userIsSchedulerContactChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="contactChangeHistoryForm.get('timeStamp')?.invalid && contactChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="ContactChangeHistory-userId" id="label-ContactChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="ContactChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control contact-change-history-input" [disabled]="!userIsSchedulerContactChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="contactChangeHistoryForm.get('userId')?.invalid && contactChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="ContactChangeHistory-data" id="label-ContactChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="ContactChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control contact-change-history-input" [disabled]="!userIsSchedulerContactChangeHistoryWriter()"></textarea>
                <div *ngIf="contactChangeHistoryForm.get('data')?.invalid && contactChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer contact-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Contact Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !contactChangeHistoryForm.valid || contactChangeHistoryForm.pristine  || userIsSchedulerContactChangeHistoryWriter() == false " ngbTooltip="Save the Contact Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Contact Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
