<div class="container-fluid p-1 m-0 scheduled-event-template-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="scheduled-event-template-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Scheduled Event Template</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Scheduled Event Template' : 'Add Scheduled Event Template'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerScheduledEventTemplateReader()">
                <div class="col m-2 scheduled-event-template-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="scheduledEventTemplateForm" (ngSubmit)="submitForm()" class="scheduled-event-template-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="ScheduledEventTemplate-name" id="label-ScheduledEventTemplate-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="ScheduledEventTemplate-name" formControlName="name" placeholder="Enter Name" class="form-control scheduled-event-template-input" [disabled]="!userIsSchedulerScheduledEventTemplateWriter()" aria-labelledby="label-name" />
                                <div *ngIf="scheduledEventTemplateForm.get('name')?.invalid && scheduledEventTemplateForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="ScheduledEventTemplate-description" id="label-ScheduledEventTemplate-description">Description</label>
                                <textarea id="ScheduledEventTemplate-description" formControlName="description" placeholder="Enter Description" class="form-control scheduled-event-template-input" [disabled]="!userIsSchedulerScheduledEventTemplateWriter()"></textarea>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('defaultAllDay')">
                                <input type="checkbox" id="ScheduledEventTemplate-defaultAllDay" formControlName="defaultAllDay" class="form-check-input" [disabled]="!userIsSchedulerScheduledEventTemplateWriter()" />
                                <label for="ScheduledEventTemplate-defaultAllDay" class="form-check-label" id="label-ScheduledEventTemplate-defaultAllDay"><span class="text-danger">*</span>Default All Day</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('defaultDurationMinutes')">
                                <label for="ScheduledEventTemplate-defaultDurationMinutes" id="label-ScheduledEventTemplate-defaultDurationMinutes"><span class="text-danger">*</span>Default Duration Minutes</label>
                                <input type="number" id="ScheduledEventTemplate-defaultDurationMinutes" formControlName="defaultDurationMinutes" placeholder="Enter Default Duration Minutes" class="form-control scheduled-event-template-input" [disabled]="!userIsSchedulerScheduledEventTemplateWriter()" aria-labelledby="label-defaultDurationMinutes" />
                                <div *ngIf="scheduledEventTemplateForm.get('defaultDurationMinutes')?.invalid && scheduledEventTemplateForm.get('defaultDurationMinutes')?.touched" class="text-danger">
                                    Default Duration Minutes is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('schedulingTargetTypeId')">
                                <label for="ScheduledEventTemplate-schedulingTargetTypeId" id="label-ScheduledEventTemplate-schedulingTargetTypeId">Scheduling Target Type</label>
                                <select id="ScheduledEventTemplate-schedulingTargetTypeId" formControlName="schedulingTargetTypeId" class="form-select scheduled-event-template-select" [disabled]="!userIsSchedulerScheduledEventTemplateWriter()">
                                    <option [ngValue]="null">Select Scheduling Target Type</option>
                                    <option *ngFor="let schedulingTargetType of schedulingTargetTypes$ | async" [ngValue]="schedulingTargetType.id">{{schedulingTargetType.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('priorityId')">
                                <label for="ScheduledEventTemplate-priorityId" id="label-ScheduledEventTemplate-priorityId">Priority</label>
                                <select id="ScheduledEventTemplate-priorityId" formControlName="priorityId" class="form-select scheduled-event-template-select" [disabled]="!userIsSchedulerScheduledEventTemplateWriter()">
                                    <option [ngValue]="null">Select Priority</option>
                                    <option *ngFor="let priority of priorities$ | async" [ngValue]="priority.id">{{priority.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('defaultLocationPattern')">
                                <label for="ScheduledEventTemplate-defaultLocationPattern" id="label-ScheduledEventTemplate-defaultLocationPattern">Default Location Pattern</label>
                                <input type="text" id="ScheduledEventTemplate-defaultLocationPattern" formControlName="defaultLocationPattern" placeholder="Enter Default Location Pattern" class="form-control scheduled-event-template-input" [disabled]="!userIsSchedulerScheduledEventTemplateWriter()" aria-labelledby="label-defaultLocationPattern" />
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ScheduledEventTemplate-versionNumber" id="label-ScheduledEventTemplate-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ScheduledEventTemplate-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control scheduled-event-template-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ScheduledEventTemplate-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerScheduledEventTemplateWriter()" />
                                <label for="ScheduledEventTemplate-active" class="form-check-label" id="label-ScheduledEventTemplate-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ScheduledEventTemplate-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerScheduledEventTemplateWriter()" />
                                <label for="ScheduledEventTemplate-deleted" class="form-check-label" id="label-ScheduledEventTemplate-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="scheduled-event-template-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="scheduledEventTemplateForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Scheduled Event Template">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !scheduledEventTemplateForm.valid || !scheduledEventTemplateForm.dirty || scheduledEventTemplateForm.pristine  || userIsSchedulerScheduledEventTemplateWriter() == false " ngbTooltip="Save the Scheduled Event Template changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Scheduled Event Template' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerScheduledEventTemplateReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 scheduled-event-template-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="scheduledEventTemplateChangeHistoryService.userIsSchedulerScheduledEventTemplateChangeHistoryReader()">
                            <button ngbNavLink>Scheduled Event Template Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (scheduledEventTemplateData?.ScheduledEventTemplateChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduled-event-template-change-history-table [queryParams]="{ scheduledEventTemplateId: scheduledEventTemplateData?.id }" [showAddButton]="true" [preSeededData]="{ scheduledEventTemplateId: scheduledEventTemplateData?.id }" [hiddenFields]="['scheduledEventTemplateId']"></app-scheduled-event-template-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="scheduledEventTemplateChargeService.userIsSchedulerScheduledEventTemplateChargeReader()">
                            <button ngbNavLink>Scheduled Event Template Charges
                                <span class="badge bg-primary ms-2">
                                    {{ (scheduledEventTemplateData?.ScheduledEventTemplateChargesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduled-event-template-charge-table [queryParams]="{ scheduledEventTemplateId: scheduledEventTemplateData?.id }" [showAddButton]="true" [preSeededData]="{ scheduledEventTemplateId: scheduledEventTemplateData?.id }" [hiddenFields]="['scheduledEventTemplateId']"></app-scheduled-event-template-charge-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="scheduledEventTemplateQualificationRequirementService.userIsSchedulerScheduledEventTemplateQualificationRequirementReader()">
                            <button ngbNavLink>Scheduled Event Template Qualification Requirements
                                <span class="badge bg-primary ms-2">
                                    {{ (scheduledEventTemplateData?.ScheduledEventTemplateQualificationRequirementsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduled-event-template-qualification-requirement-table [queryParams]="{ scheduledEventTemplateId: scheduledEventTemplateData?.id }" [showAddButton]="true" [preSeededData]="{ scheduledEventTemplateId: scheduledEventTemplateData?.id }" [hiddenFields]="['scheduledEventTemplateId']"></app-scheduled-event-template-qualification-requirement-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="scheduledEventService.userIsSchedulerScheduledEventReader()">
                            <button ngbNavLink>Scheduled Events
                                <span class="badge bg-primary ms-2">
                                    {{ (scheduledEventTemplateData?.ScheduledEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduled-event-table [queryParams]="{ scheduledEventTemplateId: scheduledEventTemplateData?.id }" [showAddButton]="true" [preSeededData]="{ scheduledEventTemplateId: scheduledEventTemplateData?.id }" [hiddenFields]="['scheduledEventTemplateId']"></app-scheduled-event-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
