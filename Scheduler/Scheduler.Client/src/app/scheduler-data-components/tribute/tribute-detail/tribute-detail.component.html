<div class="container-fluid p-1 m-0 tribute-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="tribute-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Tribute</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Tribute' : 'Add Tribute'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerTributeReader()">
                <div class="col m-2 tribute-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="tributeForm" (ngSubmit)="submitForm()" class="tribute-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="Tribute-name" id="label-Tribute-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="Tribute-name" formControlName="name" placeholder="Enter Name" class="form-control tribute-input" [disabled]="!userIsSchedulerTributeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="tributeForm.get('name')?.invalid && tributeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="Tribute-description" id="label-Tribute-description">Description</label>
                                <textarea id="Tribute-description" formControlName="description" placeholder="Enter Description" class="form-control tribute-input" [disabled]="!userIsSchedulerTributeWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('tributeTypeId')">
                                <label for="Tribute-tributeTypeId" id="label-Tribute-tributeTypeId">Tribute Type</label>
                                <select id="Tribute-tributeTypeId" formControlName="tributeTypeId" class="form-select tribute-select" [disabled]="!userIsSchedulerTributeWriter()">
                                    <option [ngValue]="null">Select Tribute Type</option>
                                    <option *ngFor="let tributeType of tributeTypes$ | async" [ngValue]="tributeType.id">{{tributeType.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('defaultAcknowledgeeId')">
                                <label for="Tribute-defaultAcknowledgeeId" id="label-Tribute-defaultAcknowledgeeId">Default Acknowledgee</label>
                                <select id="Tribute-defaultAcknowledgeeId" formControlName="defaultAcknowledgeeId" class="form-select tribute-select" [disabled]="!userIsSchedulerTributeWriter()">
                                    <option [ngValue]="null">Select Constituent</option>
                                    <option *ngFor="let constituent of constituents$ | async" [ngValue]="constituent.id">{{constituent.constituentNumber}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('startDate')">
                                <label for="Tribute-startDate" id="label-Tribute-startDate">Start Date</label>
                                <input type="date" id="Tribute-startDate" formControlName="startDate" placeholder="Enter Start Date" class="form-control tribute-input" [disabled]="!userIsSchedulerTributeWriter()" aria-labelledby="label-startDate" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('endDate')">
                                <label for="Tribute-endDate" id="label-Tribute-endDate">End Date</label>
                                <input type="date" id="Tribute-endDate" formControlName="endDate" placeholder="Enter End Date" class="form-control tribute-input" [disabled]="!userIsSchedulerTributeWriter()" aria-labelledby="label-endDate" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('iconId')">
                                <label for="Tribute-iconId" id="label-Tribute-iconId">Icon</label>
                                <select id="Tribute-iconId" formControlName="iconId" class="form-select tribute-select" [disabled]="!userIsSchedulerTributeWriter()">
                                    <option [ngValue]="null">Select Icon</option>
                                    <option *ngFor="let icon of icons$ | async" [ngValue]="icon.id">{{icon.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="Tribute-color" id="label-Tribute-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="Tribute-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerTributeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="tributeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('avatarFileName')">
                                <label for="Tribute-avatarFileName" id="label-Tribute-avatarFileName">Avatar File Name</label>
                                <input type="text" id="Tribute-avatarFileName" formControlName="avatarFileName" placeholder="Enter Avatar File Name" class="form-control tribute-input" [disabled]="!userIsSchedulerTributeWriter()" aria-labelledby="label-avatarFileName" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('avatarSize')">
                                <label for="Tribute-avatarSize" id="label-Tribute-avatarSize">Avatar Size</label>
                                <input type="number" id="Tribute-avatarSize" formControlName="avatarSize" placeholder="Enter Avatar Size" class="form-control tribute-input" [disabled]="!userIsSchedulerTributeWriter()" aria-labelledby="label-avatarSize" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('avatarData')">
                                <label for="Tribute-avatarData" id="label-Tribute-avatarData">Avatar Data</label>
                                <input type="text" id="Tribute-avatarData" formControlName="avatarData" placeholder="Enter Avatar Data" class="form-control tribute-input" [disabled]="!userIsSchedulerTributeWriter()" aria-labelledby="label-avatarData" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('avatarMimeType')">
                                <label for="Tribute-avatarMimeType" id="label-Tribute-avatarMimeType">Avatar Mime Type</label>
                                <input type="text" id="Tribute-avatarMimeType" formControlName="avatarMimeType" placeholder="Enter Avatar Mime Type" class="form-control tribute-input" [disabled]="!userIsSchedulerTributeWriter()" aria-labelledby="label-avatarMimeType" />
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="Tribute-versionNumber" id="label-Tribute-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="Tribute-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control tribute-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Tribute-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerTributeWriter()" />
                                <label for="Tribute-active" class="form-check-label" id="label-Tribute-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Tribute-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerTributeWriter()" />
                                <label for="Tribute-deleted" class="form-check-label" id="label-Tribute-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="tribute-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="tributeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Tribute">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !tributeForm.valid || !tributeForm.dirty || tributeForm.pristine  || userIsSchedulerTributeWriter() == false " ngbTooltip="Save the Tribute changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Tribute' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerTributeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 tribute-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="tributeChangeHistoryService.userIsSchedulerTributeChangeHistoryReader()">
                            <button ngbNavLink>Tribute Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (tributeData?.TributeChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-tribute-change-history-table [queryParams]="{ tributeId: tributeData?.id }" [showAddButton]="true" [preSeededData]="{ tributeId: tributeData?.id }" [hiddenFields]="['tributeId']"></app-tribute-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="giftService.userIsSchedulerGiftReader()">
                            <button ngbNavLink>Gifts
                                <span class="badge bg-primary ms-2">
                                    {{ (tributeData?.GiftsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-gift-table [queryParams]="{ tributeId: tributeData?.id }" [showAddButton]="true" [preSeededData]="{ tributeId: tributeData?.id }" [hiddenFields]="['tributeId']"></app-gift-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
