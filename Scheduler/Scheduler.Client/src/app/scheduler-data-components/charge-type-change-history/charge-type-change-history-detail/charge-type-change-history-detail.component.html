<div class="container-fluid p-1 m-0 charge-type-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="charge-type-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Charge Type Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Charge Type Change History' : 'Add Charge Type Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerChargeTypeChangeHistoryReader()">
                <div class="col m-2 charge-type-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="chargeTypeChangeHistoryForm" (ngSubmit)="submitForm()" class="charge-type-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('chargeTypeId')">
                                <label for="ChargeTypeChangeHistory-chargeTypeId" id="label-ChargeTypeChangeHistory-chargeTypeId"><span class="text-danger">*</span>Charge Type</label>
                                <select id="ChargeTypeChangeHistory-chargeTypeId" formControlName="chargeTypeId" class="form-select charge-type-change-history-select" [disabled]="!userIsSchedulerChargeTypeChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Charge Type</option>
                                    <option *ngFor="let chargeType of chargeTypes$ | async" [ngValue]="chargeType.id">{{chargeType.name}}</option>
                                </select>
                                <div *ngIf="chargeTypeChangeHistoryForm.get('chargeTypeId')?.invalid && chargeTypeChangeHistoryForm.get('chargeTypeId')?.touched" class="text-danger">
                                    Charge Type is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ChargeTypeChangeHistory-versionNumber" id="label-ChargeTypeChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ChargeTypeChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control charge-type-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="ChargeTypeChangeHistory-timeStamp" id="label-ChargeTypeChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="ChargeTypeChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control charge-type-change-history-input" [disabled]="!userIsSchedulerChargeTypeChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="chargeTypeChangeHistoryForm.get('timeStamp')?.invalid && chargeTypeChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="ChargeTypeChangeHistory-userId" id="label-ChargeTypeChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="ChargeTypeChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control charge-type-change-history-input" [disabled]="!userIsSchedulerChargeTypeChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="chargeTypeChangeHistoryForm.get('userId')?.invalid && chargeTypeChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="ChargeTypeChangeHistory-data" id="label-ChargeTypeChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="ChargeTypeChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control charge-type-change-history-input" [disabled]="!userIsSchedulerChargeTypeChangeHistoryWriter()"></textarea>
                                <div *ngIf="chargeTypeChangeHistoryForm.get('data')?.invalid && chargeTypeChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="charge-type-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="chargeTypeChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Charge Type Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !chargeTypeChangeHistoryForm.valid || !chargeTypeChangeHistoryForm.dirty || chargeTypeChangeHistoryForm.pristine  || userIsSchedulerChargeTypeChangeHistoryWriter() == false " ngbTooltip="Save the Charge Type Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Charge Type Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
