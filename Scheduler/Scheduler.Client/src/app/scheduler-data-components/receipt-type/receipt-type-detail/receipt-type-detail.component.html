<div class="container-fluid p-1 m-0 receipt-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="receipt-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Receipt Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Receipt Type' : 'Add Receipt Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerReceiptTypeReader()">
                <div class="col m-2 receipt-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="receiptTypeForm" (ngSubmit)="submitForm()" class="receipt-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="ReceiptType-name" id="label-ReceiptType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="ReceiptType-name" formControlName="name" placeholder="Enter Name" class="form-control receipt-type-input" [disabled]="!userIsSchedulerReceiptTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="receiptTypeForm.get('name')?.invalid && receiptTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="ReceiptType-description" id="label-ReceiptType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="ReceiptType-description" formControlName="description" placeholder="Enter Description" class="form-control receipt-type-input" [disabled]="!userIsSchedulerReceiptTypeWriter()"></textarea>
                                <div *ngIf="receiptTypeForm.get('description')?.invalid && receiptTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="ReceiptType-color" id="label-ReceiptType-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="ReceiptType-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerReceiptTypeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="receiptTypeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="ReceiptType-sequence" id="label-ReceiptType-sequence">Sequence</label>
                                <input type="number" id="ReceiptType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control receipt-type-input" [disabled]="!userIsSchedulerReceiptTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ReceiptType-versionNumber" id="label-ReceiptType-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ReceiptType-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control receipt-type-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ReceiptType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerReceiptTypeWriter()" />
                                <label for="ReceiptType-active" class="form-check-label" id="label-ReceiptType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ReceiptType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerReceiptTypeWriter()" />
                                <label for="ReceiptType-deleted" class="form-check-label" id="label-ReceiptType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="receipt-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="receiptTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Receipt Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !receiptTypeForm.valid || !receiptTypeForm.dirty || receiptTypeForm.pristine  || userIsSchedulerReceiptTypeWriter() == false " ngbTooltip="Save the Receipt Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Receipt Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerReceiptTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 receipt-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="receiptTypeChangeHistoryService.userIsSchedulerReceiptTypeChangeHistoryReader()">
                            <button ngbNavLink>Receipt Type Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (receiptTypeData?.ReceiptTypeChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-receipt-type-change-history-table [queryParams]="{ receiptTypeId: receiptTypeData?.id }" [showAddButton]="true" [preSeededData]="{ receiptTypeId: receiptTypeData?.id }" [hiddenFields]="['receiptTypeId']"></app-receipt-type-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="receiptService.userIsSchedulerReceiptReader()">
                            <button ngbNavLink>Receipts
                                <span class="badge bg-primary ms-2">
                                    {{ (receiptTypeData?.ReceiptsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-receipt-table [queryParams]="{ receiptTypeId: receiptTypeData?.id }" [showAddButton]="true" [preSeededData]="{ receiptTypeId: receiptTypeData?.id }" [hiddenFields]="['receiptTypeId']"></app-receipt-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="giftService.userIsSchedulerGiftReader()">
                            <button ngbNavLink>Gifts
                                <span class="badge bg-primary ms-2">
                                    {{ (receiptTypeData?.GiftsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-gift-table [queryParams]="{ receiptTypeId: receiptTypeData?.id }" [showAddButton]="true" [preSeededData]="{ receiptTypeId: receiptTypeData?.id }" [hiddenFields]="['receiptTypeId']"></app-gift-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
