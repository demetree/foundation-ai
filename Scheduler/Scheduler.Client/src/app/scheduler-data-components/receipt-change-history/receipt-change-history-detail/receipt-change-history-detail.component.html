<div class="container-fluid p-1 m-0 receipt-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="receipt-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Receipt Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Receipt Change History' : 'Add Receipt Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerReceiptChangeHistoryReader()">
                <div class="col m-2 receipt-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="receiptChangeHistoryForm" (ngSubmit)="submitForm()" class="receipt-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('receiptId')">
                                <label for="ReceiptChangeHistory-receiptId" id="label-ReceiptChangeHistory-receiptId"><span class="text-danger">*</span>Receipt</label>
                                <select id="ReceiptChangeHistory-receiptId" formControlName="receiptId" class="form-select receipt-change-history-select" [disabled]="!userIsSchedulerReceiptChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Receipt</option>
                                    <option *ngFor="let receipt of receipts$ | async" [ngValue]="receipt.id">{{[receipt.receiptNumber] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="receiptChangeHistoryForm.get('receiptId')?.invalid && receiptChangeHistoryForm.get('receiptId')?.touched" class="text-danger">
                                    Receipt is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ReceiptChangeHistory-versionNumber" id="label-ReceiptChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ReceiptChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control receipt-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="ReceiptChangeHistory-timeStamp" id="label-ReceiptChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="ReceiptChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control receipt-change-history-input" [disabled]="!userIsSchedulerReceiptChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="receiptChangeHistoryForm.get('timeStamp')?.invalid && receiptChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="ReceiptChangeHistory-userId" id="label-ReceiptChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="ReceiptChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control receipt-change-history-input" [disabled]="!userIsSchedulerReceiptChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="receiptChangeHistoryForm.get('userId')?.invalid && receiptChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="ReceiptChangeHistory-data" id="label-ReceiptChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="ReceiptChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control receipt-change-history-input" [disabled]="!userIsSchedulerReceiptChangeHistoryWriter()"></textarea>
                                <div *ngIf="receiptChangeHistoryForm.get('data')?.invalid && receiptChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="receipt-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="receiptChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Receipt Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !receiptChangeHistoryForm.valid || !receiptChangeHistoryForm.dirty || receiptChangeHistoryForm.pristine  || userIsSchedulerReceiptChangeHistoryWriter() == false " ngbTooltip="Save the Receipt Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Receipt Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
