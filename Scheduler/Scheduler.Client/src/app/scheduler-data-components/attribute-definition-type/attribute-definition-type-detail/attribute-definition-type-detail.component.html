<div class="container-fluid p-1 m-0 attribute-definition-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="attribute-definition-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Attribute Definition Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Attribute Definition Type' : 'Add Attribute Definition Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerAttributeDefinitionTypeReader()">
                <div class="col m-2 attribute-definition-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="attributeDefinitionTypeForm" (ngSubmit)="submitForm()" class="attribute-definition-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="AttributeDefinitionType-name" id="label-AttributeDefinitionType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="AttributeDefinitionType-name" formControlName="name" placeholder="Enter Name" class="form-control attribute-definition-type-input" [disabled]="!userIsSchedulerAttributeDefinitionTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="attributeDefinitionTypeForm.get('name')?.invalid && attributeDefinitionTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="AttributeDefinitionType-description" id="label-AttributeDefinitionType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="AttributeDefinitionType-description" formControlName="description" placeholder="Enter Description" class="form-control attribute-definition-type-input" [disabled]="!userIsSchedulerAttributeDefinitionTypeWriter()"></textarea>
                                <div *ngIf="attributeDefinitionTypeForm.get('description')?.invalid && attributeDefinitionTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="AttributeDefinitionType-sequence" id="label-AttributeDefinitionType-sequence">Sequence</label>
                                <input type="number" id="AttributeDefinitionType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control attribute-definition-type-input" [disabled]="!userIsSchedulerAttributeDefinitionTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="AttributeDefinitionType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerAttributeDefinitionTypeWriter()" />
                                <label for="AttributeDefinitionType-active" class="form-check-label" id="label-AttributeDefinitionType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="AttributeDefinitionType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerAttributeDefinitionTypeWriter()" />
                                <label for="AttributeDefinitionType-deleted" class="form-check-label" id="label-AttributeDefinitionType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="attribute-definition-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="attributeDefinitionTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Attribute Definition Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !attributeDefinitionTypeForm.valid || !attributeDefinitionTypeForm.dirty || attributeDefinitionTypeForm.pristine  || userIsSchedulerAttributeDefinitionTypeWriter() == false " ngbTooltip="Save the Attribute Definition Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Attribute Definition Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerAttributeDefinitionTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 attribute-definition-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="attributeDefinitionService.userIsSchedulerAttributeDefinitionReader()">
                            <button ngbNavLink>Attribute Definitions
                                <span class="badge bg-primary ms-2">
                                    {{ (attributeDefinitionTypeData?.AttributeDefinitionsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-attribute-definition-table [queryParams]="{ attributeDefinitionTypeId: attributeDefinitionTypeData?.id }" [showAddButton]="true" [preSeededData]="{ attributeDefinitionTypeId: attributeDefinitionTypeData?.id }" [hiddenFields]="['attributeDefinitionTypeId']"></app-attribute-definition-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
