<div class="add-attribute-definition-type" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-attribute-definition-type me-2"
        (click)="openModal()"
        ngbTooltip="Add Attribute Definition Type" 
        *ngIf="userIsSchedulerAttributeDefinitionTypeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #attributeDefinitionTypeModal let-modal>
   <div class="modal-header bg-dark text-light attribute-definition-type-modal-header">
      <h5 class="modal-title mb-0" id="attributeDefinitionTypeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Attribute Definition Type' : 'Add Attribute Definition Type' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body attribute-definition-type-modal-body">
      <form [formGroup]="attributeDefinitionTypeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="AttributeDefinitionType-name" id="label-AttributeDefinitionType-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="AttributeDefinitionType-name" formControlName="name" placeholder="Enter Name" class="form-control attribute-definition-type-input" [disabled]="!userIsSchedulerAttributeDefinitionTypeWriter()" aria-labelledby="label-name" />
                <div *ngIf="attributeDefinitionTypeForm.get('name')?.invalid && attributeDefinitionTypeForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="AttributeDefinitionType-description" id="label-AttributeDefinitionType-description"><span class="text-danger">*</span>Description</label>
                <textarea id="AttributeDefinitionType-description" formControlName="description" placeholder="Enter Description" class="form-control attribute-definition-type-input" [disabled]="!userIsSchedulerAttributeDefinitionTypeWriter()"></textarea>
                <div *ngIf="attributeDefinitionTypeForm.get('description')?.invalid && attributeDefinitionTypeForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="AttributeDefinitionType-sequence" id="label-AttributeDefinitionType-sequence">Sequence</label>
                <input type="number" id="AttributeDefinitionType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control attribute-definition-type-input" [disabled]="!userIsSchedulerAttributeDefinitionTypeWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="AttributeDefinitionType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerAttributeDefinitionTypeWriter()" />
                <label for="AttributeDefinitionType-active" class="form-check-label" id="label-AttributeDefinitionType-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="AttributeDefinitionType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerAttributeDefinitionTypeWriter()" />
                <label for="AttributeDefinitionType-deleted" class="form-check-label" id="label-AttributeDefinitionType-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer attribute-definition-type-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Attribute Definition Type changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !attributeDefinitionTypeForm.valid || attributeDefinitionTypeForm.pristine  || userIsSchedulerAttributeDefinitionTypeWriter() == false " ngbTooltip="Save the Attribute Definition Type changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Attribute Definition Type' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
