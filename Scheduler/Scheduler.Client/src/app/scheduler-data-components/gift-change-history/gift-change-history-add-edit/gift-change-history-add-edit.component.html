<div class="add-gift-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-gift-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Gift Change History" 
        *ngIf="userIsSchedulerGiftChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #giftChangeHistoryModal let-modal>
   <div class="modal-header gift-change-history-modal-header">
      <h5 class="modal-title mb-0" id="giftChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Gift Change History' : 'Add Gift Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body gift-change-history-modal-body">
      <form [formGroup]="giftChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('giftId')">
                <label for="GiftChangeHistory-giftId" id="label-GiftChangeHistory-giftId"><span class="text-danger">*</span>Gift</label>
                <select id="GiftChangeHistory-giftId" formControlName="giftId" class="form-select gift-change-history-select" [disabled]="!userIsSchedulerGiftChangeHistoryWriter()">
                    <option [ngValue]="null">Select Gift</option>
                    <option *ngFor="let gift of gifts$ | async" [ngValue]="gift.id">{{gift.referenceNumber}}</option>
                </select>
                <div *ngIf="giftChangeHistoryForm.get('giftId')?.invalid && giftChangeHistoryForm.get('giftId')?.touched" class="text-danger">
                    Gift is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="GiftChangeHistory-versionNumber" id="label-GiftChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="GiftChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control gift-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="GiftChangeHistory-timeStamp" id="label-GiftChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="GiftChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control gift-change-history-input" [disabled]="!userIsSchedulerGiftChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="giftChangeHistoryForm.get('timeStamp')?.invalid && giftChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="GiftChangeHistory-userId" id="label-GiftChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="GiftChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control gift-change-history-input" [disabled]="!userIsSchedulerGiftChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="giftChangeHistoryForm.get('userId')?.invalid && giftChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="GiftChangeHistory-data" id="label-GiftChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="GiftChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control gift-change-history-input" [disabled]="!userIsSchedulerGiftChangeHistoryWriter()"></textarea>
                <div *ngIf="giftChangeHistoryForm.get('data')?.invalid && giftChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer gift-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Gift Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !giftChangeHistoryForm.valid || giftChangeHistoryForm.pristine  || userIsSchedulerGiftChangeHistoryWriter() == false " ngbTooltip="Save the Gift Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Gift Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
