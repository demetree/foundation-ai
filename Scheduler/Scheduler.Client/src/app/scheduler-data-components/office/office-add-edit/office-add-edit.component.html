<div class="add-office" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-office me-2"
        (click)="openModal()"
        ngbTooltip="Add Office" 
        *ngIf="userIsSchedulerOfficeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #officeModal let-modal>
   <div class="modal-header bg-dark text-light office-modal-header">
      <h5 class="modal-title mb-0" id="officeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Office' : 'Add Office' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body office-modal-body">
      <form [formGroup]="officeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="Office-name" id="label-Office-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="Office-name" formControlName="name" placeholder="Enter Name" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-name" />
                <div *ngIf="officeForm.get('name')?.invalid && officeForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="Office-description" id="label-Office-description">Description</label>
                <textarea id="Office-description" formControlName="description" placeholder="Enter Description" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('officeTypeId')">
                <label for="Office-officeTypeId" id="label-Office-officeTypeId"><span class="text-danger">*</span>Office Type</label>
                <select id="Office-officeTypeId" formControlName="officeTypeId" class="form-select office-select" [disabled]="!userIsSchedulerOfficeWriter()">
                    <option [ngValue]="null">Select Office Type</option>
                    <option *ngFor="let officeType of officeTypes$ | async" [ngValue]="officeType.id">{{officeType.name}}</option>
                </select>
                <div *ngIf="officeForm.get('officeTypeId')?.invalid && officeForm.get('officeTypeId')?.touched" class="text-danger">
                    Office Type is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeZoneId')">
                <label for="Office-timeZoneId" id="label-Office-timeZoneId"><span class="text-danger">*</span>Time Zone</label>
                <select id="Office-timeZoneId" formControlName="timeZoneId" class="form-select office-select" [disabled]="!userIsSchedulerOfficeWriter()">
                    <option [ngValue]="null">Select Time Zone</option>
                    <option *ngFor="let timeZone of timeZones$ | async" [ngValue]="timeZone.id">{{timeZone.name}}</option>
                </select>
                <div *ngIf="officeForm.get('timeZoneId')?.invalid && officeForm.get('timeZoneId')?.touched" class="text-danger">
                    Time Zone is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('currencyId')">
                <label for="Office-currencyId" id="label-Office-currencyId"><span class="text-danger">*</span>Currency</label>
                <select id="Office-currencyId" formControlName="currencyId" class="form-select office-select" [disabled]="!userIsSchedulerOfficeWriter()">
                    <option [ngValue]="null">Select Currency</option>
                    <option *ngFor="let currency of currencies$ | async" [ngValue]="currency.id">{{currency.name}}</option>
                </select>
                <div *ngIf="officeForm.get('currencyId')?.invalid && officeForm.get('currencyId')?.touched" class="text-danger">
                    Currency is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('addressLine1')">
                <label for="Office-addressLine1" id="label-Office-addressLine1"><span class="text-danger">*</span>Address Line 1</label>
                <input type="text" id="Office-addressLine1" formControlName="addressLine1" placeholder="Enter Address Line 1" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-addressLine1" />
                <div *ngIf="officeForm.get('addressLine1')?.invalid && officeForm.get('addressLine1')?.touched" class="text-danger">
                    Address Line 1 is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('addressLine2')">
                <label for="Office-addressLine2" id="label-Office-addressLine2">Address Line 2</label>
                <input type="text" id="Office-addressLine2" formControlName="addressLine2" placeholder="Enter Address Line 2" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-addressLine2" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('city')">
                <label for="Office-city" id="label-Office-city"><span class="text-danger">*</span>City</label>
                <input type="text" id="Office-city" formControlName="city" placeholder="Enter City" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-city" />
                <div *ngIf="officeForm.get('city')?.invalid && officeForm.get('city')?.touched" class="text-danger">
                    City is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('postalCode')">
                <label for="Office-postalCode" id="label-Office-postalCode">Postal Code</label>
                <input type="text" id="Office-postalCode" formControlName="postalCode" placeholder="Enter Postal Code" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-postalCode" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('stateProvinceId')">
                <label for="Office-stateProvinceId" id="label-Office-stateProvinceId"><span class="text-danger">*</span>State Province</label>
                <select id="Office-stateProvinceId" formControlName="stateProvinceId" class="form-select office-select" [disabled]="!userIsSchedulerOfficeWriter()">
                    <option [ngValue]="null">Select State Province</option>
                    <option *ngFor="let stateProvince of stateProvinces$ | async" [ngValue]="stateProvince.id">{{stateProvince.name}}</option>
                </select>
                <div *ngIf="officeForm.get('stateProvinceId')?.invalid && officeForm.get('stateProvinceId')?.touched" class="text-danger">
                    State Province is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('countryId')">
                <label for="Office-countryId" id="label-Office-countryId"><span class="text-danger">*</span>Country</label>
                <select id="Office-countryId" formControlName="countryId" class="form-select office-select" [disabled]="!userIsSchedulerOfficeWriter()">
                    <option [ngValue]="null">Select Country</option>
                    <option *ngFor="let country of countries$ | async" [ngValue]="country.id">{{country.name}}</option>
                </select>
                <div *ngIf="officeForm.get('countryId')?.invalid && officeForm.get('countryId')?.touched" class="text-danger">
                    Country is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('phone')">
                <label for="Office-phone" id="label-Office-phone" *ngIf="isEditMode"><a href="tel:{{officeSubmitData?.phone}}" ngbTooltip="Phone {{officeSubmitData?.phone}}">Phone</a></label>
                <label for="Office-phone" id="label-Office-phone" *ngIf="!isEditMode">Phone</label>
                <input type="text" id="Office-phone" formControlName="phone" placeholder="Enter Phone" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-phone" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('email')">
                <label for="Office-email" id="label-Office-email" *ngIf="isEditMode"><a href="mailto:{{officeSubmitData?.email}}" ngbTooltip="Send Email to {{officeSubmitData?.email}}">Email</a></label>
                <label for="Office-email" id="label-Office-email" *ngIf="!isEditMode">Email</label>
                <input type="text" id="Office-email" formControlName="email" placeholder="Enter Email" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-email" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('latitude')">
                <label for="Office-latitude" id="label-Office-latitude">Latitude</label>
                <input type="number" id="Office-latitude" formControlName="latitude" placeholder="Enter Latitude" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-latitude" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('longitude')">
                <label for="Office-longitude" id="label-Office-longitude">Longitude</label>
                <input type="number" id="Office-longitude" formControlName="longitude" placeholder="Enter Longitude" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-longitude" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('notes')">
                <label for="Office-notes" id="label-Office-notes">Notes</label>
                <textarea id="Office-notes" formControlName="notes" placeholder="Enter Notes" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('externalId')">
                <label for="Office-externalId" id="label-Office-externalId">External Id</label>
                <input type="text" id="Office-externalId" formControlName="externalId" placeholder="Enter External Id" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-externalId" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('color')">
                <label for="Office-color" id="label-Office-color">Color</label>
                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="Office-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerOfficeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="officeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('attributes')">
                <label for="Office-attributes" id="label-Office-attributes">Attributes</label>
                <textarea id="Office-attributes" formControlName="attributes" placeholder="Enter Attributes" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('avatarFileName')">
                <label for="Office-avatarFileName" id="label-Office-avatarFileName">Avatar File Name</label>
                <input type="text" id="Office-avatarFileName" formControlName="avatarFileName" placeholder="Enter Avatar File Name" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-avatarFileName" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('avatarSize')">
                <label for="Office-avatarSize" id="label-Office-avatarSize">Avatar Size</label>
                <input type="number" id="Office-avatarSize" formControlName="avatarSize" placeholder="Enter Avatar Size" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-avatarSize" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('avatarData')">
                <label for="Office-avatarData" id="label-Office-avatarData">Avatar Data</label>
                <input type="text" id="Office-avatarData" formControlName="avatarData" placeholder="Enter Avatar Data" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-avatarData" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('avatarMimeType')">
                <label for="Office-avatarMimeType" id="label-Office-avatarMimeType">Avatar Mime Type</label>
                <input type="text" id="Office-avatarMimeType" formControlName="avatarMimeType" placeholder="Enter Avatar Mime Type" class="form-control office-input" [disabled]="!userIsSchedulerOfficeWriter()" aria-labelledby="label-avatarMimeType" />
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="Office-versionNumber" id="label-Office-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="Office-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control office-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="Office-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerOfficeWriter()" />
                <label for="Office-active" class="form-check-label" id="label-Office-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="Office-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerOfficeWriter()" />
                <label for="Office-deleted" class="form-check-label" id="label-Office-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer office-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Office changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !officeForm.valid || officeForm.pristine  || userIsSchedulerOfficeWriter() == false " ngbTooltip="Save the Office changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Office' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
