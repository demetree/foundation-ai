<div class="add-document-share-link" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-document-share-link me-2"
        (click)="openModal()"
        ngbTooltip="Add Document Share Link" 
        *ngIf="userIsSchedulerDocumentShareLinkWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #documentShareLinkModal let-modal>
   <div class="modal-header document-share-link-modal-header">
      <h5 class="modal-title mb-0" id="documentShareLinkModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Document Share Link' : 'Add Document Share Link' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body document-share-link-modal-body">
      <form [formGroup]="documentShareLinkForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('documentId')">
                <label for="DocumentShareLink-documentId" id="label-DocumentShareLink-documentId"><span class="text-danger">*</span>Document</label>
                <select id="DocumentShareLink-documentId" formControlName="documentId" class="form-select document-share-link-select" [disabled]="!userIsSchedulerDocumentShareLinkWriter()">
                    <option [ngValue]="null">Select Document</option>
                    <option *ngFor="let document of documents$ | async" [ngValue]="document.id">{{document.name}}</option>
                </select>
                <div *ngIf="documentShareLinkForm.get('documentId')?.invalid && documentShareLinkForm.get('documentId')?.touched" class="text-danger">
                    Document is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('token')">
                <label for="DocumentShareLink-token" id="label-DocumentShareLink-token"><span class="text-danger">*</span>Token</label>
                <input type="text" id="DocumentShareLink-token" formControlName="token" placeholder="Enter Token" class="form-control document-share-link-input" [disabled]="!userIsSchedulerDocumentShareLinkWriter()" aria-labelledby="label-token" />
                <div *ngIf="documentShareLinkForm.get('token')?.invalid && documentShareLinkForm.get('token')?.touched" class="text-danger">
                    Token is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('passwordHash')">
                <label for="DocumentShareLink-passwordHash" id="label-DocumentShareLink-passwordHash">Password Hash</label>
                <input type="text" id="DocumentShareLink-passwordHash" formControlName="passwordHash" placeholder="Enter Password Hash" class="form-control document-share-link-input" [disabled]="!userIsSchedulerDocumentShareLinkWriter()" aria-labelledby="label-passwordHash" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('expiresAt')">
                <label for="DocumentShareLink-expiresAt" id="label-DocumentShareLink-expiresAt">Expires At</label>
                <input type="datetime-local" id="DocumentShareLink-expiresAt" formControlName="expiresAt" placeholder="Enter Expires At" class="form-control document-share-link-input" [disabled]="!userIsSchedulerDocumentShareLinkWriter()" aria-labelledby="label-expiresAt" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('maxDownloads')">
                <label for="DocumentShareLink-maxDownloads" id="label-DocumentShareLink-maxDownloads">Max Downloads</label>
                <input type="number" id="DocumentShareLink-maxDownloads" formControlName="maxDownloads" placeholder="Enter Max Downloads" class="form-control document-share-link-input" [disabled]="!userIsSchedulerDocumentShareLinkWriter()" aria-labelledby="label-maxDownloads" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('downloadCount')">
                <label for="DocumentShareLink-downloadCount" id="label-DocumentShareLink-downloadCount"><span class="text-danger">*</span>Download Count</label>
                <input type="number" id="DocumentShareLink-downloadCount" formControlName="downloadCount" placeholder="Enter Download Count" class="form-control document-share-link-input" [disabled]="!userIsSchedulerDocumentShareLinkWriter()" aria-labelledby="label-downloadCount" />
                <div *ngIf="documentShareLinkForm.get('downloadCount')?.invalid && documentShareLinkForm.get('downloadCount')?.touched" class="text-danger">
                    Download Count is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('createdBy')">
                <label for="DocumentShareLink-createdBy" id="label-DocumentShareLink-createdBy"><span class="text-danger">*</span>Created By</label>
                <input type="text" id="DocumentShareLink-createdBy" formControlName="createdBy" placeholder="Enter Created By" class="form-control document-share-link-input" [disabled]="!userIsSchedulerDocumentShareLinkWriter()" aria-labelledby="label-createdBy" />
                <div *ngIf="documentShareLinkForm.get('createdBy')?.invalid && documentShareLinkForm.get('createdBy')?.touched" class="text-danger">
                    Created By is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('createdDate')">
                <label for="DocumentShareLink-createdDate" id="label-DocumentShareLink-createdDate"><span class="text-danger">*</span>Created Date</label>
                <input type="datetime-local" id="DocumentShareLink-createdDate" formControlName="createdDate" placeholder="Enter Created Date" class="form-control document-share-link-input" [disabled]="!userIsSchedulerDocumentShareLinkWriter()" aria-labelledby="label-createdDate" />
                <div *ngIf="documentShareLinkForm.get('createdDate')?.invalid && documentShareLinkForm.get('createdDate')?.touched" class="text-danger">
                    Created Date is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="DocumentShareLink-versionNumber" id="label-DocumentShareLink-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="DocumentShareLink-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control document-share-link-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="DocumentShareLink-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerDocumentShareLinkWriter()" />
                <label for="DocumentShareLink-active" class="form-check-label" id="label-DocumentShareLink-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="DocumentShareLink-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerDocumentShareLinkWriter()" />
                <label for="DocumentShareLink-deleted" class="form-check-label" id="label-DocumentShareLink-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer document-share-link-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Document Share Link changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !documentShareLinkForm.valid || documentShareLinkForm.pristine  || userIsSchedulerDocumentShareLinkWriter() == false " ngbTooltip="Save the Document Share Link changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Document Share Link' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
