<div class="container-fluid p-1 m-0 campaign-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="campaign-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Campaign</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Campaign' : 'Add Campaign'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerCampaignReader()">
                <div class="col m-2 campaign-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="campaignForm" (ngSubmit)="submitForm()" class="campaign-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="Campaign-name" id="label-Campaign-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="Campaign-name" formControlName="name" placeholder="Enter Name" class="form-control campaign-input" [disabled]="!userIsSchedulerCampaignWriter()" aria-labelledby="label-name" />
                                <div *ngIf="campaignForm.get('name')?.invalid && campaignForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="Campaign-description" id="label-Campaign-description">Description</label>
                                <textarea id="Campaign-description" formControlName="description" placeholder="Enter Description" class="form-control campaign-input" [disabled]="!userIsSchedulerCampaignWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('startDate')">
                                <label for="Campaign-startDate" id="label-Campaign-startDate">Start Date</label>
                                <input type="date" id="Campaign-startDate" formControlName="startDate" placeholder="Enter Start Date" class="form-control campaign-input" [disabled]="!userIsSchedulerCampaignWriter()" aria-labelledby="label-startDate" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('endDate')">
                                <label for="Campaign-endDate" id="label-Campaign-endDate">End Date</label>
                                <input type="date" id="Campaign-endDate" formControlName="endDate" placeholder="Enter End Date" class="form-control campaign-input" [disabled]="!userIsSchedulerCampaignWriter()" aria-labelledby="label-endDate" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('fundRaisingGoal')">
                                <label for="Campaign-fundRaisingGoal" id="label-Campaign-fundRaisingGoal">Fund Raising Goal</label>
                                <input type="number" id="Campaign-fundRaisingGoal" formControlName="fundRaisingGoal" placeholder="Enter Fund Raising Goal" class="form-control campaign-input" [disabled]="!userIsSchedulerCampaignWriter()" aria-labelledby="label-fundRaisingGoal" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('notes')">
                                <label for="Campaign-notes" id="label-Campaign-notes">Notes</label>
                                <textarea id="Campaign-notes" formControlName="notes" placeholder="Enter Notes" class="form-control campaign-input" [disabled]="!userIsSchedulerCampaignWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('iconId')">
                                <label for="Campaign-iconId" id="label-Campaign-iconId">Icon</label>
                                <select id="Campaign-iconId" formControlName="iconId" class="form-select campaign-select" [disabled]="!userIsSchedulerCampaignWriter()">
                                    <option [ngValue]="null">Select Icon</option>
                                    <option *ngFor="let icon of icons$ | async" [ngValue]="icon.id">{{icon.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="Campaign-color" id="label-Campaign-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="Campaign-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerCampaignWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="campaignForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="Campaign-versionNumber" id="label-Campaign-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="Campaign-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control campaign-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Campaign-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerCampaignWriter()" />
                                <label for="Campaign-active" class="form-check-label" id="label-Campaign-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Campaign-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerCampaignWriter()" />
                                <label for="Campaign-deleted" class="form-check-label" id="label-Campaign-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="campaign-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="campaignForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Campaign">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !campaignForm.valid || !campaignForm.dirty || campaignForm.pristine  || userIsSchedulerCampaignWriter() == false " ngbTooltip="Save the Campaign changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Campaign' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerCampaignReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 campaign-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="campaignChangeHistoryService.userIsSchedulerCampaignChangeHistoryReader()">
                            <button ngbNavLink>Campaign Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (campaignData?.CampaignChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-campaign-change-history-table [queryParams]="{ campaignId: campaignData?.id }" [showAddButton]="true" [preSeededData]="{ campaignId: campaignData?.id }" [hiddenFields]="['campaignId']"></app-campaign-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="appealService.userIsSchedulerAppealReader()">
                            <button ngbNavLink>Appeals
                                <span class="badge bg-primary ms-2">
                                    {{ (campaignData?.AppealsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-appeal-table [queryParams]="{ campaignId: campaignData?.id }" [showAddButton]="true" [preSeededData]="{ campaignId: campaignData?.id }" [hiddenFields]="['campaignId']"></app-appeal-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="pledgeService.userIsSchedulerPledgeReader()">
                            <button ngbNavLink>Pledges
                                <span class="badge bg-primary ms-2">
                                    {{ (campaignData?.PledgesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-pledge-table [queryParams]="{ campaignId: campaignData?.id }" [showAddButton]="true" [preSeededData]="{ campaignId: campaignData?.id }" [hiddenFields]="['campaignId']"></app-pledge-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="batchService.userIsSchedulerBatchReader()">
                            <button ngbNavLink>Batches Default Campaigns
                                <span class="badge bg-primary ms-2">
                                    {{ (campaignData?.BatchDefaultCampaignsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-batch-table [queryParams]="{ defaultCampaignId: campaignData?.id }" [showAddButton]="true" [preSeededData]="{ defaultCampaignId: campaignData?.id }" [hiddenFields]="['defaultCampaignId']"></app-batch-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="giftService.userIsSchedulerGiftReader()">
                            <button ngbNavLink>Gifts
                                <span class="badge bg-primary ms-2">
                                    {{ (campaignData?.GiftsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-gift-table [queryParams]="{ campaignId: campaignData?.id }" [showAddButton]="true" [preSeededData]="{ campaignId: campaignData?.id }" [hiddenFields]="['campaignId']"></app-gift-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
