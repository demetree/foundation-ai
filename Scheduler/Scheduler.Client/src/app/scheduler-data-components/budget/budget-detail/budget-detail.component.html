<div class="container-fluid p-1 m-0 budget-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="budget-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Budget</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Budget' : 'Add Budget'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerBudgetReader()">
                <div class="col m-2 budget-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="budgetForm" (ngSubmit)="submitForm()" class="budget-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('financialCategoryId')">
                                <label for="Budget-financialCategoryId" id="label-Budget-financialCategoryId"><span class="text-danger">*</span>Financial Category</label>
                                <select id="Budget-financialCategoryId" formControlName="financialCategoryId" class="form-select budget-select" [disabled]="!userIsSchedulerBudgetWriter()">
                                    <option [ngValue]="null">Select Financial Category</option>
                                    <option *ngFor="let financialCategory of financialCategories$ | async" [ngValue]="financialCategory.id">{{financialCategory.name}}</option>
                                </select>
                                <div *ngIf="budgetForm.get('financialCategoryId')?.invalid && budgetForm.get('financialCategoryId')?.touched" class="text-danger">
                                    Financial Category is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('fiscalPeriodId')">
                                <label for="Budget-fiscalPeriodId" id="label-Budget-fiscalPeriodId"><span class="text-danger">*</span>Fiscal Period</label>
                                <select id="Budget-fiscalPeriodId" formControlName="fiscalPeriodId" class="form-select budget-select" [disabled]="!userIsSchedulerBudgetWriter()">
                                    <option [ngValue]="null">Select Fiscal Period</option>
                                    <option *ngFor="let fiscalPeriod of fiscalPeriods$ | async" [ngValue]="fiscalPeriod.id">{{fiscalPeriod.name}}</option>
                                </select>
                                <div *ngIf="budgetForm.get('fiscalPeriodId')?.invalid && budgetForm.get('fiscalPeriodId')?.touched" class="text-danger">
                                    Fiscal Period is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('budgetedAmount')">
                                <label for="Budget-budgetedAmount" id="label-Budget-budgetedAmount"><span class="text-danger">*</span>Budgeted Amount</label>
                                <input type="number" id="Budget-budgetedAmount" formControlName="budgetedAmount" placeholder="Enter Budgeted Amount" class="form-control budget-input" [disabled]="!userIsSchedulerBudgetWriter()" aria-labelledby="label-budgetedAmount" />
                                <div *ngIf="budgetForm.get('budgetedAmount')?.invalid && budgetForm.get('budgetedAmount')?.touched" class="text-danger">
                                    Budgeted Amount is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('revisedAmount')">
                                <label for="Budget-revisedAmount" id="label-Budget-revisedAmount">Revised Amount</label>
                                <input type="number" id="Budget-revisedAmount" formControlName="revisedAmount" placeholder="Enter Revised Amount" class="form-control budget-input" [disabled]="!userIsSchedulerBudgetWriter()" aria-labelledby="label-revisedAmount" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('notes')">
                                <label for="Budget-notes" id="label-Budget-notes">Notes</label>
                                <textarea id="Budget-notes" formControlName="notes" placeholder="Enter Notes" class="form-control budget-input" [disabled]="!userIsSchedulerBudgetWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('currencyId')">
                                <label for="Budget-currencyId" id="label-Budget-currencyId"><span class="text-danger">*</span>Currency</label>
                                <select id="Budget-currencyId" formControlName="currencyId" class="form-select budget-select" [disabled]="!userIsSchedulerBudgetWriter()">
                                    <option [ngValue]="null">Select Currency</option>
                                    <option *ngFor="let currency of currencies$ | async" [ngValue]="currency.id">{{currency.name}}</option>
                                </select>
                                <div *ngIf="budgetForm.get('currencyId')?.invalid && budgetForm.get('currencyId')?.touched" class="text-danger">
                                    Currency is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="Budget-versionNumber" id="label-Budget-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="Budget-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control budget-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Budget-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerBudgetWriter()" />
                                <label for="Budget-active" class="form-check-label" id="label-Budget-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Budget-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerBudgetWriter()" />
                                <label for="Budget-deleted" class="form-check-label" id="label-Budget-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="budget-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="budgetForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Budget">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !budgetForm.valid || !budgetForm.dirty || budgetForm.pristine  || userIsSchedulerBudgetWriter() == false " ngbTooltip="Save the Budget changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Budget' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerBudgetReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 budget-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="budgetChangeHistoryService.userIsSchedulerBudgetChangeHistoryReader()">
                            <button ngbNavLink>Budget Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (budgetData?.BudgetChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-budget-change-history-table [queryParams]="{ budgetId: budgetData?.id }" [showAddButton]="true" [preSeededData]="{ budgetId: budgetData?.id }" [hiddenFields]="['budgetId']"></app-budget-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
