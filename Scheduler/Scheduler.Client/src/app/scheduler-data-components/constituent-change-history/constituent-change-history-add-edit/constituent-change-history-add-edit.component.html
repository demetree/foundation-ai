<div class="add-constituent-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-constituent-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Constituent Change History" 
        *ngIf="userIsSchedulerConstituentChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #constituentChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light constituent-change-history-modal-header">
      <h5 class="modal-title mb-0" id="constituentChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Constituent Change History' : 'Add Constituent Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body constituent-change-history-modal-body">
      <form [formGroup]="constituentChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('constituentId')">
                <label for="ConstituentChangeHistory-constituentId" id="label-ConstituentChangeHistory-constituentId"><span class="text-danger">*</span>Constituent</label>
                <select id="ConstituentChangeHistory-constituentId" formControlName="constituentId" class="form-select constituent-change-history-select" [disabled]="!userIsSchedulerConstituentChangeHistoryWriter()">
                    <option [ngValue]="null">Select Constituent</option>
                    <option *ngFor="let constituent of constituents$ | async" [ngValue]="constituent.id">{{constituent.constituentNumber}}</option>
                </select>
                <div *ngIf="constituentChangeHistoryForm.get('constituentId')?.invalid && constituentChangeHistoryForm.get('constituentId')?.touched" class="text-danger">
                    Constituent is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ConstituentChangeHistory-versionNumber" id="label-ConstituentChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ConstituentChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control constituent-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="ConstituentChangeHistory-timeStamp" id="label-ConstituentChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="ConstituentChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control constituent-change-history-input" [disabled]="!userIsSchedulerConstituentChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="constituentChangeHistoryForm.get('timeStamp')?.invalid && constituentChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="ConstituentChangeHistory-userId" id="label-ConstituentChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="ConstituentChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control constituent-change-history-input" [disabled]="!userIsSchedulerConstituentChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="constituentChangeHistoryForm.get('userId')?.invalid && constituentChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="ConstituentChangeHistory-data" id="label-ConstituentChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="ConstituentChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control constituent-change-history-input" [disabled]="!userIsSchedulerConstituentChangeHistoryWriter()"></textarea>
                <div *ngIf="constituentChangeHistoryForm.get('data')?.invalid && constituentChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer constituent-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Constituent Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !constituentChangeHistoryForm.valid || constituentChangeHistoryForm.pristine || !userIsSchedulerConstituentChangeHistoryWriter()" ngbTooltip="Save the Constituent Change History changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
