<div class="container-fluid p-1 m-0 office-contact-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="office-contact-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Office Contact</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Office Contact' : 'Add Office Contact'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerOfficeContactReader()">
                <div class="col m-2 office-contact-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="officeContactForm" (ngSubmit)="submitForm()" class="office-contact-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('officeId')">
                                <label for="OfficeContact-officeId" id="label-OfficeContact-officeId"><span class="text-danger">*</span>Office</label>
                                <select id="OfficeContact-officeId" formControlName="officeId" class="form-select office-contact-select" [disabled]="!userIsSchedulerOfficeContactWriter()">
                                    <option [ngValue]="null">Select Office</option>
                                    <option *ngFor="let office of offices$ | async" [ngValue]="office.id">{{office.name}}</option>
                                </select>
                                <div *ngIf="officeContactForm.get('officeId')?.invalid && officeContactForm.get('officeId')?.touched" class="text-danger">
                                    Office is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('contactId')">
                                <label for="OfficeContact-contactId" id="label-OfficeContact-contactId"><span class="text-danger">*</span>Contact</label>
                                <select id="OfficeContact-contactId" formControlName="contactId" class="form-select office-contact-select" [disabled]="!userIsSchedulerOfficeContactWriter()">
                                    <option [ngValue]="null">Select Contact</option>
                                    <option *ngFor="let contact of contacts$ | async" [ngValue]="contact.id">{{contact.firstName}}</option>
                                </select>
                                <div *ngIf="officeContactForm.get('contactId')?.invalid && officeContactForm.get('contactId')?.touched" class="text-danger">
                                    Contact is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isPrimary')">
                                <input type="checkbox" id="OfficeContact-isPrimary" formControlName="isPrimary" class="form-check-input" [disabled]="!userIsSchedulerOfficeContactWriter()" />
                                <label for="OfficeContact-isPrimary" class="form-check-label" id="label-OfficeContact-isPrimary"><span class="text-danger">*</span>Is Primary</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('relationshipTypeId')">
                                <label for="OfficeContact-relationshipTypeId" id="label-OfficeContact-relationshipTypeId"><span class="text-danger">*</span>Relationship Type</label>
                                <select id="OfficeContact-relationshipTypeId" formControlName="relationshipTypeId" class="form-select office-contact-select" [disabled]="!userIsSchedulerOfficeContactWriter()">
                                    <option [ngValue]="null">Select Relationship Type</option>
                                    <option *ngFor="let relationshipType of relationshipTypes$ | async" [ngValue]="relationshipType.id">{{relationshipType.name}}</option>
                                </select>
                                <div *ngIf="officeContactForm.get('relationshipTypeId')?.invalid && officeContactForm.get('relationshipTypeId')?.touched" class="text-danger">
                                    Relationship Type is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="OfficeContact-versionNumber" id="label-OfficeContact-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="OfficeContact-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control office-contact-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="OfficeContact-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerOfficeContactWriter()" />
                                <label for="OfficeContact-active" class="form-check-label" id="label-OfficeContact-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="OfficeContact-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerOfficeContactWriter()" />
                                <label for="OfficeContact-deleted" class="form-check-label" id="label-OfficeContact-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="office-contact-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="officeContactForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Office Contact">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !officeContactForm.valid || !officeContactForm.dirty || officeContactForm.pristine || userIsSchedulerOfficeContactWriter() == false " ngbTooltip="Save Office Contact">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerOfficeContactReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 office-contact-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="officeContactChangeHistoryService.userIsSchedulerOfficeContactChangeHistoryReader()">
                            <button ngbNavLink>Office Contact Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (officeContactData?.OfficeContactChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-office-contact-change-history-table [queryParams]="{ officeContactId: officeContactData?.id }"></app-office-contact-change-history-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-office-contact-change-history-add-edit [preSeededData]="{ officeContactId: officeContactData?.id }" [hiddenFields]="['officeContactId']"></app-office-contact-change-history-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
