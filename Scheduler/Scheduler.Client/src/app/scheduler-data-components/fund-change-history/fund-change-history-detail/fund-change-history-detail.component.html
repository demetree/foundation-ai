<div class="container-fluid p-1 m-0 fund-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="fund-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Fund Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Fund Change History' : 'Add Fund Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerFundChangeHistoryReader()">
                <div class="col m-2 fund-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="fundChangeHistoryForm" (ngSubmit)="submitForm()" class="fund-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('fundId')">
                                <label for="FundChangeHistory-fundId" id="label-FundChangeHistory-fundId"><span class="text-danger">*</span>Fund</label>
                                <select id="FundChangeHistory-fundId" formControlName="fundId" class="form-select fund-change-history-select" [disabled]="!userIsSchedulerFundChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Fund</option>
                                    <option *ngFor="let fund of funds$ | async" [ngValue]="fund.id">{{fund.name}}</option>
                                </select>
                                <div *ngIf="fundChangeHistoryForm.get('fundId')?.invalid && fundChangeHistoryForm.get('fundId')?.touched" class="text-danger">
                                    Fund is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="FundChangeHistory-versionNumber" id="label-FundChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="FundChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control fund-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="FundChangeHistory-timeStamp" id="label-FundChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="FundChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control fund-change-history-input" [disabled]="!userIsSchedulerFundChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="fundChangeHistoryForm.get('timeStamp')?.invalid && fundChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="FundChangeHistory-userId" id="label-FundChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="FundChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control fund-change-history-input" [disabled]="!userIsSchedulerFundChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="fundChangeHistoryForm.get('userId')?.invalid && fundChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="FundChangeHistory-data" id="label-FundChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="FundChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control fund-change-history-input" [disabled]="!userIsSchedulerFundChangeHistoryWriter()"></textarea>
                                <div *ngIf="fundChangeHistoryForm.get('data')?.invalid && fundChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="fund-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="fundChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Fund Change History">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !fundChangeHistoryForm.valid || !fundChangeHistoryForm.dirty || fundChangeHistoryForm.pristine || userIsSchedulerFundChangeHistoryWriter() == false " ngbTooltip="Save Fund Change History">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
