<div class="container-fluid p-1 m-0 conversation-pin-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="conversation-pin-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Conversation Pin</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Conversation Pin' : 'Add Conversation Pin'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerConversationPinReader()">
                <div class="col m-2 conversation-pin-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="conversationPinForm" (ngSubmit)="submitForm()" class="conversation-pin-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('conversationId')">
                                <label for="ConversationPin-conversationId" id="label-ConversationPin-conversationId"><span class="text-danger">*</span>Conversation</label>
                                <select id="ConversationPin-conversationId" formControlName="conversationId" class="form-select conversation-pin-select" [disabled]="!userIsSchedulerConversationPinWriter()">
                                    <option [ngValue]="null">Select Conversation</option>
                                    <option *ngFor="let conversation of conversations$ | async" [ngValue]="conversation.id">{{conversation.entity}}</option>
                                </select>
                                <div *ngIf="conversationPinForm.get('conversationId')?.invalid && conversationPinForm.get('conversationId')?.touched" class="text-danger">
                                    Conversation is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('conversationMessageId')">
                                <label for="ConversationPin-conversationMessageId" id="label-ConversationPin-conversationMessageId"><span class="text-danger">*</span>Conversation Message</label>
                                <select id="ConversationPin-conversationMessageId" formControlName="conversationMessageId" class="form-select conversation-pin-select" [disabled]="!userIsSchedulerConversationPinWriter()">
                                    <option [ngValue]="null">Select Conversation Message</option>
                                    <option *ngFor="let conversationMessage of conversationMessages$ | async" [ngValue]="conversationMessage.id">{{conversationMessage.message}}</option>
                                </select>
                                <div *ngIf="conversationPinForm.get('conversationMessageId')?.invalid && conversationPinForm.get('conversationMessageId')?.touched" class="text-danger">
                                    Conversation Message is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('pinnedByUserId')">
                                <label for="ConversationPin-pinnedByUserId" id="label-ConversationPin-pinnedByUserId"><span class="text-danger">*</span>Pinned By User Id</label>
                                <input type="number" id="ConversationPin-pinnedByUserId" formControlName="pinnedByUserId" placeholder="Enter Pinned By User Id" class="form-control conversation-pin-input" [disabled]="!userIsSchedulerConversationPinWriter()" aria-labelledby="label-pinnedByUserId" />
                                <div *ngIf="conversationPinForm.get('pinnedByUserId')?.invalid && conversationPinForm.get('pinnedByUserId')?.touched" class="text-danger">
                                    Pinned By User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('dateTimePinned')">
                                <label for="ConversationPin-dateTimePinned" id="label-ConversationPin-dateTimePinned"><span class="text-danger">*</span>Date Time Pinned</label>
                                <input type="datetime-local" id="ConversationPin-dateTimePinned" formControlName="dateTimePinned" placeholder="Enter Date Time Pinned" class="form-control conversation-pin-input" [disabled]="!userIsSchedulerConversationPinWriter()" aria-labelledby="label-dateTimePinned" />
                                <div *ngIf="conversationPinForm.get('dateTimePinned')?.invalid && conversationPinForm.get('dateTimePinned')?.touched" class="text-danger">
                                    Date Time Pinned is required
                                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ConversationPin-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerConversationPinWriter()" />
                                <label for="ConversationPin-active" class="form-check-label" id="label-ConversationPin-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ConversationPin-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerConversationPinWriter()" />
                                <label for="ConversationPin-deleted" class="form-check-label" id="label-ConversationPin-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="conversation-pin-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="conversationPinForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Conversation Pin">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !conversationPinForm.valid || !conversationPinForm.dirty || conversationPinForm.pristine  || userIsSchedulerConversationPinWriter() == false " ngbTooltip="Save the Conversation Pin changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Conversation Pin' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
