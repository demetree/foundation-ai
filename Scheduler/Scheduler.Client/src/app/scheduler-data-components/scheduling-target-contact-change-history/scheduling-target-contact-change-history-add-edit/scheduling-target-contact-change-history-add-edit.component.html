<div class="add-scheduling-target-contact-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-scheduling-target-contact-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Scheduling Target Contact Change History" 
        *ngIf="userIsSchedulerSchedulingTargetContactChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #schedulingTargetContactChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light scheduling-target-contact-change-history-modal-header">
      <h5 class="modal-title mb-0" id="schedulingTargetContactChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Scheduling Target Contact Change History' : 'Add Scheduling Target Contact Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body scheduling-target-contact-change-history-modal-body">
      <form [formGroup]="schedulingTargetContactChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('schedulingTargetContactId')">
                <label for="SchedulingTargetContactChangeHistory-schedulingTargetContactId" id="label-SchedulingTargetContactChangeHistory-schedulingTargetContactId"><span class="text-danger">*</span>Scheduling Target Contact</label>
                <select id="SchedulingTargetContactChangeHistory-schedulingTargetContactId" formControlName="schedulingTargetContactId" class="form-select scheduling-target-contact-change-history-select" [disabled]="!userIsSchedulerSchedulingTargetContactChangeHistoryWriter()">
                    <option [ngValue]="null">Select Scheduling Target Contact</option>
                    <option *ngFor="let schedulingTargetContact of schedulingTargetContacts$ | async" [ngValue]="schedulingTargetContact.id">{{schedulingTargetContact.id}}</option>
                </select>
                <div *ngIf="schedulingTargetContactChangeHistoryForm.get('schedulingTargetContactId')?.invalid && schedulingTargetContactChangeHistoryForm.get('schedulingTargetContactId')?.touched" class="text-danger">
                    Scheduling Target Contact is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="SchedulingTargetContactChangeHistory-versionNumber" id="label-SchedulingTargetContactChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="SchedulingTargetContactChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control scheduling-target-contact-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="SchedulingTargetContactChangeHistory-timeStamp" id="label-SchedulingTargetContactChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="SchedulingTargetContactChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control scheduling-target-contact-change-history-input" [disabled]="!userIsSchedulerSchedulingTargetContactChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="schedulingTargetContactChangeHistoryForm.get('timeStamp')?.invalid && schedulingTargetContactChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="SchedulingTargetContactChangeHistory-userId" id="label-SchedulingTargetContactChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="SchedulingTargetContactChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control scheduling-target-contact-change-history-input" [disabled]="!userIsSchedulerSchedulingTargetContactChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="schedulingTargetContactChangeHistoryForm.get('userId')?.invalid && schedulingTargetContactChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="SchedulingTargetContactChangeHistory-data" id="label-SchedulingTargetContactChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="SchedulingTargetContactChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control scheduling-target-contact-change-history-input" [disabled]="!userIsSchedulerSchedulingTargetContactChangeHistoryWriter()"></textarea>
                <div *ngIf="schedulingTargetContactChangeHistoryForm.get('data')?.invalid && schedulingTargetContactChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer scheduling-target-contact-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Scheduling Target Contact Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !schedulingTargetContactChangeHistoryForm.valid || schedulingTargetContactChangeHistoryForm.pristine || !userIsSchedulerSchedulingTargetContactChangeHistoryWriter()" ngbTooltip="Save the Scheduling Target Contact Change History changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
