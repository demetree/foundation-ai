<div class="container-fluid p-1 m-0 scheduled-event-dependency-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="scheduled-event-dependency-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Scheduled Event Dependency</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Scheduled Event Dependency' : 'Add Scheduled Event Dependency'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerScheduledEventDependencyReader()">
                <div class="col m-2 scheduled-event-dependency-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="scheduledEventDependencyForm" (ngSubmit)="submitForm()" class="scheduled-event-dependency-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('predecessorEventId')">
                                <label for="ScheduledEventDependency-predecessorEventId" id="label-ScheduledEventDependency-predecessorEventId"><span class="text-danger">*</span>Predecessor Event</label>
                                <select id="ScheduledEventDependency-predecessorEventId" formControlName="predecessorEventId" class="form-select scheduled-event-dependency-select" [disabled]="!userIsSchedulerScheduledEventDependencyWriter()">
                                    <option [ngValue]="null">Select Scheduled Event</option>
                                    <option *ngFor="let scheduledEvent of scheduledEvents$ | async" [ngValue]="scheduledEvent.id">{{[scheduledEvent.name] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="scheduledEventDependencyForm.get('predecessorEventId')?.invalid && scheduledEventDependencyForm.get('predecessorEventId')?.touched" class="text-danger">
                                    Predecessor Event is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('successorEventId')">
                                <label for="ScheduledEventDependency-successorEventId" id="label-ScheduledEventDependency-successorEventId"><span class="text-danger">*</span>Successor Event</label>
                                <select id="ScheduledEventDependency-successorEventId" formControlName="successorEventId" class="form-select scheduled-event-dependency-select" [disabled]="!userIsSchedulerScheduledEventDependencyWriter()">
                                    <option [ngValue]="null">Select Scheduled Event</option>
                                    <option *ngFor="let scheduledEvent of scheduledEvents$ | async" [ngValue]="scheduledEvent.id">{{[scheduledEvent.name] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="scheduledEventDependencyForm.get('successorEventId')?.invalid && scheduledEventDependencyForm.get('successorEventId')?.touched" class="text-danger">
                                    Successor Event is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('dependencyTypeId')">
                                <label for="ScheduledEventDependency-dependencyTypeId" id="label-ScheduledEventDependency-dependencyTypeId"><span class="text-danger">*</span>Dependency Type</label>
                                <select id="ScheduledEventDependency-dependencyTypeId" formControlName="dependencyTypeId" class="form-select scheduled-event-dependency-select" [disabled]="!userIsSchedulerScheduledEventDependencyWriter()">
                                    <option [ngValue]="null">Select Dependency Type</option>
                                    <option *ngFor="let dependencyType of dependencyTypes$ | async" [ngValue]="dependencyType.id">{{dependencyType.name}}</option>
                                </select>
                                <div *ngIf="scheduledEventDependencyForm.get('dependencyTypeId')?.invalid && scheduledEventDependencyForm.get('dependencyTypeId')?.touched" class="text-danger">
                                    Dependency Type is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('lagMinutes')">
                                <label for="ScheduledEventDependency-lagMinutes" id="label-ScheduledEventDependency-lagMinutes"><span class="text-danger">*</span>Lag Minutes</label>
                                <input type="number" id="ScheduledEventDependency-lagMinutes" formControlName="lagMinutes" placeholder="Enter Lag Minutes" class="form-control scheduled-event-dependency-input" [disabled]="!userIsSchedulerScheduledEventDependencyWriter()" aria-labelledby="label-lagMinutes" />
                                <div *ngIf="scheduledEventDependencyForm.get('lagMinutes')?.invalid && scheduledEventDependencyForm.get('lagMinutes')?.touched" class="text-danger">
                                    Lag Minutes is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ScheduledEventDependency-versionNumber" id="label-ScheduledEventDependency-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ScheduledEventDependency-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control scheduled-event-dependency-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ScheduledEventDependency-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerScheduledEventDependencyWriter()" />
                                <label for="ScheduledEventDependency-active" class="form-check-label" id="label-ScheduledEventDependency-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ScheduledEventDependency-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerScheduledEventDependencyWriter()" />
                                <label for="ScheduledEventDependency-deleted" class="form-check-label" id="label-ScheduledEventDependency-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="scheduled-event-dependency-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="scheduledEventDependencyForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Scheduled Event Dependency">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !scheduledEventDependencyForm.valid || !scheduledEventDependencyForm.dirty || scheduledEventDependencyForm.pristine || userIsSchedulerScheduledEventDependencyWriter() == false " ngbTooltip="Save Scheduled Event Dependency">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerScheduledEventDependencyReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 scheduled-event-dependency-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="scheduledEventDependencyChangeHistoryService.userIsSchedulerScheduledEventDependencyChangeHistoryReader()">
                            <button ngbNavLink>Scheduled Event Dependency Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (scheduledEventDependencyData?.ScheduledEventDependencyChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduled-event-dependency-change-history-table [queryParams]="{ scheduledEventDependencyId: scheduledEventDependencyData?.id }"></app-scheduled-event-dependency-change-history-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-scheduled-event-dependency-change-history-add-edit [preSeededData]="{ scheduledEventDependencyId: scheduledEventDependencyData?.id }" [hiddenFields]="['scheduledEventDependencyId']"></app-scheduled-event-dependency-change-history-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
