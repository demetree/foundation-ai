<div class="container-fluid p-1 m-0 conversation-thread-user-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="conversation-thread-user-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Conversation Thread User</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Conversation Thread User' : 'Add Conversation Thread User'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerConversationThreadUserReader()">
                <div class="col m-2 conversation-thread-user-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="conversationThreadUserForm" (ngSubmit)="submitForm()" class="conversation-thread-user-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('conversationId')">
                                <label for="ConversationThreadUser-conversationId" id="label-ConversationThreadUser-conversationId"><span class="text-danger">*</span>Conversation</label>
                                <select id="ConversationThreadUser-conversationId" formControlName="conversationId" class="form-select conversation-thread-user-select" [disabled]="!userIsSchedulerConversationThreadUserWriter()">
                                    <option [ngValue]="null">Select Conversation</option>
                                    <option *ngFor="let conversation of conversations$ | async" [ngValue]="conversation.id">{{conversation.entity}}</option>
                                </select>
                                <div *ngIf="conversationThreadUserForm.get('conversationId')?.invalid && conversationThreadUserForm.get('conversationId')?.touched" class="text-danger">
                                    Conversation is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('parentConversationMessageId')">
                                <label for="ConversationThreadUser-parentConversationMessageId" id="label-ConversationThreadUser-parentConversationMessageId"><span class="text-danger">*</span>Parent Conversation Message</label>
                                <select id="ConversationThreadUser-parentConversationMessageId" formControlName="parentConversationMessageId" class="form-select conversation-thread-user-select" [disabled]="!userIsSchedulerConversationThreadUserWriter()">
                                    <option [ngValue]="null">Select Conversation Message</option>
                                    <option *ngFor="let conversationMessage of conversationMessages$ | async" [ngValue]="conversationMessage.id">{{conversationMessage.message}}</option>
                                </select>
                                <div *ngIf="conversationThreadUserForm.get('parentConversationMessageId')?.invalid && conversationThreadUserForm.get('parentConversationMessageId')?.touched" class="text-danger">
                                    Parent Conversation Message is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="ConversationThreadUser-userId" id="label-ConversationThreadUser-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="ConversationThreadUser-userId" formControlName="userId" placeholder="Enter User Id" class="form-control conversation-thread-user-input" [disabled]="!userIsSchedulerConversationThreadUserWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="conversationThreadUserForm.get('userId')?.invalid && conversationThreadUserForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('lastReadMessageId')">
                                <label for="ConversationThreadUser-lastReadMessageId" id="label-ConversationThreadUser-lastReadMessageId">Last Read Message Id</label>
                                <input type="number" id="ConversationThreadUser-lastReadMessageId" formControlName="lastReadMessageId" placeholder="Enter Last Read Message Id" class="form-control conversation-thread-user-input" [disabled]="!userIsSchedulerConversationThreadUserWriter()" aria-labelledby="label-lastReadMessageId" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('lastReadDateTime')">
                                <label for="ConversationThreadUser-lastReadDateTime" id="label-ConversationThreadUser-lastReadDateTime">Last Read Date Time</label>
                                <input type="datetime-local" id="ConversationThreadUser-lastReadDateTime" formControlName="lastReadDateTime" placeholder="Enter Last Read Date Time" class="form-control conversation-thread-user-input" [disabled]="!userIsSchedulerConversationThreadUserWriter()" aria-labelledby="label-lastReadDateTime" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ConversationThreadUser-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerConversationThreadUserWriter()" />
                                <label for="ConversationThreadUser-active" class="form-check-label" id="label-ConversationThreadUser-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ConversationThreadUser-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerConversationThreadUserWriter()" />
                                <label for="ConversationThreadUser-deleted" class="form-check-label" id="label-ConversationThreadUser-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="conversation-thread-user-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="conversationThreadUserForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Conversation Thread User">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !conversationThreadUserForm.valid || !conversationThreadUserForm.dirty || conversationThreadUserForm.pristine  || userIsSchedulerConversationThreadUserWriter() == false " ngbTooltip="Save the Conversation Thread User changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Conversation Thread User' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
