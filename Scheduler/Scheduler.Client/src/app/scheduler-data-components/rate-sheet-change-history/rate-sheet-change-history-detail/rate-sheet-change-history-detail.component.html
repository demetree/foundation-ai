<div class="container-fluid p-1 m-0 rate-sheet-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="rate-sheet-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Rate Sheet Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Rate Sheet Change History' : 'Add Rate Sheet Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerRateSheetChangeHistoryReader()">
                <div class="col m-2 rate-sheet-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="rateSheetChangeHistoryForm" (ngSubmit)="submitForm()" class="rate-sheet-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('rateSheetId')">
                                <label for="RateSheetChangeHistory-rateSheetId" id="label-RateSheetChangeHistory-rateSheetId"><span class="text-danger">*</span>Rate Sheet</label>
                                <select id="RateSheetChangeHistory-rateSheetId" formControlName="rateSheetId" class="form-select rate-sheet-change-history-select" [disabled]="!userIsSchedulerRateSheetChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Rate Sheet</option>
                                    <option *ngFor="let rateSheet of rateSheets$ | async" [ngValue]="rateSheet.id">{{rateSheet.notes}}</option>
                                </select>
                                <div *ngIf="rateSheetChangeHistoryForm.get('rateSheetId')?.invalid && rateSheetChangeHistoryForm.get('rateSheetId')?.touched" class="text-danger">
                                    Rate Sheet is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="RateSheetChangeHistory-versionNumber" id="label-RateSheetChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="RateSheetChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control rate-sheet-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="RateSheetChangeHistory-timeStamp" id="label-RateSheetChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="RateSheetChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control rate-sheet-change-history-input" [disabled]="!userIsSchedulerRateSheetChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="rateSheetChangeHistoryForm.get('timeStamp')?.invalid && rateSheetChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="RateSheetChangeHistory-userId" id="label-RateSheetChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="RateSheetChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control rate-sheet-change-history-input" [disabled]="!userIsSchedulerRateSheetChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="rateSheetChangeHistoryForm.get('userId')?.invalid && rateSheetChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="RateSheetChangeHistory-data" id="label-RateSheetChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="RateSheetChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control rate-sheet-change-history-input" [disabled]="!userIsSchedulerRateSheetChangeHistoryWriter()"></textarea>
                                <div *ngIf="rateSheetChangeHistoryForm.get('data')?.invalid && rateSheetChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="rate-sheet-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="rateSheetChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Rate Sheet Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !rateSheetChangeHistoryForm.valid || !rateSheetChangeHistoryForm.dirty || rateSheetChangeHistoryForm.pristine  || userIsSchedulerRateSheetChangeHistoryWriter() == false " ngbTooltip="Save the Rate Sheet Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Rate Sheet Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
