<div class="add-event-type-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-event-type-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Event Type Change History" 
        *ngIf="userIsSchedulerEventTypeChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #eventTypeChangeHistoryModal let-modal>
   <div class="modal-header event-type-change-history-modal-header">
      <h5 class="modal-title mb-0" id="eventTypeChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Event Type Change History' : 'Add Event Type Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body event-type-change-history-modal-body">
      <form [formGroup]="eventTypeChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('eventTypeId')">
                <label for="EventTypeChangeHistory-eventTypeId" id="label-EventTypeChangeHistory-eventTypeId"><span class="text-danger">*</span>Event Type</label>
                <select id="EventTypeChangeHistory-eventTypeId" formControlName="eventTypeId" class="form-select event-type-change-history-select" [disabled]="!userIsSchedulerEventTypeChangeHistoryWriter()">
                    <option [ngValue]="null">Select Event Type</option>
                    <option *ngFor="let eventType of eventTypes$ | async" [ngValue]="eventType.id">{{eventType.name}}</option>
                </select>
                <div *ngIf="eventTypeChangeHistoryForm.get('eventTypeId')?.invalid && eventTypeChangeHistoryForm.get('eventTypeId')?.touched" class="text-danger">
                    Event Type is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="EventTypeChangeHistory-versionNumber" id="label-EventTypeChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="EventTypeChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control event-type-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="EventTypeChangeHistory-timeStamp" id="label-EventTypeChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="EventTypeChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control event-type-change-history-input" [disabled]="!userIsSchedulerEventTypeChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="eventTypeChangeHistoryForm.get('timeStamp')?.invalid && eventTypeChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="EventTypeChangeHistory-userId" id="label-EventTypeChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="EventTypeChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control event-type-change-history-input" [disabled]="!userIsSchedulerEventTypeChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="eventTypeChangeHistoryForm.get('userId')?.invalid && eventTypeChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="EventTypeChangeHistory-data" id="label-EventTypeChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="EventTypeChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control event-type-change-history-input" [disabled]="!userIsSchedulerEventTypeChangeHistoryWriter()"></textarea>
                <div *ngIf="eventTypeChangeHistoryForm.get('data')?.invalid && eventTypeChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer event-type-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Event Type Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !eventTypeChangeHistoryForm.valid || eventTypeChangeHistoryForm.pristine  || userIsSchedulerEventTypeChangeHistoryWriter() == false " ngbTooltip="Save the Event Type Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Event Type Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
