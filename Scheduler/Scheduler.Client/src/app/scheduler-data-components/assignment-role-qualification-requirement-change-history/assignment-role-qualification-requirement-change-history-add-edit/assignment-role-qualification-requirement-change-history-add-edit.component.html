<div class="add-assignment-role-qualification-requirement-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-assignment-role-qualification-requirement-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Assignment Role Qualification Requirement Change History" 
        *ngIf="userIsSchedulerAssignmentRoleQualificationRequirementChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #assignmentRoleQualificationRequirementChangeHistoryModal let-modal>
   <div class="modal-header assignment-role-qualification-requirement-change-history-modal-header">
      <h5 class="modal-title mb-0" id="assignmentRoleQualificationRequirementChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Assignment Role Qualification Requirement Change History' : 'Add Assignment Role Qualification Requirement Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body assignment-role-qualification-requirement-change-history-modal-body">
      <form [formGroup]="assignmentRoleQualificationRequirementChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('assignmentRoleQualificationRequirementId')">
                <label for="AssignmentRoleQualificationRequirementChangeHistory-assignmentRoleQualificationRequirementId" id="label-AssignmentRoleQualificationRequirementChangeHistory-assignmentRoleQualificationRequirementId"><span class="text-danger">*</span>Assignment Role Qualification Requirement</label>
                <select id="AssignmentRoleQualificationRequirementChangeHistory-assignmentRoleQualificationRequirementId" formControlName="assignmentRoleQualificationRequirementId" class="form-select assignment-role-qualification-requirement-change-history-select" [disabled]="!userIsSchedulerAssignmentRoleQualificationRequirementChangeHistoryWriter()">
                    <option [ngValue]="null">Select Assignment Role Qualification Requirement</option>
                    <option *ngFor="let assignmentRoleQualificationRequirement of assignmentRoleQualificationRequirements$ | async" [ngValue]="assignmentRoleQualificationRequirement.id">{{assignmentRoleQualificationRequirement.id}}</option>
                </select>
                <div *ngIf="assignmentRoleQualificationRequirementChangeHistoryForm.get('assignmentRoleQualificationRequirementId')?.invalid && assignmentRoleQualificationRequirementChangeHistoryForm.get('assignmentRoleQualificationRequirementId')?.touched" class="text-danger">
                    Assignment Role Qualification Requirement is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="AssignmentRoleQualificationRequirementChangeHistory-versionNumber" id="label-AssignmentRoleQualificationRequirementChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="AssignmentRoleQualificationRequirementChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control assignment-role-qualification-requirement-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="AssignmentRoleQualificationRequirementChangeHistory-timeStamp" id="label-AssignmentRoleQualificationRequirementChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="AssignmentRoleQualificationRequirementChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control assignment-role-qualification-requirement-change-history-input" [disabled]="!userIsSchedulerAssignmentRoleQualificationRequirementChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="assignmentRoleQualificationRequirementChangeHistoryForm.get('timeStamp')?.invalid && assignmentRoleQualificationRequirementChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="AssignmentRoleQualificationRequirementChangeHistory-userId" id="label-AssignmentRoleQualificationRequirementChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="AssignmentRoleQualificationRequirementChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control assignment-role-qualification-requirement-change-history-input" [disabled]="!userIsSchedulerAssignmentRoleQualificationRequirementChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="assignmentRoleQualificationRequirementChangeHistoryForm.get('userId')?.invalid && assignmentRoleQualificationRequirementChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="AssignmentRoleQualificationRequirementChangeHistory-data" id="label-AssignmentRoleQualificationRequirementChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="AssignmentRoleQualificationRequirementChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control assignment-role-qualification-requirement-change-history-input" [disabled]="!userIsSchedulerAssignmentRoleQualificationRequirementChangeHistoryWriter()"></textarea>
                <div *ngIf="assignmentRoleQualificationRequirementChangeHistoryForm.get('data')?.invalid && assignmentRoleQualificationRequirementChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer assignment-role-qualification-requirement-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Assignment Role Qualification Requirement Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !assignmentRoleQualificationRequirementChangeHistoryForm.valid || assignmentRoleQualificationRequirementChangeHistoryForm.pristine  || userIsSchedulerAssignmentRoleQualificationRequirementChangeHistoryWriter() == false " ngbTooltip="Save the Assignment Role Qualification Requirement Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Assignment Role Qualification Requirement Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
