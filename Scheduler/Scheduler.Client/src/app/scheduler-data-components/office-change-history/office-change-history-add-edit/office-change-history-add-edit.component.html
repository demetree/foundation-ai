<div class="add-office-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-office-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Office Change History" 
        *ngIf="userIsSchedulerOfficeChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #officeChangeHistoryModal let-modal>
   <div class="modal-header office-change-history-modal-header">
      <h5 class="modal-title mb-0" id="officeChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Office Change History' : 'Add Office Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body office-change-history-modal-body">
      <form [formGroup]="officeChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('officeId')">
                <label for="OfficeChangeHistory-officeId" id="label-OfficeChangeHistory-officeId"><span class="text-danger">*</span>Office</label>
                <select id="OfficeChangeHistory-officeId" formControlName="officeId" class="form-select office-change-history-select" [disabled]="!userIsSchedulerOfficeChangeHistoryWriter()">
                    <option [ngValue]="null">Select Office</option>
                    <option *ngFor="let office of offices$ | async" [ngValue]="office.id">{{office.name}}</option>
                </select>
                <div *ngIf="officeChangeHistoryForm.get('officeId')?.invalid && officeChangeHistoryForm.get('officeId')?.touched" class="text-danger">
                    Office is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="OfficeChangeHistory-versionNumber" id="label-OfficeChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="OfficeChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control office-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="OfficeChangeHistory-timeStamp" id="label-OfficeChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="OfficeChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control office-change-history-input" [disabled]="!userIsSchedulerOfficeChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="officeChangeHistoryForm.get('timeStamp')?.invalid && officeChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="OfficeChangeHistory-userId" id="label-OfficeChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="OfficeChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control office-change-history-input" [disabled]="!userIsSchedulerOfficeChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="officeChangeHistoryForm.get('userId')?.invalid && officeChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="OfficeChangeHistory-data" id="label-OfficeChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="OfficeChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control office-change-history-input" [disabled]="!userIsSchedulerOfficeChangeHistoryWriter()"></textarea>
                <div *ngIf="officeChangeHistoryForm.get('data')?.invalid && officeChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer office-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Office Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !officeChangeHistoryForm.valid || officeChangeHistoryForm.pristine  || userIsSchedulerOfficeChangeHistoryWriter() == false " ngbTooltip="Save the Office Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Office Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
