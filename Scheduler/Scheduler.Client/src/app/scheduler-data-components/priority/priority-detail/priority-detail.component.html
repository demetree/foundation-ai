<div class="container-fluid p-1 m-0 priority-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="priority-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Priority</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Priority' : 'Add Priority'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerPriorityReader()">
                <div class="col m-2 priority-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="priorityForm" (ngSubmit)="submitForm()" class="priority-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="Priority-name" id="label-Priority-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="Priority-name" formControlName="name" placeholder="Enter Name" class="form-control priority-input" [disabled]="!userIsSchedulerPriorityWriter()" aria-labelledby="label-name" />
                                <div *ngIf="priorityForm.get('name')?.invalid && priorityForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="Priority-description" id="label-Priority-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="Priority-description" formControlName="description" placeholder="Enter Description" class="form-control priority-input" [disabled]="!userIsSchedulerPriorityWriter()"></textarea>
                                <div *ngIf="priorityForm.get('description')?.invalid && priorityForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="Priority-sequence" id="label-Priority-sequence">Sequence</label>
                                <input type="number" id="Priority-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control priority-input" [disabled]="!userIsSchedulerPriorityWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('iconId')">
                                <label for="Priority-iconId" id="label-Priority-iconId">Icon</label>
                                <select id="Priority-iconId" formControlName="iconId" class="form-select priority-select" [disabled]="!userIsSchedulerPriorityWriter()">
                                    <option [ngValue]="null">Select Icon</option>
                                    <option *ngFor="let icon of icons$ | async" [ngValue]="icon.id">{{icon.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="Priority-color" id="label-Priority-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="Priority-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerPriorityWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="priorityForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Priority-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerPriorityWriter()" />
                                <label for="Priority-active" class="form-check-label" id="label-Priority-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Priority-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerPriorityWriter()" />
                                <label for="Priority-deleted" class="form-check-label" id="label-Priority-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="priority-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="priorityForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Priority">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !priorityForm.valid || !priorityForm.dirty || priorityForm.pristine  || userIsSchedulerPriorityWriter() == false " ngbTooltip="Save the Priority changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Priority' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerPriorityReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 priority-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="tagService.userIsSchedulerTagReader()">
                            <button ngbNavLink>Tags
                                <span class="badge bg-primary ms-2">
                                    {{ (priorityData?.TagsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-tag-table [queryParams]="{ priorityId: priorityData?.id }"></app-tag-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-tag-add-edit [preSeededData]="{ priorityId: priorityData?.id }" [hiddenFields]="['priorityId']"></app-tag-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="scheduledEventTemplateService.userIsSchedulerScheduledEventTemplateReader()">
                            <button ngbNavLink>Scheduled Event Templates
                                <span class="badge bg-primary ms-2">
                                    {{ (priorityData?.ScheduledEventTemplatesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduled-event-template-table [queryParams]="{ priorityId: priorityData?.id }"></app-scheduled-event-template-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-scheduled-event-template-add-edit [preSeededData]="{ priorityId: priorityData?.id }" [hiddenFields]="['priorityId']"></app-scheduled-event-template-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="scheduledEventService.userIsSchedulerScheduledEventReader()">
                            <button ngbNavLink>Scheduled Events
                                <span class="badge bg-primary ms-2">
                                    {{ (priorityData?.ScheduledEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduled-event-table [queryParams]="{ priorityId: priorityData?.id }"></app-scheduled-event-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-scheduled-event-add-edit [preSeededData]="{ priorityId: priorityData?.id }" [hiddenFields]="['priorityId']"></app-scheduled-event-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="contactInteractionService.userIsSchedulerContactInteractionReader()">
                            <button ngbNavLink>Contact Interactions
                                <span class="badge bg-primary ms-2">
                                    {{ (priorityData?.ContactInteractionsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-contact-interaction-table [queryParams]="{ priorityId: priorityData?.id }"></app-contact-interaction-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-contact-interaction-add-edit [preSeededData]="{ priorityId: priorityData?.id }" [hiddenFields]="['priorityId']"></app-contact-interaction-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
