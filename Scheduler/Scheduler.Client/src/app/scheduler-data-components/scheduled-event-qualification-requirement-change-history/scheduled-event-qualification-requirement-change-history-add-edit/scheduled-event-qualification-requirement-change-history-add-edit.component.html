<div class="add-scheduled-event-qualification-requirement-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-scheduled-event-qualification-requirement-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Scheduled Event Qualification Requirement Change History" 
        *ngIf="userIsSchedulerScheduledEventQualificationRequirementChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #scheduledEventQualificationRequirementChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light scheduled-event-qualification-requirement-change-history-modal-header">
      <h5 class="modal-title mb-0" id="scheduledEventQualificationRequirementChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Scheduled Event Qualification Requirement Change History' : 'Add Scheduled Event Qualification Requirement Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body scheduled-event-qualification-requirement-change-history-modal-body">
      <form [formGroup]="scheduledEventQualificationRequirementChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('scheduledEventQualificationRequirementId')">
                <label for="ScheduledEventQualificationRequirementChangeHistory-scheduledEventQualificationRequirementId" id="label-ScheduledEventQualificationRequirementChangeHistory-scheduledEventQualificationRequirementId"><span class="text-danger">*</span>Scheduled Event Qualification Requirement</label>
                <select id="ScheduledEventQualificationRequirementChangeHistory-scheduledEventQualificationRequirementId" formControlName="scheduledEventQualificationRequirementId" class="form-select scheduled-event-qualification-requirement-change-history-select" [disabled]="!userIsSchedulerScheduledEventQualificationRequirementChangeHistoryWriter()">
                    <option [ngValue]="null">Select Scheduled Event Qualification Requirement</option>
                    <option *ngFor="let scheduledEventQualificationRequirement of scheduledEventQualificationRequirements$ | async" [ngValue]="scheduledEventQualificationRequirement.id">{{scheduledEventQualificationRequirement.id}}</option>
                </select>
                <div *ngIf="scheduledEventQualificationRequirementChangeHistoryForm.get('scheduledEventQualificationRequirementId')?.invalid && scheduledEventQualificationRequirementChangeHistoryForm.get('scheduledEventQualificationRequirementId')?.touched" class="text-danger">
                    Scheduled Event Qualification Requirement is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ScheduledEventQualificationRequirementChangeHistory-versionNumber" id="label-ScheduledEventQualificationRequirementChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ScheduledEventQualificationRequirementChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control scheduled-event-qualification-requirement-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="ScheduledEventQualificationRequirementChangeHistory-timeStamp" id="label-ScheduledEventQualificationRequirementChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="ScheduledEventQualificationRequirementChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control scheduled-event-qualification-requirement-change-history-input" [disabled]="!userIsSchedulerScheduledEventQualificationRequirementChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="scheduledEventQualificationRequirementChangeHistoryForm.get('timeStamp')?.invalid && scheduledEventQualificationRequirementChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="ScheduledEventQualificationRequirementChangeHistory-userId" id="label-ScheduledEventQualificationRequirementChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="ScheduledEventQualificationRequirementChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control scheduled-event-qualification-requirement-change-history-input" [disabled]="!userIsSchedulerScheduledEventQualificationRequirementChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="scheduledEventQualificationRequirementChangeHistoryForm.get('userId')?.invalid && scheduledEventQualificationRequirementChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="ScheduledEventQualificationRequirementChangeHistory-data" id="label-ScheduledEventQualificationRequirementChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="ScheduledEventQualificationRequirementChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control scheduled-event-qualification-requirement-change-history-input" [disabled]="!userIsSchedulerScheduledEventQualificationRequirementChangeHistoryWriter()"></textarea>
                <div *ngIf="scheduledEventQualificationRequirementChangeHistoryForm.get('data')?.invalid && scheduledEventQualificationRequirementChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer scheduled-event-qualification-requirement-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Scheduled Event Qualification Requirement Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !scheduledEventQualificationRequirementChangeHistoryForm.valid || scheduledEventQualificationRequirementChangeHistoryForm.pristine || !userIsSchedulerScheduledEventQualificationRequirementChangeHistoryWriter()" ngbTooltip="Save the Scheduled Event Qualification Requirement Change History changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
