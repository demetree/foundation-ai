<div class="add-shift-pattern" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-shift-pattern me-2"
        (click)="openModal()"
        ngbTooltip="Add Shift Pattern" 
        *ngIf="userIsSchedulerShiftPatternWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #shiftPatternModal let-modal>
   <div class="modal-header bg-dark text-light shift-pattern-modal-header">
      <h5 class="modal-title mb-0" id="shiftPatternModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Shift Pattern' : 'Add Shift Pattern' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body shift-pattern-modal-body">
      <form [formGroup]="shiftPatternForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="ShiftPattern-name" id="label-ShiftPattern-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="ShiftPattern-name" formControlName="name" placeholder="Enter Name" class="form-control shift-pattern-input" [disabled]="!userIsSchedulerShiftPatternWriter()" aria-labelledby="label-name" />
                <div *ngIf="shiftPatternForm.get('name')?.invalid && shiftPatternForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="ShiftPattern-description" id="label-ShiftPattern-description">Description</label>
                <textarea id="ShiftPattern-description" formControlName="description" placeholder="Enter Description" class="form-control shift-pattern-input" [disabled]="!userIsSchedulerShiftPatternWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeZoneId')">
                <label for="ShiftPattern-timeZoneId" id="label-ShiftPattern-timeZoneId">Time Zone</label>
                <select id="ShiftPattern-timeZoneId" formControlName="timeZoneId" class="form-select shift-pattern-select" [disabled]="!userIsSchedulerShiftPatternWriter()">
                    <option [ngValue]="null">Select Time Zone</option>
                    <option *ngFor="let timeZone of timeZones$ | async" [ngValue]="timeZone.id">{{timeZone.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('color')">
                <label for="ShiftPattern-color" id="label-ShiftPattern-color">Color</label>
                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="ShiftPattern-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerShiftPatternWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="shiftPatternForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ShiftPattern-versionNumber" id="label-ShiftPattern-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ShiftPattern-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control shift-pattern-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ShiftPattern-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerShiftPatternWriter()" />
                <label for="ShiftPattern-active" class="form-check-label" id="label-ShiftPattern-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ShiftPattern-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerShiftPatternWriter()" />
                <label for="ShiftPattern-deleted" class="form-check-label" id="label-ShiftPattern-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer shift-pattern-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Shift Pattern changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !shiftPatternForm.valid || shiftPatternForm.pristine  || userIsSchedulerShiftPatternWriter() == false " ngbTooltip="Save the Shift Pattern changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Shift Pattern' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
