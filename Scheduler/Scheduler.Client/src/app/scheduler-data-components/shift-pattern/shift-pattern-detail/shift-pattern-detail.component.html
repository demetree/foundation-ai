<div class="container-fluid p-1 m-0 shift-pattern-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="shift-pattern-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Shift Pattern</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Shift Pattern' : 'Add Shift Pattern'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerShiftPatternReader()">
                <div class="col m-2 shift-pattern-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="shiftPatternForm" (ngSubmit)="submitForm()" class="shift-pattern-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="ShiftPattern-name" id="label-ShiftPattern-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="ShiftPattern-name" formControlName="name" placeholder="Enter Name" class="form-control shift-pattern-input" [disabled]="!userIsSchedulerShiftPatternWriter()" aria-labelledby="label-name" />
                                <div *ngIf="shiftPatternForm.get('name')?.invalid && shiftPatternForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="ShiftPattern-description" id="label-ShiftPattern-description">Description</label>
                                <textarea id="ShiftPattern-description" formControlName="description" placeholder="Enter Description" class="form-control shift-pattern-input" [disabled]="!userIsSchedulerShiftPatternWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeZoneId')">
                                <label for="ShiftPattern-timeZoneId" id="label-ShiftPattern-timeZoneId">Time Zone</label>
                                <select id="ShiftPattern-timeZoneId" formControlName="timeZoneId" class="form-select shift-pattern-select" [disabled]="!userIsSchedulerShiftPatternWriter()">
                                    <option [ngValue]="null">Select Time Zone</option>
                                    <option *ngFor="let timeZone of timeZones$ | async" [ngValue]="timeZone.id">{{timeZone.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="ShiftPattern-color" id="label-ShiftPattern-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="ShiftPattern-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerShiftPatternWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="shiftPatternForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ShiftPattern-versionNumber" id="label-ShiftPattern-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ShiftPattern-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control shift-pattern-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ShiftPattern-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerShiftPatternWriter()" />
                                <label for="ShiftPattern-active" class="form-check-label" id="label-ShiftPattern-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ShiftPattern-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerShiftPatternWriter()" />
                                <label for="ShiftPattern-deleted" class="form-check-label" id="label-ShiftPattern-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="shift-pattern-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="shiftPatternForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Shift Pattern">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !shiftPatternForm.valid || !shiftPatternForm.dirty || shiftPatternForm.pristine  || userIsSchedulerShiftPatternWriter() == false " ngbTooltip="Save the Shift Pattern changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Shift Pattern' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerShiftPatternReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 shift-pattern-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="shiftPatternChangeHistoryService.userIsSchedulerShiftPatternChangeHistoryReader()">
                            <button ngbNavLink>Shift Pattern Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (shiftPatternData?.ShiftPatternChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-shift-pattern-change-history-table [queryParams]="{ shiftPatternId: shiftPatternData?.id }" [showAddButton]="true" [preSeededData]="{ shiftPatternId: shiftPatternData?.id }" [hiddenFields]="['shiftPatternId']"></app-shift-pattern-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="shiftPatternDayService.userIsSchedulerShiftPatternDayReader()">
                            <button ngbNavLink>Shift Pattern Days
                                <span class="badge bg-primary ms-2">
                                    {{ (shiftPatternData?.ShiftPatternDaysCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-shift-pattern-day-table [queryParams]="{ shiftPatternId: shiftPatternData?.id }" [showAddButton]="true" [preSeededData]="{ shiftPatternId: shiftPatternData?.id }" [hiddenFields]="['shiftPatternId']"></app-shift-pattern-day-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="resourceService.userIsSchedulerResourceReader()">
                            <button ngbNavLink>Resources
                                <span class="badge bg-primary ms-2">
                                    {{ (shiftPatternData?.ResourcesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-resource-table [queryParams]="{ shiftPatternId: shiftPatternData?.id }" [showAddButton]="true" [preSeededData]="{ shiftPatternId: shiftPatternData?.id }" [hiddenFields]="['shiftPatternId']"></app-resource-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
