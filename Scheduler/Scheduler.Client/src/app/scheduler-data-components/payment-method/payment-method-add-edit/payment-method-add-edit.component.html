<div class="add-payment-method" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-payment-method me-2"
        (click)="openModal()"
        ngbTooltip="Add Payment Method" 
        *ngIf="userIsSchedulerPaymentMethodWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #paymentMethodModal let-modal>
   <div class="modal-header payment-method-modal-header">
      <h5 class="modal-title mb-0" id="paymentMethodModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Payment Method' : 'Add Payment Method' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body payment-method-modal-body">
      <form [formGroup]="paymentMethodForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="PaymentMethod-name" id="label-PaymentMethod-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="PaymentMethod-name" formControlName="name" placeholder="Enter Name" class="form-control payment-method-input" [disabled]="!userIsSchedulerPaymentMethodWriter()" aria-labelledby="label-name" />
                <div *ngIf="paymentMethodForm.get('name')?.invalid && paymentMethodForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="PaymentMethod-description" id="label-PaymentMethod-description"><span class="text-danger">*</span>Description</label>
                <textarea id="PaymentMethod-description" formControlName="description" placeholder="Enter Description" class="form-control payment-method-input" [disabled]="!userIsSchedulerPaymentMethodWriter()"></textarea>
                <div *ngIf="paymentMethodForm.get('description')?.invalid && paymentMethodForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('isElectronic')">
                <input type="checkbox" id="PaymentMethod-isElectronic" formControlName="isElectronic" class="form-check-input" [disabled]="!userIsSchedulerPaymentMethodWriter()" />
                <label for="PaymentMethod-isElectronic" class="form-check-label" id="label-PaymentMethod-isElectronic"><span class="text-danger">*</span>Is Electronic</label>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="PaymentMethod-sequence" id="label-PaymentMethod-sequence">Sequence</label>
                <input type="number" id="PaymentMethod-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control payment-method-input" [disabled]="!userIsSchedulerPaymentMethodWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('color')">
                <label for="PaymentMethod-color" id="label-PaymentMethod-color">Color</label>
                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="PaymentMethod-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerPaymentMethodWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="paymentMethodForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="PaymentMethod-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerPaymentMethodWriter()" />
                <label for="PaymentMethod-active" class="form-check-label" id="label-PaymentMethod-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="PaymentMethod-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerPaymentMethodWriter()" />
                <label for="PaymentMethod-deleted" class="form-check-label" id="label-PaymentMethod-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer payment-method-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Payment Method changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !paymentMethodForm.valid || paymentMethodForm.pristine  || userIsSchedulerPaymentMethodWriter() == false " ngbTooltip="Save the Payment Method changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Payment Method' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
