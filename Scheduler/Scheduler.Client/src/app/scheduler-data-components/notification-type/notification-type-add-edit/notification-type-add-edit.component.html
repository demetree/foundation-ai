<div class="add-notification-type" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-notification-type me-2"
        (click)="openModal()"
        ngbTooltip="Add Notification Type" 
        *ngIf="userIsSchedulerNotificationTypeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #notificationTypeModal let-modal>
   <div class="modal-header notification-type-modal-header">
      <h5 class="modal-title mb-0" id="notificationTypeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Notification Type' : 'Add Notification Type' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body notification-type-modal-body">
      <form [formGroup]="notificationTypeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="NotificationType-name" id="label-NotificationType-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="NotificationType-name" formControlName="name" placeholder="Enter Name" class="form-control notification-type-input" [disabled]="!userIsSchedulerNotificationTypeWriter()" aria-labelledby="label-name" />
                <div *ngIf="notificationTypeForm.get('name')?.invalid && notificationTypeForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="NotificationType-description" id="label-NotificationType-description">Description</label>
                <textarea id="NotificationType-description" formControlName="description" placeholder="Enter Description" class="form-control notification-type-input" [disabled]="!userIsSchedulerNotificationTypeWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="NotificationType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerNotificationTypeWriter()" />
                <label for="NotificationType-active" class="form-check-label" id="label-NotificationType-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="NotificationType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerNotificationTypeWriter()" />
                <label for="NotificationType-deleted" class="form-check-label" id="label-NotificationType-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer notification-type-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Notification Type changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !notificationTypeForm.valid || notificationTypeForm.pristine  || userIsSchedulerNotificationTypeWriter() == false " ngbTooltip="Save the Notification Type changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Notification Type' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
