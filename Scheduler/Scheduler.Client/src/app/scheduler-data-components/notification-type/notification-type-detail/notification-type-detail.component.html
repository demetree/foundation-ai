<div class="container-fluid p-1 m-0 notification-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="notification-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Notification Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Notification Type' : 'Add Notification Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerNotificationTypeReader()">
                <div class="col m-2 notification-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="notificationTypeForm" (ngSubmit)="submitForm()" class="notification-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="NotificationType-name" id="label-NotificationType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="NotificationType-name" formControlName="name" placeholder="Enter Name" class="form-control notification-type-input" [disabled]="!userIsSchedulerNotificationTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="notificationTypeForm.get('name')?.invalid && notificationTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="NotificationType-description" id="label-NotificationType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="NotificationType-description" formControlName="description" placeholder="Enter Description" class="form-control notification-type-input" [disabled]="!userIsSchedulerNotificationTypeWriter()"></textarea>
                                <div *ngIf="notificationTypeForm.get('description')?.invalid && notificationTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="NotificationType-sequence" id="label-NotificationType-sequence">Sequence</label>
                                <input type="number" id="NotificationType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control notification-type-input" [disabled]="!userIsSchedulerNotificationTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="NotificationType-color" id="label-NotificationType-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="NotificationType-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerNotificationTypeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="notificationTypeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="NotificationType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerNotificationTypeWriter()" />
                                <label for="NotificationType-active" class="form-check-label" id="label-NotificationType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="NotificationType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerNotificationTypeWriter()" />
                                <label for="NotificationType-deleted" class="form-check-label" id="label-NotificationType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="notification-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="notificationTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Notification Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !notificationTypeForm.valid || !notificationTypeForm.dirty || notificationTypeForm.pristine  || userIsSchedulerNotificationTypeWriter() == false " ngbTooltip="Save the Notification Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Notification Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerNotificationTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 notification-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="notificationSubscriptionService.userIsSchedulerNotificationSubscriptionReader()">
                            <button ngbNavLink>Notification Subscriptions
                                <span class="badge bg-primary ms-2">
                                    {{ (notificationTypeData?.NotificationSubscriptionsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-notification-subscription-table [queryParams]="{ notificationTypeId: notificationTypeData?.id }"></app-notification-subscription-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-notification-subscription-add-edit [preSeededData]="{ notificationTypeId: notificationTypeData?.id }" [hiddenFields]="['notificationTypeId']"></app-notification-subscription-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
