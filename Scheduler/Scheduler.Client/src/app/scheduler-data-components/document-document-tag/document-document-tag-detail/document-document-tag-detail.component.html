<div class="container-fluid p-1 m-0 document-document-tag-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="document-document-tag-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Document Document Tag</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Document Document Tag' : 'Add Document Document Tag'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerDocumentDocumentTagReader()">
                <div class="col m-2 document-document-tag-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="documentDocumentTagForm" (ngSubmit)="submitForm()" class="document-document-tag-details-form">
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="DocumentDocumentTag-versionNumber" id="label-DocumentDocumentTag-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="DocumentDocumentTag-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control document-document-tag-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="DocumentDocumentTag-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerDocumentDocumentTagWriter()" />
                                <label for="DocumentDocumentTag-active" class="form-check-label" id="label-DocumentDocumentTag-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="DocumentDocumentTag-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerDocumentDocumentTagWriter()" />
                                <label for="DocumentDocumentTag-deleted" class="form-check-label" id="label-DocumentDocumentTag-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('documentId')">
                                <label for="DocumentDocumentTag-documentId" id="label-DocumentDocumentTag-documentId"><span class="text-danger">*</span>Document</label>
                                <select id="DocumentDocumentTag-documentId" formControlName="documentId" class="form-select document-document-tag-select" [disabled]="!userIsSchedulerDocumentDocumentTagWriter()">
                                    <option [ngValue]="null">Select Document</option>
                                    <option *ngFor="let document of documents$ | async" [ngValue]="document.id">{{document.name}}</option>
                                </select>
                                <div *ngIf="documentDocumentTagForm.get('documentId')?.invalid && documentDocumentTagForm.get('documentId')?.touched" class="text-danger">
                                    Document is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('documentTagId')">
                                <label for="DocumentDocumentTag-documentTagId" id="label-DocumentDocumentTag-documentTagId"><span class="text-danger">*</span>Document Tag</label>
                                <select id="DocumentDocumentTag-documentTagId" formControlName="documentTagId" class="form-select document-document-tag-select" [disabled]="!userIsSchedulerDocumentDocumentTagWriter()">
                                    <option [ngValue]="null">Select Document Tag</option>
                                    <option *ngFor="let documentTag of documentTags$ | async" [ngValue]="documentTag.id">{{documentTag.name}}</option>
                                </select>
                                <div *ngIf="documentDocumentTagForm.get('documentTagId')?.invalid && documentDocumentTagForm.get('documentTagId')?.touched" class="text-danger">
                                    Document Tag is required
                                </div>
                            </div>
                            <div class="document-document-tag-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="documentDocumentTagForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Document Document Tag">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !documentDocumentTagForm.valid || !documentDocumentTagForm.dirty || documentDocumentTagForm.pristine  || userIsSchedulerDocumentDocumentTagWriter() == false " ngbTooltip="Save the Document Document Tag changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Document Document Tag' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerDocumentDocumentTagReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 document-document-tag-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="documentDocumentTagChangeHistoryService.userIsSchedulerDocumentDocumentTagChangeHistoryReader()">
                            <button ngbNavLink>Document Document Tag Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (documentDocumentTagData?.DocumentDocumentTagChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-document-document-tag-change-history-table [queryParams]="{ documentDocumentTagId: documentDocumentTagData?.id }" [showAddButton]="true" [preSeededData]="{ documentDocumentTagId: documentDocumentTagData?.id }" [hiddenFields]="['documentDocumentTagId']"></app-document-document-tag-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
