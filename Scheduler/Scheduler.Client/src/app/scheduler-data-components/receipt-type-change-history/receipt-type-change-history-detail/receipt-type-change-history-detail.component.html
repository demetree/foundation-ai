<div class="container-fluid p-1 m-0 receipt-type-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="receipt-type-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Receipt Type Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Receipt Type Change History' : 'Add Receipt Type Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerReceiptTypeChangeHistoryReader()">
                <div class="col m-2 receipt-type-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="receiptTypeChangeHistoryForm" (ngSubmit)="submitForm()" class="receipt-type-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('receiptTypeId')">
                                <label for="ReceiptTypeChangeHistory-receiptTypeId" id="label-ReceiptTypeChangeHistory-receiptTypeId"><span class="text-danger">*</span>Receipt Type</label>
                                <select id="ReceiptTypeChangeHistory-receiptTypeId" formControlName="receiptTypeId" class="form-select receipt-type-change-history-select" [disabled]="!userIsSchedulerReceiptTypeChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Receipt Type</option>
                                    <option *ngFor="let receiptType of receiptTypes$ | async" [ngValue]="receiptType.id">{{receiptType.name}}</option>
                                </select>
                                <div *ngIf="receiptTypeChangeHistoryForm.get('receiptTypeId')?.invalid && receiptTypeChangeHistoryForm.get('receiptTypeId')?.touched" class="text-danger">
                                    Receipt Type is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ReceiptTypeChangeHistory-versionNumber" id="label-ReceiptTypeChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ReceiptTypeChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control receipt-type-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="ReceiptTypeChangeHistory-timeStamp" id="label-ReceiptTypeChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="ReceiptTypeChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control receipt-type-change-history-input" [disabled]="!userIsSchedulerReceiptTypeChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="receiptTypeChangeHistoryForm.get('timeStamp')?.invalid && receiptTypeChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="ReceiptTypeChangeHistory-userId" id="label-ReceiptTypeChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="ReceiptTypeChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control receipt-type-change-history-input" [disabled]="!userIsSchedulerReceiptTypeChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="receiptTypeChangeHistoryForm.get('userId')?.invalid && receiptTypeChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="ReceiptTypeChangeHistory-data" id="label-ReceiptTypeChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="ReceiptTypeChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control receipt-type-change-history-input" [disabled]="!userIsSchedulerReceiptTypeChangeHistoryWriter()"></textarea>
                                <div *ngIf="receiptTypeChangeHistoryForm.get('data')?.invalid && receiptTypeChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="receipt-type-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="receiptTypeChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Receipt Type Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !receiptTypeChangeHistoryForm.valid || !receiptTypeChangeHistoryForm.dirty || receiptTypeChangeHistoryForm.pristine  || userIsSchedulerReceiptTypeChangeHistoryWriter() == false " ngbTooltip="Save the Receipt Type Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Receipt Type Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
