<div class="container-fluid p-1 m-0 rate-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="rate-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Rate Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Rate Type' : 'Add Rate Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerRateTypeReader()">
                <div class="col m-2 rate-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="rateTypeForm" (ngSubmit)="submitForm()" class="rate-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="RateType-name" id="label-RateType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="RateType-name" formControlName="name" placeholder="Enter Name" class="form-control rate-type-input" [disabled]="!userIsSchedulerRateTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="rateTypeForm.get('name')?.invalid && rateTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="RateType-description" id="label-RateType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="RateType-description" formControlName="description" placeholder="Enter Description" class="form-control rate-type-input" [disabled]="!userIsSchedulerRateTypeWriter()"></textarea>
                                <div *ngIf="rateTypeForm.get('description')?.invalid && rateTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="RateType-sequence" id="label-RateType-sequence">Sequence</label>
                                <input type="number" id="RateType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control rate-type-input" [disabled]="!userIsSchedulerRateTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="RateType-color" id="label-RateType-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="RateType-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerRateTypeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="rateTypeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="RateType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerRateTypeWriter()" />
                                <label for="RateType-active" class="form-check-label" id="label-RateType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="RateType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerRateTypeWriter()" />
                                <label for="RateType-deleted" class="form-check-label" id="label-RateType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="rate-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="rateTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Rate Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !rateTypeForm.valid || !rateTypeForm.dirty || rateTypeForm.pristine  || userIsSchedulerRateTypeWriter() == false " ngbTooltip="Save the Rate Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Rate Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerRateTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 rate-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="chargeTypeService.userIsSchedulerChargeTypeReader()">
                            <button ngbNavLink>Charge Types
                                <span class="badge bg-primary ms-2">
                                    {{ (rateTypeData?.ChargeTypesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-charge-type-table [queryParams]="{ rateTypeId: rateTypeData?.id }" [showAddButton]="true" [preSeededData]="{ rateTypeId: rateTypeData?.id }" [hiddenFields]="['rateTypeId']"></app-charge-type-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="rateSheetService.userIsSchedulerRateSheetReader()">
                            <button ngbNavLink>Rate Sheets
                                <span class="badge bg-primary ms-2">
                                    {{ (rateTypeData?.RateSheetsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-rate-sheet-table [queryParams]="{ rateTypeId: rateTypeData?.id }" [showAddButton]="true" [preSeededData]="{ rateTypeId: rateTypeData?.id }" [hiddenFields]="['rateTypeId']"></app-rate-sheet-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="eventChargeService.userIsSchedulerEventChargeReader()">
                            <button ngbNavLink>Event Charges
                                <span class="badge bg-primary ms-2">
                                    {{ (rateTypeData?.EventChargesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-event-charge-table [queryParams]="{ rateTypeId: rateTypeData?.id }" [showAddButton]="true" [preSeededData]="{ rateTypeId: rateTypeData?.id }" [hiddenFields]="['rateTypeId']"></app-event-charge-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
