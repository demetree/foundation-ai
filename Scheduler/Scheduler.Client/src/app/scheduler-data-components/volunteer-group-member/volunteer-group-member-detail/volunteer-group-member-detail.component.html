<div class="container-fluid p-1 m-0 volunteer-group-member-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="volunteer-group-member-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Volunteer Group Member</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Volunteer Group Member' : 'Add Volunteer Group Member'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerVolunteerGroupMemberReader()">
                <div class="col m-2 volunteer-group-member-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="volunteerGroupMemberForm" (ngSubmit)="submitForm()" class="volunteer-group-member-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('volunteerGroupId')">
                                <label for="VolunteerGroupMember-volunteerGroupId" id="label-VolunteerGroupMember-volunteerGroupId"><span class="text-danger">*</span>Volunteer Group</label>
                                <select id="VolunteerGroupMember-volunteerGroupId" formControlName="volunteerGroupId" class="form-select volunteer-group-member-select" [disabled]="!userIsSchedulerVolunteerGroupMemberWriter()">
                                    <option [ngValue]="null">Select Volunteer Group</option>
                                    <option *ngFor="let volunteerGroup of volunteerGroups$ | async" [ngValue]="volunteerGroup.id">{{[volunteerGroup.name] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="volunteerGroupMemberForm.get('volunteerGroupId')?.invalid && volunteerGroupMemberForm.get('volunteerGroupId')?.touched" class="text-danger">
                                    Volunteer Group is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('resourceId')">
                                <label for="VolunteerGroupMember-resourceId" id="label-VolunteerGroupMember-resourceId"><span class="text-danger">*</span>Resource</label>
                                <select id="VolunteerGroupMember-resourceId" formControlName="resourceId" class="form-select volunteer-group-member-select" [disabled]="!userIsSchedulerVolunteerGroupMemberWriter()">
                                    <option [ngValue]="null">Select Resource</option>
                                    <option *ngFor="let resource of resources$ | async" [ngValue]="resource.id">{{[resource.name] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="volunteerGroupMemberForm.get('resourceId')?.invalid && volunteerGroupMemberForm.get('resourceId')?.touched" class="text-danger">
                                    Resource is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('assignmentRoleId')">
                                <label for="VolunteerGroupMember-assignmentRoleId" id="label-VolunteerGroupMember-assignmentRoleId">Assignment Role</label>
                                <select id="VolunteerGroupMember-assignmentRoleId" formControlName="assignmentRoleId" class="form-select volunteer-group-member-select" [disabled]="!userIsSchedulerVolunteerGroupMemberWriter()">
                                    <option [ngValue]="null">Select Assignment Role</option>
                                    <option *ngFor="let assignmentRole of assignmentRoles$ | async" [ngValue]="assignmentRole.id">{{assignmentRole.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="VolunteerGroupMember-sequence" id="label-VolunteerGroupMember-sequence"><span class="text-danger">*</span>Sequence</label>
                                <input type="number" id="VolunteerGroupMember-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control volunteer-group-member-input" [disabled]="!userIsSchedulerVolunteerGroupMemberWriter()" aria-labelledby="label-sequence" />
                                <div *ngIf="volunteerGroupMemberForm.get('sequence')?.invalid && volunteerGroupMemberForm.get('sequence')?.touched" class="text-danger">
                                    Sequence is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('joinedDate')">
                                <label for="VolunteerGroupMember-joinedDate" id="label-VolunteerGroupMember-joinedDate">Joined Date</label>
                                <input type="date" id="VolunteerGroupMember-joinedDate" formControlName="joinedDate" placeholder="Enter Joined Date" class="form-control volunteer-group-member-input" [disabled]="!userIsSchedulerVolunteerGroupMemberWriter()" aria-labelledby="label-joinedDate" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('leftDate')">
                                <label for="VolunteerGroupMember-leftDate" id="label-VolunteerGroupMember-leftDate">Left Date</label>
                                <input type="date" id="VolunteerGroupMember-leftDate" formControlName="leftDate" placeholder="Enter Left Date" class="form-control volunteer-group-member-input" [disabled]="!userIsSchedulerVolunteerGroupMemberWriter()" aria-labelledby="label-leftDate" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('notes')">
                                <label for="VolunteerGroupMember-notes" id="label-VolunteerGroupMember-notes">Notes</label>
                                <textarea id="VolunteerGroupMember-notes" formControlName="notes" placeholder="Enter Notes" class="form-control volunteer-group-member-input" [disabled]="!userIsSchedulerVolunteerGroupMemberWriter()"></textarea>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="VolunteerGroupMember-versionNumber" id="label-VolunteerGroupMember-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="VolunteerGroupMember-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control volunteer-group-member-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="VolunteerGroupMember-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerVolunteerGroupMemberWriter()" />
                                <label for="VolunteerGroupMember-active" class="form-check-label" id="label-VolunteerGroupMember-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="VolunteerGroupMember-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerVolunteerGroupMemberWriter()" />
                                <label for="VolunteerGroupMember-deleted" class="form-check-label" id="label-VolunteerGroupMember-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="volunteer-group-member-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="volunteerGroupMemberForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Volunteer Group Member">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !volunteerGroupMemberForm.valid || !volunteerGroupMemberForm.dirty || volunteerGroupMemberForm.pristine  || userIsSchedulerVolunteerGroupMemberWriter() == false " ngbTooltip="Save the Volunteer Group Member changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Volunteer Group Member' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerVolunteerGroupMemberReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 volunteer-group-member-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="volunteerGroupMemberChangeHistoryService.userIsSchedulerVolunteerGroupMemberChangeHistoryReader()">
                            <button ngbNavLink>Volunteer Group Member Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (volunteerGroupMemberData?.VolunteerGroupMemberChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-volunteer-group-member-change-history-table [queryParams]="{ volunteerGroupMemberId: volunteerGroupMemberData?.id }" [showAddButton]="true" [preSeededData]="{ volunteerGroupMemberId: volunteerGroupMemberData?.id }" [hiddenFields]="['volunteerGroupMemberId']"></app-volunteer-group-member-change-history-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
