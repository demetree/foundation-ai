<div class="add-scheduled-event-dependency-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-scheduled-event-dependency-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Scheduled Event Dependency Change History" 
        *ngIf="userIsSchedulerScheduledEventDependencyChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #scheduledEventDependencyChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light scheduled-event-dependency-change-history-modal-header">
      <h5 class="modal-title mb-0" id="scheduledEventDependencyChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Scheduled Event Dependency Change History' : 'Add Scheduled Event Dependency Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body scheduled-event-dependency-change-history-modal-body">
      <form [formGroup]="scheduledEventDependencyChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('scheduledEventDependencyId')">
                <label for="ScheduledEventDependencyChangeHistory-scheduledEventDependencyId" id="label-ScheduledEventDependencyChangeHistory-scheduledEventDependencyId"><span class="text-danger">*</span>Scheduled Event Dependency</label>
                <select id="ScheduledEventDependencyChangeHistory-scheduledEventDependencyId" formControlName="scheduledEventDependencyId" class="form-select scheduled-event-dependency-change-history-select" [disabled]="!userIsSchedulerScheduledEventDependencyChangeHistoryWriter()">
                    <option [ngValue]="null">Select Scheduled Event Dependency</option>
                    <option *ngFor="let scheduledEventDependency of scheduledEventDependencies$ | async" [ngValue]="scheduledEventDependency.id">{{scheduledEventDependency.id}}</option>
                </select>
                <div *ngIf="scheduledEventDependencyChangeHistoryForm.get('scheduledEventDependencyId')?.invalid && scheduledEventDependencyChangeHistoryForm.get('scheduledEventDependencyId')?.touched" class="text-danger">
                    Scheduled Event Dependency is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ScheduledEventDependencyChangeHistory-versionNumber" id="label-ScheduledEventDependencyChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ScheduledEventDependencyChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control scheduled-event-dependency-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="ScheduledEventDependencyChangeHistory-timeStamp" id="label-ScheduledEventDependencyChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="ScheduledEventDependencyChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control scheduled-event-dependency-change-history-input" [disabled]="!userIsSchedulerScheduledEventDependencyChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="scheduledEventDependencyChangeHistoryForm.get('timeStamp')?.invalid && scheduledEventDependencyChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="ScheduledEventDependencyChangeHistory-userId" id="label-ScheduledEventDependencyChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="ScheduledEventDependencyChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control scheduled-event-dependency-change-history-input" [disabled]="!userIsSchedulerScheduledEventDependencyChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="scheduledEventDependencyChangeHistoryForm.get('userId')?.invalid && scheduledEventDependencyChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="ScheduledEventDependencyChangeHistory-data" id="label-ScheduledEventDependencyChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="ScheduledEventDependencyChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control scheduled-event-dependency-change-history-input" [disabled]="!userIsSchedulerScheduledEventDependencyChangeHistoryWriter()"></textarea>
                <div *ngIf="scheduledEventDependencyChangeHistoryForm.get('data')?.invalid && scheduledEventDependencyChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer scheduled-event-dependency-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Scheduled Event Dependency Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !scheduledEventDependencyChangeHistoryForm.valid || scheduledEventDependencyChangeHistoryForm.pristine || !userIsSchedulerScheduledEventDependencyChangeHistoryWriter()" ngbTooltip="Save the Scheduled Event Dependency Change History changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
