<div class="container-fluid p-1 m-0 tenant-profile-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="tenant-profile-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Tenant Profile Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Tenant Profile Change History' : 'Add Tenant Profile Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerTenantProfileChangeHistoryReader()">
                <div class="col m-2 tenant-profile-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="tenantProfileChangeHistoryForm" (ngSubmit)="submitForm()" class="tenant-profile-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('tenantProfileId')">
                                <label for="TenantProfileChangeHistory-tenantProfileId" id="label-TenantProfileChangeHistory-tenantProfileId"><span class="text-danger">*</span>Tenant Profile</label>
                                <select id="TenantProfileChangeHistory-tenantProfileId" formControlName="tenantProfileId" class="form-select tenant-profile-change-history-select" [disabled]="!userIsSchedulerTenantProfileChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Tenant Profile</option>
                                    <option *ngFor="let tenantProfile of tenantProfiles$ | async" [ngValue]="tenantProfile.id">{{tenantProfile.name}}</option>
                                </select>
                                <div *ngIf="tenantProfileChangeHistoryForm.get('tenantProfileId')?.invalid && tenantProfileChangeHistoryForm.get('tenantProfileId')?.touched" class="text-danger">
                                    Tenant Profile is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="TenantProfileChangeHistory-versionNumber" id="label-TenantProfileChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="TenantProfileChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control tenant-profile-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="TenantProfileChangeHistory-timeStamp" id="label-TenantProfileChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="TenantProfileChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control tenant-profile-change-history-input" [disabled]="!userIsSchedulerTenantProfileChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="tenantProfileChangeHistoryForm.get('timeStamp')?.invalid && tenantProfileChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="TenantProfileChangeHistory-userId" id="label-TenantProfileChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="TenantProfileChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control tenant-profile-change-history-input" [disabled]="!userIsSchedulerTenantProfileChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="tenantProfileChangeHistoryForm.get('userId')?.invalid && tenantProfileChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="TenantProfileChangeHistory-data" id="label-TenantProfileChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="TenantProfileChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control tenant-profile-change-history-input" [disabled]="!userIsSchedulerTenantProfileChangeHistoryWriter()"></textarea>
                                <div *ngIf="tenantProfileChangeHistoryForm.get('data')?.invalid && tenantProfileChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="tenant-profile-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="tenantProfileChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Tenant Profile Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !tenantProfileChangeHistoryForm.valid || !tenantProfileChangeHistoryForm.dirty || tenantProfileChangeHistoryForm.pristine  || userIsSchedulerTenantProfileChangeHistoryWriter() == false " ngbTooltip="Save the Tenant Profile Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Tenant Profile Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
