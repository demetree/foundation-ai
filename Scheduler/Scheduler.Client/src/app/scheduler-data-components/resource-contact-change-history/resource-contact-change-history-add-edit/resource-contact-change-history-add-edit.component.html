<div class="add-resource-contact-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-resource-contact-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Resource Contact Change History" 
        *ngIf="userIsSchedulerResourceContactChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #resourceContactChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light resource-contact-change-history-modal-header">
      <h5 class="modal-title mb-0" id="resourceContactChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Resource Contact Change History' : 'Add Resource Contact Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body resource-contact-change-history-modal-body">
      <form [formGroup]="resourceContactChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('resourceContactId')">
                <label for="ResourceContactChangeHistory-resourceContactId" id="label-ResourceContactChangeHistory-resourceContactId"><span class="text-danger">*</span>Resource Contact</label>
                <select id="ResourceContactChangeHistory-resourceContactId" formControlName="resourceContactId" class="form-select resource-contact-change-history-select" [disabled]="!userIsSchedulerResourceContactChangeHistoryWriter()">
                    <option [ngValue]="null">Select Resource Contact</option>
                    <option *ngFor="let resourceContact of resourceContacts$ | async" [ngValue]="resourceContact.id">{{resourceContact.id}}</option>
                </select>
                <div *ngIf="resourceContactChangeHistoryForm.get('resourceContactId')?.invalid && resourceContactChangeHistoryForm.get('resourceContactId')?.touched" class="text-danger">
                    Resource Contact is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ResourceContactChangeHistory-versionNumber" id="label-ResourceContactChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ResourceContactChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control resource-contact-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="ResourceContactChangeHistory-timeStamp" id="label-ResourceContactChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="ResourceContactChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control resource-contact-change-history-input" [disabled]="!userIsSchedulerResourceContactChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="resourceContactChangeHistoryForm.get('timeStamp')?.invalid && resourceContactChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="ResourceContactChangeHistory-userId" id="label-ResourceContactChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="ResourceContactChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control resource-contact-change-history-input" [disabled]="!userIsSchedulerResourceContactChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="resourceContactChangeHistoryForm.get('userId')?.invalid && resourceContactChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="ResourceContactChangeHistory-data" id="label-ResourceContactChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="ResourceContactChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control resource-contact-change-history-input" [disabled]="!userIsSchedulerResourceContactChangeHistoryWriter()"></textarea>
                <div *ngIf="resourceContactChangeHistoryForm.get('data')?.invalid && resourceContactChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer resource-contact-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Resource Contact Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !resourceContactChangeHistoryForm.valid || resourceContactChangeHistoryForm.pristine  || userIsSchedulerResourceContactChangeHistoryWriter() == false " ngbTooltip="Save the Resource Contact Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Resource Contact Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
