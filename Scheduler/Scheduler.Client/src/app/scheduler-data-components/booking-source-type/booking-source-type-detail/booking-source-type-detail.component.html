<div class="container-fluid p-1 m-0 booking-source-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="booking-source-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Booking Source Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Booking Source Type' : 'Add Booking Source Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerBookingSourceTypeReader()">
                <div class="col m-2 booking-source-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="bookingSourceTypeForm" (ngSubmit)="submitForm()" class="booking-source-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="BookingSourceType-name" id="label-BookingSourceType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="BookingSourceType-name" formControlName="name" placeholder="Enter Name" class="form-control booking-source-type-input" [disabled]="!userIsSchedulerBookingSourceTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="bookingSourceTypeForm.get('name')?.invalid && bookingSourceTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="BookingSourceType-description" id="label-BookingSourceType-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="BookingSourceType-description" formControlName="description" placeholder="Enter Description" class="form-control booking-source-type-input" [disabled]="!userIsSchedulerBookingSourceTypeWriter()"></textarea>
                                <div *ngIf="bookingSourceTypeForm.get('description')?.invalid && bookingSourceTypeForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="BookingSourceType-color" id="label-BookingSourceType-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="BookingSourceType-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerBookingSourceTypeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="bookingSourceTypeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="BookingSourceType-sequence" id="label-BookingSourceType-sequence">Sequence</label>
                                <input type="number" id="BookingSourceType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control booking-source-type-input" [disabled]="!userIsSchedulerBookingSourceTypeWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BookingSourceType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerBookingSourceTypeWriter()" />
                                <label for="BookingSourceType-active" class="form-check-label" id="label-BookingSourceType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BookingSourceType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerBookingSourceTypeWriter()" />
                                <label for="BookingSourceType-deleted" class="form-check-label" id="label-BookingSourceType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="booking-source-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="bookingSourceTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Booking Source Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !bookingSourceTypeForm.valid || !bookingSourceTypeForm.dirty || bookingSourceTypeForm.pristine  || userIsSchedulerBookingSourceTypeWriter() == false " ngbTooltip="Save the Booking Source Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Booking Source Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerBookingSourceTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 booking-source-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="scheduledEventService.userIsSchedulerScheduledEventReader()">
                            <button ngbNavLink>Scheduled Events
                                <span class="badge bg-primary ms-2">
                                    {{ (bookingSourceTypeData?.ScheduledEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduled-event-table [queryParams]="{ bookingSourceTypeId: bookingSourceTypeData?.id }" [showAddButton]="true" [preSeededData]="{ bookingSourceTypeId: bookingSourceTypeData?.id }" [hiddenFields]="['bookingSourceTypeId']"></app-scheduled-event-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
