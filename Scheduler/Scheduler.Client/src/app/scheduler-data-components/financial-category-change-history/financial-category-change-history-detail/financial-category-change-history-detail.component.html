<div class="container-fluid p-1 m-0 financial-category-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="financial-category-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Financial Category Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Financial Category Change History' : 'Add Financial Category Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerFinancialCategoryChangeHistoryReader()">
                <div class="col m-2 financial-category-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="financialCategoryChangeHistoryForm" (ngSubmit)="submitForm()" class="financial-category-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('financialCategoryId')">
                                <label for="FinancialCategoryChangeHistory-financialCategoryId" id="label-FinancialCategoryChangeHistory-financialCategoryId"><span class="text-danger">*</span>Financial Category</label>
                                <select id="FinancialCategoryChangeHistory-financialCategoryId" formControlName="financialCategoryId" class="form-select financial-category-change-history-select" [disabled]="!userIsSchedulerFinancialCategoryChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Financial Category</option>
                                    <option *ngFor="let financialCategory of financialCategories$ | async" [ngValue]="financialCategory.id">{{financialCategory.name}}</option>
                                </select>
                                <div *ngIf="financialCategoryChangeHistoryForm.get('financialCategoryId')?.invalid && financialCategoryChangeHistoryForm.get('financialCategoryId')?.touched" class="text-danger">
                                    Financial Category is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="FinancialCategoryChangeHistory-versionNumber" id="label-FinancialCategoryChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="FinancialCategoryChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control financial-category-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="FinancialCategoryChangeHistory-timeStamp" id="label-FinancialCategoryChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="FinancialCategoryChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control financial-category-change-history-input" [disabled]="!userIsSchedulerFinancialCategoryChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="financialCategoryChangeHistoryForm.get('timeStamp')?.invalid && financialCategoryChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="FinancialCategoryChangeHistory-userId" id="label-FinancialCategoryChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="FinancialCategoryChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control financial-category-change-history-input" [disabled]="!userIsSchedulerFinancialCategoryChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="financialCategoryChangeHistoryForm.get('userId')?.invalid && financialCategoryChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="FinancialCategoryChangeHistory-data" id="label-FinancialCategoryChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="FinancialCategoryChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control financial-category-change-history-input" [disabled]="!userIsSchedulerFinancialCategoryChangeHistoryWriter()"></textarea>
                                <div *ngIf="financialCategoryChangeHistoryForm.get('data')?.invalid && financialCategoryChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="financial-category-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="financialCategoryChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Financial Category Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !financialCategoryChangeHistoryForm.valid || !financialCategoryChangeHistoryForm.dirty || financialCategoryChangeHistoryForm.pristine  || userIsSchedulerFinancialCategoryChangeHistoryWriter() == false " ngbTooltip="Save the Financial Category Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Financial Category Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
