<div class="container-fluid p-1 m-0 charge-status-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="charge-status-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Charge Status Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Charge Status Change History' : 'Add Charge Status Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerChargeStatusChangeHistoryReader()">
                <div class="col m-2 charge-status-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="chargeStatusChangeHistoryForm" (ngSubmit)="submitForm()" class="charge-status-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('chargeStatusId')">
                                <label for="ChargeStatusChangeHistory-chargeStatusId" id="label-ChargeStatusChangeHistory-chargeStatusId"><span class="text-danger">*</span>Charge Status</label>
                                <select id="ChargeStatusChangeHistory-chargeStatusId" formControlName="chargeStatusId" class="form-select charge-status-change-history-select" [disabled]="!userIsSchedulerChargeStatusChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Charge Status</option>
                                    <option *ngFor="let chargeStatus of chargeStatuses$ | async" [ngValue]="chargeStatus.id">{{chargeStatus.name}}</option>
                                </select>
                                <div *ngIf="chargeStatusChangeHistoryForm.get('chargeStatusId')?.invalid && chargeStatusChangeHistoryForm.get('chargeStatusId')?.touched" class="text-danger">
                                    Charge Status is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ChargeStatusChangeHistory-versionNumber" id="label-ChargeStatusChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ChargeStatusChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control charge-status-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="ChargeStatusChangeHistory-timeStamp" id="label-ChargeStatusChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="ChargeStatusChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control charge-status-change-history-input" [disabled]="!userIsSchedulerChargeStatusChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="chargeStatusChangeHistoryForm.get('timeStamp')?.invalid && chargeStatusChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="ChargeStatusChangeHistory-userId" id="label-ChargeStatusChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="ChargeStatusChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control charge-status-change-history-input" [disabled]="!userIsSchedulerChargeStatusChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="chargeStatusChangeHistoryForm.get('userId')?.invalid && chargeStatusChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="ChargeStatusChangeHistory-data" id="label-ChargeStatusChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="ChargeStatusChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control charge-status-change-history-input" [disabled]="!userIsSchedulerChargeStatusChangeHistoryWriter()"></textarea>
                                <div *ngIf="chargeStatusChangeHistoryForm.get('data')?.invalid && chargeStatusChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="charge-status-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="chargeStatusChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Charge Status Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !chargeStatusChangeHistoryForm.valid || !chargeStatusChangeHistoryForm.dirty || chargeStatusChangeHistoryForm.pristine  || userIsSchedulerChargeStatusChangeHistoryWriter() == false " ngbTooltip="Save the Charge Status Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Charge Status Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
