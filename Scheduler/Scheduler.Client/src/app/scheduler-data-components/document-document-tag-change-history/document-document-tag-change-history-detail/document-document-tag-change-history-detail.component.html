<div class="container-fluid p-1 m-0 document-document-tag-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="document-document-tag-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Document Document Tag Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Document Document Tag Change History' : 'Add Document Document Tag Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerDocumentDocumentTagChangeHistoryReader()">
                <div class="col m-2 document-document-tag-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="documentDocumentTagChangeHistoryForm" (ngSubmit)="submitForm()" class="document-document-tag-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('documentDocumentTagId')">
                                <label for="DocumentDocumentTagChangeHistory-documentDocumentTagId" id="label-DocumentDocumentTagChangeHistory-documentDocumentTagId"><span class="text-danger">*</span>Document Document Tag</label>
                                <select id="DocumentDocumentTagChangeHistory-documentDocumentTagId" formControlName="documentDocumentTagId" class="form-select document-document-tag-change-history-select" [disabled]="!userIsSchedulerDocumentDocumentTagChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Document Document Tag</option>
                                    <option *ngFor="let documentDocumentTag of documentDocumentTags$ | async" [ngValue]="documentDocumentTag.id">{{documentDocumentTag.id}}</option>
                                </select>
                                <div *ngIf="documentDocumentTagChangeHistoryForm.get('documentDocumentTagId')?.invalid && documentDocumentTagChangeHistoryForm.get('documentDocumentTagId')?.touched" class="text-danger">
                                    Document Document Tag is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="DocumentDocumentTagChangeHistory-versionNumber" id="label-DocumentDocumentTagChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="DocumentDocumentTagChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control document-document-tag-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="DocumentDocumentTagChangeHistory-timeStamp" id="label-DocumentDocumentTagChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="DocumentDocumentTagChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control document-document-tag-change-history-input" [disabled]="!userIsSchedulerDocumentDocumentTagChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="documentDocumentTagChangeHistoryForm.get('timeStamp')?.invalid && documentDocumentTagChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="DocumentDocumentTagChangeHistory-userId" id="label-DocumentDocumentTagChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="DocumentDocumentTagChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control document-document-tag-change-history-input" [disabled]="!userIsSchedulerDocumentDocumentTagChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="documentDocumentTagChangeHistoryForm.get('userId')?.invalid && documentDocumentTagChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="DocumentDocumentTagChangeHistory-data" id="label-DocumentDocumentTagChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="DocumentDocumentTagChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control document-document-tag-change-history-input" [disabled]="!userIsSchedulerDocumentDocumentTagChangeHistoryWriter()"></textarea>
                                <div *ngIf="documentDocumentTagChangeHistoryForm.get('data')?.invalid && documentDocumentTagChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="document-document-tag-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="documentDocumentTagChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Document Document Tag Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !documentDocumentTagChangeHistoryForm.valid || !documentDocumentTagChangeHistoryForm.dirty || documentDocumentTagChangeHistoryForm.pristine  || userIsSchedulerDocumentDocumentTagChangeHistoryWriter() == false " ngbTooltip="Save the Document Document Tag Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Document Document Tag Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
