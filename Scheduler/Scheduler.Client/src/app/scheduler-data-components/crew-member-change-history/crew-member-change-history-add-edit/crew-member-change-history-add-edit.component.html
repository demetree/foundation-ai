<div class="add-crew-member-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-crew-member-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Crew Member Change History" 
        *ngIf="userIsSchedulerCrewMemberChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #crewMemberChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light crew-member-change-history-modal-header">
      <h5 class="modal-title mb-0" id="crewMemberChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Crew Member Change History' : 'Add Crew Member Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body crew-member-change-history-modal-body">
      <form [formGroup]="crewMemberChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('crewMemberId')">
                <label for="CrewMemberChangeHistory-crewMemberId" id="label-CrewMemberChangeHistory-crewMemberId"><span class="text-danger">*</span>Crew Member</label>
                <select id="CrewMemberChangeHistory-crewMemberId" formControlName="crewMemberId" class="form-select crew-member-change-history-select" [disabled]="!userIsSchedulerCrewMemberChangeHistoryWriter()">
                    <option [ngValue]="null">Select Crew Member</option>
                    <option *ngFor="let crewMember of crewMembers$ | async" [ngValue]="crewMember.id">{{crewMember.color}}</option>
                </select>
                <div *ngIf="crewMemberChangeHistoryForm.get('crewMemberId')?.invalid && crewMemberChangeHistoryForm.get('crewMemberId')?.touched" class="text-danger">
                    Crew Member is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="CrewMemberChangeHistory-versionNumber" id="label-CrewMemberChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="CrewMemberChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control crew-member-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="CrewMemberChangeHistory-timeStamp" id="label-CrewMemberChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="CrewMemberChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control crew-member-change-history-input" [disabled]="!userIsSchedulerCrewMemberChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="crewMemberChangeHistoryForm.get('timeStamp')?.invalid && crewMemberChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="CrewMemberChangeHistory-userId" id="label-CrewMemberChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="CrewMemberChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control crew-member-change-history-input" [disabled]="!userIsSchedulerCrewMemberChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="crewMemberChangeHistoryForm.get('userId')?.invalid && crewMemberChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="CrewMemberChangeHistory-data" id="label-CrewMemberChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="CrewMemberChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control crew-member-change-history-input" [disabled]="!userIsSchedulerCrewMemberChangeHistoryWriter()"></textarea>
                <div *ngIf="crewMemberChangeHistoryForm.get('data')?.invalid && crewMemberChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer crew-member-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Crew Member Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !crewMemberChangeHistoryForm.valid || crewMemberChangeHistoryForm.pristine || !userIsSchedulerCrewMemberChangeHistoryWriter()" ngbTooltip="Save the Crew Member Change History changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
