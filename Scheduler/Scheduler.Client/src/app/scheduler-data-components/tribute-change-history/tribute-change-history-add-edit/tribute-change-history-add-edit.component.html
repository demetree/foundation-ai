<div class="add-tribute-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-tribute-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Tribute Change History" 
        *ngIf="userIsSchedulerTributeChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #tributeChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light tribute-change-history-modal-header">
      <h5 class="modal-title mb-0" id="tributeChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Tribute Change History' : 'Add Tribute Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body tribute-change-history-modal-body">
      <form [formGroup]="tributeChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('tributeId')">
                <label for="TributeChangeHistory-tributeId" id="label-TributeChangeHistory-tributeId"><span class="text-danger">*</span>Tribute</label>
                <select id="TributeChangeHistory-tributeId" formControlName="tributeId" class="form-select tribute-change-history-select" [disabled]="!userIsSchedulerTributeChangeHistoryWriter()">
                    <option [ngValue]="null">Select Tribute</option>
                    <option *ngFor="let tribute of tributes$ | async" [ngValue]="tribute.id">{{tribute.name}}</option>
                </select>
                <div *ngIf="tributeChangeHistoryForm.get('tributeId')?.invalid && tributeChangeHistoryForm.get('tributeId')?.touched" class="text-danger">
                    Tribute is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="TributeChangeHistory-versionNumber" id="label-TributeChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="TributeChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control tribute-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="TributeChangeHistory-timeStamp" id="label-TributeChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="TributeChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control tribute-change-history-input" [disabled]="!userIsSchedulerTributeChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="tributeChangeHistoryForm.get('timeStamp')?.invalid && tributeChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="TributeChangeHistory-userId" id="label-TributeChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="TributeChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control tribute-change-history-input" [disabled]="!userIsSchedulerTributeChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="tributeChangeHistoryForm.get('userId')?.invalid && tributeChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="TributeChangeHistory-data" id="label-TributeChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="TributeChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control tribute-change-history-input" [disabled]="!userIsSchedulerTributeChangeHistoryWriter()"></textarea>
                <div *ngIf="tributeChangeHistoryForm.get('data')?.invalid && tributeChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer tribute-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Tribute Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !tributeChangeHistoryForm.valid || tributeChangeHistoryForm.pristine || !userIsSchedulerTributeChangeHistoryWriter()" ngbTooltip="Save the Tribute Change History changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
