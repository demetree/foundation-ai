<div class="add-notification" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-notification me-2"
        (click)="openModal()"
        ngbTooltip="Add Notification" 
        *ngIf="userIsSchedulerNotificationWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #notificationModal let-modal>
   <div class="modal-header notification-modal-header">
      <h5 class="modal-title mb-0" id="notificationModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Notification' : 'Add Notification' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body notification-modal-body">
      <form [formGroup]="notificationForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('notificationTypeId')">
                <label for="Notification-notificationTypeId" id="label-Notification-notificationTypeId">Notification Type</label>
                <select id="Notification-notificationTypeId" formControlName="notificationTypeId" class="form-select notification-select" [disabled]="!userIsSchedulerNotificationWriter()">
                    <option [ngValue]="null">Select Notification Type</option>
                    <option *ngFor="let notificationType of notificationTypes$ | async" [ngValue]="notificationType.id">{{notificationType.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('createdByUserId')">
                <label for="Notification-createdByUserId" id="label-Notification-createdByUserId">Created By User Id</label>
                <input type="number" id="Notification-createdByUserId" formControlName="createdByUserId" placeholder="Enter Created By User Id" class="form-control notification-input" [disabled]="!userIsSchedulerNotificationWriter()" aria-labelledby="label-createdByUserId" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('message')">
                <label for="Notification-message" id="label-Notification-message"><span class="text-danger">*</span>Message</label>
                <textarea id="Notification-message" formControlName="message" placeholder="Enter Message" class="form-control notification-input" [disabled]="!userIsSchedulerNotificationWriter()"></textarea>
                <div *ngIf="notificationForm.get('message')?.invalid && notificationForm.get('message')?.touched" class="text-danger">
                    Message is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('priority')">
                <label for="Notification-priority" id="label-Notification-priority"><span class="text-danger">*</span>Priority</label>
                <input type="number" id="Notification-priority" formControlName="priority" placeholder="Enter Priority" class="form-control notification-input" [disabled]="!userIsSchedulerNotificationWriter()" aria-labelledby="label-priority" />
                <div *ngIf="notificationForm.get('priority')?.invalid && notificationForm.get('priority')?.touched" class="text-danger">
                    Priority is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('entity')">
                <label for="Notification-entity" id="label-Notification-entity">Entity</label>
                <input type="text" id="Notification-entity" formControlName="entity" placeholder="Enter Entity" class="form-control notification-input" [disabled]="!userIsSchedulerNotificationWriter()" aria-labelledby="label-entity" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('entityId')">
                <label for="Notification-entityId" id="label-Notification-entityId">Entity Id</label>
                <input type="number" id="Notification-entityId" formControlName="entityId" placeholder="Enter Entity Id" class="form-control notification-input" [disabled]="!userIsSchedulerNotificationWriter()" aria-labelledby="label-entityId" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('externalURL')">
                <label for="Notification-externalURL" id="label-Notification-externalURL">External U R L</label>
                <textarea id="Notification-externalURL" formControlName="externalURL" placeholder="Enter External U R L" class="form-control notification-input" [disabled]="!userIsSchedulerNotificationWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('dateTimeCreated')">
                <label for="Notification-dateTimeCreated" id="label-Notification-dateTimeCreated"><span class="text-danger">*</span>Date Time Created</label>
                <input type="datetime-local" id="Notification-dateTimeCreated" formControlName="dateTimeCreated" placeholder="Enter Date Time Created" class="form-control notification-input" [disabled]="!userIsSchedulerNotificationWriter()" aria-labelledby="label-dateTimeCreated" />
                <div *ngIf="notificationForm.get('dateTimeCreated')?.invalid && notificationForm.get('dateTimeCreated')?.touched" class="text-danger">
                    Date Time Created is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('dateTimeDistributed')">
                <label for="Notification-dateTimeDistributed" id="label-Notification-dateTimeDistributed">Date Time Distributed</label>
                <input type="datetime-local" id="Notification-dateTimeDistributed" formControlName="dateTimeDistributed" placeholder="Enter Date Time Distributed" class="form-control notification-input" [disabled]="!userIsSchedulerNotificationWriter()" aria-labelledby="label-dateTimeDistributed" />
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('distributionCompleted')">
                <input type="checkbox" id="Notification-distributionCompleted" formControlName="distributionCompleted" class="form-check-input" [disabled]="!userIsSchedulerNotificationWriter()" />
                <label for="Notification-distributionCompleted" class="form-check-label" id="label-Notification-distributionCompleted"><span class="text-danger">*</span>Distribution Completed</label>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="Notification-userId" id="label-Notification-userId">User Id</label>
                <input type="number" id="Notification-userId" formControlName="userId" placeholder="Enter User Id" class="form-control notification-input" [disabled]="!userIsSchedulerNotificationWriter()" aria-labelledby="label-userId" />
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="Notification-versionNumber" id="label-Notification-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="Notification-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control notification-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="Notification-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerNotificationWriter()" />
                <label for="Notification-active" class="form-check-label" id="label-Notification-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="Notification-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerNotificationWriter()" />
                <label for="Notification-deleted" class="form-check-label" id="label-Notification-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer notification-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Notification changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !notificationForm.valid || notificationForm.pristine  || userIsSchedulerNotificationWriter() == false " ngbTooltip="Save the Notification changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Notification' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
