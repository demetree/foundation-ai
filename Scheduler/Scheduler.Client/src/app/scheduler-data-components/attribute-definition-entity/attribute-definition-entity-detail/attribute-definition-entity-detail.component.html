<div class="container-fluid p-1 m-0 attribute-definition-entity-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="attribute-definition-entity-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Attribute Definition Entity</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Attribute Definition Entity' : 'Add Attribute Definition Entity'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerAttributeDefinitionEntityReader()">
                <div class="col m-2 attribute-definition-entity-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="attributeDefinitionEntityForm" (ngSubmit)="submitForm()" class="attribute-definition-entity-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="AttributeDefinitionEntity-name" id="label-AttributeDefinitionEntity-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="AttributeDefinitionEntity-name" formControlName="name" placeholder="Enter Name" class="form-control attribute-definition-entity-input" [disabled]="!userIsSchedulerAttributeDefinitionEntityWriter()" aria-labelledby="label-name" />
                                <div *ngIf="attributeDefinitionEntityForm.get('name')?.invalid && attributeDefinitionEntityForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="AttributeDefinitionEntity-description" id="label-AttributeDefinitionEntity-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="AttributeDefinitionEntity-description" formControlName="description" placeholder="Enter Description" class="form-control attribute-definition-entity-input" [disabled]="!userIsSchedulerAttributeDefinitionEntityWriter()"></textarea>
                                <div *ngIf="attributeDefinitionEntityForm.get('description')?.invalid && attributeDefinitionEntityForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="AttributeDefinitionEntity-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerAttributeDefinitionEntityWriter()" />
                                <label for="AttributeDefinitionEntity-active" class="form-check-label" id="label-AttributeDefinitionEntity-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="AttributeDefinitionEntity-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerAttributeDefinitionEntityWriter()" />
                                <label for="AttributeDefinitionEntity-deleted" class="form-check-label" id="label-AttributeDefinitionEntity-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="attribute-definition-entity-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="attributeDefinitionEntityForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Attribute Definition Entity">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !attributeDefinitionEntityForm.valid || !attributeDefinitionEntityForm.dirty || attributeDefinitionEntityForm.pristine  || userIsSchedulerAttributeDefinitionEntityWriter() == false " ngbTooltip="Save the Attribute Definition Entity changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Attribute Definition Entity' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerAttributeDefinitionEntityReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 attribute-definition-entity-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="attributeDefinitionService.userIsSchedulerAttributeDefinitionReader()">
                            <button ngbNavLink>Attribute Definitions
                                <span class="badge bg-primary ms-2">
                                    {{ (attributeDefinitionEntityData?.AttributeDefinitionsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-attribute-definition-table [queryParams]="{ attributeDefinitionEntityId: attributeDefinitionEntityData?.id }" [showAddButton]="true" [preSeededData]="{ attributeDefinitionEntityId: attributeDefinitionEntityData?.id }" [hiddenFields]="['attributeDefinitionEntityId']"></app-attribute-definition-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
