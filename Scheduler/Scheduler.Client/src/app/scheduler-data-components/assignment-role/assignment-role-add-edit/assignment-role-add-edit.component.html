<div class="add-assignment-role" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-assignment-role me-2"
        (click)="openModal()"
        ngbTooltip="Add Assignment Role" 
        *ngIf="userIsSchedulerAssignmentRoleWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #assignmentRoleModal let-modal>
   <div class="modal-header bg-dark text-light assignment-role-modal-header">
      <h5 class="modal-title mb-0" id="assignmentRoleModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Assignment Role' : 'Add Assignment Role' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body assignment-role-modal-body">
      <form [formGroup]="assignmentRoleForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="AssignmentRole-name" id="label-AssignmentRole-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="AssignmentRole-name" formControlName="name" placeholder="Enter Name" class="form-control assignment-role-input" [disabled]="!userIsSchedulerAssignmentRoleWriter()" aria-labelledby="label-name" />
                <div *ngIf="assignmentRoleForm.get('name')?.invalid && assignmentRoleForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="AssignmentRole-description" id="label-AssignmentRole-description">Description</label>
                <textarea id="AssignmentRole-description" formControlName="description" placeholder="Enter Description" class="form-control assignment-role-input" [disabled]="!userIsSchedulerAssignmentRoleWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('iconId')">
                <label for="AssignmentRole-iconId" id="label-AssignmentRole-iconId">Icon</label>
                <select id="AssignmentRole-iconId" formControlName="iconId" class="form-select assignment-role-select" [disabled]="!userIsSchedulerAssignmentRoleWriter()">
                    <option [ngValue]="null">Select Icon</option>
                    <option *ngFor="let icon of icons$ | async" [ngValue]="icon.id">{{icon.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('color')">
                <label for="AssignmentRole-color" id="label-AssignmentRole-color">Color</label>
                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="AssignmentRole-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerAssignmentRoleWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="assignmentRoleForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="AssignmentRole-sequence" id="label-AssignmentRole-sequence">Sequence</label>
                <input type="number" id="AssignmentRole-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control assignment-role-input" [disabled]="!userIsSchedulerAssignmentRoleWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="AssignmentRole-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerAssignmentRoleWriter()" />
                <label for="AssignmentRole-active" class="form-check-label" id="label-AssignmentRole-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="AssignmentRole-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerAssignmentRoleWriter()" />
                <label for="AssignmentRole-deleted" class="form-check-label" id="label-AssignmentRole-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer assignment-role-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Assignment Role changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !assignmentRoleForm.valid || assignmentRoleForm.pristine || !userIsSchedulerAssignmentRoleWriter()" ngbTooltip="Save the Assignment Role changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
