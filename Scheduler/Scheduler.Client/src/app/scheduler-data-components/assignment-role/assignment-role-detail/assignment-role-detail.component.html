<div class="container-fluid p-1 m-0 assignment-role-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="assignment-role-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Assignment Role</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Assignment Role' : 'Add Assignment Role'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerAssignmentRoleReader()">
                <div class="col m-2 assignment-role-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="assignmentRoleForm" (ngSubmit)="submitForm()" class="assignment-role-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="AssignmentRole-name" id="label-AssignmentRole-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="AssignmentRole-name" formControlName="name" placeholder="Enter Name" class="form-control assignment-role-input" [disabled]="!userIsSchedulerAssignmentRoleWriter()" aria-labelledby="label-name" />
                                <div *ngIf="assignmentRoleForm.get('name')?.invalid && assignmentRoleForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="AssignmentRole-description" id="label-AssignmentRole-description">Description</label>
                                <textarea id="AssignmentRole-description" formControlName="description" placeholder="Enter Description" class="form-control assignment-role-input" [disabled]="!userIsSchedulerAssignmentRoleWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('iconId')">
                                <label for="AssignmentRole-iconId" id="label-AssignmentRole-iconId">Icon</label>
                                <select id="AssignmentRole-iconId" formControlName="iconId" class="form-select assignment-role-select" [disabled]="!userIsSchedulerAssignmentRoleWriter()">
                                    <option [ngValue]="null">Select Icon</option>
                                    <option *ngFor="let icon of icons$ | async" [ngValue]="icon.id">{{icon.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="AssignmentRole-color" id="label-AssignmentRole-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="AssignmentRole-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerAssignmentRoleWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="assignmentRoleForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="AssignmentRole-sequence" id="label-AssignmentRole-sequence">Sequence</label>
                                <input type="number" id="AssignmentRole-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control assignment-role-input" [disabled]="!userIsSchedulerAssignmentRoleWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="AssignmentRole-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerAssignmentRoleWriter()" />
                                <label for="AssignmentRole-active" class="form-check-label" id="label-AssignmentRole-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="AssignmentRole-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerAssignmentRoleWriter()" />
                                <label for="AssignmentRole-deleted" class="form-check-label" id="label-AssignmentRole-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="assignment-role-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="assignmentRoleForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Assignment Role">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !assignmentRoleForm.valid || !assignmentRoleForm.dirty || assignmentRoleForm.pristine || userIsSchedulerAssignmentRoleWriter() == false " ngbTooltip="Save Assignment Role">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerAssignmentRoleReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 assignment-role-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="assignmentRoleQualificationRequirementService.userIsSchedulerAssignmentRoleQualificationRequirementReader()">
                            <button ngbNavLink>Assignment Role Qualification Requirements
                                <span class="badge bg-primary ms-2">
                                    {{ (assignmentRoleData?.AssignmentRoleQualificationRequirementsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-assignment-role-qualification-requirement-table [queryParams]="{ assignmentRoleId: assignmentRoleData?.id }"></app-assignment-role-qualification-requirement-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-assignment-role-qualification-requirement-add-edit [preSeededData]="{ assignmentRoleId: assignmentRoleData?.id }" [hiddenFields]="['assignmentRoleId']"></app-assignment-role-qualification-requirement-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="rateSheetService.userIsSchedulerRateSheetReader()">
                            <button ngbNavLink>Rate Sheets
                                <span class="badge bg-primary ms-2">
                                    {{ (assignmentRoleData?.RateSheetsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-rate-sheet-table [queryParams]="{ assignmentRoleId: assignmentRoleData?.id }"></app-rate-sheet-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-rate-sheet-add-edit [preSeededData]="{ assignmentRoleId: assignmentRoleData?.id }" [hiddenFields]="['assignmentRoleId']"></app-rate-sheet-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="crewMemberService.userIsSchedulerCrewMemberReader()">
                            <button ngbNavLink>Crew Members
                                <span class="badge bg-primary ms-2">
                                    {{ (assignmentRoleData?.CrewMembersCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-crew-member-table [queryParams]="{ assignmentRoleId: assignmentRoleData?.id }"></app-crew-member-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-crew-member-add-edit [preSeededData]="{ assignmentRoleId: assignmentRoleData?.id }" [hiddenFields]="['assignmentRoleId']"></app-crew-member-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="eventResourceAssignmentService.userIsSchedulerEventResourceAssignmentReader()">
                            <button ngbNavLink>Event Resource Assignments
                                <span class="badge bg-primary ms-2">
                                    {{ (assignmentRoleData?.EventResourceAssignmentsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-event-resource-assignment-table [queryParams]="{ assignmentRoleId: assignmentRoleData?.id }"></app-event-resource-assignment-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-event-resource-assignment-add-edit [preSeededData]="{ assignmentRoleId: assignmentRoleData?.id }" [hiddenFields]="['assignmentRoleId']"></app-event-resource-assignment-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
