<div class="container-fluid p-1 m-0 messaging-audit-log-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="messaging-audit-log-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Messaging Audit Log</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Messaging Audit Log' : 'Add Messaging Audit Log'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerMessagingAuditLogReader()">
                <div class="col m-2 messaging-audit-log-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="messagingAuditLogForm" (ngSubmit)="submitForm()" class="messaging-audit-log-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('performedByUserId')">
                                <label for="MessagingAuditLog-performedByUserId" id="label-MessagingAuditLog-performedByUserId"><span class="text-danger">*</span>Performed By User Id</label>
                                <input type="number" id="MessagingAuditLog-performedByUserId" formControlName="performedByUserId" placeholder="Enter Performed By User Id" class="form-control messaging-audit-log-input" [disabled]="!userIsSchedulerMessagingAuditLogWriter()" aria-labelledby="label-performedByUserId" />
                                <div *ngIf="messagingAuditLogForm.get('performedByUserId')?.invalid && messagingAuditLogForm.get('performedByUserId')?.touched" class="text-danger">
                                    Performed By User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('action')">
                                <label for="MessagingAuditLog-action" id="label-MessagingAuditLog-action"><span class="text-danger">*</span>Action</label>
                                <input type="text" id="MessagingAuditLog-action" formControlName="action" placeholder="Enter Action" class="form-control messaging-audit-log-input" [disabled]="!userIsSchedulerMessagingAuditLogWriter()" aria-labelledby="label-action" />
                                <div *ngIf="messagingAuditLogForm.get('action')?.invalid && messagingAuditLogForm.get('action')?.touched" class="text-danger">
                                    Action is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('entityType')">
                                <label for="MessagingAuditLog-entityType" id="label-MessagingAuditLog-entityType">Entity Type</label>
                                <input type="text" id="MessagingAuditLog-entityType" formControlName="entityType" placeholder="Enter Entity Type" class="form-control messaging-audit-log-input" [disabled]="!userIsSchedulerMessagingAuditLogWriter()" aria-labelledby="label-entityType" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('entityId')">
                                <label for="MessagingAuditLog-entityId" id="label-MessagingAuditLog-entityId">Entity Id</label>
                                <input type="number" id="MessagingAuditLog-entityId" formControlName="entityId" placeholder="Enter Entity Id" class="form-control messaging-audit-log-input" [disabled]="!userIsSchedulerMessagingAuditLogWriter()" aria-labelledby="label-entityId" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('details')">
                                <label for="MessagingAuditLog-details" id="label-MessagingAuditLog-details">Details</label>
                                <textarea id="MessagingAuditLog-details" formControlName="details" placeholder="Enter Details" class="form-control messaging-audit-log-input" [disabled]="!userIsSchedulerMessagingAuditLogWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('ipAddress')">
                                <label for="MessagingAuditLog-ipAddress" id="label-MessagingAuditLog-ipAddress">Ip Address</label>
                                <input type="text" id="MessagingAuditLog-ipAddress" formControlName="ipAddress" placeholder="Enter Ip Address" class="form-control messaging-audit-log-input" [disabled]="!userIsSchedulerMessagingAuditLogWriter()" aria-labelledby="label-ipAddress" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('dateTimeCreated')">
                                <label for="MessagingAuditLog-dateTimeCreated" id="label-MessagingAuditLog-dateTimeCreated"><span class="text-danger">*</span>Date Time Created</label>
                                <input type="datetime-local" id="MessagingAuditLog-dateTimeCreated" formControlName="dateTimeCreated" placeholder="Enter Date Time Created" class="form-control messaging-audit-log-input" [disabled]="!userIsSchedulerMessagingAuditLogWriter()" aria-labelledby="label-dateTimeCreated" />
                                <div *ngIf="messagingAuditLogForm.get('dateTimeCreated')?.invalid && messagingAuditLogForm.get('dateTimeCreated')?.touched" class="text-danger">
                                    Date Time Created is required
                                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="MessagingAuditLog-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerMessagingAuditLogWriter()" />
                                <label for="MessagingAuditLog-active" class="form-check-label" id="label-MessagingAuditLog-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="MessagingAuditLog-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerMessagingAuditLogWriter()" />
                                <label for="MessagingAuditLog-deleted" class="form-check-label" id="label-MessagingAuditLog-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="messaging-audit-log-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="messagingAuditLogForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Messaging Audit Log">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !messagingAuditLogForm.valid || !messagingAuditLogForm.dirty || messagingAuditLogForm.pristine  || userIsSchedulerMessagingAuditLogWriter() == false " ngbTooltip="Save the Messaging Audit Log changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Messaging Audit Log' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
