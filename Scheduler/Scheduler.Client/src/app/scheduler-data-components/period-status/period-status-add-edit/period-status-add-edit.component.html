<div class="add-period-status" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-period-status me-2"
        (click)="openModal()"
        ngbTooltip="Add Period Status" 
        *ngIf="userIsSchedulerPeriodStatusWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #periodStatusModal let-modal>
   <div class="modal-header period-status-modal-header">
      <h5 class="modal-title mb-0" id="periodStatusModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Period Status' : 'Add Period Status' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body period-status-modal-body">
      <form [formGroup]="periodStatusForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="PeriodStatus-name" id="label-PeriodStatus-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="PeriodStatus-name" formControlName="name" placeholder="Enter Name" class="form-control period-status-input" [disabled]="!userIsSchedulerPeriodStatusWriter()" aria-labelledby="label-name" />
                <div *ngIf="periodStatusForm.get('name')?.invalid && periodStatusForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="PeriodStatus-description" id="label-PeriodStatus-description"><span class="text-danger">*</span>Description</label>
                <textarea id="PeriodStatus-description" formControlName="description" placeholder="Enter Description" class="form-control period-status-input" [disabled]="!userIsSchedulerPeriodStatusWriter()"></textarea>
                <div *ngIf="periodStatusForm.get('description')?.invalid && periodStatusForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('color')">
                <label for="PeriodStatus-color" id="label-PeriodStatus-color">Color</label>
                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="PeriodStatus-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerPeriodStatusWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="periodStatusForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="PeriodStatus-sequence" id="label-PeriodStatus-sequence">Sequence</label>
                <input type="number" id="PeriodStatus-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control period-status-input" [disabled]="!userIsSchedulerPeriodStatusWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="PeriodStatus-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerPeriodStatusWriter()" />
                <label for="PeriodStatus-active" class="form-check-label" id="label-PeriodStatus-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="PeriodStatus-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerPeriodStatusWriter()" />
                <label for="PeriodStatus-deleted" class="form-check-label" id="label-PeriodStatus-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer period-status-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Period Status changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !periodStatusForm.valid || periodStatusForm.pristine  || userIsSchedulerPeriodStatusWriter() == false " ngbTooltip="Save the Period Status changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Period Status' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
