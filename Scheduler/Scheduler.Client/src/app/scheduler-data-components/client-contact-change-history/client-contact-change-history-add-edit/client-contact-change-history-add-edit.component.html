<div class="add-client-contact-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-client-contact-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Client Contact Change History" 
        *ngIf="userIsSchedulerClientContactChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #clientContactChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light client-contact-change-history-modal-header">
      <h5 class="modal-title mb-0" id="clientContactChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Client Contact Change History' : 'Add Client Contact Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body client-contact-change-history-modal-body">
      <form [formGroup]="clientContactChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('clientContactId')">
                <label for="ClientContactChangeHistory-clientContactId" id="label-ClientContactChangeHistory-clientContactId"><span class="text-danger">*</span>Client Contact</label>
                <select id="ClientContactChangeHistory-clientContactId" formControlName="clientContactId" class="form-select client-contact-change-history-select" [disabled]="!userIsSchedulerClientContactChangeHistoryWriter()">
                    <option [ngValue]="null">Select Client Contact</option>
                    <option *ngFor="let clientContact of clientContacts$ | async" [ngValue]="clientContact.id">{{clientContact.id}}</option>
                </select>
                <div *ngIf="clientContactChangeHistoryForm.get('clientContactId')?.invalid && clientContactChangeHistoryForm.get('clientContactId')?.touched" class="text-danger">
                    Client Contact is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ClientContactChangeHistory-versionNumber" id="label-ClientContactChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ClientContactChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control client-contact-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="ClientContactChangeHistory-timeStamp" id="label-ClientContactChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="ClientContactChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control client-contact-change-history-input" [disabled]="!userIsSchedulerClientContactChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="clientContactChangeHistoryForm.get('timeStamp')?.invalid && clientContactChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="ClientContactChangeHistory-userId" id="label-ClientContactChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="ClientContactChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control client-contact-change-history-input" [disabled]="!userIsSchedulerClientContactChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="clientContactChangeHistoryForm.get('userId')?.invalid && clientContactChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="ClientContactChangeHistory-data" id="label-ClientContactChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="ClientContactChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control client-contact-change-history-input" [disabled]="!userIsSchedulerClientContactChangeHistoryWriter()"></textarea>
                <div *ngIf="clientContactChangeHistoryForm.get('data')?.invalid && clientContactChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer client-contact-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Client Contact Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !clientContactChangeHistoryForm.valid || clientContactChangeHistoryForm.pristine  || userIsSchedulerClientContactChangeHistoryWriter() == false " ngbTooltip="Save the Client Contact Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Client Contact Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
