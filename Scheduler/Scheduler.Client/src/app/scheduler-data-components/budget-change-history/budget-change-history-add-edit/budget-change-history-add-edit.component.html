<div class="add-budget-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-budget-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Budget Change History" 
        *ngIf="userIsSchedulerBudgetChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #budgetChangeHistoryModal let-modal>
   <div class="modal-header budget-change-history-modal-header">
      <h5 class="modal-title mb-0" id="budgetChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Budget Change History' : 'Add Budget Change History' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body budget-change-history-modal-body">
      <form [formGroup]="budgetChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('budgetId')">
                <label for="BudgetChangeHistory-budgetId" id="label-BudgetChangeHistory-budgetId"><span class="text-danger">*</span>Budget</label>
                <select id="BudgetChangeHistory-budgetId" formControlName="budgetId" class="form-select budget-change-history-select" [disabled]="!userIsSchedulerBudgetChangeHistoryWriter()">
                    <option [ngValue]="null">Select Budget</option>
                    <option *ngFor="let budget of budgets$ | async" [ngValue]="budget.id">{{budget.notes}}</option>
                </select>
                <div *ngIf="budgetChangeHistoryForm.get('budgetId')?.invalid && budgetChangeHistoryForm.get('budgetId')?.touched" class="text-danger">
                    Budget is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="BudgetChangeHistory-versionNumber" id="label-BudgetChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="BudgetChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control budget-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="BudgetChangeHistory-timeStamp" id="label-BudgetChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="BudgetChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control budget-change-history-input" [disabled]="!userIsSchedulerBudgetChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="budgetChangeHistoryForm.get('timeStamp')?.invalid && budgetChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="BudgetChangeHistory-userId" id="label-BudgetChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="BudgetChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control budget-change-history-input" [disabled]="!userIsSchedulerBudgetChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="budgetChangeHistoryForm.get('userId')?.invalid && budgetChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="BudgetChangeHistory-data" id="label-BudgetChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="BudgetChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control budget-change-history-input" [disabled]="!userIsSchedulerBudgetChangeHistoryWriter()"></textarea>
                <div *ngIf="budgetChangeHistoryForm.get('data')?.invalid && budgetChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer budget-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Budget Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !budgetChangeHistoryForm.valid || budgetChangeHistoryForm.pristine  || userIsSchedulerBudgetChangeHistoryWriter() == false " ngbTooltip="Save the Budget Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Budget Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
