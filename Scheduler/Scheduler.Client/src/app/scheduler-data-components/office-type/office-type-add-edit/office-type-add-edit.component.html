<div class="add-office-type" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-office-type me-2"
        (click)="openModal()"
        ngbTooltip="Add Office Type" 
        *ngIf="userIsSchedulerOfficeTypeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #officeTypeModal let-modal>
   <div class="modal-header bg-dark text-light office-type-modal-header">
      <h5 class="modal-title mb-0" id="officeTypeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Office Type' : 'Add Office Type' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body office-type-modal-body">
      <form [formGroup]="officeTypeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="OfficeType-name" id="label-OfficeType-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="OfficeType-name" formControlName="name" placeholder="Enter Name" class="form-control office-type-input" [disabled]="!userIsSchedulerOfficeTypeWriter()" aria-labelledby="label-name" />
                <div *ngIf="officeTypeForm.get('name')?.invalid && officeTypeForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="OfficeType-description" id="label-OfficeType-description"><span class="text-danger">*</span>Description</label>
                <textarea id="OfficeType-description" formControlName="description" placeholder="Enter Description" class="form-control office-type-input" [disabled]="!userIsSchedulerOfficeTypeWriter()"></textarea>
                <div *ngIf="officeTypeForm.get('description')?.invalid && officeTypeForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="OfficeType-sequence" id="label-OfficeType-sequence">Sequence</label>
                <input type="number" id="OfficeType-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control office-type-input" [disabled]="!userIsSchedulerOfficeTypeWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('iconId')">
                <label for="OfficeType-iconId" id="label-OfficeType-iconId">Icon</label>
                <select id="OfficeType-iconId" formControlName="iconId" class="form-select office-type-select" [disabled]="!userIsSchedulerOfficeTypeWriter()">
                    <option [ngValue]="null">Select Icon</option>
                    <option *ngFor="let icon of icons$ | async" [ngValue]="icon.id">{{icon.name}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('color')">
                <label for="OfficeType-color" id="label-OfficeType-color">Color</label>
                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="OfficeType-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerOfficeTypeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="officeTypeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="OfficeType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerOfficeTypeWriter()" />
                <label for="OfficeType-active" class="form-check-label" id="label-OfficeType-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="OfficeType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerOfficeTypeWriter()" />
                <label for="OfficeType-deleted" class="form-check-label" id="label-OfficeType-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer office-type-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Office Type changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !officeTypeForm.valid || officeTypeForm.pristine || !userIsSchedulerOfficeTypeWriter()" ngbTooltip="Save the Office Type changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
