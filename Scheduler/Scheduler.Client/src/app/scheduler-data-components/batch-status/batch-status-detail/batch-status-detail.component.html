<div class="container-fluid p-1 m-0 batch-status-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="batch-status-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Batch Status</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Batch Status' : 'Add Batch Status'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerBatchStatusReader()">
                <div class="col m-2 batch-status-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="batchStatusForm" (ngSubmit)="submitForm()" class="batch-status-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="BatchStatus-name" id="label-BatchStatus-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="BatchStatus-name" formControlName="name" placeholder="Enter Name" class="form-control batch-status-input" [disabled]="!userIsSchedulerBatchStatusWriter()" aria-labelledby="label-name" />
                                <div *ngIf="batchStatusForm.get('name')?.invalid && batchStatusForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="BatchStatus-description" id="label-BatchStatus-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="BatchStatus-description" formControlName="description" placeholder="Enter Description" class="form-control batch-status-input" [disabled]="!userIsSchedulerBatchStatusWriter()"></textarea>
                                <div *ngIf="batchStatusForm.get('description')?.invalid && batchStatusForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="BatchStatus-sequence" id="label-BatchStatus-sequence">Sequence</label>
                                <input type="number" id="BatchStatus-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control batch-status-input" [disabled]="!userIsSchedulerBatchStatusWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BatchStatus-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerBatchStatusWriter()" />
                                <label for="BatchStatus-active" class="form-check-label" id="label-BatchStatus-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="BatchStatus-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerBatchStatusWriter()" />
                                <label for="BatchStatus-deleted" class="form-check-label" id="label-BatchStatus-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="batch-status-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="batchStatusForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Batch Status">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !batchStatusForm.valid || !batchStatusForm.dirty || batchStatusForm.pristine  || userIsSchedulerBatchStatusWriter() == false " ngbTooltip="Save the Batch Status changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Batch Status' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerBatchStatusReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 batch-status-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="batchService.userIsSchedulerBatchReader()">
                            <button ngbNavLink>Batches
                                <span class="badge bg-primary ms-2">
                                    {{ (batchStatusData?.BatchesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-batch-table [queryParams]="{ batchStatusId: batchStatusData?.id }" [showAddButton]="true" [preSeededData]="{ batchStatusId: batchStatusData?.id }" [hiddenFields]="['batchStatusId']"></app-batch-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
