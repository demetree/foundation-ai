<div class="add-user-presence" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-user-presence me-2"
        (click)="openModal()"
        ngbTooltip="Add User Presence" 
        *ngIf="userIsSchedulerUserPresenceWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #userPresenceModal let-modal>
   <div class="modal-header user-presence-modal-header">
      <h5 class="modal-title mb-0" id="userPresenceModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit User Presence' : 'Add User Presence' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body user-presence-modal-body">
      <form [formGroup]="userPresenceForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="UserPresence-userId" id="label-UserPresence-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="UserPresence-userId" formControlName="userId" placeholder="Enter User Id" class="form-control user-presence-input" [disabled]="!userIsSchedulerUserPresenceWriter()" aria-labelledby="label-userId" />
                <div *ngIf="userPresenceForm.get('userId')?.invalid && userPresenceForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('status')">
                <label for="UserPresence-status" id="label-UserPresence-status"><span class="text-danger">*</span>Status</label>
                <input type="text" id="UserPresence-status" formControlName="status" placeholder="Enter Status" class="form-control user-presence-input" [disabled]="!userIsSchedulerUserPresenceWriter()" aria-labelledby="label-status" />
                <div *ngIf="userPresenceForm.get('status')?.invalid && userPresenceForm.get('status')?.touched" class="text-danger">
                    Status is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('customStatusMessage')">
                <label for="UserPresence-customStatusMessage" id="label-UserPresence-customStatusMessage">Custom Status Message</label>
                <input type="text" id="UserPresence-customStatusMessage" formControlName="customStatusMessage" placeholder="Enter Custom Status Message" class="form-control user-presence-input" [disabled]="!userIsSchedulerUserPresenceWriter()" aria-labelledby="label-customStatusMessage" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('lastSeenDateTime')">
                <label for="UserPresence-lastSeenDateTime" id="label-UserPresence-lastSeenDateTime"><span class="text-danger">*</span>Last Seen Date Time</label>
                <input type="datetime-local" id="UserPresence-lastSeenDateTime" formControlName="lastSeenDateTime" placeholder="Enter Last Seen Date Time" class="form-control user-presence-input" [disabled]="!userIsSchedulerUserPresenceWriter()" aria-labelledby="label-lastSeenDateTime" />
                <div *ngIf="userPresenceForm.get('lastSeenDateTime')?.invalid && userPresenceForm.get('lastSeenDateTime')?.touched" class="text-danger">
                    Last Seen Date Time is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('lastActivityDateTime')">
                <label for="UserPresence-lastActivityDateTime" id="label-UserPresence-lastActivityDateTime"><span class="text-danger">*</span>Last Activity Date Time</label>
                <input type="datetime-local" id="UserPresence-lastActivityDateTime" formControlName="lastActivityDateTime" placeholder="Enter Last Activity Date Time" class="form-control user-presence-input" [disabled]="!userIsSchedulerUserPresenceWriter()" aria-labelledby="label-lastActivityDateTime" />
                <div *ngIf="userPresenceForm.get('lastActivityDateTime')?.invalid && userPresenceForm.get('lastActivityDateTime')?.touched" class="text-danger">
                    Last Activity Date Time is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('connectionCount')">
                <label for="UserPresence-connectionCount" id="label-UserPresence-connectionCount"><span class="text-danger">*</span>Connection Count</label>
                <input type="number" id="UserPresence-connectionCount" formControlName="connectionCount" placeholder="Enter Connection Count" class="form-control user-presence-input" [disabled]="!userIsSchedulerUserPresenceWriter()" aria-labelledby="label-connectionCount" />
                <div *ngIf="userPresenceForm.get('connectionCount')?.invalid && userPresenceForm.get('connectionCount')?.touched" class="text-danger">
                    Connection Count is required
                </div>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="UserPresence-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerUserPresenceWriter()" />
                <label for="UserPresence-active" class="form-check-label" id="label-UserPresence-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="UserPresence-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerUserPresenceWriter()" />
                <label for="UserPresence-deleted" class="form-check-label" id="label-UserPresence-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer user-presence-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the User Presence changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !userPresenceForm.valid || userPresenceForm.pristine  || userIsSchedulerUserPresenceWriter() == false " ngbTooltip="Save the User Presence changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add User Presence' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
