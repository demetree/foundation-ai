<div class="container-fluid p-1 m-0 conversation-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="conversation-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Conversation Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Conversation Type' : 'Add Conversation Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerConversationTypeReader()">
                <div class="col m-2 conversation-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="conversationTypeForm" (ngSubmit)="submitForm()" class="conversation-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="ConversationType-name" id="label-ConversationType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="ConversationType-name" formControlName="name" placeholder="Enter Name" class="form-control conversation-type-input" [disabled]="!userIsSchedulerConversationTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="conversationTypeForm.get('name')?.invalid && conversationTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="ConversationType-description" id="label-ConversationType-description">Description</label>
                                <textarea id="ConversationType-description" formControlName="description" placeholder="Enter Description" class="form-control conversation-type-input" [disabled]="!userIsSchedulerConversationTypeWriter()"></textarea>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ConversationType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerConversationTypeWriter()" />
                                <label for="ConversationType-active" class="form-check-label" id="label-ConversationType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ConversationType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerConversationTypeWriter()" />
                                <label for="ConversationType-deleted" class="form-check-label" id="label-ConversationType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="conversation-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="conversationTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Conversation Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !conversationTypeForm.valid || !conversationTypeForm.dirty || conversationTypeForm.pristine  || userIsSchedulerConversationTypeWriter() == false " ngbTooltip="Save the Conversation Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Conversation Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerConversationTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 conversation-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="conversationService.userIsSchedulerConversationReader()">
                            <button ngbNavLink>Conversations
                                <span class="badge bg-primary ms-2">
                                    {{ (conversationTypeData?.ConversationsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-conversation-table [queryParams]="{ conversationTypeId: conversationTypeData?.id }" [showAddButton]="true" [preSeededData]="{ conversationTypeId: conversationTypeData?.id }" [hiddenFields]="['conversationTypeId']"></app-conversation-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
