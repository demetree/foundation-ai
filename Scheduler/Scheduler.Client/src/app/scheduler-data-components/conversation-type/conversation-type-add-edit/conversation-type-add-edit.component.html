<div class="add-conversation-type" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-conversation-type me-2"
        (click)="openModal()"
        ngbTooltip="Add Conversation Type" 
        *ngIf="userIsSchedulerConversationTypeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #conversationTypeModal let-modal>
   <div class="modal-header conversation-type-modal-header">
      <h5 class="modal-title mb-0" id="conversationTypeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Conversation Type' : 'Add Conversation Type' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body conversation-type-modal-body">
      <form [formGroup]="conversationTypeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="ConversationType-name" id="label-ConversationType-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="ConversationType-name" formControlName="name" placeholder="Enter Name" class="form-control conversation-type-input" [disabled]="!userIsSchedulerConversationTypeWriter()" aria-labelledby="label-name" />
                <div *ngIf="conversationTypeForm.get('name')?.invalid && conversationTypeForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="ConversationType-description" id="label-ConversationType-description">Description</label>
                <textarea id="ConversationType-description" formControlName="description" placeholder="Enter Description" class="form-control conversation-type-input" [disabled]="!userIsSchedulerConversationTypeWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ConversationType-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerConversationTypeWriter()" />
                <label for="ConversationType-active" class="form-check-label" id="label-ConversationType-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ConversationType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerConversationTypeWriter()" />
                <label for="ConversationType-deleted" class="form-check-label" id="label-ConversationType-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer conversation-type-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Conversation Type changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !conversationTypeForm.valid || conversationTypeForm.pristine  || userIsSchedulerConversationTypeWriter() == false " ngbTooltip="Save the Conversation Type changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Conversation Type' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
