<div class="container-fluid p-1 m-0 document-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="document-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Document Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Document Change History' : 'Add Document Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerDocumentChangeHistoryReader()">
                <div class="col m-2 document-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="documentChangeHistoryForm" (ngSubmit)="submitForm()" class="document-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('documentId')">
                                <label for="DocumentChangeHistory-documentId" id="label-DocumentChangeHistory-documentId"><span class="text-danger">*</span>Document</label>
                                <select id="DocumentChangeHistory-documentId" formControlName="documentId" class="form-select document-change-history-select" [disabled]="!userIsSchedulerDocumentChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Document</option>
                                    <option *ngFor="let document of documents$ | async" [ngValue]="document.id">{{document.name}}</option>
                                </select>
                                <div *ngIf="documentChangeHistoryForm.get('documentId')?.invalid && documentChangeHistoryForm.get('documentId')?.touched" class="text-danger">
                                    Document is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="DocumentChangeHistory-versionNumber" id="label-DocumentChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="DocumentChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control document-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="DocumentChangeHistory-timeStamp" id="label-DocumentChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="DocumentChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control document-change-history-input" [disabled]="!userIsSchedulerDocumentChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="documentChangeHistoryForm.get('timeStamp')?.invalid && documentChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="DocumentChangeHistory-userId" id="label-DocumentChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="DocumentChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control document-change-history-input" [disabled]="!userIsSchedulerDocumentChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="documentChangeHistoryForm.get('userId')?.invalid && documentChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="DocumentChangeHistory-data" id="label-DocumentChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="DocumentChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control document-change-history-input" [disabled]="!userIsSchedulerDocumentChangeHistoryWriter()"></textarea>
                                <div *ngIf="documentChangeHistoryForm.get('data')?.invalid && documentChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="document-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="documentChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Document Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !documentChangeHistoryForm.valid || !documentChangeHistoryForm.dirty || documentChangeHistoryForm.pristine  || userIsSchedulerDocumentChangeHistoryWriter() == false " ngbTooltip="Save the Document Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Document Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
