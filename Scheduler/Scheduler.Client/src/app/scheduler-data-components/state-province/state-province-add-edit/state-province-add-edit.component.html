<div class="add-state-province" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-state-province me-2"
        (click)="openModal()"
        ngbTooltip="Add State Province" 
        *ngIf="userIsSchedulerStateProvinceWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #stateProvinceModal let-modal>
   <div class="modal-header state-province-modal-header">
      <h5 class="modal-title mb-0" id="stateProvinceModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit State Province' : 'Add State Province' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body state-province-modal-body">
      <form [formGroup]="stateProvinceForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('countryId')">
                <label for="StateProvince-countryId" id="label-StateProvince-countryId"><span class="text-danger">*</span>Country</label>
                <select id="StateProvince-countryId" formControlName="countryId" class="form-select state-province-select" [disabled]="!userIsSchedulerStateProvinceWriter()">
                    <option [ngValue]="null">Select Country</option>
                    <option *ngFor="let country of countries$ | async" [ngValue]="country.id">{{country.name}}</option>
                </select>
                <div *ngIf="stateProvinceForm.get('countryId')?.invalid && stateProvinceForm.get('countryId')?.touched" class="text-danger">
                    Country is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="StateProvince-name" id="label-StateProvince-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="StateProvince-name" formControlName="name" placeholder="Enter Name" class="form-control state-province-input" [disabled]="!userIsSchedulerStateProvinceWriter()" aria-labelledby="label-name" />
                <div *ngIf="stateProvinceForm.get('name')?.invalid && stateProvinceForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="StateProvince-description" id="label-StateProvince-description"><span class="text-danger">*</span>Description</label>
                <textarea id="StateProvince-description" formControlName="description" placeholder="Enter Description" class="form-control state-province-input" [disabled]="!userIsSchedulerStateProvinceWriter()"></textarea>
                <div *ngIf="stateProvinceForm.get('description')?.invalid && stateProvinceForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('abbreviation')">
                <label for="StateProvince-abbreviation" id="label-StateProvince-abbreviation"><span class="text-danger">*</span>Abbreviation</label>
                <input type="text" id="StateProvince-abbreviation" formControlName="abbreviation" placeholder="Enter Abbreviation" class="form-control state-province-input" [disabled]="!userIsSchedulerStateProvinceWriter()" aria-labelledby="label-abbreviation" />
                <div *ngIf="stateProvinceForm.get('abbreviation')?.invalid && stateProvinceForm.get('abbreviation')?.touched" class="text-danger">
                    Abbreviation is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="StateProvince-sequence" id="label-StateProvince-sequence">Sequence</label>
                <input type="number" id="StateProvince-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control state-province-input" [disabled]="!userIsSchedulerStateProvinceWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="StateProvince-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerStateProvinceWriter()" />
                <label for="StateProvince-active" class="form-check-label" id="label-StateProvince-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="StateProvince-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerStateProvinceWriter()" />
                <label for="StateProvince-deleted" class="form-check-label" id="label-StateProvince-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer state-province-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the State Province changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !stateProvinceForm.valid || stateProvinceForm.pristine  || userIsSchedulerStateProvinceWriter() == false " ngbTooltip="Save the State Province changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add State Province' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
