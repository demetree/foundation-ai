<div class="container-fluid p-1 m-0 state-province-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="state-province-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">State Province</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit State Province' : 'Add State Province'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerStateProvinceReader()">
                <div class="col m-2 state-province-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="stateProvinceForm" (ngSubmit)="submitForm()" class="state-province-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('countryId')">
                                <label for="StateProvince-countryId" id="label-StateProvince-countryId"><span class="text-danger">*</span>Country</label>
                                <select id="StateProvince-countryId" formControlName="countryId" class="form-select state-province-select" [disabled]="!userIsSchedulerStateProvinceWriter()">
                                    <option [ngValue]="null">Select Country</option>
                                    <option *ngFor="let country of countries$ | async" [ngValue]="country.id">{{country.name}}</option>
                                </select>
                                <div *ngIf="stateProvinceForm.get('countryId')?.invalid && stateProvinceForm.get('countryId')?.touched" class="text-danger">
                                    Country is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="StateProvince-name" id="label-StateProvince-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="StateProvince-name" formControlName="name" placeholder="Enter Name" class="form-control state-province-input" [disabled]="!userIsSchedulerStateProvinceWriter()" aria-labelledby="label-name" />
                                <div *ngIf="stateProvinceForm.get('name')?.invalid && stateProvinceForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="StateProvince-description" id="label-StateProvince-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="StateProvince-description" formControlName="description" placeholder="Enter Description" class="form-control state-province-input" [disabled]="!userIsSchedulerStateProvinceWriter()"></textarea>
                                <div *ngIf="stateProvinceForm.get('description')?.invalid && stateProvinceForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('abbreviation')">
                                <label for="StateProvince-abbreviation" id="label-StateProvince-abbreviation"><span class="text-danger">*</span>Abbreviation</label>
                                <input type="text" id="StateProvince-abbreviation" formControlName="abbreviation" placeholder="Enter Abbreviation" class="form-control state-province-input" [disabled]="!userIsSchedulerStateProvinceWriter()" aria-labelledby="label-abbreviation" />
                                <div *ngIf="stateProvinceForm.get('abbreviation')?.invalid && stateProvinceForm.get('abbreviation')?.touched" class="text-danger">
                                    Abbreviation is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="StateProvince-sequence" id="label-StateProvince-sequence">Sequence</label>
                                <input type="number" id="StateProvince-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control state-province-input" [disabled]="!userIsSchedulerStateProvinceWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="StateProvince-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerStateProvinceWriter()" />
                                <label for="StateProvince-active" class="form-check-label" id="label-StateProvince-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="StateProvince-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerStateProvinceWriter()" />
                                <label for="StateProvince-deleted" class="form-check-label" id="label-StateProvince-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="state-province-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="stateProvinceForm.pristine" (click)="loadData(true)" ngbTooltip="Reload State Province">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !stateProvinceForm.valid || !stateProvinceForm.dirty || stateProvinceForm.pristine  || userIsSchedulerStateProvinceWriter() == false " ngbTooltip="Save the State Province changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add State Province' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerStateProvinceReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 state-province-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="officeService.userIsSchedulerOfficeReader()">
                            <button ngbNavLink>Offices
                                <span class="badge bg-primary ms-2">
                                    {{ (stateProvinceData?.OfficesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-office-table [queryParams]="{ stateProvinceId: stateProvinceData?.id }" [showAddButton]="true" [preSeededData]="{ stateProvinceId: stateProvinceData?.id }" [hiddenFields]="['stateProvinceId']"></app-office-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="clientService.userIsSchedulerClientReader()">
                            <button ngbNavLink>Clients
                                <span class="badge bg-primary ms-2">
                                    {{ (stateProvinceData?.ClientsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-client-table [queryParams]="{ stateProvinceId: stateProvinceData?.id }" [showAddButton]="true" [preSeededData]="{ stateProvinceId: stateProvinceData?.id }" [hiddenFields]="['stateProvinceId']"></app-client-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="tenantProfileService.userIsSchedulerTenantProfileReader()">
                            <button ngbNavLink>Tenant Profiles
                                <span class="badge bg-primary ms-2">
                                    {{ (stateProvinceData?.TenantProfilesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-tenant-profile-table [queryParams]="{ stateProvinceId: stateProvinceData?.id }" [showAddButton]="true" [preSeededData]="{ stateProvinceId: stateProvinceData?.id }" [hiddenFields]="['stateProvinceId']"></app-tenant-profile-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="schedulingTargetAddressService.userIsSchedulerSchedulingTargetAddressReader()">
                            <button ngbNavLink>Scheduling Target Addresses
                                <span class="badge bg-primary ms-2">
                                    {{ (stateProvinceData?.SchedulingTargetAddressesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduling-target-address-table [queryParams]="{ stateProvinceId: stateProvinceData?.id }" [showAddButton]="true" [preSeededData]="{ stateProvinceId: stateProvinceData?.id }" [hiddenFields]="['stateProvinceId']"></app-scheduling-target-address-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
