<div class="container-fluid p-1 m-0 qualification-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="qualification-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Qualification</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Qualification' : 'Add Qualification'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerQualificationReader()">
                <div class="col m-2 qualification-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="qualificationForm" (ngSubmit)="submitForm()" class="qualification-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="Qualification-name" id="label-Qualification-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="Qualification-name" formControlName="name" placeholder="Enter Name" class="form-control qualification-input" [disabled]="!userIsSchedulerQualificationWriter()" aria-labelledby="label-name" />
                                <div *ngIf="qualificationForm.get('name')?.invalid && qualificationForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="Qualification-description" id="label-Qualification-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="Qualification-description" formControlName="description" placeholder="Enter Description" class="form-control qualification-input" [disabled]="!userIsSchedulerQualificationWriter()"></textarea>
                                <div *ngIf="qualificationForm.get('description')?.invalid && qualificationForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isLicense')">
                                <input type="checkbox" id="Qualification-isLicense" formControlName="isLicense" class="form-check-input" [disabled]="!userIsSchedulerQualificationWriter()" />
                                <label for="Qualification-isLicense" class="form-check-label" id="label-Qualification-isLicense">Is License</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="Qualification-color" id="label-Qualification-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="Qualification-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerQualificationWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="qualificationForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="Qualification-sequence" id="label-Qualification-sequence">Sequence</label>
                                <input type="number" id="Qualification-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control qualification-input" [disabled]="!userIsSchedulerQualificationWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Qualification-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerQualificationWriter()" />
                                <label for="Qualification-active" class="form-check-label" id="label-Qualification-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Qualification-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerQualificationWriter()" />
                                <label for="Qualification-deleted" class="form-check-label" id="label-Qualification-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="qualification-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="qualificationForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Qualification">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !qualificationForm.valid || !qualificationForm.dirty || qualificationForm.pristine  || userIsSchedulerQualificationWriter() == false " ngbTooltip="Save the Qualification changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Qualification' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerQualificationReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 qualification-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="assignmentRoleQualificationRequirementService.userIsSchedulerAssignmentRoleQualificationRequirementReader()">
                            <button ngbNavLink>Assignment Role Qualification Requirements
                                <span class="badge bg-primary ms-2">
                                    {{ (qualificationData?.AssignmentRoleQualificationRequirementsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-assignment-role-qualification-requirement-table [queryParams]="{ qualificationId: qualificationData?.id }"></app-assignment-role-qualification-requirement-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-assignment-role-qualification-requirement-add-edit [preSeededData]="{ qualificationId: qualificationData?.id }" [hiddenFields]="['qualificationId']"></app-assignment-role-qualification-requirement-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="schedulingTargetQualificationRequirementService.userIsSchedulerSchedulingTargetQualificationRequirementReader()">
                            <button ngbNavLink>Scheduling Target Qualification Requirements
                                <span class="badge bg-primary ms-2">
                                    {{ (qualificationData?.SchedulingTargetQualificationRequirementsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduling-target-qualification-requirement-table [queryParams]="{ qualificationId: qualificationData?.id }"></app-scheduling-target-qualification-requirement-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-scheduling-target-qualification-requirement-add-edit [preSeededData]="{ qualificationId: qualificationData?.id }" [hiddenFields]="['qualificationId']"></app-scheduling-target-qualification-requirement-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="resourceQualificationService.userIsSchedulerResourceQualificationReader()">
                            <button ngbNavLink>Resource Qualifications
                                <span class="badge bg-primary ms-2">
                                    {{ (qualificationData?.ResourceQualificationsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-resource-qualification-table [queryParams]="{ qualificationId: qualificationData?.id }"></app-resource-qualification-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-resource-qualification-add-edit [preSeededData]="{ qualificationId: qualificationData?.id }" [hiddenFields]="['qualificationId']"></app-resource-qualification-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="scheduledEventTemplateQualificationRequirementService.userIsSchedulerScheduledEventTemplateQualificationRequirementReader()">
                            <button ngbNavLink>Scheduled Event Template Qualification Requirements
                                <span class="badge bg-primary ms-2">
                                    {{ (qualificationData?.ScheduledEventTemplateQualificationRequirementsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduled-event-template-qualification-requirement-table [queryParams]="{ qualificationId: qualificationData?.id }"></app-scheduled-event-template-qualification-requirement-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-scheduled-event-template-qualification-requirement-add-edit [preSeededData]="{ qualificationId: qualificationData?.id }" [hiddenFields]="['qualificationId']"></app-scheduled-event-template-qualification-requirement-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="scheduledEventQualificationRequirementService.userIsSchedulerScheduledEventQualificationRequirementReader()">
                            <button ngbNavLink>Scheduled Event Qualification Requirements
                                <span class="badge bg-primary ms-2">
                                    {{ (qualificationData?.ScheduledEventQualificationRequirementsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-scheduled-event-qualification-requirement-table [queryParams]="{ qualificationId: qualificationData?.id }"></app-scheduled-event-qualification-requirement-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-scheduled-event-qualification-requirement-add-edit [preSeededData]="{ qualificationId: qualificationData?.id }" [hiddenFields]="['qualificationId']"></app-scheduled-event-qualification-requirement-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
