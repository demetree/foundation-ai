<div class="container-fluid p-1 m-0 notification-subscription-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="notification-subscription-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Notification Subscription Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Notification Subscription Change History' : 'Add Notification Subscription Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerNotificationSubscriptionChangeHistoryReader()">
                <div class="col m-2 notification-subscription-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="notificationSubscriptionChangeHistoryForm" (ngSubmit)="submitForm()" class="notification-subscription-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('notificationSubscriptionId')">
                                <label for="NotificationSubscriptionChangeHistory-notificationSubscriptionId" id="label-NotificationSubscriptionChangeHistory-notificationSubscriptionId"><span class="text-danger">*</span>Notification Subscription</label>
                                <select id="NotificationSubscriptionChangeHistory-notificationSubscriptionId" formControlName="notificationSubscriptionId" class="form-select notification-subscription-change-history-select" [disabled]="!userIsSchedulerNotificationSubscriptionChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Notification Subscription</option>
                                    <option *ngFor="let notificationSubscription of notificationSubscriptions$ | async" [ngValue]="notificationSubscription.id">{{notificationSubscription.recipientAddress}}</option>
                                </select>
                                <div *ngIf="notificationSubscriptionChangeHistoryForm.get('notificationSubscriptionId')?.invalid && notificationSubscriptionChangeHistoryForm.get('notificationSubscriptionId')?.touched" class="text-danger">
                                    Notification Subscription is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="NotificationSubscriptionChangeHistory-versionNumber" id="label-NotificationSubscriptionChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="NotificationSubscriptionChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control notification-subscription-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="NotificationSubscriptionChangeHistory-timeStamp" id="label-NotificationSubscriptionChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="NotificationSubscriptionChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control notification-subscription-change-history-input" [disabled]="!userIsSchedulerNotificationSubscriptionChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="notificationSubscriptionChangeHistoryForm.get('timeStamp')?.invalid && notificationSubscriptionChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="NotificationSubscriptionChangeHistory-userId" id="label-NotificationSubscriptionChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="NotificationSubscriptionChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control notification-subscription-change-history-input" [disabled]="!userIsSchedulerNotificationSubscriptionChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="notificationSubscriptionChangeHistoryForm.get('userId')?.invalid && notificationSubscriptionChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="NotificationSubscriptionChangeHistory-data" id="label-NotificationSubscriptionChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="NotificationSubscriptionChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control notification-subscription-change-history-input" [disabled]="!userIsSchedulerNotificationSubscriptionChangeHistoryWriter()"></textarea>
                                <div *ngIf="notificationSubscriptionChangeHistoryForm.get('data')?.invalid && notificationSubscriptionChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="notification-subscription-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="notificationSubscriptionChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Notification Subscription Change History">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !notificationSubscriptionChangeHistoryForm.valid || !notificationSubscriptionChangeHistoryForm.dirty || notificationSubscriptionChangeHistoryForm.pristine || userIsSchedulerNotificationSubscriptionChangeHistoryWriter() == false " ngbTooltip="Save Notification Subscription Change History">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
