<div class="container-fluid p-1 m-0 contact-interaction-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="contact-interaction-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Contact Interaction Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Contact Interaction Change History' : 'Add Contact Interaction Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerContactInteractionChangeHistoryReader()">
                <div class="col m-2 contact-interaction-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="contactInteractionChangeHistoryForm" (ngSubmit)="submitForm()" class="contact-interaction-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('contactInteractionId')">
                                <label for="ContactInteractionChangeHistory-contactInteractionId" id="label-ContactInteractionChangeHistory-contactInteractionId"><span class="text-danger">*</span>Contact Interaction</label>
                                <select id="ContactInteractionChangeHistory-contactInteractionId" formControlName="contactInteractionId" class="form-select contact-interaction-change-history-select" [disabled]="!userIsSchedulerContactInteractionChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Contact Interaction</option>
                                    <option *ngFor="let contactInteraction of contactInteractions$ | async" [ngValue]="contactInteraction.id">{{contactInteraction.notes}}</option>
                                </select>
                                <div *ngIf="contactInteractionChangeHistoryForm.get('contactInteractionId')?.invalid && contactInteractionChangeHistoryForm.get('contactInteractionId')?.touched" class="text-danger">
                                    Contact Interaction is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ContactInteractionChangeHistory-versionNumber" id="label-ContactInteractionChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ContactInteractionChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control contact-interaction-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="ContactInteractionChangeHistory-timeStamp" id="label-ContactInteractionChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="ContactInteractionChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control contact-interaction-change-history-input" [disabled]="!userIsSchedulerContactInteractionChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="contactInteractionChangeHistoryForm.get('timeStamp')?.invalid && contactInteractionChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="ContactInteractionChangeHistory-userId" id="label-ContactInteractionChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="ContactInteractionChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control contact-interaction-change-history-input" [disabled]="!userIsSchedulerContactInteractionChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="contactInteractionChangeHistoryForm.get('userId')?.invalid && contactInteractionChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="ContactInteractionChangeHistory-data" id="label-ContactInteractionChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="ContactInteractionChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control contact-interaction-change-history-input" [disabled]="!userIsSchedulerContactInteractionChangeHistoryWriter()"></textarea>
                                <div *ngIf="contactInteractionChangeHistoryForm.get('data')?.invalid && contactInteractionChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="contact-interaction-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="contactInteractionChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Contact Interaction Change History">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !contactInteractionChangeHistoryForm.valid || !contactInteractionChangeHistoryForm.dirty || contactInteractionChangeHistoryForm.pristine || userIsSchedulerContactInteractionChangeHistoryWriter() == false " ngbTooltip="Save Contact Interaction Change History">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
