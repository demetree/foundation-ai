<div class="container-fluid p-1 m-0 contact-method-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="contact-method-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Contact Method</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Contact Method' : 'Add Contact Method'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerContactMethodReader()">
                <div class="col m-2 contact-method-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="contactMethodForm" (ngSubmit)="submitForm()" class="contact-method-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="ContactMethod-name" id="label-ContactMethod-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="ContactMethod-name" formControlName="name" placeholder="Enter Name" class="form-control contact-method-input" [disabled]="!userIsSchedulerContactMethodWriter()" aria-labelledby="label-name" />
                                <div *ngIf="contactMethodForm.get('name')?.invalid && contactMethodForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="ContactMethod-description" id="label-ContactMethod-description"><span class="text-danger">*</span>Description</label>
                                <textarea id="ContactMethod-description" formControlName="description" placeholder="Enter Description" class="form-control contact-method-input" [disabled]="!userIsSchedulerContactMethodWriter()"></textarea>
                                <div *ngIf="contactMethodForm.get('description')?.invalid && contactMethodForm.get('description')?.touched" class="text-danger">
                                    Description is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                                <label for="ContactMethod-sequence" id="label-ContactMethod-sequence">Sequence</label>
                                <input type="number" id="ContactMethod-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control contact-method-input" [disabled]="!userIsSchedulerContactMethodWriter()" aria-labelledby="label-sequence" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('iconId')">
                                <label for="ContactMethod-iconId" id="label-ContactMethod-iconId">Icon</label>
                                <select id="ContactMethod-iconId" formControlName="iconId" class="form-select contact-method-select" [disabled]="!userIsSchedulerContactMethodWriter()">
                                    <option [ngValue]="null">Select Icon</option>
                                    <option *ngFor="let icon of icons$ | async" [ngValue]="icon.id">{{icon.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('color')">
                                <label for="ContactMethod-color" id="label-ContactMethod-color">Color</label>
                                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="ContactMethod-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerContactMethodWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="contactMethodForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ContactMethod-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerContactMethodWriter()" />
                                <label for="ContactMethod-active" class="form-check-label" id="label-ContactMethod-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="ContactMethod-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerContactMethodWriter()" />
                                <label for="ContactMethod-deleted" class="form-check-label" id="label-ContactMethod-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="contact-method-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="contactMethodForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Contact Method">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !contactMethodForm.valid || !contactMethodForm.dirty || contactMethodForm.pristine  || userIsSchedulerContactMethodWriter() == false " ngbTooltip="Save the Contact Method changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Contact Method' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSchedulerContactMethodReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 contact-method-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="contactService.userIsSchedulerContactReader()">
                            <button ngbNavLink>Contacts
                                <span class="badge bg-primary ms-2">
                                    {{ (contactMethodData?.ContactsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-contact-table [queryParams]="{ contactMethodId: contactMethodData?.id }" [showAddButton]="true" [preSeededData]="{ contactMethodId: contactMethodData?.id }" [hiddenFields]="['contactMethodId']"></app-contact-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
