<div class="add-time-zone" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-time-zone me-2"
        (click)="openModal()"
        ngbTooltip="Add Time Zone" 
        *ngIf="userIsSchedulerTimeZoneWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #timeZoneModal let-modal>
   <div class="modal-header bg-dark text-light time-zone-modal-header">
      <h5 class="modal-title mb-0" id="timeZoneModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Time Zone' : 'Add Time Zone' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body time-zone-modal-body">
      <form [formGroup]="timeZoneForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="TimeZone-name" id="label-TimeZone-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="TimeZone-name" formControlName="name" placeholder="Enter Name" class="form-control time-zone-input" [disabled]="!userIsSchedulerTimeZoneWriter()" aria-labelledby="label-name" />
                <div *ngIf="timeZoneForm.get('name')?.invalid && timeZoneForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="TimeZone-description" id="label-TimeZone-description"><span class="text-danger">*</span>Description</label>
                <textarea id="TimeZone-description" formControlName="description" placeholder="Enter Description" class="form-control time-zone-input" [disabled]="!userIsSchedulerTimeZoneWriter()"></textarea>
                <div *ngIf="timeZoneForm.get('description')?.invalid && timeZoneForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('ianaTimeZone')">
                <label for="TimeZone-ianaTimeZone" id="label-TimeZone-ianaTimeZone"><span class="text-danger">*</span>Iana Time Zone</label>
                <input type="text" id="TimeZone-ianaTimeZone" formControlName="ianaTimeZone" placeholder="Enter Iana Time Zone" class="form-control time-zone-input" [disabled]="!userIsSchedulerTimeZoneWriter()" aria-labelledby="label-ianaTimeZone" />
                <div *ngIf="timeZoneForm.get('ianaTimeZone')?.invalid && timeZoneForm.get('ianaTimeZone')?.touched" class="text-danger">
                    Iana Time Zone is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('abbreviation')">
                <label for="TimeZone-abbreviation" id="label-TimeZone-abbreviation"><span class="text-danger">*</span>Abbreviation</label>
                <input type="text" id="TimeZone-abbreviation" formControlName="abbreviation" placeholder="Enter Abbreviation" class="form-control time-zone-input" [disabled]="!userIsSchedulerTimeZoneWriter()" aria-labelledby="label-abbreviation" />
                <div *ngIf="timeZoneForm.get('abbreviation')?.invalid && timeZoneForm.get('abbreviation')?.touched" class="text-danger">
                    Abbreviation is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('abbreviationDaylightSavings')">
                <label for="TimeZone-abbreviationDaylightSavings" id="label-TimeZone-abbreviationDaylightSavings"><span class="text-danger">*</span>Abbreviation Daylight Savings</label>
                <input type="text" id="TimeZone-abbreviationDaylightSavings" formControlName="abbreviationDaylightSavings" placeholder="Enter Abbreviation Daylight Savings" class="form-control time-zone-input" [disabled]="!userIsSchedulerTimeZoneWriter()" aria-labelledby="label-abbreviationDaylightSavings" />
                <div *ngIf="timeZoneForm.get('abbreviationDaylightSavings')?.invalid && timeZoneForm.get('abbreviationDaylightSavings')?.touched" class="text-danger">
                    Abbreviation Daylight Savings is required
                </div>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('supportsDaylightSavings')">
                <input type="checkbox" id="TimeZone-supportsDaylightSavings" formControlName="supportsDaylightSavings" class="form-check-input" [disabled]="!userIsSchedulerTimeZoneWriter()" />
                <label for="TimeZone-supportsDaylightSavings" class="form-check-label" id="label-TimeZone-supportsDaylightSavings"><span class="text-danger">*</span>Supports Daylight Savings</label>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('standardUTCOffsetHours')">
                <label for="TimeZone-standardUTCOffsetHours" id="label-TimeZone-standardUTCOffsetHours"><span class="text-danger">*</span>Standard U T C Offset Hours</label>
                <input type="number" id="TimeZone-standardUTCOffsetHours" formControlName="standardUTCOffsetHours" placeholder="Enter Standard U T C Offset Hours" class="form-control time-zone-input" [disabled]="!userIsSchedulerTimeZoneWriter()" aria-labelledby="label-standardUTCOffsetHours" />
                <div *ngIf="timeZoneForm.get('standardUTCOffsetHours')?.invalid && timeZoneForm.get('standardUTCOffsetHours')?.touched" class="text-danger">
                    Standard U T C Offset Hours is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('dstUTCOffsetHours')">
                <label for="TimeZone-dstUTCOffsetHours" id="label-TimeZone-dstUTCOffsetHours"><span class="text-danger">*</span>Dst U T C Offset Hours</label>
                <input type="number" id="TimeZone-dstUTCOffsetHours" formControlName="dstUTCOffsetHours" placeholder="Enter Dst U T C Offset Hours" class="form-control time-zone-input" [disabled]="!userIsSchedulerTimeZoneWriter()" aria-labelledby="label-dstUTCOffsetHours" />
                <div *ngIf="timeZoneForm.get('dstUTCOffsetHours')?.invalid && timeZoneForm.get('dstUTCOffsetHours')?.touched" class="text-danger">
                    Dst U T C Offset Hours is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="TimeZone-sequence" id="label-TimeZone-sequence">Sequence</label>
                <input type="number" id="TimeZone-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control time-zone-input" [disabled]="!userIsSchedulerTimeZoneWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="TimeZone-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerTimeZoneWriter()" />
                <label for="TimeZone-active" class="form-check-label" id="label-TimeZone-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="TimeZone-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerTimeZoneWriter()" />
                <label for="TimeZone-deleted" class="form-check-label" id="label-TimeZone-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer time-zone-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Time Zone changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !timeZoneForm.valid || timeZoneForm.pristine  || userIsSchedulerTimeZoneWriter() == false " ngbTooltip="Save the Time Zone changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Time Zone' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
