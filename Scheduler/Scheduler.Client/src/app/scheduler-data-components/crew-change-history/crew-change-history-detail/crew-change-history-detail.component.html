<div class="container-fluid p-1 m-0 crew-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card gradient-header shadow-sm">
            <div class="crew-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-outline-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Crew Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Crew Change History' : 'Add Crew Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSchedulerCrewChangeHistoryReader()">
                <div class="col m-2 crew-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="crewChangeHistoryForm" (ngSubmit)="submitForm()" class="crew-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('crewId')">
                                <label for="CrewChangeHistory-crewId" id="label-CrewChangeHistory-crewId"><span class="text-danger">*</span>Crew</label>
                                <select id="CrewChangeHistory-crewId" formControlName="crewId" class="form-select crew-change-history-select" [disabled]="!userIsSchedulerCrewChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Crew</option>
                                    <option *ngFor="let crew of crews$ | async" [ngValue]="crew.id">{{[crew.name] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="crewChangeHistoryForm.get('crewId')?.invalid && crewChangeHistoryForm.get('crewId')?.touched" class="text-danger">
                                    Crew is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="CrewChangeHistory-versionNumber" id="label-CrewChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="CrewChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control crew-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="CrewChangeHistory-timeStamp" id="label-CrewChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="CrewChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control crew-change-history-input" [disabled]="!userIsSchedulerCrewChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="crewChangeHistoryForm.get('timeStamp')?.invalid && crewChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="CrewChangeHistory-userId" id="label-CrewChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="CrewChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control crew-change-history-input" [disabled]="!userIsSchedulerCrewChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="crewChangeHistoryForm.get('userId')?.invalid && crewChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="CrewChangeHistory-data" id="label-CrewChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="CrewChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control crew-change-history-input" [disabled]="!userIsSchedulerCrewChangeHistoryWriter()"></textarea>
                                <div *ngIf="crewChangeHistoryForm.get('data')?.invalid && crewChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="crew-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="crewChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Crew Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !crewChangeHistoryForm.valid || !crewChangeHistoryForm.dirty || crewChangeHistoryForm.pristine  || userIsSchedulerCrewChangeHistoryWriter() == false " ngbTooltip="Save the Crew Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Crew Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
