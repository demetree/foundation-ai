<div class="add-household-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-household-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Household Change History" 
        *ngIf="userIsSchedulerHouseholdChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #householdChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light household-change-history-modal-header">
      <h5 class="modal-title mb-0" id="householdChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Household Change History' : 'Add Household Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body household-change-history-modal-body">
      <form [formGroup]="householdChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('householdId')">
                <label for="HouseholdChangeHistory-householdId" id="label-HouseholdChangeHistory-householdId"><span class="text-danger">*</span>Household</label>
                <select id="HouseholdChangeHistory-householdId" formControlName="householdId" class="form-select household-change-history-select" [disabled]="!userIsSchedulerHouseholdChangeHistoryWriter()">
                    <option [ngValue]="null">Select Household</option>
                    <option *ngFor="let household of households$ | async" [ngValue]="household.id">{{household.name}}</option>
                </select>
                <div *ngIf="householdChangeHistoryForm.get('householdId')?.invalid && householdChangeHistoryForm.get('householdId')?.touched" class="text-danger">
                    Household is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="HouseholdChangeHistory-versionNumber" id="label-HouseholdChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="HouseholdChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control household-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="HouseholdChangeHistory-timeStamp" id="label-HouseholdChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="HouseholdChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control household-change-history-input" [disabled]="!userIsSchedulerHouseholdChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="householdChangeHistoryForm.get('timeStamp')?.invalid && householdChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="HouseholdChangeHistory-userId" id="label-HouseholdChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="HouseholdChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control household-change-history-input" [disabled]="!userIsSchedulerHouseholdChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="householdChangeHistoryForm.get('userId')?.invalid && householdChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="HouseholdChangeHistory-data" id="label-HouseholdChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="HouseholdChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control household-change-history-input" [disabled]="!userIsSchedulerHouseholdChangeHistoryWriter()"></textarea>
                <div *ngIf="householdChangeHistoryForm.get('data')?.invalid && householdChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer household-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Household Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !householdChangeHistoryForm.valid || householdChangeHistoryForm.pristine  || userIsSchedulerHouseholdChangeHistoryWriter() == false " ngbTooltip="Save the Household Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Household Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
