<div class="add-financial-office" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-financial-office me-2"
        (click)="openModal()"
        ngbTooltip="Add Financial Office" 
        *ngIf="userIsSchedulerFinancialOfficeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #financialOfficeModal let-modal>
   <div class="modal-header financial-office-modal-header">
      <h5 class="modal-title mb-0" id="financialOfficeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Financial Office' : 'Add Financial Office' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body financial-office-modal-body">
      <form [formGroup]="financialOfficeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="FinancialOffice-name" id="label-FinancialOffice-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="FinancialOffice-name" formControlName="name" placeholder="Enter Name" class="form-control financial-office-input" [disabled]="!userIsSchedulerFinancialOfficeWriter()" aria-labelledby="label-name" />
                <div *ngIf="financialOfficeForm.get('name')?.invalid && financialOfficeForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="FinancialOffice-description" id="label-FinancialOffice-description"><span class="text-danger">*</span>Description</label>
                <textarea id="FinancialOffice-description" formControlName="description" placeholder="Enter Description" class="form-control financial-office-input" [disabled]="!userIsSchedulerFinancialOfficeWriter()"></textarea>
                <div *ngIf="financialOfficeForm.get('description')?.invalid && financialOfficeForm.get('description')?.touched" class="text-danger">
                    Description is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('code')">
                <label for="FinancialOffice-code" id="label-FinancialOffice-code"><span class="text-danger">*</span>Code</label>
                <input type="text" id="FinancialOffice-code" formControlName="code" placeholder="Enter Code" class="form-control financial-office-input" [disabled]="!userIsSchedulerFinancialOfficeWriter()" aria-labelledby="label-code" />
                <div *ngIf="financialOfficeForm.get('code')?.invalid && financialOfficeForm.get('code')?.touched" class="text-danger">
                    Code is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('contactName')">
                <label for="FinancialOffice-contactName" id="label-FinancialOffice-contactName">Contact Name</label>
                <input type="text" id="FinancialOffice-contactName" formControlName="contactName" placeholder="Enter Contact Name" class="form-control financial-office-input" [disabled]="!userIsSchedulerFinancialOfficeWriter()" aria-labelledby="label-contactName" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('contactEmail')">
                <label for="FinancialOffice-contactEmail" id="label-FinancialOffice-contactEmail" *ngIf="isEditMode"><a href="mailto:{{financialOfficeSubmitData?.contactEmail}}" ngbTooltip="Send Email to {{financialOfficeSubmitData?.contactEmail}}">Contact Email</a></label>
                <label for="FinancialOffice-contactEmail" id="label-FinancialOffice-contactEmail" *ngIf="!isEditMode">Contact Email</label>
                <input type="text" id="FinancialOffice-contactEmail" formControlName="contactEmail" placeholder="Enter Contact Email" class="form-control financial-office-input" [disabled]="!userIsSchedulerFinancialOfficeWriter()" aria-labelledby="label-contactEmail" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('exportFormat')">
                <label for="FinancialOffice-exportFormat" id="label-FinancialOffice-exportFormat">Export Format</label>
                <input type="text" id="FinancialOffice-exportFormat" formControlName="exportFormat" placeholder="Enter Export Format" class="form-control financial-office-input" [disabled]="!userIsSchedulerFinancialOfficeWriter()" aria-labelledby="label-exportFormat" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('color')">
                <label for="FinancialOffice-color" id="label-FinancialOffice-color">Color</label>
                <div class="d-flex align-items-center gap-3">
                    <!-- Native color picker input (type="color") -->
                    <input 
                        type="color" 
                        id="FinancialOffice-color" 
                        formControlName="color" 
                        class="form-control form-control-color color-picker" 
                        [disabled]="!userIsSchedulerFinancialOfficeWriter()"
                        aria-labelledby="label-color"
                        title="Choose Color">
                    
                    <!-- Usually this isn't needed
                    <input 
                        type="text" 
                        [value]="financialOfficeForm.get('color')?.value || '#000000'" 
                        readonly 
                        class="form-control input-color-display"
                        style="width: 120px;">-->
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sequence')">
                <label for="FinancialOffice-sequence" id="label-FinancialOffice-sequence">Sequence</label>
                <input type="number" id="FinancialOffice-sequence" formControlName="sequence" placeholder="Enter Sequence" class="form-control financial-office-input" [disabled]="!userIsSchedulerFinancialOfficeWriter()" aria-labelledby="label-sequence" />
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="FinancialOffice-versionNumber" id="label-FinancialOffice-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="FinancialOffice-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control financial-office-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="FinancialOffice-active" formControlName="active" class="form-check-input" [disabled]="!userIsSchedulerFinancialOfficeWriter()" />
                <label for="FinancialOffice-active" class="form-check-label" id="label-FinancialOffice-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="FinancialOffice-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSchedulerFinancialOfficeWriter()" />
                <label for="FinancialOffice-deleted" class="form-check-label" id="label-FinancialOffice-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer financial-office-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Financial Office changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !financialOfficeForm.valid || financialOfficeForm.pristine  || userIsSchedulerFinancialOfficeWriter() == false " ngbTooltip="Save the Financial Office changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Financial Office' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
