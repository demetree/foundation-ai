<div class="add-on-call-schedule" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-on-call-schedule me-2"
        (click)="openModal()"
        ngbTooltip="Add On Call Schedule" 
        *ngIf="userIsAlertingOnCallScheduleWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #onCallScheduleModal let-modal>
   <div class="modal-header bg-dark text-light on-call-schedule-modal-header">
      <h5 class="modal-title mb-0" id="onCallScheduleModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit On Call Schedule' : 'Add On Call Schedule' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body on-call-schedule-modal-body">
      <form [formGroup]="onCallScheduleForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="OnCallSchedule-name" id="label-OnCallSchedule-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="OnCallSchedule-name" formControlName="name" placeholder="Enter Name" class="form-control on-call-schedule-input" [disabled]="!userIsAlertingOnCallScheduleWriter()" aria-labelledby="label-name" />
                <div *ngIf="onCallScheduleForm.get('name')?.invalid && onCallScheduleForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="OnCallSchedule-description" id="label-OnCallSchedule-description">Description</label>
                <textarea id="OnCallSchedule-description" formControlName="description" placeholder="Enter Description" class="form-control on-call-schedule-input" [disabled]="!userIsAlertingOnCallScheduleWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeZoneId')">
                <label for="OnCallSchedule-timeZoneId" id="label-OnCallSchedule-timeZoneId"><span class="text-danger">*</span>Time Zone Id</label>
                <input type="text" id="OnCallSchedule-timeZoneId" formControlName="timeZoneId" placeholder="Enter Time Zone Id" class="form-control on-call-schedule-input" [disabled]="!userIsAlertingOnCallScheduleWriter()" aria-labelledby="label-timeZoneId" />
                <div *ngIf="onCallScheduleForm.get('timeZoneId')?.invalid && onCallScheduleForm.get('timeZoneId')?.touched" class="text-danger">
                    Time Zone Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="OnCallSchedule-versionNumber" id="label-OnCallSchedule-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="OnCallSchedule-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control on-call-schedule-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="OnCallSchedule-active" formControlName="active" class="form-check-input" [disabled]="!userIsAlertingOnCallScheduleWriter()" />
                <label for="OnCallSchedule-active" class="form-check-label" id="label-OnCallSchedule-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="OnCallSchedule-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsAlertingOnCallScheduleWriter()" />
                <label for="OnCallSchedule-deleted" class="form-check-label" id="label-OnCallSchedule-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer on-call-schedule-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the On Call Schedule changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !onCallScheduleForm.valid || onCallScheduleForm.pristine  || userIsAlertingOnCallScheduleWriter() == false " ngbTooltip="Save the On Call Schedule changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add On Call Schedule' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
