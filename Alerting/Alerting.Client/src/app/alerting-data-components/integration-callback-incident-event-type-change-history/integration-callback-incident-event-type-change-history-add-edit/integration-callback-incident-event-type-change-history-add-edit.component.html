<div class="add-integration-callback-incident-event-type-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-integration-callback-incident-event-type-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Integration Callback Incident Event Type Change History" 
        *ngIf="userIsAlertingIntegrationCallbackIncidentEventTypeChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #integrationCallbackIncidentEventTypeChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light integration-callback-incident-event-type-change-history-modal-header">
      <h5 class="modal-title mb-0" id="integrationCallbackIncidentEventTypeChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Integration Callback Incident Event Type Change History' : 'Add Integration Callback Incident Event Type Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body integration-callback-incident-event-type-change-history-modal-body">
      <form [formGroup]="integrationCallbackIncidentEventTypeChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('integrationCallbackIncidentEventTypeId')">
                <label for="IntegrationCallbackIncidentEventTypeChangeHistory-integrationCallbackIncidentEventTypeId" id="label-IntegrationCallbackIncidentEventTypeChangeHistory-integrationCallbackIncidentEventTypeId"><span class="text-danger">*</span>Integration Callback Incident Event Type</label>
                <select id="IntegrationCallbackIncidentEventTypeChangeHistory-integrationCallbackIncidentEventTypeId" formControlName="integrationCallbackIncidentEventTypeId" class="form-select integration-callback-incident-event-type-change-history-select" [disabled]="!userIsAlertingIntegrationCallbackIncidentEventTypeChangeHistoryWriter()">
                    <option [ngValue]="null">Select Integration Callback Incident Event Type</option>
                    <option *ngFor="let integrationCallbackIncidentEventType of integrationCallbackIncidentEventTypes$ | async" [ngValue]="integrationCallbackIncidentEventType.id">{{integrationCallbackIncidentEventType.id}}</option>
                </select>
                <div *ngIf="integrationCallbackIncidentEventTypeChangeHistoryForm.get('integrationCallbackIncidentEventTypeId')?.invalid && integrationCallbackIncidentEventTypeChangeHistoryForm.get('integrationCallbackIncidentEventTypeId')?.touched" class="text-danger">
                    Integration Callback Incident Event Type is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="IntegrationCallbackIncidentEventTypeChangeHistory-versionNumber" id="label-IntegrationCallbackIncidentEventTypeChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="IntegrationCallbackIncidentEventTypeChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control integration-callback-incident-event-type-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="IntegrationCallbackIncidentEventTypeChangeHistory-timeStamp" id="label-IntegrationCallbackIncidentEventTypeChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="IntegrationCallbackIncidentEventTypeChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control integration-callback-incident-event-type-change-history-input" [disabled]="!userIsAlertingIntegrationCallbackIncidentEventTypeChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="integrationCallbackIncidentEventTypeChangeHistoryForm.get('timeStamp')?.invalid && integrationCallbackIncidentEventTypeChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="IntegrationCallbackIncidentEventTypeChangeHistory-userId" id="label-IntegrationCallbackIncidentEventTypeChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="IntegrationCallbackIncidentEventTypeChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control integration-callback-incident-event-type-change-history-input" [disabled]="!userIsAlertingIntegrationCallbackIncidentEventTypeChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="integrationCallbackIncidentEventTypeChangeHistoryForm.get('userId')?.invalid && integrationCallbackIncidentEventTypeChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="IntegrationCallbackIncidentEventTypeChangeHistory-data" id="label-IntegrationCallbackIncidentEventTypeChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="IntegrationCallbackIncidentEventTypeChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control integration-callback-incident-event-type-change-history-input" [disabled]="!userIsAlertingIntegrationCallbackIncidentEventTypeChangeHistoryWriter()"></textarea>
                <div *ngIf="integrationCallbackIncidentEventTypeChangeHistoryForm.get('data')?.invalid && integrationCallbackIncidentEventTypeChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer integration-callback-incident-event-type-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Integration Callback Incident Event Type Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !integrationCallbackIncidentEventTypeChangeHistoryForm.valid || integrationCallbackIncidentEventTypeChangeHistoryForm.pristine  || userIsAlertingIntegrationCallbackIncidentEventTypeChangeHistoryWriter() == false " ngbTooltip="Save the Integration Callback Incident Event Type Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Integration Callback Incident Event Type Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
