<div class="container-fluid p-1 m-0 severity-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="severity-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Severity Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Severity Type' : 'Add Severity Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAlertingSeverityTypeReader()">
                <div class="col m-2 severity-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="severityTypeForm" (ngSubmit)="submitForm()" class="severity-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="SeverityType-name" id="label-SeverityType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="SeverityType-name" formControlName="name" placeholder="Enter Name" class="form-control severity-type-input" [disabled]="!userIsAlertingSeverityTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="severityTypeForm.get('name')?.invalid && severityTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="SeverityType-description" id="label-SeverityType-description">Description</label>
                                <textarea id="SeverityType-description" formControlName="description" placeholder="Enter Description" class="form-control severity-type-input" [disabled]="!userIsAlertingSeverityTypeWriter()"></textarea>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SeverityType-active" formControlName="active" class="form-check-input" [disabled]="!userIsAlertingSeverityTypeWriter()" />
                                <label for="SeverityType-active" class="form-check-label" id="label-SeverityType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SeverityType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsAlertingSeverityTypeWriter()" />
                                <label for="SeverityType-deleted" class="form-check-label" id="label-SeverityType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="severity-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="severityTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Severity Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !severityTypeForm.valid || !severityTypeForm.dirty || severityTypeForm.pristine  || userIsAlertingSeverityTypeWriter() == false " ngbTooltip="Save the Severity Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Severity Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAlertingSeverityTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 severity-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="incidentService.userIsAlertingIncidentReader()">
                            <button ngbNavLink>Incidents
                                <span class="badge bg-primary ms-2">
                                    {{ (severityTypeData?.IncidentsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-incident-table [queryParams]="{ severityTypeId: severityTypeData?.id }"></app-incident-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-incident-add-edit [preSeededData]="{ severityTypeId: severityTypeData?.id }" [hiddenFields]="['severityTypeId']"></app-incident-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
