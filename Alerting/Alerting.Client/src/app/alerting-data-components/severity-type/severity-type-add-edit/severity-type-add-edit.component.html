<div class="add-severity-type" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-severity-type me-2"
        (click)="openModal()"
        ngbTooltip="Add Severity Type" 
        *ngIf="userIsAlertingSeverityTypeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #severityTypeModal let-modal>
   <div class="modal-header bg-dark text-light severity-type-modal-header">
      <h5 class="modal-title mb-0" id="severityTypeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Severity Type' : 'Add Severity Type' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body severity-type-modal-body">
      <form [formGroup]="severityTypeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="SeverityType-name" id="label-SeverityType-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="SeverityType-name" formControlName="name" placeholder="Enter Name" class="form-control severity-type-input" [disabled]="!userIsAlertingSeverityTypeWriter()" aria-labelledby="label-name" />
                <div *ngIf="severityTypeForm.get('name')?.invalid && severityTypeForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="SeverityType-description" id="label-SeverityType-description">Description</label>
                <textarea id="SeverityType-description" formControlName="description" placeholder="Enter Description" class="form-control severity-type-input" [disabled]="!userIsAlertingSeverityTypeWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="SeverityType-active" formControlName="active" class="form-check-input" [disabled]="!userIsAlertingSeverityTypeWriter()" />
                <label for="SeverityType-active" class="form-check-label" id="label-SeverityType-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="SeverityType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsAlertingSeverityTypeWriter()" />
                <label for="SeverityType-deleted" class="form-check-label" id="label-SeverityType-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer severity-type-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Severity Type changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !severityTypeForm.valid || severityTypeForm.pristine  || userIsAlertingSeverityTypeWriter() == false " ngbTooltip="Save the Severity Type changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Severity Type' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
