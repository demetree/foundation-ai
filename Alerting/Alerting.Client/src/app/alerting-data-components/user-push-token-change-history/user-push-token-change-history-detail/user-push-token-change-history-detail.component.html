<div class="container-fluid p-1 m-0 user-push-token-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="user-push-token-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">User Push Token Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit User Push Token Change History' : 'Add User Push Token Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAlertingUserPushTokenChangeHistoryReader()">
                <div class="col m-2 user-push-token-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="userPushTokenChangeHistoryForm" (ngSubmit)="submitForm()" class="user-push-token-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('userPushTokenId')">
                                <label for="UserPushTokenChangeHistory-userPushTokenId" id="label-UserPushTokenChangeHistory-userPushTokenId"><span class="text-danger">*</span>User Push Token</label>
                                <select id="UserPushTokenChangeHistory-userPushTokenId" formControlName="userPushTokenId" class="form-select user-push-token-change-history-select" [disabled]="!userIsAlertingUserPushTokenChangeHistoryWriter()">
                                    <option [ngValue]="null">Select User Push Token</option>
                                    <option *ngFor="let userPushToken of userPushTokens$ | async" [ngValue]="userPushToken.id">{{userPushToken.fcmToken}}</option>
                                </select>
                                <div *ngIf="userPushTokenChangeHistoryForm.get('userPushTokenId')?.invalid && userPushTokenChangeHistoryForm.get('userPushTokenId')?.touched" class="text-danger">
                                    User Push Token is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="UserPushTokenChangeHistory-versionNumber" id="label-UserPushTokenChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="UserPushTokenChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control user-push-token-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="UserPushTokenChangeHistory-timeStamp" id="label-UserPushTokenChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="UserPushTokenChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control user-push-token-change-history-input" [disabled]="!userIsAlertingUserPushTokenChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="userPushTokenChangeHistoryForm.get('timeStamp')?.invalid && userPushTokenChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="UserPushTokenChangeHistory-userId" id="label-UserPushTokenChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="UserPushTokenChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control user-push-token-change-history-input" [disabled]="!userIsAlertingUserPushTokenChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="userPushTokenChangeHistoryForm.get('userId')?.invalid && userPushTokenChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="UserPushTokenChangeHistory-data" id="label-UserPushTokenChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="UserPushTokenChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control user-push-token-change-history-input" [disabled]="!userIsAlertingUserPushTokenChangeHistoryWriter()"></textarea>
                                <div *ngIf="userPushTokenChangeHistoryForm.get('data')?.invalid && userPushTokenChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="user-push-token-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="userPushTokenChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload User Push Token Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !userPushTokenChangeHistoryForm.valid || !userPushTokenChangeHistoryForm.dirty || userPushTokenChangeHistoryForm.pristine  || userIsAlertingUserPushTokenChangeHistoryWriter() == false " ngbTooltip="Save the User Push Token Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add User Push Token Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
