<div class="container-fluid p-1 m-0 escalation-policy-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="escalation-policy-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Escalation Policy Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Escalation Policy Change History' : 'Add Escalation Policy Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAlertingEscalationPolicyChangeHistoryReader()">
                <div class="col m-2 escalation-policy-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="escalationPolicyChangeHistoryForm" (ngSubmit)="submitForm()" class="escalation-policy-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('escalationPolicyId')">
                                <label for="EscalationPolicyChangeHistory-escalationPolicyId" id="label-EscalationPolicyChangeHistory-escalationPolicyId"><span class="text-danger">*</span>Escalation Policy</label>
                                <select id="EscalationPolicyChangeHistory-escalationPolicyId" formControlName="escalationPolicyId" class="form-select escalation-policy-change-history-select" [disabled]="!userIsAlertingEscalationPolicyChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Escalation Policy</option>
                                    <option *ngFor="let escalationPolicy of escalationPolicies$ | async" [ngValue]="escalationPolicy.id">{{escalationPolicy.name}}</option>
                                </select>
                                <div *ngIf="escalationPolicyChangeHistoryForm.get('escalationPolicyId')?.invalid && escalationPolicyChangeHistoryForm.get('escalationPolicyId')?.touched" class="text-danger">
                                    Escalation Policy is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="EscalationPolicyChangeHistory-versionNumber" id="label-EscalationPolicyChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="EscalationPolicyChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control escalation-policy-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="EscalationPolicyChangeHistory-timeStamp" id="label-EscalationPolicyChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="EscalationPolicyChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control escalation-policy-change-history-input" [disabled]="!userIsAlertingEscalationPolicyChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="escalationPolicyChangeHistoryForm.get('timeStamp')?.invalid && escalationPolicyChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="EscalationPolicyChangeHistory-userId" id="label-EscalationPolicyChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="EscalationPolicyChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control escalation-policy-change-history-input" [disabled]="!userIsAlertingEscalationPolicyChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="escalationPolicyChangeHistoryForm.get('userId')?.invalid && escalationPolicyChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="EscalationPolicyChangeHistory-data" id="label-EscalationPolicyChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="EscalationPolicyChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control escalation-policy-change-history-input" [disabled]="!userIsAlertingEscalationPolicyChangeHistoryWriter()"></textarea>
                                <div *ngIf="escalationPolicyChangeHistoryForm.get('data')?.invalid && escalationPolicyChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="escalation-policy-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="escalationPolicyChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Escalation Policy Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !escalationPolicyChangeHistoryForm.valid || !escalationPolicyChangeHistoryForm.dirty || escalationPolicyChangeHistoryForm.pristine  || userIsAlertingEscalationPolicyChangeHistoryWriter() == false " ngbTooltip="Save the Escalation Policy Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Escalation Policy Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
