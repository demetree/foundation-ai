<div class="container-fluid p-1 m-0 service-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="service-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Service</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Service' : 'Add Service'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAlertingServiceReader()">
                <div class="col m-2 service-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="serviceForm" (ngSubmit)="submitForm()" class="service-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('escalationPolicyId')">
                                <label for="Service-escalationPolicyId" id="label-Service-escalationPolicyId">Escalation Policy</label>
                                <select id="Service-escalationPolicyId" formControlName="escalationPolicyId" class="form-select service-select" [disabled]="!userIsAlertingServiceWriter()">
                                    <option [ngValue]="null">Select Escalation Policy</option>
                                    <option *ngFor="let escalationPolicy of escalationPolicies$ | async" [ngValue]="escalationPolicy.id">{{escalationPolicy.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="Service-name" id="label-Service-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="Service-name" formControlName="name" placeholder="Enter Name" class="form-control service-input" [disabled]="!userIsAlertingServiceWriter()" aria-labelledby="label-name" />
                                <div *ngIf="serviceForm.get('name')?.invalid && serviceForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="Service-description" id="label-Service-description">Description</label>
                                <textarea id="Service-description" formControlName="description" placeholder="Enter Description" class="form-control service-input" [disabled]="!userIsAlertingServiceWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('ownerTeamObjectGuid')">
                                <label for="Service-ownerTeamObjectGuid" id="label-Service-ownerTeamObjectGuid">Owner Team Object Guid</label>
                                <input type="text" id="Service-ownerTeamObjectGuid" formControlName="ownerTeamObjectGuid" placeholder="Enter Owner Team Object Guid" class="form-control service-input" [disabled]="!userIsAlertingServiceWriter()" aria-labelledby="label-ownerTeamObjectGuid" />
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="Service-versionNumber" id="label-Service-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="Service-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control service-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Service-active" formControlName="active" class="form-check-input" [disabled]="!userIsAlertingServiceWriter()" />
                                <label for="Service-active" class="form-check-label" id="label-Service-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Service-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsAlertingServiceWriter()" />
                                <label for="Service-deleted" class="form-check-label" id="label-Service-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="service-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="serviceForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Service">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !serviceForm.valid || !serviceForm.dirty || serviceForm.pristine  || userIsAlertingServiceWriter() == false " ngbTooltip="Save the Service changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Service' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAlertingServiceReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 service-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="serviceChangeHistoryService.userIsAlertingServiceChangeHistoryReader()">
                            <button ngbNavLink>Service Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (serviceData?.ServiceChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-service-change-history-table [queryParams]="{ serviceId: serviceData?.id }"></app-service-change-history-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-service-change-history-add-edit [preSeededData]="{ serviceId: serviceData?.id }" [hiddenFields]="['serviceId']"></app-service-change-history-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="integrationService.userIsAlertingIntegrationReader()">
                            <button ngbNavLink>Integrations
                                <span class="badge bg-primary ms-2">
                                    {{ (serviceData?.IntegrationsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-integration-table [queryParams]="{ serviceId: serviceData?.id }"></app-integration-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-integration-add-edit [preSeededData]="{ serviceId: serviceData?.id }" [hiddenFields]="['serviceId']"></app-integration-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="incidentService.userIsAlertingIncidentReader()">
                            <button ngbNavLink>Incidents
                                <span class="badge bg-primary ms-2">
                                    {{ (serviceData?.IncidentsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-incident-table [queryParams]="{ serviceId: serviceData?.id }"></app-incident-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-incident-add-edit [preSeededData]="{ serviceId: serviceData?.id }" [hiddenFields]="['serviceId']"></app-incident-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
