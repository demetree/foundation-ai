<div class="page-container">
    <div class="card mb-3 header-card shadow-sm">
        <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-3">
            <div class="header-left">
                <!-- Back Button -->
                <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back" *ngIf="canGoBack()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <!-- Title -->
                <div>
                    <h3 class="page-title mb-0">Escalation Rules</h3>
                    <small class="text-muted">View Escalation Rules</small>
                </div>
            </div>

            <div class="header-right">
              <span class="badge bg-secondary mx-2" *ngIf="loadingTotalCount || loadingFilteredCount">
                <i class="fa fa-spinner fa-spin me-1"></i> Loading...
              </span>

              <span *ngIf="!(loadingTotalCount || loadingFilteredCount)">
                <ng-container *ngIf="totalEscalationRuleCount$ | async as total; else falsyObservable">
                  <span class="badge bg-secondary mx-2">

                    <!-- Filtered: some results -->
                    <ng-container *ngIf="filteredEscalationRuleCount$ | async as filteredCount">
                      <span *ngIf="filterText && (filteredCount ?? 0) > 0">
                        {{ filteredCount }} of {{ total }} {{ total !== 1 ? 'Escalation Rules' : 'Escalation Rule' }}
                      </span>
                    </ng-container>
                    <!-- Filtered: 0 results -->
                    <span *ngIf="total > 0 && filterText && (filteredEscalationRuleCount$ | async) === 0">
                      No matching Escalation Rules
                    </span>
                    <!-- No filter: normal count -->
                    <span *ngIf="!filterText">
                      {{ total }} {{ total !== 1 ? 'Escalation Rules' : 'Escalation Rule' }}
                    </span>
                    <!-- No Escalation Rules at all (even unfiltered) -->
                    <span *ngIf="total === 0">
                      No Escalation Rules
                    </span>

                  </span>
                </ng-container>

                <!-- when observable is falsy, then decide whether to show a spinner or a loading spinner..-->
                <ng-template #falsyObservable>
                  <span class="badge bg-secondary mx-2" *ngIf="(loadingTotalCount || loadingFilteredCount)">
                    <i class="fa fa-spinner fa-spin me-1"></i> Loading...
                  </span>
                  <span class="badge bg-secondary mx-2" *ngIf="!(loadingTotalCount || loadingFilteredCount)">
                    No Escalation Rules
                  </span>
                </ng-template>

              </span>

                <!-- Quick Search Input -->
                <div class="search-bar me-2 position-relative">  
                <i class="fa fa-search search-icon"></i>
                <input type="text"
                   class="form-control search-input"
                   placeholder="Search EscalationRules..."
                   [(ngModel)]="filterText"
                   (ngModelChange)="onFilterChange()">
                <button *ngIf="filterText"
                    class="clear-search btn"
                    (click)="filterText=''; onFilterChange()"
                    title="Clear Search">
                <i class="fa fa-times"></i>
                </button>
            </div>

             <!-- Add/Edit Button -->
             <app-escalation-rule-add-edit [navigateToDetailsAfterAdd]="false"></app-escalation-rule-add-edit>
          </div>
      </div>
    </div>

  <app-escalation-rule-table
    *ngIf="userIsAlertingEscalationRuleReader() == true"
    [filterText]="filterText"
    [isSmallScreen]="isSmallScreen">
  </app-escalation-rule-table>
</div>
