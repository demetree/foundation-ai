<div class="container-fluid p-1 m-0 incident-event-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="incident-event-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Incident Event Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Incident Event Type' : 'Add Incident Event Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAlertingIncidentEventTypeReader()">
                <div class="col m-2 incident-event-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="incidentEventTypeForm" (ngSubmit)="submitForm()" class="incident-event-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="IncidentEventType-name" id="label-IncidentEventType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="IncidentEventType-name" formControlName="name" placeholder="Enter Name" class="form-control incident-event-type-input" [disabled]="!userIsAlertingIncidentEventTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="incidentEventTypeForm.get('name')?.invalid && incidentEventTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="IncidentEventType-description" id="label-IncidentEventType-description">Description</label>
                                <textarea id="IncidentEventType-description" formControlName="description" placeholder="Enter Description" class="form-control incident-event-type-input" [disabled]="!userIsAlertingIncidentEventTypeWriter()"></textarea>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="IncidentEventType-active" formControlName="active" class="form-check-input" [disabled]="!userIsAlertingIncidentEventTypeWriter()" />
                                <label for="IncidentEventType-active" class="form-check-label" id="label-IncidentEventType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="IncidentEventType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsAlertingIncidentEventTypeWriter()" />
                                <label for="IncidentEventType-deleted" class="form-check-label" id="label-IncidentEventType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="incident-event-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="incidentEventTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Incident Event Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !incidentEventTypeForm.valid || !incidentEventTypeForm.dirty || incidentEventTypeForm.pristine  || userIsAlertingIncidentEventTypeWriter() == false " ngbTooltip="Save the Incident Event Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Incident Event Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAlertingIncidentEventTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 incident-event-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="incidentTimelineEventService.userIsAlertingIncidentTimelineEventReader()">
                            <button ngbNavLink>Incident Timeline Events
                                <span class="badge bg-primary ms-2">
                                    {{ (incidentEventTypeData?.IncidentTimelineEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-incident-timeline-event-table [queryParams]="{ incidentEventTypeId: incidentEventTypeData?.id }"></app-incident-timeline-event-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-incident-timeline-event-add-edit [preSeededData]="{ incidentEventTypeId: incidentEventTypeData?.id }" [hiddenFields]="['incidentEventTypeId']"></app-incident-timeline-event-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
