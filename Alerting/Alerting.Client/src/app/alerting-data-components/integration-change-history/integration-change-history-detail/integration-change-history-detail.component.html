<div class="container-fluid p-1 m-0 integration-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="integration-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Integration Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Integration Change History' : 'Add Integration Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAlertingIntegrationChangeHistoryReader()">
                <div class="col m-2 integration-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="integrationChangeHistoryForm" (ngSubmit)="submitForm()" class="integration-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('integrationId')">
                                <label for="IntegrationChangeHistory-integrationId" id="label-IntegrationChangeHistory-integrationId"><span class="text-danger">*</span>Integration</label>
                                <select id="IntegrationChangeHistory-integrationId" formControlName="integrationId" class="form-select integration-change-history-select" [disabled]="!userIsAlertingIntegrationChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Integration</option>
                                    <option *ngFor="let integration of integrations$ | async" [ngValue]="integration.id">{{integration.name}}</option>
                                </select>
                                <div *ngIf="integrationChangeHistoryForm.get('integrationId')?.invalid && integrationChangeHistoryForm.get('integrationId')?.touched" class="text-danger">
                                    Integration is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="IntegrationChangeHistory-versionNumber" id="label-IntegrationChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="IntegrationChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control integration-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="IntegrationChangeHistory-timeStamp" id="label-IntegrationChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="IntegrationChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control integration-change-history-input" [disabled]="!userIsAlertingIntegrationChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="integrationChangeHistoryForm.get('timeStamp')?.invalid && integrationChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="IntegrationChangeHistory-userId" id="label-IntegrationChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="IntegrationChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control integration-change-history-input" [disabled]="!userIsAlertingIntegrationChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="integrationChangeHistoryForm.get('userId')?.invalid && integrationChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="IntegrationChangeHistory-data" id="label-IntegrationChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="IntegrationChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control integration-change-history-input" [disabled]="!userIsAlertingIntegrationChangeHistoryWriter()"></textarea>
                                <div *ngIf="integrationChangeHistoryForm.get('data')?.invalid && integrationChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="integration-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="integrationChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Integration Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !integrationChangeHistoryForm.valid || !integrationChangeHistoryForm.dirty || integrationChangeHistoryForm.pristine  || userIsAlertingIntegrationChangeHistoryWriter() == false " ngbTooltip="Save the Integration Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Integration Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
