<div class="add-escalation-rule-change-history" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-escalation-rule-change-history me-2"
        (click)="openModal()"
        ngbTooltip="Add Escalation Rule Change History" 
        *ngIf="userIsAlertingEscalationRuleChangeHistoryWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #escalationRuleChangeHistoryModal let-modal>
   <div class="modal-header bg-dark text-light escalation-rule-change-history-modal-header">
      <h5 class="modal-title mb-0" id="escalationRuleChangeHistoryModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Escalation Rule Change History' : 'Add Escalation Rule Change History' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body escalation-rule-change-history-modal-body">
      <form [formGroup]="escalationRuleChangeHistoryForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('escalationRuleId')">
                <label for="EscalationRuleChangeHistory-escalationRuleId" id="label-EscalationRuleChangeHistory-escalationRuleId"><span class="text-danger">*</span>Escalation Rule</label>
                <select id="EscalationRuleChangeHistory-escalationRuleId" formControlName="escalationRuleId" class="form-select escalation-rule-change-history-select" [disabled]="!userIsAlertingEscalationRuleChangeHistoryWriter()">
                    <option [ngValue]="null">Select Escalation Rule</option>
                    <option *ngFor="let escalationRule of escalationRules$ | async" [ngValue]="escalationRule.id">{{escalationRule.targetType}}</option>
                </select>
                <div *ngIf="escalationRuleChangeHistoryForm.get('escalationRuleId')?.invalid && escalationRuleChangeHistoryForm.get('escalationRuleId')?.touched" class="text-danger">
                    Escalation Rule is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="EscalationRuleChangeHistory-versionNumber" id="label-EscalationRuleChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="EscalationRuleChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control escalation-rule-change-history-input" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="EscalationRuleChangeHistory-timeStamp" id="label-EscalationRuleChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="EscalationRuleChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control escalation-rule-change-history-input" [disabled]="!userIsAlertingEscalationRuleChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="escalationRuleChangeHistoryForm.get('timeStamp')?.invalid && escalationRuleChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                <label for="EscalationRuleChangeHistory-userId" id="label-EscalationRuleChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                <input type="number" id="EscalationRuleChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control escalation-rule-change-history-input" [disabled]="!userIsAlertingEscalationRuleChangeHistoryWriter()" aria-labelledby="label-userId" />
                <div *ngIf="escalationRuleChangeHistoryForm.get('userId')?.invalid && escalationRuleChangeHistoryForm.get('userId')?.touched" class="text-danger">
                    User Id is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('data')">
                <label for="EscalationRuleChangeHistory-data" id="label-EscalationRuleChangeHistory-data"><span class="text-danger">*</span>Data</label>
                <textarea id="EscalationRuleChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control escalation-rule-change-history-input" [disabled]="!userIsAlertingEscalationRuleChangeHistoryWriter()"></textarea>
                <div *ngIf="escalationRuleChangeHistoryForm.get('data')?.invalid && escalationRuleChangeHistoryForm.get('data')?.touched" class="text-danger">
                    Data is required
                </div>
            </div>
         <div class="modal-footer escalation-rule-change-history-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Escalation Rule Change History changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !escalationRuleChangeHistoryForm.valid || escalationRuleChangeHistoryForm.pristine  || userIsAlertingEscalationRuleChangeHistoryWriter() == false " ngbTooltip="Save the Escalation Rule Change History changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Escalation Rule Change History' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
