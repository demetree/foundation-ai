<div class="container-fluid p-1 m-0 user-notification-channel-preference-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="user-notification-channel-preference-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">User Notification Channel Preference</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit User Notification Channel Preference' : 'Add User Notification Channel Preference'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAlertingUserNotificationChannelPreferenceReader()">
                <div class="col m-2 user-notification-channel-preference-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="userNotificationChannelPreferenceForm" (ngSubmit)="submitForm()" class="user-notification-channel-preference-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('userNotificationPreferenceId')">
                                <label for="UserNotificationChannelPreference-userNotificationPreferenceId" id="label-UserNotificationChannelPreference-userNotificationPreferenceId"><span class="text-danger">*</span>User Notification Preference</label>
                                <select id="UserNotificationChannelPreference-userNotificationPreferenceId" formControlName="userNotificationPreferenceId" class="form-select user-notification-channel-preference-select" [disabled]="!userIsAlertingUserNotificationChannelPreferenceWriter()">
                                    <option [ngValue]="null">Select User Notification Preference</option>
                                    <option *ngFor="let userNotificationPreference of userNotificationPreferences$ | async" [ngValue]="userNotificationPreference.id">{{userNotificationPreference.timeZoneId}}</option>
                                </select>
                                <div *ngIf="userNotificationChannelPreferenceForm.get('userNotificationPreferenceId')?.invalid && userNotificationChannelPreferenceForm.get('userNotificationPreferenceId')?.touched" class="text-danger">
                                    User Notification Preference is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('notificationChannelTypeId')">
                                <label for="UserNotificationChannelPreference-notificationChannelTypeId" id="label-UserNotificationChannelPreference-notificationChannelTypeId"><span class="text-danger">*</span>Notification Channel Type</label>
                                <select id="UserNotificationChannelPreference-notificationChannelTypeId" formControlName="notificationChannelTypeId" class="form-select user-notification-channel-preference-select" [disabled]="!userIsAlertingUserNotificationChannelPreferenceWriter()">
                                    <option [ngValue]="null">Select Notification Channel Type</option>
                                    <option *ngFor="let notificationChannelType of notificationChannelTypes$ | async" [ngValue]="notificationChannelType.id">{{notificationChannelType.name}}</option>
                                </select>
                                <div *ngIf="userNotificationChannelPreferenceForm.get('notificationChannelTypeId')?.invalid && userNotificationChannelPreferenceForm.get('notificationChannelTypeId')?.touched" class="text-danger">
                                    Notification Channel Type is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isEnabled')">
                                <input type="checkbox" id="UserNotificationChannelPreference-isEnabled" formControlName="isEnabled" class="form-check-input" [disabled]="!userIsAlertingUserNotificationChannelPreferenceWriter()" />
                                <label for="UserNotificationChannelPreference-isEnabled" class="form-check-label" id="label-UserNotificationChannelPreference-isEnabled"><span class="text-danger">*</span>Is Enabled</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('priorityOverride')">
                                <label for="UserNotificationChannelPreference-priorityOverride" id="label-UserNotificationChannelPreference-priorityOverride">Priority Override</label>
                                <input type="number" id="UserNotificationChannelPreference-priorityOverride" formControlName="priorityOverride" placeholder="Enter Priority Override" class="form-control user-notification-channel-preference-input" [disabled]="!userIsAlertingUserNotificationChannelPreferenceWriter()" aria-labelledby="label-priorityOverride" />
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="UserNotificationChannelPreference-versionNumber" id="label-UserNotificationChannelPreference-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="UserNotificationChannelPreference-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control user-notification-channel-preference-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="UserNotificationChannelPreference-active" formControlName="active" class="form-check-input" [disabled]="!userIsAlertingUserNotificationChannelPreferenceWriter()" />
                                <label for="UserNotificationChannelPreference-active" class="form-check-label" id="label-UserNotificationChannelPreference-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="UserNotificationChannelPreference-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsAlertingUserNotificationChannelPreferenceWriter()" />
                                <label for="UserNotificationChannelPreference-deleted" class="form-check-label" id="label-UserNotificationChannelPreference-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="user-notification-channel-preference-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="userNotificationChannelPreferenceForm.pristine" (click)="loadData(true)" ngbTooltip="Reload User Notification Channel Preference">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !userNotificationChannelPreferenceForm.valid || !userNotificationChannelPreferenceForm.dirty || userNotificationChannelPreferenceForm.pristine  || userIsAlertingUserNotificationChannelPreferenceWriter() == false " ngbTooltip="Save the User Notification Channel Preference changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add User Notification Channel Preference' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAlertingUserNotificationChannelPreferenceReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 user-notification-channel-preference-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="userNotificationChannelPreferenceChangeHistoryService.userIsAlertingUserNotificationChannelPreferenceChangeHistoryReader()">
                            <button ngbNavLink>User Notification Channel Preference Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (userNotificationChannelPreferenceData?.UserNotificationChannelPreferenceChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-user-notification-channel-preference-change-history-table [queryParams]="{ userNotificationChannelPreferenceId: userNotificationChannelPreferenceData?.id }"></app-user-notification-channel-preference-change-history-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-user-notification-channel-preference-change-history-add-edit [preSeededData]="{ userNotificationChannelPreferenceId: userNotificationChannelPreferenceData?.id }" [hiddenFields]="['userNotificationChannelPreferenceId']"></app-user-notification-channel-preference-change-history-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
