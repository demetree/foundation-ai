<div class="container-fluid p-1 m-0 incident-status-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="incident-status-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Incident Status Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Incident Status Type' : 'Add Incident Status Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAlertingIncidentStatusTypeReader()">
                <div class="col m-2 incident-status-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="incidentStatusTypeForm" (ngSubmit)="submitForm()" class="incident-status-type-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="IncidentStatusType-name" id="label-IncidentStatusType-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="IncidentStatusType-name" formControlName="name" placeholder="Enter Name" class="form-control incident-status-type-input" [disabled]="!userIsAlertingIncidentStatusTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="incidentStatusTypeForm.get('name')?.invalid && incidentStatusTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="IncidentStatusType-description" id="label-IncidentStatusType-description">Description</label>
                                <textarea id="IncidentStatusType-description" formControlName="description" placeholder="Enter Description" class="form-control incident-status-type-input" [disabled]="!userIsAlertingIncidentStatusTypeWriter()"></textarea>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="IncidentStatusType-active" formControlName="active" class="form-check-input" [disabled]="!userIsAlertingIncidentStatusTypeWriter()" />
                                <label for="IncidentStatusType-active" class="form-check-label" id="label-IncidentStatusType-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="IncidentStatusType-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsAlertingIncidentStatusTypeWriter()" />
                                <label for="IncidentStatusType-deleted" class="form-check-label" id="label-IncidentStatusType-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="incident-status-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="incidentStatusTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Incident Status Type">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !incidentStatusTypeForm.valid || !incidentStatusTypeForm.dirty || incidentStatusTypeForm.pristine  || userIsAlertingIncidentStatusTypeWriter() == false " ngbTooltip="Save the Incident Status Type changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Incident Status Type' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAlertingIncidentStatusTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 incident-status-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="incidentService.userIsAlertingIncidentReader()">
                            <button ngbNavLink>Incidents
                                <span class="badge bg-primary ms-2">
                                    {{ (incidentStatusTypeData?.IncidentsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-incident-table [queryParams]="{ incidentStatusTypeId: incidentStatusTypeData?.id }"></app-incident-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-incident-add-edit [preSeededData]="{ incidentStatusTypeId: incidentStatusTypeData?.id }" [hiddenFields]="['incidentStatusTypeId']"></app-incident-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
