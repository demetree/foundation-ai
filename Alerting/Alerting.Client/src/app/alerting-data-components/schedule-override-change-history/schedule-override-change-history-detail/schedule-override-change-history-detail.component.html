<div class="container-fluid p-1 m-0 schedule-override-change-history-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="schedule-override-change-history-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Schedule Override Change History</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Schedule Override Change History' : 'Add Schedule Override Change History'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAlertingScheduleOverrideChangeHistoryReader()">
                <div class="col m-2 schedule-override-change-history-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="scheduleOverrideChangeHistoryForm" (ngSubmit)="submitForm()" class="schedule-override-change-history-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('scheduleOverrideId')">
                                <label for="ScheduleOverrideChangeHistory-scheduleOverrideId" id="label-ScheduleOverrideChangeHistory-scheduleOverrideId"><span class="text-danger">*</span>Schedule Override</label>
                                <select id="ScheduleOverrideChangeHistory-scheduleOverrideId" formControlName="scheduleOverrideId" class="form-select schedule-override-change-history-select" [disabled]="!userIsAlertingScheduleOverrideChangeHistoryWriter()">
                                    <option [ngValue]="null">Select Schedule Override</option>
                                    <option *ngFor="let scheduleOverride of scheduleOverrides$ | async" [ngValue]="scheduleOverride.id">{{scheduleOverride.reason}}</option>
                                </select>
                                <div *ngIf="scheduleOverrideChangeHistoryForm.get('scheduleOverrideId')?.invalid && scheduleOverrideChangeHistoryForm.get('scheduleOverrideId')?.touched" class="text-danger">
                                    Schedule Override is required
                                </div>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="ScheduleOverrideChangeHistory-versionNumber" id="label-ScheduleOverrideChangeHistory-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="ScheduleOverrideChangeHistory-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control schedule-override-change-history-input" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                                <label for="ScheduleOverrideChangeHistory-timeStamp" id="label-ScheduleOverrideChangeHistory-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="ScheduleOverrideChangeHistory-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control schedule-override-change-history-input" [disabled]="!userIsAlertingScheduleOverrideChangeHistoryWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="scheduleOverrideChangeHistoryForm.get('timeStamp')?.invalid && scheduleOverrideChangeHistoryForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('userId')">
                                <label for="ScheduleOverrideChangeHistory-userId" id="label-ScheduleOverrideChangeHistory-userId"><span class="text-danger">*</span>User Id</label>
                                <input type="number" id="ScheduleOverrideChangeHistory-userId" formControlName="userId" placeholder="Enter User Id" class="form-control schedule-override-change-history-input" [disabled]="!userIsAlertingScheduleOverrideChangeHistoryWriter()" aria-labelledby="label-userId" />
                                <div *ngIf="scheduleOverrideChangeHistoryForm.get('userId')?.invalid && scheduleOverrideChangeHistoryForm.get('userId')?.touched" class="text-danger">
                                    User Id is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('data')">
                                <label for="ScheduleOverrideChangeHistory-data" id="label-ScheduleOverrideChangeHistory-data"><span class="text-danger">*</span>Data</label>
                                <textarea id="ScheduleOverrideChangeHistory-data" formControlName="data" placeholder="Enter Data" class="form-control schedule-override-change-history-input" [disabled]="!userIsAlertingScheduleOverrideChangeHistoryWriter()"></textarea>
                                <div *ngIf="scheduleOverrideChangeHistoryForm.get('data')?.invalid && scheduleOverrideChangeHistoryForm.get('data')?.touched" class="text-danger">
                                    Data is required
                                </div>
                            </div>
                            <div class="schedule-override-change-history-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="scheduleOverrideChangeHistoryForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Schedule Override Change History">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !scheduleOverrideChangeHistoryForm.valid || !scheduleOverrideChangeHistoryForm.dirty || scheduleOverrideChangeHistoryForm.pristine  || userIsAlertingScheduleOverrideChangeHistoryWriter() == false " ngbTooltip="Save the Schedule Override Change History changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Schedule Override Change History' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
