<div class="add-schedule-layer" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-schedule-layer me-2"
        (click)="openModal()"
        ngbTooltip="Add Schedule Layer" 
        *ngIf="userIsAlertingScheduleLayerWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #scheduleLayerModal let-modal>
   <div class="modal-header bg-dark text-light schedule-layer-modal-header">
      <h5 class="modal-title mb-0" id="scheduleLayerModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Schedule Layer' : 'Add Schedule Layer' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body schedule-layer-modal-body">
      <form [formGroup]="scheduleLayerForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('onCallScheduleId')">
                <label for="ScheduleLayer-onCallScheduleId" id="label-ScheduleLayer-onCallScheduleId"><span class="text-danger">*</span>On Call Schedule</label>
                <select id="ScheduleLayer-onCallScheduleId" formControlName="onCallScheduleId" class="form-select schedule-layer-select" [disabled]="!userIsAlertingScheduleLayerWriter()">
                    <option [ngValue]="null">Select On Call Schedule</option>
                    <option *ngFor="let onCallSchedule of onCallSchedules$ | async" [ngValue]="onCallSchedule.id">{{onCallSchedule.name}}</option>
                </select>
                <div *ngIf="scheduleLayerForm.get('onCallScheduleId')?.invalid && scheduleLayerForm.get('onCallScheduleId')?.touched" class="text-danger">
                    On Call Schedule is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="ScheduleLayer-name" id="label-ScheduleLayer-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="ScheduleLayer-name" formControlName="name" placeholder="Enter Name" class="form-control schedule-layer-input" [disabled]="!userIsAlertingScheduleLayerWriter()" aria-labelledby="label-name" />
                <div *ngIf="scheduleLayerForm.get('name')?.invalid && scheduleLayerForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="ScheduleLayer-description" id="label-ScheduleLayer-description">Description</label>
                <textarea id="ScheduleLayer-description" formControlName="description" placeholder="Enter Description" class="form-control schedule-layer-input" [disabled]="!userIsAlertingScheduleLayerWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('layerLevel')">
                <label for="ScheduleLayer-layerLevel" id="label-ScheduleLayer-layerLevel"><span class="text-danger">*</span>Layer Level</label>
                <input type="number" id="ScheduleLayer-layerLevel" formControlName="layerLevel" placeholder="Enter Layer Level" class="form-control schedule-layer-input" [disabled]="!userIsAlertingScheduleLayerWriter()" aria-labelledby="label-layerLevel" />
                <div *ngIf="scheduleLayerForm.get('layerLevel')?.invalid && scheduleLayerForm.get('layerLevel')?.touched" class="text-danger">
                    Layer Level is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('rotationStart')">
                <label for="ScheduleLayer-rotationStart" id="label-ScheduleLayer-rotationStart"><span class="text-danger">*</span>Rotation Start</label>
                <input type="datetime-local" id="ScheduleLayer-rotationStart" formControlName="rotationStart" placeholder="Enter Rotation Start" class="form-control schedule-layer-input" [disabled]="!userIsAlertingScheduleLayerWriter()" aria-labelledby="label-rotationStart" />
                <div *ngIf="scheduleLayerForm.get('rotationStart')?.invalid && scheduleLayerForm.get('rotationStart')?.touched" class="text-danger">
                    Rotation Start is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('rotationDays')">
                <label for="ScheduleLayer-rotationDays" id="label-ScheduleLayer-rotationDays"><span class="text-danger">*</span>Rotation Days</label>
                <input type="number" id="ScheduleLayer-rotationDays" formControlName="rotationDays" placeholder="Enter Rotation Days" class="form-control schedule-layer-input" [disabled]="!userIsAlertingScheduleLayerWriter()" aria-labelledby="label-rotationDays" />
                <div *ngIf="scheduleLayerForm.get('rotationDays')?.invalid && scheduleLayerForm.get('rotationDays')?.touched" class="text-danger">
                    Rotation Days is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('handoffTime')">
                <label for="ScheduleLayer-handoffTime" id="label-ScheduleLayer-handoffTime"><span class="text-danger">*</span>Handoff Time</label>
                <input type="text" id="ScheduleLayer-handoffTime" formControlName="handoffTime" placeholder="Enter Handoff Time" class="form-control schedule-layer-input" [disabled]="!userIsAlertingScheduleLayerWriter()" aria-labelledby="label-handoffTime" />
                <div *ngIf="scheduleLayerForm.get('handoffTime')?.invalid && scheduleLayerForm.get('handoffTime')?.touched" class="text-danger">
                    Handoff Time is required
                </div>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="ScheduleLayer-versionNumber" id="label-ScheduleLayer-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="ScheduleLayer-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control schedule-layer-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ScheduleLayer-active" formControlName="active" class="form-check-input" [disabled]="!userIsAlertingScheduleLayerWriter()" />
                <label for="ScheduleLayer-active" class="form-check-label" id="label-ScheduleLayer-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="ScheduleLayer-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsAlertingScheduleLayerWriter()" />
                <label for="ScheduleLayer-deleted" class="form-check-label" id="label-ScheduleLayer-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer schedule-layer-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Schedule Layer changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !scheduleLayerForm.valid || scheduleLayerForm.pristine  || userIsAlertingScheduleLayerWriter() == false " ngbTooltip="Save the Schedule Layer changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Schedule Layer' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
