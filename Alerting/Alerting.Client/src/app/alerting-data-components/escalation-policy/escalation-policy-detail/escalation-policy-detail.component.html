<div class="container-fluid p-1 m-0 escalation-policy-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="escalation-policy-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Escalation Policy</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Escalation Policy' : 'Add Escalation Policy'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAlertingEscalationPolicyReader()">
                <div class="col m-2 escalation-policy-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="escalationPolicyForm" (ngSubmit)="submitForm()" class="escalation-policy-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="EscalationPolicy-name" id="label-EscalationPolicy-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="EscalationPolicy-name" formControlName="name" placeholder="Enter Name" class="form-control escalation-policy-input" [disabled]="!userIsAlertingEscalationPolicyWriter()" aria-labelledby="label-name" />
                                <div *ngIf="escalationPolicyForm.get('name')?.invalid && escalationPolicyForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="EscalationPolicy-description" id="label-EscalationPolicy-description">Description</label>
                                <textarea id="EscalationPolicy-description" formControlName="description" placeholder="Enter Description" class="form-control escalation-policy-input" [disabled]="!userIsAlertingEscalationPolicyWriter()"></textarea>
                            </div>
                            <div class="form-group"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <label for="EscalationPolicy-versionNumber" id="label-EscalationPolicy-versionNumber"><span class="text-danger">*</span>Version Number</label>
                                <input type="number" id="EscalationPolicy-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control escalation-policy-input" />
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="EscalationPolicy-active" formControlName="active" class="form-check-input" [disabled]="!userIsAlertingEscalationPolicyWriter()" />
                                <label for="EscalationPolicy-active" class="form-check-label" id="label-EscalationPolicy-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="EscalationPolicy-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsAlertingEscalationPolicyWriter()" />
                                <label for="EscalationPolicy-deleted" class="form-check-label" id="label-EscalationPolicy-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="escalation-policy-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="escalationPolicyForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Escalation Policy">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !escalationPolicyForm.valid || !escalationPolicyForm.dirty || escalationPolicyForm.pristine  || userIsAlertingEscalationPolicyWriter() == false " ngbTooltip="Save the Escalation Policy changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Escalation Policy' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAlertingEscalationPolicyReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 escalation-policy-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="escalationPolicyChangeHistoryService.userIsAlertingEscalationPolicyChangeHistoryReader()">
                            <button ngbNavLink>Escalation Policy Change Histories
                                <span class="badge bg-primary ms-2">
                                    {{ (escalationPolicyData?.EscalationPolicyChangeHistoriesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-escalation-policy-change-history-table [queryParams]="{ escalationPolicyId: escalationPolicyData?.id }"></app-escalation-policy-change-history-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-escalation-policy-change-history-add-edit [preSeededData]="{ escalationPolicyId: escalationPolicyData?.id }" [hiddenFields]="['escalationPolicyId']"></app-escalation-policy-change-history-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="serviceService.userIsAlertingServiceReader()">
                            <button ngbNavLink>Services
                                <span class="badge bg-primary ms-2">
                                    {{ (escalationPolicyData?.ServicesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-service-table [queryParams]="{ escalationPolicyId: escalationPolicyData?.id }"></app-service-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-service-add-edit [preSeededData]="{ escalationPolicyId: escalationPolicyData?.id }" [hiddenFields]="['escalationPolicyId']"></app-service-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="escalationRuleService.userIsAlertingEscalationRuleReader()">
                            <button ngbNavLink>Escalation Rules
                                <span class="badge bg-primary ms-2">
                                    {{ (escalationPolicyData?.EscalationRulesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-escalation-rule-table [queryParams]="{ escalationPolicyId: escalationPolicyData?.id }"></app-escalation-rule-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-escalation-rule-add-edit [preSeededData]="{ escalationPolicyId: escalationPolicyData?.id }" [hiddenFields]="['escalationPolicyId']"></app-escalation-rule-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
