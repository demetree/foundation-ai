<div class="add-escalation-policy" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-escalation-policy me-2"
        (click)="openModal()"
        ngbTooltip="Add Escalation Policy" 
        *ngIf="userIsAlertingEscalationPolicyWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #escalationPolicyModal let-modal>
   <div class="modal-header bg-dark text-light escalation-policy-modal-header">
      <h5 class="modal-title mb-0" id="escalationPolicyModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Escalation Policy' : 'Add Escalation Policy' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body escalation-policy-modal-body">
      <form [formGroup]="escalationPolicyForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="EscalationPolicy-name" id="label-EscalationPolicy-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="EscalationPolicy-name" formControlName="name" placeholder="Enter Name" class="form-control escalation-policy-input" [disabled]="!userIsAlertingEscalationPolicyWriter()" aria-labelledby="label-name" />
                <div *ngIf="escalationPolicyForm.get('name')?.invalid && escalationPolicyForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="EscalationPolicy-description" id="label-EscalationPolicy-description">Description</label>
                <textarea id="EscalationPolicy-description" formControlName="description" placeholder="Enter Description" class="form-control escalation-policy-input" [disabled]="!userIsAlertingEscalationPolicyWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <label for="EscalationPolicy-versionNumber" id="label-EscalationPolicy-versionNumber"><span class="text-danger">*</span>Version Number</label>
                <input type="number" id="EscalationPolicy-versionNumber" formControlName="versionNumber" [disabled]="true" placeholder="Enter Version Number" class="form-control escalation-policy-input" />
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="EscalationPolicy-active" formControlName="active" class="form-check-input" [disabled]="!userIsAlertingEscalationPolicyWriter()" />
                <label for="EscalationPolicy-active" class="form-check-label" id="label-EscalationPolicy-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="EscalationPolicy-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsAlertingEscalationPolicyWriter()" />
                <label for="EscalationPolicy-deleted" class="form-check-label" id="label-EscalationPolicy-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer escalation-policy-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Escalation Policy changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !escalationPolicyForm.valid || escalationPolicyForm.pristine  || userIsAlertingEscalationPolicyWriter() == false " ngbTooltip="Save the Escalation Policy changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Escalation Policy' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
