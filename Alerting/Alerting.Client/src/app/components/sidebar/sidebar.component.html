<!-- Sidebar (collapsible/overlay when expanded) -->
<div *ngIf="isUserLoggedIn" class="sidebar text-bg-dark no-select" [class.expanded]="isExpanded"
  [class.collapsed]="!isExpanded">

  <!-- Toggle button (tooltip only when collapsed) -->
  <button class="toggle-btn" type="button" (click)="tToggle.close(); toggle()" [attr.aria-expanded]="isExpanded"
    [ngbTooltip]="!isExpanded ? 'Expand' : null" triggers="hover" #tToggle="ngbTooltip" placement="right"
    tooltipClass="sidebar-tip" aria-label="Toggle sidebar">
    <i class="fa" [ngClass]="{ 'fa-angle-right': !isExpanded, 'fa-angle-left': isExpanded }"></i>
  </button>

  <ul class="nav nav-pills flex-column">

    <!-- ═══ OPERATIONS ═══ -->

    <!-- Incidents -->
    <li class="nav-item">
      <a routerLink="/incident-dashboard" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Incidents' : null" triggers="hover" #tIncidents="ngbTooltip"
        (click)="tIncidents.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span class="label px-2">Incidents</span>
      </a>
    </li>

    <!-- Service Health -->
    <li class="nav-item">
      <a routerLink="/service-health" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Service Health' : null" triggers="hover" #tHealth="ngbTooltip"
        (click)="tHealth.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-heart-pulse"></i>
        <span class="label px-2">Service Health</span>
      </a>
    </li>

    <!-- Responder Console -->
    <li class="nav-item">
      <a routerLink="/respond" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Responder Console' : null" triggers="hover" #tRespond="ngbTooltip"
        (click)="tRespond.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-headset"></i>
        <span class="label px-2">Responder Console</span>
      </a>
    </li>

    <!-- ═══ MY CONTEXT ═══ -->
    <li class="nav-divider"></li>

    <!-- My Shift -->
    <li class="nav-item">
      <a routerLink="/my-shift" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'My Shift' : null" triggers="hover" #tMyShift="ngbTooltip"
        (click)="tMyShift.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-user-clock"></i>
        <span class="label px-2">My Shift</span>
      </a>
    </li>

    <!-- Notification Preferences -->
    <li class="nav-item">
      <a routerLink="/notification-preferences" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Notification Preferences' : null" triggers="hover" #tNotifPrefs="ngbTooltip"
        (click)="tNotifPrefs.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-bell"></i>
        <span class="label px-2">Notification Preferences</span>
      </a>
    </li>

    <!-- ═══ CONFIGURATION ═══ -->
    <li class="nav-divider"></li>

    <!-- Services -->
    <li class="nav-item">
      <a routerLink="/service-management" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Services' : null" triggers="hover" #tServices="ngbTooltip"
        (click)="tServices.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-server"></i>
        <span class="label px-2">Services</span>
      </a>
    </li>

    <!-- Escalation Policies -->
    <li class="nav-item">
      <a routerLink="/escalation-policy-management" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Escalation Policies' : null" triggers="hover" #tPolicies="ngbTooltip"
        (click)="tPolicies.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-route"></i>
        <span class="label px-2">Escalation Policies</span>
      </a>
    </li>

    <!-- Schedules -->
    <li class="nav-item">
      <a routerLink="/schedule-management" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Schedules' : null" triggers="hover" #tSchedules="ngbTooltip"
        (click)="tSchedules.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-calendar-alt"></i>
        <span class="label px-2">Schedules</span>
      </a>
    </li>

    <!-- Integrations -->
    <li class="nav-item">
      <a routerLink="/integration-management" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Integrations' : null" triggers="hover" #tIntegrations="ngbTooltip"
        (click)="tIntegrations.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-plug"></i>
        <span class="label px-2">Integrations</span>
      </a>
    </li>

    <!-- Configuration Health -->
    <li class="nav-item">
      <a routerLink="/configuration-health" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Configuration Health' : null" triggers="hover" #tConfigHealth="ngbTooltip"
        (click)="tConfigHealth.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-shield-halved"></i>
        <span class="label px-2">Configuration Health</span>
      </a>
    </li>

    <!-- ═══ DEVELOPMENT ═══ -->
    <li class="nav-divider"></li>

    <!-- Flight Control (Admin Only) -->
    <li class="nav-item" *ngIf="isUserAlertingAdmin">
      <a routerLink="/flight-control" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Flight Control' : null" triggers="hover" #tFlightControl="ngbTooltip"
        (click)="tFlightControl.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-satellite-dish"></i>
        <span class="label px-2">Flight Control</span>
      </a>
    </li>

    <!-- Admin Notification Preferences (Admin Only) -->
    <li class="nav-item" *ngIf="isUserAlertingAdmin">
      <a routerLink="/admin-notification-preferences" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Admin Notification Preferences' : null" triggers="hover"
        #tAdminNotifPrefs="ngbTooltip" (click)="tAdminNotifPrefs.close(); close()" placement="right"
        tooltipClass="sidebar-tip">
        <i class="fa-solid fa-users-cog"></i>
        <span class="label px-2">Admin Preferences</span>
      </a>
    </li>

    <!-- Notification Audit (Admin Only) -->
    <li class="nav-item" *ngIf="isUserAlertingAdmin">
      <a routerLink="/notification-audit" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Notification Audit' : null" triggers="hover" #tNotifAudit="ngbTooltip"
        (click)="tNotifAudit.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-envelope-open-text"></i>
        <span class="label px-2">Notification Audit</span>
      </a>
    </li>

    <!-- Test Harness -->
    <li class="nav-item">
      <a routerLink="/test-harness" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Test Harness' : null" triggers="hover" #tHarness="ngbTooltip"
        (click)="tHarness.close(); close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-flask"></i>
        <span class="label px-2">Test Harness</span>
      </a>
    </li>

  </ul>

</div>

<!-- Backdrop only when expanded (click to close) -->
<div class="sidebar-backdrop" *ngIf="isUserLoggedIn && isExpanded" (click)="close()"></div>
