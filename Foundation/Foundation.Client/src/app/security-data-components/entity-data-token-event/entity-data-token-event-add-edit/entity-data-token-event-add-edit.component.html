<div class="add-entity-data-token-event" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-entity-data-token-event me-2"
        (click)="openModal()"
        ngbTooltip="Add Entity Data Token Event" 
        *ngIf="userIsSecurityEntityDataTokenEventWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #entityDataTokenEventModal let-modal>
   <div class="modal-header entity-data-token-event-modal-header">
      <h5 class="modal-title mb-0" id="entityDataTokenEventModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Entity Data Token Event' : 'Add Entity Data Token Event' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body entity-data-token-event-modal-body">
      <form [formGroup]="entityDataTokenEventForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('entityDataTokenId')">
                <label for="EntityDataTokenEvent-entityDataTokenId" id="label-EntityDataTokenEvent-entityDataTokenId"><span class="text-danger">*</span>Entity Data Token</label>
                <select id="EntityDataTokenEvent-entityDataTokenId" formControlName="entityDataTokenId" class="form-select entity-data-token-event-select" [disabled]="!userIsSecurityEntityDataTokenEventWriter()">
                    <option [ngValue]="null">Select Entity Data Token</option>
                    <option *ngFor="let entityDataToken of entityDataTokens$ | async" [ngValue]="entityDataToken.id">{{[entityDataToken.token] | filterAndJoin}}</option>
                </select>
                <div *ngIf="entityDataTokenEventForm.get('entityDataTokenId')?.invalid && entityDataTokenEventForm.get('entityDataTokenId')?.touched" class="text-danger">
                    Entity Data Token is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('entityDataTokenEventTypeId')">
                <label for="EntityDataTokenEvent-entityDataTokenEventTypeId" id="label-EntityDataTokenEvent-entityDataTokenEventTypeId"><span class="text-danger">*</span>Entity Data Token Event Type</label>
                <select id="EntityDataTokenEvent-entityDataTokenEventTypeId" formControlName="entityDataTokenEventTypeId" class="form-select entity-data-token-event-select" [disabled]="!userIsSecurityEntityDataTokenEventWriter()">
                    <option [ngValue]="null">Select Entity Data Token Event Type</option>
                    <option *ngFor="let entityDataTokenEventType of entityDataTokenEventTypes$ | async" [ngValue]="entityDataTokenEventType.id">{{entityDataTokenEventType.name}}</option>
                </select>
                <div *ngIf="entityDataTokenEventForm.get('entityDataTokenEventTypeId')?.invalid && entityDataTokenEventForm.get('entityDataTokenEventTypeId')?.touched" class="text-danger">
                    Entity Data Token Event Type is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="EntityDataTokenEvent-timeStamp" id="label-EntityDataTokenEvent-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="EntityDataTokenEvent-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control entity-data-token-event-input" [disabled]="!userIsSecurityEntityDataTokenEventWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="entityDataTokenEventForm.get('timeStamp')?.invalid && entityDataTokenEventForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                <label for="EntityDataTokenEvent-comments" id="label-EntityDataTokenEvent-comments">Comments</label>
                <textarea id="EntityDataTokenEvent-comments" formControlName="comments" placeholder="Enter Comments" class="form-control entity-data-token-event-input" [disabled]="!userIsSecurityEntityDataTokenEventWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="EntityDataTokenEvent-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecurityEntityDataTokenEventWriter()" />
                <label for="EntityDataTokenEvent-active" class="form-check-label" id="label-EntityDataTokenEvent-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="EntityDataTokenEvent-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecurityEntityDataTokenEventWriter()" />
                <label for="EntityDataTokenEvent-deleted" class="form-check-label" id="label-EntityDataTokenEvent-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer entity-data-token-event-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Entity Data Token Event changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !entityDataTokenEventForm.valid || entityDataTokenEventForm.pristine  || userIsSecurityEntityDataTokenEventWriter() == false " ngbTooltip="Save the Entity Data Token Event changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Entity Data Token Event' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
