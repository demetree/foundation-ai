<div class="container-fluid p-1 m-0 entity-data-token-event-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="entity-data-token-event-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Entity Data Token Event</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Entity Data Token Event' : 'Add Entity Data Token Event'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecurityEntityDataTokenEventReader()">
                <div class="col m-2 entity-data-token-event-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="entityDataTokenEventForm" (ngSubmit)="submitForm()" class="entity-data-token-event-details-form">
                            <div class="form-group">
                                <label for="entityDataTokenId" id="label-entityDataTokenId"><span class="text-danger">*</span>Entity Data Token</label>
                                <select id="entityDataTokenId" formControlName="entityDataTokenId" class="form-select entity-data-token-event-select" [disabled]="!userIsSecurityEntityDataTokenEventWriter()">
                                    <option [ngValue]="null">Select Entity Data Token</option>
                                    <option *ngFor="let entityDataToken of entityDataTokens$ | async" [ngValue]="entityDataToken.id">{{[entityDataToken.token] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="entityDataTokenEventForm.get('entityDataTokenId')?.invalid && entityDataTokenEventForm.get('entityDataTokenId')?.touched" class="text-danger">
                                    Entity Data Token is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="entityDataTokenEventTypeId" id="label-entityDataTokenEventTypeId"><span class="text-danger">*</span>Entity Data Token Event Type</label>
                                <select id="entityDataTokenEventTypeId" formControlName="entityDataTokenEventTypeId" class="form-select entity-data-token-event-select" [disabled]="!userIsSecurityEntityDataTokenEventWriter()">
                                    <option [ngValue]="null">Select Entity Data Token Event Type</option>
                                    <option *ngFor="let entityDataTokenEventType of entityDataTokenEventTypes$ | async" [ngValue]="entityDataTokenEventType.id">{{entityDataTokenEventType.name}}</option>
                                </select>
                                <div *ngIf="entityDataTokenEventForm.get('entityDataTokenEventTypeId')?.invalid && entityDataTokenEventForm.get('entityDataTokenEventTypeId')?.touched" class="text-danger">
                                    Entity Data Token Event Type is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="timeStamp" id="label-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control entity-data-token-event-input" [disabled]="!userIsSecurityEntityDataTokenEventWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="entityDataTokenEventForm.get('timeStamp')?.invalid && entityDataTokenEventForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="comments" id="label-comments">Comments</label>
                                <textarea id="comments" formControlName="comments" placeholder="Enter Comments" class="form-control entity-data-token-event-input" [disabled]="!userIsSecurityEntityDataTokenEventWriter()"></textarea>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecurityEntityDataTokenEventWriter()" />
                                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecurityEntityDataTokenEventWriter()" />
                                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="entity-data-token-event-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="entityDataTokenEventForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Entity Data Token Event">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !entityDataTokenEventForm.valid || !entityDataTokenEventForm.dirty || entityDataTokenEventForm.pristine || userIsSecurityEntityDataTokenEventWriter() == false " ngbTooltip="Save Entity Data Token Event">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
