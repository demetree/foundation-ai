<div class="container-fluid p-1 m-0 security-user-event-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-user-event-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security User Event Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security User Event Type' : 'Add Security User Event Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityUserEventTypeReader()">
                <div class="col m-2 security-user-event-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityUserEventTypeForm" (ngSubmit)="submitForm()" class="security-user-event-type-details-form">
                            <div class="form-group">
                                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="name" formControlName="name" placeholder="Enter Name" class="form-control security-user-event-type-input" [disabled]="!userIsSecuritySecurityUserEventTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="securityUserEventTypeForm.get('name')?.invalid && securityUserEventTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="description" id="label-description">Description</label>
                                <textarea id="description" formControlName="description" placeholder="Enter Description" class="form-control security-user-event-type-input" [disabled]="!userIsSecuritySecurityUserEventTypeWriter()"></textarea>
                            </div>
                            <div class="security-user-event-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityUserEventTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security User Event Type">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !securityUserEventTypeForm.valid || !securityUserEventTypeForm.dirty || securityUserEventTypeForm.pristine || userIsSecuritySecurityUserEventTypeWriter() == false " ngbTooltip="Save Security User Event Type">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSecuritySecurityUserEventTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 security-user-event-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="securityUserEventService.userIsSecuritySecurityUserEventReader()">
                            <button ngbNavLink>SecurityUserEvents
                                <span class="badge bg-primary ms-2">
                                    {{ (securityUserEventTypeData?.SecurityUserEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <app-security-user-event-table [queryParams]="GetQueryParameters()"></app-security-user-event-table>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
