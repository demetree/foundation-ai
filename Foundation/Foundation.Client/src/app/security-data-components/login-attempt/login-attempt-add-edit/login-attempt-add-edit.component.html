<div class="add-login-attempt" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-login-attempt me-2"
        (click)="openModal()"
        ngbTooltip="Add Login Attempt" 
        *ngIf="userIsSecurityLoginAttemptWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #loginAttemptModal let-modal>
   <div class="modal-header login-attempt-modal-header">
      <h5 class="modal-title mb-0" id="loginAttemptModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Login Attempt' : 'Add Login Attempt' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body login-attempt-modal-body">
      <form [formGroup]="loginAttemptForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('timeStamp')">
                <label for="LoginAttempt-timeStamp" id="label-LoginAttempt-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                <input type="datetime-local" id="LoginAttempt-timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()" aria-labelledby="label-timeStamp" />
                <div *ngIf="loginAttemptForm.get('timeStamp')?.invalid && loginAttemptForm.get('timeStamp')?.touched" class="text-danger">
                    Time Stamp is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userName')">
                <label for="LoginAttempt-userName" id="label-LoginAttempt-userName">User Name</label>
                <input type="text" id="LoginAttempt-userName" formControlName="userName" placeholder="Enter User Name" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()" aria-labelledby="label-userName" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('passwordHash')">
                <label for="LoginAttempt-passwordHash" id="label-LoginAttempt-passwordHash">Password Hash</label>
                <input type="number" id="LoginAttempt-passwordHash" formControlName="passwordHash" placeholder="Enter Password Hash" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()" aria-labelledby="label-passwordHash" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('resource')">
                <label for="LoginAttempt-resource" id="label-LoginAttempt-resource">Resource</label>
                <textarea id="LoginAttempt-resource" formControlName="resource" placeholder="Enter Resource" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('sessionId')">
                <label for="LoginAttempt-sessionId" id="label-LoginAttempt-sessionId">Session Id</label>
                <input type="text" id="LoginAttempt-sessionId" formControlName="sessionId" placeholder="Enter Session Id" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()" aria-labelledby="label-sessionId" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('ipAddress')">
                <label for="LoginAttempt-ipAddress" id="label-LoginAttempt-ipAddress">Ip Address</label>
                <input type="text" id="LoginAttempt-ipAddress" formControlName="ipAddress" placeholder="Enter Ip Address" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()" aria-labelledby="label-ipAddress" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userAgent')">
                <label for="LoginAttempt-userAgent" id="label-LoginAttempt-userAgent">User Agent</label>
                <input type="text" id="LoginAttempt-userAgent" formControlName="userAgent" placeholder="Enter User Agent" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()" aria-labelledby="label-userAgent" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('value')">
                <label for="LoginAttempt-value" id="label-LoginAttempt-value">Value</label>
                <textarea id="LoginAttempt-value" formControlName="value" placeholder="Enter Value" class="form-control login-attempt-input" [disabled]="!userIsSecurityLoginAttemptWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('success')">
                <input type="checkbox" id="LoginAttempt-success" formControlName="success" class="form-check-input" [disabled]="!userIsSecurityLoginAttemptWriter()" />
                <label for="LoginAttempt-success" class="form-check-label" id="label-LoginAttempt-success">Success</label>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('securityUserId')">
                <label for="LoginAttempt-securityUserId" id="label-LoginAttempt-securityUserId">Security User</label>
                <select id="LoginAttempt-securityUserId" formControlName="securityUserId" class="form-select login-attempt-select" [disabled]="!userIsSecurityLoginAttemptWriter()">
                    <option [ngValue]="null">Select Security User</option>
                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('ipAddressLocationId')">
                <label for="LoginAttempt-ipAddressLocationId" id="label-LoginAttempt-ipAddressLocationId">Ip Address Location</label>
                <select id="LoginAttempt-ipAddressLocationId" formControlName="ipAddressLocationId" class="form-select login-attempt-select" [disabled]="!userIsSecurityLoginAttemptWriter()">
                    <option [ngValue]="null">Select Ip Address Location</option>
                    <option *ngFor="let ipAddressLocation of ipAddressLocations$ | async" [ngValue]="ipAddressLocation.id">{{[ipAddressLocation.ipAddress] | filterAndJoin}}</option>
                </select>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="LoginAttempt-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecurityLoginAttemptWriter()" />
                <label for="LoginAttempt-active" class="form-check-label" id="label-LoginAttempt-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="LoginAttempt-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecurityLoginAttemptWriter()" />
                <label for="LoginAttempt-deleted" class="form-check-label" id="label-LoginAttempt-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer login-attempt-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Login Attempt changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !loginAttemptForm.valid || loginAttemptForm.pristine  || userIsSecurityLoginAttemptWriter() == false " ngbTooltip="Save the Login Attempt changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Login Attempt' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
