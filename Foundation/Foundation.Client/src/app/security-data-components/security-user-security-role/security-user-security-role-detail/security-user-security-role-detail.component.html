<div class="container-fluid p-1 m-0 security-user-security-role-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-user-security-role-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security User Security Role</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security User Security Role' : 'Add Security User Security Role'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityUserSecurityRoleReader()">
                <div class="col m-2 security-user-security-role-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityUserSecurityRoleForm" (ngSubmit)="submitForm()" class="security-user-security-role-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('securityUserId')">
                                <label for="SecurityUserSecurityRole-securityUserId" id="label-SecurityUserSecurityRole-securityUserId"><span class="text-danger">*</span>Security User</label>
                                <select id="SecurityUserSecurityRole-securityUserId" formControlName="securityUserId" class="form-select security-user-security-role-select" [disabled]="!userIsSecuritySecurityUserSecurityRoleWriter()">
                                    <option [ngValue]="null">Select Security User</option>
                                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="securityUserSecurityRoleForm.get('securityUserId')?.invalid && securityUserSecurityRoleForm.get('securityUserId')?.touched" class="text-danger">
                                    Security User is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('securityRoleId')">
                                <label for="SecurityUserSecurityRole-securityRoleId" id="label-SecurityUserSecurityRole-securityRoleId"><span class="text-danger">*</span>Security Role</label>
                                <select id="SecurityUserSecurityRole-securityRoleId" formControlName="securityRoleId" class="form-select security-user-security-role-select" [disabled]="!userIsSecuritySecurityUserSecurityRoleWriter()">
                                    <option [ngValue]="null">Select Security Role</option>
                                    <option *ngFor="let securityRole of securityRoles$ | async" [ngValue]="securityRole.id">{{securityRole.name}}</option>
                                </select>
                                <div *ngIf="securityUserSecurityRoleForm.get('securityRoleId')?.invalid && securityUserSecurityRoleForm.get('securityRoleId')?.touched" class="text-danger">
                                    Security Role is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                                <label for="SecurityUserSecurityRole-comments" id="label-SecurityUserSecurityRole-comments">Comments</label>
                                <textarea id="SecurityUserSecurityRole-comments" formControlName="comments" placeholder="Enter Comments" class="form-control security-user-security-role-input" [disabled]="!userIsSecuritySecurityUserSecurityRoleWriter()"></textarea>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityUserSecurityRole-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityUserSecurityRoleWriter()" />
                                <label for="SecurityUserSecurityRole-active" class="form-check-label" id="label-SecurityUserSecurityRole-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityUserSecurityRole-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityUserSecurityRoleWriter()" />
                                <label for="SecurityUserSecurityRole-deleted" class="form-check-label" id="label-SecurityUserSecurityRole-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-user-security-role-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityUserSecurityRoleForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security User Security Role">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityUserSecurityRoleForm.valid || !securityUserSecurityRoleForm.dirty || securityUserSecurityRoleForm.pristine  || userIsSecuritySecurityUserSecurityRoleWriter() == false " ngbTooltip="Save the Security User Security Role changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Security User Security Role' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
