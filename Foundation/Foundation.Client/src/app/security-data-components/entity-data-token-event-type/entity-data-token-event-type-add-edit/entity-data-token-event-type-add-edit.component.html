<div class="add-entity-data-token-event-type" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-entity-data-token-event-type me-2"
        (click)="openModal()"
        ngbTooltip="Add Entity Data Token Event Type" 
        *ngIf="userIsSecurityEntityDataTokenEventTypeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #entityDataTokenEventTypeModal let-modal>
   <div class="modal-header bg-dark text-light entity-data-token-event-type-modal-header">
      <h5 class="modal-title mb-0" id="entityDataTokenEventTypeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Entity Data Token Event Type' : 'Add Entity Data Token Event Type' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body entity-data-token-event-type-modal-body">
      <form [formGroup]="entityDataTokenEventTypeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="EntityDataTokenEventType-name" id="label-EntityDataTokenEventType-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="EntityDataTokenEventType-name" formControlName="name" placeholder="Enter Name" class="form-control entity-data-token-event-type-input" [disabled]="!userIsSecurityEntityDataTokenEventTypeWriter()" aria-labelledby="label-name" />
                <div *ngIf="entityDataTokenEventTypeForm.get('name')?.invalid && entityDataTokenEventTypeForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="EntityDataTokenEventType-description" id="label-EntityDataTokenEventType-description">Description</label>
                <textarea id="EntityDataTokenEventType-description" formControlName="description" placeholder="Enter Description" class="form-control entity-data-token-event-type-input" [disabled]="!userIsSecurityEntityDataTokenEventTypeWriter()"></textarea>
            </div>
         <div class="modal-footer entity-data-token-event-type-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Entity Data Token Event Type changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !entityDataTokenEventTypeForm.valid || entityDataTokenEventTypeForm.pristine  || userIsSecurityEntityDataTokenEventTypeWriter() == false " ngbTooltip="Save the Entity Data Token Event Type changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Entity Data Token Event Type' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
