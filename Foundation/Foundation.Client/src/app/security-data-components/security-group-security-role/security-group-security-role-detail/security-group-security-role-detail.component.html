<div class="container-fluid p-1 m-0 security-group-security-role-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-group-security-role-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security Group Security Role</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security Group Security Role' : 'Add Security Group Security Role'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityGroupSecurityRoleReader()">
                <div class="col m-2 security-group-security-role-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityGroupSecurityRoleForm" (ngSubmit)="submitForm()" class="security-group-security-role-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('securityGroupId')">
                                <label for="SecurityGroupSecurityRole-securityGroupId" id="label-SecurityGroupSecurityRole-securityGroupId"><span class="text-danger">*</span>Security Group</label>
                                <select id="SecurityGroupSecurityRole-securityGroupId" formControlName="securityGroupId" class="form-select security-group-security-role-select" [disabled]="!userIsSecuritySecurityGroupSecurityRoleWriter()">
                                    <option [ngValue]="null">Select Security Group</option>
                                    <option *ngFor="let securityGroup of securityGroups$ | async" [ngValue]="securityGroup.id">{{securityGroup.name}}</option>
                                </select>
                                <div *ngIf="securityGroupSecurityRoleForm.get('securityGroupId')?.invalid && securityGroupSecurityRoleForm.get('securityGroupId')?.touched" class="text-danger">
                                    Security Group is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('securityRoleId')">
                                <label for="SecurityGroupSecurityRole-securityRoleId" id="label-SecurityGroupSecurityRole-securityRoleId"><span class="text-danger">*</span>Security Role</label>
                                <select id="SecurityGroupSecurityRole-securityRoleId" formControlName="securityRoleId" class="form-select security-group-security-role-select" [disabled]="!userIsSecuritySecurityGroupSecurityRoleWriter()">
                                    <option [ngValue]="null">Select Security Role</option>
                                    <option *ngFor="let securityRole of securityRoles$ | async" [ngValue]="securityRole.id">{{securityRole.name}}</option>
                                </select>
                                <div *ngIf="securityGroupSecurityRoleForm.get('securityRoleId')?.invalid && securityGroupSecurityRoleForm.get('securityRoleId')?.touched" class="text-danger">
                                    Security Role is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                                <label for="SecurityGroupSecurityRole-comments" id="label-SecurityGroupSecurityRole-comments">Comments</label>
                                <textarea id="SecurityGroupSecurityRole-comments" formControlName="comments" placeholder="Enter Comments" class="form-control security-group-security-role-input" [disabled]="!userIsSecuritySecurityGroupSecurityRoleWriter()"></textarea>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityGroupSecurityRole-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityGroupSecurityRoleWriter()" />
                                <label for="SecurityGroupSecurityRole-active" class="form-check-label" id="label-SecurityGroupSecurityRole-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityGroupSecurityRole-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityGroupSecurityRoleWriter()" />
                                <label for="SecurityGroupSecurityRole-deleted" class="form-check-label" id="label-SecurityGroupSecurityRole-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-group-security-role-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityGroupSecurityRoleForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security Group Security Role">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityGroupSecurityRoleForm.valid || !securityGroupSecurityRoleForm.dirty || securityGroupSecurityRoleForm.pristine  || userIsSecuritySecurityGroupSecurityRoleWriter() == false " ngbTooltip="Save the Security Group Security Role changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Security Group Security Role' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
