<div class="container-fluid p-1 m-0 security-user-password-reset-token-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-user-password-reset-token-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security User Password Reset Token</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security User Password Reset Token' : 'Add Security User Password Reset Token'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityUserPasswordResetTokenReader()">
                <div class="col m-2 security-user-password-reset-token-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityUserPasswordResetTokenForm" (ngSubmit)="submitForm()" class="security-user-password-reset-token-details-form">
                            <div class="form-group">
                                <label for="securityUserId" id="label-securityUserId"><span class="text-danger">*</span>Security User</label>
                                <select id="securityUserId" formControlName="securityUserId" class="form-select security-user-password-reset-token-select" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()">
                                    <option [ngValue]="null">Select Security User</option>
                                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="securityUserPasswordResetTokenForm.get('securityUserId')?.invalid && securityUserPasswordResetTokenForm.get('securityUserId')?.touched" class="text-danger">
                                    Security User is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="token" id="label-token"><span class="text-danger">*</span>Token</label>
                                <input type="text" id="token" formControlName="token" placeholder="Enter Token" class="form-control security-user-password-reset-token-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" aria-labelledby="label-token" />
                                <div *ngIf="securityUserPasswordResetTokenForm.get('token')?.invalid && securityUserPasswordResetTokenForm.get('token')?.touched" class="text-danger">
                                    Token is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="timeStamp" id="label-timeStamp"><span class="text-danger">*</span>Time Stamp</label>
                                <input type="datetime-local" id="timeStamp" formControlName="timeStamp" placeholder="Enter Time Stamp" class="form-control security-user-password-reset-token-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" aria-labelledby="label-timeStamp" />
                                <div *ngIf="securityUserPasswordResetTokenForm.get('timeStamp')?.invalid && securityUserPasswordResetTokenForm.get('timeStamp')?.touched" class="text-danger">
                                    Time Stamp is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="expiry" id="label-expiry"><span class="text-danger">*</span>Expiry</label>
                                <input type="datetime-local" id="expiry" formControlName="expiry" placeholder="Enter Expiry" class="form-control security-user-password-reset-token-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" aria-labelledby="label-expiry" />
                                <div *ngIf="securityUserPasswordResetTokenForm.get('expiry')?.invalid && securityUserPasswordResetTokenForm.get('expiry')?.touched" class="text-danger">
                                    Expiry is required
                                </div>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="systemInitiated" formControlName="systemInitiated" class="form-check-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" />
                                <label for="systemInitiated" class="form-check-label" id="label-systemInitiated"><span class="text-danger">*</span>System Initiated</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="completed" formControlName="completed" class="form-check-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" />
                                <label for="completed" class="form-check-label" id="label-completed"><span class="text-danger">*</span>Completed</label>
                            </div>
                            <div class="form-group">
                                <label for="comments" id="label-comments">Comments</label>
                                <textarea id="comments" formControlName="comments" placeholder="Enter Comments" class="form-control security-user-password-reset-token-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()"></textarea>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" />
                                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityUserPasswordResetTokenWriter()" />
                                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-user-password-reset-token-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityUserPasswordResetTokenForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security User Password Reset Token">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !securityUserPasswordResetTokenForm.valid || !securityUserPasswordResetTokenForm.dirty || securityUserPasswordResetTokenForm.pristine || userIsSecuritySecurityUserPasswordResetTokenWriter() == false " ngbTooltip="Save Security User Password Reset Token">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
