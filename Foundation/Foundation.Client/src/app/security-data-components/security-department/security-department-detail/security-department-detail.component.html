<div class="container-fluid p-1 m-0 security-department-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-department-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security Department</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security Department' : 'Add Security Department'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityDepartmentReader()">
                <div class="col m-2 security-department-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityDepartmentForm" (ngSubmit)="submitForm()" class="security-department-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('securityOrganizationId')">
                                <label for="SecurityDepartment-securityOrganizationId" id="label-SecurityDepartment-securityOrganizationId"><span class="text-danger">*</span>Security Organization</label>
                                <select id="SecurityDepartment-securityOrganizationId" formControlName="securityOrganizationId" class="form-select security-department-select" [disabled]="!userIsSecuritySecurityDepartmentWriter()">
                                    <option [ngValue]="null">Select Security Organization</option>
                                    <option *ngFor="let securityOrganization of securityOrganizations$ | async" [ngValue]="securityOrganization.id">{{securityOrganization.name}}</option>
                                </select>
                                <div *ngIf="securityDepartmentForm.get('securityOrganizationId')?.invalid && securityDepartmentForm.get('securityOrganizationId')?.touched" class="text-danger">
                                    Security Organization is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="SecurityDepartment-name" id="label-SecurityDepartment-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="SecurityDepartment-name" formControlName="name" placeholder="Enter Name" class="form-control security-department-input" [disabled]="!userIsSecuritySecurityDepartmentWriter()" aria-labelledby="label-name" />
                                <div *ngIf="securityDepartmentForm.get('name')?.invalid && securityDepartmentForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="SecurityDepartment-description" id="label-SecurityDepartment-description">Description</label>
                                <textarea id="SecurityDepartment-description" formControlName="description" placeholder="Enter Description" class="form-control security-department-input" [disabled]="!userIsSecuritySecurityDepartmentWriter()"></textarea>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityDepartment-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityDepartmentWriter()" />
                                <label for="SecurityDepartment-active" class="form-check-label" id="label-SecurityDepartment-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityDepartment-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityDepartmentWriter()" />
                                <label for="SecurityDepartment-deleted" class="form-check-label" id="label-SecurityDepartment-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-department-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityDepartmentForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security Department">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityDepartmentForm.valid || !securityDepartmentForm.dirty || securityDepartmentForm.pristine  || userIsSecuritySecurityDepartmentWriter() == false " ngbTooltip="Save the Security Department changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Security Department' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSecuritySecurityDepartmentReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 security-department-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="securityTeamService.userIsSecuritySecurityTeamReader()">
                            <button ngbNavLink>Security Teams
                                <span class="badge bg-primary ms-2">
                                    {{ (securityDepartmentData?.SecurityTeamsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-team-table [queryParams]="{ securityDepartmentId: securityDepartmentData?.id }" [showAddButton]="true" [preSeededData]="{ securityDepartmentId: securityDepartmentData?.id }" [hiddenFields]="['securityDepartmentId']"></app-security-team-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityUserService.userIsSecuritySecurityUserReader()">
                            <button ngbNavLink>Security Users
                                <span class="badge bg-primary ms-2">
                                    {{ (securityDepartmentData?.SecurityUsersCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-user-table [queryParams]="{ securityDepartmentId: securityDepartmentData?.id }" [showAddButton]="true" [preSeededData]="{ securityDepartmentId: securityDepartmentData?.id }" [hiddenFields]="['securityDepartmentId']"></app-security-user-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityDepartmentUserService.userIsSecuritySecurityDepartmentUserReader()">
                            <button ngbNavLink>Security Department Users
                                <span class="badge bg-primary ms-2">
                                    {{ (securityDepartmentData?.SecurityDepartmentUsersCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-department-user-table [queryParams]="{ securityDepartmentId: securityDepartmentData?.id }" [showAddButton]="true" [preSeededData]="{ securityDepartmentId: securityDepartmentData?.id }" [hiddenFields]="['securityDepartmentId']"></app-security-department-user-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
