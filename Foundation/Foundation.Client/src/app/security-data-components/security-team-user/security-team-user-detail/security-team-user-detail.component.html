<div class="container-fluid p-1 m-0 security-team-user-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-team-user-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security Team User</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security Team User' : 'Add Security Team User'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityTeamUserReader()">
                <div class="col m-2 security-team-user-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityTeamUserForm" (ngSubmit)="submitForm()" class="security-team-user-details-form">
                            <div class="form-group">
                                <label for="securityTeamId" id="label-securityTeamId"><span class="text-danger">*</span>Security Team</label>
                                <select id="securityTeamId" formControlName="securityTeamId" class="form-select security-team-user-select" [disabled]="!userIsSecuritySecurityTeamUserWriter()">
                                    <option [ngValue]="null">Select Security Team</option>
                                    <option *ngFor="let securityTeam of securityTeams$ | async" [ngValue]="securityTeam.id">{{securityTeam.name}}</option>
                                </select>
                                <div *ngIf="securityTeamUserForm.get('securityTeamId')?.invalid && securityTeamUserForm.get('securityTeamId')?.touched" class="text-danger">
                                    Security Team is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="securityUserId" id="label-securityUserId"><span class="text-danger">*</span>Security User</label>
                                <select id="securityUserId" formControlName="securityUserId" class="form-select security-team-user-select" [disabled]="!userIsSecuritySecurityTeamUserWriter()">
                                    <option [ngValue]="null">Select Security User</option>
                                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="securityTeamUserForm.get('securityUserId')?.invalid && securityTeamUserForm.get('securityUserId')?.touched" class="text-danger">
                                    Security User is required
                                </div>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="canRead" formControlName="canRead" class="form-check-input" [disabled]="!userIsSecuritySecurityTeamUserWriter()" />
                                <label for="canRead" class="form-check-label" id="label-canRead"><span class="text-danger">*</span>Can Read</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="canWrite" formControlName="canWrite" class="form-check-input" [disabled]="!userIsSecuritySecurityTeamUserWriter()" />
                                <label for="canWrite" class="form-check-label" id="label-canWrite"><span class="text-danger">*</span>Can Write</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="canChangeHierarchy" formControlName="canChangeHierarchy" class="form-check-input" [disabled]="!userIsSecuritySecurityTeamUserWriter()" />
                                <label for="canChangeHierarchy" class="form-check-label" id="label-canChangeHierarchy"><span class="text-danger">*</span>Can Change Hierarchy</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="canChangeOwner" formControlName="canChangeOwner" class="form-check-input" [disabled]="!userIsSecuritySecurityTeamUserWriter()" />
                                <label for="canChangeOwner" class="form-check-label" id="label-canChangeOwner"><span class="text-danger">*</span>Can Change Owner</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityTeamUserWriter()" />
                                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityTeamUserWriter()" />
                                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-team-user-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityTeamUserForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security Team User">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !securityTeamUserForm.valid || !securityTeamUserForm.dirty || securityTeamUserForm.pristine || userIsSecuritySecurityTeamUserWriter() == false " ngbTooltip="Save Security Team User">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
