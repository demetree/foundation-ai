<div class="container-fluid p-1 m-0 module-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="module-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Module</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Module' : 'Add Module'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecurityModuleReader()">
                <div class="col m-2 module-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="moduleForm" (ngSubmit)="submitForm()" class="module-details-form">
                            <div class="form-group">
                                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="name" formControlName="name" placeholder="Enter Name" class="form-control module-input" [disabled]="!userIsSecurityModuleWriter()" aria-labelledby="label-name" />
                                <div *ngIf="moduleForm.get('name')?.invalid && moduleForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="description" id="label-description">Description</label>
                                <textarea id="description" formControlName="description" placeholder="Enter Description" class="form-control module-input" [disabled]="!userIsSecurityModuleWriter()"></textarea>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecurityModuleWriter()" />
                                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecurityModuleWriter()" />
                                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="module-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="moduleForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Module">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !moduleForm.valid || !moduleForm.dirty || moduleForm.pristine || userIsSecurityModuleWriter() == false " ngbTooltip="Save Module">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSecurityModuleReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 module-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="moduleSecurityRoleService.userIsSecurityModuleSecurityRoleReader()">
                            <button ngbNavLink>ModuleSecurityRoles
                                <span class="badge bg-primary ms-2">
                                    {{ (moduleData?.ModuleSecurityRolesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <app-module-security-role-table [queryParams]="GetQueryParameters()"></app-module-security-role-table>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="entityDataTokenService.userIsSecurityEntityDataTokenReader()">
                            <button ngbNavLink>EntityDataTokens
                                <span class="badge bg-primary ms-2">
                                    {{ (moduleData?.EntityDataTokensCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <app-entity-data-token-table [queryParams]="GetQueryParameters()"></app-entity-data-token-table>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
