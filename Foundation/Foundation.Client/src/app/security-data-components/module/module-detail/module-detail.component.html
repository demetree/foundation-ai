<div class="container-fluid p-1 m-0 module-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="module-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Module</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Module' : 'Add Module'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecurityModuleReader()">
                <div class="col m-2 module-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="moduleForm" (ngSubmit)="submitForm()" class="module-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="Module-name" id="label-Module-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="Module-name" formControlName="name" placeholder="Enter Name" class="form-control module-input" [disabled]="!userIsSecurityModuleWriter()" aria-labelledby="label-name" />
                                <div *ngIf="moduleForm.get('name')?.invalid && moduleForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="Module-description" id="label-Module-description">Description</label>
                                <textarea id="Module-description" formControlName="description" placeholder="Enter Description" class="form-control module-input" [disabled]="!userIsSecurityModuleWriter()"></textarea>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Module-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecurityModuleWriter()" />
                                <label for="Module-active" class="form-check-label" id="label-Module-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="Module-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecurityModuleWriter()" />
                                <label for="Module-deleted" class="form-check-label" id="label-Module-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="module-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="moduleForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Module">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !moduleForm.valid || !moduleForm.dirty || moduleForm.pristine  || userIsSecurityModuleWriter() == false " ngbTooltip="Save the Module changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Module' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSecurityModuleReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 module-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="moduleSecurityRoleService.userIsSecurityModuleSecurityRoleReader()">
                            <button ngbNavLink>Module Security Roles
                                <span class="badge bg-primary ms-2">
                                    {{ (moduleData?.ModuleSecurityRolesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-module-security-role-table [queryParams]="{ moduleId: moduleData?.id }" [showAddButton]="true" [preSeededData]="{ moduleId: moduleData?.id }" [hiddenFields]="['moduleId']"></app-module-security-role-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="entityDataTokenService.userIsSecurityEntityDataTokenReader()">
                            <button ngbNavLink>Entity Data Tokens
                                <span class="badge bg-primary ms-2">
                                    {{ (moduleData?.EntityDataTokensCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-entity-data-token-table [queryParams]="{ moduleId: moduleData?.id }" [showAddButton]="true" [preSeededData]="{ moduleId: moduleData?.id }" [hiddenFields]="['moduleId']"></app-entity-data-token-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
