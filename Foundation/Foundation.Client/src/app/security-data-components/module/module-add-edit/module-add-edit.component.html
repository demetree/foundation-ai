<div class="add-module" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-module me-2"
        (click)="openModal()"
        ngbTooltip="Add Module" 
        *ngIf="userIsSecurityModuleWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #moduleModal let-modal>
   <div class="modal-header module-modal-header">
      <h5 class="modal-title mb-0" id="moduleModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Module' : 'Add Module' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body module-modal-body">
      <form [formGroup]="moduleForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="Module-name" id="label-Module-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="Module-name" formControlName="name" placeholder="Enter Name" class="form-control module-input" [disabled]="!userIsSecurityModuleWriter()" aria-labelledby="label-name" />
                <div *ngIf="moduleForm.get('name')?.invalid && moduleForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="Module-description" id="label-Module-description">Description</label>
                <textarea id="Module-description" formControlName="description" placeholder="Enter Description" class="form-control module-input" [disabled]="!userIsSecurityModuleWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="Module-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecurityModuleWriter()" />
                <label for="Module-active" class="form-check-label" id="label-Module-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="Module-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecurityModuleWriter()" />
                <label for="Module-deleted" class="form-check-label" id="label-Module-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer module-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Module changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !moduleForm.valid || moduleForm.pristine  || userIsSecurityModuleWriter() == false " ngbTooltip="Save the Module changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Module' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
