<div class="container-fluid p-1 m-0 security-role-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-role-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security Role</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security Role' : 'Add Security Role'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityRoleReader()">
                <div class="col m-2 security-role-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityRoleForm" (ngSubmit)="submitForm()" class="security-role-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('privilegeId')">
                                <label for="SecurityRole-privilegeId" id="label-SecurityRole-privilegeId"><span class="text-danger">*</span>Privilege</label>
                                <select id="SecurityRole-privilegeId" formControlName="privilegeId" class="form-select security-role-select" [disabled]="!userIsSecuritySecurityRoleWriter()">
                                    <option [ngValue]="null">Select Privilege</option>
                                    <option *ngFor="let privilege of privileges$ | async" [ngValue]="privilege.id">{{privilege.name}}</option>
                                </select>
                                <div *ngIf="securityRoleForm.get('privilegeId')?.invalid && securityRoleForm.get('privilegeId')?.touched" class="text-danger">
                                    Privilege is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="SecurityRole-name" id="label-SecurityRole-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="SecurityRole-name" formControlName="name" placeholder="Enter Name" class="form-control security-role-input" [disabled]="!userIsSecuritySecurityRoleWriter()" aria-labelledby="label-name" />
                                <div *ngIf="securityRoleForm.get('name')?.invalid && securityRoleForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="SecurityRole-description" id="label-SecurityRole-description">Description</label>
                                <textarea id="SecurityRole-description" formControlName="description" placeholder="Enter Description" class="form-control security-role-input" [disabled]="!userIsSecuritySecurityRoleWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                                <label for="SecurityRole-comments" id="label-SecurityRole-comments">Comments</label>
                                <textarea id="SecurityRole-comments" formControlName="comments" placeholder="Enter Comments" class="form-control security-role-input" [disabled]="!userIsSecuritySecurityRoleWriter()"></textarea>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityRole-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityRoleWriter()" />
                                <label for="SecurityRole-active" class="form-check-label" id="label-SecurityRole-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityRole-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityRoleWriter()" />
                                <label for="SecurityRole-deleted" class="form-check-label" id="label-SecurityRole-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-role-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityRoleForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security Role">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityRoleForm.valid || !securityRoleForm.dirty || securityRoleForm.pristine  || userIsSecuritySecurityRoleWriter() == false " ngbTooltip="Save the Security Role changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Security Role' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSecuritySecurityRoleReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 security-role-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="securityUserSecurityRoleService.userIsSecuritySecurityUserSecurityRoleReader()">
                            <button ngbNavLink>Security User Security Roles
                                <span class="badge bg-primary ms-2">
                                    {{ (securityRoleData?.SecurityUserSecurityRolesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-user-security-role-table [queryParams]="{ securityRoleId: securityRoleData?.id }" [showAddButton]="true" [preSeededData]="{ securityRoleId: securityRoleData?.id }" [hiddenFields]="['securityRoleId']"></app-security-user-security-role-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityGroupSecurityRoleService.userIsSecuritySecurityGroupSecurityRoleReader()">
                            <button ngbNavLink>Security Group Security Roles
                                <span class="badge bg-primary ms-2">
                                    {{ (securityRoleData?.SecurityGroupSecurityRolesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-group-security-role-table [queryParams]="{ securityRoleId: securityRoleData?.id }" [showAddButton]="true" [preSeededData]="{ securityRoleId: securityRoleData?.id }" [hiddenFields]="['securityRoleId']"></app-security-group-security-role-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="moduleSecurityRoleService.userIsSecurityModuleSecurityRoleReader()">
                            <button ngbNavLink>Module Security Roles
                                <span class="badge bg-primary ms-2">
                                    {{ (securityRoleData?.ModuleSecurityRolesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-module-security-role-table [queryParams]="{ securityRoleId: securityRoleData?.id }" [showAddButton]="true" [preSeededData]="{ securityRoleId: securityRoleData?.id }" [hiddenFields]="['securityRoleId']"></app-module-security-role-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
