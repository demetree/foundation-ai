<div class="add-security-tenant" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-security-tenant me-2"
        (click)="openModal()"
        ngbTooltip="Add Security Tenant" 
        *ngIf="userIsSecuritySecurityTenantWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #securityTenantModal let-modal>
   <div class="modal-header bg-dark text-light security-tenant-modal-header">
      <h5 class="modal-title mb-0" id="securityTenantModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Security Tenant' : 'Add Security Tenant' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body security-tenant-modal-body">
      <form [formGroup]="securityTenantForm" (ngSubmit)="submitForm()">
            <div class="form-group">
                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="name" formControlName="name" placeholder="Enter Name" class="form-control security-tenant-input" [disabled]="!userIsSecuritySecurityTenantWriter()" aria-labelledby="label-name" />
                <div *ngIf="securityTenantForm.get('name')?.invalid && securityTenantForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group">
                <label for="description" id="label-description">Description</label>
                <textarea id="description" formControlName="description" placeholder="Enter Description" class="form-control security-tenant-input" [disabled]="!userIsSecuritySecurityTenantWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityTenantWriter()" />
                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityTenantWriter()" />
                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer security-tenant-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Security Tenant changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityTenantForm.valid || securityTenantForm.pristine || !userIsSecuritySecurityTenantWriter()" ngbTooltip="Save the Security Tenant changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
