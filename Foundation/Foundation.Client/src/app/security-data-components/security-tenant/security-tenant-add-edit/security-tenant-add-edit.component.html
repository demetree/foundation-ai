<div class="add-security-tenant" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-security-tenant me-2"
        (click)="openModal()"
        ngbTooltip="Add Security Tenant" 
        *ngIf="userIsSecuritySecurityTenantWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #securityTenantModal let-modal>
   <div class="modal-header security-tenant-modal-header">
      <h5 class="modal-title mb-0" id="securityTenantModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Security Tenant' : 'Add Security Tenant' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body security-tenant-modal-body">
      <form [formGroup]="securityTenantForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="SecurityTenant-name" id="label-SecurityTenant-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="SecurityTenant-name" formControlName="name" placeholder="Enter Name" class="form-control security-tenant-input" [disabled]="!userIsSecuritySecurityTenantWriter()" aria-labelledby="label-name" />
                <div *ngIf="securityTenantForm.get('name')?.invalid && securityTenantForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="SecurityTenant-description" id="label-SecurityTenant-description">Description</label>
                <textarea id="SecurityTenant-description" formControlName="description" placeholder="Enter Description" class="form-control security-tenant-input" [disabled]="!userIsSecuritySecurityTenantWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('settings')">
                <label for="SecurityTenant-settings" id="label-SecurityTenant-settings">Settings</label>
                <textarea id="SecurityTenant-settings" formControlName="settings" placeholder="Enter Settings" class="form-control security-tenant-input" [disabled]="!userIsSecuritySecurityTenantWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="SecurityTenant-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityTenantWriter()" />
                <label for="SecurityTenant-active" class="form-check-label" id="label-SecurityTenant-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="SecurityTenant-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityTenantWriter()" />
                <label for="SecurityTenant-deleted" class="form-check-label" id="label-SecurityTenant-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer security-tenant-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Security Tenant changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityTenantForm.valid || securityTenantForm.pristine  || userIsSecuritySecurityTenantWriter() == false " ngbTooltip="Save the Security Tenant changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Security Tenant' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
