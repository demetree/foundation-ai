<div class="container-fluid p-1 m-0 security-tenant-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-tenant-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security Tenant</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security Tenant' : 'Add Security Tenant'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityTenantReader()">
                <div class="col m-2 security-tenant-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityTenantForm" (ngSubmit)="submitForm()" class="security-tenant-details-form">
                            <div class="form-group">
                                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="name" formControlName="name" placeholder="Enter Name" class="form-control security-tenant-input" [disabled]="!userIsSecuritySecurityTenantWriter()" aria-labelledby="label-name" />
                                <div *ngIf="securityTenantForm.get('name')?.invalid && securityTenantForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="description" id="label-description">Description</label>
                                <textarea id="description" formControlName="description" placeholder="Enter Description" class="form-control security-tenant-input" [disabled]="!userIsSecuritySecurityTenantWriter()"></textarea>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityTenantWriter()" />
                                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityTenantWriter()" />
                                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-tenant-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityTenantForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security Tenant">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !securityTenantForm.valid || !securityTenantForm.dirty || securityTenantForm.pristine || userIsSecuritySecurityTenantWriter() == false " ngbTooltip="Save Security Tenant">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSecuritySecurityTenantReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 security-tenant-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="securityOrganizationService.userIsSecuritySecurityOrganizationReader()">
                            <button ngbNavLink>SecurityOrganizations
                                <span class="badge bg-primary ms-2">
                                    {{ (securityTenantData?.SecurityOrganizationsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <app-security-organization-table [queryParams]="GetQueryParameters()"></app-security-organization-table>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityUserService.userIsSecuritySecurityUserReader()">
                            <button ngbNavLink>SecurityUsers
                                <span class="badge bg-primary ms-2">
                                    {{ (securityTenantData?.SecurityUsersCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <app-security-user-table [queryParams]="GetQueryParameters()"></app-security-user-table>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityTenantUserService.userIsSecuritySecurityTenantUserReader()">
                            <button ngbNavLink>SecurityTenantUsers
                                <span class="badge bg-primary ms-2">
                                    {{ (securityTenantData?.SecurityTenantUsersCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <app-security-tenant-user-table [queryParams]="GetQueryParameters()"></app-security-tenant-user-table>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
