<div class="container-fluid p-1 m-0 security-tenant-user-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-tenant-user-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security Tenant User</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security Tenant User' : 'Add Security Tenant User'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityTenantUserReader()">
                <div class="col m-2 security-tenant-user-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityTenantUserForm" (ngSubmit)="submitForm()" class="security-tenant-user-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('securityTenantId')">
                                <label for="SecurityTenantUser-securityTenantId" id="label-SecurityTenantUser-securityTenantId"><span class="text-danger">*</span>Security Tenant</label>
                                <select id="SecurityTenantUser-securityTenantId" formControlName="securityTenantId" class="form-select security-tenant-user-select" [disabled]="!userIsSecuritySecurityTenantUserWriter()">
                                    <option [ngValue]="null">Select Security Tenant</option>
                                    <option *ngFor="let securityTenant of securityTenants$ | async" [ngValue]="securityTenant.id">{{securityTenant.name}}</option>
                                </select>
                                <div *ngIf="securityTenantUserForm.get('securityTenantId')?.invalid && securityTenantUserForm.get('securityTenantId')?.touched" class="text-danger">
                                    Security Tenant is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('securityUserId')">
                                <label for="SecurityTenantUser-securityUserId" id="label-SecurityTenantUser-securityUserId"><span class="text-danger">*</span>Security User</label>
                                <select id="SecurityTenantUser-securityUserId" formControlName="securityUserId" class="form-select security-tenant-user-select" [disabled]="!userIsSecuritySecurityTenantUserWriter()">
                                    <option [ngValue]="null">Select Security User</option>
                                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="securityTenantUserForm.get('securityUserId')?.invalid && securityTenantUserForm.get('securityUserId')?.touched" class="text-danger">
                                    Security User is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('isOwner')">
                                <input type="checkbox" id="SecurityTenantUser-isOwner" formControlName="isOwner" class="form-check-input" [disabled]="!userIsSecuritySecurityTenantUserWriter()" />
                                <label for="SecurityTenantUser-isOwner" class="form-check-label" id="label-SecurityTenantUser-isOwner"><span class="text-danger">*</span>Is Owner</label>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('canRead')">
                                <input type="checkbox" id="SecurityTenantUser-canRead" formControlName="canRead" class="form-check-input" [disabled]="!userIsSecuritySecurityTenantUserWriter()" />
                                <label for="SecurityTenantUser-canRead" class="form-check-label" id="label-SecurityTenantUser-canRead"><span class="text-danger">*</span>Can Read</label>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('canWrite')">
                                <input type="checkbox" id="SecurityTenantUser-canWrite" formControlName="canWrite" class="form-check-input" [disabled]="!userIsSecuritySecurityTenantUserWriter()" />
                                <label for="SecurityTenantUser-canWrite" class="form-check-label" id="label-SecurityTenantUser-canWrite"><span class="text-danger">*</span>Can Write</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityTenantUser-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityTenantUserWriter()" />
                                <label for="SecurityTenantUser-active" class="form-check-label" id="label-SecurityTenantUser-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityTenantUser-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityTenantUserWriter()" />
                                <label for="SecurityTenantUser-deleted" class="form-check-label" id="label-SecurityTenantUser-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-tenant-user-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityTenantUserForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security Tenant User">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityTenantUserForm.valid || !securityTenantUserForm.dirty || securityTenantUserForm.pristine  || userIsSecuritySecurityTenantUserWriter() == false " ngbTooltip="Save the Security Tenant User changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Security Tenant User' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
