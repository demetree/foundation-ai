<div class="container-fluid p-1 m-0 security-group-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-group-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security Group</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security Group' : 'Add Security Group'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityGroupReader()">
                <div class="col m-2 security-group-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityGroupForm" (ngSubmit)="submitForm()" class="security-group-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="SecurityGroup-name" id="label-SecurityGroup-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="SecurityGroup-name" formControlName="name" placeholder="Enter Name" class="form-control security-group-input" [disabled]="!userIsSecuritySecurityGroupWriter()" aria-labelledby="label-name" />
                                <div *ngIf="securityGroupForm.get('name')?.invalid && securityGroupForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="SecurityGroup-description" id="label-SecurityGroup-description">Description</label>
                                <textarea id="SecurityGroup-description" formControlName="description" placeholder="Enter Description" class="form-control security-group-input" [disabled]="!userIsSecuritySecurityGroupWriter()"></textarea>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityGroup-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityGroupWriter()" />
                                <label for="SecurityGroup-active" class="form-check-label" id="label-SecurityGroup-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityGroup-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityGroupWriter()" />
                                <label for="SecurityGroup-deleted" class="form-check-label" id="label-SecurityGroup-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-group-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityGroupForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security Group">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityGroupForm.valid || !securityGroupForm.dirty || securityGroupForm.pristine  || userIsSecuritySecurityGroupWriter() == false " ngbTooltip="Save the Security Group changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Security Group' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSecuritySecurityGroupReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 security-group-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="securityUserSecurityGroupService.userIsSecuritySecurityUserSecurityGroupReader()">
                            <button ngbNavLink>Security User Security Groups
                                <span class="badge bg-primary ms-2">
                                    {{ (securityGroupData?.SecurityUserSecurityGroupsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-user-security-group-table [queryParams]="{ securityGroupId: securityGroupData?.id }" [showAddButton]="true" [preSeededData]="{ securityGroupId: securityGroupData?.id }" [hiddenFields]="['securityGroupId']"></app-security-user-security-group-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityGroupSecurityRoleService.userIsSecuritySecurityGroupSecurityRoleReader()">
                            <button ngbNavLink>Security Group Security Roles
                                <span class="badge bg-primary ms-2">
                                    {{ (securityGroupData?.SecurityGroupSecurityRolesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-group-security-role-table [queryParams]="{ securityGroupId: securityGroupData?.id }" [showAddButton]="true" [preSeededData]="{ securityGroupId: securityGroupData?.id }" [hiddenFields]="['securityGroupId']"></app-security-group-security-role-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
