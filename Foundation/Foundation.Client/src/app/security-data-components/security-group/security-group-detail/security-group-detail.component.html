<div class="container-fluid p-1 m-0 security-group-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-group-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security Group</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security Group' : 'Add Security Group'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityGroupReader()">
                <div class="col m-2 security-group-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityGroupForm" (ngSubmit)="submitForm()" class="security-group-details-form">
                            <div class="form-group">
                                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="name" formControlName="name" placeholder="Enter Name" class="form-control security-group-input" [disabled]="!userIsSecuritySecurityGroupWriter()" aria-labelledby="label-name" />
                                <div *ngIf="securityGroupForm.get('name')?.invalid && securityGroupForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="description" id="label-description">Description</label>
                                <textarea id="description" formControlName="description" placeholder="Enter Description" class="form-control security-group-input" [disabled]="!userIsSecuritySecurityGroupWriter()"></textarea>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityGroupWriter()" />
                                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2">
                                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityGroupWriter()" />
                                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-group-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityGroupForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security Group">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !securityGroupForm.valid || !securityGroupForm.dirty || securityGroupForm.pristine || userIsSecuritySecurityGroupWriter() == false " ngbTooltip="Save Security Group">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSecuritySecurityGroupReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 security-group-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="securityUserSecurityGroupService.userIsSecuritySecurityUserSecurityGroupReader()">
                            <button ngbNavLink>SecurityUserSecurityGroups
                                <span class="badge bg-primary ms-2">
                                    {{ (securityGroupData?.SecurityUserSecurityGroupsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <app-security-user-security-group-table [queryParams]="GetQueryParameters()"></app-security-user-security-group-table>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityGroupSecurityRoleService.userIsSecuritySecurityGroupSecurityRoleReader()">
                            <button ngbNavLink>SecurityGroupSecurityRoles
                                <span class="badge bg-primary ms-2">
                                    {{ (securityGroupData?.SecurityGroupSecurityRolesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <app-security-group-security-role-table [queryParams]="GetQueryParameters()"></app-security-group-security-role-table>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
