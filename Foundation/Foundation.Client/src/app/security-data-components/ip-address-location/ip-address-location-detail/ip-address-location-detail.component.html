<div class="container-fluid p-1 m-0 ip-address-location-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="ip-address-location-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Ip Address Location</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Ip Address Location' : 'Add Ip Address Location'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecurityIpAddressLocationReader()">
                <div class="col m-2 ip-address-location-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="ipAddressLocationForm" (ngSubmit)="submitForm()" class="ip-address-location-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('ipAddress')">
                                <label for="IpAddressLocation-ipAddress" id="label-IpAddressLocation-ipAddress"><span class="text-danger">*</span>Ip Address</label>
                                <input type="text" id="IpAddressLocation-ipAddress" formControlName="ipAddress" placeholder="Enter Ip Address" class="form-control ip-address-location-input" [disabled]="!userIsSecurityIpAddressLocationWriter()" aria-labelledby="label-ipAddress" />
                                <div *ngIf="ipAddressLocationForm.get('ipAddress')?.invalid && ipAddressLocationForm.get('ipAddress')?.touched" class="text-danger">
                                    Ip Address is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('countryCode')">
                                <label for="IpAddressLocation-countryCode" id="label-IpAddressLocation-countryCode">Country Code</label>
                                <input type="text" id="IpAddressLocation-countryCode" formControlName="countryCode" placeholder="Enter Country Code" class="form-control ip-address-location-input" [disabled]="!userIsSecurityIpAddressLocationWriter()" aria-labelledby="label-countryCode" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('countryName')">
                                <label for="IpAddressLocation-countryName" id="label-IpAddressLocation-countryName">Country Name</label>
                                <input type="text" id="IpAddressLocation-countryName" formControlName="countryName" placeholder="Enter Country Name" class="form-control ip-address-location-input" [disabled]="!userIsSecurityIpAddressLocationWriter()" aria-labelledby="label-countryName" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('city')">
                                <label for="IpAddressLocation-city" id="label-IpAddressLocation-city">City</label>
                                <input type="text" id="IpAddressLocation-city" formControlName="city" placeholder="Enter City" class="form-control ip-address-location-input" [disabled]="!userIsSecurityIpAddressLocationWriter()" aria-labelledby="label-city" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('latitude')">
                                <label for="IpAddressLocation-latitude" id="label-IpAddressLocation-latitude">Latitude</label>
                                <input type="number" id="IpAddressLocation-latitude" formControlName="latitude" placeholder="Enter Latitude" class="form-control ip-address-location-input" [disabled]="!userIsSecurityIpAddressLocationWriter()" aria-labelledby="label-latitude" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('longitude')">
                                <label for="IpAddressLocation-longitude" id="label-IpAddressLocation-longitude">Longitude</label>
                                <input type="number" id="IpAddressLocation-longitude" formControlName="longitude" placeholder="Enter Longitude" class="form-control ip-address-location-input" [disabled]="!userIsSecurityIpAddressLocationWriter()" aria-labelledby="label-longitude" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('lastLookupDate')">
                                <label for="IpAddressLocation-lastLookupDate" id="label-IpAddressLocation-lastLookupDate"><span class="text-danger">*</span>Last Lookup Date</label>
                                <input type="datetime-local" id="IpAddressLocation-lastLookupDate" formControlName="lastLookupDate" placeholder="Enter Last Lookup Date" class="form-control ip-address-location-input" [disabled]="!userIsSecurityIpAddressLocationWriter()" aria-labelledby="label-lastLookupDate" />
                                <div *ngIf="ipAddressLocationForm.get('lastLookupDate')?.invalid && ipAddressLocationForm.get('lastLookupDate')?.touched" class="text-danger">
                                    Last Lookup Date is required
                                </div>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="IpAddressLocation-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecurityIpAddressLocationWriter()" />
                                <label for="IpAddressLocation-active" class="form-check-label" id="label-IpAddressLocation-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="IpAddressLocation-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecurityIpAddressLocationWriter()" />
                                <label for="IpAddressLocation-deleted" class="form-check-label" id="label-IpAddressLocation-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="ip-address-location-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="ipAddressLocationForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Ip Address Location">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !ipAddressLocationForm.valid || !ipAddressLocationForm.dirty || ipAddressLocationForm.pristine  || userIsSecurityIpAddressLocationWriter() == false " ngbTooltip="Save the Ip Address Location changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Ip Address Location' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSecurityIpAddressLocationReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 ip-address-location-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="loginAttemptService.userIsSecurityLoginAttemptReader()">
                            <button ngbNavLink>Login Attempts
                                <span class="badge bg-primary ms-2">
                                    {{ (ipAddressLocationData?.LoginAttemptsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-login-attempt-table [queryParams]="{ ipAddressLocationId: ipAddressLocationData?.id }" [showAddButton]="true" [preSeededData]="{ ipAddressLocationId: ipAddressLocationData?.id }" [hiddenFields]="['ipAddressLocationId']"></app-login-attempt-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
