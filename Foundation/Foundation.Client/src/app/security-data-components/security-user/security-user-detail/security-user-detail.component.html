<div class="container-fluid p-1 m-0 security-user-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="security-user-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Security User</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Security User' : 'Add Security User'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsSecuritySecurityUserReader()">
                <div class="col m-2 security-user-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="securityUserForm" (ngSubmit)="submitForm()" class="security-user-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('accountName')">
                                <label for="SecurityUser-accountName" id="label-SecurityUser-accountName"><span class="text-danger">*</span>Account Name</label>
                                <input type="text" id="SecurityUser-accountName" formControlName="accountName" placeholder="Enter Account Name" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-accountName" />
                                <div *ngIf="securityUserForm.get('accountName')?.invalid && securityUserForm.get('accountName')?.touched" class="text-danger">
                                    Account Name is required
                                </div>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('activeDirectoryAccount')">
                                <input type="checkbox" id="SecurityUser-activeDirectoryAccount" formControlName="activeDirectoryAccount" class="form-check-input" [disabled]="!userIsSecuritySecurityUserWriter()" />
                                <label for="SecurityUser-activeDirectoryAccount" class="form-check-label" id="label-SecurityUser-activeDirectoryAccount"><span class="text-danger">*</span>Active Directory Account</label>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('canLogin')">
                                <input type="checkbox" id="SecurityUser-canLogin" formControlName="canLogin" class="form-check-input" [disabled]="!userIsSecuritySecurityUserWriter()" />
                                <label for="SecurityUser-canLogin" class="form-check-label" id="label-SecurityUser-canLogin"><span class="text-danger">*</span>Can Login</label>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('mustChangePassword')">
                                <input type="checkbox" id="SecurityUser-mustChangePassword" formControlName="mustChangePassword" class="form-check-input" [disabled]="!userIsSecuritySecurityUserWriter()" />
                                <label for="SecurityUser-mustChangePassword" class="form-check-label" id="label-SecurityUser-mustChangePassword"><span class="text-danger">*</span>Must Change Password</label>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('firstName')">
                                <label for="SecurityUser-firstName" id="label-SecurityUser-firstName">First Name</label>
                                <input type="text" id="SecurityUser-firstName" formControlName="firstName" placeholder="Enter First Name" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-firstName" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('middleName')">
                                <label for="SecurityUser-middleName" id="label-SecurityUser-middleName">Middle Name</label>
                                <input type="text" id="SecurityUser-middleName" formControlName="middleName" placeholder="Enter Middle Name" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-middleName" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('lastName')">
                                <label for="SecurityUser-lastName" id="label-SecurityUser-lastName">Last Name</label>
                                <input type="text" id="SecurityUser-lastName" formControlName="lastName" placeholder="Enter Last Name" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-lastName" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('dateOfBirth')">
                                <label for="SecurityUser-dateOfBirth" id="label-SecurityUser-dateOfBirth">Date Of Birth</label>
                                <input type="datetime-local" id="SecurityUser-dateOfBirth" formControlName="dateOfBirth" placeholder="Enter Date Of Birth" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-dateOfBirth" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('emailAddress')">
<label for="SecurityUser-emailAddress" id="label-SecurityUser-emailAddress"><a href="mailto:{{securityUserData?.emailAddress}}" ngbTooltip="Send Email to {{securityUserData?.emailAddress}}">Email Address</a></label>
                                <input type="text" id="SecurityUser-emailAddress" formControlName="emailAddress" placeholder="Enter Email Address" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-emailAddress" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('cellPhoneNumber')">
                                <label for="SecurityUser-cellPhoneNumber" id="label-SecurityUser-cellPhoneNumber"><a href="tel:{{securityUserData?.cellPhoneNumber}}" ngbTooltip="Phone {{securityUserData?.cellPhoneNumber}}">Cell Phone Number</a></label>
                                <input type="text" id="SecurityUser-cellPhoneNumber" formControlName="cellPhoneNumber" placeholder="Enter Cell Phone Number" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-cellPhoneNumber" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('phoneNumber')">
                                <label for="SecurityUser-phoneNumber" id="label-SecurityUser-phoneNumber"><a href="tel:{{securityUserData?.phoneNumber}}" ngbTooltip="Phone {{securityUserData?.phoneNumber}}">Phone Number</a></label>
                                <input type="text" id="SecurityUser-phoneNumber" formControlName="phoneNumber" placeholder="Enter Phone Number" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-phoneNumber" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('phoneExtension')">
                                <label for="SecurityUser-phoneExtension" id="label-SecurityUser-phoneExtension"><a href="tel:{{securityUserData?.phoneExtension}}" ngbTooltip="Phone {{securityUserData?.phoneExtension}}">Phone Extension</a></label>
                                <input type="text" id="SecurityUser-phoneExtension" formControlName="phoneExtension" placeholder="Enter Phone Extension" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-phoneExtension" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('description')">
                                <label for="SecurityUser-description" id="label-SecurityUser-description">Description</label>
                                <textarea id="SecurityUser-description" formControlName="description" placeholder="Enter Description" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('securityUserTitleId')">
                                <label for="SecurityUser-securityUserTitleId" id="label-SecurityUser-securityUserTitleId">Security User Title</label>
                                <select id="SecurityUser-securityUserTitleId" formControlName="securityUserTitleId" class="form-select security-user-select" [disabled]="!userIsSecuritySecurityUserWriter()">
                                    <option [ngValue]="null">Select Security User Title</option>
                                    <option *ngFor="let securityUserTitle of securityUserTitles$ | async" [ngValue]="securityUserTitle.id">{{securityUserTitle.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('reportsToSecurityUserId')">
                                <label for="SecurityUser-reportsToSecurityUserId" id="label-SecurityUser-reportsToSecurityUserId">Reports To Security User</label>
                                <select id="SecurityUser-reportsToSecurityUserId" formControlName="reportsToSecurityUserId" class="form-select security-user-select" [disabled]="!userIsSecuritySecurityUserWriter()">
                                    <option [ngValue]="null">Select Security User</option>
                                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('authenticationDomain')">
                                <label for="SecurityUser-authenticationDomain" id="label-SecurityUser-authenticationDomain">Authentication Domain</label>
                                <input type="text" id="SecurityUser-authenticationDomain" formControlName="authenticationDomain" placeholder="Enter Authentication Domain" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-authenticationDomain" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('failedLoginCount')">
                                <label for="SecurityUser-failedLoginCount" id="label-SecurityUser-failedLoginCount">Failed Login Count</label>
                                <input type="number" id="SecurityUser-failedLoginCount" formControlName="failedLoginCount" placeholder="Enter Failed Login Count" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-failedLoginCount" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('lastLoginAttempt')">
                                <label for="SecurityUser-lastLoginAttempt" id="label-SecurityUser-lastLoginAttempt">Last Login Attempt</label>
                                <input type="datetime-local" id="SecurityUser-lastLoginAttempt" formControlName="lastLoginAttempt" placeholder="Enter Last Login Attempt" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-lastLoginAttempt" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('mostRecentActivity')">
                                <label for="SecurityUser-mostRecentActivity" id="label-SecurityUser-mostRecentActivity">Most Recent Activity</label>
                                <input type="datetime-local" id="SecurityUser-mostRecentActivity" formControlName="mostRecentActivity" placeholder="Enter Most Recent Activity" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-mostRecentActivity" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('alternateIdentifier')">
                                <label for="SecurityUser-alternateIdentifier" id="label-SecurityUser-alternateIdentifier">Alternate Identifier</label>
                                <input type="text" id="SecurityUser-alternateIdentifier" formControlName="alternateIdentifier" placeholder="Enter Alternate Identifier" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-alternateIdentifier" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('image')">
                                <label for="SecurityUser-image" id="label-SecurityUser-image">Image</label>
                                <input type="text" id="SecurityUser-image" formControlName="image" placeholder="Enter Image" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-image" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('settings')">
                                <label for="SecurityUser-settings" id="label-SecurityUser-settings">Settings</label>
                                <textarea id="SecurityUser-settings" formControlName="settings" placeholder="Enter Settings" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('securityTenantId')">
                                <label for="SecurityUser-securityTenantId" id="label-SecurityUser-securityTenantId">Security Tenant</label>
                                <select id="SecurityUser-securityTenantId" formControlName="securityTenantId" class="form-select security-user-select" [disabled]="!userIsSecuritySecurityUserWriter()">
                                    <option [ngValue]="null">Select Security Tenant</option>
                                    <option *ngFor="let securityTenant of securityTenants$ | async" [ngValue]="securityTenant.id">{{securityTenant.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('readPermissionLevel')">
                                <label for="SecurityUser-readPermissionLevel" id="label-SecurityUser-readPermissionLevel"><span class="text-danger">*</span>Read Permission Level</label>
                                <input type="number" id="SecurityUser-readPermissionLevel" formControlName="readPermissionLevel" placeholder="Enter Read Permission Level" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-readPermissionLevel" />
                                <div *ngIf="securityUserForm.get('readPermissionLevel')?.invalid && securityUserForm.get('readPermissionLevel')?.touched" class="text-danger">
                                    Read Permission Level is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('writePermissionLevel')">
                                <label for="SecurityUser-writePermissionLevel" id="label-SecurityUser-writePermissionLevel"><span class="text-danger">*</span>Write Permission Level</label>
                                <input type="number" id="SecurityUser-writePermissionLevel" formControlName="writePermissionLevel" placeholder="Enter Write Permission Level" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-writePermissionLevel" />
                                <div *ngIf="securityUserForm.get('writePermissionLevel')?.invalid && securityUserForm.get('writePermissionLevel')?.touched" class="text-danger">
                                    Write Permission Level is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('securityOrganizationId')">
                                <label for="SecurityUser-securityOrganizationId" id="label-SecurityUser-securityOrganizationId">Security Organization</label>
                                <select id="SecurityUser-securityOrganizationId" formControlName="securityOrganizationId" class="form-select security-user-select" [disabled]="!userIsSecuritySecurityUserWriter()">
                                    <option [ngValue]="null">Select Security Organization</option>
                                    <option *ngFor="let securityOrganization of securityOrganizations$ | async" [ngValue]="securityOrganization.id">{{securityOrganization.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('securityDepartmentId')">
                                <label for="SecurityUser-securityDepartmentId" id="label-SecurityUser-securityDepartmentId">Security Department</label>
                                <select id="SecurityUser-securityDepartmentId" formControlName="securityDepartmentId" class="form-select security-user-select" [disabled]="!userIsSecuritySecurityUserWriter()">
                                    <option [ngValue]="null">Select Security Department</option>
                                    <option *ngFor="let securityDepartment of securityDepartments$ | async" [ngValue]="securityDepartment.id">{{securityDepartment.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('securityTeamId')">
                                <label for="SecurityUser-securityTeamId" id="label-SecurityUser-securityTeamId">Security Team</label>
                                <select id="SecurityUser-securityTeamId" formControlName="securityTeamId" class="form-select security-user-select" [disabled]="!userIsSecuritySecurityUserWriter()">
                                    <option [ngValue]="null">Select Security Team</option>
                                    <option *ngFor="let securityTeam of securityTeams$ | async" [ngValue]="securityTeam.id">{{securityTeam.name}}</option>
                                </select>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('authenticationToken')">
                                <label for="SecurityUser-authenticationToken" id="label-SecurityUser-authenticationToken">Authentication Token</label>
                                <input type="text" id="SecurityUser-authenticationToken" formControlName="authenticationToken" placeholder="Enter Authentication Token" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-authenticationToken" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('authenticationTokenExpiry')">
                                <label for="SecurityUser-authenticationTokenExpiry" id="label-SecurityUser-authenticationTokenExpiry">Authentication Token Expiry</label>
                                <input type="datetime-local" id="SecurityUser-authenticationTokenExpiry" formControlName="authenticationTokenExpiry" placeholder="Enter Authentication Token Expiry" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-authenticationTokenExpiry" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('twoFactorToken')">
                                <label for="SecurityUser-twoFactorToken" id="label-SecurityUser-twoFactorToken">Two Factor Token</label>
                                <input type="text" id="SecurityUser-twoFactorToken" formControlName="twoFactorToken" placeholder="Enter Two Factor Token" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-twoFactorToken" />
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('twoFactorTokenExpiry')">
                                <label for="SecurityUser-twoFactorTokenExpiry" id="label-SecurityUser-twoFactorTokenExpiry">Two Factor Token Expiry</label>
                                <input type="datetime-local" id="SecurityUser-twoFactorTokenExpiry" formControlName="twoFactorTokenExpiry" placeholder="Enter Two Factor Token Expiry" class="form-control security-user-input" [disabled]="!userIsSecuritySecurityUserWriter()" aria-labelledby="label-twoFactorTokenExpiry" />
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('twoFactorSendByEmail')">
                                <input type="checkbox" id="SecurityUser-twoFactorSendByEmail" formControlName="twoFactorSendByEmail" class="form-check-input" [disabled]="!userIsSecuritySecurityUserWriter()" />
                                <label for="SecurityUser-twoFactorSendByEmail" class="form-check-label" id="label-SecurityUser-twoFactorSendByEmail">Two Factor Send By Email</label>
                            </div>
                            <div class="form-check my-2" *ngIf="!isFieldHidden('twoFactorSendBySMS')">
                                <input type="checkbox" id="SecurityUser-twoFactorSendBySMS" formControlName="twoFactorSendBySMS" class="form-check-input" [disabled]="!userIsSecuritySecurityUserWriter()" />
                                <label for="SecurityUser-twoFactorSendBySMS" class="form-check-label" id="label-SecurityUser-twoFactorSendBySMS">Two Factor Send By S M S</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityUser-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityUserWriter()" />
                                <label for="SecurityUser-active" class="form-check-label" id="label-SecurityUser-active"><span class="text-danger">*</span>Active</label>
                            </div>
                            <div class="form-check my-2"*ngIf="!isFieldHidden('{fc.camelCaseName}')" )>
                                <input type="checkbox" id="SecurityUser-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityUserWriter()" />
                                <label for="SecurityUser-deleted" class="form-check-label" id="label-SecurityUser-deleted"><span class="text-danger">*</span>Deleted</label>
                            </div>
                            <div class="security-user-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="securityUserForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Security User">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityUserForm.valid || !securityUserForm.dirty || securityUserForm.pristine  || userIsSecuritySecurityUserWriter() == false " ngbTooltip="Save the Security User changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Security User' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsSecuritySecurityUserReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 security-user-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="securityTenantUserService.userIsSecuritySecurityTenantUserReader()">
                            <button ngbNavLink>Security Tenant Users
                                <span class="badge bg-primary ms-2">
                                    {{ (securityUserData?.SecurityTenantUsersCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-tenant-user-table [queryParams]="{ securityUserId: securityUserData?.id }"></app-security-tenant-user-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-security-tenant-user-add-edit [preSeededData]="{ securityUserId: securityUserData?.id }" [hiddenFields]="['securityUserId']"></app-security-tenant-user-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityOrganizationUserService.userIsSecuritySecurityOrganizationUserReader()">
                            <button ngbNavLink>Security Organization Users
                                <span class="badge bg-primary ms-2">
                                    {{ (securityUserData?.SecurityOrganizationUsersCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-organization-user-table [queryParams]="{ securityUserId: securityUserData?.id }"></app-security-organization-user-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-security-organization-user-add-edit [preSeededData]="{ securityUserId: securityUserData?.id }" [hiddenFields]="['securityUserId']"></app-security-organization-user-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityDepartmentUserService.userIsSecuritySecurityDepartmentUserReader()">
                            <button ngbNavLink>Security Department Users
                                <span class="badge bg-primary ms-2">
                                    {{ (securityUserData?.SecurityDepartmentUsersCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-department-user-table [queryParams]="{ securityUserId: securityUserData?.id }"></app-security-department-user-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-security-department-user-add-edit [preSeededData]="{ securityUserId: securityUserData?.id }" [hiddenFields]="['securityUserId']"></app-security-department-user-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityTeamUserService.userIsSecuritySecurityTeamUserReader()">
                            <button ngbNavLink>Security Team Users
                                <span class="badge bg-primary ms-2">
                                    {{ (securityUserData?.SecurityTeamUsersCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-team-user-table [queryParams]="{ securityUserId: securityUserData?.id }"></app-security-team-user-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-security-team-user-add-edit [preSeededData]="{ securityUserId: securityUserData?.id }" [hiddenFields]="['securityUserId']"></app-security-team-user-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityUserEventService.userIsSecuritySecurityUserEventReader()">
                            <button ngbNavLink>Security User Events
                                <span class="badge bg-primary ms-2">
                                    {{ (securityUserData?.SecurityUserEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-user-event-table [queryParams]="{ securityUserId: securityUserData?.id }"></app-security-user-event-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-security-user-event-add-edit [preSeededData]="{ securityUserId: securityUserData?.id }" [hiddenFields]="['securityUserId']"></app-security-user-event-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityUserPasswordResetTokenService.userIsSecuritySecurityUserPasswordResetTokenReader()">
                            <button ngbNavLink>Security User Password Reset Tokens
                                <span class="badge bg-primary ms-2">
                                    {{ (securityUserData?.SecurityUserPasswordResetTokensCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-user-password-reset-token-table [queryParams]="{ securityUserId: securityUserData?.id }"></app-security-user-password-reset-token-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-security-user-password-reset-token-add-edit [preSeededData]="{ securityUserId: securityUserData?.id }" [hiddenFields]="['securityUserId']"></app-security-user-password-reset-token-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="securityUserSecurityGroupService.userIsSecuritySecurityUserSecurityGroupReader()">
                            <button ngbNavLink>Security User Security Groups
                                <span class="badge bg-primary ms-2">
                                    {{ (securityUserData?.SecurityUserSecurityGroupsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-security-user-security-group-table [queryParams]="{ securityUserId: securityUserData?.id }"></app-security-user-security-group-table>
                                </div>
                                <div class="d-flex justify-content-end">
