<div class="add-system-setting" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-system-setting me-2"
        (click)="openModal()"
        ngbTooltip="Add System Setting" 
        *ngIf="userIsSecuritySystemSettingWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #systemSettingModal let-modal>
   <div class="modal-header system-setting-modal-header">
      <h5 class="modal-title mb-0" id="systemSettingModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit System Setting' : 'Add System Setting' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body system-setting-modal-body">
      <form [formGroup]="systemSettingForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="SystemSetting-name" id="label-SystemSetting-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="SystemSetting-name" formControlName="name" placeholder="Enter Name" class="form-control system-setting-input" [disabled]="!userIsSecuritySystemSettingWriter()" aria-labelledby="label-name" />
                <div *ngIf="systemSettingForm.get('name')?.invalid && systemSettingForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="SystemSetting-description" id="label-SystemSetting-description">Description</label>
                <textarea id="SystemSetting-description" formControlName="description" placeholder="Enter Description" class="form-control system-setting-input" [disabled]="!userIsSecuritySystemSettingWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('value')">
                <label for="SystemSetting-value" id="label-SystemSetting-value">Value</label>
                <textarea id="SystemSetting-value" formControlName="value" placeholder="Enter Value" class="form-control system-setting-input" [disabled]="!userIsSecuritySystemSettingWriter()"></textarea>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="SystemSetting-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySystemSettingWriter()" />
                <label for="SystemSetting-active" class="form-check-label" id="label-SystemSetting-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="SystemSetting-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySystemSettingWriter()" />
                <label for="SystemSetting-deleted" class="form-check-label" id="label-SystemSetting-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer system-setting-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the System Setting changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !systemSettingForm.valid || systemSettingForm.pristine  || userIsSecuritySystemSettingWriter() == false " ngbTooltip="Save the System Setting changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add System Setting' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
