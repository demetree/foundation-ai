<div class="add-security-organization-user" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-security-organization-user me-2"
        (click)="openModal()"
        ngbTooltip="Add Security Organization User" 
        *ngIf="userIsSecuritySecurityOrganizationUserWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #securityOrganizationUserModal let-modal>
   <div class="modal-header bg-dark text-light security-organization-user-modal-header">
      <h5 class="modal-title mb-0" id="securityOrganizationUserModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Security Organization User' : 'Add Security Organization User' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body security-organization-user-modal-body">
      <form [formGroup]="securityOrganizationUserForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('securityOrganizationId')">
                <label for="SecurityOrganizationUser-securityOrganizationId" id="label-SecurityOrganizationUser-securityOrganizationId"><span class="text-danger">*</span>Security Organization</label>
                <select id="SecurityOrganizationUser-securityOrganizationId" formControlName="securityOrganizationId" class="form-select security-organization-user-select" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()">
                    <option [ngValue]="null">Select Security Organization</option>
                    <option *ngFor="let securityOrganization of securityOrganizations$ | async" [ngValue]="securityOrganization.id">{{securityOrganization.name}}</option>
                </select>
                <div *ngIf="securityOrganizationUserForm.get('securityOrganizationId')?.invalid && securityOrganizationUserForm.get('securityOrganizationId')?.touched" class="text-danger">
                    Security Organization is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('securityUserId')">
                <label for="SecurityOrganizationUser-securityUserId" id="label-SecurityOrganizationUser-securityUserId"><span class="text-danger">*</span>Security User</label>
                <select id="SecurityOrganizationUser-securityUserId" formControlName="securityUserId" class="form-select security-organization-user-select" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()">
                    <option [ngValue]="null">Select Security User</option>
                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                </select>
                <div *ngIf="securityOrganizationUserForm.get('securityUserId')?.invalid && securityOrganizationUserForm.get('securityUserId')?.touched" class="text-danger">
                    Security User is required
                </div>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('canRead')">
                <input type="checkbox" id="SecurityOrganizationUser-canRead" formControlName="canRead" class="form-check-input" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()" />
                <label for="SecurityOrganizationUser-canRead" class="form-check-label" id="label-SecurityOrganizationUser-canRead"><span class="text-danger">*</span>Can Read</label>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('canWrite')">
                <input type="checkbox" id="SecurityOrganizationUser-canWrite" formControlName="canWrite" class="form-check-input" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()" />
                <label for="SecurityOrganizationUser-canWrite" class="form-check-label" id="label-SecurityOrganizationUser-canWrite"><span class="text-danger">*</span>Can Write</label>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('canChangeHierarchy')">
                <input type="checkbox" id="SecurityOrganizationUser-canChangeHierarchy" formControlName="canChangeHierarchy" class="form-check-input" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()" />
                <label for="SecurityOrganizationUser-canChangeHierarchy" class="form-check-label" id="label-SecurityOrganizationUser-canChangeHierarchy"><span class="text-danger">*</span>Can Change Hierarchy</label>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('canChangeOwner')">
                <input type="checkbox" id="SecurityOrganizationUser-canChangeOwner" formControlName="canChangeOwner" class="form-check-input" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()" />
                <label for="SecurityOrganizationUser-canChangeOwner" class="form-check-label" id="label-SecurityOrganizationUser-canChangeOwner"><span class="text-danger">*</span>Can Change Owner</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="SecurityOrganizationUser-active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()" />
                <label for="SecurityOrganizationUser-active" class="form-check-label" id="label-SecurityOrganizationUser-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode && !isFieldHidden('{fc.camelCaseName}')" )>
                <input type="checkbox" id="SecurityOrganizationUser-deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()" />
                <label for="SecurityOrganizationUser-deleted" class="form-check-label" id="label-SecurityOrganizationUser-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer security-organization-user-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Security Organization User changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityOrganizationUserForm.valid || securityOrganizationUserForm.pristine  || userIsSecuritySecurityOrganizationUserWriter() == false " ngbTooltip="Save the Security Organization User changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Security Organization User' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
