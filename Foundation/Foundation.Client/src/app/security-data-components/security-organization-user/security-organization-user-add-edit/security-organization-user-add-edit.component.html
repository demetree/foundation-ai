<div class="add-security-organization-user" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-security-organization-user me-2"
        (click)="openModal()"
        ngbTooltip="Add Security Organization User" 
        *ngIf="userIsSecuritySecurityOrganizationUserWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #securityOrganizationUserModal let-modal>
   <div class="modal-header bg-dark text-light security-organization-user-modal-header">
      <h5 class="modal-title mb-0" id="securityOrganizationUserModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Security Organization User' : 'Add Security Organization User' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body security-organization-user-modal-body">
      <form [formGroup]="securityOrganizationUserForm" (ngSubmit)="submitForm()">
            <div class="form-group">
                <label for="securityOrganizationId" id="label-securityOrganizationId"><span class="text-danger">*</span>Security Organization</label>
                <select id="securityOrganizationId" formControlName="securityOrganizationId" class="form-select security-organization-user-select" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()">
                    <option [ngValue]="null">Select Security Organization</option>
                    <option *ngFor="let securityOrganization of securityOrganizations$ | async" [ngValue]="securityOrganization.id">{{securityOrganization.name}}</option>
                </select>
                <div *ngIf="securityOrganizationUserForm.get('securityOrganizationId')?.invalid && securityOrganizationUserForm.get('securityOrganizationId')?.touched" class="text-danger">
                    Security Organization is required
                </div>
            </div>
            <div class="form-group">
                <label for="securityUserId" id="label-securityUserId"><span class="text-danger">*</span>Security User</label>
                <select id="securityUserId" formControlName="securityUserId" class="form-select security-organization-user-select" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()">
                    <option [ngValue]="null">Select Security User</option>
                    <option *ngFor="let securityUser of securityUsers$ | async" [ngValue]="securityUser.id">{{[securityUser.accountName] | filterAndJoin}}</option>
                </select>
                <div *ngIf="securityOrganizationUserForm.get('securityUserId')?.invalid && securityOrganizationUserForm.get('securityUserId')?.touched" class="text-danger">
                    Security User is required
                </div>
            </div>
            <div class="form-check my-2">
                <input type="checkbox" id="canRead" formControlName="canRead" class="form-check-input" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()" />
                <label for="canRead" class="form-check-label" id="label-canRead"><span class="text-danger">*</span>Can Read</label>
            </div>
            <div class="form-check my-2">
                <input type="checkbox" id="canWrite" formControlName="canWrite" class="form-check-input" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()" />
                <label for="canWrite" class="form-check-label" id="label-canWrite"><span class="text-danger">*</span>Can Write</label>
            </div>
            <div class="form-check my-2">
                <input type="checkbox" id="canChangeHierarchy" formControlName="canChangeHierarchy" class="form-check-input" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()" />
                <label for="canChangeHierarchy" class="form-check-label" id="label-canChangeHierarchy"><span class="text-danger">*</span>Can Change Hierarchy</label>
            </div>
            <div class="form-check my-2">
                <input type="checkbox" id="canChangeOwner" formControlName="canChangeOwner" class="form-check-input" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()" />
                <label for="canChangeOwner" class="form-check-label" id="label-canChangeOwner"><span class="text-danger">*</span>Can Change Owner</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="active" formControlName="active" class="form-check-input" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()" />
                <label for="active" class="form-check-label" id="label-active"><span class="text-danger">*</span>Active</label>
            </div>
            <div class="form-check my-2" *ngIf="isEditMode">
                <input type="checkbox" id="deleted" formControlName="deleted" class="form-check-input" [disabled]="!userIsSecuritySecurityOrganizationUserWriter()" />
                <label for="deleted" class="form-check-label" id="label-deleted"><span class="text-danger">*</span>Deleted</label>
            </div>
         <div class="modal-footer security-organization-user-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Security Organization User changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !securityOrganizationUserForm.valid || securityOrganizationUserForm.pristine || !userIsSecuritySecurityOrganizationUserWriter()" ngbTooltip="Save the Security Organization User changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
