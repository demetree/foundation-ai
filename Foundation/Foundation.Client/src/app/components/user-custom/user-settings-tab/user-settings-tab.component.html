<!-- User Settings Tab - Read-Only View -->
<div class="settings-tab-container">

    <!-- Header -->
    <div class="settings-header">
        <div class="header-info">
            <h5 class="mb-0">
                <i class="fa-solid fa-sliders me-2"></i>User Settings
            </h5>
            <small class="text-muted">Custom key-value settings stored for this user</small>
        </div>
        <span class="badge bg-secondary">
            <i class="fa-solid fa-eye me-1"></i>Read-Only
        </span>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="loading-state">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-muted mt-2 mb-0">Loading settings...</p>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && settings.length === 0" class="empty-state">
        <i class="fa-solid fa-cog fa-3x text-muted opacity-50 mb-3"></i>
        <h6 class="text-muted">No Settings Configured</h6>
        <p class="text-muted small mb-0">This user has no custom settings.</p>
    </div>

    <!-- Settings Table -->
    <div *ngIf="!isLoading && settings.length > 0" class="settings-table-wrapper">
        <table class="table settings-table">
            <thead>
                <tr>
                    <th style="width: 35%;">Key</th>
                    <th style="width: 65%;">Value</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let setting of settings">
                    <td class="key-cell">
                        <code class="setting-key">{{ setting.key }}</code>
                    </td>
                    <td class="value-cell">
                        <span class="setting-value" [ngbTooltip]="setting.value.length > 50 ? setting.value : null">
                            {{ truncateValue(setting.value) }}
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
