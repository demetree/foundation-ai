<div class="page-container">
    <div class="card mb-3 header-card premium-header shadow-lg border-0">
        <div
            class="card-header d-flex flex-wrap justify-content-between align-items-center gap-3 border-0 bg-transparent">
            <div class="header-left">
                <!-- Back Button -->
                <button class="btn btn-sm btn-glass back-button me-2" (click)="goBack()" ngbTooltip="Go Back"
                    *ngIf="canGoBack()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <!-- Title -->
                <div class="text-white">
                    <h3 class="page-title mb-0 fw-bold text-shadow">Users</h3>
                    <small class="text-white-50">Manage system users and access</small>
                </div>
            </div>

            <div class="header-right">

                <span class="badge badge-glass mx-2" *ngIf="loadingTotalCount || loadingFilteredCount">
                    <i class="fa fa-spinner fa-spin me-1"></i> Loading...
                </span>

                <span *ngIf="!(loadingTotalCount || loadingFilteredCount)">
                    <ng-container *ngIf="totalUserCount$ | async as total; else loading">
                        <span class="badge badge-glass mx-2">

                            <!-- Filtered: some results -->
                            <ng-container *ngIf="filteredUserCount$ | async as filteredCount">
                                <span *ngIf="filterText && (filteredCount ?? 0) > 0">
                                    {{ filteredCount }} of {{ total }} {{ total !== 1 ? 'Users' : 'User' }}
                                </span>
                            </ng-container>
                            <!-- Filtered: 0 results -->
                            <span *ngIf="total > 0 && filterText && (filteredUserCount$ | async) === 0">
                                No matching Users
                            </span>
                            <!-- No filter: normal count -->
                            <span *ngIf="!filterText">
                                {{ total }} {{ total !== 1 ? 'Users' : 'User' }}
                            </span>
                            <!-- No Users at all (even unfiltered) -->
                            <span *ngIf="total === 0">
                                No Users
                            </span>

                        </span>
                    </ng-container>

                    <!-- when observable is falsy, then decide whether to show a spinner or a loading spinner.. -->
                    <ng-template #loading>
                        <span class="badge badge-glass mx-2" *ngIf="(loadingTotalCount || loadingFilteredCount)">
                            <i class="fa fa-spinner fa-spin me-1"></i> Loading...
                        </span>
                        <span class="badge badge-glass mx-2" *ngIf="!(loadingTotalCount || loadingFilteredCount)">
                            No Users
                        </span>
                    </ng-template>

                </span>


                <!-- Quick Search Input -->
                <div class="search-bar me-2 position-relative">
                    <i class="fa fa-search search-icon text-white-50"></i>
                    <input type="text" class="form-control search-input glass-input" placeholder="Search users..."
                        [(ngModel)]="filterText" (ngModelChange)="onFilterChange()">
                    <button *ngIf="filterText" class="clear-search btn text-white"
                        (click)="filterText=''; onFilterChange()" title="Clear Search">
                        <i class="fa fa-times"></i>
                    </button>
                </div>

                <!-- Add User Button -->
                <button class="btn btn-glass btn-add" (click)="addUser()" *ngIf="userIsSecurityUserWriter()">
                    <i class="fa-solid fa-plus me-1"></i>
                    <span class="d-none d-md-inline">Add User</span>
                </button>
            </div>
        </div>
    </div>

    <!-- User Add/Edit Component -->
    <app-user-custom-add-edit #userAddEdit (userChanged)="onUserChanged($event)"></app-user-custom-add-edit>

    <app-user-custom-table *ngIf="userIsSecurityUserReader() == true" [filterText]="filterText"
        [isSmallScreen]="isSmallScreen">
    </app-user-custom-table>
</div>
