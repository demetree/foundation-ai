<!-- User Image Upload Modal -->
<!-- Drag-drop or file picker for profile image -->

<div class="modal-header premium-header">
    <h5 class="modal-title text-white">
        <i class="fa-solid fa-camera me-2"></i>Profile Image
    </h5>
    <button type="button" class="btn-close btn-close-white" (click)="cancel()"></button>
</div>

<div class="modal-body">
    <!-- User Info -->
    <div class="user-info mb-3" *ngIf="user">
        <span class="text-muted">Updating image for:</span>
        <strong class="ms-2">{{ user.firstName }} {{ user.lastName }}</strong>
    </div>

    <!-- Drop Zone -->
    <div class="drop-zone" [class.drag-over]="dragOver" [class.has-preview]="previewUrl" (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)" (drop)="onDrop($event)" (click)="selectFile()">

        <!-- Preview -->
        <div *ngIf="previewUrl" class="preview-container">
            <img [src]="previewUrl" class="preview-image" alt="Preview">
            <button class="btn btn-sm btn-danger clear-btn" (click)="clearPreview(); $event.stopPropagation()">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>

        <!-- Placeholder -->
        <div *ngIf="!previewUrl" class="placeholder">
            <i class="fa-solid fa-cloud-arrow-up fa-3x upload-icon mb-3"></i>
            <p class="mb-1">Drag and drop an image here</p>
            <small class="text-muted">or click to select a file</small>
            <small class="text-muted d-block mt-2">Maximum size: 5MB • JPG, PNG, GIF</small>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" #fileInput accept="image/*" (change)="onFileSelected($event)" style="display: none;">

    <!-- Remove existing image option -->
    <div *ngIf="hasExistingImage && !previewUrl" class="mt-3 text-center">
        <button class="btn btn-outline-danger" (click)="removeImage()" [disabled]="removing">
            <span *ngIf="removing">
                <span class="spinner-border spinner-border-sm me-1"></span>Removing...
            </span>
            <span *ngIf="!removing">
                <i class="fa-solid fa-trash me-1"></i>Remove Current Image
            </span>
        </button>
    </div>
</div>

<div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" (click)="cancel()" [disabled]="uploading || removing">
        Cancel
    </button>
    <button type="button" class="btn btn-primary" (click)="upload()" [disabled]="!canUpload()">
        <span *ngIf="uploading">
            <span class="spinner-border spinner-border-sm me-1"></span>Uploading...
        </span>
        <span *ngIf="!uploading">
            <i class="fa-solid fa-check me-1"></i>Save Image
        </span>
    </button>
</div>
