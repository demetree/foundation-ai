<div class="position-absolute top-50 start-50 translate-middle w-100" style="max-width: 420px;">
  <div class="login-container w-100">


    <!-- Login Card -->
    <div class="card text-bg-dark shadow border-0 rounded-3 overflow-hidden" *ngIf="!showForgotPassword">
      <div class="card-header d-flex align-items-center justify-content-between bg-dark border-bottom border-secondary px-4 py-3">
        <h5 class="mb-0"><i class="fa fa-lock me-2"></i> Login</h5>
        <button *ngIf="isModal" type="button" class="btn-close btn-close-white" aria-label="Close" (click)="closeModal()" tabindex="-1"></button>
      </div>
      <div class="card-body p-4">
        <form *ngIf="formResetToggle" class="login" name="loginForm" #f="ngForm" novalidate
              (ngSubmit)="f.form.valid ? login() :
                      (!username.valid && showErrorAlert('Username Required', 'Please enter a valid username'));
                      (!password.valid && showErrorAlert('Password Required', 'Please enter a valid password'))">
          <div class="mb-3">
            <label for="login-username" class="form-label fw-medium">Username</label>
            <input type="text" id="login-username" name="username" placeholder="Enter your username" autocomplete="username"
                   class="form-control bg-dark text-light border-secondary"
                   [ngClass]="{'is-valid': f.submitted && username.valid, 'is-invalid' : f.submitted && !username.valid}"
                   [(ngModel)]="userLogin.userName" #username="ngModel" required />
            <div class="invalid-feedback" *ngIf="f.submitted && !username.valid">
              Username is required
            </div>
          </div>

          <div class="mb-3">
            <label for="login-password" class="form-label fw-medium">Password</label>
            <input type="password" id="login-password" name="password" placeholder="Enter your password" autocomplete="current-password"
                   class="form-control bg-dark text-light border-secondary"
                   [ngClass]="{'is-valid': f.submitted && password.valid, 'is-invalid' : f.submitted && !password.valid}"
                   [(ngModel)]="userLogin.password" #password="ngModel" required />
            <div class="invalid-feedback" *ngIf="f.submitted && !password.valid">
              Password is required
            </div>
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input border-dark text-dark" id="login-rememberme" name="rememberMe" [(ngModel)]="userLogin.rememberMe">
            <label class="form-check-label" for="login-rememberme">Remember Me</label>
          </div>
          <div class="d-grid gap-2 mb-3">
            <button *ngIf="!isExternalLogin" type="submit" class="btn btn-secondary rounded-2 py-2 fw-medium" [disabled]="isLoading">
              <i *ngIf="isLoading" class="fa-solid fa-circle-notch fa-spin me-2"></i> {{isLoading ? 'Logging In...' : 'Login'}}
            </button>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-3">
            <button type="button" class="btn btn-link text-light p-0" (click)="showForgotPassword = true">
              Forgot Password?
            </button>
            <div class="d-flex gap-2">
              <!--<button class="btn btn-outline-light btn-sm btn-social shadow-sm" (click)="loginWithGoogle()" [disabled]="isLoading">
                <i class="fa-brands fa-google"></i>
              </button>
              <button class="btn btn-outline-light btn-sm btn-social shadow-sm" (click)="loginWithMicrosoft()" [disabled]="isLoading">
                <i class="fa-brands fa-windows"></i>
              </button>-->
            </div>
          </div>
          <!--<div *ngIf="!isModal" class="text-center mt-4">
            <hr class="hr-separator border-secondary">
            <span class="card-text">Don't have an account?</span>
            <div class="d-inline-block text-nowrap">-->
          <!--<a class="card-link text-link text-primary" routerLink="/register">Register</a> |
          <a class="card-link text-link text-primary" routerLink="/recoverpassword">Recover Password</a>-->
          <!--</div>
          </div>-->
        </form>
      </div>
    </div>

    <!-- Forgot Password Card -->
    <div class="card text-bg-dark shadow border-0 rounded-3 overflow-hidden" *ngIf="showForgotPassword">
      <div class="card-header d-flex align-items-center justify-content-between bg-dark border-bottom border-secondary px-4 py-3">
        <h5 class="mb-0"><i class="fa fa-key me-2"></i> Recover Password</h5>
        <button *ngIf="isModal" type="button" class="btn-close btn-close-white" aria-label="Close" (click)="closeModal()" tabindex="-1"></button>
      </div>
      <div class="card-body p-4">
        <form name="forgotPasswordForm" #fp="ngForm" novalidate (ngSubmit)="fp.form.valid ? recoverPassword() : showErrorAlert('Email Required', 'Please enter a valid email')">
          <div class="mb-3">
            <label for="forgot-email" class="form-label fw-medium">Email</label>
            <input type="email" id="forgot-email" name="email" placeholder="Enter Your Email Address" autocomplete="email"
                   class="form-control bg-dark text-light border-secondary"
                   [ngClass]="{'is-valid': fp.submitted && email.valid, 'is-invalid' : fp.submitted && !email.valid}"
                   [(ngModel)]="userEmail" #email="ngModel" required email />

            <div class="invalid-feedback" *ngIf="fp.submitted && !email.valid">
              Email is required
            </div>
          </div>
          <div class="d-flex justify-content-between align-items-center gap-3">
            <button type="button" class="btn btn-outline-secondary rounded-2 py-2 fw-medium" (click)="showForgotPassword = false">
              Cancel
            </button>

            <button type="submit"
                    class="btn btn-secondary rounded-2 py-2 fw-medium"
                    [disabled]="isLoading || fp?.form!.invalid"
                    [class.btn-disabled]="isLoading || fp?.form!.invalid">
              <i *ngIf="isLoading" class="fa-solid fa-circle-notch fa-spin me-2"></i> Reset Password
            </button>




          </div>

        </form>
      </div>
    </div>

  </div>
</div>
