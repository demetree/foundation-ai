<!-- Premium Module Listing Header -->
<div class="module-listing-container">

    <!-- Gradient Header -->
    <div class="listing-header">
        <div class="header-content">
            <div class="header-left">
                <button *ngIf="canGoBack()" class="btn btn-sm btn-glass back-btn" (click)="goBack()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="title-section">
                    <h1 class="page-title">
                        <i class="fa-solid fa-puzzle-piece me-2"></i>
                        Modules
                    </h1>
                    <p class="page-subtitle">System module configuration and security roles</p>
                </div>
            </div>
            <div class="header-right">
                <!-- Module Count Badge -->
                <div class="count-badge" *ngIf="!loadingTotalCount">
                    <span class="count-number">{{ filteredModuleCount$ | async }}</span>
                    <span class="count-label">
                        {{ (filteredModuleCount$ | async) === (totalModuleCount$ | async) ? 'Total' : 'Filtered' }}
                    </span>
                </div>
                <div class="count-badge loading" *ngIf="loadingTotalCount">
                    <span class="spinner-border spinner-border-sm"></span>
                </div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-section">
            <div class="search-container">
                <i class="fa-solid fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Search modules by name or description..."
                    [ngModel]="filterText" (ngModelChange)="onFilterChange($event)">
                <button *ngIf="filterText" class="clear-btn" (click)="clearFilter()">
                    <i class="fa-solid fa-times"></i>
                </button>
                <span *ngIf="loadingFilteredCount" class="search-spinner">
                    <span class="spinner-border spinner-border-sm"></span>
                </span>
            </div>
        </div>
    </div>

    <!-- Module Table -->
    <div class="table-section">
        <app-module-custom-table [filterText]="filterText" (countChange)="filteredModuleCount$.next($event)">
        </app-module-custom-table>
    </div>

</div>
