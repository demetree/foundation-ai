<!-- Sidebar (collapsible/overlay when expanded) -->
<div *ngIf="isUserLoggedIn" class="sidebar text-bg-dark no-select" [class.expanded]="isExpanded"
  [class.collapsed]="!isExpanded">

  <!-- Toggle button (tooltip only when collapsed) -->
  <button class="toggle-btn" type="button" (click)="tToggle.close(); toggle()" [attr.aria-expanded]="isExpanded"
    [ngbTooltip]="!isExpanded ? 'Expand' : null" triggers="hover" #tToggle="ngbTooltip" placement="right"
    tooltipClass="sidebar-tip" aria-label="Toggle sidebar">
    <i class="fa" [ngClass]="{ 'fa-angle-right': !isExpanded, 'fa-angle-left': isExpanded }"></i>
  </button>

  <ul class="nav nav-pills flex-column">

    <!-- Overview -->
    <li class="nav-item">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link text-white" [ngbTooltip]="!isExpanded ? 'Overview' : null" triggers="hover"
        #tOverview="ngbTooltip" (click)="tOverview.close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-house"></i>
        <span class="label px-2">Overview</span>
      </a>
    </li>

    <!-- Users -->
    <li class="nav-item">
      <a routerLink="/users" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Users' : null" triggers="hover" #tUsers="ngbTooltip" (click)="tUsers.close()"
        placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-users"></i>
        <span class="label px-2">Users</span>
      </a>
    </li>

    <!-- Audit Events -->
    <li class="nav-item">
      <a routerLink="/auditevents" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Audit Events' : null" triggers="hover" #tAudit="ngbTooltip"
        (click)="tAudit.close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-clipboard-list"></i>
        <span class="label px-2">Audit Events</span>
      </a>
    </li>

    <!-- System Logs -->
    <li class="nav-item">
      <a routerLink="/logs" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'System Logs' : null" triggers="hover" #tLogs="ngbTooltip" (click)="tLogs.close()"
        placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-file-alt"></i>
        <span class="label px-2">System Logs</span>
      </a>
    </li>

    <!-- System Health -->
    <li class="nav-item">
      <a routerLink="/system-health" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'System Health' : null" triggers="hover" #tHealth="ngbTooltip"
        (click)="tHealth.close()" placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-heartbeat"></i>
        <span class="label px-2">System Health</span>
      </a>
    </li>

    <!-- Tenants -->
    <li class="nav-item">
      <a routerLink="/tenants" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Tenants' : null" triggers="hover" #tTenants="ngbTooltip" (click)="tTenants.close()"
        placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-building"></i>
        <span class="label px-2">Tenants</span>
      </a>
    </li>

    <!-- Modules -->
    <li class="nav-item">
      <a routerLink="/modules" routerLinkActive="active" class="nav-link text-white"
        [ngbTooltip]="!isExpanded ? 'Modules' : null" triggers="hover" #tModules="ngbTooltip" (click)="tModules.close()"
        placement="right" tooltipClass="sidebar-tip">
        <i class="fa-solid fa-puzzle-piece"></i>
        <span class="label px-2">Modules</span>
      </a>
    </li>

    <!-- Divider: Administration -->
    <li class="nav-item" *ngIf="isExpanded">
      <hr class="dropdown-divider text-secondary my-2">
    </li>

    <!-- Administration Submenu -->
    <li class="nav-item" ngbDropdown placement="right-top" container="body">
      <a class="nav-link text-white" ngbDropdownToggle [ngbTooltip]="!isExpanded ? 'Administration' : null"
        triggers="hover" #tAdmin="ngbTooltip" placement="right" tooltipClass="sidebar-tip" style="cursor: pointer;">
        <i class="fa-solid fa-gear"></i>
        <span class="label px-2">Administration</span>
        <i class="fa-solid fa-chevron-right expand-indicator ms-auto" *ngIf="isExpanded"></i>
      </a>
      <div ngbDropdownMenu class="admin-submenu">
        <a ngbDropdownItem routerLink="/securityroles" routerLinkActive="active">
          <i class="fa-solid fa-user-shield me-2"></i>Security Roles
        </a>
        <a ngbDropdownItem routerLink="/securitygroups" routerLinkActive="active">
          <i class="fa-solid fa-users-rectangle me-2"></i>Security Groups
        </a>
        <div class="dropdown-divider"></div>
        <a ngbDropdownItem routerLink="/loginattempts" routerLinkActive="active">
          <i class="fa-solid fa-right-to-bracket me-2"></i>Login Attempts
        </a>
        <a ngbDropdownItem routerLink="/systemsettings" routerLinkActive="active">
          <i class="fa-solid fa-sliders me-2"></i>System Settings
        </a>
      </div>
    </li>

  </ul>
</div>

<!-- Backdrop only when expanded (click to close) -->
<div class="sidebar-backdrop" *ngIf="isUserLoggedIn && isExpanded" (click)="close()"></div>
