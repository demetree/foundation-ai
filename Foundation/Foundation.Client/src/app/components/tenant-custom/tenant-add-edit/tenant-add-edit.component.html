<ng-template #modalTemplate>
    <div class="tenant-modal">
        <!-- Header -->
        <div class="modal-header tenant-modal-header">
            <div class="header-content">
                <div class="header-icon">
                    <i class="fa-solid fa-building"></i>
                </div>
                <div class="header-text">
                    <h5 class="modal-title mb-0">
                        {{ isEditMode ? 'Edit Tenant' : 'New Tenant' }}
                    </h5>
                    <small class="text-light opacity-75">
                        {{ isEditMode ? 'Modify tenant details' : 'Create a new organizational tenant' }}
                    </small>
                </div>
            </div>
            <button type="button" class="btn-close btn-close-white" (click)="closeModal()"></button>
        </div>

        <!-- Body -->
        <div class="modal-body">
            <form [formGroup]="tenantForm">

                <!-- Tenant Name -->
                <div class="mb-3">
                    <label for="tenantName" class="form-label">
                        <span class="text-danger">*</span> Name
                    </label>
                    <input type="text" id="tenantName" formControlName="name" class="form-control"
                        placeholder="Enter tenant name" required>
                    <div *ngIf="tenantForm.get('name')?.invalid && tenantForm.get('name')?.touched"
                        class="text-danger small mt-1">
                        Tenant name is required
                    </div>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label for="tenantDescription" class="form-label">Description</label>
                    <textarea id="tenantDescription" formControlName="description" class="form-control" rows="3"
                        placeholder="Enter description (optional)"></textarea>
                </div>

                <!-- Host Name -->
                <div class="mb-3">
                    <label for="tenantHostName" class="form-label">
                        <i class="fa-solid fa-globe me-1"></i>Host Name
                    </label>
                    <input type="text" id="tenantHostName" formControlName="hostName" class="form-control"
                        placeholder="e.g. pettyharbour.example.com">
                    <small class="form-text text-muted">
                        The domain name used to resolve this tenant from incoming HTTP requests.
                        Used by Community CMS and other public-facing apps.
                    </small>
                </div>

                <!-- Active Toggle -->
                <div class="mb-3">
                    <div class="form-check form-switch">
                        <input type="checkbox" class="form-check-input" id="tenantActive" formControlName="active">
                        <label class="form-check-label" for="tenantActive">
                            <span class="badge" [class.bg-success]="tenantForm.get('active')?.value"
                                [class.bg-secondary]="!tenantForm.get('active')?.value">
                                {{ tenantForm.get('active')?.value ? 'Active' : 'Inactive' }}
                            </span>
                        </label>
                    </div>
                </div>

            </form>
        </div>

        <!-- Footer -->
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" (click)="closeModal()">
                <i class="fa-solid fa-xmark me-1"></i>Cancel
            </button>
            <button type="button" class="btn btn-primary" [disabled]="isSaving || tenantForm.invalid || tenantForm.pristine"
                (click)="submitForm()">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1"></span>Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Create Tenant' }}
                </span>
            </button>
        </div>
    </div>
</ng-template>
