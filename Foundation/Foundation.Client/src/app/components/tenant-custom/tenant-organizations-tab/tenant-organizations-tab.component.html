<div class="organizations-tab">
    <!-- Toolbar -->
    <div class="tab-toolbar d-flex justify-content-between align-items-center mb-3">
        <div class="toolbar-title">
            <span class="text-muted small">{{ (organizations$ | async)?.length || 0 }} organizations</span>
        </div>
        <button class="btn btn-primary btn-sm" (click)="addOrganization()">
            <i class="fa-solid fa-plus me-1"></i>Add Organization
        </button>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading$ | async" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-muted mt-2">Loading organizations...</p>
    </div>

    <!-- Organizations List -->
    <div *ngIf="!(isLoading$ | async)">
        <!-- Empty State -->
        <div *ngIf="(organizations$ | async)?.length === 0" class="text-center py-5">
            <i class="fa-solid fa-building fa-3x text-muted opacity-50 mb-3"></i>
            <h5 class="text-muted">No Organizations</h5>
            <p class="text-muted">This tenant has no organizations yet.</p>
            <button class="btn btn-outline-primary" (click)="addOrganization()">
                <i class="fa-solid fa-plus me-1"></i>Create First Organization
            </button>
        </div>

        <!-- Organizations Table -->
        <div class="table-responsive" *ngIf="(organizations$ | async)?.length">
            <table class="table table-hover org-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Description</th>
                        <th class="text-center">Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let org of organizations$ | async" class="org-row"
                        [class.selected]="selectedOrganization?.id === org.id" (click)="openOrganization(org)">
                        <td>
                            <div class="org-name">
                                <i class="fa-solid fa-building me-2 text-primary"></i>
                                {{ org.name }}
                            </div>
                        </td>
                        <td class="text-muted">{{ org.description || '—' }}</td>
                        <td class="text-center">
                            <span class="badge" [class.bg-success]="org.active" [class.bg-secondary]="!org.active">
                                {{ org.active ? 'Active' : 'Inactive' }}
                            </span>
                        </td>
                        <td class="text-end">
                            <i class="fa-solid fa-chevron-right text-muted"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Organization Detail Panel -->
    <app-organization-detail-panel #orgPanel (closed)="onOrganizationClosed()" (changed)="onOrganizationChanged()">
    </app-organization-detail-panel>

    <!-- Organization Add/Edit Component -->
    <app-organization-add-edit #orgAddEdit (saved)="onOrganizationSaved($event)"></app-organization-add-edit>
</div>
