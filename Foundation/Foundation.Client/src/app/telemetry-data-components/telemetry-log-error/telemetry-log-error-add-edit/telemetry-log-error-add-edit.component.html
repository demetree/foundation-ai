<div class="add-telemetry-log-error" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-telemetry-log-error me-2"
        (click)="openModal()"
        ngbTooltip="Add Telemetry Log Error" 
        *ngIf="userIsTelemetryTelemetryLogErrorWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #telemetryLogErrorModal let-modal>
   <div class="modal-header bg-dark text-light telemetry-log-error-modal-header">
      <h5 class="modal-title mb-0" id="telemetryLogErrorModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Telemetry Log Error' : 'Add Telemetry Log Error' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body telemetry-log-error-modal-body">
      <form [formGroup]="telemetryLogErrorForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('telemetryApplicationId')">
                <label for="TelemetryLogError-telemetryApplicationId" id="label-TelemetryLogError-telemetryApplicationId"><span class="text-danger">*</span>Telemetry Application</label>
                <select id="TelemetryLogError-telemetryApplicationId" formControlName="telemetryApplicationId" class="form-select telemetry-log-error-select" [disabled]="!userIsTelemetryTelemetryLogErrorWriter()">
                    <option [ngValue]="null">Select Telemetry Application</option>
                    <option *ngFor="let telemetryApplication of telemetryApplications$ | async" [ngValue]="telemetryApplication.id">{{telemetryApplication.name}}</option>
                </select>
                <div *ngIf="telemetryLogErrorForm.get('telemetryApplicationId')?.invalid && telemetryLogErrorForm.get('telemetryApplicationId')?.touched" class="text-danger">
                    Telemetry Application is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('telemetrySnapshotId')">
                <label for="TelemetryLogError-telemetrySnapshotId" id="label-TelemetryLogError-telemetrySnapshotId">Telemetry Snapshot</label>
                <select id="TelemetryLogError-telemetrySnapshotId" formControlName="telemetrySnapshotId" class="form-select telemetry-log-error-select" [disabled]="!userIsTelemetryTelemetryLogErrorWriter()">
                    <option [ngValue]="null">Select Telemetry Snapshot</option>
                    <option *ngFor="let telemetrySnapshot of telemetrySnapshots$ | async" [ngValue]="telemetrySnapshot.id">{{telemetrySnapshot.machineName}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('capturedAt')">
                <label for="TelemetryLogError-capturedAt" id="label-TelemetryLogError-capturedAt"><span class="text-danger">*</span>Captured At</label>
                <input type="datetime-local" id="TelemetryLogError-capturedAt" formControlName="capturedAt" placeholder="Enter Captured At" class="form-control telemetry-log-error-input" [disabled]="!userIsTelemetryTelemetryLogErrorWriter()" aria-labelledby="label-capturedAt" />
                <div *ngIf="telemetryLogErrorForm.get('capturedAt')?.invalid && telemetryLogErrorForm.get('capturedAt')?.touched" class="text-danger">
                    Captured At is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('logFileName')">
                <label for="TelemetryLogError-logFileName" id="label-TelemetryLogError-logFileName">Log File Name</label>
                <input type="text" id="TelemetryLogError-logFileName" formControlName="logFileName" placeholder="Enter Log File Name" class="form-control telemetry-log-error-input" [disabled]="!userIsTelemetryTelemetryLogErrorWriter()" aria-labelledby="label-logFileName" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('logTimestamp')">
                <label for="TelemetryLogError-logTimestamp" id="label-TelemetryLogError-logTimestamp">Log Timestamp</label>
                <input type="datetime-local" id="TelemetryLogError-logTimestamp" formControlName="logTimestamp" placeholder="Enter Log Timestamp" class="form-control telemetry-log-error-input" [disabled]="!userIsTelemetryTelemetryLogErrorWriter()" aria-labelledby="label-logTimestamp" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('level')">
                <label for="TelemetryLogError-level" id="label-TelemetryLogError-level">Level</label>
                <input type="text" id="TelemetryLogError-level" formControlName="level" placeholder="Enter Level" class="form-control telemetry-log-error-input" [disabled]="!userIsTelemetryTelemetryLogErrorWriter()" aria-labelledby="label-level" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('message')">
                <label for="TelemetryLogError-message" id="label-TelemetryLogError-message">Message</label>
                <textarea id="TelemetryLogError-message" formControlName="message" placeholder="Enter Message" class="form-control telemetry-log-error-input" [disabled]="!userIsTelemetryTelemetryLogErrorWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('exception')">
                <label for="TelemetryLogError-exception" id="label-TelemetryLogError-exception">Exception</label>
                <textarea id="TelemetryLogError-exception" formControlName="exception" placeholder="Enter Exception" class="form-control telemetry-log-error-input" [disabled]="!userIsTelemetryTelemetryLogErrorWriter()"></textarea>
            </div>
         <div class="modal-footer telemetry-log-error-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Telemetry Log Error changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !telemetryLogErrorForm.valid || telemetryLogErrorForm.pristine  || userIsTelemetryTelemetryLogErrorWriter() == false " ngbTooltip="Save the Telemetry Log Error changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Telemetry Log Error' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
