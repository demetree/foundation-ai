<div class="add-audit-user" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-user me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit User" 
        *ngIf="userIsAuditorAuditUserWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditUserModal let-modal>
   <div class="modal-header audit-user-modal-header">
      <h5 class="modal-title mb-0" id="auditUserModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit User' : 'Add Audit User' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body audit-user-modal-body">
      <form [formGroup]="auditUserForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="AuditUser-name" id="label-AuditUser-name"><span class="text-danger">*</span>Name</label>
                <textarea id="AuditUser-name" formControlName="name" placeholder="Enter Name" class="form-control audit-user-input" [disabled]="!userIsAuditorAuditUserWriter()"></textarea>
                <div *ngIf="auditUserForm.get('name')?.invalid && auditUserForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                <label for="AuditUser-comments" id="label-AuditUser-comments">Comments</label>
                <textarea id="AuditUser-comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-user-input" [disabled]="!userIsAuditorAuditUserWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('firstAccess')">
                <label for="AuditUser-firstAccess" id="label-AuditUser-firstAccess">First Access</label>
                <input type="datetime-local" id="AuditUser-firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-user-input" [disabled]="!userIsAuditorAuditUserWriter()" aria-labelledby="label-firstAccess" />
            </div>
         <div class="modal-footer audit-user-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit User changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditUserForm.valid || auditUserForm.pristine  || userIsAuditorAuditUserWriter() == false " ngbTooltip="Save the Audit User changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Audit User' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
