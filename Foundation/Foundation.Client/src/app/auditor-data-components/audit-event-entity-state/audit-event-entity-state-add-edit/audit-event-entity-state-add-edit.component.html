<div class="add-audit-event-entity-state" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-event-entity-state me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Event Entity State" 
        *ngIf="userIsAuditorAuditEventEntityStateWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditEventEntityStateModal let-modal>
   <div class="modal-header audit-event-entity-state-modal-header">
      <h5 class="modal-title mb-0" id="auditEventEntityStateModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Event Entity State' : 'Add Audit Event Entity State' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body audit-event-entity-state-modal-body">
      <form [formGroup]="auditEventEntityStateForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('auditEventId')">
                <label for="AuditEventEntityState-auditEventId" id="label-AuditEventEntityState-auditEventId"><span class="text-danger">*</span>Audit Event</label>
                <select id="AuditEventEntityState-auditEventId" formControlName="auditEventId" class="form-select audit-event-entity-state-select" [disabled]="!userIsAuditorAuditEventEntityStateWriter()">
                    <option [ngValue]="null">Select Audit Event</option>
                    <option *ngFor="let auditEvent of auditEvents$ | async" [ngValue]="auditEvent.id">{{[auditEvent.message] | filterAndJoin}}</option>
                </select>
                <div *ngIf="auditEventEntityStateForm.get('auditEventId')?.invalid && auditEventEntityStateForm.get('auditEventId')?.touched" class="text-danger">
                    Audit Event is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('beforeState')">
                <label for="AuditEventEntityState-beforeState" id="label-AuditEventEntityState-beforeState">Before State</label>
                <textarea id="AuditEventEntityState-beforeState" formControlName="beforeState" placeholder="Enter Before State" class="form-control audit-event-entity-state-input" [disabled]="!userIsAuditorAuditEventEntityStateWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('afterState')">
                <label for="AuditEventEntityState-afterState" id="label-AuditEventEntityState-afterState">After State</label>
                <textarea id="AuditEventEntityState-afterState" formControlName="afterState" placeholder="Enter After State" class="form-control audit-event-entity-state-input" [disabled]="!userIsAuditorAuditEventEntityStateWriter()"></textarea>
            </div>
         <div class="modal-footer audit-event-entity-state-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Event Entity State changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditEventEntityStateForm.valid || auditEventEntityStateForm.pristine  || userIsAuditorAuditEventEntityStateWriter() == false " ngbTooltip="Save the Audit Event Entity State changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Audit Event Entity State' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
