<div class="container-fluid p-1 m-0 audit-access-type-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="audit-access-type-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Audit Access Type</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Audit Access Type' : 'Add Audit Access Type'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAuditorAuditAccessTypeReader()">
                <div class="col m-2 audit-access-type-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="auditAccessTypeForm" (ngSubmit)="submitForm()" class="audit-access-type-details-form">
                            <div class="form-group">
                                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                                <input type="text" id="name" formControlName="name" placeholder="Enter Name" class="form-control audit-access-type-input" [disabled]="!userIsAuditorAuditAccessTypeWriter()" aria-labelledby="label-name" />
                                <div *ngIf="auditAccessTypeForm.get('name')?.invalid && auditAccessTypeForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="description" id="label-description">Description</label>
                                <textarea id="description" formControlName="description" placeholder="Enter Description" class="form-control audit-access-type-input" [disabled]="!userIsAuditorAuditAccessTypeWriter()"></textarea>
                            </div>
                            <div class="audit-access-type-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="auditAccessTypeForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Audit Access Type">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !auditAccessTypeForm.valid || !auditAccessTypeForm.dirty || auditAccessTypeForm.pristine || userIsAuditorAuditAccessTypeWriter() == false " ngbTooltip="Save Audit Access Type">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAuditorAuditAccessTypeReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 audit-access-type-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="auditEventService.userIsAuditorAuditEventReader()">
                            <button ngbNavLink>AuditEvents
                                <span class="badge bg-primary ms-2">
                                    {{ (auditAccessTypeData?.AuditEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <app-audit-event-table [queryParams]="GetQueryParameters()"></app-audit-event-table>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
