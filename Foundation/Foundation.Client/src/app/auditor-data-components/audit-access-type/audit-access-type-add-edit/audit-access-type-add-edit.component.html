<div class="add-audit-access-type" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-access-type me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Access Type" 
        *ngIf="userIsAuditorAuditAccessTypeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditAccessTypeModal let-modal>
   <div class="modal-header audit-access-type-modal-header">
      <h5 class="modal-title mb-0" id="auditAccessTypeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Access Type' : 'Add Audit Access Type' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body audit-access-type-modal-body">
      <form [formGroup]="auditAccessTypeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="AuditAccessType-name" id="label-AuditAccessType-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="AuditAccessType-name" formControlName="name" placeholder="Enter Name" class="form-control audit-access-type-input" [disabled]="!userIsAuditorAuditAccessTypeWriter()" aria-labelledby="label-name" />
                <div *ngIf="auditAccessTypeForm.get('name')?.invalid && auditAccessTypeForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="AuditAccessType-description" id="label-AuditAccessType-description">Description</label>
                <textarea id="AuditAccessType-description" formControlName="description" placeholder="Enter Description" class="form-control audit-access-type-input" [disabled]="!userIsAuditorAuditAccessTypeWriter()"></textarea>
            </div>
         <div class="modal-footer audit-access-type-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Access Type changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditAccessTypeForm.valid || auditAccessTypeForm.pristine  || userIsAuditorAuditAccessTypeWriter() == false " ngbTooltip="Save the Audit Access Type changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Audit Access Type' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
