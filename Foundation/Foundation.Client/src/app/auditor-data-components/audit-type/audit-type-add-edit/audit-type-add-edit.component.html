<div class="add-audit-type" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-type me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Type" 
        *ngIf="userIsAuditorAuditTypeWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditTypeModal let-modal>
   <div class="modal-header audit-type-modal-header">
      <h5 class="modal-title mb-0" id="auditTypeModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Type' : 'Add Audit Type' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body audit-type-modal-body">
      <form [formGroup]="auditTypeForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="AuditType-name" id="label-AuditType-name"><span class="text-danger">*</span>Name</label>
                <input type="text" id="AuditType-name" formControlName="name" placeholder="Enter Name" class="form-control audit-type-input" [disabled]="!userIsAuditorAuditTypeWriter()" aria-labelledby="label-name" />
                <div *ngIf="auditTypeForm.get('name')?.invalid && auditTypeForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('description')">
                <label for="AuditType-description" id="label-AuditType-description">Description</label>
                <textarea id="AuditType-description" formControlName="description" placeholder="Enter Description" class="form-control audit-type-input" [disabled]="!userIsAuditorAuditTypeWriter()"></textarea>
            </div>
         <div class="modal-footer audit-type-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Type changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditTypeForm.valid || auditTypeForm.pristine  || userIsAuditorAuditTypeWriter() == false " ngbTooltip="Save the Audit Type changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Audit Type' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
