<div class="container-fluid p-1 m-0 external-communication-recipient-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="external-communication-recipient-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">External Communication Recipient</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit External Communication Recipient' : 'Add External Communication Recipient'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAuditorExternalCommunicationRecipientReader()">
                <div class="col m-2 external-communication-recipient-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="externalCommunicationRecipientForm" (ngSubmit)="submitForm()" class="external-communication-recipient-details-form">
                            <div class="form-group">
                                <label for="externalCommunicationId" id="label-externalCommunicationId">External Communication</label>
                                <select id="externalCommunicationId" formControlName="externalCommunicationId" class="form-select external-communication-recipient-select" [disabled]="!userIsAuditorExternalCommunicationRecipientWriter()">
                                    <option [ngValue]="null">Select External Communication</option>
                                    <option *ngFor="let externalCommunication of externalCommunications$ | async" [ngValue]="externalCommunication.id">{{externalCommunication.communicationType}}</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="recipient" id="label-recipient">Recipient</label>
                                <input type="text" id="recipient" formControlName="recipient" placeholder="Enter Recipient" class="form-control external-communication-recipient-input" [disabled]="!userIsAuditorExternalCommunicationRecipientWriter()" aria-labelledby="label-recipient" />
                            </div>
                            <div class="form-group">
                                <label for="type" id="label-type">Type</label>
                                <input type="text" id="type" formControlName="type" placeholder="Enter Type" class="form-control external-communication-recipient-input" [disabled]="!userIsAuditorExternalCommunicationRecipientWriter()" aria-labelledby="label-type" />
                            </div>
                            <div class="external-communication-recipient-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="externalCommunicationRecipientForm.pristine" (click)="loadData(true)" ngbTooltip="Reload External Communication Recipient">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !externalCommunicationRecipientForm.valid || !externalCommunicationRecipientForm.dirty || externalCommunicationRecipientForm.pristine || userIsAuditorExternalCommunicationRecipientWriter() == false " ngbTooltip="Save External Communication Recipient">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
