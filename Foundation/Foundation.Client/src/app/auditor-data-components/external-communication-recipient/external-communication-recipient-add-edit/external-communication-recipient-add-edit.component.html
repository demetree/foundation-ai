<div class="add-external-communication-recipient" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-external-communication-recipient me-2"
        (click)="openModal()"
        ngbTooltip="Add External Communication Recipient" 
        *ngIf="userIsAuditorExternalCommunicationRecipientWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #externalCommunicationRecipientModal let-modal>
   <div class="modal-header bg-dark text-light external-communication-recipient-modal-header">
      <h5 class="modal-title mb-0" id="externalCommunicationRecipientModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit External Communication Recipient' : 'Add External Communication Recipient' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body external-communication-recipient-modal-body">
      <form [formGroup]="externalCommunicationRecipientForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('externalCommunicationId')">
                <label for="ExternalCommunicationRecipient-externalCommunicationId" id="label-ExternalCommunicationRecipient-externalCommunicationId">External Communication</label>
                <select id="ExternalCommunicationRecipient-externalCommunicationId" formControlName="externalCommunicationId" class="form-select external-communication-recipient-select" [disabled]="!userIsAuditorExternalCommunicationRecipientWriter()">
                    <option [ngValue]="null">Select External Communication</option>
                    <option *ngFor="let externalCommunication of externalCommunications$ | async" [ngValue]="externalCommunication.id">{{externalCommunication.communicationType}}</option>
                </select>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('recipient')">
                <label for="ExternalCommunicationRecipient-recipient" id="label-ExternalCommunicationRecipient-recipient">Recipient</label>
                <input type="text" id="ExternalCommunicationRecipient-recipient" formControlName="recipient" placeholder="Enter Recipient" class="form-control external-communication-recipient-input" [disabled]="!userIsAuditorExternalCommunicationRecipientWriter()" aria-labelledby="label-recipient" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('type')">
                <label for="ExternalCommunicationRecipient-type" id="label-ExternalCommunicationRecipient-type">Type</label>
                <input type="text" id="ExternalCommunicationRecipient-type" formControlName="type" placeholder="Enter Type" class="form-control external-communication-recipient-input" [disabled]="!userIsAuditorExternalCommunicationRecipientWriter()" aria-labelledby="label-type" />
            </div>
         <div class="modal-footer external-communication-recipient-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the External Communication Recipient changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !externalCommunicationRecipientForm.valid || externalCommunicationRecipientForm.pristine  || userIsAuditorExternalCommunicationRecipientWriter() == false " ngbTooltip="Save the External Communication Recipient changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add External Communication Recipient' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
