<div class="container-fluid p-1 m-0 audit-resource-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="audit-resource-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Audit Resource</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Audit Resource' : 'Add Audit Resource'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAuditorAuditResourceReader()">
                <div class="col m-2 audit-resource-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="auditResourceForm" (ngSubmit)="submitForm()" class="audit-resource-details-form">
                            <div class="form-group">
                                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                                <textarea id="name" formControlName="name" placeholder="Enter Name" class="form-control audit-resource-input" [disabled]="!userIsAuditorAuditResourceWriter()"></textarea>
                                <div *ngIf="auditResourceForm.get('name')?.invalid && auditResourceForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="comments" id="label-comments">Comments</label>
                                <textarea id="comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-resource-input" [disabled]="!userIsAuditorAuditResourceWriter()"></textarea>
                            </div>
                            <div class="form-group">
                                <label for="firstAccess" id="label-firstAccess">First Access</label>
                                <input type="datetime-local" id="firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-resource-input" [disabled]="!userIsAuditorAuditResourceWriter()" aria-labelledby="label-firstAccess" />
                            </div>
                            <div class="audit-resource-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="auditResourceForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Audit Resource">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !auditResourceForm.valid || !auditResourceForm.dirty || auditResourceForm.pristine || userIsAuditorAuditResourceWriter() == false " ngbTooltip="Save Audit Resource">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAuditorAuditResourceReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 audit-resource-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="auditEventService.userIsAuditorAuditEventReader()">
                            <button ngbNavLink>AuditEvents
                                <span class="badge bg-primary ms-2">
                                    {{ (auditResourceData?.AuditEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <app-audit-event-table [queryParams]="GetQueryParameters()"></app-audit-event-table>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
