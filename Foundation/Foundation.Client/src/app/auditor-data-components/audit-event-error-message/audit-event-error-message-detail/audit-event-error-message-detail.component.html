<div class="container-fluid p-1 m-0 audit-event-error-message-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="audit-event-error-message-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Audit Event Error Message</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Audit Event Error Message' : 'Add Audit Event Error Message'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAuditorAuditEventErrorMessageReader()">
                <div class="col m-2 audit-event-error-message-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="auditEventErrorMessageForm" (ngSubmit)="submitForm()" class="audit-event-error-message-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('auditEventId')">
                                <label for="AuditEventErrorMessage-auditEventId" id="label-AuditEventErrorMessage-auditEventId"><span class="text-danger">*</span>Audit Event</label>
                                <select id="AuditEventErrorMessage-auditEventId" formControlName="auditEventId" class="form-select audit-event-error-message-select" [disabled]="!userIsAuditorAuditEventErrorMessageWriter()">
                                    <option [ngValue]="null">Select Audit Event</option>
                                    <option *ngFor="let auditEvent of auditEvents$ | async" [ngValue]="auditEvent.id">{{[auditEvent.message] | filterAndJoin}}</option>
                                </select>
                                <div *ngIf="auditEventErrorMessageForm.get('auditEventId')?.invalid && auditEventErrorMessageForm.get('auditEventId')?.touched" class="text-danger">
                                    Audit Event is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('errorMessage')">
                                <label for="AuditEventErrorMessage-errorMessage" id="label-AuditEventErrorMessage-errorMessage"><span class="text-danger">*</span>Error Message</label>
                                <textarea id="AuditEventErrorMessage-errorMessage" formControlName="errorMessage" placeholder="Enter Error Message" class="form-control audit-event-error-message-input" [disabled]="!userIsAuditorAuditEventErrorMessageWriter()"></textarea>
                                <div *ngIf="auditEventErrorMessageForm.get('errorMessage')?.invalid && auditEventErrorMessageForm.get('errorMessage')?.touched" class="text-danger">
                                    Error Message is required
                                </div>
                            </div>
                            <div class="audit-event-error-message-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="auditEventErrorMessageForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Audit Event Error Message">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditEventErrorMessageForm.valid || !auditEventErrorMessageForm.dirty || auditEventErrorMessageForm.pristine  || userIsAuditorAuditEventErrorMessageWriter() == false " ngbTooltip="Save the Audit Event Error Message changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Audit Event Error Message' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
