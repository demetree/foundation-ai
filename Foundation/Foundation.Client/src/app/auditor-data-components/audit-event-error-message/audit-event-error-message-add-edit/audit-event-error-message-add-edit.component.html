<div class="add-audit-event-error-message" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-event-error-message me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Event Error Message" 
        *ngIf="userIsAuditorAuditEventErrorMessageWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditEventErrorMessageModal let-modal>
   <div class="modal-header audit-event-error-message-modal-header">
      <h5 class="modal-title mb-0" id="auditEventErrorMessageModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Event Error Message' : 'Add Audit Event Error Message' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body audit-event-error-message-modal-body">
      <form [formGroup]="auditEventErrorMessageForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('auditEventId')">
                <label for="AuditEventErrorMessage-auditEventId" id="label-AuditEventErrorMessage-auditEventId"><span class="text-danger">*</span>Audit Event</label>
                <select id="AuditEventErrorMessage-auditEventId" formControlName="auditEventId" class="form-select audit-event-error-message-select" [disabled]="!userIsAuditorAuditEventErrorMessageWriter()">
                    <option [ngValue]="null">Select Audit Event</option>
                    <option *ngFor="let auditEvent of auditEvents$ | async" [ngValue]="auditEvent.id">{{[auditEvent.message] | filterAndJoin}}</option>
                </select>
                <div *ngIf="auditEventErrorMessageForm.get('auditEventId')?.invalid && auditEventErrorMessageForm.get('auditEventId')?.touched" class="text-danger">
                    Audit Event is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('errorMessage')">
                <label for="AuditEventErrorMessage-errorMessage" id="label-AuditEventErrorMessage-errorMessage"><span class="text-danger">*</span>Error Message</label>
                <textarea id="AuditEventErrorMessage-errorMessage" formControlName="errorMessage" placeholder="Enter Error Message" class="form-control audit-event-error-message-input" [disabled]="!userIsAuditorAuditEventErrorMessageWriter()"></textarea>
                <div *ngIf="auditEventErrorMessageForm.get('errorMessage')?.invalid && auditEventErrorMessageForm.get('errorMessage')?.touched" class="text-danger">
                    Error Message is required
                </div>
            </div>
         <div class="modal-footer audit-event-error-message-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Event Error Message changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditEventErrorMessageForm.valid || auditEventErrorMessageForm.pristine  || userIsAuditorAuditEventErrorMessageWriter() == false " ngbTooltip="Save the Audit Event Error Message changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Audit Event Error Message' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
