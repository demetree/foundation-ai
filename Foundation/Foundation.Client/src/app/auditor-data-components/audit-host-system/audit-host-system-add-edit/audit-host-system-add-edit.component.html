<div class="add-audit-host-system" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-host-system me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Host System" 
        *ngIf="userIsAuditorAuditHostSystemWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditHostSystemModal let-modal>
   <div class="modal-header bg-dark text-light audit-host-system-modal-header">
      <h5 class="modal-title mb-0" id="auditHostSystemModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Host System' : 'Add Audit Host System' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body audit-host-system-modal-body">
      <form [formGroup]="auditHostSystemForm" (ngSubmit)="submitForm()">
            <div class="form-group">
                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                <textarea id="name" formControlName="name" placeholder="Enter Name" class="form-control audit-host-system-input" [disabled]="!userIsAuditorAuditHostSystemWriter()"></textarea>
                <div *ngIf="auditHostSystemForm.get('name')?.invalid && auditHostSystemForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group">
                <label for="comments" id="label-comments">Comments</label>
                <textarea id="comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-host-system-input" [disabled]="!userIsAuditorAuditHostSystemWriter()"></textarea>
            </div>
            <div class="form-group">
                <label for="firstAccess" id="label-firstAccess">First Access</label>
                <input type="datetime-local" id="firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-host-system-input" [disabled]="!userIsAuditorAuditHostSystemWriter()" aria-labelledby="label-firstAccess" />
            </div>
         <div class="modal-footer audit-host-system-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Host System changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditHostSystemForm.valid || auditHostSystemForm.pristine || !userIsAuditorAuditHostSystemWriter()" ngbTooltip="Save the Audit Host System changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
