<div class="add-audit-host-system" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-host-system me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Host System" 
        *ngIf="userIsAuditorAuditHostSystemWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditHostSystemModal let-modal>
   <div class="modal-header audit-host-system-modal-header">
      <h5 class="modal-title mb-0" id="auditHostSystemModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Host System' : 'Add Audit Host System' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body audit-host-system-modal-body">
      <form [formGroup]="auditHostSystemForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="AuditHostSystem-name" id="label-AuditHostSystem-name"><span class="text-danger">*</span>Name</label>
                <textarea id="AuditHostSystem-name" formControlName="name" placeholder="Enter Name" class="form-control audit-host-system-input" [disabled]="!userIsAuditorAuditHostSystemWriter()"></textarea>
                <div *ngIf="auditHostSystemForm.get('name')?.invalid && auditHostSystemForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                <label for="AuditHostSystem-comments" id="label-AuditHostSystem-comments">Comments</label>
                <textarea id="AuditHostSystem-comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-host-system-input" [disabled]="!userIsAuditorAuditHostSystemWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('firstAccess')">
                <label for="AuditHostSystem-firstAccess" id="label-AuditHostSystem-firstAccess">First Access</label>
                <input type="datetime-local" id="AuditHostSystem-firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-host-system-input" [disabled]="!userIsAuditorAuditHostSystemWriter()" aria-labelledby="label-firstAccess" />
            </div>
         <div class="modal-footer audit-host-system-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Host System changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditHostSystemForm.valid || auditHostSystemForm.pristine  || userIsAuditorAuditHostSystemWriter() == false " ngbTooltip="Save the Audit Host System changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Audit Host System' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
