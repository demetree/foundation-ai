<div class="container-fluid p-1 m-0 audit-host-system-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="audit-host-system-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Audit Host System</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Audit Host System' : 'Add Audit Host System'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAuditorAuditHostSystemReader()">
                <div class="col m-2 audit-host-system-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="auditHostSystemForm" (ngSubmit)="submitForm()" class="audit-host-system-details-form">
                            <div class="form-group">
                                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                                <textarea id="name" formControlName="name" placeholder="Enter Name" class="form-control audit-host-system-input" [disabled]="!userIsAuditorAuditHostSystemWriter()"></textarea>
                                <div *ngIf="auditHostSystemForm.get('name')?.invalid && auditHostSystemForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="comments" id="label-comments">Comments</label>
                                <textarea id="comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-host-system-input" [disabled]="!userIsAuditorAuditHostSystemWriter()"></textarea>
                            </div>
                            <div class="form-group">
                                <label for="firstAccess" id="label-firstAccess">First Access</label>
                                <input type="datetime-local" id="firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-host-system-input" [disabled]="!userIsAuditorAuditHostSystemWriter()" aria-labelledby="label-firstAccess" />
                            </div>
                            <div class="audit-host-system-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="auditHostSystemForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Audit Host System">Reset</button>
                                <button type="submit" class="btn btm-sm btn-primary" [disabled]="isSaving || !auditHostSystemForm.valid || !auditHostSystemForm.dirty || auditHostSystemForm.pristine || userIsAuditorAuditHostSystemWriter() == false " ngbTooltip="Save Audit Host System">{{ isEditMode ? 'Save' : 'Create' }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAuditorAuditHostSystemReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 audit-host-system-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="auditEventService.userIsAuditorAuditEventReader()">
                            <button ngbNavLink>AuditEvents
                                <span class="badge bg-primary ms-2">
                                    {{ (auditHostSystemData?.AuditEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <app-audit-event-table [queryParams]="GetQueryParameters()"></app-audit-event-table>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
