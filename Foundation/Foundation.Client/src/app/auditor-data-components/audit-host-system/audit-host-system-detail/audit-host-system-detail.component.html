<div class="container-fluid p-1 m-0 audit-host-system-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="audit-host-system-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Audit Host System</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Audit Host System' : 'Add Audit Host System'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAuditorAuditHostSystemReader()">
                <div class="col m-2 audit-host-system-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="auditHostSystemForm" (ngSubmit)="submitForm()" class="audit-host-system-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="AuditHostSystem-name" id="label-AuditHostSystem-name"><span class="text-danger">*</span>Name</label>
                                <textarea id="AuditHostSystem-name" formControlName="name" placeholder="Enter Name" class="form-control audit-host-system-input" [disabled]="!userIsAuditorAuditHostSystemWriter()"></textarea>
                                <div *ngIf="auditHostSystemForm.get('name')?.invalid && auditHostSystemForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                                <label for="AuditHostSystem-comments" id="label-AuditHostSystem-comments">Comments</label>
                                <textarea id="AuditHostSystem-comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-host-system-input" [disabled]="!userIsAuditorAuditHostSystemWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('firstAccess')">
                                <label for="AuditHostSystem-firstAccess" id="label-AuditHostSystem-firstAccess">First Access</label>
                                <input type="datetime-local" id="AuditHostSystem-firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-host-system-input" [disabled]="!userIsAuditorAuditHostSystemWriter()" aria-labelledby="label-firstAccess" />
                            </div>
                            <div class="audit-host-system-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="auditHostSystemForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Audit Host System">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditHostSystemForm.valid || !auditHostSystemForm.dirty || auditHostSystemForm.pristine  || userIsAuditorAuditHostSystemWriter() == false " ngbTooltip="Save the Audit Host System changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Audit Host System' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAuditorAuditHostSystemReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 audit-host-system-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="auditEventService.userIsAuditorAuditEventReader()">
                            <button ngbNavLink>Audit Events
                                <span class="badge bg-primary ms-2">
                                    {{ (auditHostSystemData?.AuditEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-audit-event-table [queryParams]="{ auditHostSystemId: auditHostSystemData?.id }" [showAddButton]="true" [preSeededData]="{ auditHostSystemId: auditHostSystemData?.id }" [hiddenFields]="['auditHostSystemId']"></app-audit-event-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
