<div class="add-audit-session" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-session me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Session" 
        *ngIf="userIsAuditorAuditSessionWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditSessionModal let-modal>
   <div class="modal-header audit-session-modal-header">
      <h5 class="modal-title mb-0" id="auditSessionModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Session' : 'Add Audit Session' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body audit-session-modal-body">
      <form [formGroup]="auditSessionForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="AuditSession-name" id="label-AuditSession-name"><span class="text-danger">*</span>Name</label>
                <textarea id="AuditSession-name" formControlName="name" placeholder="Enter Name" class="form-control audit-session-input" [disabled]="!userIsAuditorAuditSessionWriter()"></textarea>
                <div *ngIf="auditSessionForm.get('name')?.invalid && auditSessionForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                <label for="AuditSession-comments" id="label-AuditSession-comments">Comments</label>
                <textarea id="AuditSession-comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-session-input" [disabled]="!userIsAuditorAuditSessionWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('firstAccess')">
                <label for="AuditSession-firstAccess" id="label-AuditSession-firstAccess">First Access</label>
                <input type="datetime-local" id="AuditSession-firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-session-input" [disabled]="!userIsAuditorAuditSessionWriter()" aria-labelledby="label-firstAccess" />
            </div>
         <div class="modal-footer audit-session-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Session changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditSessionForm.valid || auditSessionForm.pristine  || userIsAuditorAuditSessionWriter() == false " ngbTooltip="Save the Audit Session changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Audit Session' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
