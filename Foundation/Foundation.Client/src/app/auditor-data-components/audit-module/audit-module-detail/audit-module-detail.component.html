<div class="container-fluid p-1 m-0 audit-module-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="audit-module-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Audit Module</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Audit Module' : 'Add Audit Module'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAuditorAuditModuleReader()">
                <div class="col m-2 audit-module-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="auditModuleForm" (ngSubmit)="submitForm()" class="audit-module-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="AuditModule-name" id="label-AuditModule-name"><span class="text-danger">*</span>Name</label>
                                <textarea id="AuditModule-name" formControlName="name" placeholder="Enter Name" class="form-control audit-module-input" [disabled]="!userIsAuditorAuditModuleWriter()"></textarea>
                                <div *ngIf="auditModuleForm.get('name')?.invalid && auditModuleForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                                <label for="AuditModule-comments" id="label-AuditModule-comments">Comments</label>
                                <textarea id="AuditModule-comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-module-input" [disabled]="!userIsAuditorAuditModuleWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('firstAccess')">
                                <label for="AuditModule-firstAccess" id="label-AuditModule-firstAccess">First Access</label>
                                <input type="datetime-local" id="AuditModule-firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-module-input" [disabled]="!userIsAuditorAuditModuleWriter()" aria-labelledby="label-firstAccess" />
                            </div>
                            <div class="audit-module-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="auditModuleForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Audit Module">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditModuleForm.valid || !auditModuleForm.dirty || auditModuleForm.pristine  || userIsAuditorAuditModuleWriter() == false " ngbTooltip="Save the Audit Module changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Audit Module' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAuditorAuditModuleReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 audit-module-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="auditModuleEntityService.userIsAuditorAuditModuleEntityReader()">
                            <button ngbNavLink>Audit Module Entities
                                <span class="badge bg-primary ms-2">
                                    {{ (auditModuleData?.AuditModuleEntitiesCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-audit-module-entity-table [queryParams]="{ auditModuleId: auditModuleData?.id }" [showAddButton]="true" [preSeededData]="{ auditModuleId: auditModuleData?.id }" [hiddenFields]="['auditModuleId']"></app-audit-module-entity-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                      <li ngbNavItem *ngIf="auditEventService.userIsAuditorAuditEventReader()">
                            <button ngbNavLink>Audit Events
                                <span class="badge bg-primary ms-2">
                                    {{ (auditModuleData?.AuditEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-audit-event-table [queryParams]="{ auditModuleId: auditModuleData?.id }" [showAddButton]="true" [preSeededData]="{ auditModuleId: auditModuleData?.id }" [hiddenFields]="['auditModuleId']"></app-audit-event-table>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
