<div class="add-audit-module" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-module me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Module" 
        *ngIf="userIsAuditorAuditModuleWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditModuleModal let-modal>
   <div class="modal-header audit-module-modal-header">
      <h5 class="modal-title mb-0" id="auditModuleModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Module' : 'Add Audit Module' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body audit-module-modal-body">
      <form [formGroup]="auditModuleForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="AuditModule-name" id="label-AuditModule-name"><span class="text-danger">*</span>Name</label>
                <textarea id="AuditModule-name" formControlName="name" placeholder="Enter Name" class="form-control audit-module-input" [disabled]="!userIsAuditorAuditModuleWriter()"></textarea>
                <div *ngIf="auditModuleForm.get('name')?.invalid && auditModuleForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                <label for="AuditModule-comments" id="label-AuditModule-comments">Comments</label>
                <textarea id="AuditModule-comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-module-input" [disabled]="!userIsAuditorAuditModuleWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('firstAccess')">
                <label for="AuditModule-firstAccess" id="label-AuditModule-firstAccess">First Access</label>
                <input type="datetime-local" id="AuditModule-firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-module-input" [disabled]="!userIsAuditorAuditModuleWriter()" aria-labelledby="label-firstAccess" />
            </div>
         <div class="modal-footer audit-module-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Module changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditModuleForm.valid || auditModuleForm.pristine  || userIsAuditorAuditModuleWriter() == false " ngbTooltip="Save the Audit Module changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Audit Module' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
