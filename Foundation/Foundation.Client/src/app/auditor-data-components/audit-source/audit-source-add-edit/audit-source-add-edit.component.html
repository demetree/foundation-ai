<div class="add-audit-source" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-source me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Source" 
        *ngIf="userIsAuditorAuditSourceWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditSourceModal let-modal>
   <div class="modal-header audit-source-modal-header">
      <h5 class="modal-title mb-0" id="auditSourceModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Source' : 'Add Audit Source' }}
      </h5>
      <button type="button" class="modal-close-btn" (click)="closeModal()" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
   </div>
   <div class="modal-body audit-source-modal-body">
      <form [formGroup]="auditSourceForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('name')">
                <label for="AuditSource-name" id="label-AuditSource-name"><span class="text-danger">*</span>Name</label>
                <textarea id="AuditSource-name" formControlName="name" placeholder="Enter Name" class="form-control audit-source-input" [disabled]="!userIsAuditorAuditSourceWriter()"></textarea>
                <div *ngIf="auditSourceForm.get('name')?.invalid && auditSourceForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                <label for="AuditSource-comments" id="label-AuditSource-comments">Comments</label>
                <textarea id="AuditSource-comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-source-input" [disabled]="!userIsAuditorAuditSourceWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('firstAccess')">
                <label for="AuditSource-firstAccess" id="label-AuditSource-firstAccess">First Access</label>
                <input type="datetime-local" id="AuditSource-firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-source-input" [disabled]="!userIsAuditorAuditSourceWriter()" aria-labelledby="label-firstAccess" />
            </div>
         <div class="modal-footer audit-source-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Source changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditSourceForm.valid || auditSourceForm.pristine  || userIsAuditorAuditSourceWriter() == false " ngbTooltip="Save the Audit Source changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Audit Source' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
