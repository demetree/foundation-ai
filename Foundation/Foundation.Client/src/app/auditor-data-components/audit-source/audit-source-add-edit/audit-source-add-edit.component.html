<div class="add-audit-source" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-source me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Source" 
        *ngIf="userIsAuditorAuditSourceWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditSourceModal let-modal>
   <div class="modal-header bg-dark text-light audit-source-modal-header">
      <h5 class="modal-title mb-0" id="auditSourceModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Source' : 'Add Audit Source' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body audit-source-modal-body">
      <form [formGroup]="auditSourceForm" (ngSubmit)="submitForm()">
            <div class="form-group">
                <label for="name" id="label-name"><span class="text-danger">*</span>Name</label>
                <textarea id="name" formControlName="name" placeholder="Enter Name" class="form-control audit-source-input" [disabled]="!userIsAuditorAuditSourceWriter()"></textarea>
                <div *ngIf="auditSourceForm.get('name')?.invalid && auditSourceForm.get('name')?.touched" class="text-danger">
                    Name is required
                </div>
            </div>
            <div class="form-group">
                <label for="comments" id="label-comments">Comments</label>
                <textarea id="comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-source-input" [disabled]="!userIsAuditorAuditSourceWriter()"></textarea>
            </div>
            <div class="form-group">
                <label for="firstAccess" id="label-firstAccess">First Access</label>
                <input type="datetime-local" id="firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-source-input" [disabled]="!userIsAuditorAuditSourceWriter()" aria-labelledby="label-firstAccess" />
            </div>
         <div class="modal-footer audit-source-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Source changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditSourceForm.valid || auditSourceForm.pristine || !userIsAuditorAuditSourceWriter()" ngbTooltip="Save the Audit Source changes and Close">{{ isEditMode ? 'Save' : 'Create' }}</button>
         </div>
      </form>
   </div>
</ng-template>
