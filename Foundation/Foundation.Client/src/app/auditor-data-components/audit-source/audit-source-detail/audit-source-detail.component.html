<div class="container-fluid p-1 m-0 audit-source-details-container">
    <div class="p-2 detail-background">
        <div class="card mb-3 header-card shadow-sm">
            <div class="audit-source-details-header">
                <div class="header-left">
                    <button class="btn btn-sm btn-light back-button me-2" (click)="goBack()" ngbTooltip="Go Back"  *ngIf="canGoBack()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h3 class="page-title mb-0">Audit Source</h3>
                        <small class="text-muted">{{ isEditMode ? 'Edit Audit Source' : 'Add Audit Source'}}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 header-card shadow-sm">
            <div class="row flex-grow-1" *ngIf="userIsAuditorAuditSourceReader()">
                <div class="col m-2 audit-source-details-body">
                    <div *showSpinner="isLoading$ | async">
                        <form [class.hidden]="isLoading$ | async" [formGroup]="auditSourceForm" (ngSubmit)="submitForm()" class="audit-source-details-form">
                            <div class="form-group" *ngIf="!isFieldHidden('name')">
                                <label for="AuditSource-name" id="label-AuditSource-name"><span class="text-danger">*</span>Name</label>
                                <textarea id="AuditSource-name" formControlName="name" placeholder="Enter Name" class="form-control audit-source-input" [disabled]="!userIsAuditorAuditSourceWriter()"></textarea>
                                <div *ngIf="auditSourceForm.get('name')?.invalid && auditSourceForm.get('name')?.touched" class="text-danger">
                                    Name is required
                                </div>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('comments')">
                                <label for="AuditSource-comments" id="label-AuditSource-comments">Comments</label>
                                <textarea id="AuditSource-comments" formControlName="comments" placeholder="Enter Comments" class="form-control audit-source-input" [disabled]="!userIsAuditorAuditSourceWriter()"></textarea>
                            </div>
                            <div class="form-group" *ngIf="!isFieldHidden('firstAccess')">
                                <label for="AuditSource-firstAccess" id="label-AuditSource-firstAccess">First Access</label>
                                <input type="datetime-local" id="AuditSource-firstAccess" formControlName="firstAccess" placeholder="Enter First Access" class="form-control audit-source-input" [disabled]="!userIsAuditorAuditSourceWriter()" aria-labelledby="label-firstAccess" />
                            </div>
                            <div class="audit-source-details-footer">
                                <button *ngIf="isEditMode" type="button" class="btn btm-sm btn-secondary" [disabled]="auditSourceForm.pristine" (click)="loadData(true)" ngbTooltip="Reload Audit Source">Reset</button>
                                <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditSourceForm.valid || !auditSourceForm.dirty || auditSourceForm.pristine  || userIsAuditorAuditSourceWriter() == false " ngbTooltip="Save the Audit Source changes">
                                    <span *ngIf="isSaving">
                                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                        Saving...
                                    </span>
                                    <span *ngIf="!isSaving">
                                        <i class="fa-solid fa-check me-1"></i>
                                        {{ isEditMode ? 'Save Changes' : 'Add Audit Source' }}
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card mb-3 header-card shadow-sm" *ngIf="isEditMode && userIsAuditorAuditSourceReader() && (isLoading$ | async) == false">
            <div class="row flex-grow-1">
                <div class="col m-2 audit-source-details-body">

                    <ul ngbNav #nav="ngbNav" class="nav-tabs">
                      <li ngbNavItem *ngIf="auditEventService.userIsAuditorAuditEventReader()">
                            <button ngbNavLink>Audit Events
                                <span class="badge bg-primary ms-2">
                                    {{ (auditSourceData?.AuditEventsCount$ | async) ?? '-' }}
                                </span>
                            </button>
                            <ng-template ngbNavContent>
                            <div class="d-flex flex-column gap-3 p-0">
                                <div class="flex-grow-1">
                                    <app-audit-event-table [queryParams]="{ auditSourceId: auditSourceData?.id }"></app-audit-event-table>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <app-audit-event-add-edit [preSeededData]="{ auditSourceId: auditSourceData?.id }" [hiddenFields]="['auditSourceId']"></app-audit-event-add-edit>
                                </div>
                            </div>
                            </ng-template>
                        </li>
                    </ul>
                     <div [ngbNavOutlet]="nav"></div>
                </div>
            </div>
        </div>
    </div>
</div>
