<div class="add-audit-plan-b" *ngIf="showAddButton == true">
    <button type="button"
        class="btn btn-sm btn-add-audit-plan-b me-2"
        (click)="openModal()"
        ngbTooltip="Add Audit Plan B" 
        *ngIf="userIsAuditorAuditPlanBWriter() == true"
        placement="top"
        style="min-width: 75px;">Add</button>
</div>

<!-- ng-bootstrap modal -->
<ng-template #auditPlanBModal let-modal>
   <div class="modal-header bg-dark text-light audit-plan-b-modal-header">
      <h5 class="modal-title mb-0" id="auditPlanBModalLabel" ngbTooltip="{{objectGuid}}">
      {{ isEditMode ? 'Edit Audit Plan B' : 'Add Audit Plan B' }}
      </h5>
      <button type="button"
              class="btn btn-sm btn-close btn-close-white"
              (click)="closeModal()">
       </button>
   </div>
   <div class="modal-body audit-plan-b-modal-body">
      <form [formGroup]="auditPlanBForm" (ngSubmit)="submitForm()">
            <div class="form-group" *ngIf="!isFieldHidden('startTime')">
                <label for="AuditPlanB-startTime" id="label-AuditPlanB-startTime"><span class="text-danger">*</span>Start Time</label>
                <input type="datetime-local" id="AuditPlanB-startTime" formControlName="startTime" placeholder="Enter Start Time" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-startTime" />
                <div *ngIf="auditPlanBForm.get('startTime')?.invalid && auditPlanBForm.get('startTime')?.touched" class="text-danger">
                    Start Time is required
                </div>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('stopTime')">
                <label for="AuditPlanB-stopTime" id="label-AuditPlanB-stopTime"><span class="text-danger">*</span>Stop Time</label>
                <input type="datetime-local" id="AuditPlanB-stopTime" formControlName="stopTime" placeholder="Enter Stop Time" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-stopTime" />
                <div *ngIf="auditPlanBForm.get('stopTime')?.invalid && auditPlanBForm.get('stopTime')?.touched" class="text-danger">
                    Stop Time is required
                </div>
            </div>
            <div class="form-check my-2" *ngIf="!isFieldHidden('completedSuccessfully')">
                <input type="checkbox" id="AuditPlanB-completedSuccessfully" formControlName="completedSuccessfully" class="form-check-input" [disabled]="!userIsAuditorAuditPlanBWriter()" />
                <label for="AuditPlanB-completedSuccessfully" class="form-check-label" id="label-AuditPlanB-completedSuccessfully"><span class="text-danger">*</span>Completed Successfully</label>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('user')">
                <label for="AuditPlanB-user" id="label-AuditPlanB-user">User</label>
                <input type="text" id="AuditPlanB-user" formControlName="user" placeholder="Enter User" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-user" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('session')">
                <label for="AuditPlanB-session" id="label-AuditPlanB-session">Session</label>
                <input type="text" id="AuditPlanB-session" formControlName="session" placeholder="Enter Session" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-session" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('type')">
                <label for="AuditPlanB-type" id="label-AuditPlanB-type">Type</label>
                <input type="text" id="AuditPlanB-type" formControlName="type" placeholder="Enter Type" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-type" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('accessType')">
                <label for="AuditPlanB-accessType" id="label-AuditPlanB-accessType">Access Type</label>
                <input type="text" id="AuditPlanB-accessType" formControlName="accessType" placeholder="Enter Access Type" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-accessType" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('source')">
                <label for="AuditPlanB-source" id="label-AuditPlanB-source">Source</label>
                <input type="text" id="AuditPlanB-source" formControlName="source" placeholder="Enter Source" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-source" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('userAgent')">
                <label for="AuditPlanB-userAgent" id="label-AuditPlanB-userAgent">User Agent</label>
                <input type="text" id="AuditPlanB-userAgent" formControlName="userAgent" placeholder="Enter User Agent" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-userAgent" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('module')">
                <label for="AuditPlanB-module" id="label-AuditPlanB-module">Module</label>
                <input type="text" id="AuditPlanB-module" formControlName="module" placeholder="Enter Module" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-module" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('moduleEntity')">
                <label for="AuditPlanB-moduleEntity" id="label-AuditPlanB-moduleEntity">Module Entity</label>
                <input type="text" id="AuditPlanB-moduleEntity" formControlName="moduleEntity" placeholder="Enter Module Entity" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-moduleEntity" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('resource')">
                <label for="AuditPlanB-resource" id="label-AuditPlanB-resource">Resource</label>
                <textarea id="AuditPlanB-resource" formControlName="resource" placeholder="Enter Resource" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('hostSystem')">
                <label for="AuditPlanB-hostSystem" id="label-AuditPlanB-hostSystem">Host System</label>
                <input type="text" id="AuditPlanB-hostSystem" formControlName="hostSystem" placeholder="Enter Host System" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-hostSystem" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('primaryKey')">
                <label for="AuditPlanB-primaryKey" id="label-AuditPlanB-primaryKey">Primary Key</label>
                <input type="text" id="AuditPlanB-primaryKey" formControlName="primaryKey" placeholder="Enter Primary Key" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-primaryKey" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('threadId')">
                <label for="AuditPlanB-threadId" id="label-AuditPlanB-threadId">Thread Id</label>
                <input type="number" id="AuditPlanB-threadId" formControlName="threadId" placeholder="Enter Thread Id" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()" aria-labelledby="label-threadId" />
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('message')">
                <label for="AuditPlanB-message" id="label-AuditPlanB-message">Message</label>
                <textarea id="AuditPlanB-message" formControlName="message" placeholder="Enter Message" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('beforeState')">
                <label for="AuditPlanB-beforeState" id="label-AuditPlanB-beforeState">Before State</label>
                <textarea id="AuditPlanB-beforeState" formControlName="beforeState" placeholder="Enter Before State" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('afterState')">
                <label for="AuditPlanB-afterState" id="label-AuditPlanB-afterState">After State</label>
                <textarea id="AuditPlanB-afterState" formControlName="afterState" placeholder="Enter After State" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('errorMessage')">
                <label for="AuditPlanB-errorMessage" id="label-AuditPlanB-errorMessage">Error Message</label>
                <textarea id="AuditPlanB-errorMessage" formControlName="errorMessage" placeholder="Enter Error Message" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()"></textarea>
            </div>
            <div class="form-group" *ngIf="!isFieldHidden('exceptionText')">
                <label for="AuditPlanB-exceptionText" id="label-AuditPlanB-exceptionText">Exception Text</label>
                <textarea id="AuditPlanB-exceptionText" formControlName="exceptionText" placeholder="Enter Exception Text" class="form-control audit-plan-b-input" [disabled]="!userIsAuditorAuditPlanBWriter()"></textarea>
            </div>
         <div class="modal-footer audit-plan-b-modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" (click)="closeModal()" ngbTooltip="Cancel the Audit Plan B changes and Close">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary" [disabled]="isSaving || !auditPlanBForm.valid || auditPlanBForm.pristine  || userIsAuditorAuditPlanBWriter() == false " ngbTooltip="Save the Audit Plan B changes and Close">
                <span *ngIf="isSaving">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Saving...
                </span>
                <span *ngIf="!isSaving">
                    <i class="fa-solid fa-check me-1"></i>
                    {{ isEditMode ? 'Save Changes' : 'Add Audit Plan B' }}
                </span>
            </button>
         </div>
      </form>
   </div>
</ng-template>
